<!DOCTYPE html>
<!--
  MENUCAPTAIN - single-file mobile web app
  Build: v1.0
  Stack: React 18 + Babel Standalone (CDN). No build step. Open the file or host it.
  Data : GitHub repo (3 JSON files under data/) is the source of truth.
         localStorage holds a cache for instant load and offline reading.
  OCR  : Anthropic API (Claude vision) digitizes photographed menus.
  Notes: All console/log output is plain ASCII (no emoji) by design.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MenuCaptain" />
  <meta name="theme-color" content="#1b1714" />
  <title>MenuCaptain</title>
  <!-- Fallback link-preview tags: per-list pages under l/ carry their own
       richer tags; these cover direct links to the app itself. -->
  <meta property="og:title" content="MenuCaptain" />
  <meta property="og:description" content="A private notebook for eating out - places, dishes, and the ones worth ordering again." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,9..144&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root{
      --bg:#1b1714; --bg-2:#221d18; --surface:#272019; --surface-2:#2f2720;
      --line:#3a3128; --line-soft:#332b23;
      --text:#f3ebdd; --text-dim:#b3a591; --text-faint:#80715f;
      --accent:#e0764a; --accent-dim:#b85f3a;
      --amber:#e7b24c; --sage:#9aa877; --danger:#d9604e; --ok:#7faa6b;
      --shadow:0 8px 28px rgba(0,0,0,0.45);
    }
    /* Theme palettes. Each overrides only the core surface/text/accent vars;
       semantic colors (amber/sage/danger/ok) stay constant. Warm Brown is the
       default :root above. Applied via data-theme on <html>. */
    :root[data-theme="navy"]{ --bg:#121621; --bg-2:#161c29; --surface:#1c2433; --surface-2:#243041; --line:#334053; --line-soft:#2b3647; --text:#eef2f8; --text-dim:#aab6c8; --text-faint:#6f7c90; --accent:#e7b24c; --accent-dim:#c5923a; }
    :root[data-theme="forest"]{ --bg:#121814; --bg-2:#171f19; --surface:#1c261f; --surface-2:#26332a; --line:#344538; --line-soft:#2c3a30; --text:#eef1e9; --text-dim:#a8b6a4; --text-faint:#6f7d6b; --accent:#86b06a; --accent-dim:#6a934f; }
    :root[data-theme="plum"]{ --bg:#181219; --bg-2:#1f1721; --surface:#251c28; --surface-2:#2f2433; --line:#3f3144; --line-soft:#372a3b; --text:#f2eaf2; --text-dim:#bba7bd; --text-faint:#857089; --accent:#cf7aa6; --accent-dim:#ad5f87; }
    :root[data-theme="slate"]{ --bg:#15181c; --bg-2:#1a1e24; --surface:#20252c; --surface-2:#2a313a; --line:#39414c; --line-soft:#313842; --text:#eef1f4; --text-dim:#aab2bd; --text-faint:#6f7884; --accent:#6f9fc9; --accent-dim:#577fa6; }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
    body{
      font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:16px; line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:none;
    }
    input,textarea,select,button{font-family:inherit; font-size:16px;}
    button{cursor:pointer; border:none; background:none; color:inherit;}
    h1,h2,h3{font-family:'Fraunces',Georgia,serif; font-weight:500; margin:0; line-height:1.15;}

    /* ---- shell ---- */
    #app-shell{
      max-width:540px; margin:0 auto; min-height:100vh;
      background:var(--bg); position:relative;
      padding-bottom:calc(78px + env(safe-area-inset-bottom));
    }
    .topbar{
      position:sticky; top:0; z-index:30;
      background:var(--bg);
      padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
    }
    .topbar h1{font-size:30px; letter-spacing:-0.02em;}
    .topbar .sub{font-size:13px; color:var(--text-faint); margin-top:2px; letter-spacing:0.04em; text-transform:uppercase;}
    .content{padding:4px 20px 24px;}

    /* ---- sync banner ---- */
    .syncbar{
      margin:0 20px 14px; padding:9px 13px; border-radius:11px;
      font-size:13px; display:flex; align-items:center; gap:9px;
      border:1px solid var(--line);
    }
    .syncbar.busy{background:var(--bg-2); color:var(--text-dim);}
    .syncbar.err{background:rgba(217,96,78,0.12); color:#eab0a6; border-color:rgba(217,96,78,0.4);}
    .syncbar.warn{background:rgba(231,178,76,0.1); color:#e7cf9a; border-color:rgba(231,178,76,0.35);}
    .syncbar.update{background:rgba(224,118,74,0.14); color:#f0bfa3; border-color:rgba(224,118,74,0.45);}
    .updrow{display:flex; align-items:center; gap:10px; justify-content:center; padding:14px 0 2px; flex-wrap:wrap;}
    .syncbar button{margin-left:auto; font-size:12px; color:var(--accent); font-weight:600;}
    .dot{width:7px; height:7px; border-radius:50%; flex:none;}
    .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;flex:none;}
    @keyframes sp{to{transform:rotate(360deg);}}

    /* ---- cards ---- */
    .card{
      background:var(--surface); border:1px solid var(--line-soft);
      border-radius:15px; padding:16px; margin-bottom:13px;
    }
    .card.tap{transition:transform 0.08s ease;}
    .card.tap:active{transform:scale(0.985);}
    /* ---- badges ---- */
    .badge-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    .badge{ background:transparent; border:none; border-radius:0;
            padding:2px 0; display:flex; flex-direction:column; gap:5px; }
    .badge.locked{ opacity:0.5; }
    .badge-ic{ width:34px; height:34px; border-radius:9px; display:flex; align-items:center;
               justify-content:center; background:rgba(224,118,74,0.12); }
    .badge.locked .badge-ic{ background:var(--bg-2); }
    .badge-name{ font-weight:600; font-size:14px; color:var(--text); display:flex; align-items:center; }
    .badge-sub{ font-size:12px; color:var(--text-dim); line-height:1.35; }
    /* Discover tab: each badge is a row - stamp + text on the left, a quiet
       action button on the right (the "doorway" into what the badge is about). */
    .badge-row{ display:flex; align-items:center; gap:12px; padding:11px 2px; }
    .badge-row + .badge-row{ border-top:1px solid var(--line); }
    .badge-row.locked{ opacity:0.5; }
    .badge-row.locked .badge-ic{ background:var(--bg-2); }
    .badge-rtx{ flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
    /* Higher specificity than .btn (which is width:100%) so the action button
       sizes to its label instead of eating the whole row. */
    .badge-row .badge-act{ flex:0 0 auto; width:auto; white-space:nowrap;
                           font-size:12.5px; padding:8px 12px; }
    /* My Lists cards */
    .mylist-title{ font-family:'Fraunces',serif; font-size:17px; color:var(--text); line-height:1.2; }
    .mylist-meta{ font-size:12.5px; color:var(--text-dim); margin-top:3px; }
    .mylist-date{ font-size:11.5px; color:var(--text-faint); margin-top:2px; }
    .mylist-star{ background:none; border:none; padding:4px; flex:none; cursor:pointer; }
    .mylist-acts{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .mylist-acts .btn{ width:auto; flex:0 0 auto; }
    .mylist-del{ color:var(--accent); border-color:rgba(224,118,74,0.45); }

    .row{display:flex; align-items:center; gap:12px;}
    .between{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .muted{color:var(--text-dim);}
    .faint{color:var(--text-faint);}
    .tiny{font-size:12.5px;}
    .small{font-size:13.5px;}

    /* ---- visit / restaurant cards ---- */
    .place-name{font-family:'Fraunces',serif; font-size:21px; font-weight:500; letter-spacing:-0.01em;}
    .meta-line{font-size:12.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em;}

    .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
    .chip{
      background:var(--surface-2); border:1px solid var(--line);
      color:var(--text-dim); font-size:12.5px; padding:4px 10px; border-radius:999px;
    }
    /* un-rated dish chips are neutral; the verdict modifiers below add the color/meaning */
    .chip.dish{background:var(--surface-2); border-color:var(--line); color:var(--text-dim);}
    .chip.tag{background:rgba(154,168,119,0.12); border-color:rgba(154,168,119,0.3); color:#bcc79c; font-size:11px; padding:2px 8px;}
    .chip.pick{cursor:pointer;}
    .chip.pick:active{transform:scale(0.94);}
    .chip.on{background:var(--accent); border-color:var(--accent); color:#1b1714; font-weight:600;}
    /* ---- per-dish verdict (Again / Skip) ---- */
    /* verdict chip variants used in read-only displays (history, picks card) */
    .chip.dish.again{background:rgba(224,118,74,0.22); border-color:var(--accent); color:#f7c9ab; font-weight:600;}
    .chip.dish.skip{opacity:0.5; text-decoration:line-through;}
    /* editable dish rows inside the visit form */
    .dish-row{
      display:flex; align-items:center; gap:8px;
      padding:8px 6px 8px 11px; margin-bottom:6px;
      background:var(--surface); border:1px solid var(--line); border-radius:11px;
    }
    .dish-row-name{flex:1; min-width:0; font-size:14px; color:var(--text); word-break:break-word;}
    .dish-verdict{display:flex; gap:5px; flex:none;}
    .verdict-btn{
      font-size:11px; padding:5px 11px; border-radius:999px;
      border:1px solid var(--line); background:transparent; color:var(--text-dim);
      cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform 0.08s;
    }
    .verdict-btn:active{transform:scale(0.92);}
    .verdict-btn.again.on{background:rgba(224,118,74,0.2); border-color:var(--accent); color:var(--accent); font-weight:600;}
    .verdict-btn.skip.on{background:rgba(179,165,145,0.16); border-color:var(--text-faint); color:var(--text-dim); font-weight:600;}
    .dish-row-x{flex:none; padding:5px; background:transparent; border:none; cursor:pointer; line-height:0;}
    .dish-item{margin-bottom:8px;}
    .dish-item .dish-row{margin-bottom:0;}
    .dish-sub{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:5px 0 0 4px;}
    .dish-cam{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--accent);
      background:none; border:none; padding:2px 0; cursor:pointer; -webkit-tap-highlight-color:transparent;}
    .dish-cam:disabled{opacity:0.6;}
    .dish-est{display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--text-dim);}
    .dish-est-num{color:var(--text); font-weight:600;}
    .dish-est-mac{color:var(--text-faint);}
    .dish-redo{background:none; border:none; padding:0; margin-left:2px; font-size:12px;
      color:var(--text-faint); text-decoration:underline; cursor:pointer; -webkit-tap-highlight-color:transparent;}
    .dish-cam-err{font-size:12px; color:#eab0a6;}
    /* conflict modal (photo estimate vs existing menu estimate) */
    .modal-bg{position:fixed; inset:0; z-index:80; background:rgba(15,12,10,0.62);
      display:flex; align-items:center; justify-content:center; padding:24px;}
    .modal{background:var(--surface); border:1px solid var(--line); border-radius:16px;
      padding:20px; max-width:380px; width:100%; box-shadow:0 18px 50px rgba(0,0,0,0.45);}
    .modal-title{font-family:'Fraunces',serif; font-size:18px; color:var(--text); margin-bottom:9px;}
    .modal-body{font-size:14px; line-height:1.5; color:var(--text-dim); margin-bottom:18px;}
    .modal-body strong{color:var(--text); font-weight:600;}
    .modal-actions{display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;}
    /* "your picks here" card on restaurant detail */
    .card.picks{border:1px solid rgba(224,118,74,0.3);}
    .picks-head{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); font-weight:600; margin-bottom:8px;}
    /* ---- help me order (AI menu Q&A) ---- */
    .card.ask{border:1px solid rgba(224,118,74,0.3); margin-bottom:14px;}
    .ask-head{display:flex; align-items:center; gap:7px; font-family:'Fraunces',serif; font-size:16px; color:var(--text); margin-bottom:9px;}
    .ask-input{width:100%; resize:none; line-height:1.4; margin-bottom:8px;}
    .ask-egs{margin-bottom:10px;}
    .ask-go{width:auto; padding:8px 16px;}
    .ask-err{margin-top:10px; padding:9px 11px; border-radius:9px; font-size:13px;
      background:rgba(217,96,78,0.1); border:1px solid rgba(217,96,78,0.4); color:#eab0a6;}
    .ask-answer{margin-top:12px; padding:12px 13px; border-radius:10px;
      background:rgba(224,118,74,0.08); border:1px solid rgba(224,118,74,0.22);
      color:var(--text); font-size:14px; line-height:1.5;}
    /* ---- meal-photo nutrition (informative, never alarming) ---- */
    .card.nutri{border:1px solid rgba(224,118,74,0.22); margin-top:4px;}
    .nutri-kcal{font-family:'Fraunces',serif; font-size:30px; font-weight:600; color:var(--text); line-height:1;}
    .nutri-kcal-u{font-size:14px; font-weight:400; color:var(--text-faint);}
    .nutri-macros{display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:13px; color:var(--text-dim);}
    .nutri-macros b{color:var(--text); font-weight:600;}
    .nutri-foot{margin-top:11px; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint);}
    .nutri-edit{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px;}
    .nutri-edit label{display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.04em;}
    .nutri-edit label.wide{grid-column:1 / -1;}
    .nutri-edit .input{padding:7px 9px;}
    .nutri-line{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-top:9px; font-size:12.5px; color:var(--text-dim);}
    .nutri-line .kc{color:var(--text); font-weight:600;}
    .nutri-line .tg{font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint); border:1px solid var(--line); border-radius:999px; padding:1px 7px;}
    .dish-total{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-top:9px; font-size:12.5px; color:var(--text-dim);}
    .dish-total .dt-kc{color:var(--text); font-weight:600;}
    .dish-total .dt-note{font-size:11px; color:var(--text-faint);}
    .iest{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:9px;}
    .iest-btn{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--accent);
      background:transparent; border:1px dashed rgba(224,118,74,0.5); border-radius:999px;
      padding:4px 11px; cursor:pointer; -webkit-tap-highlight-color:transparent;}
    .iest-btn:disabled{opacity:0.6;}
    .iest-err{font-size:12px; color:#eab0a6;}
    .mitem-nut{display:flex; align-items:center; gap:10px; margin-top:9px;}
    .mitem-nut .nutri-line{margin-top:0;}
    .mitem-thumb{width:46px; height:46px; border-radius:9px; overflow:hidden; flex:none; background:var(--surface-2);}
    .mitem-thumb .photo-img, .mitem-thumb .photo-shell{width:46px; height:46px; border-radius:9px;}
    /* in-app help / user guide */
    .help-body{padding-bottom:40px;}
    .help-h1{font-family:'Fraunces',serif; font-size:25px; color:var(--text); margin:6px 0 4px;}
    .help-h2{font-family:'Fraunces',serif; font-size:19px; color:var(--text); margin:24px 0 8px;}
    .help-h3{font-size:14px; font-weight:600; color:var(--text); margin:16px 0 6px; text-transform:uppercase; letter-spacing:0.04em;}
    .help-p{font-size:14.5px; line-height:1.62; color:var(--text-dim); margin:0 0 12px;}
    .help-p strong, .help-ul strong{color:var(--text); font-weight:600;}
    .help-p em, .help-ul em{color:var(--text); font-style:italic;}
    .help-ul{margin:0 0 14px; padding-left:20px;}
    .help-ul li{font-size:14.5px; line-height:1.6; color:var(--text-dim); margin-bottom:7px;}
    .help-hr{border:none; border-top:1px solid var(--line); margin:22px 0;}
    /* search bar (History + Places) */
    .searchbar{display:flex; align-items:center; gap:9px; background:var(--surface);
      border:1px solid var(--line); border-radius:11px; padding:9px 12px; margin:2px 0 14px;}
    .search-input{flex:1; min-width:0; background:none; border:none; outline:none;
      color:var(--text); font-size:15px; font-family:inherit;}
    .search-input::placeholder{color:var(--text-faint);}
    .search-x{flex:none; background:none; border:none; padding:3px; cursor:pointer;
      line-height:0; -webkit-tap-highlight-color:transparent;}
    /* (i) call-out popovers */
    .hist-legend{display:flex; justify-content:flex-start; margin:-4px 0 12px 2px;}
    .infodot-wrap{position:relative; display:inline-flex; align-items:center; vertical-align:middle;}
    .infodot{display:inline-flex; align-items:center; gap:5px; background:none; border:none;
      padding:2px; cursor:pointer; line-height:0; -webkit-tap-highlight-color:transparent;}
    .infodot.labeled{padding:3px 4px;}
    .infodot-label{font-size:12px; color:var(--text-faint); line-height:1;}
    .infodot-scrim{position:fixed; inset:0; z-index:74;}
    .infodot-pop{position:absolute; z-index:75; top:calc(100% + 6px); left:0;
      width:min(290px,82vw); background:var(--surface-2); border:1px solid var(--line);
      border-radius:12px; padding:12px 14px; box-shadow:0 14px 36px rgba(0,0,0,0.45); cursor:default;}
    .infodot-poptitle{display:block; font-family:'Fraunces',serif; font-size:15px;
      color:var(--text); margin-bottom:7px;}
    .infodot-popbody{display:block; font-size:12.5px; line-height:1.5; color:var(--text-dim);}
    .infodot-popbody strong{color:var(--text); font-weight:600;}
    .idl{display:block; margin-bottom:6px;}
    .idl:last-child{margin-bottom:0;}

    /* ---- stars ---- */
    .stars{display:inline-flex; gap:3px; align-items:center;}
    .star{font-size:17px; color:var(--line);}
    .star.lit{color:var(--amber);}
    .star.big{font-size:30px;}
    .stars-num{margin-left:5px; font-size:13px; color:var(--muted); font-weight:600;}

    .fav{color:var(--text-faint); font-size:21px; line-height:1;}
    .fav.on{color:var(--accent);}

    /* ---- buttons ---- */
    .btn{
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:13px 16px; border-radius:12px; font-weight:600; font-size:15px;
      width:100%; transition:transform 0.07s ease, opacity 0.15s ease;
    }
    .btn:active{transform:scale(0.98);}
    .btn:disabled{opacity:0.45;}
    .btn.primary{background:var(--accent); color:#1b1714;}
    .btn.ghost{background:var(--surface); border:1px solid var(--line); color:var(--text);}
    .btn.danger{background:rgba(217,96,78,0.14); border:1px solid rgba(217,96,78,0.45); color:#e7a99e;}
    .btn.sm{padding:9px 13px; font-size:13.5px; width:auto;}

    /* ---- forms ---- */
    label.fld{display:block; margin-bottom:14px;}
    label.fld .lbl{
      display:block; font-size:12px; letter-spacing:0.07em; text-transform:uppercase;
      color:var(--text-faint); margin-bottom:6px;
    }
    .input,textarea.input{
      width:100%; background:var(--bg-2); border:1px solid var(--line);
      color:var(--text); padding:12px 13px; border-radius:11px; outline:none;
    }
    .input:focus,textarea.input:focus{border-color:var(--accent-dim);}
    textarea.input{resize:vertical; min-height:74px; line-height:1.45;}
    .input::placeholder,textarea.input::placeholder{color:var(--text-faint);}

    /* ---- bottom nav ---- */
    .nav{
      position:fixed; left:0; right:0; bottom:0; z-index:40;
      max-width:540px; margin:0 auto;
      background:rgba(34,29,24,0.96); backdrop-filter:blur(12px);
      border-top:1px solid var(--line);
      display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    }
    .nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:6px 0; font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase;
      color:var(--text-faint);
    }
    .nav button.on{color:var(--text);}
    .nav .navicon{width:23px; height:23px;}
    .nav .add{
      background:var(--accent); color:#1b1714; width:46px; height:46px;
      border-radius:14px; margin-top:-12px; box-shadow:0 6px 16px rgba(224,118,74,0.4);
      align-items:center; justify-content:center;
    }

    /* ---- overlay sheets ---- */
    .overlay{
      position:fixed; inset:0; z-index:60; background:var(--bg);
      max-width:540px; margin:0 auto; display:flex; flex-direction:column;
      animation:slideup 0.22s ease;
    }
    @keyframes slideup{from{transform:translateY(22px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .ovhead{
      display:flex; align-items:center; gap:12px;
      padding:calc(13px + env(safe-area-inset-top)) 18px 13px;
      border-bottom:1px solid var(--line-soft); position:sticky; top:0; background:var(--bg); z-index:5;
    }
    .ovhead h2{font-size:20px; flex:1; letter-spacing:-0.01em;}
    .ovhead .x{font-size:15px; color:var(--text-dim); padding:6px 4px; font-weight:600;}
    .ovbody{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:18px;}

    /* ---- action sheet ---- */
    .sheet-bg{position:fixed; inset:0; z-index:70; background:rgba(0,0,0,0.55); display:flex; align-items:flex-end;}
    .sheet{
      width:100%; max-width:540px; margin:0 auto; background:var(--bg-2);
      border-radius:20px 20px 0 0; padding:10px 16px calc(20px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line); animation:slideup 0.2s ease;
    }
    .sheet .grip{width:38px; height:4px; background:var(--line); border-radius:2px; margin:6px auto 14px;}
    .sheet-item{
      display:flex; align-items:center; gap:14px; padding:15px 6px;
      border-bottom:1px solid var(--line-soft);
    }
    .sheet-item:last-child{border-bottom:none;}
    .sheet-item .ic{
      width:40px; height:40px; border-radius:11px; background:var(--surface);
      display:flex; align-items:center; justify-content:center; flex:none;
    }
    .sheet-item .t1{font-weight:600; font-size:15px;}
    .sheet-item .t2{font-size:12.5px; color:var(--text-faint);}

    /* ---- menu sections ---- */
    .msec{border-bottom:1px solid var(--line-soft); padding:4px 0;}
    .msec-head{
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 2px; cursor:pointer;
    }
    .msec-head .nm{font-family:'Fraunces',serif; font-size:16.5px; font-weight:600; letter-spacing:0.01em;}
    .msec-head .ct{font-size:12px; color:var(--text-faint);}
    .mitem{padding:9px 2px 11px; border-top:1px dashed var(--line-soft);}
    .mitem .ihead{display:flex; justify-content:space-between; gap:12px; align-items:baseline;}
    .mitem .inm{font-weight:500; font-size:15px;}
    .mitem .ipr{color:var(--amber); font-size:13.5px; white-space:nowrap; font-variant-numeric:tabular-nums;}
    .mitem .ipr.paid{color:var(--text-faint); font-weight:400; font-style:italic;}
    .mitem .idesc{font-size:13px; color:var(--text-dim); margin-top:3px; line-height:1.45;}

    /* ---- misc ---- */
    .empty{text-align:center; padding:46px 20px; color:var(--text-faint);}
    .empty .big{font-family:'Fraunces',serif; font-size:20px; color:var(--text-dim); margin-bottom:6px;}
    .divider-label{
      font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--text-faint); margin:22px 2px 9px;
    }
    /* Drill-in row for a menu on the restaurant page */
    .menu-row{
      display:flex; align-items:center; gap:10px;
      padding:14px 16px; margin-bottom:8px;
      background:var(--surface); border:1px solid var(--line); border-radius:12px;
      cursor:pointer; transition:background 0.12s ease, border-color 0.12s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .menu-row:active{ background:var(--surface-2); border-color:rgba(224,118,74,0.35); }
    .menu-row-label{
      font-family:'Fraunces',serif; font-size:18px; color:var(--text);
      line-height:1.2;
    }
    /* Section subheader inside the visit-form chip picker, between section's chips */
    .section-subhead{
      font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--text-faint); font-weight:600;
      margin:10px 0 5px;
    }
    .toast{
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:calc(94px + env(safe-area-inset-bottom)); z-index:90;
      background:var(--surface-2); border:1px solid var(--line);
      color:var(--text); padding:11px 17px; border-radius:11px; font-size:14px;
      box-shadow:var(--shadow); max-width:90%; animation:slideup 0.18s ease;
    }
    .logbox{
      background:#100d0b; border:1px solid var(--line); border-radius:10px;
      padding:11px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:11px; line-height:1.6; color:#a89a86;
      max-height:240px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    }
    .photo-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
    .photo-grid .pth{
      width:72px; height:72px; border-radius:9px; object-fit:cover;
      border:1px solid var(--line);
    }

    /* ===== Restaurant + visit photos ===== */
    .photo-img{display:block; object-fit:cover; max-width:100%;}
    .photo-shell{
      display:flex; align-items:center; justify-content:center;
      background:var(--surface-2); border:1px solid var(--line);
      color:var(--text-faint);
    }
    .photo-shell.loading{
      background:linear-gradient(90deg, var(--surface-2) 0%, #2a221d 50%, var(--surface-2) 100%);
      background-size:200% 100%; animation:photoshimmer 1.4s ease-in-out infinite;
      border:1px solid var(--line);
    }
    @keyframes photoshimmer{
      0%{background-position:200% 0;} 100%{background-position:-200% 0;}
    }
    /* Restaurant hero photo on the detail page */
    .rest-hero{
      width:100%; height:200px; border-radius:13px;
      margin-bottom:14px; overflow:hidden;
    }
    .rest-hero .photo-img, .rest-hero.photo-shell{
      width:100%; height:200px; border-radius:13px;
    }
    /* Small restaurant thumbnail on the Places-tab list cards */
    .rest-thumb{
      width:56px; height:56px; border-radius:10px; flex:none;
      overflow:hidden; margin-right:12px;
    }
    .rest-thumb .photo-img, .rest-thumb.photo-shell{
      width:56px; height:56px; border-radius:10px;
    }
    /* Visit photo strip inside a visit card */
    .visit-photos{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
    .visit-photo{
      width:88px; height:88px; border-radius:10px; overflow:hidden;
      position:relative; flex:none;
    }
    .visit-photo .photo-img, .visit-photo.photo-shell{
      width:88px; height:88px; border-radius:10px;
    }

    /* Photo editor (in restaurant + visit forms) */
    .photo-editor{
      display:flex; align-items:center; gap:12px;
      padding:12px; background:var(--surface); border:1px solid var(--line);
      border-radius:12px; margin-bottom:13px;
    }
    .photo-editor .photo-img, .photo-editor .photo-shell{
      width:72px; height:72px; border-radius:10px; flex:none;
    }
    .photo-slot{
      width:88px; height:88px; border-radius:10px; flex:none;
      background:var(--surface); border:1px dashed var(--line);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-faint); font-size:11px; text-align:center; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .photo-slot:active{ background:var(--surface-2); border-color:var(--accent); }
    .photo-slot .ic{ display:block; margin-bottom:3px; }
    .photo-remove{
      position:absolute; top:4px; right:4px; width:22px; height:22px;
      border-radius:50%; background:rgba(20,17,14,0.85);
      border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .photo-progress{
      font-size:11px; color:var(--text-faint); margin-top:6px;
      padding:0 2px; font-style:italic;
    }
    a{color:var(--accent);}

    /* ---- Map view ---- */
    .map-body{
      flex:1; min-height:0;
      display:flex; flex-direction:column;
    }
    .map-canvas{ flex:1; min-height:300px; width:100%; background:var(--surface-2); }
    .map-foot{
      flex:none; display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap;
      padding:11px 16px calc(11px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line); background:var(--surface);
      font-size:12.5px; color:var(--text-dim);
    }
    .map-open-btn{ margin:0; }
    /* Leaflet popup restyled to match the dark theme */
    .leaflet-popup-content-wrapper{
      background:var(--surface-2); color:var(--text);
      border-radius:10px; box-shadow:0 6px 22px rgba(0,0,0,0.45);
    }
    .leaflet-popup-tip{ background:var(--surface-2); }
    .leaflet-popup-content{ margin:11px 13px; }
    .leaflet-container a.leaflet-popup-close-button{ color:var(--text-dim); }
    .mappop-name{ font-family:var(--serif,inherit); font-size:15px; font-weight:600; color:var(--text); }
    .mappop-sub{ font-size:12px; color:var(--text-dim); margin-top:2px; }
    .mappop-open{
      margin-top:8px; display:inline-block; cursor:pointer;
      background:var(--accent); color:#1a120c; border:none; border-radius:7px;
      padding:5px 13px; font-size:12.5px; font-weight:600; font-family:inherit;
    }
    /* keep Leaflet's own tile attribution readable on the dark UI */
    .leaflet-control-attribution{ background:rgba(20,16,12,0.7) !important; color:#b9ab98 !important; }
    .leaflet-control-attribution a{ color:#d7b49a !important; }

    /* ---- Year in Food recap ---- */
    .yif-hero{ text-align:center; padding:14px 0 22px; }
    .yif-hero-kicker{ font-size:11.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); }
    .yif-hero-year{ font-family:'Fraunces',Georgia,serif; font-weight:600; font-size:62px; line-height:1; color:var(--text); margin:8px 0 10px; }
    .yif-hero-sub{ font-size:14px; color:var(--text-dim); }
    .yif-stat{ background:var(--surface); border:1px solid var(--line-soft); border-radius:16px; padding:18px; margin-bottom:12px; }
    .yif-big{ font-family:'Fraunces',serif; font-weight:600; font-size:46px; line-height:1; color:var(--accent); }
    .yif-lbl{ font-size:11.5px; letter-spacing:0.09em; text-transform:uppercase; color:var(--text-faint); }
    .yif-name{ font-family:'Fraunces',serif; font-weight:500; font-size:24px; color:var(--text); margin-top:3px; letter-spacing:-0.01em; }
    .yif-sub{ font-size:13px; color:var(--text-dim); margin-top:7px; }
    .yif-entry{ display:flex; align-items:center; gap:12px; padding:12px 14px; margin-bottom:14px;
      background:var(--surface); border:1px solid var(--line-soft); border-radius:14px; }
    .yif-entry-ic{ width:30px; height:30px; border-radius:9px; flex:none;
      display:flex; align-items:center; justify-content:center; background:rgba(224,118,74,0.13); }
    .yif-entry-tx{ display:flex; flex-direction:column; flex:1; min-width:0; }
    .yif-entry-t{ font-family:'Fraunces',serif; font-size:16px; color:var(--text); }
    .yif-entry-s{ font-size:12px; color:var(--text-dim); margin-top:1px; }
    .set-group{ font-size:11px; letter-spacing:0.13em; text-transform:uppercase;
      color:var(--text-faint); margin:24px 4px 9px; }
    .theme-row{ display:flex; align-items:center; gap:12px; padding:11px 2px; cursor:pointer; }
    .theme-row + .theme-row{ border-top:1px solid var(--line); }
    .theme-dots{ display:flex; flex:none; }
    .theme-dot{ width:18px; height:18px; border-radius:50%; margin-left:-5px;
      border:2px solid var(--surface); }
    .theme-dot:first-child{ margin-left:0; }
    .theme-name{ flex:1; font-size:15px; color:var(--text); }
    .theme-check{ flex:none; color:var(--accent); font-size:16px; font-weight:700; }
    /* ---- history export: buttons + printable overlay ---- */
    .exp-acts{ display:flex; gap:8px; flex-wrap:wrap; }
    .exp-acts .btn{ width:auto; flex:0 0 auto; }
    .print-overlay{ position:fixed; inset:0; z-index:120; background:var(--bg); overflow:auto;
      -webkit-overflow-scrolling:touch; }
    .print-bar{ position:sticky; top:0; z-index:1; display:flex; align-items:center;
      justify-content:space-between; gap:10px;
      padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
      background:var(--surface); border-bottom:1px solid var(--line); }
    .print-bar .btn{ width:auto; flex:0 0 auto; }
    .print-title-sm{ font-size:13px; color:var(--text-dim); }
    .print-sheet{ max-width:680px; margin:0 auto; padding:24px 20px 60px; }
    .print-head{ text-align:center; margin-bottom:22px; }
    .print-h1{ font-family:'Fraunces',serif; font-size:26px; color:var(--text); }
    .print-h2{ font-size:15px; color:var(--text-dim); margin-top:2px; }
    .print-h3{ font-size:12px; color:var(--text-faint); margin-top:6px; }
    .print-visit{ padding:13px 0; border-bottom:1px solid var(--line-soft); }
    .print-v-head{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
    .print-v-name{ font-weight:600; font-size:16px; color:var(--text); }
    .print-v-city{ font-size:12px; color:var(--text-faint); }
    .print-v-meta{ font-size:12px; color:var(--text-dim); margin-top:2px; }
    .print-dishes{ list-style:none; margin:8px 0 0; padding:0; }
    .print-dish{ display:flex; justify-content:space-between; gap:12px;
      font-size:13.5px; padding:2px 0; color:var(--text); }
    .print-d-bits{ color:var(--text-faint); font-size:12px; white-space:nowrap; }
    .print-plate{ font-size:12.5px; color:var(--text-dim); margin-top:7px; }
    .print-notes{ font-size:12.5px; color:var(--text-dim); margin-top:7px; font-style:italic; }
    .print-foot{ text-align:center; font-size:11px; color:var(--text-faint); margin-top:24px; }

const { useState, useEffect, useRef, useCallback } = React;

/* ---- constants ------------------------------------------------ */

const VISION_MODEL  = "claude-sonnet-4-6";          // current Claude vision model
const ASK_MODEL     = "claude-sonnet-4-6";          // text model for "help me order"
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
// Track B: hosted backend base. Data and photos go through this; AI moves
// here in the next step. Overridable per-user via cfg.apiBase (Settings).
const API_BASE_DEFAULT = "https://web-production-cbd3b.up.railway.app";
/* ---- billing (Stripe via backend) -------------------------- */
async function fetchBillingStatus(cfg){
  const headers = await authHeaders(cfg);
  const res = await fetch(apiBase(cfg) + "/api/billing/status", { headers });
  if (!res.ok) throw new Error("billing status " + res.status);
  return res.json();
}

async function startCheckout(cfg, plan){
  // plan: "yearly" | "monthly". Backend returns a Stripe Checkout URL;
  // we navigate there. Stripe sends the user back to menucaptain.com.
  logMsg("BILLING","Starting checkout: " + plan);
  const headers = await authHeaders(cfg);
  headers["Content-Type"] = "application/json";
  const res = await fetch(apiBase(cfg) + "/api/stripe/create-checkout", {
    method:"POST", headers, body:JSON.stringify({ plan }),
  });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok || !data.url){
    throw new Error(data.detail || ("Checkout failed (" + res.status + ")"));
  }
  location.href = data.url;
}

async function openBillingPortal(cfg){
  logMsg("BILLING","Opening billing portal");
  const headers = await authHeaders(cfg);
  const res = await fetch(apiBase(cfg) + "/api/stripe/portal", { method:"POST", headers });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok || !data.url){
    throw new Error(data.detail || ("Portal failed (" + res.status + ")"));
  }
  location.href = data.url;
}

function apiBase(cfg){
  return (((cfg && cfg.apiBase) || API_BASE_DEFAULT)).replace(/\/+$/, "");
}

/* ---- places / discovery (Pro-only, via backend relay) ------
   Browser -> backend -> Google. The key lives ONLY in server env; we just send
   the user's bearer token. On a non-2xx we throw an Error carrying .status and
   .detail so the caller can map the backend's distinct conditions (402 Pro-gate
   vs 402 cap, 503 breaker, 502 upstream) to specific copy. Mirrors the shape of
   startCheckout()/openBillingPortal() above. */
async function placesNearby(cfg, body){
  const headers = await authHeaders(cfg);
  headers["Content-Type"] = "application/json";
  const res = await fetch(apiBase(cfg) + "/api/places/nearby", {
    method:"POST", headers, body:JSON.stringify(body),
  });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok){
    const err = new Error(data.detail || ("nearby failed (" + res.status + ")"));
    err.status = res.status; err.detail = data.detail || "";
    logMsg("PLACES","nearby HTTP " + res.status + ": " + (data.detail || ""));
    throw err;
  }
  return data;   // { places:[...], cached }
}

  const headers = await authHeaders(cfg);
  headers["Content-Type"] = "application/json";
  const res = await fetch(apiBase(cfg) + "/api/places/details", {
    method:"POST", headers, body:JSON.stringify({ place_id: placeId }),
  });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok){
    const err = new Error(data.detail || ("details failed (" + res.status + ")"));
    err.status = res.status; err.detail = data.detail || "";
    logMsg("PLACES","details HTTP " + res.status + ": " + (data.detail || ""));
    throw err;
  }
  return data;   // { place:{...}, cached }
}

const SUPABASE_URL = "https://kpkwevlhfhvybhovtwhj.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_MVfNqjyMufyRkGJ4chLj7Q_1qzp5WJN";

// ---- Track B auth: bearer token + silent refresh ----
// Every backend call carries the user's Supabase access token. Tokens are
// short-lived, so before each call we refresh ahead of expiry using the refresh
// token. A SINGLE shared in-flight refresh stops the burst of startup calls from
// each spending the single-use refresh token at once.
let _refreshPromise = null;

function signOutHard(){
  // Clear the local session and reload to the sign-in screen.
  try { localStorage.removeItem(CFG_KEY); localStorage.removeItem(DATA_KEY); } catch(e){}
  location.reload();
}

async function doRefresh(cfg){
  // Exchange the refresh token for a new access token; update cfg in place and
  // persist. Network errors are re-thrown WITHOUT signing out (transient); an
  // explicit rejection means the session is truly dead -> sign out.
  if (!cfg.refreshToken){
    logMsg("AUTH","No refresh token on hand - signing out");
    signOutHard();
    throw new Error("no refresh token");
  }
  logMsg("AUTH","Refreshing access token");
  let res;
  try {
    res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
      body:JSON.stringify({ refresh_token: cfg.refreshToken }),
    });
  } catch(err){
    // Network blip - do NOT sign out; the caller's request fails and retries later.
    logMsg("ERROR","Token refresh network error: " + err.message);
    throw err;
  }
  if (!res.ok){
    logMsg("ERROR","Token refresh rejected (" + res.status + ") - signing out");
    signOutHard();
    throw new Error("refresh rejected " + res.status);
  }
  const data = await res.json();
  cfg.accessToken  = data.access_token;
  cfg.refreshToken = data.refresh_token || cfg.refreshToken;
  cfg.expiresAt    = data.expires_at || (Math.floor(Date.now()/1000) + (data.expires_in || 3600));
  saveConfig(cfg);
  logMsg("AUTH","Access token refreshed");
  return cfg.accessToken;
}

async function getFreshToken(cfg){
  // Return a valid access token, refreshing first if missing or within 60s of
  // expiry. The check-and-set of _refreshPromise is synchronous (no await
  // between), so concurrent callers all await the same single refresh.
  const nowMs = Date.now();
  const expMs = cfg.expiresAt ? cfg.expiresAt * 1000 : 0;
  if (cfg.accessToken && (expMs - nowMs) > 60000){
    return cfg.accessToken;
  }
  if (!_refreshPromise){
    _refreshPromise = doRefresh(cfg).finally(()=>{ _refreshPromise = null; });
  }
  return await _refreshPromise;
}

async function authHeaders(cfg){
  // Headers for every backend call: the verified bearer token plus the legacy
  // X-User-ID (kept as a fallback until Step C removes it on the backend).
  const token = await getFreshToken(cfg);
  return { "Authorization": "Bearer " + token, "X-User-ID": cfg.userId };
}

// In-app user guide (source of truth: menucaptain-help.md). Re-sync this when the .md changes.
const HELP_DOC = `# MenuCaptain - User Guide

*Updated June 18, 2026*

MenuCaptain is your private notebook for eating out. You log the places you go,
scan their menus, remember which dishes you loved, and - if you want - get a
rough idea of the calories on your plate. It is built to help you *remember and
enjoy* what you eat, not to police it.

Everything you save lives in your own private account, separate from everyone
else's. Your places, visits, photos, and menus are yours alone.

-----

## Getting set up

Go to menucaptain.com and create an account with your email address and a
password. The app sends you a confirmation email - tap the link inside it and
you are in. That is the whole setup.

If you ever forget your password, tap "Forgot password" on the sign-in screen
and the app emails you a reset link. Signing in on a new phone or computer is
just your email and password - your data follows your account.

-----

## Getting around

There is a bar across the bottom of the screen with five spots:

- **History** - everything you have logged, newest first.
- **Places** - your list of restaurants.
- **The plus (+) button** - the quick-action button. Tap it to log a visit,
  pull up a menu (open a place to browse and order), start a group order, add a
  restaurant, scan a menu, or spin a wheel to pick a place when you can't decide.
- **Discover** - the home for your badges, Your Year in Food, and your Food
  passport.
- **Settings** - your account and plan, the look of the app (five color
  themes under Appearance), the update check, this user guide, and app info.

-----

## Places (your restaurants)

**Adding a place.** Add a restaurant with its name, cuisine, city, address,
phone, website, and any notes. You can mark it as a favorite and give it a
photo. Only the name is required - everything else is optional.

**Find address.** When adding or editing a place, tap **Find address** under
the address field and the app looks it up by name and city, fills in the
address, and remembers its location for the map. When the place is well listed
on the map, it also fills in any details it can find - phone, website, cuisine,
and hours - but only for fields you have left blank, so it never overwrites
what you typed. It finds chains and well-mapped spots reliably; for a brand-new
or tiny place it may come up empty (or with just the address), in which case
just fill in the rest yourself.

**The restaurant page.** Opening a restaurant shows its details, its menus,
every visit you have logged there, and a picks card once you have rated some
dishes (see "Your picks" below).

-----

## Map

Tap **Map** at the top of Places to see your restaurants as pins on a map.
Favorites show in the accent color, everything else in a softer tone. Tap a
pin to see the name and a button to open that restaurant.

The first time you open the map, any place that has an address but no pin yet
is located automatically, one at a time - you will see them appear over a few
seconds, with a "Locating your places" note at the bottom. Each place is only
located once and then remembered, so it is instant after that. If you change a
place's address later, the map quietly re-locates it.

If the active city filter is set on the Places tab, the map shows just that
city. Places with no address (or one that could not be found) are not pinned;
the bottom of the map tells you how many are not mapped.

-----

## Near me

**Near me** helps you discover restaurants, cafes, bars, and bakeries close to
wherever you are, and add the good ones to your places in a tap. It is a **Pro**
feature - open it from the **+** button and choose **Near me**.

The first time, your phone asks to share your location; allow it and the app
finds what is nearby. Set how far to look (from half a mile up to five miles),
choose what you are after (all food, or just restaurants, cafes, bars, or
bakeries), and flip **Open now** if you only want places open right now. Tap
**Search nearby** and the results come back as a list, nearest first - each with
its rating, price, distance, and whether it is open.

Tap any place to see its details - address, hours, phone, website, a link to
Google Maps, and a short blurb. From there, **Add to my places** saves it
straight into your restaurants, already filled in (name, cuisine, address,
phone, website, hours) and pinned on your map, so there is nothing to type. If a
place is already in your list it is marked **In your places**, and tapping it
opens the one you already have.

Switch between **List** and **Map** any time - the map shows the results as
orange pins with a blue dot for where you are; tap a pin to open that place. The
list is sorted nearest-first, and the List/Map toggle is instant. Changing the
distance or type starts a fresh search (tap **Search** again).

Near me is the one place in the app that reaches out to find somewhere new -
everything else stays your own private record.

-----

## Menus

**Scanning a menu.** Use "Scan a menu" and take or pick photos of the physical
menu. The app reads it and turns it into a clean, digital menu - sections,
dish names, descriptions, prices, and tags. This is what powers "Help me order"
and the calorie estimates.

**More than one menu.** A place can have several menus (for example Dinner,
Brunch, and Drinks). When you scan a menu that has more than one section, the
app asks how to save it: **One menu** keeps every section together in a single
menu, or **Customize each section** lets you split the sections into separate
menus (any sections you give the same name merge back together). So a single
scan of a long menu can be saved as separate Dinner, Brunch, and Drinks menus.

**Where menus show.** On a restaurant page, if there is only one menu it is
shown expanded right there, so you can browse and estimate items without
tapping in. With two or more menus, each appears as a card you tap to open.

**Re-scanning and deleting.** You can re-scan a menu to replace it with a fresh
version, or delete a menu you no longer want. (For a single inline menu, use
the **Manage** button by the Menus heading to reach those options.) Re-scanning
replaces the old copy, so any estimates saved on the old items are not carried
over.

**Calories on a menu.** If the menu itself prints calories, the app captures
those and shows them as a real number labeled "per menu." If it does not, you
can tap "Estimate calories" on an item and the app will estimate it from the
dish description. Estimated numbers are always shown with a "~" and marked EST
so you can tell them apart from real ones.

-----

## Help me order

On any digitized menu you can ask a plain-English question - things like
"something healthy," "not too heavy," "best value," "what did I love here?," or
"what do I usually get?" The app answers using that restaurant's actual menu, and
it draws on your own history there - which dishes you marked Again or Skip, how
often you've ordered them, and what you've paid - so the more you log, the more
personal the answers get. When a menu item has calories on it - whether printed
on the menu or estimated - the answers factor those in too, so a question like
"something lighter" can weigh the actual numbers. Prices work the same way: ask
for "best value" or "something cheap" and it weighs what dishes cost, leaning on
the real prices it has learned from your scanned checks. It stays easygoing about
it: the numbers inform the suggestion, they are never treated as a budget or a rule.

-----

## Logging a visit

Tap the plus button and choose "Log a visit." You can fill in as much or as
little as you like:

**Date and rating.** Pick the date and give the visit a star rating. You can
rate in half-stars: tap the left side of a star for a half, the right side for
a whole. Tap the rating you already have to clear it. You rate each visit, not
the restaurant - so a place can have a different rating every time you go. On a
restaurant, in the Places list, and on a shared card, the star number shown is
the average of your visits there, labelled "avg."

**What you had (dishes).** Add the dishes you ordered, either by typing them or
by tapping them straight from that restaurant's digitized menu. Tapping from
the menu is the better habit - it makes the rest of the features line up
correctly (see the photo estimate below).

**Again or Skip.** Each dish has an "Again" and a "Skip" button. Tap Again for
something you would order again, Skip for something you would not. This is the
heart of the app - it is how you remember what is worth getting next time. The
most recent verdict always wins, so you can change your mind later.

**Rename a dish.** Tap any dish's name to rename it - useful when a
free-typed name needs tidying up. The dish keeps its price, verdict, and any
estimate. This works while logging and later, from any past visit.

**Scan the check.** When the bill arrives, tap "Scan the check" (under the
dish list) and snap a photo of the receipt. The app reads it and opens a
"Which were yours?" editor: each line has a round checkbox - tap the ones you
ordered (or use Select all / Clear), and tap Done to add them as dishes with
their prices. When a line has more than one of an item, a small - / + stepper
lets you say how many of them were yours ("2 of 3"). When a line matches the
restaurant's digitized menu, the dish takes the menu's proper name, with a
small note showing how it appeared on the check. The editor works both ways:
after a scan the button reads "From Receipt Image", and re-opening it shows
your current picks already ticked, so you can add or remove items later without
paying for another scan. The receipt itself stays attached to the visit behind
a quiet "Show receipt" link - it never appears in your photo strip or Food
passport.

**Shared a dish?** If you split something - half a sea bass, a third of a
seafood tower - tap "Was this shared?" under that line in the picker and set
your share. It starts at 50 percent, with quick 1/2, 1/3, and 1/4 taps, or
type any percent. Your price becomes just your share of the line (30 percent of
a $44 fish is $13.20), and the dish shows the percent beside its name. If you
estimate that dish's calories from the menu description, the number is scaled
to your share too; a photo of your own plate is already your portion, so it is
left as is.

**Prices.** A dish can carry a price - typed in or picked up from a scanned
check. Priced dishes show it beside the name in History and on the
restaurant page.

**Spending.** Once your visits carry prices, a quiet **Spending** link appears
on a restaurant's page and inside Your Year in Food. Tap it to see what you
have spent there (or that year) - it stays tucked away by default. When a
visit has a scanned check, the total is the real one, tax and tip included;
otherwise it is a "~" estimate added up from your dish prices. Like the
calorie numbers, it is a memory, never a budget.

**Estimate a dish from a photo.** Under each dish is an "Estimate from a photo"
button. When the food arrives, tap it and snap a picture of that dish. The app
estimates the calories and macros for it. If that dish is on the restaurant's
digitized menu, the estimate (and a thumbnail of your photo) is saved onto the
menu item too - so the next time you open that menu, the picture and the
numbers are already there. If that menu item already had an estimate, the app
asks whether to keep the old one or use your new photo. Estimating works best
when you added the dish by tapping it from the menu, so the names match.

**Estimate without a photo.** Did not snap a picture? Each dish also has an
"Estimate without a photo" option that estimates from the dish name - grounded
by the menu description when you tapped the dish from the menu, so it is a
better guess than the name alone. Tap "Redo" on any estimate to clear it and
choose either method again.

**Running total.** Once you have estimated a dish, a calm total appears in the
visit ("~610 cal total - 31P / 63C / 22F across 2 dishes") so you can watch it
add up as you log - a number for memory, never a budget.

**Estimate the whole plate.** If your meal is not on a menu, there is also a
"Estimate from a photo" option for the whole plate, which gives one set of
numbers for the meal. You can edit any estimate by hand if you know the real
figures.

**Photos and notes.** Attach photos of the visit and jot down any notes.

-----

## History

History is the running list of everywhere you have eaten, newest first. Each
entry shows the rating, the dishes (color-coded by your Again/Skip verdict,
with the estimated calories beside each one when you have them), any nutrition
summary, your notes, and your photos. When you have estimated two or more
dishes on a visit, the entry also shows a calm running total (for example
"~1,240 cal total across 3 dishes") - a number for memory, never a budget.

-----

## Searching

As your lists grow you can filter them quickly:

- On **History**, the search box at the top filters your visits by restaurant
  name, by dish, or by anything in your notes. A **Sort** row lets you order them
  by newest, oldest, highest rated, or restaurant - and the sort and search work
  together.
- On **Places**, the search box filters your restaurants by name, cuisine, or
  city, and works alongside the city filter chips. A **Sort** row lets you order
  them alphabetically (A-Z), by recently added, or favorites first - and the
  sort and search both work within whichever city you have selected.

Type to filter instantly; tap the (x) to clear it and see the whole list again.

-----

## Your picks (what you loved)

Once you have rated a few dishes at a place, its restaurant page shows a
picks card with two parts:

- **You've loved these here** - the dishes you have marked Again, so you can
  reorder your favorites without thinking.
- **Last time** - a quick reminder of your most recent visit.

Marking a dish Skip just keeps it off the loved list. Not ordering something
again does not count against it.

-----

## Your Year in Food

Open **Your Year in Food** from the **Discover** tab, or from
**Settings** - either way you get a recap built entirely from what you have
logged - a calm look back rather than a scoreboard.

At the top you can switch between any year you have visits in, plus **All
time**; it opens on your most-logged year so there is always something to see.
The recap can include:

- how many visits you logged, and how many different places they were
- new spots you discovered that year
- the cities you ate in
- your #1 spot - where you went the most
- your top cuisine
- your most-loved dish, with the other dishes you marked Again
- your highest-rated visit
- your busiest month

Each card only appears when there is something to show, so a quiet year stays
short. There is no calorie total here, on purpose - in keeping with the spirit
of the app, the recap is about places, dishes, and memories, not a number to
measure yourself against.

You can share the recap as an image: tap the **share** icon at the top and the
app renders the year you are viewing onto a card you can text or post.

-----

## Your food passport

**Food passport** is a photo gallery of everywhere you have eaten - open it from
the **Discover** tab, or from **Settings**. Every photo you have
added, whether to a whole visit or to a single dish, shows up as a tile, grouped
by month with the newest first. Tap any photo to jump straight to that visit.

Think of it as the picture-first companion to History: History is the detailed
log, the passport is the gallery. The first time you open it, photos that are
not cached yet load over a few seconds, and are quick to view after that.

-----

## Your badges

Open the **Discover** tab to find **Your badges** - a small set of stamps the
app awards as you use it. They are milestones, not a scoreboard: there is nothing
to chase and nothing you can lose. A badge you have earned shows in full color
with a note of what you did; one you have not earned yet sits quietly greyed
out with a hint of how to get it. Next to each badge is a quiet button that
opens the thing it is about - tap **Scan a menu** beside First Scan, **Publish a
list** beside First List, and so on - so a badge doubles as a shortcut, never a
nag.

The starting set:

- **First Scan** - scan your first menu.
- **Ten Visits** - log ten visits.
- **Five Cities** - eat in five different cities.
- **First List** - publish a list.
- **Five Shares** - share the app five times (see below).

When you earn one, a brief note slides in to mark the moment. Anything you
earned before badges arrived simply shows as already earned, without a fuss.

-----

## Share the Love

In the **Discover** tab, the **Five Shares** badge sits beside a **Share the
Love** button. If you are enjoying
MenuCaptain, tap it to pass the app along to someone who would like it too - it
opens your phone's share sheet with a link to a short page that shows them what
MenuCaptain is. Do that five times and you earn the Five Shares badge. That
is the whole of it: no one to invite, no rewards beyond the stamp - just handing
a friend something you like.

-----

## Sharing a place

On a restaurant page, tap the **share** icon at the top (next to the favorite
star) to turn that place into a shareable card - its photo, name, your rating,
the address, and the dishes you have loved there. The app builds the card as an
image and hands it to your phone's share sheet, so you can text it to a friend,
save it to Photos, or post it.

It is just a picture, so the person you send it to does not need the app or any
access to your data - they simply get your recommendation. If a place has no
photo yet, the card uses a colored header instead.

-----

## Sharing a menu

Once a restaurant has a digitized menu, you can send that menu to someone who
does not have MenuCaptain at all - handy for the "I am at the restaurant, what
do you want me to bring home?" moment.

Open the menu and tap the **share** icon in the row next to re-scan and delete.
(You reach that row by tapping a menu, or by tapping **Manage** on a place that
has just one menu - and on a single-menu place there is also a quick **Share**
button right beside **Manage**.) The app builds a small public page for the menu
and hands the link to your share sheet, so you can text it like any other link.

Whoever you send it to opens the menu right in their browser - no app, no
account, no access to anything else of yours. They see the restaurant's menu:
the sections, the dishes, descriptions, prices, and tags. They can **tap the
dishes they would like**, which gather into a "your picks" strip at the bottom.
Each dish they pick gets a small **note** field too, so they can add special
instructions ("no onions," "dressing on the side"). They then tap **Send my
picks** to fire their own share sheet with the list ready to text back to you,
each note in parentheses - "Avocado Toast (no onions)". No account, just a quick
answer back.

The shared page is only the menu - your own private calorie estimates are never
part of it. As with a published list, treat the link as public: anyone who has
it can open that menu page.

## Can't decide? (spin to pick where to eat)

Stuck on where to eat? Tap the **+** button and choose **Can't decide?** Pick
up to eight places for the wheel - your favorites are ticked to start, and you
can search to add or remove any others - then tap **Spin**. The wheel is a
ship's helm: it spins and lands on one of your places, dimming the rest, and
you get its name with quick buttons to open the place, get directions, or spin
again. Pick fewer than eight and some spokes become "Spin again" - land on one
and just spin once more. Nothing is saved - it is just a fun way to settle the
"I don't care, you pick" stalemate.

-----

## Group order

When you are out with a group, a **group order** is the live version of "what
do you want me to bring home?" - instead of everyone texting you separately,
they all add to one shared order you watch come together.

You can start a group order three ways: from the **restaurant page** (tap
**Group order**), from the **+** button (**Start a group order**), or from any
open menu (tap **Group order** at the top). If the place has more than one menu,
the app asks which one to order from; if it has just one, it jumps straight in.
Tap **Start group
order** and the app gives you a link. Text it to the table. Each person opens
it (no app, no account), sees the menu, taps what they want, sets a **quantity**
and an optional **note** ("no onions"), enters their name, and taps **Send my
order**. They can change their order and send again any time.

On your screen the order builds **live** - the people who have ordered show up
first under **Who's ordered**, with a combined bring-home tally below ("2x
Avocado Toast, 1x Pollo - no onions"). When you are done, tap **Close order**;
it also closes itself after a day. The shared link shows only the menu and the
table's own picks - nothing else of yours.

**Knowing who you are still waiting on.** Optionally, add the people you are
expecting under **Who's in on the order?** on your host screen. As orders arrive,
each name is marked **ordered** or **waiting**, with a clear "Still waiting on:
Molly" line until everyone is in. Matching is by name, so it lines up when a
person types the same name you listed; anyone who orders under a name not on
your list still shows up under **Also ordered**, so no order is ever missed.
The roster is yours alone - guests never see it. Leave it empty and the order
works exactly as before.

**Getting back to a running order.** Any group order you start also appears under
**Active group orders** at the top of your **Places** tab, with how many people
have ordered and when it expires - tap it to jump straight back into the live
view. Because that list lives with your account, you can start an order on one
device and pick it up on another.

**Splitting the check.** Open **Split the check** on your host screen to see who
owes what. Tap **Scan the receipt** and the app reads the real total, assigns
each line to whoever ordered it, and spreads tax and tip across everyone - so
the per-person amounts add up to the actual check. Anything it can't match to a
person is split evenly and labeled. Before the bill arrives it shows an estimate
from menu prices (before tax), and you can switch to an even split any time.

## Splitting a check (no group needed)

Sometimes everyone's at the table and you just want to split the bill - no group
order required. Tap the **+** button and choose **Split a check**.

Scan the receipt (or tap **Enter by hand**) and the app reads the line items and
the total. Type in who's at the table, then tap the names under each item to say
who shared it - anything you leave unassigned is split evenly across everyone.
There are **Tax** and **Tip** fields - each can be a dollar amount or a percent -
and the **Total** updates as you go, or you can type your own to hard-code it. An
**Everyone shares everything** shortcut for the simplest case. When a line covers
several of the same item (like **3 GL Prisoner** at one price), a **Split into 3**
button breaks it into separate per-unit rows so you can give each one to a
different person.

Tap **See the split** and you get each person's total - their items plus a
proportional share of tax and tip - adding up exactly to the real check. **Share**
hands a plain-text breakdown to your phone so you can drop it in the group chat.

This standalone splitter is just a calculator - it works out who owes what and
hands you a breakdown to share. It doesn't save anything to your History.

To keep a split, split straight from a visit you've already logged: open the
visit (in History or on the restaurant page) and tap **Split the check**. It opens
already filled in with that visit's dishes and total, and a **Show receipt** link
lets you check the prices against the actual check. Add who was there, tap **See
the split**, then **Save to this visit** - it is stored right on that visit (you'll
see a **Check split** line in History) without touching the rest of the meal.

You can also split while you are logging: under the scanned receipt in **Log a
visit**, tap **Split the check**, build the split, and tap **Use this split** - it
rides along on the visit and is saved when you save the visit.

## Publishing a list

highest-rated are listed first). Tap **Create link**, then **Copy** or **Share**.

When you publish, the app creates a small public page for the list and gives
you a short link to it - and when you text that link, it shows a proper
preview card with your list's name instead of a random web address. The first
time a particular list is published, its page can take up to a minute to go
live; anyone who taps right away sees a brief "almost ready" note that opens
the list automatically. Sharing the same list again later is instant.

If the app cannot create the short page, it simply shares the full-length link
instead, which always works; a **Shorten** button appears for those long links
if you want a tidier one.

**One-tap city share.** If you have a city selected in the Places filter, a
**Share my [city] spots** button appears. Tap it and the app builds a list of
just that city's places and opens your share sheet straight away - no titling or
ticking needed.

**My Lists.** Once you have published at least one list, a **My Lists** button
appears next to **Publish a list** on the Places tab. It keeps every list you
have published so you can re-share or copy its link, **favorite** one to pin it
to the top, sort them (recent, newest, A-Z, or most places), and **refresh** a
list to rebuild it from your current places - handy when you have added or
renamed spots since you first shared it (refreshing can produce a new link).
Deleting a list here just removes your saved copy; the public page stays up, so
links you already sent keep working.

The whole list is public once shared, so whoever you send it to just taps it
and sees your picks - each place with its city, cuisine, your rating, the
dishes you loved there, and the address with a **Directions** link that opens
their maps app. They do not need the app, an account, or any access to your
private data. Treat anything you publish as public: the link can be opened by
anyone who has it, the published page is hosted publicly, and it includes the
street address of each place you share.

The shared view is text-only - no photos or private notes - so it stays light
and loads instantly.

## Understanding the calorie labels

A few small labels show up wherever calories appear:

- **~320 cal** - the "~" means this is an estimate.
- **850 cal, per menu** - a real number printed on the menu (no "~").
- **EST** - short for estimated.
- **9P / 22C / 22F** - grams of protein, carbs, and fat.

Where an estimate came from:

- **from a photo** - estimated from a picture of the actual plate.
- **estimated** - estimated from the menu description (no photo).
- **per menu** - taken straight from the printed menu.
- **entered by you** - a number you typed in by hand.

A photo of the real plate is treated as a better guess than one from the
description, which is why the app offers to replace a description-based
estimate when you add a photo.

-----

## Your plan and the AI features

The AI features - menu scanning, "Help me order," and the calorie and macro
estimates - are built in. There is nothing to configure and no key to manage.

Every account starts on the **free plan**, which includes a taste of the AI
features so you can try everything. The Plan card in **Settings** shows how
many AI uses you have left. **Pro** removes the everyday limit, with a
generous monthly allowance that normal use will not reach - scan menus and
estimate plates freely.

**Have a code?** If you were given a friends & family code, enter it on the
Plan card in Settings ("Have a code?") and your account flips to Pro through
the date shown - no payment needed.

Upgrading, switching plans, and canceling all happen from the Plan card in
Settings. Payments are handled securely by Stripe; the app never sees your
card details. If you cancel, Pro keeps working until the end of the period you
paid for - the card shows the exact date.

Everything that is not AI - logging visits, rating dishes, places, the map,
History, Year in Food, the passport, and sharing - is free and unlimited on
every plan.

-----

## Keeping the app up to date

When a new version is published, the app notices on its own and shows an
"Update available" banner - tap it to refresh to the latest version. You can
also check any time from Settings with "Check for updates." This is what spares
you from the usual home-screen app trick of having to clear it and re-add it to
get the newest changes.

-----

## Exporting your history

You can take your whole dining log with you. In **Settings**, under **Your
data**, tap **Export your history** for two ways to get it out:

- **Spreadsheet (CSV)** - every visit and dish in full detail: date, place,
  city, cuisine, your rating, each dish with its Again/Skip verdict, price, and
  any calories and macros. It opens in Excel, Numbers, or Google Sheets. On a
  phone, your share sheet pops up so you can save it to Files or email it to
  yourself; on a computer it downloads.
- **Printable** - a clean page grouped by visit, newest first. Tap **Print /
  Save PDF** to save it as a PDF or print it on paper - a nice keepsake.

Photos are not included in either one - both are text only. The export is built
right on your device from what you have already logged.

## Your data and privacy

Your logs, menus, and photos are stored privately in your MenuCaptain account.
They are not shared with anyone else, they are never used for advertising, and
nobody else can see them - sharing only ever happens when you explicitly share
or publish something yourself.

Your password is never stored in readable form, and signing in on a new device
needs only your email and password - your data follows your account, not your
phone.

Questions or trouble? Email **support@menucaptain.com**.

## If something stops working

- **You can't sign in.** Tap "Forgot password" on the sign-in screen and use
  the reset link the app emails you. If the email doesn't arrive within a
  minute or two, check your spam folder - and note the app sends at most one
  email per minute to the same address, so give it a moment before retrying.
- **The confirmation email never arrived.** Same advice: wait a minute, check
  spam, then request it again from the sign-in screen.
- **An AI feature says you've reached your limit.** Open the Plan card in
  Settings - free accounts include a set number of AI uses, and upgrading to
  Pro removes the everyday limit. Everything that is not AI keeps working
  regardless.
- **A photo is slow to appear or won't load.** Photos load from your account
  the first time you view them, so the very first view can be slow; it is
  quick after that. If one refuses to load, it may not have finished
  uploading - try again on a good connection.
- **Your data looks out of date on this device.** Open Settings and tap
  "Sync now." If something still looks wrong, sign out and back in - your
  data lives in your account, so nothing is lost.
- **A dish photo estimate didn't show up on the menu.** The dish name has to
  match a menu item exactly. Adding the dish by tapping it from the menu
  guarantees the match; a free-typed name that doesn't match will still get an
  estimate on the visit, it just won't attach to the menu item.

## The spirit of the app

The calorie and macro numbers are here for curiosity and memory - a record of
what you ate, not a budget to stay under. The app will never scold you, warn
you, or tell you that you "blew" anything. If the numbers ever start to feel
like pressure rather than interest, ignore them - the dish ratings and the
memories are the real point.

/* ---- diagnostic log buffer -----------------------------------
   iPhone Safari has no easy console, so we keep an in-app log
   that is viewable under Settings > Diagnostics. ASCII only. */
const LOG_BUFFER = [];
function logMsg(tag, msg){
  const stamp = new Date().toTimeString().slice(0,8);
  const line  = "[" + stamp + "] [" + tag + "] " + msg;
  LOG_BUFFER.push(line);
  if (LOG_BUFFER.length > 240) LOG_BUFFER.shift();
  try { console.log(line); } catch(e){ /* ignore */ }
