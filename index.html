// Build a Venmo "charge" (request money) link. Opens the app if installed, else
// the web. recipients optional - omitted means "pick the person in Venmo".
function venmoChargeUrl(handle, amountDollars, note){
  // Build the query with encodeURIComponent (spaces -> %20). URLSearchParams uses
  // "+" for spaces, which Venmo's note field shows literally ("Your+share+...").
  const parts = ["txn=charge", "audience=private"];
  const h = (handle || "").trim().replace(/^@/, "");
  if (h) parts.push("recipients=" + encodeURIComponent(h));
  const amt = Math.round((Number(amountDollars) || 0) * 100) / 100;
  if (amt > 0) parts.push("amount=" + amt.toFixed(2));
  if (note) parts.push("note=" + encodeURIComponent(note));
  return "https://venmo.com/?" + parts.join("&");
}

// ============================================================
//   SPLIT A CHECK (standalone - no group order, no menu)
// ============================================================
// Pure split engine. Works entirely in integer CENTS so the per-person rows
// reconcile EXACTLY to the grand total (the one property a user notices
// instantly if it is wrong). No fuzzy matching - assignment is explicit.
//
//   lines  : [{ id, name, price }]   price = that line's total (dollars; "" / 0 ok)
//   people : [name]                  who is at the table
//   assign : { [lineId]: [name,...] } who shares each line; missing/empty = everyone
//   tip    : dollars to add on top (0 if none)
//   receiptTotal : the scanned grand total (dollars, incl. tax) or null/""
// Returns { people:[{name,lineCents,shareCents,totalCents}], grandCents,
//           lineSubtotalCents, overageCents }.
function computeManualSplit(lines, people, assign, tip, receiptTotal){
  const names = (people || []).filter(n => (n || "").trim());
  const toCents = d => Math.round((Number(d) || 0) * 100);

  // each person's share of the itemized (priced) lines
  const lineCents = {};
  names.forEach(n => { lineCents[n] = 0; });

  let lineSubtotalCents = 0;
  (lines || []).forEach(ln => {
    const cents = Math.max(0, toCents(ln.price));
    if (!cents) return;                     // unpriced line contributes nothing
    lineSubtotalCents += cents;
    // who shares this line: the assigned subset still present at the table,
    // else everyone. Never drop a line - empty/stale assignment falls back to
    // the whole table (the visible "Shared" behavior).
    let who = (assign && assign[ln.id] ? assign[ln.id] : [])
      .filter(n => lineCents.hasOwnProperty(n));
    if (!who.length) who = names.slice();
    if (!who.length) return;
    const base = Math.floor(cents / who.length);
    let rem = cents - base * who.length;    // spread the odd cents
    who.forEach((n, j) => { lineCents[n] += base + (j < rem ? 1 : 0); });
  });

  // grand total: the receipt total (already includes tax) when we have one,
  // else the line subtotal; then add any explicit tip on top.
  const tipCents = Math.max(0, toCents(tip));
  const rtCents = toCents(receiptTotal);
  const baseTotalCents = (receiptTotal != null && receiptTotal !== "" && rtCents > 0)
    ? Math.max(lineSubtotalCents, rtCents)
    : lineSubtotalCents;
  const grandCents = baseTotalCents + tipCents;

  // overage = everything above the itemized lines (tax + service + tip),
  // distributed proportionally to each person's line share so rows still sum
  // to the grand total. No priced lines -> split the whole thing evenly.
  const overageCents = grandCents - lineSubtotalCents;
  const shareCents = {};
  names.forEach(n => { shareCents[n] = 0; });

  if (overageCents !== 0 && names.length){
    if (lineSubtotalCents > 0){
      let assigned = 0;
      names.forEach(n => {
        const portion = Math.round(overageCents * (lineCents[n] / lineSubtotalCents));
        shareCents[n] = portion;
        assigned += portion;
      });
      // rounding remainder -> the largest line-share person, so totals match
      const drift = overageCents - assigned;
      if (drift !== 0){
        const big = names.slice().sort((a, b) => lineCents[b] - lineCents[a])[0];
        shareCents[big] += drift;
      }
    } else {
      const base = Math.floor(overageCents / names.length);
      let rem = overageCents - base * names.length;
      names.forEach((n, j) => { shareCents[n] = base + (j < rem ? 1 : 0); });
    }
  }

  const out = names.map(n => ({
    name: n,
    lineCents: lineCents[n],
    shareCents: shareCents[n],
    totalCents: lineCents[n] + shareCents[n],
  }));
  // Final guard: force the sum to EXACTLY grandCents (push any 1-cent drift to
  // the largest total, without reordering). Cheap insurance.
  const sum = out.reduce((a, p) => a + p.totalCents, 0);
  if (sum !== grandCents && out.length){
    let bi = 0;
    for (let i = 1; i < out.length; i++){ if (out[i].totalCents > out[bi].totalCents) bi = i; }
    const drift = grandCents - sum;
    out[bi].totalCents += drift;
    out[bi].shareCents += drift;
  }
  return { people: out, grandCents, lineSubtotalCents, overageCents };
}

// Load an external script once, on demand (lazy-loads the PDF library so it never
// weighs down normal app startup).
function loadScriptOnce(src){
  return new Promise((resolve, reject)=>{
    if (document.querySelector('script[data-once="' + src + '"]')) return resolve();
    const s = document.createElement("script");
    s.src = src; s.async = true; s.setAttribute("data-once", src);
    s.onload = ()=> resolve();
    s.onerror = ()=> reject(new Error("Couldn't load " + src));
    document.head.appendChild(s);
  });
}

// Turn a meal (split or visit) into a copy/share-ready expense line item. data:
// { date, merchant, city, items:[{name,price}], total, people:[{name}], receipts:[...] }.
// Tick items to EXCLUDE (e.g. alcohol that isn't reimbursable); the amount and a
// prorated share of tax/tip recompute, and the excluded items are listed.
function ExpenseSheet({data, cfg, onClose, onUpgrade, onHome}){
  // Pro gate: expensing is a Pro feature. Resolve tier on open; fail OPEN (treat
  // an unreachable billing check as allowed) so a billing hiccup never traps a
  // paying user, exactly like the Near me gate.
  const [tier, setTier] = useState(null);
  useEffect(()=>{
    let alive = true;
    fetchBillingStatus(cfg)
      .then(d => { if (alive) setTier((d && d.tier) || "unknown"); })
      .catch(()=> { if (alive) setTier("unknown"); });
    return ()=> { alive = false; };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  const items    = (data.items || []).filter(it => it && it.name);
  const receipts = (data.receipts || []).filter(r => r && (r.path || r.dataUrl));
  const [excluded, setExcluded] = useState({});      // item index -> true
  const [itemizeTaxTip, setItemizeTaxTip] = useState(false);  // break out tax vs tip/gratuity on the PDF
  const [purpose, setPurpose]   = useState("");
  const [client, setClient]     = useState("");
  const [attendees, setAttendees] = useState(()=> (data.people || []).filter(p => p && p.name).map(p => p.name));
  const [addedReceipts, setAddedReceipts] = useState([]);   // photos added here (dataUrl)
  const [picked, setPicked] = useState(()=>{        // which receipts to attach
    const hasFinal = receipts.some(r => r.key === "final");
    const s = {};
    receipts.forEach(r => { s[r.key] = hasFinal ? (r.key === "final") : true; });
    return s;
  });
  const [copied, setCopied]     = useState(false);
  const [sharing, setSharing]   = useState(false);
  const [pdfBusy, setPdfBusy]   = useState(false);
  const [addBusy, setAddBusy]   = useState(false);
  const addRef = useRef(null);
  const allReceipts = receipts.concat(addedReceipts);
  const money = n => "$" + (Math.round((Number(n) || 0) * 100) / 100).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
  const priceOf = it => Number(it.price) || 0;

  const subtotal = items.reduce((a,it)=> a + priceOf(it), 0);
  const total    = Number(data.total) || subtotal;
  const taxTip   = Math.max(0, total - subtotal);     // combined, prorated below
  const hasItems = items.length > 0;
  const incSubtotal = items.reduce((a,it,i)=> a + (excluded[i] ? 0 : priceOf(it)), 0);
  const incTaxTip   = subtotal > 0 ? taxTip * (incSubtotal / subtotal) : taxTip;
  const amount = hasItems ? (incSubtotal + incTaxTip) : total;
  const nonExp = hasItems ? Math.max(0, total - amount) : 0;   // deducted dollars (items + their tax/tip)
  const cleanAttendees = attendees.map(s => s.trim()).filter(Boolean);
  // Optional itemized tax vs tip/gratuity. We know tax (from the scan/split);
  // everything else above items is tip + gratuity. Split the prorated combined
  // figure by the tax:combined ratio so the two lines still sum exactly.
  const taxAmt = (data.tax != null && !isNaN(Number(data.tax))) ? Number(data.tax) : null;
  const canItemizeTT = hasItems && taxTip > 0.005 && taxAmt != null;
  const taxShare = canItemizeTT ? incTaxTip * (Math.min(taxAmt, taxTip) / taxTip) : 0;
  const tipShare = canItemizeTT ? Math.max(0, incTaxTip - taxShare) : 0;
  const showItemizedTT = canItemizeTT && itemizeTaxTip;

  const lines = ["Business meal expense"];
  if (data.date) lines.push("Date: " + fmtDate(data.date));
  lines.push("Merchant: " + (data.merchant || "Restaurant") + (data.city ? ", " + data.city : ""));
  if (nonExp > 0.005){
    lines.push("Check total: " + money(total));
    lines.push("Less non-expensable: -" + money(nonExp));
    lines.push("Amount expensed: " + money(amount));
  } else {
    lines.push("Amount: " + money(amount));
  }
  if (hasItems && taxTip > 0.005){
    if (showItemizedTT){
      lines.push("Tax: " + money(taxShare));
      lines.push("Tip & gratuity: " + money(tipShare));
    } else {
      lines.push("Includes tax & tip: " + money(incTaxTip));
    }
  }
  if (cleanAttendees.length) lines.push("Attendees: " + cleanAttendees.join(", "));
  if (client.trim()) lines.push("Client / company: " + client.trim());
  if (purpose.trim()) lines.push("Purpose: " + purpose.trim());
  const summary = lines.join("\n");

  function setAttendee(i, val){ setAttendees(a => a.map((x,j)=> j === i ? val : x)); }
  function addAttendee(){ setAttendees(a => a.concat([""])); }
  function removeAttendee(i){ setAttendees(a => a.filter((_,j)=> j !== i)); }

  async function fileForReceipt(r){
    try {
      let blob = null;
      if (r.dataUrl) blob = await (await fetch(r.dataUrl)).blob();
      else if (r.path && cfg) blob = await ghGetRawFile(cfg, r.path);
      if (!blob) return null;
      return new File([blob], (r.key || "receipt") + ".jpg", { type: blob.type || "image/jpeg" });
    } catch(e){ return null; }
  }
  async function doCopy(){ try { await navigator.clipboard.writeText(summary); setCopied(true); setTimeout(()=> setCopied(false), 1600); } catch(e){} }
  async function doShare(){
    setSharing(true);
    try {
      const chosen = allReceipts.filter(r => picked[r.key]);
      const files = (await Promise.all(chosen.map(fileForReceipt))).filter(Boolean);
      if (files.length && navigator.canShare && navigator.canShare({ files })){
        await navigator.share({ files, text: summary, title: "Expense item" });
      } else if (navigator.share){
        await navigator.share({ title: "Expense item", text: summary });
      } else {
        doCopy();
      }
    } catch(e){ /* user cancelled or share unsupported */ }
    setSharing(false);
  }
  const anyReceiptPicked = allReceipts.some(r => picked[r.key]);

  // Add a receipt photo right here (scan or upload) when one isn't stored on the
  // visit - so you can always attach the itemized, the total, or both.
  async function onAddPhoto(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setAddBusy(true);
    try {
      const blob = await resizeImageToBlob(file, 1400, 0.85);
      const durl = await blobToDataUrl(blob);
      const key = "added" + addedReceipts.length;
      setAddedReceipts(a => a.concat([{ key:key, label:"Receipt photo", dataUrl:durl }]));
      setPicked(p => Object.assign({}, p, { [key]: true }));
    } catch(err){ /* ignore */ }
    setAddBusy(false);
  }

  // ---- elegant PDF (lazy-loads jsPDF; embeds the ticked receipts) ----
  async function receiptDataUrl(r){
    if (r.dataUrl) return r.dataUrl;
    if (r.path && cfg){ try { return await blobToDataUrl(await ghGetRawFile(cfg, r.path)); } catch(e){ return null; } }
    return null;
  }
  function imgDims(durl){
    return new Promise(res => {
      const im = new Image();
      im.onload = ()=> res({ w: im.naturalWidth || 1000, h: im.naturalHeight || 1400 });
      im.onerror = ()=> res({ w: 1000, h: 1400 });
      im.src = durl;
    });
  }
  const PDF_LIB = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  const prepRef = useRef({});   // receipt key -> { dataUrl, w, h }, readied before Share
  // Preload the PDF library + the ticked receipts when the sheet opens (and as the
  // selection changes) so the first "Share as PDF" tap fires within iOS's
  // user-activation window. Otherwise the first tap spends that window loading/
  // fetching and iOS silently drops navigator.share, forcing a second tap.
  useEffect(()=>{ loadScriptOnce(PDF_LIB).catch(()=>{}); }, []);
  useEffect(()=>{
    let alive = true;
    (async ()=>{
      for (const r of allReceipts){
        if (!picked[r.key] || prepRef.current[r.key]) continue;
        const durl = await receiptDataUrl(r);
        if (!alive || !durl) continue;
        const dim = await imgDims(durl);
        if (!alive) return;
        prepRef.current[r.key] = { dataUrl: durl, w: dim.w, h: dim.h };
      }
    })();
    return ()=>{ alive = false; };
  }, [picked, addedReceipts]);
  async function buildExpensePdf(){
    await loadScriptOnce(PDF_LIB);
    const JSPDF = window.jspdf && window.jspdf.jsPDF;
    if (!JSPDF) throw new Error("PDF library unavailable");
    const doc = new JSPDF({ unit:"pt", format:"letter" });
    const W = doc.internal.pageSize.getWidth();
    const H = doc.internal.pageSize.getHeight();
    const M = 56;
    const INK = [33,29,24], GRAY = [122,112,99], LINE = [223,215,202], ACCENT = [201,124,44];
    const setInk = c => doc.setTextColor(c[0], c[1], c[2]);
    const setDraw = c => doc.setDrawColor(c[0], c[1], c[2]);
    const fmt = n => "$" + (Math.round((Number(n) || 0) * 100) / 100)
      .toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    let y = 66;

    // Header: eyebrow, merchant, date / city, accent rule.
    doc.setFont("helvetica","bold"); doc.setFontSize(9); setInk(GRAY);
    doc.text("BUSINESS MEAL EXPENSE", M, y);
    y += 24; doc.setFont("helvetica","bold"); doc.setFontSize(21); setInk(INK);
    doc.text(doc.splitTextToSize(data.merchant || "Restaurant", W - M * 2)[0], M, y);
    const subBits = [data.date ? fmtDate(data.date) : "", data.city || ""].filter(Boolean);
    if (subBits.length){
      y += 17; doc.setFont("helvetica","normal"); doc.setFontSize(10.5); setInk(GRAY);
      doc.text(subBits.join("   ·   "), M, y);
    }
    y += 14; setDraw(ACCENT); doc.setLineWidth(1.5); doc.line(M, y, W - M, y);
    y += 32;

    // Amount ledger: labels left, amounts right-aligned.
    const ledger = (label, val, opts)=>{
      opts = opts || {};
      const size = opts.big ? 17 : 11;
      doc.setFont("helvetica", opts.bold ? "bold" : "normal"); doc.setFontSize(size);
      setInk(opts.bold ? INK : GRAY); doc.text(label, M, y);
      setInk(INK); doc.text(val, W - M, y, { align:"right" });
      y += opts.big ? 28 : 19;
    };
    if (nonExp > 0.005){
      ledger("Check total", fmt(total));
      ledger("Less non-expensable", "-" + fmt(nonExp));
      y -= 2; setDraw(LINE); doc.setLineWidth(0.8); doc.line(M, y, W - M, y); y += 18;
      ledger("Amount expensed", fmt(amount), { bold:true, big:true });
    } else {
      ledger("Amount", fmt(amount), { bold:true, big:true });
    }
    if (hasItems && taxTip > 0.005){
      if (showItemizedTT){
        ledger("Tax", fmt(taxShare));
        ledger("Tip & gratuity", fmt(tipShare));
      } else {
        ledger("Includes tax & tip", fmt(incTaxTip));
      }
    }
    y += 18;

    // Detail rows with light dividers.
    const detail = (label, val)=>{
      if (!val) return;
      doc.setFont("helvetica","bold"); doc.setFontSize(8.5); setInk(GRAY);
      doc.text(label.toUpperCase(), M, y);
      doc.setFont("helvetica","normal"); doc.setFontSize(11.5); setInk(INK);
      const wrapped = doc.splitTextToSize(String(val), W - M * 2);
      doc.text(wrapped, M, y + 15);
      y += 15 + wrapped.length * 14 + 14;
      setDraw(LINE); doc.setLineWidth(0.5); doc.line(M, y - 8, W - M, y - 8);
    };
    if (cleanAttendees.length) detail("Attendees", cleanAttendees.join(", "));
    if (client.trim()) detail("Client / company", client.trim());
    if (purpose.trim()) detail("Business purpose", purpose.trim());

    // Footer.
    doc.setFont("helvetica","normal"); doc.setFontSize(8); setInk(GRAY);
    doc.text("Generated by MenuCaptain", M, H - 40);

    // Receipt pages: caption + centered, bordered image.
    const chosen = allReceipts.filter(r => picked[r.key]);
    for (let i = 0; i < chosen.length; i++){
      let prep = prepRef.current[chosen[i].key];   // prepared on open/selection (no await on tap)
      if (!prep){
        const durl = await receiptDataUrl(chosen[i]);
        if (!durl) continue;
        const dim = await imgDims(durl);
        prep = { dataUrl: durl, w: dim.w, h: dim.h };
      }
      doc.addPage();
      doc.setFont("helvetica","bold"); doc.setFontSize(9); setInk(GRAY);
      doc.text((chosen[i].label || "Receipt").toUpperCase(), M, 56);
      const topY = 72;
      const availW = W - M * 2;
      const availH = H - topY - M;
      let w = availW, h = w * (prep.h / prep.w);
      if (h > availH){ h = availH; w = h * (prep.w / prep.h); }
      const x = M + (availW - w) / 2;
      try {
        doc.addImage(prep.dataUrl, "JPEG", x, topY, w, h);
        setDraw(LINE); doc.setLineWidth(0.5); doc.rect(x, topY, w, h);
      } catch(e){}
    }
    return doc;
  }
  async function doPdf(){
    setPdfBusy(true);
    try {
      const doc = await buildExpensePdf();
      const safe = (data.merchant || "expense").replace(/[^a-z0-9]+/gi, "-").toLowerCase().slice(0,40);
      const fname = "expense-" + safe + ".pdf";
      const blob = doc.output("blob");
      const file = new File([blob], fname, { type:"application/pdf" });
      // `title` is what email targets (Mail, Gmail) drop into the SUBJECT line;
      // Messages ignores it, so this can't reintroduce the old failed-text-body
      // problem. There's no way to know the chosen target ahead of time, so we
      // always pass a clean subject and let email pick it up. No `text` body.
      const subjBits = ["Expense", data.merchant || "meal"].filter(Boolean);
      let subject = subjBits.join(" - ");
      if (client && client.trim()) subject += " (" + client.trim() + ")";
      if (data.date) subject += " - " + fmtDate(data.date);
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        await navigator.share({ files:[file], title:subject });
      } else {
        doc.save(fname);
      }
    } catch(e){ /* lazy-load failed (offline) or cancelled */ }
    setPdfBusy(false);
  }

  // Home from the expense sheet: confirm only if you've actually entered something,
  // so a stray tap can't quietly discard a half-built expense.
  const expenseDirty = !!(purpose.trim() || client.trim() || addedReceipts.length ||
                          Object.keys(excluded).some(k => excluded[k]));
  const goHome = ()=>{
    if (!onHome) return;
    if (!expenseDirty || window.confirm("Discard this expense and go home?")) onHome();
  };

  // Still resolving the tier: brief spinner so we don't flash the sheet then yank it.
  if (tier === null){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
          <h2>Expense item</h2><HomeBtn onHome={onHome} />
        </div>
        <div className="ovbody"><div className="empty"><span className="spin" /></div></div>
      </div>
    );
  }

  // Free tier: the upsell. No PDF is built, so this costs nothing.
  if (tier !== "pro" && tier !== "unknown"){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
          <h2>Expense item</h2><HomeBtn onHome={onHome} />
        </div>
        <div className="ovbody">
          <div className="card" style={{textAlign:"center", padding:"26px 20px"}}>
            <div style={{display:"flex", justifyContent:"center", marginBottom:10}}>
              <Icon name="receipt" size={34} color="var(--accent)" />
            </div>
            <div className="big" style={{marginBottom:6}}>Expensing is a Pro feature</div>
            <div style={{color:"var(--text-dim)", lineHeight:1.5, marginBottom:18}}>
              Turn any check into a clean, professional expense report - exclude
              non-expensable items, add the client and attendees, attach the
              receipts, and share it as a polished PDF.
            </div>
            <button className="btn primary" style={{width:"100%"}}
              onClick={()=> onUpgrade ? onUpgrade() : onClose()}>
              See Pro
            </button>
            <button className="btn ghost" style={{width:"100%", marginTop:8}} onClick={onClose}>
              Maybe later
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Expense item</h2>
        {onHome
          ? <button className="x" onClick={goHome} aria-label="Home" title="Home"><Icon name="home" size={20} /></button>
          : <span style={{width:34}} />}
      </div>
      <div className="ovbody">
        {hasItems ? (
          <div className="fld">
            <span className="lbl">Items to expense</span>
            <div className="tiny faint" style={{margin:"-2px 0 8px"}}>Tap an item to exclude it (e.g. alcohol).</div>
            {items.map((it,i)=>{
              const off = !!excluded[i];
              return (
                <div key={i} className="pick-row" style={{display:"flex", alignItems:"center", gap:10}}
                  onClick={()=> setExcluded(x => Object.assign({}, x, { [i]: !x[i] }))}>
                  <span className={"rcpt-check" + (off ? "" : " on")}>{off ? "" : "✓"}</span>
                  <span style={{flex:1, minWidth:0, textDecoration: off ? "line-through" : "none",
                                opacity: off ? 0.5 : 1}}>{it.name}</span>
                  <span className="tiny faint" style={{textDecoration: off ? "line-through" : "none"}}>{money(priceOf(it))}</span>
                </div>
              );
            })}
          </div>
        ) : null}
        {nonExp > 0.005 ? (
          <div className="tiny faint" style={{textAlign:"right", marginTop:4}}>
            Check total {money(total)} &middot; less non-expensable {money(nonExp)}
          </div>
        ) : null}
        <div className="spl-total" style={{marginTop:2}}>
          <span>{nonExp > 0.005 ? "Amount expensed" : "Amount"}</span><span>{money(amount)}</span>
        </div>
        {hasItems && taxTip > 0.005 ? (
          showItemizedTT ? (
            <div className="tiny faint" style={{textAlign:"right", marginTop:2}}>
              tax {money(taxShare)} &middot; tip &amp; gratuity {money(tipShare)}
            </div>
          ) : (
            <div className="tiny faint" style={{textAlign:"right", marginTop:2}}>includes {money(incTaxTip)} tax &amp; tip</div>
          )
        ) : null}
        {canItemizeTT ? (
          <div className="pick-row" style={{display:"flex", alignItems:"center", gap:10, marginTop:8}}
            onClick={()=> setItemizeTaxTip(v => !v)}>
            <span className={"rcpt-check" + (itemizeTaxTip ? " on" : "")}>{itemizeTaxTip ? "✓" : ""}</span>
            <span className="small">Break out tax &amp; gratuity as separate lines</span>
          </div>
        ) : null}

        <div className="fld" style={{marginTop:14}}>
          <span className="lbl">Attendees</span>
          <div className="tiny faint" style={{margin:"-2px 0 8px"}}>Edit to add full names; add the client and any company names.</div>
          {attendees.map((nm,i)=>(
            <div key={i} className="row" style={{gap:8, marginBottom:6}}>
              <input className="input" value={nm} onChange={e=> setAttendee(i, e.target.value)} placeholder="Full name" />
              <button className="btn ghost sm" style={{flex:"none"}} onClick={()=> removeAttendee(i)} aria-label="Remove">✕</button>
            </div>
          ))}
          <button className="btn ghost sm" onClick={addAttendee}>+ Add name</button>
        </div>

        <label className="fld">
          <span className="lbl">Client / company</span>
          <input className="input" value={client} onChange={e=> setClient(e.target.value)} placeholder="e.g. Acme Corp" />
        </label>

        <label className="fld">
          <span className="lbl">Business purpose</span>
          <textarea className="input" rows={2} value={purpose} onChange={e=> setPurpose(e.target.value)}
            placeholder="e.g. Client dinner, team offsite" />
        </label>

        <div className="fld">
          <span className="lbl">Attach receipt</span>
          {allReceipts.length ? allReceipts.map(r=>(
            <div key={r.key} className="pick-row" style={{display:"flex", alignItems:"center", gap:10}}
              onClick={()=> setPicked(p => Object.assign({}, p, { [r.key]: !p[r.key] }))}>
              <span className={"rcpt-check" + (picked[r.key] ? " on" : "")}>{picked[r.key] ? "✓" : ""}</span>
              <span style={{flex:1}}>{r.label}</span>
            </div>
          )) : (
            <div className="tiny faint" style={{margin:"-2px 0 8px"}}>No receipt stored on this one &mdash; add a photo to attach.</div>
          )}
          <input ref={addRef} type="file" accept="image/*" style={{display:"none"}} onChange={onAddPhoto} />
          <button className="btn ghost sm" style={{marginTop:8}} disabled={addBusy}
            onClick={()=> addRef.current && addRef.current.click()}>
            {addBusy ? <span className="spin" /> : "+ Add a receipt photo"}
          </button>
        </div>

        <div className="card" style={{whiteSpace:"pre-wrap"}}>{summary}</div>
        <button className="btn primary" style={{marginTop:12, width:"100%"}} disabled={pdfBusy} onClick={doPdf}>
          {pdfBusy ? <span className="spin" /> : "Share as PDF"}
        </button>
        <button className="btn ghost" style={{marginTop:9, width:"100%"}} onClick={doCopy}>
          {copied ? "Copied" : "Copy as text"}
        </button>
        <div className="tiny faint" style={{marginTop:10}}>
          Share as PDF sends one clean document with the receipt photo(s) you ticked. Copy is plain text for pasting into a form.
        </div>
      </div>
    </div>
  );
}

function SplitCheckFlow({config, restaurants, visits, onSaveToVisit, onApplyDraft, onClose, flash,
                         initialLines, initialTotal, presetRestId, presetVisitId,
                         initialReceiptPhoto, initialFinalReceipt, initialSplit, onSaveSplit,
                         onScanned, menuNames, onLogVisit, onUpgrade, onHome, initialDate}){
  // When launched FROM a visit we arrive pre-loaded with that visit's priced
  // dishes and total, jump straight to the edit step, and default the save back
  // to that same visit.
  const preloaded = !!(initialLines && initialLines.length);
  // Reopened from a SAVED standalone split (the "Your splits" list on You)?
  // Its stored inputs seed every field so the calculator returns exactly as
  // it was saved, fully editable.
  const reopened = (initialSplit && initialSplit.inputs) ? initialSplit.inputs : null;
  // Opened from a real logged visit (vs. the standalone "+ menu" splitter)?
  // From a visit, saving attaches the split back to THAT visit and never makes
  // a separate card. presetVisitId is "new" only for the standalone splitter.
  const fromVisit = !!(presetVisitId && presetVisitId !== "new");
  // An OLD split (saved before inputs existed) carries only the summary - we
  // can't restore item assignments, but at least bring back who was at the
  // table so reopening isn't a blank slate.
  const fallbackPeople = (!reopened && initialSplit)
    ? (Array.isArray(initialSplit.people) ? initialSplit.people
        : (initialSplit.summary && Array.isArray(initialSplit.summary.people) ? initialSplit.summary.people : []))
        .map(p => (p && p.name) ? p.name : null).filter(Boolean)
    : [];
  const [step, setStep]       = useState((reopened || preloaded || fromVisit) ? "edit" : "pick");  // pick | edit | result
  const [busy, setBusy]       = useState(false);
  const [processing, setProcessing] = useState(null); // {done,total} | null
  const [errMsg, setErrMsg]   = useState("");
  const [lines, setLines]     = useState(() => reopened
    ? (reopened.lines || []).map(l => ({ id: l.id || uid("spl"), name: l.name || "",
        price: (l.price != null && l.price !== "") ? String(l.price) : "", qty: l.qty || 1 }))
    : preloaded
      ? initialLines.map(l => ({ id: uid("spl"), name: l.name || "",
          price: (l.price != null && l.price !== "") ? String(l.price) : "", qty: l.qty || 1 }))
      : []);                                          // [{id,name,price,qty}]
  const [rtotal, setRtotal]   = useState(reopened && reopened.rtotal != null ? String(reopened.rtotal) : "");
  const [people, setPeople]   = useState(reopened && Array.isArray(reopened.people) ? reopened.people.slice()
    : (fallbackPeople.length ? fallbackPeople.slice() : []));
  const [nameDraft, setNameDraft] = useState("");
  const [nameOpen, setNameOpen]   = useState(false);   // name autocomplete dropdown
  const [conns, setConns]         = useState([]);       // accepted connections (for suggestions)
  useEffect(()=>{
    let alive = true;
    getConnections(config).then(d => { if (alive) setConns((d && d.connections) || []); }).catch(()=>{});
    return ()=> { alive = false; };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  const [assign, setAssign]   = useState(reopened && reopened.assign ? reopened.assign : {});  // {lineId:[name]}
  const [tip, setTip]         = useState(reopened && reopened.tip != null ? String(reopened.tip) : "");
  const [tipMode, setTipMode] = useState(reopened && reopened.tipMode ? reopened.tipMode : "$");
  const [tax, setTax]         = useState(() => {
    if (reopened) return reopened.tax != null ? String(reopened.tax) : "";
    if (initialTotal == null) return "";
    const sub = (initialLines||[]).reduce((a,l)=> a + (Number(l.price)||0), 0);
    const extra = Number(initialTotal) - sub;            // tax/extra baked into the printed total
    return extra > 0.005 ? extra.toFixed(2) : "";
  });         // amount string ($ or %)
  const [taxMode, setTaxMode] = useState(reopened && reopened.taxMode ? reopened.taxMode : "$");
  const [split, setSplit]     = useState(null);       // computeManualSplit result
  const [saveRest, setSaveRest]   = useState(presetRestId || (initialSplit && initialSplit.restaurant_id) || "");  // restaurant id on the save step
  const [saveVisit, setSaveVisit] = useState(presetVisitId || "new"); // "new" or an existing visit id
  const [splitLabel, setSplitLabel] = useState(initialSplit && initialSplit.label ? initialSplit.label : "");  // standalone save label
  const [shots, setShots]     = useState([]);   // staged receipt photos (dataUrls), read together
  const [scannedMerchant, setScannedMerchant] = useState("");   // business name read off the receipt
  const [expenseOpen, setExpenseOpen] = useState(false);   // expense-item sheet over the result
  const [showRcpts, setShowRcpts] = useState(false);       // reveal receipt images on the split screen
  const [savedToVisit, setSavedToVisit] = useState(false); // one-tap save state (fromVisit)
  const fileRef = useRef(null);

  const money = c => "$" + (Math.round(c) / 100).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });

  // ---- scan the check: STAGE one or more photos (e.g. the itemized receipt +
  // a separate tax/tip/total slip), then read them together. onFiles appends;
  // readShots does the OCR on everything staged. ----
  async function onFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setErrMsg(""); setBusy(true); setProcessing({done:0, total:files.length});
    try {
      const urls = [];
      for (let i = 0; i < files.length; i++){
        const blob = await resizeImageToBlob(files[i], 1200, 0.82);
        urls.push(await blobToDataUrl(blob));
        setProcessing({done:i+1, total:files.length});
      }
      setShots(s => s.concat(urls));
      logMsg("SPLIT","Staged " + urls.length + " receipt photo(s)");
    } catch(err){
      logMsg("ERROR","Split photo add failed: " + err.message);
      setErrMsg("Couldn't add that photo. Try again.");
    } finally {
      setBusy(false); setProcessing(null);
      if (fileRef.current) fileRef.current.value = "";
    }
  }

  async function readShots(){
    if (!shots.length) return;
    setBusy(true); setErrMsg(""); setProcessing(null);
    try {
      // All staged photos are read as ONE check: items from the itemized
      // receipt, the final total from a separate totals slip - merged.
      const parsed = await parseReceiptPhotos(config, shots, menuNames || []);
      const newLines = (parsed.items || []).map(it => ({
        id: uid("spl"),
        name: it.name,
        price: (it.price != null ? String(it.price) : ""),
        qty: it.qty || 1,   // carried so a bundled line ("3 GL x $66") can be split into units
      }));
      setLines(newLines);
      // Anchor the split to the receipt's printed total, and fill tax + tip from
      // the scan (auto-gratuity / "party of 6+" folds into TIP, not tax).
      // Anything the scan couldn't account for - e.g. a price it failed to read -
      // surfaces as "Unaccounted" below rather than silently hiding in tip. As
      // you fill the missing price, that unaccounted amount shrinks to $0.
      const taxN = parsed.tax != null ? Number(parsed.tax) : 0;
      const tipN = (parsed.tip || 0) + (parsed.service_charge || 0);
      setTax(taxN > 0.005 ? taxN.toFixed(2) : "");
      setTaxMode("$");
      setTip(tipN > 0.005 ? tipN.toFixed(2) : "");
      setTipMode("$");
      setRtotal(parsed.total != null ? Number(parsed.total).toFixed(2) : "");
      if (parsed.merchant) setScannedMerchant(parsed.merchant);
      setAssign({});
      logMsg("SPLIT","Receipt parsed: " + newLines.length + " lines, total=" + parsed.total);
      // This one scan can ALSO log what you ate: hand the parsed items + photo
      // back to the visit so "What you had" fills from it - no second scan.
      if (onScanned) onScanned({ items: parsed.items || [], total: parsed.total != null ? parsed.total : null }, shots);
      setStep("edit");
    } catch(err){
      logMsg("ERROR","Split receipt scan failed: " + err.message);
      setErrMsg(err.message || "Couldn't read that receipt.");
    } finally {
      setBusy(false); setProcessing(null);
    }
  }

  function startManual(){
    setLines([{ id:uid("spl"), name:"", price:"" }]);
    setRtotal(""); setTax(""); setTip(""); setAssign({}); setErrMsg(""); setStep("edit");
  }

  // Wipe the whole check (scanned photos, items, tax/tip/total, assignments,
  // computed split) and go back to the start - so a re-scan begins clean and
  // can't merge with the old photos (the cause of double-counted items). People
  // are kept, since re-typing the table is the tedious part.
  function startOver(){
    if ((shots.length || lines.length) &&
        !window.confirm("Start over? This clears the scanned receipt, items, and totals. The people you added stay.")) return;
    setShots([]); setLines([]); setAssign({});
    setTax(""); setTaxMode("$"); setTip(""); setTipMode("$"); setRtotal("");
    setSplit(null); setErrMsg("");
    setStep("pick");
  }

  // ---- people editor ----
  // Roster for the name autocomplete: connections first, then anyone tagged on
  // past visits. Same idea as the visit "Who was with you?" field, so the names
  // you use line up across both screens.
  const splitRoster = (function(){
    const byKey = new Map();   // lower name -> display name
    const put = (nm)=>{ const s = (nm || "").trim(); if (!s) return; const k = s.toLowerCase(); if (!byKey.has(k)) byKey.set(k, s); };
    (conns || []).forEach(c => put(c.display_name || c.username));
    (visits || []).forEach(v => (v.companions || []).forEach(p => put(p && p.name)));
    return Array.from(byKey.values()).sort((a,b)=> a.localeCompare(b));
  })();
  function nameSuggestions(){
    const q = (nameDraft || "").trim().toLowerCase();
    const taken = new Set(people.map(p => p.toLowerCase()));
    return splitRoster
      .filter(n => !taken.has(n.toLowerCase()))
      .filter(n => !q || n.toLowerCase().indexOf(q) !== -1)
      .slice(0, 6);
  }
  function addPerson(name){
    const nm = ((typeof name === "string" ? name : nameDraft) || "").trim().slice(0, 40);
    if (!nm) return;
    setNameOpen(false);
    const exists = people.some(p => p.toLowerCase() === nm.toLowerCase());
    if (exists){ setNameDraft(""); return; }
    if (people.length >= 20){ flash && flash("That's a lot of people - 20 max"); return; }
    setPeople(people.concat([nm]));
    setNameDraft("");
  }
  function removePerson(nm){
    setPeople(people.filter(p => p !== nm));
    // drop them from every line assignment so nothing goes stale
    const next = {};
    Object.keys(assign).forEach(k => {
      const kept = assign[k].filter(n => n !== nm);
      if (kept.length) next[k] = kept;
    });
    setAssign(next);
  }

  // ---- line editing ----
  function setLineField(id, field, val){
    setLines(lines.map(l => l.id === id ? Object.assign({}, l, {[field]:val}) : l));
  }
  function addLine(){ setLines(lines.concat([{ id:uid("spl"), name:"", price:"" }])); }
  function removeLine(id){
    setLines(lines.filter(l => l.id !== id));
    const next = Object.assign({}, assign); delete next[id]; setAssign(next);
  }
  // Explode a multi-quantity line (e.g. "3 GL Prisoner $66") into that many
  // per-unit rows ($22 each) so each unit can be assigned to a different person.
  // Cents are distributed so the unit rows still sum to the original line total.
  function splitLineIntoUnits(id){
    const l = lines.find(x => x.id === id);
    if (!l) return;
    const qty = Math.max(2, parseInt(l.qty, 10) || 1);
    const totalCents = Math.max(0, Math.round((Number(l.price) || 0) * 100));
    const base = Math.floor(totalCents / qty);
    const rem  = totalCents - base * qty;        // leftover pennies after even division
    const units = [];
    for (let i = 0; i < qty; i++){
      const cents = base + (i < rem ? 1 : 0);    // first `rem` units carry the extra penny
      units.push({ id: uid("spl"), name: l.name, price: (cents / 100).toFixed(2), qty: 1 });
    }
    // splice the unit rows in where the original line sat, preserving order
    const next = [];
    lines.forEach(x => { if (x.id === id) Array.prototype.push.apply(next, units); else next.push(x); });
    setLines(next);
    // the original line's assignment no longer applies - units start unassigned
    const na = Object.assign({}, assign); delete na[id]; setAssign(na);
    logMsg("SPLIT","Split '" + l.name + "' into " + qty + " units, total_cents=" + totalCents);
  }

  // ---- assignment toggle ----
  function toggleAssign(lineId, nm){
    const cur = assign[lineId] || [];
    const on = cur.includes(nm);
    const nextFor = on ? cur.filter(n => n !== nm) : cur.concat([nm]);
    const next = Object.assign({}, assign);
    if (nextFor.length) next[lineId] = nextFor; else delete next[lineId];
    setAssign(next);
  }
  function shareEverything(){ setAssign({}); flash && flash("Everyone shares everything"); }

  // ---- compute ----
  const subtotalCents = lines.reduce((a,l)=> a + Math.max(0, Math.round((Number(l.price)||0)*100)), 0);
  // Tax and tip each in $ or %. Percent is of the pre-tax items subtotal.
  const taxCents = Math.max(0, taxMode === "%"
    ? Math.round(subtotalCents * (Number(tax)||0) / 100)
    : Math.round((Number(tax)||0)*100));
  const tipCents = Math.max(0, tipMode === "%"
    ? Math.round(subtotalCents * (Number(tip)||0) / 100)
    : Math.round((Number(tip)||0)*100));
  const computedGrandCents = subtotalCents + taxCents + tipCents;
  const computedGrandStr = (computedGrandCents/100).toFixed(2);
  // rtotal is the hard-coded override; blank means "use the calculated total".
  const overrideCents = Math.round((Number(rtotal)||0)*100);
  const overriding = rtotal !== "" && overrideCents > 0;
  const grandPreview = overriding ? Math.max(subtotalCents, overrideCents) : computedGrandCents;
  const canSplit = people.length >= 2 && grandPreview > 0;
  // The part of the total not explained by items + tax + tip. Only meaningful
  // when a receipt total anchors the split (overriding) - e.g. a price the scan
  // couldn't read. It's still split across everyone (it's part of the bill),
  // but it's shown so it isn't mistaken for tip. Shrinks to $0 as gaps are fixed.
  const unaccountedCents = overriding
    ? Math.max(0, grandPreview - subtotalCents - taxCents - tipCents) : 0;
  // Double-count guard: items should never exceed the receipt total. If they do
  // (by >5%), the same receipt was likely scanned twice. Live, so it clears when
  // the duplicate lines are removed.
  const looksDoubled = overriding && overrideCents > 0 && subtotalCents > Math.round(overrideCents * 1.05);

  function doSplit(){
    const res = computeManualSplit(lines, people, assign, "", String(grandPreview/100));
    setSplit(res);
    setSavedToVisit(false);   // a preview, not yet saved
    logMsg("SPLIT","Computed split across " + res.people.length +
           " people, grand=" + money(res.grandCents));
    setStep("result");
  }

  // One tap from a logged visit: compute the split, save it onto the visit, AND
  // show the summary - so "Save" lands you on the result, already saved.
  function saveToVisitAndShow(){
    const res = computeManualSplit(lines, people, assign, "", String(grandPreview/100));
    setSplit(res);
    persistSplitToVisit(res);
    setSavedToVisit(true);
    setStep("result");
  }

  // Open the expense sheet straight from the split screen (compute the split now
  // if it hasn't been yet, so the expense has its total + people).
  function openExpense(){
    if (!split) setSplit(computeManualSplit(lines, people, assign, "", String(grandPreview/100)));
    setExpenseOpen(true);
  }

  // Turn one person's share into a Venmo money request. Uses a saved @handle if
  // we have one; otherwise asks once and remembers it (blank = pick in Venmo).
  function requestVenmo(name, amountDollars){
    let handle = getVenmoHandle(name);
    if (!handle){
      const entered = window.prompt("Venmo @username for " + name + "?\n(Leave blank to pick them inside Venmo.)", "");
      if (entered === null) return;                       // cancelled
      handle = (entered || "").trim().replace(/^@/, "");
      if (handle) saveVenmoHandle(name, handle);
    }
    const r = (restaurants || []).find(x => x.id === (presetRestId || saveRest));
    const dateStr = fmtDate(initialDate || todayISO());
    const note = "Your share" + (r && r.name ? " at " + r.name : "")
               + (dateStr ? ", " + dateStr : "");
    const url = venmoChargeUrl(handle, amountDollars, note);
    try { window.open(url, "_blank"); } catch(e){ window.location.href = url; }
  }

  // Recent visits at the chosen restaurant (newest first). Always include the
  // currently-selected visit (e.g. the one we were launched from) so its radio
  // can show as selected even if it falls outside the most-recent few.
  const recentForSave = (() => {
    if (!saveRest || !Array.isArray(visits)) return [];
    const list = visits.filter(v => v.restaurant_id === saveRest);
    const top = list.slice(0, 5);
    if (saveVisit && saveVisit !== "new" && !top.some(v => v.id === saveVisit)){
      const sel = list.find(v => v.id === saveVisit);
      if (sel) top.unshift(sel);
    }
    return top;
  })();

  // Persist the computed split onto a visit - a new one today (default) or an
  // existing one the user picks. The split rides inside the visit JSON, and the
  // grand total becomes the visit's spend (so it flows into spend + Year in Food).
  // The editable calculator state, captured so a saved split can be reopened
  // and TRULY edited later (people, per-item assignment, tip, tax) - not just
  // the who-owes-what summary. Stored on standalone splits AND visit splits.
  function buildSplitInputs(){
    return {
      lines: lines.map(l => ({ id: l.id, name: l.name, price: l.price, qty: l.qty || 1 })),
      rtotal: rtotal,
      people: people.slice(),
      assign: assign,
      tip: tip, tipMode: tipMode,
      tax: tax, taxMode: taxMode,
    };
  }

  // Persist a computed split (res) onto the visit. Does NOT close the flow - the
  // caller decides what to show next (one-tap save stays on the summary).
  function persistSplitToVisit(res){
    if (!res || !saveRest || !onSaveToVisit) return;
    const r = (restaurants || []).find(x => x.id === saveRest);
    const toDollars = c => Math.round(c) / 100;
    const grand = toDollars(res.grandCents);
    const splitObj = {
      people: res.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      grand: grand,
      items: lines.filter(l => (l.name || "").trim())
        .map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
      inputs: buildSplitInputs(),   // so the split can be reopened and edited later
      saved_at: Date.now(),
    };
    if (saveVisit === "new"){
      const rec = {
        id: uid("visit"),
        restaurant_id: saveRest,
        restaurant_name: r ? r.name : "",
        date: todayISO(),
        rating: null,
        dishes: [],
        notes: "",
        photos: [],
        receipt: { photo: null, total: grand },   // sets the visit's spend
        nutrition: null,
        logged_at: Date.now(),
        split: splitObj,
      };
      logMsg("SPLIT","Saving split to a NEW visit at " + (r ? r.name : saveRest) + ", grand=" + money(res.grandCents));
      onSaveToVisit(rec, true);
    } else {
      const v = (visits || []).find(x => x.id === saveVisit);
      if (!v){ flash && flash("That visit is no longer here"); return; }
      // Keep an existing receipt total if there is one; otherwise record the
      // split's grand total as the spend. Never clobber a real scanned total.
      const receipt = (v.receipt && v.receipt.total)
        ? v.receipt
        : { photo: (v.receipt && v.receipt.photo) || null, total: grand };
      const rec = Object.assign({}, v, { split: splitObj, receipt: receipt });
      logMsg("SPLIT","Saving split to existing visit " + saveVisit + ", grand=" + money(res.grandCents));
      onSaveToVisit(rec, false);
    }
  }

  // Standalone -> "Log as a visit": hand the scanned check (line items + photo)
  // and the split over to the real visit editor, seeded so you just pick what YOU
  // ate, rate, and save. One scan, one split, straight into a logged visit.
  function doLogVisit(){
    if (!split || !onLogVisit) return;
    const toDollars = c => Math.round(c) / 100;
    const named = lines.filter(l => (l.name || "").trim());
    const splitObj = {
      people: split.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      grand: toDollars(split.grandCents),
      items: named.map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
      inputs: buildSplitInputs(),
      saved_at: Date.now(),
    };
    onLogVisit({
      items: named.map(l => ({ name: l.name.trim(), qty: l.qty || 1, price: (Number(l.price) || 0) })),
      total: toDollars(split.grandCents),
      splitDraft: splitObj,
      receiptDataUrl: (shots && shots[0]) || null,
      people: people.slice(),   // seed the visit's companions from who was at the table
    });
    // NB: do NOT call onClose() - the onLogVisit handler swaps the overlay itself.
  }

  // Form-launched (draft) mode: build the same split object but hand it back to
  // the visit form instead of committing, so it saves WITH the visit.
  function doApplyDraft(){
    if (!split || !onApplyDraft) return;
    const toDollars = c => Math.round(c) / 100;
    const splitObj = {
      people: split.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      grand: toDollars(split.grandCents),
      items: lines.filter(l => (l.name || "").trim())
        .map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
      inputs: buildSplitInputs(),   // so the split can be reopened and edited later
      saved_at: Date.now(),
    };
    logMsg("SPLIT","Applied split to visit draft, grand=" + money(split.grandCents));
    onApplyDraft(splitObj);
    onClose();
  }

  // Standalone save: persist this split as its own record (the "Your splits"
  // list on You). Stores the calculator INPUTS so it reopens fully editable,
  // plus a SUMMARY for the list card. Reuses the entity id/created_at on re-save.
  function defaultSplitLabel(){
    if (people.length){
      const head = people.slice(0,2).join(", ");
      return head + (people.length > 2 ? " +" + (people.length - 2) : "");
    }
    return "Check split";
  }
  function doSaveSplit(){
    if (!split || !onSaveSplit) return;
    const toDollars = c => Math.round(c) / 100;
    const inputs = buildSplitInputs();
    const summary = {
      grand: toDollars(split.grandCents),
      people: split.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      items: lines.filter(l => (l.name || "").trim())
        .map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
    };
    const now = Date.now();
    const rmatch = (restaurants || []).find(r => r.id === saveRest);
    const entity = {
      id: (initialSplit && initialSplit.id) || uid("split"),
      label: (splitLabel || "").trim() || defaultSplitLabel(),
      restaurant_id: saveRest || null,
      restaurant_name: rmatch ? rmatch.name : ((initialSplit && initialSplit.restaurant_name) || ""),
      inputs: inputs,
      summary: summary,
      created_at: (initialSplit && initialSplit.created_at) || now,
      updated_at: now,
    };
    logMsg("SPLIT","Saved standalone split id=" + entity.id + " grand=" + money(split.grandCents));
    onSaveSplit(entity);
    onClose();
  }

  async function shareSplit(){
    if (!split) return;
    const out = ["Check split:"];
    split.people.forEach(p => out.push("- " + p.name + ": " + money(p.totalCents)));
    out.push("Total: " + money(split.grandCents));
    out.push("");
    out.push("Split with MenuCaptain - menucaptain.com");
    const text = out.join("\n");
    try {
      if (navigator.share){ await navigator.share({ text }); return; }
    } catch(err){ if (err && err.name === "AbortError") return; }
    try { await navigator.clipboard.writeText(text); flash && flash("Split copied"); }
    catch(e){ flash && flash("Couldn't share - copy it by hand"); }
  }

  // Home from the split: confirm if there's work in progress so a tap can't
  // silently drop an in-progress (or unsaved) split.
  const splitDirty = !!(split || (lines || []).some(l => (l.name || "").trim()));
  const goHomeSplit = ()=>{
    if (!onHome) return;
    if (!splitDirty || window.confirm("Leave this split and go home?")) onHome();
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={
          step === "result" ? ()=> setStep("edit")
          : onClose}>
          {step === "result" ? "Back" : "Cancel"}
        </button>
        <h2>Split a check</h2>
        <div style={{display:"flex", alignItems:"center", gap:2, justifyContent:"flex-end"}}>
          {step === "result"
            ? <button className="x" onClick={shareSplit}>Share</button>
            : step === "edit"
              ? <button className="x" onClick={doSplit} disabled={!canSplit}
                  style={{opacity: canSplit ? 1 : 0.4}}>{(split || initialSplit) ? "Update" : "Split"}</button>
              : null}
          {onHome && (
            <button className="x" onClick={goHomeSplit} aria-label="Home" title="Home">
              <Icon name="home" size={20} />
            </button>
          )}
          {!onHome && step === "pick" && <span style={{width:54}} />}
        </div>
      </div>
      <div className="ovbody">

        {step === "pick" && (
          <div>
            <div className="card small muted">
              Scan the check (or enter it by hand), say who's at the table, and tap
              to assign each item. Tax and tip are split proportionally so it adds
              up to the real total. Save it at the end to keep it, or just share it.
              <div style={{marginTop:8, color:"var(--accent)"}}>
                One photo is usually all you need - most receipts have the items
                AND the totals. Only add a second photo if your tax/tip/total are
                on a separate slip. Don't scan two copies of the same receipt.
              </div>
            </div>
            {errMsg && <div className="card" style={{borderColor:"var(--danger)",color:"var(--danger)"}}>{errMsg}</div>}
            {busy ? (
              <div className="card" style={{textAlign:"center",padding:"22px 14px"}}>
                <div className="spin" style={{margin:"0 auto 14px"}} />
                <div className="big">Reading the check</div>
                <div>{processing ? ("Preparing photo " + processing.done + " of " + processing.total + "...") : "This usually takes 10-30 seconds."}</div>
              </div>
            ) : (
              <div>
                {shots.length > 0 && (
                  <div className="card" style={{padding:"10px 12px", marginBottom:10}}>
                    <div className="small muted" style={{marginBottom:8}}>
                      {shots.length} photo{shots.length>1?"s":""} ready{shots.length===1?" - add the totals slip too if you have one":""}.
                    </div>
                    <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
                      {shots.map((u,i)=>(
                        <div key={i} style={{position:"relative"}}>
                          <img src={u} alt="" style={{width:64, height:64, objectFit:"cover", borderRadius:8, border:"1px solid var(--line)"}} />
                          <button onClick={()=> setShots(s => s.filter((_,j)=> j!==i))}

                onKeyDown={e=> { if (e.key === "Enter"){ e.preventDefault(); addPerson(); } }} />

              {nameOpen && nameSuggestions().length ? (
                <div className="card" style={{position:"absolute", top:"100%", left:0, right:0, zIndex:6,
                     marginTop:4, maxHeight:200, overflowY:"auto", padding:"4px 0"}}>

                    <div key={i} className="pick-row" style={{padding:"9px 14px", cursor:"pointer"}}
                      onMouseDown={(e)=>{ e.preventDefault(); addPerson(n); }}>
                      {n}
                    </div>

              {(initialReceiptPhoto || initialFinalReceipt) ? (

                   onClick={(e)=>{ e.preventDefault(); setShowRcpts(s=>!s); }}>

            {showRcpts && (initialReceiptPhoto || initialFinalReceipt) ? (
              <div style={{marginBottom:12}}>

                  <div style={{marginBottom:10}}>
                    <div className="tiny faint" style={{marginBottom:4}}>Itemized check</div>
                    <PhotoImg cfg={config} path={initialReceiptPhoto} style={{maxWidth:"100%", borderRadius:12}} />
                  </div>
                ) : null}
                {initialFinalReceipt ? (
                  <div>
                    <div className="tiny faint" style={{marginBottom:4}}>Final / total receipt</div>

            <div className="card" style={{padding:"6px 14px"}}>
              {!lines.length && <div className="small muted" style={{padding:"8px 0"}}>No items yet - add one below.</div>}

                const who = assign[l.id] || [];

                    {lqty > 1 && (
                      <div className="spl-qty">
                        <span className="tiny faint">{lqty} &times; {money(perUnitCents)} each</span>
                        <button className="btn ghost"
                          style={{width:"auto",padding:"0 12px",height:"30px",fontSize:"13px",flex:"none"}}
                          onClick={()=> splitLineIntoUnits(l.id)}>Split into {lqty}</button>
                      </div>

                    {people.length > 0 && (
                      <div className="spl-who">
                        {people.map(p => (
                          <span key={p}

            {/* tax + tip ($ or %), then a live (hard-codeable) total */}
            <div className="spl-row" style={{marginTop:12,gap:12,alignItems:"flex-start"}}>
              <label className="fld" style={{flex:1,marginBottom:0}}>
                <span className="lbl">Tax</span>

                    onChange={e=> setTax(e.target.value)} />
                  <div className="amt-seg">
                    <button type="button" className={"amt-seg-b" + (taxMode==="$" ? " on" : "")}

                </div>

                  <div className="tiny faint" style={{marginTop:5}}>= {money(taxCents)}</div>}

                if (p.shareCents){

                      <button className="btn ghost sm" aria-label={"Copy " + p.name + "'s share"}
                        style={{padding:"4px 10px", margin:0, minWidth:0, fontSize:"12px"}}
                        onClick={async (e)=>{
                          e.stopPropagation();
                          const text = p.name + ": " + money(p.totalCents);
                          let ok = false;
                          try {
                            if (navigator.clipboard && navigator.clipboard.writeText){
                              await navigator.clipboard.writeText(text); ok = true;
                            }
                          } catch(err){ ok = false; }
                          if (!ok){
                            // Fallback for older iOS / restricted clipboard: select a hidden field.
                            try {
                              const ta = document.createElement("textarea");
                              ta.value = text; ta.setAttribute("readonly", "");
                              ta.style.position = "fixed"; ta.style.top = "0"; ta.style.opacity = "0";
                              document.body.appendChild(ta); ta.focus(); ta.select();
                              ta.setSelectionRange(0, text.length);
                              ok = document.execCommand("copy");
                              document.body.removeChild(ta);
                            } catch(err2){ ok = false; }
                          }
                          flash && flash(ok ? ("Copied " + p.name + "'s share") : "Couldn't copy");

              ) : (
                <button className="btn primary" style={{marginTop:10}}
                  onClick={()=>{ persistSplitToVisit(split); setSavedToVisit(true); }}>
                  {initialSplit ? "Save changes to this visit" : "Save to this visit"}
                </button>
              )
            ) : onSaveSplit ? (
              <div style={{marginTop:10}}>
                <label className="fld" style={{marginBottom:8}}>
                  <span className="lbl">Name this split</span>
                  <input className="input" value={splitLabel} placeholder={defaultSplitLabel()}
                    onChange={e=> setSplitLabel(e.target.value)} />
                </label>
                <button className="btn primary" onClick={doSaveSplit}>
                  {initialSplit ? "Update saved split" : "Save split"}

                <div className="tiny faint" style={{textAlign:"center",marginTop:8}}>
                  Saved splits live under You. Not kept unless you save.
                </div>
                {onLogVisit ? (
                  <div style={{marginTop:14, borderTop:"1px solid var(--line-soft)", paddingTop:12}}>
                    <button className="btn" style={{width:"100%"}} onClick={doLogVisit}>

                    </div>

            <button className="btn ghost" style={{marginTop:10}} onClick={()=> setExpenseOpen(true)}>Expense this</button>

            <button className="btn ghost" style={{marginTop:10}} onClick={startOver}>Start over / re-scan</button>
            <button className="btn ghost" style={{marginTop:10}} onClick={onClose}>Close without saving</button>
          </div>

      </div>
      {expenseOpen && split && (
        <ExpenseSheet
          data={(()=>{
            const rsel = (restaurants || []).find(x => x.id === (presetRestId || saveRest));
            const its = lines.filter(l => (l.name || "").trim()).map(l => ({ name: l.name.trim(), price: Number(l.price) || 0 }));
            return { date: todayISO(), merchant: (rsel && rsel.name) || scannedMerchant || "Restaurant",

      )}
    </div>
  );

/* ============================================================
   NEAR ME  (Discovery Phase 1) - Pro-only
   Find nearby places on the Phase 0 /api/places/* relay, then add
   one to your places (prefilled, with google_place_id + coords
   stamped so the map never re-geocodes it). All cost discipline
   lives on the backend (Pro gate, per-user cap, breaker, field
   mask, cache); the UI keeps searches EXPLICIT - radius/type need a
   Search tap - so we never auto-bill on a stray render.
   ============================================================ */

// Google "PRICE_LEVEL_*" enum -> $ symbols. Returns "" when unknown so callers
// can guard the surrounding text (no dangling separators).
function priceLevelToDollars(level){
  switch(level){
    case "PRICE_LEVEL_INEXPENSIVE":    return "$";
    case "PRICE_LEVEL_MODERATE":       return "$$";
    case "PRICE_LEVEL_EXPENSIVE":      return "$$$";
    case "PRICE_LEVEL_VERY_EXPENSIVE": return "$$$$";
    case "PRICE_LEVEL_FREE":           return "Free";
    default:                           return "";
  }
}
// Google "PRICE_LEVEL_*" enum -> 1..4 for filtering (null when unknown/free).
function priceLevelNum(level){
  switch(level){
    case "PRICE_LEVEL_INEXPENSIVE":    return 1;
    case "PRICE_LEVEL_MODERATE":       return 2;
    case "PRICE_LEVEL_EXPENSIVE":      return 3;
    case "PRICE_LEVEL_VERY_EXPENSIVE": return 4;
    default:                           return null;
  }
}

// "italian_restaurant" -> "Italian restaurant"
function humanizeType(t){
  if (!t) return "";
  const s = String(t).replace(/_/g, " ").trim();
  return s ? (s.charAt(0).toUpperCase() + s.slice(1)) : "";
}

// Best-effort cuisine word for the Add-a-place prefill. We want "Italian", not
// "Italian restaurant": strip the generic suffix words, title-case the rest.
function cuisineFromType(primaryType, types){
  const pick = primaryType || (Array.isArray(types) && types.length ? types[0] : "");
  if (!pick) return "";
  let s = String(pick).replace(/_/g, " ")
    .replace(/\b(restaurant|food|store|shop|place)\b/gi, "").trim();
  if (!s) return "";
  return s.split(/\s+/).map(w => w ? (w.charAt(0).toUpperCase() + w.slice(1)) : "").join(" ");
}

// Map a free-text saved cuisine onto the SAME vocabulary the Near me cuisine
// chips use (labels here must match NEARME_CUISINES labels), so the two screens
// agree. Hybrid: a confident keyword match snaps to the canonical label
// ("Mexican / Tacos" -> "Mexican"); anything with no clean match is kept as its
// own cleaned label ("South American", "TexMex") rather than dumped in "Other".
const CUISINE_CANON = [
  ["Italian", ["italian"]], ["Mexican", ["mexican","taco"]], ["Chinese", ["chinese"]],
  ["Japanese", ["japanese"]], ["Sushi", ["sushi"]], ["Thai", ["thai"]],
  ["Indian", ["indian"]], ["Pizza", ["pizza","pizzeria"]], ["Burgers", ["burger"]],
  ["Seafood", ["seafood"]], ["BBQ", ["bbq","barbecue","barbeque"]], ["Steakhouse", ["steak"]],
  ["Korean", ["korean"]], ["Vietnamese", ["vietnam"]], ["Mediterranean", ["mediterranean"]],
  ["French", ["french"]], ["Breakfast", ["breakfast","brunch"]], ["Vegan", ["vegan","vegetarian"]],
];
function normalizeCuisine(raw){
  const r = (raw || "").trim();
  if (!r) return "";
  const lc = r.toLowerCase();
  for (let i = 0; i < CUISINE_CANON.length; i++){
    const kws = CUISINE_CANON[i][1];
    for (let k = 0; k < kws.length; k++){ if (lc.indexOf(kws[k]) !== -1) return CUISINE_CANON[i][0]; }
  }
  return cuisineFromType(r) || r;   // no canonical match: keep a cleaned original
}

// Haversine distance in miles. Returns null if any coord is missing.
function distanceMiles(lat1, lng1, lat2, lng2){
  if (lat1==null || lng1==null || lat2==null || lng2==null) return null;
  const R = 3958.8;                         // earth radius, miles
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const sLat = Math.sin(dLat / 2);
  const sLng = Math.sin(dLng / 2);
  const a = (sLat * sLat) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * (sLng * sLng);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtMiles(mi){
  if (mi == null) return "";
  if (mi < 0.1) return "<0.1 mi";
  if (mi < 10)  return mi.toFixed(1) + " mi";
  return Math.round(mi) + " mi";
}

function hhmm(ts){
  try { return new Date(ts).toLocaleTimeString([], { hour:"numeric", minute:"2-digit" }); }
  catch(e){ return ""; }
}

// Radius chips (label + meters; all under Google's 50km cap). Default 1 mi.
const NEARME_RADII = [
  { label:"0.5 mi", m:800 },
  { label:"1 mi",   m:1600 },
