<!DOCTYPE html>
<!--
  DINING LOG - single-file mobile web app
  Build: v1.0
  Stack: React 18 + Babel Standalone (CDN). No build step. Open the file or host it.
  Data : GitHub repo (3 JSON files under data/) is the source of truth.
         localStorage holds a cache for instant load and offline reading.
  OCR  : Anthropic API (Claude vision) digitizes photographed menus.
  Notes: All console/log output is plain ASCII (no emoji) by design.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dining Log" />
  <meta name="theme-color" content="#1b1714" />
  <title>Dining Log</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,9..144&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    :root{
      --bg:#1b1714; --bg-2:#221d18; --surface:#272019; --surface-2:#2f2720;
      --line:#3a3128; --line-soft:#332b23;
      --text:#f3ebdd; --text-dim:#b3a591; --text-faint:#80715f;
      --accent:#e0764a; --accent-dim:#b85f3a;
      --amber:#e7b24c; --sage:#9aa877; --danger:#d9604e; --ok:#7faa6b;
      --shadow:0 8px 28px rgba(0,0,0,0.45);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
    body{
      font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:16px; line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:none;
    }
    input,textarea,select,button{font-family:inherit; font-size:16px;}
    button{cursor:pointer; border:none; background:none; color:inherit;}
    h1,h2,h3{font-family:'Fraunces',Georgia,serif; font-weight:500; margin:0; line-height:1.15;}

    /* ---- shell ---- */
    #app-shell{
      max-width:540px; margin:0 auto; min-height:100vh;
      background:var(--bg); position:relative;
      padding-bottom:calc(78px + env(safe-area-inset-bottom));
    }
    .topbar{
      position:sticky; top:0; z-index:30;
      background:linear-gradient(180deg,var(--bg) 70%,rgba(27,23,20,0.0));
      padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
    }
    .topbar h1{font-size:30px; letter-spacing:-0.02em;}
    .topbar .sub{font-size:13px; color:var(--text-faint); margin-top:2px; letter-spacing:0.04em; text-transform:uppercase;}
    .content{padding:4px 20px 24px;}

    /* ---- sync banner ---- */
    .syncbar{
      margin:0 20px 14px; padding:9px 13px; border-radius:11px;
      font-size:13px; display:flex; align-items:center; gap:9px;
      border:1px solid var(--line);
    }
    .syncbar.busy{background:var(--bg-2); color:var(--text-dim);}
    .syncbar.err{background:rgba(217,96,78,0.12); color:#eab0a6; border-color:rgba(217,96,78,0.4);}
    .syncbar.warn{background:rgba(231,178,76,0.1); color:#e7cf9a; border-color:rgba(231,178,76,0.35);}
    .syncbar.update{background:rgba(224,118,74,0.14); color:#f0bfa3; border-color:rgba(224,118,74,0.45);}
    .updrow{display:flex; align-items:center; gap:10px; justify-content:center; padding:14px 0 2px; flex-wrap:wrap;}
    .syncbar button{margin-left:auto; font-size:12px; color:var(--accent); font-weight:600;}
    .dot{width:7px; height:7px; border-radius:50%; flex:none;}
    .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;flex:none;}
    @keyframes sp{to{transform:rotate(360deg);}}

    /* ---- cards ---- */
    .card{
      background:var(--surface); border:1px solid var(--line-soft);
      border-radius:15px; padding:16px; margin-bottom:13px;
    }
    .card.tap{transition:transform 0.08s ease;}
    .card.tap:active{transform:scale(0.985);}

    .row{display:flex; align-items:center; gap:12px;}
    .between{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .muted{color:var(--text-dim);}
    .faint{color:var(--text-faint);}
    .tiny{font-size:12.5px;}
    .small{font-size:13.5px;}

    /* ---- visit / restaurant cards ---- */
    .place-name{font-family:'Fraunces',serif; font-size:21px; font-weight:500; letter-spacing:-0.01em;}
    .meta-line{font-size:12.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em;}

    .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
    .chip{
      background:var(--surface-2); border:1px solid var(--line);
      color:var(--text-dim); font-size:12.5px; padding:4px 10px; border-radius:999px;
    }
    /* un-rated dish chips are neutral; the verdict modifiers below add the color/meaning */
    .chip.dish{background:var(--surface-2); border-color:var(--line); color:var(--text-dim);}
    .chip.tag{background:rgba(154,168,119,0.12); border-color:rgba(154,168,119,0.3); color:#bcc79c; font-size:11px; padding:2px 8px;}
    .chip.pick{cursor:pointer;}
    .chip.pick:active{transform:scale(0.94);}
    .chip.on{background:var(--accent); border-color:var(--accent); color:#1b1714; font-weight:600;}
    /* ---- per-dish verdict (Again / Skip) ---- */
    /* verdict chip variants used in read-only displays (history, picks card) */
    .chip.dish.again{background:rgba(224,118,74,0.22); border-color:var(--accent); color:#f7c9ab; font-weight:600;}
    .chip.dish.skip{opacity:0.5; text-decoration:line-through;}
    /* editable dish rows inside the visit form */
    .dish-row{
      display:flex; align-items:center; gap:8px;
      padding:8px 6px 8px 11px; margin-bottom:6px;
      background:var(--surface); border:1px solid var(--line); border-radius:11px;
    }
    .dish-row-name{flex:1; min-width:0; font-size:14px; color:var(--text); word-break:break-word;}
    .dish-verdict{display:flex; gap:5px; flex:none;}
    .verdict-btn{
      font-size:11px; padding:5px 11px; border-radius:999px;
      border:1px solid var(--line); background:transparent; color:var(--text-dim);
      cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform 0.08s;
    }
    .verdict-btn:active{transform:scale(0.92);}
    .verdict-btn.again.on{background:rgba(224,118,74,0.2); border-color:var(--accent); color:var(--accent); font-weight:600;}
    .verdict-btn.skip.on{background:rgba(179,165,145,0.16); border-color:var(--text-faint); color:var(--text-dim); font-weight:600;}
    .dish-row-x{flex:none; padding:5px; background:transparent; border:none; cursor:pointer; line-height:0;}
    .dish-item{margin-bottom:8px;}
    .dish-item .dish-row{margin-bottom:0;}
    .dish-sub{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:5px 0 0 4px;}
    .dish-cam{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--accent);
      background:none; border:none; padding:2px 0; cursor:pointer; -webkit-tap-highlight-color:transparent;}
    .dish-cam:disabled{opacity:0.6;}
    .dish-cam-err{font-size:12px; color:#eab0a6;}
    /* conflict modal (photo estimate vs existing menu estimate) */
    .modal-bg{position:fixed; inset:0; z-index:80; background:rgba(15,12,10,0.62);
      display:flex; align-items:center; justify-content:center; padding:24px;}
    .modal{background:var(--surface); border:1px solid var(--line); border-radius:16px;
      padding:20px; max-width:380px; width:100%; box-shadow:0 18px 50px rgba(0,0,0,0.45);}
    .modal-title{font-family:'Fraunces',serif; font-size:18px; color:var(--text); margin-bottom:9px;}
    .modal-body{font-size:14px; line-height:1.5; color:var(--text-dim); margin-bottom:18px;}
    .modal-body strong{color:var(--text); font-weight:600;}
    .modal-actions{display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;}
    /* "your picks here" card on restaurant detail */
    .card.picks{border:1px solid rgba(224,118,74,0.3);}
    .picks-head{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); font-weight:600; margin-bottom:8px;}
    /* ---- help me order (AI menu Q&A) ---- */
    .card.ask{border:1px solid rgba(224,118,74,0.3); margin-bottom:14px;}
    .ask-head{display:flex; align-items:center; gap:7px; font-family:'Fraunces',serif; font-size:16px; color:var(--text); margin-bottom:9px;}
    .ask-input{width:100%; resize:none; line-height:1.4; margin-bottom:8px;}
    .ask-egs{margin-bottom:10px;}
    .ask-go{width:auto; padding:8px 16px;}
    .ask-err{margin-top:10px; padding:9px 11px; border-radius:9px; font-size:13px;
      background:rgba(217,96,78,0.1); border:1px solid rgba(217,96,78,0.4); color:#eab0a6;}
    .ask-answer{margin-top:12px; padding:12px 13px; border-radius:10px;
      background:rgba(224,118,74,0.08); border:1px solid rgba(224,118,74,0.22);
      color:var(--text); font-size:14px; line-height:1.5;}
    /* ---- meal-photo nutrition (informative, never alarming) ---- */
    .card.nutri{border:1px solid rgba(224,118,74,0.22); margin-top:4px;}
    .nutri-kcal{font-family:'Fraunces',serif; font-size:30px; font-weight:600; color:var(--text); line-height:1;}
    .nutri-kcal-u{font-size:14px; font-weight:400; color:var(--text-faint);}
    .nutri-macros{display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:13px; color:var(--text-dim);}
    .nutri-macros b{color:var(--text); font-weight:600;}
    .nutri-foot{margin-top:11px; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint);}
    .nutri-edit{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px;}
    .nutri-edit label{display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.04em;}
    .nutri-edit label.wide{grid-column:1 / -1;}
    .nutri-edit .input{padding:7px 9px;}
    .nutri-line{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-top:9px; font-size:12.5px; color:var(--text-dim);}
    .nutri-line .kc{color:var(--text); font-weight:600;}
    .nutri-line .tg{font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint); border:1px solid var(--line); border-radius:999px; padding:1px 7px;}
    .iest{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:9px;}
    .iest-btn{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--accent);
      background:transparent; border:1px dashed rgba(224,118,74,0.5); border-radius:999px;
      padding:4px 11px; cursor:pointer; -webkit-tap-highlight-color:transparent;}
    .iest-btn:disabled{opacity:0.6;}
    .iest-err{font-size:12px; color:#eab0a6;}
    .mitem-nut{display:flex; align-items:center; gap:10px; margin-top:9px;}
    .mitem-nut .nutri-line{margin-top:0;}
    .mitem-thumb{width:46px; height:46px; border-radius:9px; overflow:hidden; flex:none; background:var(--surface-2);}
    .mitem-thumb .photo-img, .mitem-thumb .photo-shell{width:46px; height:46px; border-radius:9px;}

    /* ---- stars ---- */
    .stars{display:inline-flex; gap:3px;}
    .star{font-size:17px; color:var(--line);}
    .star.lit{color:var(--amber);}
    .star.big{font-size:30px;}

    .fav{color:var(--text-faint); font-size:21px; line-height:1;}
    .fav.on{color:var(--accent);}

    /* ---- buttons ---- */
    .btn{
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:13px 16px; border-radius:12px; font-weight:600; font-size:15px;
      width:100%; transition:transform 0.07s ease, opacity 0.15s ease;
    }
    .btn:active{transform:scale(0.98);}
    .btn:disabled{opacity:0.45;}
    .btn.primary{background:var(--accent); color:#1b1714;}
    .btn.ghost{background:var(--surface); border:1px solid var(--line); color:var(--text);}
    .btn.danger{background:rgba(217,96,78,0.14); border:1px solid rgba(217,96,78,0.45); color:#e7a99e;}
    .btn.sm{padding:9px 13px; font-size:13.5px; width:auto;}

    /* ---- forms ---- */
    label.fld{display:block; margin-bottom:14px;}
    label.fld .lbl{
      display:block; font-size:12px; letter-spacing:0.07em; text-transform:uppercase;
      color:var(--text-faint); margin-bottom:6px;
    }
    .input,textarea.input{
      width:100%; background:var(--bg-2); border:1px solid var(--line);
      color:var(--text); padding:12px 13px; border-radius:11px; outline:none;
    }
    .input:focus,textarea.input:focus{border-color:var(--accent-dim);}
    textarea.input{resize:vertical; min-height:74px; line-height:1.45;}
    .input::placeholder,textarea.input::placeholder{color:var(--text-faint);}

    /* ---- bottom nav ---- */
    .nav{
      position:fixed; left:0; right:0; bottom:0; z-index:40;
      max-width:540px; margin:0 auto;
      background:rgba(34,29,24,0.96); backdrop-filter:blur(12px);
      border-top:1px solid var(--line);
      display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    }
    .nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:6px 0; font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase;
      color:var(--text-faint);
    }
    .nav button.on{color:var(--text);}
    .nav .navicon{width:23px; height:23px;}
    .nav .add{
      background:var(--accent); color:#1b1714; width:46px; height:46px;
      border-radius:14px; margin-top:-12px; box-shadow:0 6px 16px rgba(224,118,74,0.4);
      align-items:center; justify-content:center;
    }

    /* ---- overlay sheets ---- */
    .overlay{
      position:fixed; inset:0; z-index:60; background:var(--bg);
      max-width:540px; margin:0 auto; display:flex; flex-direction:column;
      animation:slideup 0.22s ease;
    }
    @keyframes slideup{from{transform:translateY(22px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .ovhead{
      display:flex; align-items:center; gap:12px;
      padding:calc(13px + env(safe-area-inset-top)) 18px 13px;
      border-bottom:1px solid var(--line-soft); position:sticky; top:0; background:var(--bg); z-index:5;
    }
    .ovhead h2{font-size:20px; flex:1; letter-spacing:-0.01em;}
    .ovhead .x{font-size:15px; color:var(--text-dim); padding:6px 4px; font-weight:600;}
    .ovbody{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:18px;}

    /* ---- action sheet ---- */
    .sheet-bg{position:fixed; inset:0; z-index:70; background:rgba(0,0,0,0.55); display:flex; align-items:flex-end;}
    .sheet{
      width:100%; max-width:540px; margin:0 auto; background:var(--bg-2);
      border-radius:20px 20px 0 0; padding:10px 16px calc(20px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line); animation:slideup 0.2s ease;
    }
    .sheet .grip{width:38px; height:4px; background:var(--line); border-radius:2px; margin:6px auto 14px;}
    .sheet-item{
      display:flex; align-items:center; gap:14px; padding:15px 6px;
      border-bottom:1px solid var(--line-soft);
    }
    .sheet-item:last-child{border-bottom:none;}
    .sheet-item .ic{
      width:40px; height:40px; border-radius:11px; background:var(--surface);
      display:flex; align-items:center; justify-content:center; flex:none;
    }
    .sheet-item .t1{font-weight:600; font-size:15px;}
    .sheet-item .t2{font-size:12.5px; color:var(--text-faint);}

    /* ---- menu sections ---- */
    .msec{border-bottom:1px solid var(--line-soft); padding:4px 0;}
    .msec-head{
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 2px; cursor:pointer;
    }
    .msec-head .nm{font-family:'Fraunces',serif; font-size:16.5px; font-weight:600; letter-spacing:0.01em;}
    .msec-head .ct{font-size:12px; color:var(--text-faint);}
    .mitem{padding:9px 2px 11px; border-top:1px dashed var(--line-soft);}
    .mitem .ihead{display:flex; justify-content:space-between; gap:12px; align-items:baseline;}
    .mitem .inm{font-weight:500; font-size:15px;}
    .mitem .ipr{color:var(--amber); font-size:13.5px; white-space:nowrap; font-variant-numeric:tabular-nums;}
    .mitem .idesc{font-size:13px; color:var(--text-dim); margin-top:3px; line-height:1.45;}

    /* ---- misc ---- */
    .empty{text-align:center; padding:46px 20px; color:var(--text-faint);}
    .empty .big{font-family:'Fraunces',serif; font-size:20px; color:var(--text-dim); margin-bottom:6px;}
    .divider-label{
      font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--text-faint); margin:22px 2px 9px;
    }
    /* Drill-in row for a menu on the restaurant page */
    .menu-row{
      display:flex; align-items:center; gap:10px;
      padding:14px 16px; margin-bottom:8px;
      background:var(--surface); border:1px solid var(--line); border-radius:12px;
      cursor:pointer; transition:background 0.12s ease, border-color 0.12s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .menu-row:active{ background:var(--surface-2); border-color:rgba(224,118,74,0.35); }
    .menu-row-label{
      font-family:'Fraunces',serif; font-size:18px; color:var(--text);
      line-height:1.2;
    }
    /* Section subheader inside the visit-form chip picker, between section's chips */
    .section-subhead{
      font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--text-faint); font-weight:600;
      margin:10px 0 5px;
    }
    .toast{
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:calc(94px + env(safe-area-inset-bottom)); z-index:90;
      background:var(--surface-2); border:1px solid var(--line);
      color:var(--text); padding:11px 17px; border-radius:11px; font-size:14px;
      box-shadow:var(--shadow); max-width:90%; animation:slideup 0.18s ease;
    }
    .logbox{
      background:#100d0b; border:1px solid var(--line); border-radius:10px;
      padding:11px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:11px; line-height:1.6; color:#a89a86;
      max-height:240px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    }
    .photo-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
    .photo-grid .pth{
      width:72px; height:72px; border-radius:9px; object-fit:cover;
      border:1px solid var(--line);
    }

    /* ===== Restaurant + visit photos ===== */
    .photo-img{display:block; object-fit:cover; max-width:100%;}
    .photo-shell{
      display:flex; align-items:center; justify-content:center;
      background:var(--surface-2); border:1px solid var(--line);
      color:var(--text-faint);
    }
    .photo-shell.loading{
      background:linear-gradient(90deg, var(--surface-2) 0%, #2a221d 50%, var(--surface-2) 100%);
      background-size:200% 100%; animation:photoshimmer 1.4s ease-in-out infinite;
      border:1px solid var(--line);
    }
    @keyframes photoshimmer{
      0%{background-position:200% 0;} 100%{background-position:-200% 0;}
    }
    /* Restaurant hero photo on the detail page */
    .rest-hero{
      width:100%; height:200px; border-radius:13px;
      margin-bottom:14px; overflow:hidden;
    }
    .rest-hero .photo-img, .rest-hero.photo-shell{
      width:100%; height:200px; border-radius:13px;
    }
    /* Small restaurant thumbnail on the Places-tab list cards */
    .rest-thumb{
      width:56px; height:56px; border-radius:10px; flex:none;
      overflow:hidden; margin-right:12px;
    }
    .rest-thumb .photo-img, .rest-thumb.photo-shell{
      width:56px; height:56px; border-radius:10px;
    }
    /* Visit photo strip inside a visit card */
    .visit-photos{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
    .visit-photo{
      width:88px; height:88px; border-radius:10px; overflow:hidden;
      position:relative; flex:none;
    }
    .visit-photo .photo-img, .visit-photo.photo-shell{
      width:88px; height:88px; border-radius:10px;
    }

    /* Photo editor (in restaurant + visit forms) */
    .photo-editor{
      display:flex; align-items:center; gap:12px;
      padding:12px; background:var(--surface); border:1px solid var(--line);
      border-radius:12px; margin-bottom:13px;
    }
    .photo-editor .photo-img, .photo-editor .photo-shell{
      width:72px; height:72px; border-radius:10px; flex:none;
    }
    .photo-slot{
      width:88px; height:88px; border-radius:10px; flex:none;
      background:var(--surface); border:1px dashed var(--line);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-faint); font-size:11px; text-align:center; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

  <script type="text/babel" data-presets="react">
/* ============================================================
   DINING LOG - application code
   ============================================================ */
const { useState, useEffect, useRef, useCallback } = React;

/* ---- constants ------------------------------------------------ */
const APP_VERSION   = "1.11.0";
const VISION_MODEL  = "claude-sonnet-4-6";          // current Claude vision model
const ASK_MODEL     = "claude-sonnet-4-6";          // text model for "help me order"
const GH_API        = "https://api.github.com";
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
const CFG_KEY       = "dininglog_config";
const DATA_KEY      = "dininglog_data";
const FILES = {                                     // logical name -> repo path
  restaurants: "data/restaurants.json",
  menus:       "data/menus.json",
  visits:      "data/visits.json",
  locations:   "data/locations.json",
};

/* ---- diagnostic log buffer -----------------------------------
   iPhone Safari has no easy console, so we keep an in-app log
   that is viewable under Settings > Diagnostics. ASCII only. */
const LOG_BUFFER = [];
function logMsg(tag, msg){
  const stamp = new Date().toTimeString().slice(0,8);
  const line  = "[" + stamp + "] [" + tag + "] " + msg;
  LOG_BUFFER.push(line);
  if (LOG_BUFFER.length > 240) LOG_BUFFER.shift();
  try { console.log(line); } catch(e){ /* ignore */ }
}

/* ---- small utilities ----------------------------------------- */
function uid(prefix){
  return prefix + "_" + Date.now().toString(36) + "_" +
         Math.random().toString(36).slice(2,7);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }

// Convert any string ("COCKTAILS", "irish favorites", "Late Night MENU")
// to consistent Title Case. Used to normalize OCR-detected section names
// so they match the pill labels (Title Case) and merge correctly with them.
function toTitleCase(str){
  if (!str) return "";
  return String(str).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function fmtDate(iso){
  // iso is YYYY-MM-DD ; render as a friendly label
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}
function relDays(iso){
  if (!iso) return "";
  const then = new Date(iso + "T12:00:00").getTime();
  const days = Math.round((Date.now() - then) / 86400000);
  if (days <= 0)  return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7)   return days + " days ago";
  if (days < 31)  return Math.round(days/7) + " wk ago";
  if (days < 365) return Math.round(days/30) + " mo ago";
  return Math.round(days/365) + " yr ago";
}

/* UTF-8 safe base64 - GitHub Contents API stores file bodies in base64. */
function utf8ToB64(str){
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  bytes.forEach(b => { bin += String.fromCharCode(b); });
  return btoa(bin);
}
function b64ToUtf8(b64){
  const clean = (b64 || "").replace(/\s/g,"");          // GitHub adds line breaks
  const bin   = atob(clean);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

/* Loose JSON parse - tolerates markdown fences around model output. */
function parseJsonLoose(text){
  let t = (text || "").trim();
  t = t.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
  const first = t.indexOf("{");
  const last  = t.lastIndexOf("}");
  if (first === -1 || last === -1) throw new Error("No JSON object found in response");
  return JSON.parse(t.slice(first, last + 1));
}

/* Read a File into a data URL. */
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error("Could not read file"));
    r.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error("Could not decode image"));
    img.src = src;
  });
}

/* ============================================================
   IMAGE RESIZE PIPELINE (faster, iOS-friendly)
   ============================================================
   Decode via createImageBitmap when available - skips FileReader
   entirely and uses native image decoders, which on iOS is
   meaningfully faster and uses less memory than FileReader +
   <img> + canvas.

   Returns a Blob (not a data URL) so callers don't pay the base64
   inflation cost twice. dataUrlFromBlob() converts when a data URL
   is actually needed (e.g. for the Anthropic vision API). */
async function decodeImage(file){
  if (typeof createImageBitmap === "function"){
    try {
      // EXIF orientation honored automatically on modern Safari
      return await createImageBitmap(file, { imageOrientation:"from-image" });
    } catch(e){
      // some Safari versions choke on the options bag - retry without it
      try { return await createImageBitmap(file); }
      catch(e2){ /* fall through to FileReader path */ }
    }
  }
  // legacy fallback - slower but works everywhere
  const url = await fileToDataUrl(file);
  return await loadImage(url);
}

async function resizeImageToBlob(file, maxEdge, quality){
  maxEdge = maxEdge || 1200;
  quality = quality || 0.82;
  const src = await decodeImage(file);
  const sw = src.width  || src.naturalWidth  || 0;
  const sh = src.height || src.naturalHeight || 0;
  if (!sw || !sh) throw new Error("Decoded image has zero size");
  let w = sw, h = sh;
  if (Math.max(w,h) > maxEdge){
    const scale = maxEdge / Math.max(w,h);
    w = Math.round(w*scale); h = Math.round(h*scale);
  }
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(src,0,0,w,h);
  // free the ImageBitmap so the GC reclaims memory promptly on iOS
  if (src.close) try { src.close(); } catch(e){}
  const blob = await new Promise((resolve,reject)=>{
    canvas.toBlob(b => b ? resolve(b) : reject(new Error("Canvas encode failed")),
                  "image/jpeg", quality);
  });
  logMsg("IMAGE","Resized photo to " + w + "x" + h +
                  " (" + Math.round(blob.size/1024) + " KB)");
  return blob;
}

/* Convert a Blob into a data URL. Used when we need a data URL
   (e.g. Anthropic vision API needs base64 strings). */
function blobToDataUrl(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error("Could not read blob"));
    r.readAsDataURL(blob);
  });
}
/* Convert a Blob into raw base64 (no data URL prefix). Used to
   stage binary file payloads for the GitHub Contents API. */
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => {
      // result is "data:<mime>;base64,<b64>" - strip the prefix
      const s = r.result || "";
      const comma = s.indexOf(",");
      resolve(comma >= 0 ? s.slice(comma+1) : s);
    };
    r.onerror = () => reject(new Error("Could not read blob"));
    r.readAsDataURL(blob);
  });
}
/* Convert base64 (no prefix) into a Blob of the given mime type. */
function base64ToBlob(b64, mime){
  const clean = (b64 || "").replace(/\s/g,"");
  const bin   = atob(clean);
  const arr   = new Uint8Array(bin.length);
  for (let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime || "application/octet-stream" });
}

/* Resize a photo down to a sane edge length before sending to the
   vision API. Keeps OCR legible while controlling token cost.
   Returns a data URL (the vision API needs base64 strings). */
async function resizeForOcr(file, maxEdge){
  // Slightly smaller default (1200) than the legacy 1568 - still legible
  // for OCR, much faster to encode, and noticeably easier on iOS memory.
  const blob = await resizeImageToBlob(file, maxEdge || 1200, 0.82);
  return await blobToDataUrl(blob);
}

/* Binary variants of the GitHub Contents API helpers for photo files.
   Photos are stored as JPEGs alongside the JSON data files in the same
   private repo. The Contents API uses base64 for ALL file payloads
   (binary or text), so the binary helpers are nearly identical to the
   JSON ones - they just take/return raw base64 instead of JSON. */

/* Fetch a file's RAW bytes (no base64) using the raw media type.
   This is meaningfully faster than ghGetBinaryFile for photos:
     - payload is ~25% smaller (no base64 inflation)
     - no client-side atob + Uint8Array decode (real CPU on a phone)
     - response.blob() is native
   Returns a Blob. Throws on 404/!ok. */
async function ghGetRawFile(cfg, path){
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  logMsg("GITHUB","GET raw " + path);
  let res;
  try {
    res = await fetch(url, { headers:{
      "Authorization":"Bearer " + cfg.githubToken,
      "Accept":"application/vnd.github.raw",
    }});
  } catch(err){
    logMsg("ERROR","GitHub GET raw network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 404){ throw new Error("Photo not found: " + path); }
  if (res.status === 401){ throw new Error("GitHub rejected the token (401)."); }
  if (!res.ok){
    logMsg("ERROR","GitHub GET raw " + path + " -> " + res.status);
    throw new Error("GitHub GET failed (" + res.status + ")");
  }
  return await res.blob();
}

async function ghGetBinaryFile(cfg, path){
  // Returns { found:true, base64, sha, mime } or { found:false }
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  logMsg("GITHUB","GET binary " + path);
  let res;
  try {
    res = await fetch(url, { headers:{
      "Authorization":"Bearer " + cfg.githubToken,
      "Accept":"application/vnd.github+json",
    }});
  } catch(err){
    logMsg("ERROR","GitHub GET binary network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 404){
    logMsg("GITHUB",path + " not found (404)");
    return { found:false };
  }
  if (res.status === 401){
    throw new Error("GitHub rejected the token (401). Check your token in Settings.");
  }
  if (!res.ok){
    const body = await res.text().catch(()=> "");
    logMsg("ERROR","GitHub GET binary " + path + " -> " + res.status + " " + body.slice(0,120));
    throw new Error("GitHub GET failed (" + res.status + ")");
  }
  const json = await res.json();
  return { found:true, base64:(json.content || "").replace(/\s/g,""), sha:json.sha };
}

async function ghPutBinaryFile(cfg, path, blob, sha){
  // Uploads a Blob (jpeg/png/etc) to the given path. sha required when updating.
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  const b64 = await blobToBase64(blob);
  const body = {
    message:"Update " + path + " via Dining Log",
    content: b64,
  };
  if (sha) body.sha = sha;
  logMsg("GITHUB","PUT binary " + path + " (" + Math.round(blob.size/1024) + " KB)" +
                  (sha ? " (update)" : " (create)"));
  let res;
  try {
    res = await fetch(url, {
      method:"PUT",
      headers:{
        "Authorization":"Bearer " + cfg.githubToken,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json",
      },
      body:JSON.stringify(body),
    });
  } catch(err){
    logMsg("ERROR","GitHub PUT binary network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 409){
    logMsg("GITHUB","PUT binary " + path + " conflict (409)");
    const err = new Error("conflict"); err.conflict = true; throw err;
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","GitHub PUT binary " + path + " -> " + res.status + " " + txt.slice(0,140));
    throw new Error("GitHub PUT failed (" + res.status + ")");
  }
  const json = await res.json();
  logMsg("GITHUB","Saved binary " + path + " (new sha " + json.content.sha.slice(0,7) + ")");
  return json.content.sha;
}

/* ============================================================
   PHOTO CACHE  (two tiers)
   ============================================================
   Tier 1 - in-memory Map (PHOTO_CACHE): path -> Promise<blobUrl>.
            Survives only the current session; dedupes concurrent
            requests for the same path.
   Tier 2 - IndexedDB (idb*): path -> Blob, persisted to disk.
            Survives app restarts and works OFFLINE for photos
            already viewed once. This is the big win for "slow
            loading" - after the first view, a photo loads instantly
            from local disk instead of round-tripping to GitHub.

   Lookup order on display: memory -> IndexedDB -> GitHub (raw bytes).
   On a GitHub fetch we write the blob into IndexedDB for next time.
   Object URLs are never revoked (bounded by unique paths viewed),
   keeping a few MB of URLs alive for the session. */

const IDB_NAME  = "dininglog";
const IDB_STORE = "photos";
let _idbPromise = null;
function idbOpen(){
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve) => {
    if (!("indexedDB" in window)){ resolve(null); return; }
    let req;
    try { req = indexedDB.open(IDB_NAME, 1); }
    catch(e){ logMsg("ERROR","IndexedDB open threw: " + e.message); resolve(null); return; }
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE, { keyPath:"path" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => { logMsg("ERROR","IndexedDB open failed"); resolve(null); };
  });
  return _idbPromise;
}
async function idbGetBlob(path){
  const db = await idbOpen();
  if (!db) return null;
  return new Promise((resolve) => {
    try {
      const tx  = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(path);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror   = () => resolve(null);
    } catch(e){ resolve(null); }
  });
}
async function idbPutBlob(path, blob){
  const db = await idbOpen();
  if (!db) return;
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put({ path:path, blob:blob, cachedAt:Date.now() });
      tx.oncomplete = () => resolve();
      tx.onerror    = () => resolve();
    } catch(e){ resolve(); }
  });
}

const PHOTO_CACHE = new Map();   // path -> Promise<blobUrl>
function getPhotoBlobUrl(cfg, path){
  if (!path) return Promise.resolve(null);
  if (PHOTO_CACHE.has(path)) return PHOTO_CACHE.get(path);
  const p = (async () => {
    // Tier 2: persistent disk cache (instant, offline-friendly)
    try {
      const cached = await idbGetBlob(path);
      if (cached){
        logMsg("IMAGE","Photo from local cache: " + path);
        return URL.createObjectURL(cached);
      }
    } catch(e){ /* fall through to network */ }
    // Tier 3: fetch raw bytes from GitHub
    if (!cfg || !cfg.githubToken) throw new Error("Not connected to GitHub");
    const blob = await ghGetRawFile(cfg, path);
    // persist for next time (fire and forget - don't block render)
    idbPutBlob(path, blob).catch(()=>{});
    return URL.createObjectURL(blob);
  })().catch(err => {
    // drop from memory cache so a later view retries
    PHOTO_CACHE.delete(path);
    throw err;
  });
  PHOTO_CACHE.set(path, p);
  return p;
}
/* Drop a path from the in-memory cache (e.g. after re-uploading a
   restaurant photo so the next render uses the new object URL). The
   IndexedDB copy is overwritten by seedPhoto's put, so no delete needed. */
function invalidatePhoto(path){
  if (path && PHOTO_CACHE.has(path)) PHOTO_CACHE.delete(path);
}
/* Pre-seed both cache tiers with a freshly resized blob - lets the UI
   show a just-uploaded photo instantly, and persists it so it stays
   instant on later sessions without ever fetching from GitHub. */
function seedPhoto(path, blob){
  if (!path || !blob) return;
  const url = URL.createObjectURL(blob);
  PHOTO_CACHE.set(path, Promise.resolve(url));
  idbPutBlob(path, blob).catch(()=>{});
}

/* ============================================================
   PHOTO PATHS
   ============================================================ */

/* ============================================================
   MENUS MIGRATION
   ============================================================
   Older versions stored one menu per restaurant as an object:
     menus[rid] = { sections, ... }
   v1.3+ supports multiple menus per restaurant as an array:
     menus[rid] = [ { menu_id, label, sections, ... }, ... ]
   This walks the menus map, wraps any single-menu objects in arrays,
   and assigns menu_id/label defaults so the data is uniform.
   Returns { menus: migratedMap, changed: bool }.
   ============================================================ */
function migrateMenusShape(menusObj){
  const next = {};
  let changed = false;
  for (const rid in (menusObj || {})){
    const m = menusObj[rid];
    if (Array.isArray(m)){
      // already new format - just ensure each menu has menu_id + label
      next[rid] = m.map(item => {
        if (!item || typeof item !== "object") return item;
        if (item.menu_id && item.label) return item;
        changed = true;
        return Object.assign({}, item, {
          menu_id: item.menu_id || uid("menu"),
          label:   item.label   || "Main",
        });
      });
    } else if (m && typeof m === "object"){
      // legacy single-menu object - wrap in an array
      changed = true;
      next[rid] = [Object.assign({}, m, {
        menu_id: m.menu_id || uid("menu"),
        label:   m.label   || "Main",
      })];
    } else {
      next[rid] = [];
    }
  }
  return { menus: next, changed: changed };
}

/* ============================================================
   GITHUB DATA LAYER
   ============================================================ */
async function ghGetFile(cfg, path){
  // Returns { found:true, data, sha } or { found:false }.
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  logMsg("GITHUB","GET " + path);
  let res;
  try {
    res = await fetch(url, { headers:{
      "Authorization":"Bearer " + cfg.githubToken,
      "Accept":"application/vnd.github+json",
    }});
  } catch(err){
    logMsg("ERROR","GitHub GET network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 404){ logMsg("GITHUB",path + " not found (404)"); return { found:false }; }
  if (res.status === 401){ throw new Error("GitHub rejected the token (401). Check your token in Settings."); }
  if (!res.ok){
    const body = await res.text().catch(()=> "");
    logMsg("ERROR","GitHub GET " + path + " -> " + res.status + " " + body.slice(0,120));
    throw new Error("GitHub GET failed (" + res.status + ")");
  }
  const json = await res.json();
  const text = b64ToUtf8(json.content);
  let data;
  try { data = JSON.parse(text); }
  catch(e){
    logMsg("ERROR","Could not parse JSON from " + path + ": " + e.message);
    throw new Error("Stored file " + path + " is not valid JSON");
  }
  logMsg("GITHUB","Loaded " + path + " (sha " + json.sha.slice(0,7) + ")");
  return { found:true, data:data, sha:json.sha };
}

async function ghPutFile(cfg, path, dataObj, sha){
  // Creates or updates a file. sha must be supplied when updating.
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  const body = {
    message:"Update " + path + " via Dining Log",
    content:utf8ToB64(JSON.stringify(dataObj,null,2)),
  };
  if (sha) body.sha = sha;
  logMsg("GITHUB","PUT " + path + (sha ? " (update)" : " (create)"));
  let res;
  try {
    res = await fetch(url, {
      method:"PUT",
      headers:{
        "Authorization":"Bearer " + cfg.githubToken,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json",
      },
      body:JSON.stringify(body),
    });
  } catch(err){
    logMsg("ERROR","GitHub PUT network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 409){
    // sha is stale - signal caller to refetch and retry
    logMsg("GITHUB","PUT " + path + " conflict (409) - sha is stale");
    const err = new Error("conflict"); err.conflict = true; throw err;
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","GitHub PUT " + path + " -> " + res.status + " " + txt.slice(0,140));
    throw new Error("GitHub PUT failed (" + res.status + ")");
  }
  const json = await res.json();
  logMsg("GITHUB","Saved " + path + " (new sha " + json.content.sha.slice(0,7) + ")");
  return json.content.sha;
}

/* ============================================================
   ANTHROPIC VISION - menu digitization
   ============================================================ */
async function digitizeMenu(cfg, dataUrls){
  // dataUrls: array of "data:image/jpeg;base64,..." strings.
  const prompt =
    "You are a menu digitization assistant. Extract the COMPLETE menu from the "+
    "attached photo(s) into structured JSON. The photos may be multiple pages or "+
    "sections of the SAME restaurant menu - merge them into one menu.\n\n"+
    "Return ONLY valid JSON. No markdown, no commentary. Keep the response "+
    "compact so it is not truncated. Schema:\n"+
    '{"restaurant_name": string or null, "sections":[{"name":string,'+
    '"items":[{"name":string,"description":string,"price":string,'+
    '"tags":[string],"notes":string,"calories":number or null}]}]}\n\n'+
    "Rules:\n"+
    "- price: a string exactly as printed (e.g. \"$12.95\", \"6.25 ea / 2 for 11.50\", "+
    "\"MP\"); empty string if none.\n"+
    "- description: the ingredient or description line; empty string if none.\n"+
    "- tags: include any of \"gluten-free\",\"vegetarian\",\"vegan\",\"spicy\",\"raw\" "+
    "that the menu indicates (a 'gf' mark means gluten-free); empty array if none.\n"+
    "- notes: anything extra about an item; usually empty.\n"+
    "- calories: ONLY if the menu explicitly prints a calorie number for THIS "+
    "item (e.g. \"850 cal\", \"850 Cal\", \"850 kcal\"); otherwise null. Never "+
    "guess or estimate a calorie count yourself.\n"+
    "- Use the section headings printed on the menu.\n"+
    "- An ITEM is something the customer orders (a dish, a board, a drink). "+
    "Do NOT promote individual ingredients or components into their own items. "+
    "If a charcuterie board lists \"goat cheese, prosciutto, olives\" as its "+
    "components, those go in the parent item's description - they are NOT "+
    "separate items. The same ingredient may legitimately appear inside the "+
    "descriptions of multiple dishes; that is fine and expected.\n"+
    "- Only digitize actual food and drink menus. Ignore unrelated pages such "+
    "as advertisements, brochures, or directories of other businesses.\n"+
    "- If text is unclear, give your best reading.";

  const content = dataUrls.map(u => ({
    type:"image",
    source:{ type:"base64", media_type:"image/jpeg", data:u.split(",")[1] },
  }));
  content.push({ type:"text", text:prompt });

  logMsg("VISION","Sending " + dataUrls.length + " image(s) to " + VISION_MODEL);
  let res;
  try {
    res = await fetch(ANTHROPIC_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":cfg.anthropicKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:VISION_MODEL,
        max_tokens:32000,
        messages:[{ role:"user", content:content }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Anthropic network failure: " + err.message);
    throw new Error("Network error reaching the Anthropic API");
  }
  if (res.status === 401){ throw new Error("Anthropic rejected the API key (401). Check it in Settings."); }
  if (res.status === 429){ throw new Error("Anthropic rate limit hit (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Anthropic -> " + res.status + " " + txt.slice(0,180));
    throw new Error("Anthropic API error (" + res.status + ")");
  }
  const json = await res.json();
  // If the model ran out of output budget the JSON will be incomplete -
  // catch that here so the user gets a clear message, not a parse error.
  if (json.stop_reason === "max_tokens"){
    logMsg("ERROR","Vision response stopped at max_tokens - menu too large for one pass");
    throw new Error("This menu was too large to digitize in one pass. " +
                    "Try splitting it into separate labeled menus - for example, " +
                    "scan the food pages as one menu, cocktails as another, the " +
                    "whiskey list as a third. Use 'Add another menu' on the " +
                    "restaurant's page.");
  }
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  logMsg("VISION","Received response (" + text.length + " chars, stop=" +
         (json.stop_reason || "?") + ")");
  let parsed;
  try {
    parsed = parseJsonLoose(text);
  } catch(err){
    logMsg("ERROR","Could not parse vision JSON: " + err.message);
    throw new Error("The digitized menu came back incomplete or malformed. " +
                    "Try again, or scan fewer pages at once.");
  }
  if (!Array.isArray(parsed.sections)) throw new Error("Model response had no sections array");
  // normalize so downstream rendering is safe
  parsed.sections = parsed.sections.map(s => ({
    name:String(s.name || "Menu"),
    items:(s.items || []).map(it => {
      const item = {
        name:String(it.name || "").trim(),
        description:String(it.description || "").trim(),
        price:String(it.price || "").trim(),
        tags:Array.isArray(it.tags) ? it.tags.map(String) : [],
        notes:String(it.notes || "").trim(),
      };
      // stated calories printed on the menu -> treat as ACTUAL (menu_stated)
      const kc = Number(it.calories);
      if (isFinite(kc) && kc > 0){
        item.nutrition = {
          kcal:Math.round(kc), protein_g:0, carbs_g:0, fat_g:0,
          ingredients:[], foods:[], source:"menu_stated",
          confidence:"high", estimated_at:todayISO(), note:"",
        };
      }
      return item;
    }).filter(it => it.name),
  })).filter(s => s.items.length);
  parsed.raw_text = String(parsed.raw_text || "");
  return parsed;
}

/* ============================================================
   "HELP ME ORDER" - text Q&A against a digitized menu
   ============================================================ */

// Compact, readable serialization of a menu for the prompt. Text (not raw
// JSON) keeps the token count down and is easy for the model to read.
function menuToText(menu){
  const lines = [];
  (menu.sections || []).forEach(s => {
    lines.push("## " + (s.name || "Menu"));
    (s.items || []).forEach(it => {
      let line = "- " + it.name;
      if (it.price)       line += " (" + it.price + ")";
      if (it.description) line += ": " + it.description;
      if (it.tags && it.tags.length) line += " [tags: " + it.tags.join(", ") + "]";
      lines.push(line);
    });
  });
  return lines.join("\n");
}

// Recency-aware loved / disliked dish lists for ONE restaurant's visits.
// Mirrors the picks-card logic: a dish's MOST RECENT verdict wins. Returns
// empty lists when there is no history, so the caller degrades to menu-only.
function dishHistory(visits){
  const byDate = (visits || []).slice().sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    ((b.logged_at || 0) - (a.logged_at || 0)));
  const memo = new Map();                  // key -> { name, latest }
  byDate.forEach(v => (v.dishes || []).forEach(d => {
    if (!d || !d.name || !d.verdict) return;
    const k = d.name.trim().toLowerCase();
    if (!memo.has(k)) memo.set(k, { name:d.name, latest:d.verdict }); // newest-first
  }));
  const loved = [], disliked = [];
  memo.forEach(x => {
    if (x.latest === "again") loved.push(x.name);
    else if (x.latest === "skip") disliked.push(x.name);
  });
  return { loved, disliked };
}

// Ask Claude to recommend from THIS menu. `question` may be a question, a
// command ("give me something healthy"), or a mood ("craving something rich").
async function askMenu(cfg, restaurant, menu, visits, question){
  const rName    = (restaurant && restaurant.name) ? restaurant.name : "this restaurant";
  const menuText = menuToText(menu);
  const hist     = dishHistory(visits);
  const hasHist  = hist.loved.length > 0 || hist.disliked.length > 0;

  let prompt =
    "You are a warm, knowledgeable dining companion helping someone decide what "+
    "to order at " + rName + ". They will tell you what they want - it might be "+
    "a question (\"what's light here?\"), a request (\"give me something healthy\"), "+
    "or just a mood (\"I'm craving something rich\"). Recommend specific dishes "+
    "from THE MENU BELOW that fit.\n\n"+
    "Rules:\n"+
    "- Only recommend items that actually appear on the menu. Never invent dishes "+
    "or guess at things that are not listed.\n"+
    "- Suggest 2-3 options, each with a short reason. If nothing on the menu fits, "+
    "say so honestly and point to the closest thing.\n"+
    "- Be concise and conversational - a few sentences, not an essay. No headings, "+
    "no markdown.\n";

  if (hasHist){
    prompt +=
      "- Personal history at this restaurant (use only as a LIGHT hint, and only "+
      "if it is relevant to what they asked - do not force it in):\n";
    if (hist.loved.length)
      prompt += "    Dishes they previously LOVED: " + hist.loved.join("; ") + "\n";
    if (hist.disliked.length)
      prompt += "    Dishes they previously did NOT like: " + hist.disliked.join("; ") + "\n";
    prompt +=
      "  If one of their loved dishes genuinely fits their request, you may note "+
      "they enjoyed it before. Do not recommend a disliked dish unless they "+
      "explicitly ask for it. Always answer their actual request first.\n";
  }

  prompt +=
    "\nMENU:\n" + menuText +
    "\n\nTHE DINER SAYS: \"" + question + "\"";

  logMsg("ASK","Asking " + ASK_MODEL + " (menu " + menuText.length +
         " chars, history=" + (hasHist ? "yes" : "none") + ")");
  let res;
  try {
    res = await fetch(ANTHROPIC_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":cfg.anthropicKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:ASK_MODEL,
        max_tokens:700,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Ask network failure: " + err.message);
    throw new Error("Network error reaching the Anthropic API");
  }
  if (res.status === 401){ throw new Error("Anthropic rejected the API key (401). Check it in Settings."); }
  if (res.status === 429){ throw new Error("Anthropic rate limit hit (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Ask -> " + res.status + " " + txt.slice(0,180));
    throw new Error("Anthropic API error (" + res.status + ")");
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  logMsg("ASK","Received answer (" + text.length + " chars)");
  if (!text) throw new Error("The model returned an empty answer. Try rephrasing.");
  return text;
}

/* ============================================================
   MEAL PHOTO -> NUTRITION ESTIMATE
   ============================================================
   One vision call per photo. The result is stored on the visit so
   the same photo is never re-estimated (no recurring cost). The
   estimate is explicitly an ESTIMATE - shown labelled, editable,
   and never used to nag or score the user. */

function clampNum(v, min, max){
  let n = Number(v);
  if (!isFinite(n) || n < 0) n = 0;
  if (typeof min === "number" && n < min) n = min;
  if (typeof max === "number" && n > max) n = max;
  return Math.round(n);
}

// Normalize whatever the model returns into our stable nutrition shape.
// source / estimated_at are stamped by the caller, not the model.
function normalizeNutrition(raw){
  const conf = String(raw.confidence || "").toLowerCase();
  return {
    kcal:      clampNum(raw.kcal, 0, 20000),
    protein_g: clampNum(raw.protein_g, 0, 2000),
    carbs_g:   clampNum(raw.carbs_g, 0, 2000),
    fat_g:     clampNum(raw.fat_g, 0, 2000),
    ingredients: Array.isArray(raw.ingredients)
      ? raw.ingredients.map(s => String(s).trim()).filter(Boolean).slice(0,30) : [],
    foods: Array.isArray(raw.foods)
      ? raw.foods.map(s => String(s).trim()).filter(Boolean).slice(0,12) : [],
    confidence: (conf === "high" || conf === "medium" || conf === "low") ? conf : "medium",
    note: String(raw.note || "").trim().slice(0, 400),
  };
}

// Estimate nutrition from a photo File. Returns a normalized nutrition

  logMsg("NUTRI","Estimating nutrition from photo via " + VISION_MODEL);
  let res;
  try {
    res = await fetch(ANTHROPIC_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",

        model:VISION_MODEL,
        max_tokens:1500,

          { type:"image", source:{ type:"base64", media_type:"image/jpeg",
            data:dataUrl.split(",")[1] } },
          { type:"text", text:prompt },
        ]}],
      }),
    });
  } catch(err){
    logMsg("ERROR","Nutrition network failure: " + err.message);
    throw new Error("Network error reaching the Anthropic API");
  }
  if (res.status === 401){ throw new Error("Anthropic rejected the API key (401). Check it in Settings."); }
  if (res.status === 429){ throw new Error("Anthropic rate limit hit (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Nutrition -> " + res.status + " " + txt.slice(0,180));

    .filter(b => b.type === "text").map(b => b.text).join("\n");

  try { parsed = parseJsonLoose(text); }
  catch(err){
    logMsg("ERROR","Could not parse nutrition JSON: " + err.message);
    throw new Error("The estimate came back unreadable. Try another photo.");
  }
  const out = normalizeNutrition(parsed);
  logMsg("NUTRI","Estimate: " + out.kcal + " kcal, conf=" + out.confidence);
  return out;
}

// Estimate nutrition for a single MENU ITEM (text, grounded by its

    '  "fat_g": grams of fat (integer),\n'+
    '  "ingredients": [likely ingredients],\n'+
    '  "confidence": "low" | "medium" | "high",\n'+
    '  "note": one short sentence on the assumptions you made\n'+
    "}\n\n"+
    "If the description is sparse, estimate from the dish name and lower the "+
    "confidence. Base it on a typical single restaurant portion.";

  logMsg("NUTRI","Estimating item '" + item.name + "' via " + ASK_MODEL);
  let res;
  try {
    res = await fetch(ANTHROPIC_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":cfg.anthropicKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:ASK_MODEL,
        max_tokens:700,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Item nutrition network failure: " + err.message);
    throw new Error("Network error reaching the Anthropic API");
  }
  if (res.status === 401){ throw new Error("Anthropic rejected the API key (401). Check it in Settings."); }
  if (res.status === 429){ throw new Error("Rate limit hit (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Item nutrition -> " + res.status + " " + txt.slice(0,180));
    throw new Error("Anthropic API error (" + res.status + ")");
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  let parsed;
  try { parsed = parseJsonLoose(text); }
  catch(err){
    logMsg("ERROR","Could not parse item nutrition JSON: " + err.message);
    throw new Error("The estimate came back unreadable. Try again.");
  }
  const out = normalizeNutrition(parsed);
  logMsg("NUTRI","Item estimate: " + out.kcal + " kcal, conf=" + out.confidence);
  return out;
}
