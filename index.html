}

// Discover tab: the calm home for the recap surfaces (Year in Food, Food
// passport) and the badges. Each badge is paired with a quiet "doorway" action
// that opens the thing it is about - an inviting button, never a "go earn this"
// nag. Earned state is derived the same pure way Settings used to compute it.
function DiscoverView({ restaurants, visits, menus, lists, meta, splits,
                        onOpenYearInFood, onOpenPassport,
                        onScanMenu, onLogVisit, onAddPlace, onPublishList, onShareApp,
                        onOpenSplit, onNewSplit, onDeleteSplit }){
  const [confirmDel, setConfirmDel] = useState(null);   // split id pending delete confirm
  const earnedIds = earnedBadgeIds({ restaurants, visits, menus, lists, meta });
  // Badge id -> its doorway action. Keep labels matching the real entry points.
  const ACTIONS = {
    "first-scan":  { label:"Scan a menu",    on:onScanMenu },
    "ten-visits":  { label:"Log a visit",    on:onLogVisit },
    "five-cities": { label:"Add a place",    on:onAddPlace },
    "first-list":  { label:"Publish a list", on:onPublishList },
    "share-love":  { label:"Share the Love", on:onShareApp, heart:true },
  };
  return (
    <div>
      <div className="set-group" style={{marginTop:6}}>Your journey</div>
      <div className="yif-entry tap" onClick={onOpenYearInFood}>
        <span className="yif-entry-ic"><Icon name="sparkle" size={16} color="var(--accent)" /></span>
        <span className="yif-entry-tx">
          <span className="yif-entry-t">Your Year in Food</span>
          <span className="yif-entry-s">A look back at your places and dishes</span>
        </span>
        <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
          <Icon name="back" size={15} color="var(--text-faint)" />
        </span>
      </div>
      <div className="yif-entry tap" onClick={onOpenPassport}>
        <span className="yif-entry-ic"><Icon name="image" size={16} color="var(--accent)" /></span>
        <span className="yif-entry-tx">
          <span className="yif-entry-t">Food passport</span>
          <span className="yif-entry-s">A photo timeline of your visits</span>
        </span>
        <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
          <Icon name="back" size={15} color="var(--text-faint)" />
        </span>
      </div>

      <div className="set-group" style={{marginTop:18}}>Your splits</div>
      <div className="card">
        {(!splits || !splits.length) ? (
          <div className="badge-row">
            <div className="badge-rtx">
              <div className="badge-name">No saved splits yet</div>
              <div className="badge-sub">Split a check, then tap Save to keep it here.</div>
            </div>
            {onNewSplit ? (
              <button className="btn ghost badge-act" onClick={onNewSplit}>Split a check</button>
            ) : null}
          </div>
        ) : (
          splits.slice().sort((a,b)=> (b.updated_at||0) - (a.updated_at||0)).map(s => {
            const money = n => "$" + (Number(n) || 0).toFixed(2);
            const grand = s.summary ? s.summary.grand : null;
            const np = (s.summary && Array.isArray(s.summary.people)) ? s.summary.people.length : 0;
            const sub = [grand != null ? money(grand) : null,
                         np ? (np + (np === 1 ? " person" : " people")) : null]
                        .filter(Boolean).join(" · ");
            return (
              <div key={s.id} className="badge-row tap" onClick={()=> onOpenSplit && onOpenSplit(s)}>
                <div className="badge-ic"><Icon name="receipt" size={20} color="var(--accent)" /></div>
                <div className="badge-rtx">
                  <div className="badge-name">{s.label || "Check split"}</div>
                  <div className="badge-sub">{sub || "Tap to open"}</div>
                </div>
                {confirmDel === s.id ? (
                  <span style={{display:"inline-flex",gap:6,flex:"none"}}>
                    <button className="btn ghost badge-act"
                      onClick={(e)=>{ e.stopPropagation(); setConfirmDel(null); }}>Cancel</button>
                    <button className="btn danger badge-act"
                      onClick={(e)=>{ e.stopPropagation(); setConfirmDel(null); if (onDeleteSplit) onDeleteSplit(s.id); }}>Delete</button>
                  </span>
                ) : (
                  <button className="btn ghost badge-act"
                    onClick={(e)=>{ e.stopPropagation(); setConfirmDel(s.id); }}>Delete</button>
                )}
              </div>
            );
          })
        )}
      </div>

      <div className="set-group" style={{marginTop:18}}>Your badges</div>
      <div className="card">
        {BADGES.map(b => {
          const got = earnedIds.indexOf(b.id) !== -1;
          const col = got ? "var(--accent)" : "var(--text-faint)";
          const act = ACTIONS[b.id];
          return (
            <div key={b.id} className={"badge-row" + (got ? "" : " locked")}>
              <div className="badge-ic"><Icon name={b.icon} size={22} color={col} /></div>
              <div className="badge-rtx">
                <div className="badge-name">{b.name}</div>
                <div className="badge-sub">{got ? b.earnedText : b.lockedText}</div>
              </div>
              {act ? (
                <button className="btn ghost badge-act" onClick={act.on}>
                  {act.label}
                  {act.heart ? <span style={{marginLeft:5, display:"inline-flex"}}>
                    <Icon name="heart" size={14} color="var(--accent)" /></span> : null}
                </button>
              ) : null}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Collapsible "Check split" block shown on a visit that has a saved split.
// Renders nothing when there is no split, so it is safe to drop on every card.
function VisitSplit({split}){
  const [open, setOpen] = useState(false);
  if (!split || !Array.isArray(split.people) || !split.people.length) return null;
  const money = n => "$" + (Number(n) || 0).toFixed(2);
  return (
    <div className="vsplit">
      <button className="vsplit-head" onClick={(e)=>{ e.stopPropagation(); setOpen(o => !o); }}>
        <span>Check split{split.grand ? " - " + money(split.grand) : ""}</span>
        <Icon name={open ? "chevd" : "chev"} size={15} />
      </button>
      {open ? (
        <div className="vsplit-body">
          {split.people.map((p,i)=>(
            <div key={i} className="spl-res">
              <div className="spl-nm">{p.name}</div>
              <div className="spl-amt">{money(p.amount)}</div>
            </div>
          ))}
        </div>
      ) : null}
    </div>
  );
}

function HistoryView({visits, restaurantById, cfg, syncing, onOpen, onOpenYearInFood, onOpenPassport, onSplitVisit}){
  const [query, setQuery] = useState("");
  const [sortBy, setSortBy] = useState("newest");
  if (!visits.length){
    // WHY: visits starts empty before the first data load completes. Show a
    // neutral loading state so users don't see "No visits yet" on sign-in.
    if (syncing) return (
      <div className="empty">
        <span className="spin" />
      </div>
    );
    return (
      <div className="empty">
        <div className="big">No visits yet</div>
        <div>Tap the + button to log your first meal.</div>
      </div>
    );
  }
  // History sort: Newest (default), Oldest, Highest rated, or Restaurant A-Z.
  // Every comparator falls back to newest-first so ties have a stable order.
  const byNewest = (a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    (b.logged_at || 0) - (a.logged_at || 0);
  const ratingOf = (v)=> (typeof v.rating === "number" ? v.rating : -1);
  const histName = (v)=> {
    const rr = restaurantById(v.restaurant_id);
    return (rr ? rr.name : (v.restaurant_name || "")).toLowerCase();
  };
  const cmp =
    sortBy === "oldest"     ? (a,b)=> -byNewest(a,b) :
    sortBy === "rating"     ? (a,b)=> (ratingOf(b) - ratingOf(a)) || byNewest(a,b) :
    sortBy === "restaurant" ? (a,b)=> histName(a).localeCompare(histName(b)) || byNewest(a,b) :
                              byNewest;
  const sorted = visits.slice().sort(cmp);
  const q = query.trim().toLowerCase();
  const filtered = q ? sorted.filter(v => {
    const rr = restaurantById(v.restaurant_id);
    const hay = ((rr ? rr.name : (v.restaurant_name || "")) + " " +
      (v.dishes || []).map(d => d.name || "").join(" ") + " " +
      (v.notes || "")).toLowerCase();
    return hay.includes(q);
  }) : sorted;
  return (
    <div>
      <SearchBar value={query} onChange={setQuery}
        placeholder="Search visits, dishes, notes" />
      <div className="sortbar">
        <span className="sortbar-lbl">Sort</span>
        <span className={"chip pick" + (sortBy === "newest" ? " on" : "")} onClick={()=> setSortBy("newest")}>Newest</span>
        <span className={"chip pick" + (sortBy === "oldest" ? " on" : "")} onClick={()=> setSortBy("oldest")}>Oldest</span>
        <span className={"chip pick" + (sortBy === "rating" ? " on" : "")} onClick={()=> setSortBy("rating")}>Highest rated</span>
        <span className={"chip pick" + (sortBy === "restaurant" ? " on" : "")} onClick={()=> setSortBy("restaurant")}>Restaurant</span>
      </div>
      <div className="hist-legend">
        <InfoDot title="Calorie labels" label="Calorie labels">
          <span className="idl"><strong>~320 cal</strong> &mdash; an estimate (the ~ means estimated).</span>
          <span className="idl"><strong>850 cal, per menu</strong> &mdash; a real number printed on the menu.</span>
          <span className="idl"><strong>EST</strong> &mdash; estimated. <strong>9P / 22C / 22F</strong> &mdash; grams of protein, carbs, and fat.</span>
          <span className="idl">These numbers are here for memory and curiosity &mdash; never a budget.</span>
        </InfoDot>
      </div>
      {!q && onOpenYearInFood && (
        <div className="yif-entry tap" onClick={onOpenYearInFood}>
          <span className="yif-entry-ic"><Icon name="sparkle" size={16} color="var(--accent)" /></span>
          <span className="yif-entry-tx">
            <span className="yif-entry-t">Your Year in Food</span>
            <span className="yif-entry-s">A look back at your places and dishes</span>
          </span>
          <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
            <Icon name="back" size={15} color="var(--text-faint)" />
          </span>
        </div>
      )}
      {!q && onOpenPassport && (
        <div className="yif-entry tap" onClick={onOpenPassport}>
          <span className="yif-entry-ic"><Icon name="image" size={16} color="var(--accent)" /></span>
          <span className="yif-entry-tx">
            <span className="yif-entry-t">Food passport</span>
            <span className="yif-entry-s">A photo timeline of your visits</span>
          </span>
          <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
            <Icon name="back" size={15} color="var(--text-faint)" />
          </span>
        </div>
      )}
      {filtered.length === 0 ? (
        <div className="empty" style={{padding:"30px 20px"}}>
          <div className="big">No matches</div>
          <div>Nothing logged matches that search.</div>
        </div>
      ) : filtered.map(v => {
        const r = restaurantById(v.restaurant_id);
        const photos = Array.isArray(v.photos) ? v.photos.filter(Boolean) : [];
        return (
          <div key={v.id} className="card tap" onClick={()=> onOpen(v)}>
            {photos.length > 0 && (
              <div className="visit-photos" style={{marginTop:0,marginBottom:11}}>
                {photos.map((p,i)=> (
                  <div key={i} className="visit-photo">
                    <PhotoImg cfg={cfg} path={p} />
                  </div>
                ))}
              </div>
            )}
            <div className="between">
              <div className="place-name">{r ? r.name : (v.restaurant_name || "Unknown")}</div>
              {v.rating ? <Stars value={v.rating} showNum /> : null}
            </div>
            <div className="meta-line" style={{marginTop:4}}>
              {fmtDate(v.date)} &nbsp;&middot;&nbsp; {relDays(v.date)}
            </div>
            {v.dishes && v.dishes.length > 0 && (
              <div className="chips">
                {v.dishes.map((d,i)=> (
                  <span key={i} className={"chip dish" +
                    (d.verdict==="again" ? " again" : d.verdict==="skip" ? " skip" : "")}>
                    {d.name}{dishShareLabel(d)}{d.nutrition && d.nutrition.kcal ? " \u00b7 ~" + dishKcalNum(d) : ""}
                  </span>
                ))}
              </div>
            )}
            <DishTotal dishes={v.dishes} />
            <NutriLine n={v.nutrition} />
            {v.notes && <div className="small muted" style={{marginTop:9}}>{v.notes}</div>}
            <ReceiptReveal cfg={cfg} receipt={v.receipt} />
            <VisitSplit split={v.split} />
            {onSplitVisit && ((v.receipt && v.receipt.total) || (v.dishes||[]).some(d=>parsePrice(d.price))) ? (
              <button className="btn ghost sm" style={{marginTop:9}} onClick={(e)=>{ e.stopPropagation(); onSplitVisit(v); }}>Split the check</button>
            ) : null}
          </div>
        );
      })}
    </div>
  );
}

// ===== Map view =========================================================
// Full-screen overlay showing your places on an OpenStreetMap map.
//  - Plots every restaurant that already has cached coordinates immediately.
//  - Lazily geocodes any with an address but no/stale coords, one at a time,
//    >= 1.1s apart (Nominatim policy), adding pins as they resolve.
//  - Persists new coords back up via onSaveCoords (one batched commit), and
//    also flushes on unmount so partial progress is never lost.
// Leaflet (global L) renders; if it failed to load we degrade gracefully.
function MapView({ restaurants, cityFilter, cfg, onOpen, onClose, onSaveCoords }){
  const divRef   = useRef(null);
  const mapRef   = useRef(null);
  const layerRef = useRef(null);
  const savedRef = useRef({});                 // {id: coordUpdate} pending persist
  const [places, setPlaces]     = useState(function(){ return restaurants.slice(); });
  const [progress, setProgress] = useState(null);   // {done,total} while backfilling
  const leafletReady = typeof L !== "undefined";

  // apply the same city filter the Places tab had active
  const filtered = (!cityFilter || cityFilter === "All")
    ? places
    : (cityFilter === "(no location)"
        ? places.filter(function(r){ return !r.location; })
        : places.filter(function(r){ return r.location === cityFilter; }));

  function flushSaves(){
    const ups = savedRef.current;
    if (ups && Object.keys(ups).length){
      onSaveCoords(Object.assign({}, ups));
      savedRef.current = {};
    }
  }

  // init the Leaflet map once
  useEffect(function(){
    if (!leafletReady || !divRef.current) return;
    const map = L.map(divRef.current, { zoomControl:true, attributionControl:true });
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19, attribution:"&copy; OpenStreetMap contributors"
    }).addTo(map);
    map.setView([20, 0], 2);
    layerRef.current = L.layerGroup().addTo(map);
    mapRef.current = map;
    logMsg("MAP", "Leaflet map initialised");
    // container is sized by flex CSS after mount; nudge Leaflet to re-measure
    setTimeout(function(){ try { map.invalidateSize(); } catch(e){} }, 60);
    return function(){ try { map.remove(); } catch(e){} mapRef.current = null; };
  }, [leafletReady]);

  // (re)draw markers whenever the filtered set changes
  useEffect(function(){
    const map = mapRef.current, layer = layerRef.current;
    if (!map || !layer) return;
    layer.clearLayers();
    const pts = [];
    filtered.forEach(function(r){
      if (r.lat == null || r.lng == null) return;
      const m = L.circleMarker([r.lat, r.lng], {
        radius:8, weight:2,
        color:     r.favorite ? "#e0764a" : "#9b8b78",
        fillColor: r.favorite ? "#e0764a" : "#c9b8a8",
        fillOpacity:0.85
      });
      const el = document.createElement("div");
      el.className = "mappop";
      el.innerHTML =
        "<div class='mappop-name'>" + escapeHtml(r.name) + "</div>" +
        (r.cuisine ? "<div class='mappop-sub'>" + escapeHtml(r.cuisine) + "</div>" : "") +
        "<button class='mappop-open'>Open</button>";
      const btn = el.querySelector(".mappop-open");
      if (btn) btn.addEventListener("click", function(){ onOpen(r); });
      m.bindPopup(el);
      m.addTo(layer);
      pts.push([r.lat, r.lng]);
    });
    if (pts.length){
      try { map.fitBounds(pts, { padding:[40,40], maxZoom:15 }); } catch(e){}
    }
  }, [filtered]);

  // lazy geocode backfill - runs once when the map opens
  useEffect(function(){
    if (!leafletReady) return;
    let cancelled = false;
    (async function(){
      const need = restaurants.filter(geoNeedsUpdate);
      if (!need.length){ logMsg("MAP", "No restaurants need geocoding"); return; }
      logMsg("MAP", "Backfill geocoding " + need.length + " place(s)");
      setProgress({ done:0, total:need.length });
      for (let i=0;i<need.length;i++){
        if (cancelled) break;
        const r = need[i];
        let upd = null;
        try {
          const hit = await geocodeAddress(r.address, false);
          upd = hit
            ? { lat:hit.lat, lng:hit.lng, geo_addr:r.address, geo_ok:true,  geo_failed:false }
            : { lat:null,    lng:null,    geo_addr:r.address, geo_ok:false, geo_failed:true  };
        } catch(e){
          upd = null;   // transient (network) - leave unmarked so we retry later
          logMsg("MAP", "Geocode error for " + r.name + ": " + e.message);
        }
        if (upd && !cancelled){
          savedRef.current[r.id] = upd;
          setPlaces(function(prev){
            return prev.map(function(p){ return p.id === r.id ? Object.assign({}, p, upd) : p; });
          });
        }
        if (!cancelled) setProgress({ done:i+1, total:need.length });
        if (i < need.length - 1) await sleep(1100);   // <= 1 request / second
      }
      if (!cancelled){ setProgress(null); flushSaves(); }
    })();
    return function(){ cancelled = true; flushSaves(); };
  }, [leafletReady]);  // eslint-disable-line

  const mapped     = filtered.filter(function(r){ return r.lat != null && r.lng != null; }).length;
  const noAddr     = filtered.filter(function(r){ return !r.address || !r.address.trim(); }).length;
  const failed     = filtered.filter(function(r){ return r.geo_failed && (!r.lat || !r.lng); }).length;
  const notMapped  = noAddr + failed;

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}>Back</button>
        <h2>Map</h2>
        <span style={{width:54}} />
      </div>
      <div className="map-body">
        {!leafletReady && (
          <div className="empty" style={{padding:"40px 22px"}}>
            <div className="big">Map unavailable</div>
            <div>The map library could not load. Check your connection and reopen.</div>
          </div>
        )}
        {leafletReady && <div ref={divRef} className="map-canvas" />}
        {leafletReady && (
          <div className="map-foot">
            {progress
              ? <span className="row" style={{gap:8}}>
                  <span className="spin" /> Locating your places&hellip; {progress.done} of {progress.total}
                </span>
              : <span>{mapped} {mapped===1?"place":"places"} on the map</span>}
            {notMapped > 0 && !progress && (
              <span className="faint">
                {notMapped} not mapped{noAddr>0 ? " (" + noAddr + " without an address)" : ""}
              </span>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


function RestaurantsView({restaurants, visits, locations, cfg, activeFilter, onFilterChange, onOpenMap, onPublishList, onOpenMyLists, savedListCount, onOpen}){
  const [query, setQuery] = useState("");
  const [sortBy, setSortBy] = useState("alpha");
  if (!restaurants.length){
    return (
      <div className="empty">
        <div className="big">No places yet</div>
        <div>Add a restaurant or scan a menu from the + button.</div>
      </div>
    );
  }
  const countVisits = (id)=> visits.filter(v => v.restaurant_id === id).length;

  // collect all city values actually in use (in case a restaurant has a
  // location that was deleted from the master list), plus the master list
  const inUse = Array.from(new Set(restaurants.map(r => (r.location || "").trim()).filter(Boolean)));
  const cityChips = Array.from(new Set([].concat(locations || []).concat(inUse)))
    .sort((a,b)=> a.localeCompare(b));

  const filter = activeFilter || "All";
  const visible = filter === "All"
    ? restaurants
    : filter === "(no location)"
      ? restaurants.filter(r => !r.location)
      : restaurants.filter(r => r.location === filter);

  const q = query.trim().toLowerCase();
  const searched = q ? visible.filter(r =>
    ((r.name || "") + " " + (r.cuisine || "") + " " + (r.location || ""))
      .toLowerCase().includes(q)
  ) : visible;

  const byName = (a,b)=> (a.name || "").localeCompare(b.name || "");
  const favsSorted   = searched.filter(r => r.favorite).sort(byName);
  const othersSorted = searched.filter(r => !r.favorite).sort(byName);
  const ordered = sortBy === "added"
    ? [...searched].sort((a,b)=> (b.added_date || "").localeCompare(a.added_date || "") || byName(a,b))
    : [...searched].sort(byName);  // "alpha"

  const Card = (r)=> (
    <div key={r.id} className="card tap" onClick={()=> onOpen(r)}
      style={{display:"flex",alignItems:"center",gap:0}}>
      {r.photo ? (
        <div className="rest-thumb">
          <PhotoImg cfg={cfg} path={r.photo} />
        </div>
      ) : (
        <div className="rest-thumb photo-shell">
          <Icon name="image" size={18} color="#5a5045" />
        </div>
      )}
      <div className="between" style={{flex:1,minWidth:0}}>
        <div style={{minWidth:0}}>
          <div className="place-name">{r.name}</div>
          <div className="meta-line" style={{marginTop:4}}>
            {r.cuisine || "Restaurant"}
            {r.location ? "  \u00b7  " + r.location : ""}
            {countVisits(r.id) > 0 ? "  \u00b7  " + countVisits(r.id) + " visit(s)" : ""}
          </div>
        </div>
        <span className={"fav" + (r.favorite ? " on" : "")}>
          <Icon name="star" size={20} color={r.favorite ? "#e0764a" : "#80715f"} />
        </span>
      </div>
    </div>
  );

  // only show chips if there is something worth filtering by
  const showChips = cityChips.length > 0;
  const hasUnplaced = restaurants.some(r => !r.location);

  // One-tap "share my [city] spots": only when a real city filter is active
  // (not All, not the no-location bucket). Publishes a short list page into
  // the public app repo (nice preview card) and opens the share sheet; if
  // the page cannot be created, the long ?list= link is shared instead.
  const [cityShareBusy, setCityShareBusy] = useState(false);
  const isCityFilter = filter !== "All" && filter !== "(no location)";
  const shareCity = async ()=>{
    if (cityShareBusy) return;
    const places = visible;   // already scoped to the active city
    if (!places.length) return;
    setCityShareBusy(true);
    try {
      const title   = "My " + filter + " spots";
      const payload = buildListPayload(title, places, visits);
      const enc     = encodeListPayload(payload);
      const longUrl = location.origin + location.pathname + "?list=" + enc;
      logMsg("PUBLISH","City share \"" + title + "\" (" + places.length + " places)");
      let url = longUrl;
      try { const s = await publishListPage(cfg, payload, enc); if (s) url = s; }
      catch(e){ logMsg("WARN","City share publish failed: " + e.message); }
      if (navigator.share){
        try { await navigator.share({ title, text:"A few places I love:", url }); }
        catch(e){ /* user cancelled or unsupported */ }
      } else {
        try { await navigator.clipboard.writeText(url); alert("Link copied to clipboard."); }
        catch(e){ logMsg("WARN","City share clipboard failed: " + e.message); }
      }
    } finally {
      setCityShareBusy(false);
    }
  };

  return (
    <div>
      <ActiveGroupOrders cfg={cfg} />
      <SearchBar value={query} onChange={setQuery}
        placeholder="Search places, cuisine, city" />
      {onOpenMap && (
        <div className="between" style={{margin:"0 0 10px", flexWrap:"wrap", gap:8}}>
          <div className="row" style={{gap:8, flexWrap:"wrap"}}>
            {onPublishList && restaurants.length ? (
              <button className="btn ghost sm" onClick={onPublishList}>
                <Icon name="share" size={15} color="var(--accent)" />
                Publish a list
              </button>
            ) : null}
            {onOpenMyLists && savedListCount > 0 ? (
              <button className="btn ghost sm" onClick={onOpenMyLists}>
                <Icon name="book" size={15} color="var(--accent)" />
                My Lists
              </button>
            ) : null}
          </div>
          <button className="btn ghost sm map-open-btn" onClick={onOpenMap}>
            <Icon name="pin" size={15} color="var(--accent)" />
            Map
          </button>
        </div>
      )}
      {showChips && (
        <div className="chips" style={{margin:"2px 0 14px"}}>
          <span
            className={"chip pick" + (filter === "All" ? " on" : "")}
            onClick={()=> onFilterChange("All")}>All</span>
          {cityChips.map(c => (
            <span key={c}
              className={"chip pick" + (filter === c ? " on" : "")}
              onClick={()=> onFilterChange(c)}>{c}</span>
          ))}
          {hasUnplaced && (
            <span
              className={"chip pick" + (filter === "(no location)" ? " on" : "")}
              onClick={()=> onFilterChange("(no location)")}>No location</span>
          )}
        </div>
      )}

      {isCityFilter && visible.length > 0 && (
        <button className="btn ghost sm" onClick={shareCity} disabled={cityShareBusy}
                style={{margin:"0 0 14px"}}>
          {cityShareBusy
            ? <><span className="spin" /> Preparing link&hellip;</>
            : <><Icon name="share" size={15} color="var(--accent)" /> Share my {filter} spots</>}
        </button>
      )}

      <div className="sortbar">
        <span className="sortbar-lbl">Sort</span>
        <span className={"chip pick" + (sortBy === "alpha" ? " on" : "")} onClick={()=> setSortBy("alpha")}>A&ndash;Z</span>
        <span className={"chip pick" + (sortBy === "added" ? " on" : "")} onClick={()=> setSortBy("added")}>Recently added</span>
        <span className={"chip pick" + (sortBy === "fav" ? " on" : "")} onClick={()=> setSortBy("fav")}>Favorites</span>
      </div>

      {searched.length === 0 && (
        <div className="empty" style={{padding:"30px 20px"}}>
          <div className="big">{q ? "No matches" : "Nothing in " + filter}</div>
          <div>{q
            ? "No places match that search."
            : "Add a restaurant in this location, or pick a different filter."}</div>
        </div>
      )}

      {sortBy === "fav" ? (
        <>
          {favsSorted.length > 0 && <div className="divider-label">Favorites</div>}
          {favsSorted.map(Card)}
          {othersSorted.length > 0 && <div className="divider-label">All places</div>}
          {othersSorted.map(Card)}
        </>
      ) : ordered.map(Card)}
    </div>
  );
}

/* ============================================================
   RESTAURANT DETAIL
   ============================================================ */
function RestaurantDetail({restaurant, menus, visits, cfg, onClose, onLogVisit,
                           onEdit, onAddMenu, onOpenMenu, onOpenVisit,
                           onToggleFav, onDelete, onSaveItemNutrition, onSplitVisit}){
  const [confirmDel, setConfirmDel] = useState(false);
  const [shareBusy, setShareBusy]   = useState(false);
  const [mShareBusy, setMShareBusy] = useState(false);   // inline single-menu share
  const [showGroup, setShowGroup]   = useState(false);   // group-order start overlay
  const [mShareErr, setMShareErr]   = useState(null);
  if (!restaurant){
    return (
      <div className="overlay">
        <div className="ovhead"><h2>Not found</h2>
          <button className="x" onClick={onClose}>Close</button></div>
      </div>
    );
  }
  const r = restaurant;
  const menuList = menus || [];

  // ---- dish memory: what to order again here -------------------------
  // For each distinct dish (case-insensitive), we go by its MOST RECENT
  // verdict - the verdict from the latest visit where you actually rated it.
  // A later "skip" overrides an earlier "again" (and vice-versa); simply not
  // ordering a dish on a later visit does NOT count against it.
  //   lovedDishes: dishes whose most-recent verdict is "again", with a count
  //     of how many times you've marked that dish "again".
  //   lastVisit / lastVisitDishes: the single most recent visit's plate.
  const byDate = (visits || []).slice().sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    ((b.logged_at || 0) - (a.logged_at || 0))
  );
  // walk newest -> oldest; the FIRST time we meet a dish is its latest verdict
  const dishMemo = new Map();   // key -> { name, latestVerdict, againCount }
  byDate.forEach(v => (v.dishes || []).forEach(d => {
    if (!d || !d.name || !d.verdict) return;        // only verdict-bearing dishes
    const k = d.name.trim().toLowerCase();
    if (!dishMemo.has(k)){
      dishMemo.set(k, { name:d.name, latestVerdict:d.verdict, againCount:0 });
    }
    if (d.verdict === "again") dishMemo.get(k).againCount++;
  }));
  const lovedDishes = Array.from(dishMemo.values())
    .filter(x => x.latestVerdict === "again")
    .map(x => ({ name:x.name, count:x.againCount }))
    .sort((a,b)=> b.count - a.count || a.name.localeCompare(b.name));
  const lastVisit = byDate[0] || null;
  const lastVisitDishes = (lastVisit && lastVisit.dishes) ? lastVisit.dishes : [];
  const showPicks = lovedDishes.length > 0 || lastVisitDishes.length > 0;

  // Build a self-contained PNG card and hand it to the iOS share sheet.
  // No link, no repo access - just an image the recipient can keep.
  async function share(){
    if (shareBusy) return;
    setShareBusy(true);
    try {
      // make sure the web fonts are ready so canvas text uses Fraunces/Outfit
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
      // load the restaurant photo (reuses the cached blob URL; canvas-safe)
      let photoImg = null;
      if (r.photo && cfg){
        try {
          const u = await getPhotoBlobUrl(cfg, r.photo);
          photoImg = await loadImage(u);
        } catch(e){
          logMsg("SHARE","Photo unavailable for card, using plain header: " + e.message);
          photoImg = null;
        }
      }
      const rated = byDate.filter(v => typeof v.rating === "number" && v.rating > 0);
      const ratingAvg = rated.length ? rated.reduce((s,v)=> s + v.rating, 0) / rated.length : 0;
      const sub = [r.cuisine, r.location].filter(Boolean).join("  \u00b7  ");
      logMsg("SHARE","Building card for " + r.name + " (loved=" + lovedDishes.length + ", rating=" + ratingAvg.toFixed(1) + ")");
      const blob = await buildRestaurantCardBlob({
        name: r.name, sub: sub, ratingAvg: ratingAvg,
        address: r.address || "", loved: lovedDishes, photoImg: photoImg
      });
      const file = new File([blob], "menucaptain-" + slugify(r.name) + ".png", { type:"image/png" });
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        try {
          await navigator.share({ files:[file], title: r.name });
          logMsg("SHARE","Shared card via share sheet");
        } catch(e){
          // AbortError = user cancelled the sheet; not an error
          if (e && e.name !== "AbortError") logMsg("SHARE","Share sheet failed: " + e.message);
        }
      } else {
        // fallback: download the PNG so the user can save/send it manually
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = u; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=> URL.revokeObjectURL(u), 2000);
        logMsg("SHARE","File-share unsupported - downloaded the card instead");
      }
    } catch(e){
      logMsg("ERROR","Share card failed: " + e.message);
      alert("Could not build the share card: " + e.message);
    } finally {
      setShareBusy(false);
    }
  }

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>{r.name}</h2>
        <button className="x" onClick={share} disabled={shareBusy} aria-label="Share">
          {shareBusy ? <span className="spin" /> : <Icon name="share" size={20} color="#b3a591" />}
        </button>
        <button className="x" onClick={onToggleFav}>
          <Icon name="star" size={22} color={r.favorite ? "#e0764a" : "#80715f"} />
        </button>
      </div>
      <div className="ovbody">
        {r.photo && cfg && (
          <div className="rest-hero">
            <PhotoImg cfg={cfg} path={r.photo} />
          </div>
        )}
        <div className="meta-line">
          {r.cuisine || "Restaurant"}
          {r.location ? "  \u00b7  " + r.location : ""}
        </div>

        {(r.address || r.phone || r.website) && (
          <div className="card" style={{marginTop:12}}>
            {r.address && (
              <div className="row" style={{marginBottom:r.phone||r.website?10:0}}>
                <Icon name="pin" size={17} color="#b3a591" />
                <span className="small">{r.address}</span>
              </div>
            )}
            {r.phone && (
              <div className="row" style={{marginBottom:r.website?10:0}}>
                <Icon name="phone" size={17} color="#b3a591" />
                <a className="small" href={"tel:" + r.phone.replace(/[^0-9+]/g,"")}>{r.phone}</a>
              </div>
            )}
            {r.website && (
              <div className="row">
                <Icon name="link" size={17} color="#b3a591" />
                <a className="small" target="_blank" rel="noreferrer"
                   href={(r.website.indexOf("http")===0 ? r.website : "https://" + r.website)}>
                  {r.website}
                </a>
              </div>
            )}
          </div>
        )}

        {r.notes && <div className="card small muted">{r.notes}</div>}

        <SpendReveal visits={visits} scope="restaurant" />

        {showPicks && (
          <div className="card picks">
            {lovedDishes.length > 0 && (
              <div style={{marginBottom: lastVisitDishes.length ? 14 : 0}}>
                <div className="picks-head">You've loved these here</div>
                <div className="chips">
                  {lovedDishes.map((d,i)=>(
                    <span key={i} className="chip dish again">
                      {d.name}{d.count > 1 ? "  \u00d7" + d.count : ""}
                    </span>
                  ))}
                </div>
              </div>
            )}
            {lastVisitDishes.length > 0 && (
              <div>
                <div className="picks-head">Last time &middot; {fmtDate(lastVisit.date)}</div>
                <div className="chips">
                  {lastVisitDishes.map((d,i)=>(
                    <span key={i} className={"chip dish" +
                      (d.verdict==="again" ? " again" : d.verdict==="skip" ? " skip" : "")}>
                      {d.name}
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        <button className="btn primary" onClick={onLogVisit} style={{marginTop:4}}>
          <Icon name="plus" size={18} color="#1b1714" />Log a visit here
        </button>

        <button className="btn ghost" onClick={()=> setShowGroup(true)} style={{marginTop:8}}>
          <Icon name="nodes" size={16} color="var(--accent)" />Group order
        </button>
        {showGroup ? (
          <GroupOrderStart cfg={cfg} restaurant={restaurant} menus={menus}
            onClose={()=> setShowGroup(false)} />
        ) : null}

        {/* menus list - one menu shows expanded inline; 2+ stay as cards */}
        <div className="row between" style={{margin:"22px 0 10px",alignItems:"center"}}>
          <div className="divider-label" style={{margin:0,flex:1}}>
            {menuList.length === 0
              ? "Menus"
              : "Menus (" + menuList.length + ")"}
          </div>
          {menuList.length === 1 && (
            <button className="btn ghost sm" disabled={mShareBusy}
              onClick={()=> publishAndShareMenu(cfg, r, menuList[0], setMShareBusy, setMShareErr)}
              style={{flex:"none",padding:"6px 12px",margin:0,marginRight:8}}
              title="Share this menu">
              {mShareBusy ? <span className="spin" /> : <span className="row" style={{gap:5}}><Icon name="share" size={14} />Share</span>}
            </button>
          )}
          {menuList.length === 1 && (
            <button className="btn ghost sm" onClick={()=> onOpenMenu(menuList[0].menu_id)}
              style={{flex:"none",padding:"6px 12px",margin:0,marginRight:8}}>
              Manage
            </button>
          )}
          <button className="btn ghost sm" onClick={onAddMenu}
            style={{flex:"none",padding:"6px 12px",margin:0}}>
            <Icon name="plus" size={15} />Add menu
          </button>
        </div>

        {mShareErr && (
          <div className="tiny faint" style={{margin:"0 0 10px"}}>{mShareErr}</div>
        )}

        {menuList.length === 0 && (
          <div className="card" style={{textAlign:"center"}}>
            <div className="small muted" style={{marginBottom:11}}>
              No menus saved for this place yet. Tap <strong>Add menu</strong> above to
              scan one.
            </div>
          </div>
        )}

        {menuList.length === 1 && (
          <MenuView menu={menuList[0]} cfg={cfg} restaurantName={r.name}
            onSaveItemNutrition={(si,ii,est)=>
              onSaveItemNutrition && onSaveItemNutrition(menuList[0].menu_id, si, ii, est)} />
        )}

        {menuList.length > 1 && menuList.map(m => {
          const itemCount = (m.sections || []).reduce(
            (n,s) => n + ((s.items || []).length), 0);
          return (
            <div key={m.menu_id} className="menu-row"
              onClick={()=> onOpenMenu(m.menu_id)}>
              <div style={{flex:1, minWidth:0}}>
                <div className="menu-row-label">{m.label || "Menu"}</div>
                <div className="tiny faint" style={{marginTop:3}}>
                  {itemCount} item{itemCount === 1 ? "" : "s"}
                  {"  \u00b7  Captured " + fmtDate(m.captured_date)}
                  {m.source === "seed" ? " (starter)" : ""}
                </div>
              </div>
              <Icon name="chev" size={18} color="#80715f" />
            </div>
          );
        })}

        {/* visits at this place */}
        <div className="divider-label">Visits here ({visits.length})</div>
        {visits.length === 0 && (
          <div className="small faint" style={{padding:"2px 2px 8px"}}>
            No visits logged here yet.
          </div>
        )}
        {visits.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(v => {
          const vphotos = Array.isArray(v.photos) ? v.photos.filter(Boolean) : [];
          return (
            <div key={v.id} className="card tap" onClick={()=> onOpenVisit && onOpenVisit(v)}>
              {vphotos.length > 0 && (
                <div className="visit-photos" style={{marginTop:0,marginBottom:10}}>
                  {vphotos.map((p,i)=> (
                    <div key={i} className="visit-photo">
                      <PhotoImg cfg={cfg} path={p} />
                    </div>
                  ))}
                </div>
              )}
              <div className="between">
                <div className="small muted">{fmtDate(v.date)}</div>
                {v.rating ? <Stars value={v.rating} showNum /> : null}
              </div>
              {v.dishes && v.dishes.length > 0 && (
                <div className="chips">
                  {v.dishes.map((d,i)=> (
                    <span key={i} className={"chip dish" +
                      (d.verdict==="again" ? " again" : d.verdict==="skip" ? " skip" : "")}>
                      {d.name}{dishShareLabel(d)}{d.nutrition && d.nutrition.kcal ? " \u00b7 ~" + dishKcalNum(d) : ""}{d.price ? " \u00b7 " + fmtPrice(d.price) : ""}
                    </span>
                  ))}
                </div>
              )}
              <DishTotal dishes={v.dishes} />
              <NutriLine n={v.nutrition} />
              {v.notes && <div className="small muted" style={{marginTop:8}}>{v.notes}</div>}
              <ReceiptReveal cfg={cfg} receipt={v.receipt} />
              <VisitSplit split={v.split} />
              {onSplitVisit && ((v.receipt && v.receipt.total) || (v.dishes||[]).some(d=>parsePrice(d.price))) ? (
                <button className="btn ghost sm" style={{marginTop:9}} onClick={(e)=>{ e.stopPropagation(); onSplitVisit(v); }}>Split the check</button>
              ) : null}
            </div>
          );
        })}

        {/* manage */}
        <div className="divider-label">Manage</div>
        <button className="btn ghost" onClick={onEdit} style={{marginBottom:10}}>
          <Icon name="edit" size={17} />Edit restaurant
        </button>
        {!confirmDel ? (
          <button className="btn danger" onClick={()=> setConfirmDel(true)}>
            <Icon name="trash" size={17} />Delete restaurant
          </button>
        ) : (
          <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)"}}>
            <div className="small" style={{marginBottom:11}}>
              Delete {r.name} and its saved menu(s)? Logged visits are kept in History.
            </div>
            <div className="row" style={{gap:9}}>
              <button className="btn ghost" onClick={()=> setConfirmDel(false)}>Cancel</button>
              <button className="btn danger" onClick={onDelete}>Delete</button>
            </div>
          </div>
        )}
        <div style={{height:30}} />
      </div>
    </div>
  );
}

/* ============================================================
   MENU DETAIL - the drilled-in view of a single menu, with its
   own back button, inline re-scan/delete row, search, and sections
   ============================================================ */
function MenuDetail({restaurant, menu, visits, cfg, onClose, onReScan, onDeleteMenu, onSaveItemNutrition}){
  const [confirmDel, setConfirmDel] = useState(false);
  const [sharing,  setSharing]  = useState(false);   // menu-share in progress
  const [shareErr, setShareErr] = useState(null);     // small note under the row
  // "help me order" state
  const [askInput, setAskInput] = useState("");
  const [asking,   setAsking]   = useState(false);
  const [answer,   setAnswer]   = useState(null);
  const [askErr,   setAskErr]   = useState(null);
  const hasKey = configComplete(cfg);
  const _dh = dishHistory(visits);
  const hasHistory = _dh.loved.length > 0 || _dh.disliked.length > 0;

  async function runAsk(override){
    const q = ((override != null ? override : askInput) || "").trim();
    if (!q) return;
    if (override != null) setAskInput(override);
    if (!hasKey){ setAskErr("Set up your account in Settings first."); return; }
    setAsking(true); setAskErr(null); setAnswer(null);
    try {
      const a = await askMenu(cfg, restaurant, menu, visits, q);
      setAnswer(a);
    } catch(err){
      setAskErr(err.message || "Something went wrong. Try again.");
    } finally {
      setAsking(false);
    }
  }

  if (!menu){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
          <h2>Menu</h2><span style={{width:40}} />
        </div>
        <div className="ovbody">
          <div className="small faint" style={{padding:16}}>
            This menu no longer exists.
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>{menu.label || "Menu"}</h2>
        <span style={{width:40}} />
      </div>
      <div className="ovbody">
        <div className="tiny faint" style={{marginBottom:4}}>
          {restaurant ? restaurant.name : ""}
        </div>

        {/* inline action row: captured date + rescan + delete */}
        <div className="row between" style={{alignItems:"center",marginBottom:10}}>
          <div className="tiny faint">
            Captured {fmtDate(menu.captured_date)}
            {menu.source === "seed" ? " (starter data)" : ""}
          </div>
          <div className="row" style={{gap:6,flex:"none"}}>
            <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
              onClick={()=> publishAndShareMenu(cfg, restaurant, menu, setSharing, setShareErr)}
              disabled={sharing} title="Share this menu">
              {sharing ? <span className="spin" /> : <Icon name="share" size={15} />}
            </button>
            <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
              onClick={onReScan} title="Re-scan this menu">
              <Icon name="camera" size={15} />
            </button>
            <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
              onClick={()=> setConfirmDel(c => !c)} title="Delete this menu">
              <Icon name="trash" size={15}
                color={confirmDel ? "#d9604e" : "#80715f"} />
            </button>
          </div>
        </div>

        {shareErr && (
          <div className="tiny faint" style={{marginBottom:10}}>{shareErr}</div>
        )}

        {confirmDel && (
          <div className="small" style={{
            padding:"10px 12px",marginBottom:10,borderRadius:9,
            background:"rgba(217,96,78,0.1)",
            border:"1px solid rgba(217,96,78,0.4)"
          }}>
            <div style={{marginBottom:9}}>
              Delete the {menu.label || "menu"} menu? This cannot be undone.
            </div>
            <div className="row" style={{gap:8}}>
              <button className="btn ghost sm"
                onClick={()=> setConfirmDel(false)}>Cancel</button>
              <button className="btn danger sm"
                onClick={()=>{ setConfirmDel(false); onDeleteMenu(); }}>
                Delete
              </button>
            </div>
          </div>
        )}

        {/* ---- help me order (AI) ---- */}
        <div className="card ask">
          <div className="ask-head">
            <Icon name="sparkle" size={15} color="#e0764a" />
            <span>Help me order</span>
          </div>
          <textarea className="input ask-input" rows={2}
            placeholder={"What are you in the mood for?  e.g. something light, no pork, best value"}
            value={askInput}
            onChange={e=> setAskInput(e.target.value)}
            onKeyDown={e=>{ if (e.key === "Enter" && (e.metaKey || e.ctrlKey)){ e.preventDefault(); runAsk(); } }} />
          <div className="chips ask-egs">
            {["Something healthy","Not too heavy","Something for sharing","Best value"]
              .concat(hasHistory ? ["What did I love here?","What do I usually get?"] : [])
              .map((eg,i)=>(
                <span key={i} className="chip pick" onClick={()=> runAsk(eg)}>{eg}</span>
              ))}
          </div>
          <button className="btn primary sm ask-go"
            disabled={asking || !askInput.trim()}
            onClick={()=> runAsk()}>
            {asking ? <span className="spin" /> : <Icon name="sparkle" size={16} color="#1b1714" />}
            {asking ? "Thinking..." : "Ask"}
          </button>
          {!hasKey && (
            <div className="tiny faint" style={{marginTop:8}}>
              Set up your account in Settings to use this.
            </div>
          )}
          {askErr && <div className="ask-err">{askErr}</div>}
          {answer && (
            <div className="ask-answer">
              {answer.split("\n").filter(Boolean).map((line,i)=>(
                <p key={i} style={{margin:i ? "8px 0 0" : 0}}>{line}</p>
              ))}
            </div>
          )}
        </div>

        <MenuView menu={menu} cfg={cfg}
          restaurantName={restaurant ? restaurant.name : ""}
          onSaveItemNutrition={onSaveItemNutrition} />
        <div style={{height:20}} />
      </div>
    </div>
  );
}

/* ============================================================
   MENU VIEW - collapsible sections + text filter
   ============================================================ */
function MenuView({menu, cfg, restaurantName, onSaveItemNutrition}){
  const [open, setOpen]   = useState(()=> {
    const o = {}; (menu.sections||[]).forEach((s,i)=> { o[i] = i < 2; }); return o;
  });
  const [filter, setFilter] = useState("");
  const [itemBusy, setItemBusy] = useState({});   // "si:ii" -> bool
  const [itemErr,  setItemErr]  = useState({});    // "si:ii" -> message
  const q = filter.trim().toLowerCase();
  const canEstimate = !!(cfg && onSaveItemNutrition);

  // carry each item's ORIGINAL index so estimates write back to the right item
  const sections = (menu.sections || []).map((s,i)=>{
    const withIdx = (s.items || []).map((it,oj)=> ({ it, oj }));
    if (!q) return { s, i, items:withIdx };
    const items = withIdx.filter(({it}) =>
      (it.name + " " + it.description).toLowerCase().indexOf(q) !== -1);
    return { s, i, items };
  }).filter(x => !q || x.items.length);

  async function estimateOne(si, ii, it){
    const key = si + ":" + ii;
    if (!configComplete(cfg)){
      setItemErr(e => Object.assign({}, e, { [key]:"Set up your account in Settings." }));
      return;
    }
    setItemErr(e => Object.assign({}, e, { [key]:null }));
    setItemBusy(b => Object.assign({}, b, { [key]:true }));
    try {
      const est = await estimateItemNutrition(cfg, restaurantName, it);
      est.source = "menu_estimate";
      est.estimated_at = todayISO();
      onSaveItemNutrition(si, ii, est);   // parent updates menus + commits to GitHub
    } catch(err){
      setItemErr(e => Object.assign({}, e, { [key]:err.message || "Could not estimate." }));
    } finally {
      setItemBusy(b => Object.assign({}, b, { [key]:false }));
    }
  }

  return (
    <div>
      {cfg && menu && menu.menu_id ? (
        <GroupOrderButton cfg={cfg} menu={menu} restaurantName={restaurantName} />
      ) : null}
      <input className="input" placeholder="Search this menu..."
        value={filter} onChange={e=> setFilter(e.target.value)}
        style={{margin:"4px 0 6px"}} />
      {sections.length === 0 && (
        <div className="small faint" style={{padding:"12px 2px"}}>No items match.</div>
      )}
      {sections.map(({s,i,items})=>(
        <div key={i} className="msec">
          <div className="msec-head" onClick={()=> setOpen(o=> Object.assign({},o,{[i]:!o[i]}))}>
            <span className="nm">{s.name}</span>
            <span className="row" style={{gap:8}}>
              <span className="ct">{items.length}</span>
              <Icon name={(open[i]||q) ? "chevd" : "chev"} size={16} color="#80715f" />
            </span>
          </div>
          {(open[i] || q) && items.map(({it,oj})=>{
            const key = i + ":" + oj;
            return (
              <div key={oj} className="mitem">
                <div className="ihead">
                  <span className="inm">{it.name}</span>
                  {it.price
                    ? <span className="ipr">{it.price}</span>
                    : (it.paid && it.paid.amount
                        ? <span className="ipr paid">paid {fmtPrice(it.paid.amount)}</span>
                        : null)}
                </div>
                {it.description && <div className="idesc">{it.description}</div>}
                {it.tags && it.tags.length > 0 && (
                  <div className="chips" style={{marginTop:6}}>
                    {it.tags.map((t,k)=> <span key={k} className="chip tag">{t}</span>)}
                  </div>
                )}
                {it.nutrition
                  ? <div className="mitem-nut">
                      {it.photo && cfg && (
                        <div className="mitem-thumb"><PhotoImg cfg={cfg} path={it.photo} /></div>
                      )}
                      <NutriLine n={it.nutrition} />
                    </div>
                  : canEstimate && (
                      <div className="iest">
                        <button className="iest-btn" disabled={itemBusy[key]}
                          onClick={()=> estimateOne(i, oj, it)}>
                          {itemBusy[key]
                            ? <span className="spin" />
                            : <Icon name="sparkle" size={12} color="#e0764a" />}
                          {itemBusy[key] ? "Estimating..." : "Estimate calories"}
                        </button>
                        {itemErr[key] && <span className="iest-err">{itemErr[key]}</span>}
                      </div>
                    )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// "Pull up a menu": a searchable list of your places. Picking one lands on its
// page (menu + Help me order + Group order). No visit is created - this is the
// "I just got here, show me the menu" path, separate from logging a meal.
function RestaurantPicker({restaurants, onClose, onPick, title}){

  const term = q.trim().toLowerCase();
  const list = (restaurants || [])
    .filter(r => r && r.name)
    .filter(r => !term || (r.name + " " + (r.cuisine || "") + " " + (r.city || "")).toLowerCase().indexOf(term) !== -1)
    .slice()
    .sort((a,b)=> (a.name || "").localeCompare(b.name || ""));

    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>{title || "Pull up a menu"}</h2>
        <span style={{width:34}} />
      </div>
      <div className="ovbody">
        <input className="input" placeholder="Search your places..." value={q}
          onChange={e=> setQ(e.target.value)} style={{marginBottom:12}} />
        {list.length === 0 ? (
          <div className="empty" style={{padding:"40px 0"}}>
            <div className="big">{term ? "No matches" : "No places yet"}</div>
            <div>{term ? "Try a different search." : "Add a restaurant first, then you can pull up its menu."}</div>
          </div>
        ) : list.map(r => (
          <div key={r.id} className="pick-row" onClick={()=> onPick(r.id)}>
            <div className="pick-row-name">{r.name}</div>
            {(r.cuisine || r.city) ? (
              <div className="tiny faint" style={{marginTop:2}}>
                {[r.cuisine, r.city].filter(Boolean).join("  \u00b7  ")}
              </div>

          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
//   SPLIT A CHECK (standalone - no group order, no menu)
// ============================================================
// Pure split engine. Works entirely in integer CENTS so the per-person rows
// reconcile EXACTLY to the grand total (the one property a user notices
// instantly if it is wrong). No fuzzy matching - assignment is explicit.
//
//   lines  : [{ id, name, price }]   price = that line's total (dollars; "" / 0 ok)
//   people : [name]                  who is at the table
//   assign : { [lineId]: [name,...] } who shares each line; missing/empty = everyone
//   tip    : dollars to add on top (0 if none)
//   receiptTotal : the scanned grand total (dollars, incl. tax) or null/""
// Returns { people:[{name,lineCents,shareCents,totalCents}], grandCents,
//           lineSubtotalCents, overageCents }.
function computeManualSplit(lines, people, assign, tip, receiptTotal){
  const names = (people || []).filter(n => (n || "").trim());
  const toCents = d => Math.round((Number(d) || 0) * 100);

  // each person's share of the itemized (priced) lines
  const lineCents = {};
  names.forEach(n => { lineCents[n] = 0; });

  let lineSubtotalCents = 0;
  (lines || []).forEach(ln => {
    const cents = Math.max(0, toCents(ln.price));
    if (!cents) return;                     // unpriced line contributes nothing
    lineSubtotalCents += cents;
    // who shares this line: the assigned subset still present at the table,
    // else everyone. Never drop a line - empty/stale assignment falls back to
    // the whole table (the visible "Shared" behavior).
    let who = (assign && assign[ln.id] ? assign[ln.id] : [])
      .filter(n => lineCents.hasOwnProperty(n));
    if (!who.length) who = names.slice();
    if (!who.length) return;
    const base = Math.floor(cents / who.length);
    let rem = cents - base * who.length;    // spread the odd cents
    who.forEach((n, j) => { lineCents[n] += base + (j < rem ? 1 : 0); });
  });

  // grand total: the receipt total (already includes tax) when we have one,
  // else the line subtotal; then add any explicit tip on top.
  const tipCents = Math.max(0, toCents(tip));
  const rtCents = toCents(receiptTotal);
  const baseTotalCents = (receiptTotal != null && receiptTotal !== "" && rtCents > 0)
    ? Math.max(lineSubtotalCents, rtCents)
    : lineSubtotalCents;
  const grandCents = baseTotalCents + tipCents;

  // overage = everything above the itemized lines (tax + service + tip),
  // distributed proportionally to each person's line share so rows still sum
  // to the grand total. No priced lines -> split the whole thing evenly.
  const overageCents = grandCents - lineSubtotalCents;
  const shareCents = {};
  names.forEach(n => { shareCents[n] = 0; });

  if (overageCents !== 0 && names.length){
    if (lineSubtotalCents > 0){
      let assigned = 0;
      names.forEach(n => {
        const portion = Math.round(overageCents * (lineCents[n] / lineSubtotalCents));
        shareCents[n] = portion;
        assigned += portion;
      });
      // rounding remainder -> the largest line-share person, so totals match
      const drift = overageCents - assigned;
      if (drift !== 0){
        const big = names.slice().sort((a, b) => lineCents[b] - lineCents[a])[0];
        shareCents[big] += drift;
      }
    } else {
      const base = Math.floor(overageCents / names.length);
      let rem = overageCents - base * names.length;
      names.forEach((n, j) => { shareCents[n] = base + (j < rem ? 1 : 0); });
    }
  }

  const out = names.map(n => ({
    name: n,
    lineCents: lineCents[n],
    shareCents: shareCents[n],
    totalCents: lineCents[n] + shareCents[n],
  }));
  // Final guard: force the sum to EXACTLY grandCents (push any 1-cent drift to
  // the largest total, without reordering). Cheap insurance.
  const sum = out.reduce((a, p) => a + p.totalCents, 0);
  if (sum !== grandCents && out.length){
    let bi = 0;
    for (let i = 1; i < out.length; i++){ if (out[i].totalCents > out[bi].totalCents) bi = i; }
    const drift = grandCents - sum;
    out[bi].totalCents += drift;
    out[bi].shareCents += drift;
  }
  return { people: out, grandCents, lineSubtotalCents, overageCents };
}

function SplitCheckFlow({config, restaurants, visits, onSaveToVisit, onApplyDraft, onClose, flash,
                         initialLines, initialTotal, presetRestId, presetVisitId,
                         initialReceiptPhoto, initialSplit, onSaveSplit}){
  // When launched FROM a visit we arrive pre-loaded with that visit's priced
  // dishes and total, jump straight to the edit step, and default the save back
  // to that same visit.
  const preloaded = !!(initialLines && initialLines.length);
  // Reopened from a SAVED standalone split (the "Your splits" list on You)?
  // Its stored inputs seed every field so the calculator returns exactly as
  // it was saved, fully editable.
  const reopened = (initialSplit && initialSplit.inputs) ? initialSplit.inputs : null;
  // Opened from a real logged visit (vs. the standalone "+ menu" splitter)?
  // From a visit, saving attaches the split back to THAT visit and never makes
  // a separate card. presetVisitId is "new" only for the standalone splitter.
  const fromVisit = !!(presetVisitId && presetVisitId !== "new");
  const [step, setStep]       = useState((reopened || preloaded || fromVisit) ? "edit" : "pick");  // pick | edit | result
  const [busy, setBusy]       = useState(false);
  const [processing, setProcessing] = useState(null); // {done,total} | null
  const [errMsg, setErrMsg]   = useState("");
  const [lines, setLines]     = useState(() => reopened
    ? (reopened.lines || []).map(l => ({ id: l.id || uid("spl"), name: l.name || "",
        price: (l.price != null && l.price !== "") ? String(l.price) : "", qty: l.qty || 1 }))
    : preloaded
      ? initialLines.map(l => ({ id: uid("spl"), name: l.name || "",
          price: (l.price != null && l.price !== "") ? String(l.price) : "", qty: l.qty || 1 }))
      : []);                                          // [{id,name,price,qty}]
  const [rtotal, setRtotal]   = useState(reopened && reopened.rtotal != null ? String(reopened.rtotal) : "");
  const [people, setPeople]   = useState(reopened && Array.isArray(reopened.people) ? reopened.people.slice() : []);
  const [nameDraft, setNameDraft] = useState("");
  const [assign, setAssign]   = useState(reopened && reopened.assign ? reopened.assign : {});  // {lineId:[name]}
  const [tip, setTip]         = useState(reopened && reopened.tip != null ? String(reopened.tip) : "");
  const [tipMode, setTipMode] = useState(reopened && reopened.tipMode ? reopened.tipMode : "$");
  const [tax, setTax]         = useState(() => {
    if (reopened) return reopened.tax != null ? String(reopened.tax) : "";
    if (initialTotal == null) return "";
    const sub = (initialLines||[]).reduce((a,l)=> a + (Number(l.price)||0), 0);
    const extra = Number(initialTotal) - sub;            // tax/extra baked into the printed total
    return extra > 0.005 ? extra.toFixed(2) : "";
  });         // amount string ($ or %)
  const [taxMode, setTaxMode] = useState(reopened && reopened.taxMode ? reopened.taxMode : "$");
  const [split, setSplit]     = useState(null);       // computeManualSplit result
  const [saveRest, setSaveRest]   = useState(presetRestId || (initialSplit && initialSplit.restaurant_id) || "");  // restaurant id on the save step
  const [saveVisit, setSaveVisit] = useState(presetVisitId || "new"); // "new" or an existing visit id
  const [splitLabel, setSplitLabel] = useState(initialSplit && initialSplit.label ? initialSplit.label : "");  // standalone save label
  const fileRef = useRef(null);

  const money = c => "$" + (Math.round(c) / 100).toFixed(2);

  // ---- scan the receipt (reuses the existing OCR relay) ----
  async function onFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    logMsg("SPLIT","Selected " + files.length + " receipt photo(s)");
    setBusy(true); setErrMsg(""); setProcessing({done:0, total:files.length});
    try {
      const dataUrls = [];
      for (let i = 0; i < files.length; i++){
        const blob = await resizeImageToBlob(files[i], 1200, 0.82);
        dataUrls.push(await blobToDataUrl(blob));
        setProcessing({done:i+1, total:files.length});
      }
      // standalone: no menu, so pass [] for menu names (menu_match stays null)
      const parsed = await parseReceiptPhotos(config, dataUrls, []);
      const newLines = (parsed.items || []).map(it => ({
        id: uid("spl"),
        name: it.name,
        price: (it.price != null ? String(it.price) : ""),
        qty: it.qty || 1,   // carried so a bundled line ("3 GL x $66") can be split into units
      }));
      setLines(newLines);
      // Put the receipt's extra (total - items) into Tax so the calculated
      // total stays correct and "auto" never drops the baked-in tax.
      const subDollars = newLines.reduce((a,l)=> a + (Number(l.price)||0), 0);
      const extra = parsed.total != null ? (Number(parsed.total) - subDollars) : 0;
      setTax(extra > 0.005 ? extra.toFixed(2) : "");
      setTaxMode("$");
      setRtotal("");
      setAssign({});
      logMsg("SPLIT","Receipt parsed: " + newLines.length + " lines, total=" + parsed.total);
      setStep("edit");
    } catch(err){
      logMsg("ERROR","Split receipt scan failed: " + err.message);
      setErrMsg(err.message || "Couldn't read that receipt.");
    } finally {
      setBusy(false); setProcessing(null);
      if (fileRef.current) fileRef.current.value = "";
    }
  }

  function startManual(){
    setLines([{ id:uid("spl"), name:"", price:"" }]);
    setRtotal(""); setTax(""); setTip(""); setAssign({}); setErrMsg(""); setStep("edit");
  }

  // ---- people editor ----
  function addPerson(){
    const nm = (nameDraft || "").trim().slice(0, 40);
    if (!nm) return;
    const exists = people.some(p => p.toLowerCase() === nm.toLowerCase());
    if (exists){ setNameDraft(""); return; }
    if (people.length >= 20){ flash && flash("That's a lot of people - 20 max"); return; }
    setPeople(people.concat([nm]));
    setNameDraft("");
  }
  function removePerson(nm){
    setPeople(people.filter(p => p !== nm));
    // drop them from every line assignment so nothing goes stale
    const next = {};
    Object.keys(assign).forEach(k => {
      const kept = assign[k].filter(n => n !== nm);
      if (kept.length) next[k] = kept;
    });
    setAssign(next);
  }

  // ---- line editing ----
  function setLineField(id, field, val){
    setLines(lines.map(l => l.id === id ? Object.assign({}, l, {[field]:val}) : l));
  }
  function addLine(){ setLines(lines.concat([{ id:uid("spl"), name:"", price:"" }])); }
  function removeLine(id){
    setLines(lines.filter(l => l.id !== id));
    const next = Object.assign({}, assign); delete next[id]; setAssign(next);
  }
  // Explode a multi-quantity line (e.g. "3 GL Prisoner $66") into that many
  // per-unit rows ($22 each) so each unit can be assigned to a different person.
  // Cents are distributed so the unit rows still sum to the original line total.
  function splitLineIntoUnits(id){
    const l = lines.find(x => x.id === id);
    if (!l) return;
    const qty = Math.max(2, parseInt(l.qty, 10) || 1);
    const totalCents = Math.max(0, Math.round((Number(l.price) || 0) * 100));
    const base = Math.floor(totalCents / qty);
    const rem  = totalCents - base * qty;        // leftover pennies after even division
    const units = [];
    for (let i = 0; i < qty; i++){
      const cents = base + (i < rem ? 1 : 0);    // first `rem` units carry the extra penny
      units.push({ id: uid("spl"), name: l.name, price: (cents / 100).toFixed(2), qty: 1 });
    }
    // splice the unit rows in where the original line sat, preserving order
    const next = [];
    lines.forEach(x => { if (x.id === id) Array.prototype.push.apply(next, units); else next.push(x); });
    setLines(next);
    // the original line's assignment no longer applies - units start unassigned
    const na = Object.assign({}, assign); delete na[id]; setAssign(na);
    logMsg("SPLIT","Split '" + l.name + "' into " + qty + " units, total_cents=" + totalCents);
  }

  // ---- assignment toggle ----
  function toggleAssign(lineId, nm){
    const cur = assign[lineId] || [];
    const on = cur.includes(nm);
    const nextFor = on ? cur.filter(n => n !== nm) : cur.concat([nm]);
    const next = Object.assign({}, assign);
    if (nextFor.length) next[lineId] = nextFor; else delete next[lineId];
    setAssign(next);
  }
  function shareEverything(){ setAssign({}); flash && flash("Everyone shares everything"); }

  // ---- compute ----
  const subtotalCents = lines.reduce((a,l)=> a + Math.max(0, Math.round((Number(l.price)||0)*100)), 0);
  // Tax and tip each in $ or %. Percent is of the pre-tax items subtotal.
  const taxCents = Math.max(0, taxMode === "%"
    ? Math.round(subtotalCents * (Number(tax)||0) / 100)
    : Math.round((Number(tax)||0)*100));
  const tipCents = Math.max(0, tipMode === "%"
    ? Math.round(subtotalCents * (Number(tip)||0) / 100)
    : Math.round((Number(tip)||0)*100));
  const computedGrandCents = subtotalCents + taxCents + tipCents;
  const computedGrandStr = (computedGrandCents/100).toFixed(2);
  // rtotal is the hard-coded override; blank means "use the calculated total".
  const overrideCents = Math.round((Number(rtotal)||0)*100);
  const overriding = rtotal !== "" && overrideCents > 0;
  const grandPreview = overriding ? Math.max(subtotalCents, overrideCents) : computedGrandCents;
  const canSplit = people.length >= 2 && grandPreview > 0;

  function doSplit(){
    const res = computeManualSplit(lines, people, assign, "", String(grandPreview/100));
    setSplit(res);
    logMsg("SPLIT","Computed split across " + res.people.length +
           " people, grand=" + money(res.grandCents));
    setStep("result");
  }

  // Recent visits at the chosen restaurant (newest first). Always include the
  // currently-selected visit (e.g. the one we were launched from) so its radio
  // can show as selected even if it falls outside the most-recent few.
  const recentForSave = (() => {
    if (!saveRest || !Array.isArray(visits)) return [];
    const list = visits.filter(v => v.restaurant_id === saveRest);
    const top = list.slice(0, 5);
    if (saveVisit && saveVisit !== "new" && !top.some(v => v.id === saveVisit)){
      const sel = list.find(v => v.id === saveVisit);
      if (sel) top.unshift(sel);
    }
    return top;
  })();

  // Persist the computed split onto a visit - a new one today (default) or an
  // existing one the user picks. The split rides inside the visit JSON, and the
  // grand total becomes the visit's spend (so it flows into spend + Year in Food).
  function doSaveToVisit(){
    if (!split || !saveRest || !onSaveToVisit) return;
    const r = (restaurants || []).find(x => x.id === saveRest);
    const toDollars = c => Math.round(c) / 100;
    const grand = toDollars(split.grandCents);
    const splitObj = {
      people: split.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      grand: grand,
      items: lines.filter(l => (l.name || "").trim())
        .map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
      saved_at: Date.now(),
    };
    if (saveVisit === "new"){
      const rec = {
        id: uid("visit"),
        restaurant_id: saveRest,
        restaurant_name: r ? r.name : "",
        date: todayISO(),
        rating: null,
        dishes: [],
        notes: "",
        photos: [],
        receipt: { photo: null, total: grand },   // sets the visit's spend
        nutrition: null,
        logged_at: Date.now(),
        split: splitObj,
      };
      logMsg("SPLIT","Saving split to a NEW visit at " + (r ? r.name : saveRest) + ", grand=" + money(split.grandCents));
      onSaveToVisit(rec, true);
    } else {
      const v = (visits || []).find(x => x.id === saveVisit);
      if (!v){ flash && flash("That visit is no longer here"); return; }
      // Keep an existing receipt total if there is one; otherwise record the
      // split's grand total as the spend. Never clobber a real scanned total.
      const receipt = (v.receipt && v.receipt.total)
        ? v.receipt
        : { photo: (v.receipt && v.receipt.photo) || null, total: grand };
      const rec = Object.assign({}, v, { split: splitObj, receipt: receipt });
      logMsg("SPLIT","Saving split to existing visit " + saveVisit + ", grand=" + money(split.grandCents));
      onSaveToVisit(rec, false);
    }
    onClose();
  }

  // Form-launched (draft) mode: build the same split object but hand it back to
  // the visit form instead of committing, so it saves WITH the visit.
  function doApplyDraft(){
    if (!split || !onApplyDraft) return;
    const toDollars = c => Math.round(c) / 100;
    const splitObj = {
      people: split.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      grand: toDollars(split.grandCents),
      items: lines.filter(l => (l.name || "").trim())
        .map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
      saved_at: Date.now(),
    };
    logMsg("SPLIT","Applied split to visit draft, grand=" + money(split.grandCents));
    onApplyDraft(splitObj);
    onClose();
  }

  // Standalone save: persist this split as its own record (the "Your splits"
  // list on You). Stores the calculator INPUTS so it reopens fully editable,
  // plus a SUMMARY for the list card. Reuses the entity id/created_at on re-save.
  function defaultSplitLabel(){
    if (people.length){
      const head = people.slice(0,2).join(", ");
      return head + (people.length > 2 ? " +" + (people.length - 2) : "");
    }
    return "Check split";
  }
  function doSaveSplit(){
    if (!split || !onSaveSplit) return;
    const toDollars = c => Math.round(c) / 100;
    const inputs = {
      lines: lines.map(l => ({ id: l.id, name: l.name, price: l.price, qty: l.qty || 1 })),
      rtotal: rtotal,
      people: people.slice(),
      assign: assign,
      tip: tip, tipMode: tipMode,
      tax: tax, taxMode: taxMode,
    };
    const summary = {
      grand: toDollars(split.grandCents),
      people: split.people.map(p => ({ name: p.name, amount: toDollars(p.totalCents) })),
      items: lines.filter(l => (l.name || "").trim())
        .map(l => ({ name: l.name.trim(), price: (Number(l.price) || 0) })),
    };
    const now = Date.now();
    const rmatch = (restaurants || []).find(r => r.id === saveRest);
    const entity = {
      id: (initialSplit && initialSplit.id) || uid("split"),
      label: (splitLabel || "").trim() || defaultSplitLabel(),
      restaurant_id: saveRest || null,
      restaurant_name: rmatch ? rmatch.name : ((initialSplit && initialSplit.restaurant_name) || ""),
      inputs: inputs,
      summary: summary,
      created_at: (initialSplit && initialSplit.created_at) || now,
      updated_at: now,
    };
    logMsg("SPLIT","Saved standalone split id=" + entity.id + " grand=" + money(split.grandCents));
    onSaveSplit(entity);
    onClose();
  }

  async function shareSplit(){
    if (!split) return;
    const out = ["Check split:"];
    split.people.forEach(p => out.push("- " + p.name + ": " + money(p.totalCents)));
    out.push("Total: " + money(split.grandCents));
    out.push("");
    out.push("Split with MenuCaptain - menucaptain.com");
    const text = out.join("\n");
    try {
      if (navigator.share){ await navigator.share({ text }); return; }
    } catch(err){ if (err && err.name === "AbortError") return; }
    try { await navigator.clipboard.writeText(text); flash && flash("Split copied"); }
    catch(e){ flash && flash("Couldn't share - copy it by hand"); }
  }

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={
          step === "result" ? ()=> setStep("edit")
          : onClose}>
          {step === "result" ? "Back" : "Cancel"}
        </button>
        <h2>Split a check</h2>
        {step === "result"
          ? <button className="x" onClick={shareSplit}>Share</button>
          : step === "edit"
            ? <button className="x" onClick={doSplit} disabled={!canSplit}
                style={{opacity: canSplit ? 1 : 0.4}}>{split ? "Update" : "Split"}</button>
            : <span style={{width:54}} />}
      </div>
      <div className="ovbody">

        {step === "pick" && (
          <div>
            <div className="card small muted">
              Scan the receipt (or enter it by hand), say who's at the table, and
              tap to assign each item. Tax and tip are split proportionally so it
              adds up to the real total. Nothing is saved - it's just a calculator.
            </div>
            {errMsg && <div className="card" style={{borderColor:"var(--danger)",color:"var(--danger)"}}>{errMsg}</div>}
            {busy ? (
              <div className="card" style={{textAlign:"center",padding:"22px 14px"}}>
                <div className="spin" style={{margin:"0 auto 14px"}} />
                <div className="big">Reading the check</div>
                <div>{processing ? ("Preparing photo " + processing.done + " of " + processing.total + "...") : "This usually takes 10-30 seconds."}</div>
              </div>
            ) : (
              <div>
                <button className="btn" onClick={()=> fileRef.current && fileRef.current.click()}>
                  Scan the check
                </button>
                <button className="btn ghost" style={{marginTop:10}} onClick={startManual}>
                  Enter by hand
                </button>
                <input ref={fileRef} type="file" accept="image/*" multiple
                  style={{display:"none"}} onChange={onFiles} />
              </div>
            )}
          </div>
        )}

        {step === "edit" && (
          <div>
            {/* people */}
            <label className="fld"><span className="lbl">Who's at the table?</span></label>

              ))}

              </div>

            <button className="btn" style={{marginTop:14}} onClick={shareSplit}>Share the split</button>

              <button className="btn ghost" style={{marginTop:10}} onClick={doApplyDraft}>

            ) : fromVisit && onSaveToVisit ? (
              <button className="btn ghost" style={{marginTop:10}} onClick={doSaveToVisit}>

            ) : onSaveSplit ? (
