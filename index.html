function PublishBuilder({restaurants, visits, cfg, onClose}){
  const [title,setTitle] = useState("");
  const [sel,setSel] = useState({});
  const [q,setQ] = useState("");
  const [link,setLink] = useState("");
  const [copied,setCopied] = useState(false);
  const [makeBusy,setMakeBusy] = useState(false);
  const [shortBusy,setShortBusy] = useState(false);
  const [shortMsg,setShortMsg] = useState("");

  const avgById = React.useMemo(()=>{
    const by = {};
    (visits || []).forEach(v => {
      if (v && v.restaurant_id && typeof v.rating === "number" && v.rating > 0){
        (by[v.restaurant_id] = by[v.restaurant_id] || []).push(v.rating);
      }
    });
    const out = {};
    Object.keys(by).forEach(id => { const a = by[id]; out[id] = Math.round((a.reduce((x,y)=> x+y, 0) / a.length) * 10) / 10; });
    return out;
  },[visits]);

  const sorted = React.useMemo(()=>{
    const list = [...(restaurants || [])];
    list.sort((a,b)=>{
      const fb = (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0);
      if (fb) return fb;
      const ra = avgById[a.id] || 0, rb = avgById[b.id] || 0;
      if (rb !== ra) return rb - ra;
      return (a.name || "").localeCompare(b.name || "");
    });
    return list;
  },[restaurants, avgById]);

  const ql = q.trim().toLowerCase();
  const shown = ql
    ? sorted.filter(r => (r.name || "").toLowerCase().includes(ql)
        || (r.location || "").toLowerCase().includes(ql)
        || (r.cuisine || "").toLowerCase().includes(ql))
    : sorted;

  const selCount = Object.keys(sel).filter(k => sel[k]).length;
  const toggle = (id)=>{ setSel(s => { const n = Object.assign({}, s); if (n[id]) delete n[id]; else n[id] = true; return n; }); setLink(""); setCopied(false); setShortMsg(""); };
  const onTitle = (e)=>{ setTitle(e.target.value); setLink(""); setCopied(false); setShortMsg(""); };

  const make = async ()=>{
    if (makeBusy) return;
    setMakeBusy(true); setCopied(false); setShortMsg("");
    try {
      const selected = (restaurants || []).filter(r => sel[r.id]);
      const payload = buildListPayload(title.trim(), selected, visits);
      const enc = encodeListPayload(payload);
      // ?list= (query) survives shorteners; the viewer also still reads #list=
      const longUrl = location.origin + location.pathname + "?list=" + enc;
      const short = await publishListPage(cfg, payload, enc);
      if (short){
        setLink(short);
        setShortMsg("Short link ready. The first time a list is published, its page can take a minute to go live.");
      } else {
        setLink(longUrl);
        setShortMsg("");
      }
    } finally {
      setMakeBusy(false);
    }
  };
  const copy = async ()=>{ try { await navigator.clipboard.writeText(link); setCopied(true); } catch(e){ logMsg("WARN","Clipboard copy failed: " + e.message); } };
  const share = async ()=>{
    try { if (navigator.share){ await navigator.share({ title: title.trim() || "My list", text:"A few places I love:", url:link }); } else { copy(); } }
    catch(e){ /* user cancelled or unsupported */ }
  };
  // Optional shortener (shared helper). Any total failure keeps the long link.
  const shorten = async ()=>{
    if (!link || shortBusy) return;
    setShortBusy(true); setShortMsg("");
    const shortUrl = await shortenUrl(link);
    if (shortUrl){
      setLink(shortUrl); setCopied(false);
      setShortMsg("Shortened. Open it once to confirm it works.");
    } else {
      setShortMsg("Could not shorten right now - using the full link (it works fine).");
    }
    setShortBusy(false);
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Publish a list</h2>
        <span style={{width:40}} />
      </div>
      <div className="ovbody">
        <input className="input" placeholder="List title (e.g. My Top Portland Spots)"
          value={title} onChange={onTitle} style={{marginBottom:12}} />

        <div className="pub-make">
          <div className="small muted">{selCount} selected</div>
          <button className="btn primary sm" disabled={!selCount || makeBusy} onClick={make}>
            {makeBusy ? "Creating..." : (link ? "Update link" : "Create link")}
          </button>
        </div>

        {link && (
          <div className="card" style={{marginTop:12}}>
            <div className="linkbox">{link}</div>
            <div className="row" style={{gap:8,marginTop:10}}>
              <button className="btn sm" onClick={copy}>{copied ? "Copied" : "Copy"}</button>
              <button className="btn primary sm" onClick={share}>
                <Icon name="share" size={15} color="#1b1714" /> Share
              </button>
              {link.includes("?list=") && (
                <button className="btn ghost sm" onClick={shorten} disabled={shortBusy}>
                  {shortBusy ? "Shortening..." : "Shorten"}
                </button>
              )}
            </div>
            {shortMsg && <div className="tiny faint" style={{marginTop:8}}>{shortMsg}</div>}
            {link.length > 6000 && (
              <div className="tiny faint" style={{marginTop:8}}>This link is long; some apps may shorten it. Fewer places will help.</div>
            )}
            <div className="tiny faint" style={{marginTop:6}}>
              Anyone with this link can view the list. It holds only what is shown here - no tokens or keys.
            </div>
          </div>
        )}

        <input className="input" placeholder="Search your places" value={q}
          onChange={e=> setQ(e.target.value)} style={{margin:"16px 0 10px"}} />

        {shown.length === 0 ? (
          <div className="empty" style={{padding:"30px 10px"}}>
            <div>{restaurants && restaurants.length ? "No places match." : "Add some restaurants first."}</div>
          </div>
        ) : shown.map(r => (
          <div key={r.id} className={"pub-row" + (sel[r.id] ? " on" : "")} onClick={()=> toggle(r.id)}>
            <span className="pub-check">{sel[r.id] ? <Icon name="check" size={14} color="#1b1714" /> : null}</span>
            <span className="pub-row-tx">
              <span className="pub-row-n">{r.name}{r.favorite ? "  \u2605" : ""}</span>
              <span className="pub-row-s">
                {[r.location, r.cuisine].filter(Boolean).join("  \u00b7  ")}
                {avgById[r.id] ? "   " + avgById[r.id] + "\u2605 avg" : ""}
              </span>
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function YearInFood({visits, restaurants, onClose}){
  // years that have visits, newest first
  const years = Array.from(new Set((visits || [])
    .map(v => parseInt(String(v.date || "").slice(0,4), 10))
    .filter(y => isFinite(y) && y > 1990))).sort((a,b)=> b - a);
  // default to the most-logged year (richest recap), else "all"
  const countByYear = {};
  (visits || []).forEach(v => {
    const y = parseInt(String(v.date || "").slice(0,4), 10);
    if (isFinite(y)) countByYear[y] = (countByYear[y] || 0) + 1;
  });
  let defaultPeriod = "all";
  if (years.length){
    defaultPeriod = years[0]; let best = -1;
    years.forEach(y => { if (countByYear[y] > best){ best = countByYear[y]; defaultPeriod = y; } });
  }
  const [period, setPeriod] = useState(defaultPeriod);
  const [shareBusy, setShareBusy] = useState(false);
  const s = computeYearStats(visits, restaurants, period);
  const periodLabel = period === "all" ? "All time" : String(period);

  const share = async ()=>{
    if (shareBusy || s.empty) return;
    setShareBusy(true);
    try {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
      const blob = await buildYearCardBlob(s, periodLabel);
      const file = new File([blob], "menucaptain-year-" + (period === "all" ? "alltime" : period) + ".png", { type:"image/png" });
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        try { await navigator.share({ files:[file], title:"My Year in Food" }); }
        catch(e){ if (e && e.name !== "AbortError") logMsg("YIF","Share sheet failed: " + e.message); }
      } else {
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = u; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=> URL.revokeObjectURL(u), 2000);
        logMsg("YIF","File-share unsupported - downloaded the recap instead");
      }
    } catch(e){
      logMsg("ERROR","Year card failed: " + e.message);
      alert("Could not build the recap image: " + e.message);
    } finally {
      setShareBusy(false);
    }
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Year in Food</h2>
        <button className="x" onClick={share} disabled={shareBusy || s.empty} aria-label="Share recap">
          {shareBusy ? <span className="spin" /> : <Icon name="share" size={20} color="#b3a591" />}
        </button>
      </div>
      <div className="ovbody">
        {years.length > 0 && (
          <div className="chips" style={{marginBottom:16}}>
            {years.map(y => (
              <span key={y} className={"chip pick" + (period === y ? " on" : "")}
                onClick={()=> setPeriod(y)}>{y}</span>
            ))}
            <span className={"chip pick" + (period === "all" ? " on" : "")}
              onClick={()=> setPeriod("all")}>All time</span>
          </div>
        )}

        {s.empty ? (
          <div className="empty" style={{padding:"44px 20px"}}>
            <div className="big">Nothing logged {period === "all" ? "yet" : "in " + period}</div>
            <div>Log a few visits and your recap will fill in.</div>
          </div>
        ) : (
          <>
            <div className="yif-hero">
              <div className="yif-hero-kicker">Your Year in Food</div>
              <div className="yif-hero-year">{periodLabel}</div>
              <div className="yif-hero-sub">
                {s.visits} visit{s.visits === 1 ? "" : "s"} &nbsp;&middot;&nbsp; {s.places} place{s.places === 1 ? "" : "s"}
              </div>
            </div>

            {period !== "all" && s.newSpots > 0 && (
              <div className="yif-stat">
                <div className="yif-big">{s.newSpots}</div>

function ProCard({config}){
  const [bill,setBill] = useState(null);   // /api/billing/status payload
  const [busy,setBusy] = useState("");     // which button is working
  const [err,setErr]   = useState("");
  const [showCode,setShowCode] = useState(false);  // friends & family code UI
  const [codeText,setCodeText] = useState("");
  const [codeBusy,setCodeBusy] = useState(false);
  const [codeMsg,setCodeMsg]   = useState("");

  async function redeemCode(){
    const code = codeText.trim();
    if (!code || codeBusy) return;
    setCodeBusy(true); setCodeMsg("");
    logMsg("COMP","Redeeming friends & family code");
    try {
      const headers = await authHeaders(config);
      headers["Content-Type"] = "application/json";
      const res = await fetch(apiBase(config) + "/api/account/redeem-code", {
        method:"POST", headers, body: JSON.stringify({ code }),
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok){
        const msg = (data && data.detail) || ("Could not redeem (" + res.status + ")");
        logMsg("COMP","Redeem refused: " + msg);
        setCodeMsg(msg); setCodeBusy(false); return;
      }
      logMsg("COMP","Code redeemed - Pro until " + (data.until || "?"));
      setCodeBusy(false); setShowCode(false); setCodeText("");
      // Refetch so the card flips to Pro immediately.
      fetchBillingStatus(config)
        .then(d=> setBill(d))
        .catch(e=> logMsg("BILLING","Status refetch failed: " + e.message));
    } catch(err2){
      logMsg("ERROR","Redeem network failure: " + err2.message);
      setCodeMsg("Network error - try again.");
      setCodeBusy(false);
    }
  }

  useEffect(()=>{
    let alive = true;
    const load = ()=>{
      fetchBillingStatus(config)
        .then(d=>{ if (alive) setBill(d); })
        .catch(e=>{ logMsg("BILLING","Status fetch failed: " + e.message); });
    };
    load();
    // WHY: returning from the Stripe sheet (portal/checkout) does not
    // remount this card. Refetch when the app becomes visible again so
    // changes made in the portal show up without an app restart - and
    // clear any busy state as a second safety net for the stuck spinner.
    const onVis = ()=>{
      if (document.visibilityState === "visible"){ setBusy(""); load(); }
    };
    document.addEventListener("visibilitychange", onVis);
    return ()=>{
      alive = false;
      document.removeEventListener("visibilitychange", onVis);
    };
    // eslint-disable-next-line
  },[]);

  async function go(kind){
    setErr(""); setBusy(kind);
    try {
      if (kind === "portal") await openBillingPortal(config);
      else await startCheckout(config, kind);
      // WHY reset: on an installed iOS app, Stripe opens as a sheet ON TOP
      // of this page - the app keeps running underneath. Without this,
      // closing the sheet with the X returns to a forever-spinning,
      // disabled button. In a normal browser tab the page has already
      // navigated away, so the timeout is harmless there.
      setTimeout(()=> setBusy(""), 1500);
    } catch(e){
      setErr(e.message);
      setBusy("");
    }
  }

  const fmtDate = (iso)=>{
    if (!iso) return "";
    try { return new Date(iso).toLocaleDateString(); } catch(e){ return ""; }
  };

  let body;
  if (!bill){
    body = <div className="tiny muted">Checking your plan...</div>;
  } else if (bill.owner){
    body = <div className="tiny muted">Pro - owner account.</div>;
  } else if (bill.tier === "pro" && bill.status === "comped"){
    // Friends & family comp: no Stripe customer exists, so no portal
    // button - and the copy reads as a courtesy, not a billing state.
    body = (
      <div className="tiny muted">
        Pro - friends &amp; family
        {bill.current_period_end ? " - until " + fmtDate(bill.current_period_end) : ""}
      </div>
    );
  } else if (bill.tier === "pro"){
    body = (
      <div>
        <div className="tiny muted" style={{marginBottom:10}}>
          Pro{bill.plan ? " - " + (bill.plan === "yearly" ? "$19.99/year" : "$2.99/month") : ""}
          {bill.current_period_end ? (bill.cancel_at_period_end ? " - ends " : " - renews ") + fmtDate(bill.current_period_end) : ""}
        </div>
        <button className="btn" disabled={!!busy} onClick={()=>go("portal")}>
          {busy === "portal" ? <span className="spin" /> : null}
          Manage subscription
        </button>
      </div>
    );
  } else {
    const used = bill.calls_used || 0, cap = bill.calls_cap || 75;
    body = (
      <div>
        <div className="tiny muted" style={{marginBottom:10}}>
          Free plan - {used} of {cap} AI uses. Upgrade for unlimited menu
          scans, calorie estimates, and ordering help.
        </div>
        <button className="btn primary" style={{marginBottom:8}}
          disabled={!!busy} onClick={()=>go("yearly")}>
          {busy === "yearly" ? <span className="spin" /> : null}
          Go Pro - $19.99/year
        </button>
        <button className="btn" disabled={!!busy} onClick={()=>go("monthly")}>
          {busy === "monthly" ? <span className="spin" /> : null}
          $2.99/month
        </button>
        {!showCode ? (
          <div className="tiny" style={{marginTop:10, textAlign:"center"}}>
            <a href="#" onClick={(e)=>{ e.preventDefault(); setShowCode(true); }}>
              Have a code?
            </a>
          </div>
        ) : (
          <div style={{marginTop:12}}>
            <label className="fld"><span className="lbl">Friends &amp; family code</span>
              <input className="input" value={codeText}
                onChange={e=>{ setCodeText(e.target.value); setCodeMsg(""); }}
                autoCapitalize="characters" autoComplete="off"
                placeholder="YOUR-CODE" /></label>
            {codeMsg && (
              <div className="small" style={{color:"#e7a99e", marginBottom:8}}>{codeMsg}</div>
            )}
            <button className="btn" style={{width:"100%"}}
              disabled={codeBusy || !codeText.trim()} onClick={redeemCode}>
              {codeBusy ? <span className="spin" /> : null}
              Redeem code
            </button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="card">
      <div style={{fontWeight:600, marginBottom:6}}>MenuCaptain Pro</div>
      {body}
      {err && (
        <div className="syncbar err" style={{margin:"10px 0 0"}}>
          <span className="dot" style={{background:"var(--danger)"}} />{err}
        </div>
      )}
    </div>
  );
}

    try {
      const headers = await authHeaders(config);
      headers["Content-Type"] = "application/json";
      const res = await fetch(apiBase(config) + "/api/account/delete", {
        method:"POST", headers, body: JSON.stringify({ confirm:"DELETE" }),

        const msg = (data && data.detail) || ("Delete failed (" + res.status + ")");
        logMsg("ERROR","Account delete refused: " + msg);
        setDelErr(msg); setDelBusy(false); return;

function ResetPasswordScreen({accessToken, refreshToken, expiresIn}){
  // Reached from the password-reset email: Supabase redirects here with a
  // short-lived recovery session in the URL hash. We set the new password
  // with that session, then sign the user straight in using the same tokens.
  const [pw1,setPw1]   = useState("");
  const [pw2,setPw2]   = useState("");
  const [busy,setBusy] = useState(false);
  const [err,setErr]   = useState("");

  async function applyNewPassword(){
    setErr("");
    if (pw1.length < 6){ setErr("Password must be at least 6 characters."); return; }
    if (pw1 !== pw2){ setErr("Passwords do not match."); return; }
    setBusy(true);
    try {
      logMsg("AUTH","Applying new password from recovery link");
      const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
        method:"PUT",
        headers:{
          "Content-Type":"application/json",
          "apikey":SUPABASE_PUBLISHABLE_KEY,
          "Authorization":"Bearer " + accessToken,
        },
        body:JSON.stringify({ password: pw1 }),
      });
      const data = await res.json().catch(()=> ({}));
      if (res.status === 401){
        setErr("This reset link has expired. Request a new one from the sign-in screen.");
        setBusy(false); return;
      }
      if (!res.ok || !data.id){
        const msg = data.msg || data.error_description || data.message || "";
        setErr(msg || ("Could not update the password (" + res.status + ")."));
        setBusy(false); return;
      }
      // Password updated. Sign in with the recovery session tokens.
      const cfg = {
        apiBase: API_BASE_DEFAULT,
        userId: data.id,
        email: data.email || "",
        accessToken: accessToken,
        refreshToken: refreshToken || "",
        expiresAt: Math.floor(Date.now()/1000) + (parseInt(expiresIn,10) || 3600),
      };
      saveConfig(cfg);
      logMsg("AUTH","Password updated - signed in as " + cfg.email);
      // Strip the recovery hash and reload into the app.
      location.replace(location.pathname);
    } catch(e){
      logMsg("ERROR","Password update network error: " + e.message);
      setErr("Network error updating the password. Check your connection.");
      setBusy(false);
    }
  }

  return (
    <div id="app-shell">
      <div className="topbar"><h1>MenuCaptain</h1>
        <div className="sub">Reset password</div></div>
      <div className="ovbody">
        <div style={{marginBottom:18}}>
          <h2 style={{fontSize:26}}>Choose a new password</h2>
          <div className="small muted" style={{marginTop:6}}>
            You followed a password reset link. Pick a new password for your
            account and you will be signed in.
          </div>
        </div>
        <label className="fld"><span className="lbl">New password</span>
          <PwInput value={pw1} onChange={e=>setPw1(e.target.value)}
            placeholder="at least 6 characters" /></label>
        <label className="fld"><span className="lbl">Confirm new password</span>
          <PwInput value={pw2} onChange={e=>setPw2(e.target.value)}
            placeholder="same password again" /></label>
        {err && (
          <div className="syncbar err" style={{margin:"0 0 14px"}}>
            <span className="dot" style={{background:"var(--danger)"}} />{err}
          </div>
        )}
        <button className="btn primary" disabled={busy} onClick={applyNewPassword}>
          {busy ? <span className="spin" /> : <Icon name="check" size={18} color="#1b1714" />}
          {busy ? "Saving..." : "Set new password"}
        </button>
      </div>
    </div>
  );
}

function SetupScreen({initial, onSave, onClose, asOverlay}){
  // One-time note after an account deletion: the flag is set just before
  // the post-delete reload and consumed (removed) on first render here.
  const [deletedNote] = React.useState(()=>{
    try {
      if (localStorage.getItem("dininglog_deleted") === "1"){
        localStorage.removeItem("dininglog_deleted");
        return true;
      }
    } catch(e){}
    return false;
  });
  const [mode,setMode]       = useState("signin");   // signin | signup | forgot
  const [email,setEmail]     = useState(initial ? (initial.email || "") : "");
  const [password,setPassword] = useState("");
  const [busy,setBusy]       = useState(false);
  const [err,setErr]         = useState("");
  const [info,setInfo]       = useState("");

  async function signIn(){
    setErr("");
    if (!email.trim() || !password){
      setErr("Email and password are required."); return;
    }
    setBusy(true);
    // Backend address is built in (or carried over from a saved config) -
    // customers never see or set it. Settings still displays it for support.
    const base = (((initial && initial.apiBase) || API_BASE_DEFAULT)).replace(/\/+$/, "");
    try {
      logMsg("AUTH","Signing in " + email.trim());
      const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
        body:JSON.stringify({ email:email.trim(), password:password }),
      });
      const data = await res.json().catch(()=> ({}));
      if (res.status === 400 || res.status === 401){
        setErr("Invalid email or password."); setBusy(false); return;
      }
      if (!res.ok || !data.access_token || !data.user){
        setErr("Sign-in failed (" + res.status + ")."); setBusy(false); return;
      }
      const cfg = {
        apiBase: base,
        userId: data.user.id,
        email: data.user.email || email.trim(),
        accessToken: data.access_token,
        refreshToken: data.refresh_token || "",
        expiresAt: data.expires_at || (Math.floor(Date.now()/1000) + (data.expires_in || 3600)),
      };
      logMsg("AUTH","Signed in as " + cfg.email + " (" + cfg.userId + ")");
      setBusy(false);
      onSave(cfg);
    } catch(e){
      logMsg("ERROR","Sign-in network error: " + e.message);
      setErr("Network error during sign-in. Check your connection.");
      setBusy(false);
    }
  }

  async function signUp(){
    setErr(""); setInfo("");
    if (!email.trim() || !password){
      setErr("Email and password are required."); return;
    }
    if (password.length < 6){
      setErr("Password must be at least 6 characters."); return;
    }
    setBusy(true);
    const base = (((initial && initial.apiBase) || API_BASE_DEFAULT)).replace(/\/+$/, "");
    try {
      logMsg("AUTH","Creating account for " + email.trim());
      const res = await fetch(SUPABASE_URL + "/auth/v1/signup", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
        body:JSON.stringify({ email:email.trim(), password:password }),
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok){
        const msg = data.msg || data.error_description || data.message || "";
        setErr(msg || ("Could not create the account (" + res.status + ")."));
        setBusy(false); return;
      }
      if (data.session && data.session.access_token && data.user){
        // Email confirmation is off - we got a session, sign straight in.
        const cfg = {
          apiBase: base,
          userId: data.user.id,
          email: data.user.email || email.trim(),
          accessToken: data.session.access_token,
          refreshToken: data.session.refresh_token || "",
          expiresAt: data.session.expires_at || (Math.floor(Date.now()/1000) + (data.session.expires_in || 3600)),
        };
        logMsg("AUTH","Account created and signed in: " + cfg.email);
        setBusy(false);
        onSave(cfg);
        return;
      }
      // Email confirmation is on - no session until the link is tapped.
      logMsg("AUTH","Account created - confirmation email sent");
      setBusy(false);
      setMode("signin");
      setInfo("Almost there - we sent a confirmation link to " + email.trim() +
              ". Tap it, then sign in here.");
    } catch(e){
      logMsg("ERROR","Sign-up network error: " + e.message);
      setErr("Network error creating the account. Check your connection.");
      setBusy(false);
    }
  }

  async function sendReset(){
    setErr(""); setInfo("");
    if (!email.trim()){
      setErr("Enter your account email first."); return;
    }
    setBusy(true);
    try {
      logMsg("AUTH","Requesting password reset for " + email.trim());
      await fetch(SUPABASE_URL + "/auth/v1/recover", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
        body:JSON.stringify({ email:email.trim() }),
      });
      // Always the same message - never reveal whether an account exists.
      setBusy(false);
      setMode("signin");
      setInfo("If an account exists for " + email.trim() +
              ", a password reset link is on its way. Check your email.");
    } catch(e){
      logMsg("ERROR","Reset request network error: " + e.message);
      setErr("Network error sending the reset link. Check your connection.");
      setBusy(false);
    }
  }

  const titles = {
    signin:["Welcome","MenuCaptain keeps your restaurants, menus and visits in your private account so they sync across devices. Sign in to get started."],
    signup:["Create your account","One account, all your devices. Your log stays private to you."],
    forgot:["Reset your password","Enter your account email and we will send you a reset link."],
  };
  const primary = {
    signin:{ label:"Sign in",            busyLabel:"Signing in...",      fn:signIn },
    signup:{ label:"Create account",     busyLabel:"Creating...",        fn:signUp },
    forgot:{ label:"Send reset link",    busyLabel:"Sending...",         fn:sendReset },
  }[mode];
  const switchTo = (m)=>{ setMode(m); setErr(""); setInfo(""); };

  const body = (
    <div className="ovbody">
      {!asOverlay && deletedNote && (
        <div className="card small muted" style={{marginBottom:14,lineHeight:1.7}}>
          Your account was deleted. Thanks for trying MenuCaptain - you are
          welcome back any time.
        </div>
      )}
      {!asOverlay && (
        <div style={{marginBottom:18}}>
          <h2 style={{fontSize:26}}>{titles[mode][0]}</h2>
          <div className="small muted" style={{marginTop:6}}>{titles[mode][1]}</div>
        </div>
      )}
      <label className="fld"><span className="lbl">Email</span>
        <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)}
          autoCapitalize="none" autoComplete="email" placeholder="you@example.com" /></label>
      {mode !== "forgot" && (
        <label className="fld"><span className="lbl">Password</span>
          <PwInput value={password} onChange={e=>setPassword(e.target.value)}
            placeholder={mode === "signup" ? "at least 6 characters" : "your password"} />
        </label>
      )}

      {mode === "signin" && (
        <div className="card tiny muted" style={{lineHeight:1.7}}>
          Your sign-in is stored only in this browser (localStorage on this
          device) and used to reach your MenuCaptain account.
        </div>
      )}
      {info && (
        <div className="syncbar" style={{margin:"0 0 14px"}}>
          <span className="dot" style={{background:"var(--accent)"}} />{info}
        </div>
      )}
      {err && (
        <div className="syncbar err" style={{margin:"0 0 14px"}}>
          <span className="dot" style={{background:"var(--danger)"}} />{err}
        </div>
      )}
      <button className="btn primary" disabled={busy} onClick={primary.fn}>
        {busy ? <span className="spin" /> : <Icon name="check" size={18} color="#1b1714" />}
        {busy ? primary.busyLabel : primary.label}
      </button>

      <div className="small muted" style={{marginTop:16, textAlign:"center", lineHeight:2.2}}>
        {mode === "signin" && (<span>
          <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("forgot");}}>Forgot password?</a>
          <br/>
          New here? <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("signup");}}>Create an account</a>
        </span>)}
        {mode === "signup" && (<span>
          Have an account? <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("signin");}}>Sign in</a>
        </span>)}
        {mode === "forgot" && (<span>
          <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("signin");}}>Back to sign in</a>
        </span>)}
      </div>
      <div style={{height:24}} />
    </div>
  );

  if (asOverlay){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}>Cancel</button>
          <h2>Settings</h2><span style={{width:40}} />
        </div>
        {body}
      </div>
    );
  }
  return (
    <div id="app-shell">
      <div className="topbar"><h1>MenuCaptain</h1>
        <div className="sub">First-time setup</div></div>
      {body}
    </div>
  );
}

/* ---- mount --------------------------------------------------- */
(function bootDiningCaptain(){
  let published = null;
  try {
    // new links use ?list= (survives URL shorteners); old links used #list=
    let raw = null;
    // Returning from Stripe Checkout: strip the param, remember the verdict
    // so App can toast a welcome after it mounts.
    const co = (location.search || "").match(/[?&]checkout=(success|cancel)/);
    if (co){
      window.__CHECKOUT_RESULT = co[1];
      logMsg("BILLING","Returned from checkout: " + co[1]);
      history.replaceState(null, "", location.pathname);
    }
    const qm = (location.search || "").match(/[?&]list=([^&]+)/);
    if (qm) raw = qm[1];
    else { const h = location.hash || ""; if (h.indexOf("#list=") === 0) raw = h.slice(6); }
    if (raw) published = decodeListPayload(raw);
  } catch(e){ published = null; }
  // Password-reset links land here with a recovery session in the hash.
  let recovery = null;
  try {
    const hp = new URLSearchParams((location.hash || "").replace(/^#/, ""));
    if (hp.get("type") === "recovery" && hp.get("access_token")){
      recovery = {
        accessToken: hp.get("access_token"),
        refreshToken: hp.get("refresh_token") || "",
        expiresIn: hp.get("expires_in") || "3600",
      };
    } else if (hp.get("error_description")){
      // Expired/invalid auth link - drop the hash and fall through to the app.
      logMsg("AUTH","Auth link error: " + hp.get("error_description"));
      history.replaceState(null, "", location.pathname + location.search);
    }
  } catch(e){ recovery = null; }
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(recovery ? <ResetPasswordScreen accessToken={recovery.accessToken}
                            refreshToken={recovery.refreshToken}
                            expiresIn={recovery.expiresIn} />
            : published ? <PublishedList data={published} /> : <App />);
})();
logMsg("INIT","React mounted");
  </script>
</body>
