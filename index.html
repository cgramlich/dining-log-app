// ===== Map view =========================================================
// Full-screen overlay showing your places on an OpenStreetMap map.
//  - Plots every restaurant that already has cached coordinates immediately.
//  - Lazily geocodes any with an address but no/stale coords, one at a time,
//    >= 1.1s apart (Nominatim policy), adding pins as they resolve.
//  - Persists new coords back up via onSaveCoords (one batched commit), and
//    also flushes on unmount so partial progress is never lost.
// Leaflet (global L) renders; if it failed to load we degrade gracefully.
function MapView({ restaurants, cityFilter, cfg, onOpen, onClose, onSaveCoords, onHome }){
  const divRef   = useRef(null);
  const mapRef   = useRef(null);
  const layerRef = useRef(null);
  const savedRef = useRef({});                 // {id: coordUpdate} pending persist
  const [places, setPlaces]     = useState(function(){ return restaurants.slice(); });
  const [progress, setProgress] = useState(null);   // {done,total} while backfilling
  const leafletReady = typeof L !== "undefined";

  // apply the same city filter the Places tab had active
  const filtered = (!cityFilter || cityFilter === "All")
    ? places
    : (cityFilter === "(no location)"
        ? places.filter(function(r){ return !r.location; })
        : places.filter(function(r){ return r.location === cityFilter; }));

  function flushSaves(){
    const ups = savedRef.current;
    if (ups && Object.keys(ups).length){
      onSaveCoords(Object.assign({}, ups));
      savedRef.current = {};
    }
  }

  // init the Leaflet map once
  useEffect(function(){
    if (!leafletReady || !divRef.current) return;
    const map = L.map(divRef.current, { zoomControl:true, attributionControl:true });
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19, attribution:"&copy; OpenStreetMap contributors"
    }).addTo(map);
    map.setView([20, 0], 2);
    layerRef.current = L.layerGroup().addTo(map);
    mapRef.current = map;
    logMsg("MAP", "Leaflet map initialised");
    // container is sized by flex CSS after mount; nudge Leaflet to re-measure
    setTimeout(function(){ try { map.invalidateSize(); } catch(e){} }, 60);
    return function(){ try { map.remove(); } catch(e){} mapRef.current = null; };
  }, [leafletReady]);

  // (re)draw markers whenever the filtered set changes
  useEffect(function(){
    const map = mapRef.current, layer = layerRef.current;
    if (!map || !layer) return;
    layer.clearLayers();
    const pts = [];
    filtered.forEach(function(r){
      if (r.lat == null || r.lng == null) return;
      const m = L.circleMarker([r.lat, r.lng], {
        radius:8, weight:2,
        color:     r.favorite ? "#e0764a" : "#9b8b78",
        fillColor: r.favorite ? "#e0764a" : "#c9b8a8",
        fillOpacity:0.85
      });
      const el = document.createElement("div");
      el.className = "mappop";
      el.innerHTML =
        "<div class='mappop-name'>" + escapeHtml(r.name) + "</div>" +
        (r.cuisine ? "<div class='mappop-sub'>" + escapeHtml(r.cuisine) + "</div>" : "") +
        "<button class='mappop-open'>Open</button>";
      const btn = el.querySelector(".mappop-open");
      if (btn) btn.addEventListener("click", function(){ onOpen(r); });
      m.bindPopup(el);
      m.addTo(layer);
      pts.push([r.lat, r.lng]);
    });
    if (pts.length){
      try { map.fitBounds(pts, { padding:[40,40], maxZoom:15 }); } catch(e){}
    }
  }, [filtered]);

  // lazy geocode backfill - runs once when the map opens
  useEffect(function(){
    if (!leafletReady) return;
    let cancelled = false;
    (async function(){
      const need = restaurants.filter(geoNeedsUpdate);
      if (!need.length){ logMsg("MAP", "No restaurants need geocoding"); return; }
      logMsg("MAP", "Backfill geocoding " + need.length + " place(s)");
      setProgress({ done:0, total:need.length });
      for (let i=0;i<need.length;i++){
        if (cancelled) break;
        const r = need[i];
        let upd = null;
        try {
          const hit = await geocodeAddress(r.address, false);
          upd = hit
            ? { lat:hit.lat, lng:hit.lng, geo_addr:r.address, geo_ok:true,  geo_failed:false }
            : { lat:null,    lng:null,    geo_addr:r.address, geo_ok:false, geo_failed:true  };
        } catch(e){
          upd = null;   // transient (network) - leave unmarked so we retry later
          logMsg("MAP", "Geocode error for " + r.name + ": " + e.message);
        }
        if (upd && !cancelled){
          savedRef.current[r.id] = upd;
          setPlaces(function(prev){
            return prev.map(function(p){ return p.id === r.id ? Object.assign({}, p, upd) : p; });
          });
        }
        if (!cancelled) setProgress({ done:i+1, total:need.length });
        if (i < need.length - 1) await sleep(1100);   // <= 1 request / second
      }
      if (!cancelled){ setProgress(null); flushSaves(); }
    })();
    return function(){ cancelled = true; flushSaves(); };
  }, [leafletReady]);  // eslint-disable-line

  const mapped     = filtered.filter(function(r){ return r.lat != null && r.lng != null; }).length;
  const noAddr     = filtered.filter(function(r){ return !r.address || !r.address.trim(); }).length;
  const failed     = filtered.filter(function(r){ return r.geo_failed && (!r.lat || !r.lng); }).length;
  const notMapped  = noAddr + failed;

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}>Back</button>
        <h2>Map</h2>
        <HomeBtn onHome={onHome} />
      </div>
      <div className="map-body">
        {!leafletReady && (
          <div className="empty" style={{padding:"40px 22px"}}>
            <div className="big">Map unavailable</div>
            <div>The map library could not load. Check your connection and reopen.</div>
          </div>
        )}
        {leafletReady && <div ref={divRef} className="map-canvas" />}
        {leafletReady && (
          <div className="map-foot">
            {progress
              ? <span className="row" style={{gap:8}}>
                  <span className="spin" /> Locating your places&hellip; {progress.done} of {progress.total}
                </span>
              : <span>{mapped} {mapped===1?"place":"places"} on the map</span>}
            {notMapped > 0 && !progress && (
              <span className="faint">
                {notMapped} not mapped{noAddr>0 ? " (" + noAddr + " without an address)" : ""}
              </span>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


function RestaurantsView({restaurants, visits, locations, cfg, activeFilter, onFilterChange, onOpenMap, onPublishList, onOpenMyLists, savedListCount, onOpen, onNearMe, onSpin, onCreateRestaurant, onDeleteRestaurant}){
  const [query, setQuery] = useState("");
  const [sortBy, setSortBy] = useState("alpha");
  const [cuisineFilter, setCuisineFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("all");   // all | try | been
  // Google search from the box (only offered when nothing saved matches).
  const [gBusy, setGBusy] = useState(false);
  const [gErr, setGErr]   = useState("");
  const [gResults, setGResults] = useState(null);   // null=not searched | array
  function gMapErr(err){
    if (err && err.status === 402) return "Finding places on Google is a Pro feature.";
    return (err && (err.detail || err.message)) || "Couldn't reach Google. Try again.";
  }
  function geoOnce(){
    return new Promise((resolve)=>{
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        p => resolve({ lat:p.coords.latitude, lng:p.coords.longitude }),
        () => resolve(null),
        { enableHighAccuracy:false, timeout:8000, maximumAge:300000 });
    });
  }
  async function runGooglePlaceSearch(term){
    const qy = (term || "").trim();
    if (!qy) return;
    setGBusy(true); setGErr(""); setGResults(null);
    try {
      const loc = await geoOnce();
      const body = { query:qy, max_results:12 };
      if (loc){ body.lat = loc.lat; body.lng = loc.lng; }
      const data = await placesSearchText(cfg, body);
      const list = ((data && data.places) || []).filter(p => p.business_status !== "CLOSED_PERMANENTLY");
      setGResults(list);
      if (!list.length) setGErr("No matches on Google. Add the city or street and try again.");
    } catch(err){ setGResults([]); setGErr(gMapErr(err)); }
    finally { setGBusy(false); }
  }
  function pickGooglePlace(c){
    if (!onCreateRestaurant){ setGErr("Can't add a place here."); return; }
    const newRest = {
      id: uid("rest"),
      name: (c.name || query.trim() || "New place"),
      cuisine: "", location: c.city || "",
      address: c.address || "", phone: c.phone || "", website: c.website || "", notes: "",
      favorite: false, added_date: todayISO(),
      google_place_id: c.place_id || undefined,
      lat: (c.lat != null ? c.lat : undefined),
      lng: (c.lng != null ? c.lng : undefined),
    };
    onCreateRestaurant(newRest);   // parent commits + opens the new place
  }
  // Reset any Google results when the search text changes, so the finder starts
  // fresh on the next no-match search rather than showing stale hits.
  useEffect(()=>{ setGResults(null); setGErr(""); }, [query]);
  if (!restaurants.length){
    // Still surface group orders / invites - a brand-new account (e.g. someone
    // invited to their first order) has no places yet but must see the invite.
    return (
      <div>
        <ActiveGroupOrders cfg={cfg} />
        <div className="empty">
          <div className="big">No places yet</div>
          <div>Add a restaurant or scan a menu from the + button.</div>
        </div>
      </div>
    );
  }
  const countVisits = (id)=> visits.filter(v => v.restaurant_id === id).length;

  // Location filter chips come ONLY from the Settings master list (the curated
  // set). A place can still have any free-text city, but it won't get a chip
  // until that city is added in Settings - it just lives under "All".
  const cityChips = Array.from(new Set(locations || []))
    .sort((a,b)=> a.localeCompare(b));

  // Cuisines actually in use, cleaned the same way Near me cleans Google types
  // ("italian_restaurant"/"italian"/"Italian" all collapse to one "Italian"
  // chip), then deduped case-insensitively.
  const cuisineInUse = (function(){
    const seen = new Map();   // lower-cased canonical -> display label
    restaurants.forEach(r => {
      const c = normalizeCuisine(r.cuisine);   // same vocabulary as Near me; extras kept
      if (c && !seen.has(c.toLowerCase())) seen.set(c.toLowerCase(), c);
    });
    return Array.from(seen.values()).sort((a,b)=> a.localeCompare(b));
  })();

  // If a previously-selected city is no longer a curated chip, fall back to "All"
  // (no side effect - just treat it as All for this render).
  const filterRaw = activeFilter || "All";
  const filter = (filterRaw === "All" || filterRaw === "(no location)" || cityChips.indexOf(filterRaw) !== -1)
    ? filterRaw : "All";
  const byCity = filter === "All"
    ? restaurants
    : filter === "(no location)"
      ? restaurants.filter(r => !r.location)
      : restaurants.filter(r => r.location === filter);
  const visible = cuisineFilter === "All"
    ? byCity
    : byCity.filter(r => normalizeCuisine(r.cuisine).toLowerCase() === cuisineFilter.toLowerCase());

  const q = query.trim().toLowerCase();
  const searchedRaw = q ? visible.filter(r =>
    ((r.name || "") + " " + (r.cuisine || "") + " " + (r.location || ""))
      .toLowerCase().includes(q)
  ) : visible;
  // "Want to try" = flagged wishlist & not yet visited. "Been" = has a visit.
  const wantCount = restaurants.filter(r => r.wishlist && countVisits(r.id) === 0).length;
  const searched = statusFilter === "try"
      ? searchedRaw.filter(r => r.wishlist && countVisits(r.id) === 0)
    : statusFilter === "been"
      ? searchedRaw.filter(r => countVisits(r.id) > 0)
    : searchedRaw;

  const byName = (a,b)=> (a.name || "").localeCompare(b.name || "");
  // Average of a place's own visit ratings (for the "Highest rated" sort, to
  // match History). -1 when it has no rated visits, so unrated sink to the end.
  const avgRating = (rid)=> {
    const rest = (restaurants || []).find(x => x.id === rid);
    if (rest && typeof rest.my_rating === "number") return rest.my_rating;   // place rating wins
    const rs = (visits || []).filter(v => v.restaurant_id === rid && typeof v.rating === "number").map(v => v.rating);
    return rs.length ? (rs.reduce((a,b)=> a + b, 0) / rs.length) : -1;       // legacy fallback
  };
  const favsSorted   = searched.filter(r => r.favorite).sort(byName);
  const othersSorted = searched.filter(r => !r.favorite).sort(byName);
  const ordered =
    sortBy === "added"  ? [...searched].sort((a,b)=> (b.added_date || "").localeCompare(a.added_date || "") || byName(a,b)) :
    sortBy === "rating" ? [...searched].sort((a,b)=> (avgRating(b.id) - avgRating(a.id)) || byName(a,b)) :
                          [...searched].sort(byName);  // "alpha"

  const Card = (r)=> {
    const inner = (
      <div className="card tap" onClick={()=> onOpen(r)}
        style={{display:"flex",alignItems:"center",gap:0}}>
        {r.photo ? (
          <div className="rest-thumb">
            <PhotoImg cfg={cfg} path={r.photo} />
          </div>
        ) : (r.google_photo_name && cfg) ? (
          <div className="rest-thumb">
            <GooglePhoto cfg={cfg} name={r.google_photo_name} attribution={r.google_photo_attr} thumb={true} />
          </div>
        ) : (
          <div className="rest-thumb photo-shell">
            <Icon name="image" size={18} color="#5a5045" />
          </div>
        )}
        <div className="between" style={{flex:1,minWidth:0}}>
          <div style={{minWidth:0}}>
            <div className="place-name">
              {r.name}
              {r.wishlist && countVisits(r.id) === 0 ? (
                <span className="chip" style={{marginLeft:8, fontSize:11, padding:"1px 7px",
                      verticalAlign:"middle", color:"var(--accent)", borderColor:"var(--accent)"}}>Want to try</span>
              ) : null}
            </div>
            <div className="meta-line" style={{marginTop:4}}>
              {r.cuisine || "Restaurant"}
              {r.location ? "  \u00b7  " + r.location : ""}
              {countVisits(r.id) > 0 ? "  \u00b7  " + countVisits(r.id) + " visit(s)" : ""}
            </div>
          </div>
          <span className={"fav" + (r.favorite ? " on" : "")}>
            <Icon name="star" size={20} color={r.favorite ? "#e0764a" : "#80715f"} />
          </span>
        </div>
      </div>
    );
    return onDeleteRestaurant
      ? <SwipeToDelete key={r.id} onDelete={()=> onDeleteRestaurant(r)}>{inner}</SwipeToDelete>
      : <div key={r.id}>{inner}</div>;
  };

  // only show chips if there is something worth filtering by
  const showChips = cityChips.length > 0;
  const hasUnplaced = restaurants.some(r => !r.location);

  // One-tap "share my [city] spots": only when a real city filter is active
  // (not All, not the no-location bucket). Publishes a short list page into
  // the public app repo (nice preview card) and opens the share sheet; if
  // the page cannot be created, the long ?list= link is shared instead.
  const [cityShareBusy, setCityShareBusy] = useState(false);
  const isCityFilter = filter !== "All" && filter !== "(no location)";
  const shareCity = async ()=>{
    if (cityShareBusy) return;
    const places = visible;   // already scoped to the active city
    if (!places.length) return;
    setCityShareBusy(true);
    try {
      const title   = "My " + filter + " spots";
      const payload = buildListPayload(title, places, visits);
      const enc     = encodeListPayload(payload);
      const longUrl = location.origin + location.pathname + "?list=" + enc;
      logMsg("PUBLISH","City share \"" + title + "\" (" + places.length + " places)");
      let url = longUrl;
      try { const s = await publishListPage(cfg, payload, enc); if (s) url = s; }
      catch(e){ logMsg("WARN","City share publish failed: " + e.message); }
      if (navigator.share){
        try { await navigator.share({ title, text:"A few places I love:", url }); }
        catch(e){ /* user cancelled or unsupported */ }
      } else {
        try { await navigator.clipboard.writeText(url); alert("Link copied to clipboard."); }
        catch(e){ logMsg("WARN","City share clipboard failed: " + e.message); }
      }
    } finally {
      setCityShareBusy(false);
    }
  };

  return (
    <div>
      <ActiveGroupOrders cfg={cfg} />
      <SearchBar value={query} onChange={setQuery}
        placeholder="Search places, cuisine, city" />
      {onOpenMap && (
        <div className="row" style={{margin:"0 0 10px", flexWrap:"wrap", gap:8}}>
          <React.Fragment>
            {onNearMe ? (
              <button className="btn ghost sm" onClick={onNearMe}>
                <Icon name="locate" size={15} color="var(--accent)" />
                Near me
              </button>
            ) : null}
            {onSpin ? (
              <button className="btn ghost sm" onClick={onSpin}>
                <Icon name="compass" size={15} color="var(--accent)" />
                Can't decide?
              </button>
            ) : null}
            {onPublishList && restaurants.length ? (
              <button className="btn ghost sm" onClick={onPublishList}>
                <Icon name="share" size={15} color="var(--accent)" />
                Publish a list
              </button>
            ) : null}
            {onOpenMyLists && savedListCount > 0 ? (
              <button className="btn ghost sm" onClick={onOpenMyLists}>
                <Icon name="book" size={15} color="var(--accent)" />
                My Lists
              </button>
            ) : null}
          </React.Fragment>
          <button className="btn ghost sm map-open-btn" onClick={onOpenMap}>
            <Icon name="pin" size={15} color="var(--accent)" />
            Map
          </button>
        </div>
      )}
      <div className="chips" style={{margin:"2px 0 14px"}}>
        <span className={"chip pick" + (statusFilter === "all" ? " on" : "")}
          onClick={()=> setStatusFilter("all")}>All</span>
        <span className={"chip pick" + (statusFilter === "try" ? " on" : "")}
          onClick={()=> setStatusFilter("try")}>Want to try{wantCount ? " (" + wantCount + ")" : ""}</span>
        <span className={"chip pick" + (statusFilter === "been" ? " on" : "")}
          onClick={()=> setStatusFilter("been")}>Been</span>
      </div>

      {showChips && (
        <div className="chips" style={{margin:"2px 0 14px"}}>
          <span
            className={"chip pick" + (filter === "All" ? " on" : "")}
            onClick={()=> onFilterChange("All")}>All</span>
          {cityChips.map(c => (
            <span key={c}
              className={"chip pick" + (filter === c ? " on" : "")}
              onClick={()=> onFilterChange(c)}>{c}</span>
          ))}
          {hasUnplaced && (
            <span
              className={"chip pick" + (filter === "(no location)" ? " on" : "")}
              onClick={()=> onFilterChange("(no location)")}>No location</span>
          )}
        </div>
      )}

      {cuisineInUse.length >= 2 && (
        <div className="chips" style={{margin:"0 0 14px"}}>
          <span className={"chip pick" + (cuisineFilter === "All" ? " on" : "")}
            onClick={()=> setCuisineFilter("All")}>All cuisines</span>
          {cuisineInUse.map(c => (
            <span key={c} className={"chip pick" + (cuisineFilter === c ? " on" : "")}
              onClick={()=> setCuisineFilter(c)}>{c}</span>
          ))}
        </div>
      )}

      {isCityFilter && visible.length > 0 && (
        <button className="btn ghost sm" onClick={shareCity} disabled={cityShareBusy}
                style={{margin:"0 0 14px"}}>
          {cityShareBusy
            ? <><span className="spin" /> Preparing link&hellip;</>
            : <><Icon name="share" size={15} color="var(--accent)" /> Share my {filter} spots</>}
        </button>
      )}

      <div className="sortbar">
        <span className="sortbar-lbl">Sort</span>
        <span className={"chip pick" + (sortBy === "alpha" ? " on" : "")} onClick={()=> setSortBy("alpha")}>A&ndash;Z</span>
        <span className={"chip pick" + (sortBy === "added" ? " on" : "")} onClick={()=> setSortBy("added")}>Recently added</span>
        <span className={"chip pick" + (sortBy === "rating" ? " on" : "")} onClick={()=> setSortBy("rating")}>Highest rated</span>
        <span className={"chip pick" + (sortBy === "fav" ? " on" : "")} onClick={()=> setSortBy("fav")}>{"♥ Loved"}</span>
      </div>

      {searched.length === 0 && (
        <div className="empty" style={{padding:"30px 20px"}}>
          <div className="big">{q ? "No matches"
            : statusFilter === "try" ? "Nothing to try yet"
            : statusFilter === "been" ? "No visits yet"
            : "Nothing in " + filter}</div>
          <div>{q
            ? "Not in your places yet."
            : statusFilter === "try" ? "Add a place and mark it “Want to try,” or tap the book icon on any place."
            : statusFilter === "been" ? "Log a visit to a place and it shows up here."
            : "Add a restaurant in this location, or pick a different filter."}</div>
          {q && onCreateRestaurant ? (
            <div style={{marginTop:14}}>
              <button className="btn ghost sm" disabled={gBusy}
                onClick={()=> runGooglePlaceSearch(query)}>
                {gBusy ? <span className="spin" />
                  : <span className="row" style={{gap:6, justifyContent:"center"}}>
                      <Icon name="locate" size={15} color="var(--accent)" />
                      Search Google for "{query.trim()}"
                    </span>}
              </button>
              {gErr ? <div className="tiny faint" style={{marginTop:8}}>{gErr}</div> : null}
              {Array.isArray(gResults) && gResults.length > 0 ? (
                <div style={{marginTop:12, textAlign:"left"}}>
                  {gResults.map((c,i)=>(
                    <div key={i} className="pick-row"
                      style={{padding:"10px 12px", borderBottom:"1px solid var(--line-soft)", cursor:"pointer"}}
                      onClick={()=> pickGooglePlace(c)}>
                      <div className="small" style={{fontWeight:600}}>{c.name}</div>
                      {c.address ? <div className="tiny faint" style={{marginTop:2}}>{c.address}</div> : null}
                    </div>
                  ))}
                  <div className="tiny faint" style={{marginTop:8, textAlign:"center"}}>Tap a result to add it to your places.</div>
                </div>
              ) : null}
            </div>
          ) : null}
        </div>
      )}

      {sortBy === "fav" ? (
        favsSorted.length > 0
          ? favsSorted.map(Card)
          : (searched.length > 0 ? (
              <div className="empty" style={{padding:"24px 20px"}}>
                <div className="big">No loved places yet</div>
                <div>Tap the heart on a place to add it here.</div>
              </div>
            ) : null)
      ) : ordered.map(Card)}
    </div>
  );
}

   RESTAURANT DETAIL

// Community menu library panel on a place page. Lets you PULL a menu others have
// already digitized for this place (keyed by Google Place ID) and SHARE this
// place's menus back. Renders nothing unless the place is linked to Google.
function fmtCommunityDate(iso){
  try { return new Date(iso).toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" }); }
  catch(e){ return ""; }
}
function CommunityMenuPanel({cfg, restaurant, localMenus, onImport}){
  const placeId = restaurant && restaurant.google_place_id;
  const [open, setOpen]       = useState(false);
  const [list, setList]       = useState(null);   // null=unloaded | array
  const [busy, setBusy]       = useState(false);
  const [err, setErr]         = useState("");
  const [msg, setMsg]         = useState("");
  const [picked, setPicked]   = useState({});     // community id -> bool
  const [pulling, setPulling] = useState(false);
  const [shareBusy, setShareBusy] = useState(false);
  if (!placeId) return null;

  async function load(){
    setBusy(true); setErr("");
    try { setList(await communityListMenus(cfg, placeId)); }
    catch(e){ setErr("Couldn't load community menus right now."); setList(null); }
    setBusy(false);
  }
  function toggleOpen(){ const n = !open; setOpen(n); if (n && list === null) load(); }

  async function pull(){
    const ids = Object.keys(picked).filter(id => picked[id]);
    if (!ids.length) return;
    setPulling(true); setErr(""); setMsg("");
    try {
      const fetched = [];
      for (let i = 0; i < ids.length; i++){
        const cm = await communityGetMenu(cfg, ids[i]);
        fetched.push({
          menu_id: uid("menu"),
          label: cm.label || "Menu",
          sections: (cm.menu && cm.menu.sections) || [],
          last_updated: todayISO(),
          source: "community",
          community_at: cm.updated_at || cm.created_at || null,
        });
      }
      if (fetched.length && onImport) onImport(fetched);
      setPicked({});
    } catch(e){ setErr("Couldn't pull that menu. Try again."); }
    setPulling(false);
  }

  async function shareLocal(){
    const ms = (localMenus || []).filter(m => m && (m.sections || []).length);
    if (!ms.length){ setMsg("No saved menus here to share yet."); return; }
    setShareBusy(true); setErr(""); setMsg("");
    try {
      let n = 0;
      for (let i = 0; i < ms.length; i++){
        await communityShareMenu(cfg, {
          place_id: placeId,
          place_name: restaurant.name || "",
          label: ms[i].label || "Main",
          menu: { sections: sanitizeMenuForShare(ms[i].sections) },   // public fields only
        });
        n++;
      }
      setMsg("Contributed " + n + " menu" + (n>1?"s":"") + ". Thanks for helping the community!");
      if (list !== null) load();
    } catch(e){ setErr("Couldn't share right now. Try again."); }
    setShareBusy(false);
  }

  return (
    <div className="card" style={{marginBottom:12}}>
      <div className="row between" style={{alignItems:"center", cursor:"pointer"}} onClick={toggleOpen}>
        <span className="small" style={{fontWeight:600}}>
          <Icon name="nodes" size={14} color="var(--accent)" /> Community menus
        </span>
        <span className="tiny faint">{open ? "▾" : "▸"}</span>
      </div>
      {open && (
        <div style={{marginTop:10}}>
          {busy ? <div className="tiny faint"><span className="spin" /> Checking the library&hellip;</div> : null}
          {err ? <div className="tiny faint">{err}</div> : null}
          {msg ? <div className="tiny" style={{color:"var(--accent)"}}>{msg}</div> : null}
          {!err && list !== null && list.length === 0 && !busy ? (
            <div className="tiny faint">No community menus for this place yet &mdash; be the first to contribute yours below.</div>
          ) : null}
          {list && list.length > 0 ? (
            <div style={{marginTop:4}}>
              <div className="tiny faint" style={{marginBottom:6}}>
                Community-contributed &middot; not verified. Tap to choose, then pull in.
              </div>
              {list.map(cm => {
                const on = !!picked[cm.id];
                return (
                  <div key={cm.id} className="pick-row" style={{display:"flex",alignItems:"center",gap:10}}
                    onClick={()=> setPicked(p => Object.assign({}, p, { [cm.id]: !p[cm.id] }))}>
                    <span className="go-check" style={{flex:"none"}}>{on ? "✓" : ""}</span>
                    <span style={{flex:1, minWidth:0}}>
                      <span className="small" style={{fontWeight:600}}>{cm.label}</span>
                      <span className="tiny faint">{" · " + cm.item_count + " item" + (cm.item_count===1?"":"s") + (cm.contributor_count > 1 ? " · " + cm.contributor_count + " people" : "") + (cm.updated_at ? " · " + fmtCommunityDate(cm.updated_at) : "")}</span>
                    </span>
                  </div>
                );
              })}
              <button className="btn ghost sm" style={{marginTop:8, width:"100%"}}
                disabled={pulling || !Object.values(picked).some(Boolean)}
                onClick={pull}>
                {pulling ? <span className="spin" /> : "Pull selected into my menus"}
              </button>
            </div>
          ) : null}
          <div style={{marginTop:10, borderTop:"1px solid var(--line-soft)", paddingTop:10}}>
            <button className="btn ghost sm" style={{width:"100%"}} disabled={shareBusy} onClick={shareLocal}>
              {shareBusy ? <span className="spin" /> : "Contribute my scan to the community"}
            </button>
            <div className="tiny faint" style={{marginTop:6}}>
              Adds your scanned menus so anyone at {restaurant.name || "this place"} can pull them in &mdash; only the menu, never your visits, notes, or ratings.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RestaurantDetail({restaurant, menus, visits, cfg, onClose, onLogVisit,
                           onEdit, onAddMenu, onImportCommunityMenus, onOpenMenu, onOpenVisit,
                           onToggleFav, onToggleWishlist, onSetMyRating, onDelete, onDeleteMenuById, onSaveItemNutrition, onSplitVisit, onStartGroup, onEnrich, onLinkGoogle, onSetMenuOrder, onStampMeta, onAddPhotos, onToggleVisitLoved, onUpgrade, onHome}){
  const [confirmDel, setConfirmDel] = useState(false);
  const [lightbox, setLightbox]     = useState(null);   // {paths, index} | null
  const [addPhotoFor, setAddPhotoFor] = useState(null); // visit awaiting a card-level photo add
  const addPhotoRef = useRef(null);
  const [shareBusy, setShareBusy]   = useState(false);
  const [mShareBusy, setMShareBusy] = useState(false);   // inline single-menu share
  const [mShareErr, setMShareErr]   = useState(null);
  const [enrichBusy, setEnrichBusy] = useState(false);
  const [enrichErr, setEnrichErr]   = useState("");
  const [linkBusy, setLinkBusy]     = useState(false);
  const [linkErr, setLinkErr]       = useState("");
  const [linkQuery, setLinkQuery]   = useState(()=>
    (restaurant && restaurant.name ? restaurant.name : "")
    + (restaurant && (restaurant.address || restaurant.location)
        ? ", " + (restaurant.address || restaurant.location) : ""));
  const [candidates, setCandidates] = useState(null);   // Google match candidates, or null
  // ---- menu drag-to-reorder state (pointer events; touch + mouse) ----
  const [dragMenuId, setDragMenuId] = useState(null);   // id being dragged (for styling)
  const dragMenuIdRef = useRef(null);                   // live id (synchronous logic)
  const dragOrderRef  = useRef(null);                   // working order of non-Main menu_ids
  const [, setDragBump] = useState(0);                  // force a re-render while dragging
  const menuRowRefs   = useRef({});                     // menu_id -> DOM node (for hit-testing)
  const [dietFilter, setDietFilter] = useState(null);   // active dietary filter label, or null
  const [expenseVisit, setExpenseVisit] = useState(null);  // visit being turned into an expense item
  if (!restaurant){
    return (
      <div className="overlay">
        <div className="ovhead"><h2>Not found</h2>
          <button className="x" onClick={onClose}>Close</button></div>
      </div>
    );
  }
  const r = restaurant;
  // "Update from Google": refetch this place's details and open the edit form
  // with Google's contact/location fields overlaid for review. Pro-gated by the
  // backend (free -> 402). Only offered when we have a google_place_id.
  async function updateFromGoogle(){
    if (!r.google_place_id || enrichBusy) return;
    setEnrichBusy(true); setEnrichErr("");
    try {
      const data = await placesDetails(cfg, r.google_place_id);
      const p = (data && data.place) || {};
      const enrich = {};
      if (p.address) { enrich.address = p.address; enrich.geo_addr = p.address; }
      if (p.phone)   enrich.phone = p.phone;
      if (p.website) enrich.website = p.website;
      if (p.lat != null) enrich.lat = p.lat;
      if (p.lng != null) enrich.lng = p.lng;
      // Google place photo: store the resource name + required attribution (not the
      // image itself - it's fetched on demand via /api/places/photo and shown with credit).
      if (p.photo_name){ enrich.google_photo_name = p.photo_name; enrich.google_photo_attr = p.photo_attribution || ""; }
      // Stamp display-only Google meta (rating/price/hours) straight onto the
      // place so it's fetched once, not per page view (Places calls cost money).
      const meta = { g_enriched_at: todayISO() };
      if (typeof p.rating === "number")       meta.g_rating = p.rating;
      if (typeof p.rating_count === "number") meta.g_rating_count = p.rating_count;
      if (p.price_level != null && p.price_level !== "") meta.g_price_level = p.price_level;
      if (Array.isArray(p.hours) && p.hours.length)      meta.g_hours = p.hours.slice(0, 7);
      onStampMeta && onStampMeta(meta);
      onEnrich && onEnrich(enrich);
    } catch(e){
      setEnrichErr(e && e.status === 402 ? "Updating from Google is a Pro feature."
        : (e && e.detail) ? e.detail
        : "Couldn't reach Google - try again.");
    } finally { setEnrichBusy(false); }
  }
  // "Find on Google": for a place with NO google_place_id, text-search by name
  // (+ city + coords bias) and let the user confirm the match. The pick stamps
  // google_place_id (via onLinkGoogle); "Update from Google" can then enrich.
  async function linkSearch(override){
    if (linkBusy) return;
    setLinkBusy(true); setLinkErr(""); setCandidates(null);
    try {
      // Prefer the full address (best disambiguator for generic names like
      // "W Lounge"); fall back to city; allow a typed override to refine.
      const auto = r.name + (r.address ? (", " + r.address) : (r.location ? (", " + r.location) : ""));
      const q = (override && override.trim()) ? override.trim() : auto;
      const body = { query: q, max_results: 8 };
      if (r.lat != null && r.lng != null) { body.lat = r.lat; body.lng = r.lng; }
      const data = await placesSearchText(cfg, body);
      setCandidates((data && data.places) || []);
    } catch(e){
      setLinkErr(e && e.status === 402 ? "Linking to Google is a Pro feature."
        : (e && e.detail) ? e.detail
        : "Couldn't search Google - try again.");
    } finally { setLinkBusy(false); }
  }
  // A menu labeled "Main" pins to the top; everything else keeps its order
  // (Array.sort is stable, so non-Main menus stay as they were).
  const menuList = (menus || []).slice().sort((a,b)=>
    ((((a.label||"").trim().toLowerCase() === "main") ? 0 : 1)
     - (((b.label||"").trim().toLowerCase() === "main") ? 0 : 1)));
  // Reorder support: "Main" menus stay pinned at the top; everything after them
  // (indices >= menuMainCount) is the reorderable block. Only worth showing the
  // up/down controls when there are 2+ non-Main menus.
  const menuMainCount = menuList.filter(m =>
    ((m.label||"").trim().toLowerCase() === "main")).length;
  const canReorderMenus = (menuList.length - menuMainCount) > 1;
  // Non-"Main" menus (the reorderable block) in current display order.
  const nonMainMenus = menuList.slice(menuMainCount);
  const nonMainIds   = nonMainMenus.map(m => m.menu_id);
  // Drag-to-reorder via pointer events (works for touch + mouse). The grip
  // captures the pointer; as it moves past other rows we live-reorder a working
  // copy of the non-Main ids; on release we persist via onSetMenuOrder.
  function menuDragStart(e, id){
    if (!canReorderMenus) return;
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_e){}
    dragMenuIdRef.current = id;
    dragOrderRef.current  = nonMainIds.slice();
    setDragMenuId(id);
  }
  function menuDragMove(e){
    if (!dragMenuIdRef.current || !dragOrderRef.current) return;
    e.preventDefault();
    const order = dragOrderRef.current;
    const y = e.clientY;
    let target = order.length - 1;
    for (let k = 0; k < order.length; k++){
      const node = menuRowRefs.current[order[k]];
      if (!node) continue;
      const rect = node.getBoundingClientRect();
      if (y < rect.top + rect.height / 2){ target = k; break; }
    }
    const from = order.indexOf(dragMenuIdRef.current);
    if (from < 0 || from === target) return;
    order.splice(target, 0, order.splice(from, 1)[0]);   // move dragged id to target slot
    setDragBump(b => b + 1);
  }
  function menuDragEnd(){
    const id = dragMenuIdRef.current;
    if (!id) return;
    const finalOrder = (dragOrderRef.current || nonMainIds).slice();
    dragMenuIdRef.current = null;
    dragOrderRef.current  = null;
    setDragMenuId(null);
    if (onSetMenuOrder && finalOrder.join("|") !== nonMainIds.join("|")) onSetMenuOrder(finalOrder);
  }

  // ---- diet-type filter -------------------------------------------------
  // Build a combined "diet menu" from matching dishes across ALL of this place's
  // menus. Matching is TAG-based only (we never guess a dish is vegan from its
  // name - mislabeling food is a real harm). Only diets with >=1 tagged item show.
  const DIET_LABELS = {
    "vegan":"Vegan", "vegetarian":"Vegetarian",
    "gluten-free":"Gluten-free", "gluten free":"Gluten-free", "glutenfree":"Gluten-free", "gf":"Gluten-free",
    "dairy-free":"Dairy-free", "dairy free":"Dairy-free",
    "keto":"Keto", "halal":"Halal", "kosher":"Kosher", "pescatarian":"Pescatarian",
  };
  const normTag = (t) => String(t || "").trim().toLowerCase();
  // Diet labels for a dish, applying vegan -> vegetarian (so a vegan dish also
  // shows under Vegetarian, even for already-scanned data). One source of truth
  // for both the chip counts and the filtered view.
  const dietLabelsOf = (it) => {
    const set = new Set();
    (it.tags || []).forEach(t => { const L = DIET_LABELS[normTag(t)]; if (L) set.add(L); });
    if (set.has("Vegan")) set.add("Vegetarian");
    return set;
  };
  const dietCounts = {};                       // display label -> item count across all menus
  menuList.forEach(mn => (mn.sections || []).forEach(s => (s.items || []).forEach(it => {
    dietLabelsOf(it).forEach(L => { dietCounts[L] = (dietCounts[L] || 0) + 1; });
  })));
  const dietChips = Object.keys(dietCounts).sort();
  function buildDietMenu(label){
    const matches = it => dietLabelsOf(it).has(label);
    const sectionMap = new Map();              // section name -> items[]
    menuList.forEach(mn => (mn.sections || []).forEach(s => {
      const keep = (s.items || []).filter(matches);
      if (!keep.length) return;
      const key = s.name || "Items";
      if (!sectionMap.has(key)) sectionMap.set(key, []);
      sectionMap.get(key).push(...keep);
    }));
    return { label: label, sections: Array.from(sectionMap.entries()).map(([name, items]) => ({ name, items })) };
  }
  // Guard: if a filtered diet no longer has matches (e.g. data changed), drop it.
  const dietMenu = (dietFilter && dietCounts[dietFilter]) ? buildDietMenu(dietFilter) : null;
  // Format a Google price level (number 0-4 or PRICE_LEVEL_* enum) as $ signs.
  const gPrice = (pl) => {
    if (pl == null || pl === "") return "";
    if (typeof pl === "number") return pl > 0 ? "$".repeat(Math.min(4, pl)) : "";
    const m = { PRICE_LEVEL_INEXPENSIVE:"$", PRICE_LEVEL_MODERATE:"$$",
                PRICE_LEVEL_EXPENSIVE:"$$$", PRICE_LEVEL_VERY_EXPENSIVE:"$$$$" };
    return m[pl] || "";
  };
  // Photos from this place's visits - a quick picture gallery, no API cost.
  const visitPhotos = [];
  (visits || []).forEach(v => {
    (Array.isArray(v.photos) ? v.photos : []).forEach(p => { if (p) visitPhotos.push(p); });
    (Array.isArray(v.dishes) ? v.dishes : []).forEach(d => { if (d && d.photo) visitPhotos.push(d.photo); });
  });

  // ---- dish memory: what to order again here -------------------------
  // For each distinct dish (case-insensitive), we go by its MOST RECENT
  // verdict - the verdict from the latest visit where you actually rated it.
  // A later "skip" overrides an earlier "again" (and vice-versa); simply not
  // ordering a dish on a later visit does NOT count against it.
  //   lovedDishes: dishes whose most-recent verdict is "again", with a count
  //     of how many times you've marked that dish "again".
  //   lastVisit / lastVisitDishes: the single most recent visit's plate.
  const byDate = (visits || []).slice().sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    ((b.logged_at || 0) - (a.logged_at || 0))
  );
  // walk newest -> oldest; the FIRST time we meet a dish is its latest verdict
  const dishMemo = new Map();   // key -> { name, latestVerdict, againCount }
  byDate.forEach(v => (v.dishes || []).forEach(d => {
    if (!d || !d.name || !d.verdict) return;        // only verdict-bearing dishes
    const k = d.name.trim().toLowerCase();
    if (!dishMemo.has(k)){
      dishMemo.set(k, { name:d.name, latestVerdict:d.verdict, againCount:0 });
    }
    if (verdictPositive(d.verdict)) dishMemo.get(k).againCount++;
  }));
  const lovedDishes = Array.from(dishMemo.values())
    .filter(x => verdictPositive(x.latestVerdict))                 // loved OR again
    .map(x => ({ name:x.name, count:x.againCount, verdict:x.latestVerdict }))
    .sort((a,b)=> ((b.verdict==="loved")?1:0) - ((a.verdict==="loved")?1:0)   // loved tier first
                  || b.count - a.count || a.name.localeCompare(b.name));
  const lastVisit = byDate[0] || null;
  const lastVisitDishes = (lastVisit && lastVisit.dishes) ? lastVisit.dishes : [];
  const showPicks = lovedDishes.length > 0 || lastVisitDishes.length > 0;

  // Build a self-contained PNG card and hand it to the iOS share sheet.
  // No link, no repo access - just an image the recipient can keep.
  async function share(){
    if (shareBusy) return;
    setShareBusy(true);
    try {
      // make sure the web fonts are ready so canvas text uses Fraunces/Outfit
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
      // load the restaurant photo (reuses the cached blob URL; canvas-safe)
      let photoImg = null;
      if (r.photo && cfg){
        try {
          const u = await getPhotoBlobUrl(cfg, r.photo);
          photoImg = await loadImage(u);
        } catch(e){
          logMsg("SHARE","Photo unavailable for card, using plain header: " + e.message);
          photoImg = null;
        }
      }
      const ratingAvg = placeRating(r, visits);   // place rating (latest-wins)
      const sub = [r.cuisine, r.location].filter(Boolean).join("  \u00b7  ");
      logMsg("SHARE","Building card for " + r.name + " (loved=" + lovedDishes.length + ", rating=" + ratingAvg.toFixed(1) + ")");
      const blob = await buildRestaurantCardBlob({
        name: r.name, sub: sub, ratingAvg: ratingAvg,
        address: r.address || "", loved: lovedDishes, photoImg: photoImg
      });
      const file = new File([blob], "menucaptain-" + slugify(r.name) + ".png", { type:"image/png" });
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        try {
          await navigator.share({ files:[file], title: r.name });
          logMsg("SHARE","Shared card via share sheet");
        } catch(e){
          // AbortError = user cancelled the sheet; not an error
          if (e && e.name !== "AbortError") logMsg("SHARE","Share sheet failed: " + e.message);
        }
      } else {
        // fallback: download the PNG so the user can save/send it manually
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = u; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=> URL.revokeObjectURL(u), 2000);
        logMsg("SHARE","File-share unsupported - downloaded the card instead");
      }
    } catch(e){
      logMsg("ERROR","Share card failed: " + e.message);
      alert("Could not build the share card: " + e.message);
    } finally {
      setShareBusy(false);
    }
  }

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>{r.name}</h2>
        {onEdit ? (
          <button className="x" onClick={onEdit} aria-label="Edit place" title="Edit place">
            <Icon name="edit" size={19} color="#b3a591" />
          </button>
        ) : null}
        <button className="x" onClick={share} disabled={shareBusy} aria-label="Share">
          {shareBusy ? <span className="spin" /> : <Icon name="share" size={20} color="#b3a591" />}
        </button>
        {onToggleWishlist ? (
          <button className="x" onClick={()=> onToggleWishlist(r)}
            aria-label={r.wishlist ? "On your Want to try list" : "Add to Want to try"}
            title={r.wishlist ? "On your Want to try list" : "Want to try"}>
            <Icon name="book" size={19} color={r.wishlist ? "#e0764a" : "#80715f"} />
          </button>
        ) : null}
        <button className="x" onClick={onToggleFav} aria-label={r.favorite ? "Loved" : "Mark as loved"}>
          <span style={{fontSize:23, lineHeight:1, color: r.favorite ? "#d64961" : "#80715f"}}>
            {r.favorite ? "♥" : "♡"}
          </span>
        </button>
      </div>
      <div className="ovbody">
        {r.photo && cfg && (
          <div className="rest-hero">
            <PhotoImg cfg={cfg} path={r.photo} />
          </div>
        )}
        {!r.photo && r.google_photo_name && cfg && (
          <GooglePhoto cfg={cfg} name={r.google_photo_name} attribution={r.google_photo_attr} />
        )}
        <div className="meta-line">
          {r.cuisine || "Restaurant"}
          {r.location ? "  \u00b7  " + r.location : ""}
        </div>

        <div className="row" style={{gap:10, alignItems:"center", marginTop:10, flexWrap:"wrap"}}>
          <span className="small faint" style={{flex:"none"}}>Your rating</span>
          <StarRater value={placeRating(r, visits)} size={30}
            onChange={(val)=> onSetMyRating && onSetMyRating(val)} />
        </div>

        {(r.g_rating != null || gPrice(r.g_price_level) || (r.g_hours && r.g_hours.length)) && (
          <div style={{marginTop:8}}>
            <div className="row" style={{gap:12, flexWrap:"wrap", alignItems:"center"}}>
              {r.g_rating != null && (
                <span className="small">
                  <span style={{color:"var(--accent)"}}>{"\u2605"}</span> {Number(r.g_rating).toFixed(1)}
                  {r.g_rating_count ? <span className="faint"> ({r.g_rating_count})</span> : null}
                </span>
              )}
              {gPrice(r.g_price_level) ? <span className="small faint">{gPrice(r.g_price_level)}</span> : null}
            </div>
            {r.g_hours && r.g_hours.length > 0 && (
              <details style={{marginTop:6}}>
                <summary className="small" style={{cursor:"pointer", color:"var(--accent)"}}>Hours</summary>
                <div style={{marginTop:6}}>
                  {r.g_hours.map((h,i)=> <div key={i} className="tiny faint">{h}</div>)}
                </div>
              </details>
            )}
            <div className="tiny faint" style={{marginTop:4}}>
              From Google{r.g_enriched_at ? " \u00b7 updated " + r.g_enriched_at : ""}
            </div>
          </div>
        )}

        {(r.address || r.phone || r.website) && (
          <div className="card" style={{marginTop:12}}>
            {r.address && (
              <div className="row" style={{marginBottom:r.phone||r.website?10:0}}>
                <Icon name="pin" size={17} color="#b3a591" />
                <span className="small">{r.address}</span>
              </div>
            )}
            {r.phone && (
              <div className="row" style={{marginBottom:r.website?10:0}}>
                <Icon name="phone" size={17} color="#b3a591" />
                <a className="small" href={"tel:" + r.phone.replace(/[^0-9+]/g,"")}>{r.phone}</a>
              </div>
            )}
            {r.website && (
              <div className="row">
                <Icon name="link" size={17} color="#b3a591" />
                <a className="small" target="_blank" rel="noreferrer"
                   href={(r.website.indexOf("http")===0 ? r.website : "https://" + r.website)}>
                  {r.website}
                </a>
              </div>
            )}
          </div>
        )}

        {r.notes && <div className="card small muted">{r.notes}</div>}

        <SpendReveal visits={visits} scope="restaurant" />

        {showPicks && (
          <div className="card picks">
            {lovedDishes.length > 0 && (
              <div style={{marginBottom: lastVisitDishes.length ? 14 : 0}}>
                <div className="picks-head">You've loved these here</div>
                <div className="chips">
                  {lovedDishes.map((d,i)=>(
                    <span key={i} className={"chip dish" + dishChipClass(d.verdict)}>
                      {d.verdict === "loved" ? "\u2665 " : ""}{d.name}{d.count > 1 ? "  \u00d7" + d.count : ""}
                    </span>
                  ))}
                </div>
              </div>
            )}
            {lastVisitDishes.length > 0 && (
              <div>
                <div className="picks-head">Last time &middot; {fmtDate(lastVisit.date)}</div>
                <div className="chips">
                  {lastVisitDishes.map((d,i)=>(
                    <span key={i} className={"chip dish" +
                      dishChipClass(d.verdict)}>
                      {d.name}
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        <button className="btn primary" onClick={onLogVisit} style={{marginTop:4}}>
          <Icon name="plus" size={18} color="#1b1714" />Log a visit here
        </button>

        <button className="btn ghost" onClick={onStartGroup} style={{marginTop:8}}>
          <Icon name="nodes" size={16} color="var(--accent)" />Group order
        </button>

        {/* Direct path to the AI "Help me order" (it lives on the menu page).
            Single-menu only: with 2+ menus, tap a menu card for that menu's helper. */}
        {menuList.length === 1 && (
          <button className="btn ghost" onClick={()=> onOpenMenu(menuList[0].menu_id)} style={{marginTop:8}}>
            <Icon name="sparkle" size={16} color="var(--accent)" />Help me order
          </button>
        )}

        {r.google_place_id && (
          <button className="btn ghost" onClick={updateFromGoogle} disabled={enrichBusy} style={{marginTop:8}}>
            {enrichBusy
              ? <span className="spin" />
              : <><Icon name="locate" size={16} color="var(--accent)" />Update from Google</>}
          </button>
        )}
        {enrichErr ? <div className="tiny faint" style={{marginTop:6}}>{enrichErr}</div> : null}

        {!r.google_place_id && (
          <div style={{marginTop:8}}>
            <button className="btn ghost" onClick={()=> linkSearch()} disabled={linkBusy} style={{width:"100%"}}>
              {linkBusy
                ? <span className="spin" />
                : <><Icon name="locate" size={16} color="var(--accent)" />Find on Google</>}
            </button>
            <div className="row" style={{gap:8, marginTop:8}}>
              <input className="input" value={linkQuery}
                onChange={e=> setLinkQuery(e.target.value)}
                onKeyDown={e=>{ if (e.key === "Enter") linkSearch(linkQuery); }}
                placeholder="Refine: name + street or city" />
              <button className="btn ghost sm" style={{flex:"none"}}
                disabled={linkBusy || !linkQuery.trim()} onClick={()=> linkSearch(linkQuery)}>Search</button>
            </div>
            <div className="tiny faint" style={{marginTop:5}}>
              Generic names ("W Lounge") need the city or street to match. Try "W Lounge, 100 Stuart St Boston".
            </div>
          </div>
        )}
        {linkErr ? <div className="tiny faint" style={{marginTop:6}}>{linkErr}</div> : null}
        {candidates && candidates.length > 0 && (
          <div className="card" style={{marginTop:8}}>
            <div className="small muted" style={{marginBottom:8}}>Pick the match (links it to Google):</div>
            {candidates.map(c => (
              <div key={c.place_id} className="badge-row" style={{display:"flex", alignItems:"flex-start", gap:8}}>
                <div style={{flex:1, minWidth:0}}>
                  <div className="badge-name">{c.name}</div>
                  {c.address ? <div className="badge-sub">{c.address}</div> : null}
                </div>
                <button className="btn primary sm" style={{flex:"none"}}
                  onClick={()=>{ if (onLinkGoogle) onLinkGoogle(c.place_id, c); setCandidates(null); }}>
                  This one
                </button>
              </div>
            ))}
            <button className="btn ghost sm" style={{marginTop:6}} onClick={()=> setCandidates(null)}>None of these</button>
          </div>
        )}
        {candidates && candidates.length === 0 && (
          <div className="tiny faint" style={{marginTop:6}}>No Google matches. Add the city or street address in the box above and search again.</div>
        )}

        {visitPhotos.length > 0 && (
          <div style={{marginTop:14}}>
            <div className="divider-label" style={{margin:"0 0 8px"}}>Photos from your visits</div>
            <div style={{display:"flex", gap:8, overflowX:"auto", paddingBottom:4}}>
              {visitPhotos.slice(0, 12).map((p, i) => (
                <div key={i} className="visit-photo">
                  <PhotoImg cfg={cfg} path={p} />
                </div>
              ))}
            </div>
          </div>
        )}

        {/* menus list - one menu shows expanded inline; 2+ stay as cards */}
        <div className="row between" style={{margin:"22px 0 10px",alignItems:"center"}}>
          <div className="divider-label" style={{margin:0,flex:1}}>
            {menuList.length === 0
              ? "Menus"
              : "Menus (" + menuList.length + ")"}
          </div>
          {menuList.length >= 1 && (
            <button className="btn ghost sm" disabled={mShareBusy}
              onClick={()=> publishAndSharePlace(cfg, r, menuList, setMShareBusy, setMShareErr)}
              style={{flex:"none",padding:"6px 12px",margin:0,marginRight:8}}
              title="Share this place and its menu">
              {mShareBusy ? <span className="spin" /> : <span className="row" style={{gap:5}}><Icon name="share" size={14} />Share</span>}
            </button>
          )}
          {menuList.length >= 1 && (
            <ShareToConnectionButton cfg={cfg} restaurant={r} menuList={menuList} />
          )}
          <button className="btn ghost sm" onClick={onAddMenu}
            style={{flex:"none",padding:"6px 12px",margin:0}}>
            <Icon name="plus" size={15} />Add menu
          </button>
        </div>

        {mShareErr && (
          <div className="tiny faint" style={{margin:"0 0 10px"}}>{mShareErr}</div>
        )}

        <CommunityMenuPanel cfg={cfg} restaurant={r} localMenus={menuList}
          onImport={onImportCommunityMenus} />

        {/* Dietary filter: chips for diets that have tagged matches; tapping one
            shows a combined menu of those dishes pulled from all of this place's menus. */}
        {dietChips.length > 0 && (
          <div className="row" style={{gap:8, flexWrap:"wrap", alignItems:"center", margin:"0 0 12px"}}>
            <span className="tiny faint" style={{marginRight:2}}>Dietary:</span>
            {dietChips.map(L => (
              <button key={L} className={"chip" + (dietFilter === L ? " on" : "")}
                onClick={()=> setDietFilter(dietFilter === L ? null : L)}>
                {L} ({dietCounts[L]})
              </button>
            ))}
          </div>
        )}

        {dietFilter && (
          <div>
            <div className="row between" style={{alignItems:"center", margin:"0 0 8px"}}>
              <div className="small muted">{dietFilter} · from all menus ({dietCounts[dietFilter] || 0})</div>
              <button className="btn ghost sm" style={{flex:"none"}} onClick={()=> setDietFilter(null)}>Show all menus</button>
            </div>
            {dietMenu && dietMenu.sections.length > 0
              ? <MenuView menu={dietMenu} cfg={cfg} restaurantName={r.name} cuisine={r.cuisine} />
              : <div className="card" style={{textAlign:"center"}}>
                  <div className="small muted">No {dietFilter} items found in this place's menus.</div>
                </div>}
            <div className="tiny faint" style={{textAlign:"center", marginTop:8}}>
              Based on each dish's tags - some dishes may not be tagged.
            </div>
          </div>
        )}

        {!dietFilter && menuList.length === 0 && (
          <div className="card" style={{textAlign:"center"}}>
            <div className="small muted" style={{marginBottom:11}}>
              No menus saved for this place yet. Tap <strong>Add menu</strong> above to
              scan one.
            </div>
          </div>
        )}

        {!dietFilter && menuList.length === 1 && (() => {
          // A lone menu shows as a compact card (same as multi-menu places),
          // tappable to open the full menu page - rather than dumping every
          // item onto the place's cover page. The card keeps the menu's label
          // (e.g. "Brunch") visible and matches the multi-menu look.
          const m0 = menuList[0];
          const n0 = (m0.sections || []).reduce((n,s)=> n + ((s.items || []).length), 0);
          const row = (
            <div className="menu-row" onClick={()=> onOpenMenu(m0.menu_id)}>
              <div style={{flex:1, minWidth:0}}>
                <div className="menu-row-label">{m0.label || "Menu"}</div>
                <div className="tiny faint" style={{marginTop:3}}>
                  {n0} item{n0 === 1 ? "" : "s"}
                  {m0.captured_date ? "  ·  Captured " + fmtDate(m0.captured_date) : ""}
                  {m0.source === "community" ? " (community)" : m0.source === "web" ? " (web)" : m0.source === "seed" ? " (starter)" : ""}
                </div>
              </div>
              <Icon name="chev" size={18} color="#80715f" />
            </div>
          );
          return onDeleteMenuById
            ? <SwipeToDelete key={m0.menu_id} onDelete={()=> onDeleteMenuById(m0.menu_id)}>{row}</SwipeToDelete>
            : <div key={m0.menu_id}>{row}</div>;
        })()}

        {!dietFilter && menuList.length > 1 && (
          <div className="tiny faint" style={{margin:"0 2px 8px"}}>
            Swipe a menu left, then tap the trash to delete{canReorderMenus ? " · drag the ☰ handle to reorder" : ""}.
          </div>
        )}
        {!dietFilter && menuList.length > 1 && (() => {
          // Render pinned "Main" menus first (no grip), then the non-Main menus
          // in the live (drag) order, each with a drag grip when reordering is on.
          const order = (dragMenuIdRef.current && dragOrderRef.current)
            ? dragOrderRef.current : nonMainIds;
          const orderedNonMain = order
            .map(id => nonMainMenus.find(mm => mm.menu_id === id))
            .filter(Boolean);
          const card = (m, draggable) => {
            const itemCount = (m.sections || []).reduce(
              (n,s) => n + ((s.items || []).length), 0);
            const dragging = dragMenuId === m.menu_id;
            const row = (
              <div className="menu-row"
                ref={draggable ? (el => { if (el) menuRowRefs.current[m.menu_id] = el; }) : undefined}
                style={dragging ? {opacity:0.85, boxShadow:"0 8px 20px rgba(0,0,0,.35)", transform:"scale(1.01)"} : undefined}
                onClick={()=>{ if (!dragMenuIdRef.current) onOpenMenu(m.menu_id); }}>
                {draggable && canReorderMenus && (
                  <span aria-label="Drag to reorder" title="Drag to reorder"
                    style={{touchAction:"none", cursor:"grab", color:"#a08e76", fontSize:22,
                            lineHeight:1, padding:"14px 16px", margin:"-8px 6px -8px -10px",
                            flex:"none", userSelect:"none", alignSelf:"stretch",
                            display:"flex", alignItems:"center"}}
                    onClick={(e)=> e.stopPropagation()}
                    onPointerDown={(e)=>{ e.stopPropagation(); menuDragStart(e, m.menu_id); }}
                    onPointerMove={menuDragMove}
                    onPointerUp={menuDragEnd}
                    onPointerCancel={menuDragEnd}>
                    {"\u2630"}</span>
                )}
                <div style={{flex:1, minWidth:0}}>
                  <div className="menu-row-label">{m.label || "Menu"}</div>
                  <div className="tiny faint" style={{marginTop:3}}>
                    {itemCount} item{itemCount === 1 ? "" : "s"}
                    {"  \u00b7  Captured " + fmtDate(m.captured_date)}
                    {m.source === "community" ? " (community)" : m.source === "web" ? " (web)" : m.source === "seed" ? " (starter)" : ""}
                  </div>
                </div>
                <Icon name="chev" size={18} color="#80715f" />
              </div>
            );
            return onDeleteMenuById
              ? <SwipeToDelete key={m.menu_id} onDelete={()=> onDeleteMenuById(m.menu_id)}>{row}</SwipeToDelete>
              : <div key={m.menu_id}>{row}</div>;
          };
          return menuList.slice(0, menuMainCount).map(m => card(m, false))
            .concat(orderedNonMain.map(m => card(m, true)));
        })()}

        {/* visits at this place */}
        <div className="divider-label">Visits here ({visits.length})</div>
        {visits.length === 0 && (
          <div className="small faint" style={{padding:"2px 2px 8px"}}>
            No visits logged here yet.
          </div>
        )}
        {visits.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(v => {
          const vphotos = Array.isArray(v.photos) ? v.photos.filter(Boolean) : [];
          return (
            <div key={v.id} className="card tap" onClick={()=> onOpenVisit && onOpenVisit(v)}>
              {vphotos.length > 0 && (
                <div className="visit-photos" style={{marginTop:0,marginBottom:10}}>
                  {vphotos.map((p,i)=> (
                    <div key={i} className="visit-photo tap"
                      onClick={(e)=>{ e.stopPropagation(); setLightbox({ paths:vphotos, index:i }); }}>
                      <PhotoImg cfg={cfg} path={p} />
                    </div>
                  ))}
                </div>
              )}
              <div className="between">
                <div className="small muted">{fmtDate(v.date)}</div>
                {onToggleVisitLoved ? (
                  <button className={"fav" + (v.loved ? " on" : "")}
                    title={v.loved ? "Loved - tap to remove" : "Mark this visit loved"}
                    style={{flex:"none", background:"none", border:"none", cursor:"pointer", padding:4}}
                    onClick={(e)=>{ e.stopPropagation(); onToggleVisitLoved(v); }}>
                    <Icon name="heart" size={18} color={v.loved ? "#d9604e" : "#80715f"} />
                  </button>
                ) : (v.loved ? (
                  <span className="fav on" title="Loved" style={{flex:"none"}}>
                    <Icon name="heart" size={18} color="#d9604e" />
                  </span>
                ) : null)}
              </div>
              {v.dishes && v.dishes.length > 0 && (
                <div className="chips">
                  {v.dishes.map((d,i)=> (
                    <span key={i} className={"chip dish" +
                      dishChipClass(d.verdict)}>
                      {d.name}{dishShareLabel(d)}{d.nutrition && d.nutrition.kcal ? " \u00b7 ~" + dishKcalNum(d) : ""}{d.price ? " \u00b7 " + fmtPrice(d.price) : ""}
                    </span>
                  ))}
                </div>
              )}
              <DishTotal dishes={v.dishes} />
              <NutriLine n={v.nutrition} />
              {v.notes && <div className="small muted" style={{marginTop:8}}>{v.notes}</div>}
              {(v.companions || []).length ? (
                <div className="small muted" style={{marginTop:8}}>With {v.companions.map(p=> p.name).join(", ")}</div>
              ) : null}
              {v.split ? (
                <VisitSplit split={v.split} cfg={cfg} receipt={v.receipt}
                  merchant={v.restaurant_name} date={v.date}
                  onSeeItemized={onSplitVisit ? ()=> onSplitVisit(v) : null} />
              ) : (
                <ReceiptReveal cfg={cfg} receipt={v.receipt} />
              )}
              <div className="row" style={{gap:8, marginTop:9, flexWrap:"wrap"}}>
                {onAddPhotos ? (
                  <button className="btn ghost sm" style={{flex:"none"}} onClick={(e)=>{
                    e.stopPropagation();
                    setAddPhotoFor(v);
                    if (addPhotoRef.current) addPhotoRef.current.click();
                  }}><Icon name="camera" size={15} />Add photo</button>
                ) : null}
                {!v.split && onSplitVisit && ((v.receipt && v.receipt.total) || (v.dishes||[]).some(d=>parsePrice(d.price))) ? (
                  <button className="btn ghost sm" style={{flex:"none"}} onClick={(e)=>{ e.stopPropagation(); onSplitVisit(v); }}>Split the check</button>
                ) : null}
                {((v.receipt && v.receipt.total) || v.split || (v.dishes||[]).some(d=>parsePrice(d.price))) ? (
                  <button className="btn ghost sm" style={{flex:"none"}} onClick={(e)=>{ e.stopPropagation(); setExpenseVisit(v); }}>Expense this</button>
                ) : null}
              </div>
            </div>
          );
        })}

        {/* one shared input for the per-card "Add photo"; on iOS this offers
            both Take Photo and Photo Library, so camera capture is built in */}
        <input ref={addPhotoRef} type="file" accept="image/*" multiple
          style={{display:"none"}}
          onChange={(e)=>{
            const fs = e.target.files; const v = addPhotoFor;
            e.target.value = "";
            if (v && onAddPhotos) onAddPhotos(v, fs);
            setAddPhotoFor(null);
          }} />

        {/* manage */}
        <div className="divider-label">Manage</div>
        <button className="btn ghost" onClick={onEdit} style={{marginBottom:10}}>
          <Icon name="edit" size={17} />Edit restaurant
        </button>
        {!confirmDel ? (
          <button className="btn danger" onClick={()=> setConfirmDel(true)}>
            <Icon name="trash" size={17} />Delete restaurant
          </button>
        ) : (
          <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)"}}>
            <div className="small" style={{marginBottom:11}}>
              Delete {r.name} and its saved menu(s)? Logged visits are kept in History.
            </div>
            <div className="row" style={{gap:9}}>
              <button className="btn ghost" onClick={()=> setConfirmDel(false)}>Cancel</button>
              <button className="btn danger" onClick={onDelete}>Delete</button>
            </div>
          </div>
        )}
        <div style={{height:30}} />
      </div>
      {expenseVisit && (
        <ExpenseSheet
          data={(()=>{
            const v = expenseVisit;
            const sp = v.split || null;
            const usingSplit = !!(sp && Array.isArray(sp.items) && sp.items.length);
            const items = usingSplit
              ? sp.items.map(it => ({ name: it.name, price: Number(it.price) || 0 }))
              : (v.dishes || []).filter(d => parsePrice(d.price)).map(d => ({ name: d.name, price: parsePrice(d.price) }));
            const itemsSub = items.reduce((a,it)=> a + (it.price || 0), 0);
            const rt = (v.receipt && v.receipt.total) || 0;
            // Keep TOTAL consistent with the items it's prorated against, or the
            // gross/net math is wrong: for a split use its grand (derived from the
            // same line items); for plain dishes use the scanned total only when the
            // logged items plausibly ARE the whole check (<= ~50% over for tax+tip),
            // otherwise they're just your picks so use their subtotal.
            const total = usingSplit
              ? ((typeof sp.grand === "number" && sp.grand > 0) ? sp.grand : (rt || itemsSub))
              : ((itemsSub > 0 && rt >= itemsSub && rt <= itemsSub * 1.5) ? rt : (itemsSub || rt));
            // tax in dollars from the saved split (for the optional itemized
            // tax/gratuity breakout); null when there's no split to read it from.
            const spTax = (()=>{
              if (!sp || sp.tax == null) return null;
              const t = Number(sp.tax) || 0;
              if (sp.taxMode === "%"){ const subC = (sp.lines || []).reduce((a,l)=> a + (Number(l.price)||0), 0); return subC * t / 100; }
              return t;
            })();
            return { date: v.date, merchant: (r && r.name) || v.restaurant_name || "Restaurant",
              city: (r && (r.city || r.location)) || "", items: items, total: total,
              tax: spTax,
              people: (sp && sp.people) || [],
              receipts: [
                (v.receipt && v.receipt.photo) ? { key:"itemized", label:"Itemized check", path:v.receipt.photo } : null,
                (v.receipt && v.receipt.final_photo) ? { key:"final", label:"Final receipt", path:v.receipt.final_photo } : null,
              ].filter(Boolean) };
          })()}
          cfg={cfg}
          onUpgrade={onUpgrade}
          onHome={onHome}
          onClose={()=> setExpenseVisit(null)} />
      )}
      {lightbox && (
        <PhotoLightbox cfg={cfg} paths={lightbox.paths} index={lightbox.index}
          onClose={()=> setLightbox(null)} />
      )}
    </div>
  );
}

/* ============================================================
   MENU DETAIL - the drilled-in view of a single menu, with its
   own back button, inline re-scan/delete row, search, and sections
   ============================================================ */
function MenuDetail({restaurant, menu, visits, cfg, onClose, onReScan, onDeleteMenu, onSaveItemNutrition, onRenameMenu, onSaveItemTags, onHome}){
  const [confirmDel, setConfirmDel] = useState(false);
  const [sharing,  setSharing]  = useState(false);   // menu-share in progress
  const [shareErr, setShareErr] = useState(null);     // small note under the row
  const [renaming, setRenaming] = useState(false);    // rename this menu's name
  const [renameText, setRenameText] = useState(menu.label || "");
  // "help me order" state
  const [askInput, setAskInput] = useState("");
  const [asking,   setAsking]   = useState(false);
  const [answer,   setAnswer]   = useState(null);
  const [askErr,   setAskErr]   = useState(null);
  // "explain the menu" state
  const [explainOpen, setExplainOpen] = useState(false);   // pick-dishes mode
  const [explainPicks, setExplainPicks] = useState({});    // dish name -> bool
  const [explaining, setExplaining] = useState(false);
  const [explanation, setExplanation] = useState(null);
  const [explainErr, setExplainErr] = useState(null);
  const hasKey = configComplete(cfg);
  const _dh = dishHistory(visits);
  const hasHistory = _dh.loved.length > 0 || _dh.disliked.length > 0;

  async function runAsk(override){
    const q = ((override != null ? override : askInput) || "").trim();
    if (!q) return;
    if (override != null) setAskInput(override);
    if (!hasKey){ setAskErr("Set up your account in Settings first."); return; }
    setAsking(true); setAskErr(null); setAnswer(null);
    try {
      const a = await askMenu(cfg, restaurant, menu, visits, q);
      setAnswer(a);
    } catch(err){
      setAskErr(err.message || "Something went wrong. Try again.");
    } finally {
      setAsking(false);
    }
  }

  // All dish names on this menu (for the pick-dishes-to-explain chips).
  const allDishNames = (menu.sections || [])
    .flatMap(s => (s.items || []).map(it => (it.name || "").trim()))
    .filter(Boolean);
  const pickedNames = allDishNames.filter(n => explainPicks[n]);

  async function runExplain(){
    if (!hasKey){ setExplainErr("Set up your account in Settings first."); return; }
    const picks = explainOpen ? pickedNames : [];
    if (explainOpen && !picks.length){ setExplainErr("Pick at least one dish to explain."); return; }
    setExplaining(true); setExplainErr(null); setExplanation(null);
    try {
      const a = await explainMenu(cfg, restaurant, menu, picks);
      setExplanation(a);
    } catch(err){
      setExplainErr(err.message || "Something went wrong. Try again.");
    } finally {
      setExplaining(false);
    }
  }

  if (!menu){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
          <h2>Menu</h2><span style={{width:40}} />
        </div>
        <div className="ovbody">
          <div className="small faint" style={{padding:16}}>
            This menu no longer exists.
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>{menu.label || "Menu"}</h2>
        <HomeBtn onHome={onHome} />
      </div>
      <div className="ovbody">
        <div className="tiny faint" style={{marginBottom:4}}>
          {restaurant ? restaurant.name : ""}
        </div>

        {/* inline action row: captured date + rescan + delete */}
        <div className="row between" style={{alignItems:"center",marginBottom:10}}>
          <div className="tiny faint">
            Captured {fmtDate(menu.captured_date)}
            {menu.source === "seed" ? " (starter data)" : ""}
          </div>
          <div className="row" style={{gap:6,flex:"none"}}>
            <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
              onClick={()=> publishAndShareMenu(cfg, restaurant, menu, setSharing, setShareErr)}
              disabled={sharing} title="Share this menu">
              {sharing ? <span className="spin" /> : <Icon name="share" size={15} />}
            </button>
            <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
              onClick={onReScan} title="Re-scan this menu">
              <Icon name="camera" size={15} />
            </button>
            {onRenameMenu && (
              <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                onClick={()=>{ setRenameText(menu.label || ""); setRenaming(r => !r); }} title="Rename this menu">
                <Icon name="edit" size={15} />
              </button>
            )}
            <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
              onClick={()=> setConfirmDel(c => !c)} title="Delete this menu">
              <Icon name="trash" size={15}
                color={confirmDel ? "#d9604e" : "#80715f"} />
            </button>
          </div>
        </div>

        {renaming && (
          <div className="card" style={{marginBottom:10}}>
            <div className="small muted" style={{marginBottom:8}}>Rename this menu</div>
            <input className="input" value={renameText} autoFocus
              placeholder="Menu name (e.g. Main)"
              onChange={e=> setRenameText(e.target.value)}
              onKeyDown={e=>{ if (e.key === "Enter"){ e.preventDefault(); const v=(renameText||"").trim(); if (v){ onRenameMenu(v); setRenaming(false); } } }} />
            <div className="row" style={{gap:8, marginTop:10}}>
              <button className="btn ghost sm" onClick={()=> setRenaming(false)}>Cancel</button>
              <button className="btn primary sm" disabled={!(renameText||"").trim()}

      setItemBusy(b => Object.assign({}, b, { [key]:false }));

          {(open[i] || q) && items.map(({it,oj})=>{
            const key = i + ":" + oj;
            return (
              <div key={oj} className="mitem">
                <div className="ihead">
                  <span className="inm">{it.name}</span>
                  {it.price

                </div>
                {it.description && <div className="idesc">{it.description}</div>}
                {!editTags && it.tags && it.tags.length > 0 && (
                  <div className="chips" style={{marginTop:6}}>
                    {it.tags.map((t,k)=> <span key={k} className="chip tag">{t}</span>)}

                    {[["vegan","Vegan"],["vegetarian","Vegetarian"],["gluten-free","Gluten-free"]].map(([tag,label])=>{
                      const has = (it.tags || []).some(t => String(t).trim().toLowerCase() === tag);

                        <button key={tag} className={"chip pick" + (has ? " on" : "")}

    </div>
  );

// Remember each person's Venmo @handle (keyed by name, on this device) so a
// repeat request is one tap and pre-addressed.
function loadVenmoHandles(){ try { return JSON.parse(localStorage.getItem("mc_venmo_handles") || "{}") || {}; } catch(e){ return {}; } }
function getVenmoHandle(name){ return loadVenmoHandles()[(name || "").trim().toLowerCase()] || ""; }
function saveVenmoHandle(name, handle){
  try { const m = loadVenmoHandles(); const k = (name || "").trim().toLowerCase();
    if (handle) m[k] = handle; else delete m[k];
    localStorage.setItem("mc_venmo_handles", JSON.stringify(m));
  } catch(e){}
