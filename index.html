    let _detail = ""; try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){}
    if (res.status === 402) throw new Error(_detail || "You’ve reached this month’s AI usage limit.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  if (json.stop_reason === "max_tokens"){
    throw new Error("That menu page was too large to read in one pass. Try a link to a single menu section.");
  }
  const text = (json.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  let parsed;
  try { parsed = parseJsonLoose(text); }
  catch(err){ throw new Error("Couldn’t read a menu from that page. Try scanning it instead."); }
  if (!Array.isArray(parsed.sections)) parsed.sections = [];
  parsed.sections = parsed.sections.map(s => ({
    name:String(s.name || "Menu"),
    items:(s.items || []).map(it => {
      const item = {
        name:String(it.name || "").trim(),
        description:String(it.description || "").trim(),
        price:String(it.price || "").trim(),
        tags:Array.isArray(it.tags) ? it.tags.map(String) : [],
        notes:String(it.notes || "").trim(),
      };
      const kc = Number(it.calories);
      if (isFinite(kc) && kc > 0){
        item.nutrition = { kcal:Math.round(kc), protein_g:0, carbs_g:0, fat_g:0,
          ingredients:[], foods:[], source:"menu_stated", confidence:"high",
          estimated_at:todayISO(), note:"" };
      }
      return item;
    }).filter(it => it.name),
  })).filter(s => s.items.length);
  return parsed;
}

/* ============================================================
   RECEIPT SCAN - read an itemized check into tickable line items
   ============================================================ */

// Small money formatter for dish prices: "$14" for whole dollars,
// "$14.50" otherwise. Returns "" for missing/invalid values.
function fmtPrice(p){
  const n = Number(p);
  if (!isFinite(n) || n <= 0) return "";
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
}

// ---- Price-data foundation -------------------------------------------------
// Prices live as display strings (menu scan) and numbers (receipts). parsePrice
// turns either into a dollar number for math, or null when there is no usable
// number. We derive numbers on read - stored strings are never rewritten.
function parsePrice(raw){
  if (raw === null || raw === undefined) return null;
  if (typeof raw === "number") return (isFinite(raw) && raw > 0) ? raw : null;
  let s = String(raw).trim();
  if (!s) return null;
  // Placeholders that are not a number.
  if (/^(mp|m\/p|market(\s*price)?|seasonal|ask|priceless|free|n\/a)$/i.test(s)) return null;
  // A price range ("14-18", "14 to 18") is ambiguous - skip rather than guess.
  if (/\d\s*(?:-|to|\u2013|\u2014)\s*\d/i.test(s)) return null;
  const m = s.replace(/,/g, "").match(/\d+(?:\.\d+)?/);   // first numeric token
  if (!m) return null;
  const n = Number(m[0]);
  return (isFinite(n) && n > 0) ? n : null;
}

// One visit's spend. Prefer the scanned check's grand total (real, incl. tax
// and tip); otherwise sum the dish line prices (approximate, pre-tax).
function visitSpendValue(v){
  if (v && v.receipt && v.receipt.total){
    const t = parsePrice(v.receipt.total);
    if (t != null) return { amount:t, exact:true };
  }
  let sum = 0, any = false;
  (v && Array.isArray(v.dishes) ? v.dishes : []).forEach(d => {
    const p = parsePrice(d && d.price);
    if (p != null){ sum += p; any = true; }
  });
  return any ? { amount:sum, exact:false } : { amount:0, exact:false };
}

// Total spend across a set of visits. approx=true when any contributing visit
// was summed from dish prices rather than a scanned check total.
function sumSpend(visits){
  let amount = 0, count = 0, allExact = true;
  (visits || []).forEach(v => {
    const sv = visitSpendValue(v);
    if (sv.amount > 0){ amount += sv.amount; count++; if (!sv.exact) allExact = false; }
  });
  return { amount, count, approx: !allExact };
}

// Subtle, opt-in spend reveal. Hidden behind a tap so the page stays calm -
// money is for memory here, never a budget. Renders nothing without price data.
function SpendReveal({visits, scope}){
  const [open, setOpen] = useState(false);
  const sp = sumSpend(visits);
  if (sp.amount <= 0) return null;
  const tilde = sp.approx ? "~" : "";
  const avg = sp.count > 0 ? sp.amount / sp.count : 0;
  const detail = scope === "restaurant"
    ? (tilde + fmtPrice(sp.amount) + " across " + sp.count + " visit" + (sp.count === 1 ? "" : "s")
       + (sp.count > 1 ? "  \u00b7  avg " + tilde + fmtPrice(avg) : ""))
    : (tilde + fmtPrice(sp.amount) + " across " + sp.count + " visit" + (sp.count === 1 ? "" : "s"));
  const foot = sp.approx
    ? "~ estimated from dish prices - a number for memory, not a budget."
    : "From your scanned checks - a number for memory, not a budget.";
  const inner = (
    <div>
      <a href="#" className="tiny" style={{color:"var(--accent)"}}
         onClick={(e)=>{ e.preventDefault(); setOpen(o=>!o); }}>
        {open ? "Hide spending" : "Spending"}
      </a>
      {open ? (
        <div className="tiny muted" style={{marginTop:5}}>
          {detail}
          <div className="tiny faint" style={{marginTop:3}}>{foot}</div>
        </div>
      ) : null}
    </div>
  );
  if (scope === "year") return <div style={{textAlign:"center", margin:"4px 0 18px"}}>{inner}</div>;
  return <div className="card">{inner}</div>;
}

// Backfill: write what was actually paid (from a saved visit's dishes) onto the
// matching menu items by exact name - the same name-match the app already uses
// to attach estimates. Additive only: a new `paid` record, never overwriting
// the menu's scanned list price. Returns an updated menus object or null.
function backfillPaidPrices(restId, dishes, menus, dateStr){
  if (!restId || !Array.isArray(dishes) || !dishes.length) return null;
  const list = menus[restId];
  if (!list || !list.length) return null;
  const paidByName = new Map();          // lowercased name -> paid amount
  dishes.forEach(d => {
    if (!d || !d.name) return;
    const amt = parsePrice(d.price);
    if (amt == null) return;
    const k = d.name.trim().toLowerCase();
    if (!paidByName.has(k)) paidByName.set(k, amt);
  });
  if (!paidByName.size) return null;
  let changed = 0;
  const nextList = list.map(m => {
    const sections = (m.sections || []).map(s => Object.assign({}, s, {
      items: (s.items || []).map(it => {
        if (!it || !it.name) return it;
        const amt = paidByName.get(it.name.trim().toLowerCase());
        if (amt == null) return it;
        if (it.paid && it.paid.amount === amt && it.paid.date === dateStr) return it; // idempotent
        changed++;
        return Object.assign({}, it, { paid:{ amount:amt, date:dateStr, source:"receipt" } });
      }),
    }));
    return Object.assign({}, m, { sections:sections });
  });
  if (!changed) return null;
  logMsg("PRICE","Backfilled paid price onto " + changed + " menu item(s) for " + restId);
  return Object.assign({}, menus, { [restId]:nextList });
}

// Parse 1-2 photos of a restaurant check. menuItemNames (the restaurant's
// digitized menu, may be empty) lets the model match receipt shorthand like
// "CHKN PARM" to the real menu item so downstream features line up.
async function parseReceiptPhotos(cfg, dataUrls, menuItemNames){
  let prompt =
    "You are reading a restaurant receipt (an itemized check) from the "+
    "attached photo(s). Respond with ONLY valid JSON, no other text:\n"+
    "{\n"+
    '  "merchant": string|null,\n'+
    '  "items": [ { "name": string, "qty": integer, "price": number|null, "menu_match": string|null } ],\n'+
    '  "subtotal": number|null,\n'+
    '  "tax": number|null,\n'+
    '  "tip": number|null,\n'+
    '  "service_charge": number|null,\n'+
    '  "total": number|null\n'+
    "}\n\n"+
    "Rules:\n"+
    "- merchant: the restaurant or business name printed at the top of the "+
    "receipt (not the address, phone, or 'Guest Check'), or null if unclear.\n"+
    "- items: food and drink line items ONLY. Skip tax, tip, subtotal, total, "+
    "discounts, service charges, table/server/payment lines.\n"+
    "- name: the item as printed, lightly cleaned up. Expand an abbreviation "+
    "only when it is obvious.\n"+
    "- qty: how many of the item were ordered (default 1). Read quantity in any "+
    "of these shapes: (a) a leading number, optionally with a serving word like "+
    "GL (glass), BTL (bottle), EA: '2 MARGARITA 18.00' -> qty 2; "+
    "'3 GL PRISONER 66.00' -> qty 3 (three glasses); '2 BTL TITOS 90.00' -> qty 2. "+
    "(b) a trailing multiplier: 'COFFEE x2' or 'COFFEE *2' -> qty 2. When you pull "+
    "a leading number/serving-word out as qty, drop that serving word from name "+
    "(so name is 'Prisoner', not '3 GL Prisoner'). Keep a size that is part of the "+
    "item itself, like '2oz Kahlua' (a 2-ounce pour), in the name; a separate "+
    "trailing 'x2' on that line is still the qty.\n"+
    "- price: the line's printed price as a number, the TOTAL for the whole line "+
    "(all units together), or null if unreadable. When qty > 1 the per-unit price "+
    "is price / qty.\n"+
    "- subtotal: the printed subtotal (items before tax/tip/charges), or null.\n"+
    "- tax: the printed tax amount, or null.\n"+
    "- tip: a gratuity/tip the customer ADDED (a line labeled Tip or Gratuity, "+
    "often handwritten or on the card slip), or null.\n"+
    "- service_charge: a MANDATORY auto-gratuity or service charge baked into the "+
    "check (e.g. 'Service Charge', 'Auto Gratuity', '20% gratuity', 'Party of 6+', "+
    "'Large Party', '6 or More') - the amount, or null. Keep it SEPARATE from a "+
    "customer-added tip.\n"+
    "- total: the final total printed on the check, or null.\n";
  if (menuItemNames && menuItemNames.length){
    prompt +=
      "- menu_match: this restaurant's menu items are listed below. If a "+
      "receipt line clearly refers to one of them, set menu_match to that "+
      "EXACT name (copy it verbatim). Otherwise null. Do not guess.\n"+
      "MENU ITEMS:\n" + menuItemNames.map(n => "- " + n).join("\n") + "\n";
  } else {
    prompt += "- menu_match: always null.\n";
  }

  const content = dataUrls.map(u => ({
    type:"image",
    source:{ type:"base64", media_type:"image/jpeg", data:u.split(",")[1] },
  }));
  content.push({ type:"text", text:prompt });

  logMsg("RECEIPT","Sending " + dataUrls.length + " receipt photo(s), menu names=" +
         (menuItemNames ? menuItemNames.length : 0));
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        ...(await authHeaders(cfg)),
      },
      body:JSON.stringify({
        task:"ocr_receipt",
        model:VISION_MODEL,   // advisory; server routes by task (Sonnet, same as menu/visit OCR)
        max_tokens:8000,      // headroom so a long check with many line items never truncates
        messages:[{ role:"user", content:content }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Receipt network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Receipt scan -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    throw new Error(_detail || ("Receipt scan failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  let parsed;
  try {
    parsed = parseJsonLoose(text);
  } catch(err){
    logMsg("ERROR","Could not parse receipt JSON: " + err.message);
    throw new Error("Couldn\u2019t read that receipt. Try a sharper, straight-on photo.");
  }
  const items = (Array.isArray(parsed.items) ? parsed.items : []).map(it => ({
    name: String(it.name || "").trim(),
    qty: Math.max(1, parseInt(it.qty, 10) || 1),
    price: (it.price === null || it.price === undefined || isNaN(Number(it.price)))
      ? null : Number(it.price),
    menu_match: it.menu_match ? String(it.menu_match).trim() : null,
  })).filter(it => it.name);
  const num = (v)=> (v === null || v === undefined || isNaN(Number(v))) ? null : Number(v);
  const total = num(parsed.total);
  const subtotal = num(parsed.subtotal);
  const tax = num(parsed.tax);
  const tip = num(parsed.tip);
  const service_charge = num(parsed.service_charge);
  const merchant = parsed.merchant ? String(parsed.merchant).trim().slice(0, 80) : "";
  logMsg("RECEIPT","Parsed " + items.length + " line item(s), total=" + total +
         " tax=" + tax + " tip=" + tip + " svc=" + service_charge + " merchant=" + merchant);
  if (!items.length) throw new Error("No line items found on that receipt. Try a clearer photo.");
  return { items: items, total: total, subtotal: subtotal, tax: tax, tip: tip, service_charge: service_charge, merchant: merchant };
}

/* ============================================================
   "HELP ME ORDER" - text Q&A against a digitized menu
   ============================================================ */

// Compact, readable serialization of a menu for the prompt. Text (not raw
// JSON) keeps the token count down and is easy for the model to read.
// Render one menu item's cached nutrition as a compact hint for the
// model (phase-2 calorie-aware ordering). Returns "" when the item has
// no kcal on record, so items without data simply pass through unchanged.
// "stated" (printed on the menu) is exact; everything else is an estimate
// and is labelled "approx" so the model never treats a guess as fact.
// A dish verdict is "loved" (top) | "again" (would reorder) | "skip" | null.
// Both loved AND again are positive ("would order again") for recommendations and
// the picks/passport lists; "loved" is the standout tier surfaced separately.
function verdictPositive(v){ return v === "loved" || v === "again"; }
function dishChipClass(v){ return v === "loved" ? " loved" : v === "again" ? " again" : v === "skip" ? " skip" : ""; }

function nutritionHint(it){
  const n = it && it.nutrition;
  if (!n || !n.kcal) return "";
  const exact = n.source === "menu_stated";
  const word  = exact ? "" : "approx ";
  let h = " [" + word + n.kcal + " cal";
  const macros = [];
  if (n.protein_g) macros.push(n.protein_g + "g protein");
  if (n.carbs_g)   macros.push(n.carbs_g + "g carbs");
  if (n.fat_g)     macros.push(n.fat_g + "g fat");
  if (macros.length) h += "; " + macros.join(", ");
  h += "]";
  return h;
}

function menuToText(menu){
  const lines = [];
  (menu.sections || []).forEach(s => {
    lines.push("## " + (s.name || "Menu"));
    (s.items || []).forEach(it => {
      let line = "- " + it.name;
      if (it.price)       line += " (" + it.price + ")";
      else if (it.paid && it.paid.amount) line += " ($" + Number(it.paid.amount).toFixed(2) + ")";
      if (it.description) line += ": " + it.description;
      if (it.tags && it.tags.length) line += " [tags: " + it.tags.join(", ") + "]";
      line += nutritionHint(it);   // phase-2: calorie/macro hint when known
      lines.push(line);
    });
  });
  return lines.join("\n");
}

// Recency-aware loved / disliked dish lists for ONE restaurant's visits.
// Mirrors the picks-card logic: a dish's MOST RECENT verdict wins. Returns
// empty lists when there is no history, so the caller degrades to menu-only.
function dishHistory(visits){
  const byDate = (visits || []).slice().sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    ((b.logged_at || 0) - (a.logged_at || 0)));
  // key -> rolling stats. byDate is newest-first, so the FIRST verdict/date we
  // see for a dish is the most recent one.
  const memo = new Map();
  byDate.forEach(v => (v.dishes || []).forEach(d => {
    if (!d || !d.name) return;
    const k = d.name.trim().toLowerCase();
    let e = memo.get(k);
    if (!e){ e = { name:d.name, latest:null, count:0, lastDate:"",
                   priceSum:0, priceN:0, rateSum:0, rateN:0 }; memo.set(k, e); }
    e.count += 1;
    if (!e.latest && d.verdict) e.latest = d.verdict;     // newest verdict wins
    if (!e.lastDate && v.date)  e.lastDate = v.date;       // newest date wins
    const p = parsePrice(d.price);                         // typed or from a check
    if (p){ e.priceSum += p; e.priceN += 1; }
    if (typeof v.rating === "number" && v.rating > 0){ e.rateSum += v.rating; e.rateN += 1; }
  }));
  const detail = [];
  memo.forEach(e => detail.push({
    name: e.name,
    verdict: e.latest,                                     // "loved" | "again" | "skip" | null
    count: e.count,
    lastDate: e.lastDate,
    paid: e.priceN ? (e.priceSum / e.priceN) : null,       // avg paid, dollars
    rating: e.rateN ? (e.rateSum / e.rateN) : null,        // avg visit rating
  }));
  const loved    = detail.filter(x => verdictPositive(x.verdict)).map(x => x.name);
  const disliked = detail.filter(x => x.verdict === "skip").map(x => x.name);
  return { loved, disliked, detail };
}

// Ask Claude to recommend from THIS menu. `question` may be a question, a
// command ("give me something healthy"), or a mood ("craving something rich").
async function askMenu(cfg, restaurant, menu, visits, question){
  const rName    = (restaurant && restaurant.name) ? restaurant.name : "this restaurant";
  const menuText = menuToText(menu);
  const hist     = dishHistory(visits);
  // Rank what they have actually ordered here: loved first, then by how often.
  // Keep only dishes with a real signal (a verdict, ordered more than once, or
  // a known price) so the hint stays compact and factual.
  const histRanked = (hist.detail || [])
    .filter(d => d.verdict || d.count > 1 || d.paid)
    .sort((a,b)=>{
      const wv = x => x === "loved" ? 3 : x === "again" ? 2 : x === "skip" ? 0 : 1;
      const va = wv(a.verdict), vb = wv(b.verdict);
      return vb - va || b.count - a.count;
    })
    .slice(0, 12);
  const hasHist  = histRanked.length > 0;

  let prompt =
    "You are a warm, knowledgeable dining companion helping someone decide what "+
    "to order at " + rName + ". They will tell you what they want - it might be "+
    "a question (\"what's light here?\"), a request (\"give me something healthy\"), "+
    "or just a mood (\"I'm craving something rich\"). Recommend specific dishes "+
    "from THE MENU BELOW that fit.\n\n"+
    "Rules:\n"+
    "- Only recommend items that actually appear on the menu. Never invent dishes "+
    "or guess at things that are not listed.\n"+
    "- Suggest 2-3 options, each with a short reason. If nothing on the menu fits, "+
    "say so honestly and point to the closest thing.\n"+
    "- Be concise and conversational - a few sentences, not an essay. No headings, "+
    "no markdown.\n"+
    "- Some menu items show a calorie/macro hint in square brackets (e.g. "+
    "\"[approx 300 cal; 24g protein]\"). 'approx' is an estimate; a plain number "+
    "is taken straight from the menu. When the diner's request relates to how "+
    "light, heavy, filling, protein-rich, or calorie-conscious they want to eat, "+
    "use those numbers to inform your picks and mention them naturally (e.g. "+
    "\"the ceviche is around 300 cal\"). Items without a number simply have none "+
    "on record - never guess or invent calories. Keep it informative and "+
    "easygoing: this is for curiosity, never a diet, a budget, or a judgment. "+
    "Do not scold, warn, or imply any food is 'bad'.\n";

  prompt +=
    "- A menu item may show its price in parentheses (e.g. \"($14)\"). When the "+
    "diner asks about value, price, what is cheap, what is worth it, splurging, "+
    "or 'best value', weigh the price - alongside the calories when those are "+
    "present - and suggest strong-value picks, mentioning the price naturally "+
    "(e.g. \"the ceviche is a good deal at $12\"). Items without a price simply "+
    "have none on record; do not guess one. Keep it easygoing - a friendly "+
    "suggestion, never a budget or a judgment.\n";

  if (hasHist){
    prompt +=
      "- Personal history at this restaurant - what they have actually ordered "+
      "here (use as a LIGHT hint, only if relevant to what they asked; always "+
      "answer their request first):\n";
    histRanked.forEach(d => {
      const bits = [];
      if (d.verdict === "loved") bits.push("LOVED it");
      else if (d.verdict === "again") bits.push("would order again");
      else if (d.verdict === "skip") bits.push("did not like it");
      if (d.count > 1) bits.push("ordered " + d.count + " times");
      if (d.paid) bits.push("usually pays about $" + d.paid.toFixed(2));
      const tail = bits.length ? " - " + bits.join(", ") : " - ordered before";
      prompt += "    " + d.name + tail +
        (d.lastDate ? " (last on " + d.lastDate + ")" : "") + "\n";
    });
    prompt +=
      "  Do not recommend a disliked dish unless they explicitly ask for it. If a "+
      "loved or frequently-ordered dish genuinely fits their request, you may note "+
      "they have enjoyed it before. For value or 'best deal' questions, the real "+
      "prices they have paid above are stronger evidence than the menu's price.\n";
  }

  prompt +=
    "\nMENU:\n" + menuText +
    "\n\nTHE DINER SAYS: \"" + question + "\"";

  logMsg("ASK","Asking " + ASK_MODEL + " (menu " + menuText.length +
         " chars, history=" + (hasHist ? "yes" : "none") +
         ", calorie-aware=" + (/\bcal\]/.test(menuText) || /cal;/.test(menuText) ? "yes" : "none") + ")");
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        ...(await authHeaders(cfg)),
      },
      body:JSON.stringify({
        task:"help_me_order",
        model:ASK_MODEL,
        max_tokens:700,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Ask network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your sign-in."); }
  if (res.status === 429){ throw new Error("The AI service is busy (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Ask -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  logMsg("ASK","Received answer (" + text.length + " chars)");
  if (!text) throw new Error("The model returned an empty answer. Try rephrasing.");
  return text;
}

/* Explain a menu. Two modes:
   - FOCUSED (selectedNames non-empty): explain just those dishes, item by item.
   - WHOLE MENU (no selection): explain how the menu is ORGANIZED and HOW TO
     ORDER from it - section/course level (e.g. what Antipasti/Primi/Secondi
     mean + the meal flow), NOT dish-by-dish. Adapts to the menu's real layout.
   Reuses the Pro-gated, metered /api/ai/relay. Honest over confident. */
async function explainMenu(cfg, restaurant, menu, selectedNames){
  const rName    = (restaurant && restaurant.name) ? restaurant.name : "this restaurant";
  const menuText = menuToText(menu);
  const focused  = Array.isArray(selectedNames) && selectedNames.length > 0;
  const sectionNames = (menu.sections || []).map(s => (s.name || "").trim()).filter(Boolean);

  let prompt =
    "You are a warm, knowledgeable dining companion helping someone understand a "+
    "menu at " + rName + ".\n\n";
  if (focused){
    prompt +=
      "Explain ONLY these dishes the diner picked, in the order given:\n  " +
      selectedNames.join("\n  ") + "\n\n" +
      "For each dish give a short, plain-English description: what it is, the key "+
      "ingredients, and how it's typically prepared or served. One or two "+
      "sentences each. Lead each with the dish name.\n"+
      "Rules:\n"+
      "- Only discuss items that actually appear on THE MENU BELOW. Never invent dishes.\n"+
      "- If you are not confident what a specific dish is, say so honestly rather "+
      "than guessing - accuracy matters more than sounding sure.\n"+
      "- Be concise and friendly. No long preamble, no headings, no markdown.\n";
  } else {
    prompt +=
      "Give a short guide to HOW THIS MENU IS ORGANIZED and HOW TO ORDER A MEAL "+
      "FROM IT, at the section / course level. Do NOT explain dishes one by one.\n\n" +
      (sectionNames.length
        ? ("The menu's sections, in order, are:\n  " + sectionNames.join("\n  ") + "\n\n")
        : "") +
      "Do this:\n"+
      "1. Walk the sections in order and say what each one is - especially "+
      "foreign-language or fancy dining terms. Translate/clarify the term in plain "+
      "English (e.g. on an Italian menu: Antipasti = starters, Primi = first / "+
      "pasta or risotto course, Secondi = mains, Contorni = sides, Dolci = desserts).\n"+
      "2. Explain how a meal here is typically ordered - the flow / coursing - "+
      "based on THIS menu's actual structure. Adapt to what it really is: classic "+
      "courses, small-plates vs large-plates, tapas, izakaya, dim sum, prix-fixe, "+
      "raw bar, family-style, etc. Do NOT force an Italian (or any) template onto a "+
      "menu that isn't built that way.\n"+
      "3. Finish with one practical 'how to order' suggestion (e.g. \"a typical "+
      "order is an antipasto to share, a pasta, and a main, plus a side\").\n"+
      "Rules:\n"+
      "- Talk about the SECTIONS and the ordering flow, not individual dishes (you "+
      "may name a dish only as a quick example of what a section holds).\n"+
      "- Only reference sections that actually appear below. Never invent sections.\n"+
      "- If a section heading is ambiguous, say what it most likely means and note "+
      "the uncertainty rather than sounding sure.\n"+
      "- Be concise and friendly. Short paragraphs or a tight list, no markdown headers.\n";
  }
  prompt += "\nMENU:\n" + menuText;

  logMsg("EXPLAIN","Explaining menu (" + menuText.length + " chars, focused=" +
         (focused ? selectedNames.length : "all") + ")");
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
      body:JSON.stringify({
        task:"explain_menu",
        model:ASK_MODEL,
        max_tokens: focused ? 800 : 1200,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Explain network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    let _detail = ""; try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){}
    if (res.status === 402) throw new Error(_detail || "You’ve reached this month’s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  logMsg("EXPLAIN","Received explanation (" + text.length + " chars)");
  if (!text) throw new Error("The model returned an empty answer. Try again.");
  return text;
}

/* ============================================================
   MEAL PHOTO -> NUTRITION ESTIMATE
   ============================================================
   One vision call per photo. The result is stored on the visit so
   the same photo is never re-estimated (no recurring cost). The
   estimate is explicitly an ESTIMATE - shown labelled, editable,
   and never used to nag or score the user. */

function clampNum(v, min, max){
  let n = Number(v);
  if (!isFinite(n) || n < 0) n = 0;
  if (typeof min === "number" && n < min) n = min;
  if (typeof max === "number" && n > max) n = max;
  return Math.round(n);
}

// Normalize whatever the model returns into our stable nutrition shape.
// source / estimated_at are stamped by the caller, not the model.
function normalizeNutrition(raw){
  const conf = String(raw.confidence || "").toLowerCase();
  return {
    kcal:      clampNum(raw.kcal, 0, 20000),
    protein_g: clampNum(raw.protein_g, 0, 2000),
    carbs_g:   clampNum(raw.carbs_g, 0, 2000),
    fat_g:     clampNum(raw.fat_g, 0, 2000),
    ingredients: Array.isArray(raw.ingredients)
      ? raw.ingredients.map(s => String(s).trim()).filter(Boolean).slice(0,30) : [],
    foods: Array.isArray(raw.foods)
      ? raw.foods.map(s => String(s).trim()).filter(Boolean).slice(0,12) : [],
    confidence: (conf === "high" || conf === "medium" || conf === "low") ? conf : "medium",
    note: String(raw.note || "").trim().slice(0, 400),
  };
}

// Estimate nutrition from a photo File. Returns a normalized nutrition
// object WITHOUT source/estimated_at (the caller stamps those).
async function estimateNutrition(cfg, file){
  const dataUrl = await resizeForOcr(file, 1200);   // reuse the proven resize path
  const prompt =
    "You are estimating the nutrition of a single meal from a photo, to help "+
    "someone remember and stay curious about what they ate. This is for interest "+
    "and memory, not dieting - be helpful and realistic, not judgmental.\n\n"+
    "Look at the plate and estimate it as a whole. Return ONLY a JSON object, no "+
    "prose, no markdown, with exactly these keys:\n"+
    "{\n"+
    '  "foods": [short names of the distinct dishes/items you see],\n'+
    '  "kcal": total estimated calories for the whole plate (integer),\n'+
    '  "protein_g": grams of protein (integer),\n'+
    '  "carbs_g": grams of carbohydrate (integer),\n'+
    '  "fat_g": grams of fat (integer),\n'+
    '  "ingredients": [likely ingredients you can infer],\n'+
    '  "confidence": "low" | "medium" | "high",\n'+
    '  "note": one short sentence on the portion assumptions you made\n'+
    "}\n\n"+
    "Estimate realistic restaurant portions. If the photo is unclear, blurry, or "+
    "only partly shows the food, lower the confidence and say so in the note. If "+
    "the image does not appear to be food at all, return kcal 0, empty arrays, "+
    "confidence \"low\", and say so in the note.";

  logMsg("NUTRI","Estimating nutrition from photo via " + VISION_MODEL);
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{

      },

        model:VISION_MODEL,
        max_tokens:1500,
        messages:[{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:"image/jpeg",
            data:dataUrl.split(",")[1] } },
          { type:"text", text:prompt },
        ]}],
      }),
    });
  } catch(err){
    logMsg("ERROR","Nutrition network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your sign-in."); }
  if (res.status === 429){ throw new Error("The AI service is busy (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Nutrition -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  let parsed;
  try { parsed = parseJsonLoose(text); }
  catch(err){
    logMsg("ERROR","Could not parse nutrition JSON: " + err.message);
    throw new Error("The estimate came back unreadable. Try another photo.");
  }
  const out = normalizeNutrition(parsed);
  logMsg("NUTRI","Estimate: " + out.kcal + " kcal, conf=" + out.confidence);
  return out;
}

// Right-side header action used on drill-in screens: one tap collapses the whole
// overlay stack back to the main tab view (vs. the back button, which steps up a
// single level). When onHome isn't supplied it renders the usual 34px spacer so
// the title stays centered. Deliberately NOT placed on create/edit forms, so a
// stray tap can never drop a half-filled form.
function HomeBtn({ onHome }){
  if (!onHome) return <span style={{width:34}} />;
  return (
    <button className="x" onClick={onHome} aria-label="Home" title="Home">
      <Icon name="home" size={20} />
    </button>
  );

// Read-only star display. Supports half-star values (e.g. 4.5):
// full stars up to floor(value), one half-filled star if there is a
// 0.5 remainder, then empty stars. A half star is drawn by stacking a
// lit star clipped to its left 50% over a dim star. `showNum` appends
// the numeric value (e.g. "4.5") beside the stars for read-only contexts.
// The user's star rating lives on the PLACE now (latest-visit-wins). Prefer an
// explicit my_rating; else derive from the most recent rated visit at that place.
function placeRating(restaurant, visitsForPlace){
  if (restaurant && typeof restaurant.my_rating === "number") return restaurant.my_rating;
  const vs = (visitsForPlace || []).filter(v => v && typeof v.rating === "number" && v.rating > 0);
  if (!vs.length) return 0;
  vs.sort((a,b)=> (b.date || "").localeCompare(a.date || "") || ((b.logged_at||0) - (a.logged_at||0)));
  return vs[0].rating || 0;
}

// Editable half-star rater: tap position across the row maps to the nearest 0.5;
// tapping the current value clears it. Used for the place rating.
function StarRater({value, onChange, size}){
  const ref = useRef(null);
  const sz = size || 36;
  const val0 = value || 0;
  function onTap(e){
    const el = ref.current; if (!el) return;
    const rect = el.getBoundingClientRect();
    const cx = (e.clientX != null) ? e.clientX
             : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : rect.left);
    const x = Math.max(0, Math.min(rect.width, cx - rect.left));
    let v = Math.ceil((x / rect.width) * 5 * 2) / 2;
    v = Math.max(0.5, Math.min(5, v));
    onChange(v === val0 ? 0 : v);
  }
  return (
    <div className="row" style={{alignItems:"center", gap:10}}>
      <div ref={ref} onClick={onTap} role="slider" aria-label="Rating"
           aria-valuemin={0} aria-valuemax={5} aria-valuenow={val0}
           style={{display:"inline-flex", gap:0, cursor:"pointer", touchAction:"manipulation",
                   WebkitUserSelect:"none", userSelect:"none", padding:"4px 0"}}>
        {[1,2,3,4,5].map(n => {
          const full = n <= val0;
          const half = !full && (val0 >= n - 0.5);
          return (
            <span key={n} style={{position:"relative", display:"inline-block",
                    width:sz, height:sz, lineHeight:0, pointerEvents:"none"}}>
              <Icon name="star" size={sz} color="#3a3128" />
              {(full || half) && (
                <span style={{position:"absolute", left:0, top:0, height:"100%",
                        width: full ? "100%" : "50%", overflow:"hidden", display:"inline-block", lineHeight:0}}>
                  <Icon name="star" size={sz} color="#e7b24c" />
                </span>
              )}
            </span>
          );
        })}
      </div>
      {val0 > 0 && (
        <span className="small muted">{Number.isInteger(val0) ? val0 : val0.toFixed(1)}</span>
      )}
    </div>
  );
}

function Stars({value, size, showNum}){
  const v    = Number(value) || 0;
  const big  = size === "big";
  const px   = big ? 28 : 15;
  const full = Math.floor(v);
  const half = (v - full) >= 0.5;   // treat anything >= .5 as a half star
  return (
    <span className="stars">
      {[1,2,3,4,5].map(n => {
        const isFull = n <= full;
        const isHalf = !isFull && n === full + 1 && half;
        if (isHalf){
          return (
            <span key={n} className={"star half" + (big ? " big" : "")}
                  style={{position:"relative", display:"inline-block"}}>
              {/* dim base */}
              <Icon name="star" size={px} color="#3a3128" />
              {/* lit overlay, clipped to the left half */}
              <span style={{position:"absolute", left:0, top:0,
                            width:"50%", overflow:"hidden",
                            display:"inline-block", lineHeight:0}}>
                <Icon name="star" size={px} color="#e7b24c" />
              </span>
            </span>
          );
        }
        return (
          <span key={n} className={"star" + (isFull ? " lit" : "") + (big ? " big" : "")}>
            <Icon name="star" size={px} color={isFull ? "#e7b24c" : "#3a3128"} />
          </span>
        );
      })}
      {showNum && v > 0 && (
        <span className="stars-num">{Number.isInteger(v) ? v : v.toFixed(1)}</span>
      )}
    </span>
  );
}

/* NutriLine - compact one-line nutrition summary for visit cards.
   Neutral and non-judgmental: a number for memory, never a verdict. */
function NutriLine({n}){
  if (!n || !n.kcal) return null;
  const approx = (n.source === "photo_estimate" || n.source === "menu_estimate") ? "~" : "";
  const tag = n.source === "menu_stated" ? "per menu"
            : n.source === "manual"      ? "edited"
            : "est";
  const hasMacros = (n.protein_g || 0) + (n.carbs_g || 0) + (n.fat_g || 0) > 0;
  return (
    <div className="nutri-line">
      <span className="kc">{approx}{n.kcal} cal</span>
      {hasMacros && <span className="mc">{n.protein_g}P / {n.carbs_g}C / {n.fat_g}F</span>}
      <span className="tg">{tag}</span>
    </div>
  );
}

/* Shared-dish portion scaling. A dish split on the receipt picker carries
   share:{pct} = the percent of the item that was YOURS. The stored price is
   already your portion; the cached nutrition estimate is the FULL serving, so
   menu-based calorie numbers are scaled to your share at DISPLAY time. A photo
   of your own plate is already your portion (never scaled), and a hand-entered
   number is taken as typed. share and qty are mutually exclusive in v1. */
function dishSharePct(d){
  var p = d && d.share && d.share.pct;
  return (typeof p === "number" && p > 0 && p < 100) ? p : null;
}
function dishShareLabel(d){
  var p = dishSharePct(d);
  return p == null ? "" : (" \u00b7 " + Math.round(p) + "%");
}
// true when this nutrition source is a FULL serving (so a share scales it)
function shareScales(n){
  return !!(n && (n.source === "menu_estimate" || n.source === "menu_stated"));
}
function dishKcalNum(d){
  var n = d && d.nutrition;
  if (!n || !n.kcal) return null;
  var p = dishSharePct(d);
  return (p != null && shareScales(n)) ? Math.round(n.kcal * p / 100) : n.kcal;
}
function dishMacNum(d, key){
  var n = d && d.nutrition;
  if (!n || !n[key]) return 0;
  var p = dishSharePct(d);
  return (p != null && shareScales(n)) ? Math.round(n[key] * p / 100) : n[key];
}
// "~" marker: estimates are always approximate, and a shared per-menu number
// becomes an estimate of your share (so it stops being an exact figure).
function dishKcalApprox(d){
  var n = d && d.nutrition;
  if (!n) return true;
  if (n.source === "menu_stated") return dishSharePct(d) != null;
  return true;
}

/* DishTotal - sums the per-dish estimates on a visit into one calm line.
   Shown only when 2+ dishes are estimated (a single dish's total just
   repeats the chip). Informative, never a budget: no colors, no verdicts. */
function DishTotal({dishes, min}){
  const floor = min || 2;
  const est = (dishes || []).filter(d => d && d.nutrition && d.nutrition.kcal);
  if (est.length < floor) return null;
  // sum the share-scaled per-dish numbers so a "I had 50%" dish counts as half
  const kcal = est.reduce((s,d)=> s + (dishKcalNum(d) || 0), 0);
  const p = est.reduce((s,d)=> s + dishMacNum(d,"protein_g"), 0);
  const c = est.reduce((s,d)=> s + dishMacNum(d,"carbs_g"), 0);
  const f = est.reduce((s,d)=> s + dishMacNum(d,"fat_g"), 0);
  const hasMacros = (p + c + f) > 0;
  return (
    <div className="dish-total">
      <span className="dt-kc">~{kcal} cal total</span>
      {hasMacros && <span className="dt-mc">{p}P / {c}C / {f}F</span>}
      {est.length >= 2 && <span className="dt-note">across {est.length} dishes</span>}
    </div>
  );
}

/* PhotoImg - lazy-loads a photo by path from the data repo and renders
   it as an <img>. Shows a soft placeholder while loading, and a small
   icon if the fetch fails. Uses the module-level PHOTO_CACHE so the
   same path is only fetched once per session. */
function PhotoImg({cfg, path, alt, className, style, onClick}){
  const [url, setUrl] = useState(null);
  const [err, setErr] = useState(false);
  useEffect(()=>{
    if (!path || !cfg){ setUrl(null); setErr(false); return; }
    let mounted = true;
    setErr(false); setUrl(null);
    getPhotoBlobUrl(cfg, path).then(u => {
      if (mounted) setUrl(u);
    }).catch(e => {
      if (mounted){
        logMsg("ERROR","Photo load failed for " + path + ": " + e.message);
        setErr(true);
      }
    });
    return ()=> { mounted = false; };
  },[path, cfg && cfg.userId]);
  if (err){
    return (
      <div className={"photo-shell err " + (className || "")} style={style}
           onClick={onClick}>
        <Icon name="image" size={20} color="#5a5045" />
      </div>
    );
  }
  if (!url){
    return (
      <div className={"photo-shell loading " + (className || "")} style={style}
           onClick={onClick} />
    );
  }
  return <img src={url} alt={alt || ""}
              className={"photo-img " + (className || "")} style={style}
              onClick={onClick} />;
}

// Restaurant hero from a Google place photo. Resolves the photo resource name to
// a loadable URL on demand (never stored) and renders it WITH attribution, per
// Google's terms. Shown only when there's no user-uploaded photo.
function GooglePhoto({cfg, name, attribution, thumb}){
  const ref = useRef(null);
  // Thumbs (Places-list cards) load lazily: only fetch the photo when the card
  // scrolls near the viewport, so a long list doesn't fire a burst of photo
  // requests at once (cost + perf). The single hero on a detail page loads eagerly.
  const [inView, setInView] = useState(!thumb);
  const [url, setUrl] = useState(null);
  const [failed, setFailed] = useState(false);
  useEffect(()=>{
    if (inView) return;
    const el = ref.current;
    if (!el) return;
    if (typeof IntersectionObserver === "undefined"){ setInView(true); return; }
    const obs = new IntersectionObserver((entries)=>{
      if (entries.some(e => e.isIntersecting)){ setInView(true); obs.disconnect(); }
    }, { rootMargin: "300px" });
    obs.observe(el);
    return ()=> obs.disconnect();
  }, [inView]);
  useEffect(()=>{
    let alive = true;
    if (!inView || !name || !cfg){ return; }
    placesPhoto(cfg, name, thumb ? 200 : 1000)
      .then(d => { if (alive) setUrl(d && d.url); })
      .catch(()=> { if (alive) setFailed(true); });
    return ()=> { alive = false; };
  }, [inView, name, cfg && cfg.userId]);
  if (thumb){
    // The shell is the observed element AND the placeholder until the photo loads.
    return (
      <div ref={ref} className="photo-shell" style={{width:"100%",height:"100%"}}>
        {url ? <img className="photo-img" src={url} alt=""
                 style={{width:"100%",height:"100%",objectFit:"cover"}} />
          : (failed ? <Icon name="image" size={20} color="#5a5045" /> : null)}
      </div>
    );
  }
  if (failed || !url) return null;
  return (
    <div className="rest-hero">
      <img className="photo-img" src={url} alt="" style={{width:"100%"}} />
      <div className="tiny faint" style={{marginTop:4}}>
        {attribution ? "Photo: " + attribution + " (via Google)" : "Photo via Google"}
      </div>
    </div>
  );
}

// Full-screen photo viewer. Tap a visit photo anywhere to open it big; swipe or
// tap the arrows to move between that visit's photos; tap the backdrop, the X,
// or press Escape to close.
function PhotoLightbox({ cfg, paths, index, onClose }){
  const list = (paths || []).filter(Boolean);
  const [i, setI] = useState(() =>
    Math.min(Math.max(0, index || 0), Math.max(0, list.length - 1)));
  const touchX = useRef(null);
  const go = (d) => setI(x => Math.min(list.length - 1, Math.max(0, x + d)));
  useEffect(()=>{
    function onKey(e){
      if (e.key === "Escape") onClose();
      else if (e.key === "ArrowRight") go(1);
      else if (e.key === "ArrowLeft") go(-1);
    }
    window.addEventListener("keydown", onKey);
    return ()=> window.removeEventListener("keydown", onKey);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [list.length]);
  if (!list.length) return null;
  return (
    <div className="lightbox" onClick={onClose}>
      <button className="lb-close" onClick={onClose} aria-label="Close">
        <Icon name="close" size={22} color="#f0e6d6" />
      </button>
      {list.length > 1 && <div className="lb-count">{i + 1} / {list.length}</div>}
      <div className="lb-stage" onClick={e=> e.stopPropagation()}
        onTouchStart={e=>{ touchX.current = e.touches[0].clientX; }}
        onTouchEnd={e=>{
          if (touchX.current == null) return;
          const dx = e.changedTouches[0].clientX - touchX.current;
          touchX.current = null;
          if (dx > 45) go(-1); else if (dx < -45) go(1);
        }}>
        {/^(blob:|data:|https?:)/.test(list[i])
          ? <img className="photo-img lb-img" src={list[i]} alt="" />
          : <PhotoImg cfg={cfg} path={list[i]} className="lb-img" />}
      </div>
      {list.length > 1 && i > 0 && (
        <button className="lb-nav prev" onClick={e=>{ e.stopPropagation(); go(-1); }} aria-label="Previous">
          <Icon name="back" size={24} color="#f0e6d6" />
        </button>
      )}
      {list.length > 1 && i < list.length - 1 && (
        <button className="lb-nav next" onClick={e=>{ e.stopPropagation(); go(1); }} aria-label="Next"
          style={{}}>
          <span style={{display:"flex", transform:"scaleX(-1)"}}>
            <Icon name="back" size={24} color="#f0e6d6" />
          </span>
        </button>
      )}
    </div>
  );
}

// Capture Chrome/Android's install event as early as the script runs, so the
// hint can offer a one-tap install. iOS has no such API - we show manual steps.
let _installEvent = null;
if (typeof window !== "undefined" && window.addEventListener){
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault(); _installEvent = e;
    try { window.dispatchEvent(new Event("mc-install-ready")); } catch(_e){}
  });
}
function isStandalone(){
  try {
    return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
      || window.navigator.standalone === true;   // iOS Safari
  } catch(e){ return false; }
}
function installPlatform(){
  const ua = navigator.userAgent || "";
  if (/iPhone|iPad|iPod/i.test(ua)) return "ios";
  if (/Android/i.test(ua)) return "android";
  if (/Macintosh/i.test(ua) && typeof document !== "undefined" && "ontouchend" in document) return "ios"; // iPadOS
  return "other";
}
// The "Add to Home Screen" hint. Renders nothing once installed (standalone).
// Android/Chrome gets a one-tap button; iOS and others get the manual steps.
function InstallHint({ onClose, force }){
  const [evt, setEvt] = useState(_installEvent);
  const [installed, setInstalled] = useState(false);
  useEffect(()=>{
    const onReady = ()=> setEvt(_installEvent);
    const onInstalled = ()=> setInstalled(true);
    window.addEventListener("mc-install-ready", onReady);
    window.addEventListener("appinstalled", onInstalled);
    return ()=>{ window.removeEventListener("mc-install-ready", onReady);
                 window.removeEventListener("appinstalled", onInstalled); };
  }, []);
  // force = shown on demand (Settings button), so render even if already installed.
  if (!force && (isStandalone() || installed)) return null;
  const plat = installPlatform();
  async function doInstall(){
    if (!evt) return;
    try { evt.prompt(); await evt.userChoice; } catch(e){}
    _installEvent = null; setEvt(null);
  }
  const step = (n, body)=> (
    <div className="row" style={{gap:8, alignItems:"flex-start", marginBottom:6}}>
      <span style={{flex:"none", width:18, height:18, borderRadius:9, background:"var(--accent)",
        color:"#1b1714", fontSize:11, fontWeight:700, display:"flex", alignItems:"center",
        justifyContent:"center", marginTop:1}}>{n}</span>
      <span style={{flex:1, lineHeight:1.45}}>{body}</span>
    </div>
  );
  return (
    <div className="card" style={{border:"1px solid rgba(201,124,44,0.45)", background:"rgba(201,124,44,0.07)"}}>
      <div className="between" style={{alignItems:"flex-start"}}>
        <div style={{fontWeight:700, fontSize:16}}>Add MenuCaptain to your Home Screen</div>
        {onClose ? (
          <button className="x" onClick={onClose} aria-label="Dismiss" style={{flex:"none", margin:"-4px -6px 0 0"}}>
            <Icon name="close" size={18} color="#b3a591" />
          </button>
        ) : null}
      </div>
      <div className="small muted" style={{margin:"4px 0 12px", lineHeight:1.5}}>
        Install it once for a full-screen app, offline access, and a faster launch - no app store needed.
      </div>
      {plat === "android" && evt ? (
        <button className="btn primary" style={{width:"100%"}} onClick={doInstall}>
          <Icon name="home" size={17} color="#1b1714" /> Add to Home Screen
        </button>
      ) : plat === "ios" ? (
        <div className="small">
          {step(1, <span>Tap the <strong>Share</strong> button <span style={{display:"inline-flex", verticalAlign:"-3px"}}><Icon name="share" size={15} color="var(--accent)" /></span> at the bottom of Safari.</span>)}
          {step(2, <span>Scroll down and tap <strong>Add to Home Screen</strong>.</span>)}
          {step(3, <span>Tap <strong>Add</strong> - MenuCaptain lands on your Home Screen.</span>)}
        </div>
      ) : (
        <div className="small">
          {step(1, <span>Open your browser menu (<strong>⋮</strong> in Chrome, top-right).</span>)}
          {step(2, <span>Tap <strong>Add to Home screen</strong> (or <strong>Install app</strong>).</span>)}
          {step(3, <span>Confirm - MenuCaptain installs like an app.</span>)}
        </div>
      )}
    </div>
  );
}

   ============================================================ */
/* ============================================================
   IN-APP UPDATER
   ============================================================
   GitHub Pages and the iOS Home Screen app both cache index.html,
   so a fresh upload can linger. On launch we re-fetch our own file
   (cache-busted), read the deployed APP_VERSION, and if it is newer
   than what is running we offer a one-tap cache-busting reload.
   No service worker, nothing extra to deploy. */

// Compare dot-separated versions; true if `a` is strictly newer than `b`.
function isNewer(a, b){
  const pa = String(a || "").split(".").map(n => parseInt(n,10) || 0);
  const pb = String(b || "").split(".").map(n => parseInt(n,10) || 0);
  const len = Math.max(pa.length, pb.length);
  for (let i=0; i<len; i++){
    const x = pa[i] || 0, y = pb[i] || 0;
    if (x > y) return true;
    if (x < y) return false;
  }
  return false;
}

// Fetch our own page fresh (bypassing caches) and read the deployed
// version string. Returns the version, or null on any failure/offline.
async function fetchDeployedVersion(){
  const url = location.pathname + "?vcheck=" + Date.now();
  try {
    const res = await fetch(url, { cache:"no-store" });
    if (!res.ok) return null;
    const html = await res.text();
    const m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    return m ? m[1] : null;
  } catch(e){
    logMsg("UPDATE","Version check failed: " + e.message);
    return null;
  }
}

// Reload onto a cache-busting URL so the CDN and the app cache both
// fetch the new file instead of serving the stale one.
function applyUpdate(version){
  const base = location.origin + location.pathname;
  location.replace(base + "?v=" + encodeURIComponent(version || Date.now()));
}

// ---------------------------------------------------------------------------
// Badges. Earned status is DERIVED live from the user's own data (no stored
// badge state) - same philosophy as the Year in Food recap. Voice A copy. The
// heart in "Share the Love" renders as an SVG Icon, never an emoji character.
// ---------------------------------------------------------------------------
const BADGES = [
  { id:"first-scan",  name:"First Scan",  icon:"camera",
    earnedText:"You scanned your first menu.",
    lockedText:"Scan a menu to earn this." },
  { id:"ten-visits",  name:"Ten Visits",  icon:"book",
    earnedText:"Ten visits logged.",
    lockedText:"Log ten visits." },
  { id:"five-cities", name:"Five Cities", icon:"pin",
    earnedText:"You've eaten in five different cities.",
    lockedText:"Eat in five different cities." },
  { id:"first-list",  name:"First List",  icon:"share",
    earnedText:"You published your first list.",
    lockedText:"Publish a list to earn this." },
  // "Five Shares" badge: earned by tapping Share the Love >= 5 times.
  // Uses the share-nodes glyph (the heart belongs to the function, not the badge).
  // Name is a count+noun milestone (like Five Cities) so it reads as earned
  // status, not an instruction - it sits in the same screen as the real button.

    earnedText:"You've shared the app five times.",

// Pure: which badge ids are currently earned, computed from existing data.
function earnedBadgeIds({restaurants, visits, menus, lists, meta}){
  const ids = [];
  // first-scan: any menu exists (menus is keyed by restaurant id -> array).
  const menuCount = Object.keys(menus || {}).reduce(
    (n, rid)=> n + ((menus[rid] || []).length), 0);
  if (menuCount >= 1) ids.push("first-scan");
  // ten-visits
  if ((visits || []).length >= 10) ids.push("ten-visits");
  // five-cities: distinct r.location among restaurants with >=1 visit - the
  // SAME rule the Year in Food recap uses for "cities you ate in".
  const restMap = {};
  (restaurants || []).forEach(r => { if (r && r.id) restMap[r.id] = r; });
  const cities = {};
  (visits || []).forEach(v => {
    const r = (v && v.restaurant_id) ? restMap[v.restaurant_id] : null;
    const c = (r && r.location) ? r.location.trim() : "";
    if (c) cities[c] = true;
  });
  if (Object.keys(cities).length >= 5) ids.push("five-cities");
  // first-list: any saved published list exists
  if ((lists || []).length >= 1) ids.push("first-list");
  // share-love: tapped "Share the app" >= 5 times
  if (((meta || {}).app_shares || 0) >= 5) ids.push("share-love");
  return ids;
}

    for (let i = 0; i < (menusArr || []).length; i++){

      if (!m || !((m.sections || []).length)) continue;
      try {
        await communityShareMenu(config, {
          place_id: place.google_place_id,
          place_name: place.name || "",
          label: m.label || "Main",
          menu: { sections: sanitizeMenuForShare(m.sections) },
        });
        n++;
      } catch(e){ /* skip a menu that fails; others still go */ }
    }
    return n;
  }
  async function pullAllCommunityMenus(rid, placeId){
    let list;
    try { list = await communityListMenus(config, placeId); } catch(e){ return 0; }
    if (!list || !list.length) return 0;
    const fetched = [];
    for (let i = 0; i < list.length; i++){
      try {
        const cm = await communityGetMenu(config, list[i].id);
        fetched.push({ menu_id: uid("menu"), label: cm.label || "Menu",
          sections: (cm.menu && cm.menu.sections) || [], last_updated: todayISO(),
          source: "community", community_at: cm.updated_at || cm.created_at || null });
      } catch(e){ /* skip */ }
    }
    if (!fetched.length) return 0;
    const cur = menus[rid] || [];
    commit({ menus: Object.assign({}, menus, { [rid]: cur.concat(fetched) }) }, ["menus"]);
    return fetched.length;
  }

  /* ---- auto scroll-to-top ---------------------------------- */
  // WHY: pop-up screens were opening partway down, so the first controls
  // (e.g. "Who's at the table?" at the top of the check splitter) sat
  // off-screen and looked missing. `overlay` is a fresh object on every
  // open, so this fires each time one opens. useEffect runs after React
  // commits the DOM, and the rAF gives the slide-up animation a frame to
  // settle before we reset the scroll container(s) to the top.
  useEffect(()=>{
    if (!overlay) return;
    const id = requestAnimationFrame(()=>{
      // A standard overlay scrolls inside .ovbody; the group-order and
      // print overlays scroll themselves. Only the matching one(s) exist
      // in the DOM at any time, so resetting all matches is safe.
      document.querySelectorAll(".ovbody, .print-overlay, .go-overlay")
        .forEach((el)=>{ el.scrollTop = 0; });
    });
    return ()=> cancelAnimationFrame(id);
  }, [overlay]);

  // WHY: switching bottom-nav tabs (History/Places/etc.) kept the old
  // scroll position. The page/window is what scrolls for tab content,
  // so jump it back to the top on every tab change.
  useEffect(()=>{
    window.scrollTo(0, 0);
  }, [tab]);

  /* ---- update check ---------------------------------------- */
  // manual=true surfaces a result message (for the Settings button);
  // on launch we check quietly and only speak up if there's an update.
  async function checkForUpdate(manual){
    if (manual) setUpdMsg("Checking...");
    const v = await fetchDeployedVersion();
    if (v && isNewer(v, APP_VERSION)){
      setUpdate({ version:v });
      if (manual) setUpdMsg("");
      logMsg("UPDATE","Newer version live: " + v + " (running " + APP_VERSION + ")");
    } else {
      setUpdate(null);
      if (manual){
        setUpdMsg(v ? ("You're on the latest (" + APP_VERSION + ")")
                    : "Couldn't check - are you online?");
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setTimeout(()=> setUpdMsg(""), 3500);
      }
    }
  }
  // Check on launch AND whenever the app is re-shown or has been open a while.
  // WHY: installed PWAs are usually RESUMED from the background, not cold-
  // launched, so a launch-only check means testers never see the "Update
  // available" banner. Re-checking on visibilitychange (debounced) and on a
  // periodic timer makes the banner surface on its own - no Settings trip.
  useEffect(()=>{
    let lastCheck = 0;
    const MIN_GAP = 60 * 1000;                 // never refetch more than once a minute
    const maybeCheck = ()=>{
      const now = Date.now();
      if (now - lastCheck < MIN_GAP) return;
      lastCheck = now;
      checkForUpdate(false);
    };
    const t = setTimeout(maybeCheck, 1500);    // initial launch check (after first sync)
    const onVis = ()=>{ if (document.visibilityState === "visible") maybeCheck(); };
    document.addEventListener("visibilitychange", onVis);
    const iv = setInterval(maybeCheck, 20 * 60 * 1000);  // periodic while open
    return ()=>{
      clearTimeout(t); clearInterval(iv);
      document.removeEventListener("visibilitychange", onVis);
    };
    // eslint-disable-next-line
  },[]);

  /* ---- service worker (offline Phase 1) -------------------- */
  // Register sw.js for app-shell caching + installability. It is intentionally
  // additive: the network-first shell + version-tied caches mean it never
  // overrides the in-app updater above. Registration failures are non-fatal.
  useEffect(()=>{
    if (!("serviceWorker" in navigator)) return;
    const onLoad = ()=>{
      navigator.serviceWorker.register("/sw.js")
        .then(()=> logMsg("SW","registered"))
        .catch((e)=> logMsg("SW","register failed: " + (e && e.message)));
    };
    if (document.readyState === "complete") onLoad();
    else window.addEventListener("load", onLoad);
    return ()=> window.removeEventListener("load", onLoad);
  },[]);

  /* ---- online/offline indicator (offline Phase 2) ---------- */
  // Reads still work offline (collections are cached); this just tells the user
  // why a save might be pending. Driven by the browser's online/offline events.
  useEffect(()=>{
    // Small delay on reconnect: the "online" event can fire a beat before the
    // connection is actually usable, so let it settle before flushing.
    const goOn  = ()=>{ setOffline(false); setTimeout(()=> onlineFlushRef.current && onlineFlushRef.current(), 1200); };
    const goOff = ()=> setOffline(true);
    window.addEventListener("online", goOn);
    window.addEventListener("offline", goOff);
    return ()=>{
      window.removeEventListener("online", goOn);
      window.removeEventListener("offline", goOff);
    };
  },[]);

  /* ---- first-run username nudge (connections Phase A) ------- */

  // hasn't skipped before, offer to pick one. Covers new AND existing users
  // (anyone logged in without a username). Silent if the profiles table isn't

  useEffect(()=>{

  /* ---- push deep-links: route a tapped notification to its screen ------ */
  useEffect(()=>{
    function onNav(e){

      if (t === "connection_request" || t === "connection_accepted"){
