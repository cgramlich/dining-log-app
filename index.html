/* No-account viewer for a shared VISIT (?visit=...). Shows the place, the date,
   the people who were there, the meal photos (pre-signed, embedded in the blob),
   and the place's menu. Intentionally has NO notes and NO dishes - a shared
   visit invites the recipient to log their OWN meal, never exposing the sharer's
   order. A signed-in viewer can "Add to my places" (place + menu), asking before
   overwriting; a no-account viewer gets a "Create your free account" bridge. */
function PublishedVisit({data}){
  const home = location.origin + location.pathname;
  const [openMenu, setOpenMenu] = useState(false);
  const [lb, setLb] = useState(-1);          // lightbox photo index, -1 = closed
  const myCfg = loadConfig();
  const canSave = configComplete(myCfg);
  const [saveState, setSaveState] = useState("");   // "" | saving | saved | err
  const [saveMsg, setSaveMsg]     = useState("");
  const [dupAsk, setDupAsk]       = useState(null);  // {restaurants, menus, match}

  if (!data || !data.r){
    return (
      <div className="pub-wrap">
        <div className="pub-title">This link looks broken</div>
        <div className="muted" style={{textAlign:"center",marginBottom:20}}>The visit could not be read.</div>
        <div style={{textAlign:"center"}}><a className="btn primary" href={home}>Open MenuCaptain</a></div>
      </div>
    );
  }

  const photos = Array.isArray(data.ph) ? data.ph.filter(Boolean) : [];
  const people = Array.isArray(data.ppl) ? data.ppl.filter(Boolean) : [];
  const sections = Array.isArray(data.s) ? data.s : [];

  // Shared payload (short keys) -> the app's internal menu section shape.
  function sharedToSections(){
    return sections.map(s => ({
      name: s.n || "",
      items: (s.i || []).map(it => ({
        name: it.n || "", description: it.d || "", price: it.p || "",
        tags: Array.isArray(it.t) ? it.t : [],
      })),
    }));
  }
  function buildSavedMenu(rid){
    return { menu_id: uid("menu"), label: "Menu", restaurant_id: rid,
      captured_date: todayISO(), last_updated: todayISO(), source: "shared",
      sections: sharedToSections(), raw_text: "" };
  }
  function buildSavedRestaurant(rid){
    const r = { id:rid, name:data.r || "Restaurant", cuisine:data.cu || "",
      location:data.c || "", address:data.a || "", phone:"", website:"", notes:"",
      favorite:false, added_date:todayISO() };
    if (data.gpid) r.google_place_id = data.gpid;
    if (data.lat != null) r.lat = data.lat;
    if (data.lng != null) r.lng = data.lng;
    return r;
  }
  async function startSave(){
    if (!canSave) return;
    setSaveState("saving"); setSaveMsg("");
    try {
      const rGot = await ghGetFile(myCfg, "data/restaurants.json");
      const restaurants = Array.isArray(rGot.data) ? rGot.data : [];
      const mGot = await ghGetFile(myCfg, "data/menus.json");
      const menus = (mGot.data && typeof mGot.data === "object" && !Array.isArray(mGot.data)) ? mGot.data : {};
      const match = restaurants.find(r => r && norm(r.name) === norm(data.r || ""));
      if (match){ setDupAsk({ restaurants, menus, match }); setSaveState(""); return; }
      await doSave("new", { restaurants, menus });
    } catch(e){ setSaveState("err"); setSaveMsg((e && e.message) || "Could not save."); }
  }
  async function doSave(mode, ctx){
    setSaveState("saving");
    try {
      const restaurants = (ctx.restaurants || []).slice();
      const menus = Object.assign({}, ctx.menus || {});
      let writeRestaurants = false;
      let rid;
      if (mode === "new"){
        rid = uid("rest");
        restaurants.push(buildSavedRestaurant(rid));
        writeRestaurants = true;
      } else {
        rid = ctx.match.id;
      }
      if (sections.length){
        const m = buildSavedMenu(rid);
        menus[rid] = (mode === "replace") ? [m]
          : (Array.isArray(menus[rid]) ? menus[rid].concat([m]) : [m]);
      }
      if (writeRestaurants) await ghPutFile(myCfg, "data/restaurants.json", restaurants, null);
      if (sections.length) await ghPutFile(myCfg, "data/menus.json", menus, null);
      setDupAsk(null); setSaveState("saved");
      setSaveMsg(mode === "new" ? ("Added " + (data.r || "the place") + " to your places.")
               : sections.length ? ((mode === "replace" ? "Replaced the menu on " : "Added the menu to ") + (data.r || "your place") + ".")
               : "You already have this place.");
      logMsg("SHARE","saved shared visit place mode=" + mode);
    } catch(e){ setDupAsk(null); setSaveState("err"); setSaveMsg((e && e.message) || "Could not save."); }
  }

  const sub = [data.cu, data.c].filter(Boolean).join("  ·  ");

  return (
    <div className="pub-wrap">
      <div className="pub-kicker">A visit on MenuCaptain</div>
      <div className="pub-title">{data.r}</div>
      {sub ? <div className="pub-sub">{sub}</div> : null}
      {data.dt ? <div className="pub-sub" style={{marginTop:2}}>{fmtDate(data.dt)}</div> : null}

      {photos.length > 0 && (
        <div className="visit-photos" style={{justifyContent:"center", marginTop:14, marginBottom:4}}>
          {photos.map((u,i)=>(
            <div key={i} className="visit-photo tap" onClick={()=> setLb(i)}>
              <img src={u} alt="" style={{width:"100%", height:"100%", objectFit:"cover"}} loading="lazy" />
            </div>
          ))}
        </div>
      )}

      {people.length > 0 && (
        <div className="pub-sub" style={{marginTop:10}}>With {people.join(", ")}</div>
      )}

      {data.a ? (
        <div style={{textAlign:"center", marginTop:10}}>
          <a className="btn ghost sm"
             href={"https://maps.google.com/?q=" + encodeURIComponent((data.r ? data.r + ", " : "") + data.a)}
             target="_blank" rel="noopener noreferrer">Directions</a>
        </div>
      ) : null}

      {canSave ? (
        <div style={{textAlign:"center", marginTop:16}}>
          {saveState === "saved" ? (
            <div className="tiny" style={{color:"var(--ok)", fontWeight:600}}>&#10003; {saveMsg}</div>
          ) : (
            <>
              <button className="btn ghost sm" disabled={saveState === "saving"} onClick={startSave}>
                {saveState === "saving"
                  ? <span className="spin" />
                  : <span className="row" style={{gap:5, justifyContent:"center"}}><Icon name="plus" size={14} />Add to my places{sections.length ? " + menu" : ""}</span>}
              </button>
              {saveState === "err" ? <div className="tiny" style={{color:"var(--danger)", marginTop:6}}>{saveMsg}</div> : null}
            </>
          )}
        </div>
      ) : (
        <div className="card" style={{marginTop:18, textAlign:"center"}}>
          <div style={{fontWeight:600, marginBottom:5}}>Keep your own dining log</div>
          <div className="small muted" style={{marginBottom:12}}>
            Save this place, log your own visits, and share them back. Free.
          </div>
          <a className="btn primary" href={home}>Create your free account</a>
        </div>
      )}

      {dupAsk ? (
        <div style={{position:"fixed", inset:0, zIndex:80, background:"rgba(0,0,0,0.6)",
             display:"flex", alignItems:"center", justifyContent:"center", padding:20}}
             onClick={()=> setDupAsk(null)}>
          <div className="card" style={{maxWidth:380, width:"100%", margin:0}} onClick={(e)=> e.stopPropagation()}>
            <div style={{fontWeight:600, marginBottom:6}}>You already have {dupAsk.match.name}</div>
            <div className="small muted" style={{marginBottom:14}}>
              {sections.length ? "Add this shared menu to it, or replace its current menu(s)?"
                               : "This place is already in your list."}
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:8}}>
              {sections.length ? (
                <>
                  <button className="btn primary" disabled={saveState === "saving"} onClick={()=> doSave("add", dupAsk)}>Add this menu to it</button>
                  <button className="btn ghost" disabled={saveState === "saving"} onClick={()=> doSave("replace", dupAsk)}>Replace its menu(s)</button>
                </>
              ) : null}
              <button className="btn ghost" onClick={()=> setDupAsk(null)}>Cancel</button>
            </div>
          </div>
        </div>
      ) : null}

      {sections.length > 0 && (
        <div style={{marginTop:18}}>
          <button className="btn ghost sm" onClick={()=> setOpenMenu(o=> !o)}>
            {openMenu ? "Hide menu" : "View the menu"}
          </button>
          {openMenu ? (
            <div className="pub-menu" style={{marginTop:10}}>
              {sections.map((s,si)=>(
                <div key={si} className="pub-msec">
                  {s.n ? <div className="pub-msec-head"><span className="nm">{s.n}</span><span className="ct">{(s.i || []).length}</span></div> : null}
                  {(s.i || []).map((it,ii)=>(
                    <div key={ii} className="pub-mitem" style={{cursor:"default"}}>
                      <div style={{flex:1, minWidth:0}}>
                        <div className="pub-mitem-head">
                          <span className="inm">{it.n}</span>
                          {it.p ? <span className="ipr">{it.p}</span> : null}
                        </div>
                        {it.d ? <div className="idesc">{it.d}</div> : null}
                        {it.t && it.t.length > 0 && (
                          <div className="chips" style={{marginTop:6}}>
                            {it.t.map((t,k)=> <span key={k} className="chip tag">{t}</span>)}
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ) : null}
        </div>
      )}

      {lb >= 0 && photos[lb] ? (
        <div style={{position:"fixed", inset:0, zIndex:90, background:"rgba(0,0,0,0.92)",
             display:"flex", alignItems:"center", justifyContent:"center", padding:16}}
             onClick={()=> setLb(-1)}>
          <img src={photos[lb]} alt="" style={{maxWidth:"100%", maxHeight:"100%", objectFit:"contain"}} />
        </div>
      ) : null}

      <div className="pub-foot">
        <div className="tiny faint" style={{marginBottom:10}}>Made with MenuCaptain</div>
        <a className="btn ghost sm" href={home}>Make your own</a>
      </div>
    </div>
  );
}

/* No-account viewer for a shared MENU (?menu=...). The recipient browses the
   restaurant's menu, taps dishes to add them to a "your picks" tray, then taps
   "Send my picks" to fire their OWN share sheet with the list pre-filled - they
   text it straight back. Purely client-side: no account, no backend write. A
   prominent "Create your free account" card bridges them into MenuCaptain. */
// ============================================================
// GROUP ORDER (shared menu v2) - live, multi-guest order session
// ============================================================
// Host starts a session from a menu; guests open the ?g=<code> link
// (no account), pick with quantities + notes, and submit. The host
// watches the aggregated order build live. All via the backend.

// ---- API ----
async function groupCreateFreeForm(cfg, restaurantName, note){
  // Menu-less quick order: no snapshot, just a name (+ optional note). Guests
  // type their order in free text.
  const res = await fetch(apiBase(cfg) + "/api/group/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({ restaurant_name: restaurantName || "", title: note || "", menu_snapshot: null }),
  });
  if (!res.ok){
    let msg = "Could not start the group order.";
    try { const j = await res.json(); if (j && j.detail) msg = j.detail; } catch(e){}
    throw new Error(msg);
  }
  return res.json();   // { code, expires_at }
}
async function groupCreate(cfg, menu, restaurantName){
  // Snapshot ONE menu (sections/items only - never private estimates).
  const snapshot = {
    menu_id: (menu && menu.menu_id) || null,
    label: (menu && menu.label) || "Menu",
    sections: ((menu && menu.sections) || []).map(s => ({
      name: s.name || "",
      items: (s.items || []).map(it => ({
        name: it.name || "",
        price: it.price || "",
        description: it.description || "",
        tags: Array.isArray(it.tags) ? it.tags : [],
      })),
    })),
  };
  const res = await fetch(apiBase(cfg) + "/api/group/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({
      restaurant_name: restaurantName || "",
      title: (menu && menu.label) || "",
      menu_snapshot: snapshot,
    }),
  });
  if (!res.ok) throw new Error("create failed: " + res.status);
  return res.json();                                  // { code, expires_at }
}
async function groupFetch(cfg, code){
  // Host calls pass cfg (sends auth -> server returns the roster); guests pass
  // null (no auth -> roster omitted). Guarded: authHeaders() requires a cfg.
  const headers = {};
  if (cfg) { try { Object.assign(headers, await authHeaders(cfg)); } catch(e){} }
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code), { method:"GET", headers });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error("fetch failed: " + res.status);
  return res.json();
}
async function groupSubmit(cfg, code, name, token, picks){
  // When cfg is present (a signed-in invitee), send auth so the server binds
  // the order to their identity instead of the anonymous device token.
  const headers = { "Content-Type":"application/json" };
  if (cfg) { try { Object.assign(headers, await authHeaders(cfg)); } catch(e){} }
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code) + "/submit", {
    method:"POST", headers,
    body: JSON.stringify({ guest_name:name, guest_token:token, picks:picks }),
  });
  if (!res.ok){
    let msg = "Could not send your order.";
    try { const j = await res.json(); if (j && j.detail) msg = j.detail; } catch(e){}
    throw new Error(msg);
  }
  return res.json();
}

// "3 ordered" / "no orders yet" for an active-order row.
function groupCountLabel(n){
  n = n || 0;
  return n <= 0 ? "no orders yet" : (n + " ordered");
}
// "expires in 22h" / "expires in 45m" / "ending soon" from an ISO timestamp.
function expiresInLabel(iso){
  if (!iso) return "";
  const ms = new Date(iso).getTime() - Date.now();
  if (isNaN(ms) || ms <= 0) return "ending soon";
  const mins = Math.round(ms / 60000);
  if (mins < 60) return "expires in " + mins + "m";
  return "expires in " + Math.round(mins / 60) + "h";
}
async function groupSetRoster(cfg, code, names){
  // Host-only whole-roster replace. Authed POST; returns the cleaned roster.
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code) + "/roster", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({ names: names || [] }),
  });
  if (!res.ok) throw new Error("roster save failed: " + res.status);
  return res.json();
}
// Normalize a name for matching roster <-> submitters (case/space-insensitive).
function groupNorm(s){ return (s || "").trim().toLowerCase(); }
// One-line summary of picks: "2x Toast, 1x Pollo (no onions)".
function picksLine(picks){
  return (picks || []).map(p => (p.qty > 1 ? p.qty + "x " : "") + p.item + (p.note ? " (" + p.note + ")" : "")).join(", ");
}
// Split engine for a group order's check.
//   menuSnapshot: { sections:[{ items:[{name, price}] }] }
//   picks:        [{ guest_name, picks:[{item, qty}] }]
//   receipt:      { items:[{name, qty, price, menu_match}], total } | null
//   mode:         "itemized" | "even"
// Returns { rows:[{name, amount}], shared, total, basis, note }. Per-person rows
// always sum to `total` (shared items + tax/tip are baked into each person's
// number), so the split reconciles to the real check.
function computeSplit(menuSnapshot, picks, receipt, mode){
  const guests = (picks || []).filter(g => g && g.guest_name != null);
  const names  = guests.map(g => g.guest_name || "Guest");
  const N = guests.length;
  if (N === 0) return { rows:[], shared:0, total:0, basis:"none", note:"" };

  // ---- Receipt-based split: authoritative, matches the real check ----
  if (receipt && Array.isArray(receipt.items)){
    // each guest's picked quantity by normalized menu-item name
    const pickedQty = guests.map(g => {
      const m = {};
      (g.picks || []).forEach(p => {
        const k = groupNorm(p.item);
        if (k) m[k] = (m[k] || 0) + (Number(p.qty) || 1);
      });
      return m;
    });
    const itemsAmt = new Array(N).fill(0);   // each guest's matched line dollars
    let shared = 0;                          // unmatched line dollars (split evenly)
    let lineSubtotal = 0;
    (receipt.items || []).forEach(line => {
      const lineTotal = Number(line.price);
      if (!isFinite(lineTotal) || lineTotal <= 0) return;   // unreadable line price
      lineSubtotal += lineTotal;
      const key = groupNorm(line.menu_match || "");
      if (key){
        let sumQty = 0;
        const shares = pickedQty.map(m => { const q = m[key] || 0; sumQty += q; return q; });
        if (sumQty > 0){
          for (let i = 0; i < N; i++){ if (shares[i] > 0) itemsAmt[i] += lineTotal * (shares[i] / sumQty); }
          return;
        }
      }
      shared += lineTotal;                   // no menu_match, or nobody picked it
    });
    const total = (receipt.total != null && isFinite(Number(receipt.total)))
      ? Number(receipt.total) : lineSubtotal;
    const extra = total - lineSubtotal;      // tax + tip + fees (may be 0 or negative)
    const sharedEach = shared / N;
    const pre = itemsAmt.map(a => a + sharedEach);     // pre-tax/tip portion per guest
    const preSum = pre.reduce((s, x) => s + x, 0);
    const rows = names.map((nm, i) => {
      let amt;
      if (mode === "even"){
        amt = total / N;
      } else {
        const extraShare = preSum > 0 ? extra * (pre[i] / preSum) : extra / N;
        amt = pre[i] + extraShare;
      }
      return { name: nm, amount: amt };
    });
    return {
      rows: rows, shared: shared, total: total, basis: "receipt",
      extra: (receipt.total != null && extra > 0) ? extra : 0,   // tax+tip+fees in dollars
      note: (receipt.total != null
        ? "From the receipt, including tax and tip."
        : "From the receipt's line items (total not read, before tax).")
    };
  }

  // ---- Menu-price estimate: used before a receipt is scanned ----
  const priceByName = {};
  ((menuSnapshot && menuSnapshot.sections) || []).forEach(s =>
    (s.items || []).forEach(it => {
      const k = groupNorm(it.name);
      const v = parsePrice(it.price);
      if (k && v != null) priceByName[k] = v;
    }));
  let anyPrice = false;
  const subtotals = guests.map(g => {
    let sum = 0;
    (g.picks || []).forEach(p => {
      const v = priceByName[groupNorm(p.item)];
      if (v != null){ sum += v * (Number(p.qty) || 1); anyPrice = true; }
    });
    return sum;
  });
  const total = subtotals.reduce((s, x) => s + x, 0);
  if (!anyPrice){
    return {
      rows: names.map(nm => ({ name: nm, amount: 0 })),
      shared: 0, total: 0, basis: "noprice",
      note: "This menu doesn't have prices, so amounts aren't available yet. Scan the receipt to split the real check."
    };
  }
  return {
    rows: names.map((nm, i) => ({ name: nm, amount: mode === "even" ? (total / N) : subtotals[i] })),
    shared: 0, total: total, basis: "estimate",
    note: "Estimate from menu prices, before tax. Scan the receipt to match the real check."
  };
}

// A stable per-device guest id, so a guest can edit their own order.
function guestToken(){
  try {
    let t = localStorage.getItem("dininglog_guest_token");
    if (!t){ t = "g_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
             localStorage.setItem("dininglog_guest_token", t); }
    return t;
  } catch(e){ return "g_" + Date.now().toString(36); }
}

// Combine everyone's picks into a single bring-home tally.
function aggregatePicks(picks){
  const byItem = new Map();          // item -> { qty, notes:[{name,note}] }
  (picks || []).forEach(g => {
    (g.picks || []).forEach(p => {
      if (!p || !p.item) return;
      const cur = byItem.get(p.item) || { qty:0, notes:[] };
      cur.qty += (p.qty || 1);
      if (p.note) cur.notes.push({ name:g.guest_name, note:p.note });
      byItem.set(p.item, cur);
    });
  });
  return Array.from(byItem.entries()).map(([item,v]) => ({ item, qty:v.qty, notes:v.notes }));
}

// Split the check on a group order. Reuses the receipt scanner: scanning gives
// the real total + line items matched to the menu, which we assign to whoever
// ordered each item, distributing tax/tip proportionally so the per-person
// amounts add up to the actual check. Before a receipt is scanned it shows a
// menu-price estimate. Host-only (rendered inside the host screen).
function SplitCheck({cfg, menuSnapshot, picks}){
  const [open, setOpen]       = useState(false);
  const [receipt, setReceipt] = useState(null);     // { items, total } | null
  const [mode, setMode]       = useState("itemized");
  const [busy, setBusy]       = useState(false);
  const [err, setErr]         = useState("");
  const fileRef = useRef(null);

  const guests = (picks || []).filter(g => g && g.guest_name != null);
  const menuNames = [];
  ((menuSnapshot && menuSnapshot.sections) || []).forEach(s =>
    (s.items || []).forEach(it => { if (it.name) menuNames.push(it.name); }));

  async function onPick(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true); setErr("");
    try {
      const blob = await resizeImageToBlob(file, 1200, 0.82);
      const dataUrl = await blobToDataUrl(blob);
      const parsed = await parseReceiptPhotos(cfg, [dataUrl], menuNames);
      setReceipt({ items: parsed.items || [], total: parsed.total != null ? parsed.total : null });
      logMsg("SPLIT","receipt parsed items=" + (parsed.items || []).length + " total=" + parsed.total);
    } catch(e2){
      logMsg("SPLIT","receipt scan failed: " + e2.message);
      setErr(e2.message);
    }
    setBusy(false);
  }

  if (!open){
    return (
      <div className="go-split-row" onClick={()=> setOpen(true)}>
        <span className="go-split-title">Split the check</span>
        <Icon name="back" size={15} />
      </div>
    );
  }

  const split = computeSplit(menuSnapshot, picks, receipt, mode);

  return (
    <div className="card go-split">
      <div className="between" style={{marginBottom:10}}>
        <span className="go-split-title">Split the check</span>
        <a href="#" className="tiny" style={{color:"var(--accent)"}}
           onClick={(e)=>{ e.preventDefault(); setOpen(false); }}>Hide</a>
      </div>

      {guests.length === 0 ? (
        <div className="tiny faint">No orders yet to split.</div>
      ) : (
        <>
          <div className="row" style={{gap:8, marginBottom:12}}>
            <button className={"chip" + (mode === "itemized" ? " on" : "")}
              onClick={()=> setMode("itemized")}>By what each ordered</button>
            <button className={"chip" + (mode === "even" ? " on" : "")}
              onClick={()=> setMode("even")}>Even</button>
          </div>

          {split.rows.map((r, i)=>(
            <div key={i} className="go-split-line">
              <span className="go-split-name">{r.name}</span>
              <span className="go-split-amt">{fmtPrice(r.amount)}</span>
            </div>
          ))}
          {split.extra > 0 ? (
            <div className="go-split-line" style={{color:"var(--text-dim)"}}>
              <span className="go-split-name">Tax &amp; tip</span>
              <span className="go-split-amt">{fmtPrice(split.extra)}</span>
            </div>
          ) : null}
          <div className="go-split-line go-split-total">
            <span className="go-split-name">Total</span>
            <span className="go-split-amt">{fmtPrice(split.total)}</span>
          </div>

          {split.note ? <div className="tiny faint" style={{marginTop:8}}>{split.note}</div> : null}
          {split.shared > 0 ? (
            <div className="tiny faint" style={{marginTop:4}}>
              Includes {fmtPrice(split.shared)} of items we couldn't match to a person, split evenly.
            </div>
          ) : null}
          {err ? <div className="tiny" style={{color:"#d98a6a", marginTop:8}}>{err}</div> : null}

          <input ref={fileRef} type="file" accept="image/*" capture="environment"
            style={{display:"none"}} onChange={onPick} />
          <button className="btn ghost sm" style={{marginTop:12}} disabled={busy}
            onClick={()=> fileRef.current && fileRef.current.click()}>
            {busy ? <span className="spin" /> : (receipt ? "Re-scan or upload the receipt" : "Scan or upload the receipt")}
          </button>
        </>
      )}
    </div>
  );
}

// Quick (free-form) group order: no menu - just a restaurant name (+ optional
// note). Guests type what they want in free text. On start we create a menu-less
// order and hand off to the host screen by code (resume mode).
function QuickGroupStart({cfg, presetName, onClose}){
  const [name, setName] = useState(presetName || "");
  const [note, setNote] = useState("");
  const [code, setCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr]   = useState("");
  if (code){
    return <GroupOrderHost cfg={cfg} resumeCode={code} restaurantName={name} onClose={onClose} />;
  }
  async function start(){
    const nm = name.trim();
    if (!nm){ setErr("Add the restaurant name."); return; }
    setBusy(true); setErr("");
    try {
      const r = await groupCreateFreeForm(cfg, nm, note.trim());
      setCode(r.code);
      logMsg("GROUP","quick order started code=" + r.code);
    } catch(e){ setErr(e.message || "Could not start. Try again."); }
    finally { setBusy(false); }
  }
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Quick group order</h2><span style={{width:34}} />
      </div>
      <div className="ovbody">
        <div className="small muted" style={{marginBottom:14, lineHeight:1.6}}>
          No menu needed - name the place and share the link. Everyone types what
          they want in their own words and you watch the orders come in.
        </div>
        <label className="fld"><span className="lbl">Restaurant</span>
          <input className="input" value={name} placeholder="e.g. Gloria's Latin Cuisine"
            onChange={e=> setName(e.target.value)} />
        </label>
        <label className="fld"><span className="lbl">Note (optional)</span>
          <input className="input" value={note} placeholder="e.g. text me your order by 6"
            onChange={e=> setNote(e.target.value)} />
        </label>
        <button className="btn primary" onClick={start} disabled={busy || !name.trim()}>
          {busy ? <span className="spin" /> : "Start group order"}
        </button>
        {err ? <div className="small" style={{marginTop:10, color:"var(--danger)"}}>{err}</div> : null}
      </div>
    </div>
  );
}

// Shared entry into a group order from a place. A group order needs ONE menu,
// so this resolves which menu first, then hands off to the existing host screen:
//   0 digitized menus -> prompt to scan one
//   1 menu            -> straight into the host
//   2+ menus          -> "Which menu?" picker, then the host
// Merge several of a restaurant's menus into one snapshot so a group order can
// span them all (e.g. pasta + pizza). Section names get the menu label prefixed
// when combining 2+ so guests can tell which menu an item is from. A single menu
// is returned untouched (same shape/id as before).
function combineGroupMenus(list){
  if (!list || !list.length) return null;
  if (list.length === 1) return list[0];
  const sections = [];
  list.forEach(m => {
    const lbl = (m.label || m.name || "").trim();
    (m.sections || []).forEach(s => {
      const base = (s.name || "").trim();
      const name = lbl ? (base ? (lbl + " - " + base) : lbl) : base;
      sections.push(Object.assign({}, s, { name: name }));
    });
  });
  return {
    menu_id: "multi:" + list.map(m => m.menu_id).join("+"),
    label: list.map(m => (m.label || m.name || "").trim()).filter(Boolean).join(" + ") || "Full menu",
    sections: sections,
  };
}

  const [chosen, setChosen] = useState(usable.length === 1 ? usable[0] : null);
  // Which menus to include - default ALL on, so the whole restaurant is shared.
  const [picked, setPicked] = useState(()=> {
    const s = {}; usable.forEach(m => { s[m.menu_id] = true; }); return s;
  });
  const [chosenAuto, setChosenAuto] = useState(false);   // confirmed via the menu picker -> auto-start
  const [quick, setQuick] = useState(false);             // free-form (no menu) quick order
  const restaurantName = restaurant ? restaurant.name : "";

  if (quick){
    return <QuickGroupStart cfg={cfg} presetName={restaurantName} onClose={onClose} />;
  }
  if (chosen){
    return <GroupOrderHost cfg={cfg} menu={chosen} restaurantName={restaurantName} onClose={onClose} allMenus={usable} autoStart={chosenAuto} />;
  }
  if (usable.length === 0){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
          <h2>Group order</h2><span style={{width:34}} />
        </div>
        <div className="ovbody">
          <div className="empty" style={{padding:"40px 0"}}>
            <div className="big">No menu yet</div>
            <div>Scan a menu for {restaurantName || "this place"} to order from it - or start a quick order where everyone just types what they want.</div>
            <button className="btn primary" style={{marginTop:16}} onClick={()=> setQuick(true)}>
              Start a quick order
            </button>
          </div>
        </div>
      </div>
    );
  }
  const chosenList = usable.filter(m => picked[m.menu_id]);
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Which menus?</h2><span style={{width:34}} />
      </div>
      <div className="ovbody">
        <div className="small muted" style={{marginBottom:12}}>
          Pick the menus your group can order from. Leave them all on to share the whole menu.
        </div>
        {usable.map((m,i)=>{
          const on = !!picked[m.menu_id];
          return (
            <div key={m.menu_id || i} className="pick-row"
              style={{display:"flex", alignItems:"center", gap:10}}
              onClick={()=> setPicked(p => Object.assign({}, p, { [m.menu_id]: !p[m.menu_id] }))}>
              <span className="go-check" style={{flex:"none"}}>{on ? "✓" : ""}</span>
              <span className="pick-row-name" style={{flex:1, minWidth:0}}>{m.label || m.name || "Menu"}</span>
            </div>
          );
        })}
        <button className="btn primary" style={{marginTop:14}} disabled={!chosenList.length}
          onClick={()=>{ setChosen(combineGroupMenus(chosenList)); setChosenAuto(true); }}>
          {chosenList.length > 1 ? ("Start with these " + chosenList.length + " menus") : "Start group order"}
        </button>
        <div className="tiny faint" style={{textAlign:"center", marginTop:14, borderTop:"1px solid var(--line-soft)", paddingTop:12}}>
          Or skip the menu &mdash;
          <a href="#" style={{color:"var(--accent)", marginLeft:4}}
             onClick={(e)=>{ e.preventDefault(); setQuick(true); }}>start a no-menu order</a> where everyone just types what they want.
        </div>
      </div>
    </div>
  );
}

// Active group orders home (top of the Places tab). Account-backed list of the
// host's open orders, so it follows the user across devices. Renders only when
// at least one order is live; any load failure (incl. a backend that predates
// /api/group/mine) yields none and the card stays hidden - Places never breaks.
function ActiveGroupOrders({cfg}){
  const [orders, setOrders]   = useState([]);
  const [invites, setInvites] = useState([]);     // orders this user was invited to (Phase C)
  const [profile, setProfile] = useState(null);   // for join-as-yourself prefill
  const [resume, setResume]   = useState(null);   // hosted order opened in the host view
  const [openInvite, setOpenInvite] = useState(null);  // invited order opened as participant

  async function load(){
    try {
      const list = await groupMine(cfg);
      setOrders(Array.isArray(list) ? list : []);
    } catch(e){
      logMsg("GROUP","mine load failed (hiding card): " + e.message);
      setOrders([]);
    }
    try { const d = await getInvitations(cfg); setInvites((d && d.invitations) || []); }
    catch(e){ setInvites([]); }
    try { setProfile(await getMyProfile(cfg)); } catch(e){}
  }
  useEffect(()=> {
    load();
    // Refresh when the user returns to the app (iOS PWA resume), so counts and
    // the live/closed state stay current without manual action.
    const onVis = ()=> { if (document.visibilityState === "visible") load(); };
    document.addEventListener("visibilitychange", onVis);
    return ()=> document.removeEventListener("visibilitychange", onVis);
  }, []);

  if (!orders.length && !invites.length && !resume && !openInvite) return null;

  return (
    <>
      {orders.length ? (
        <div className="card ago-card">
          <div className="ago-head">Active group orders</div>
          {orders.map((o,i)=>(
            <div key={o.code || i} className="ago-row" onClick={()=> setResume(o)}>
              <div className="ago-row-main">
                <div className="ago-row-name">{o.restaurant_name || "Group order"}</div>
                <div className="tiny faint">
                  {[o.title, groupCountLabel(o.ordered_count), expiresInLabel(o.expires_at)]
                    .filter(Boolean).join("  \u00b7  ")}
                </div>
              </div>
              <Icon name="nodes" size={15} color="var(--accent)" />
            </div>
          ))}
        </div>
      ) : null}

      {invites.length ? (
        <div className="card ago-card">
          <div className="ago-head">Invited to</div>
          {invites.map((o,i)=>(
            <div key={o.code || i} className="ago-row" onClick={()=> setOpenInvite(o)}>
              <div className="ago-row-main">
                <div className="ago-row-name">{o.restaurant_name || "Group order"}</div>
                <div className="tiny faint">{o.host_name ? o.host_name + "'s order" : "Tap to add your order"}</div>
              </div>
              <Icon name="nodes" size={15} color="var(--accent)" />
            </div>
          ))}
        </div>
      ) : null}

      {resume ? (
        <GroupOrderHost
          cfg={cfg}
          menu={null}
          restaurantName={resume.restaurant_name}
          resumeCode={resume.code}
          onClose={()=> { setResume(null); load(); }} />
      ) : null}

      {openInvite ? (
        <div style={{position:"fixed", inset:0, zIndex:60, background:"var(--bg)", overflowY:"auto"}}>
          <div style={{maxWidth:600, margin:"0 auto"}}>
            <button className="btn ghost sm" style={{margin:"12px 16px 0"}}
              onClick={()=> { setOpenInvite(null); load(); }}>
              <Icon name="back" size={14} /> Back
            </button>
            <GroupOrderGuest code={openInvite.code} cfg={cfg} profile={profile} />
          </div>
        </div>
      ) : null}
    </>
  );
}

// Self-contained host launcher: a button that owns its own overlay, so it can
