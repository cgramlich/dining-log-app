// Host control: invite your connections to this order. They get it in their
// in-app "Active group orders" list and can join as themselves.
function GroupInvitePicker({cfg, code}){
  const [open, setOpen] = useState(false);
  const [conns, setConns] = useState(null);
  const [pick, setPick] = useState({});
  const [busy, setBusy] = useState(false);
  const [msg, setMsg]   = useState("");
  const favSet = loadConnFavs();   // favorite connections float to the top
  async function openPicker(){
    setOpen(true); setMsg("");
    if (conns === null){
      try { const d = await getConnections(cfg); setConns(d.connections || []); }
      catch(e){ setConns([]); }
    }
  }
  async function send(){
    const ids = Object.keys(pick).filter(k => pick[k]);
    if (!ids.length) return;
    setBusy(true); setMsg("");
    try {
      const r = await inviteToGroup(cfg, code, ids);
      setMsg("Invited " + (r.invited || 0));
      setPick({});
      setTimeout(()=> setOpen(false), 800);
    } catch(e){ setMsg(e.message); }
    finally { setBusy(false); }
  }
  return (
    <>
      <button className="btn ghost sm" style={{marginBottom:2}} onClick={openPicker}>
        <Icon name="nodes" size={14} color="var(--accent)" />Invite connections
      </button>
      {open && (
        <div style={{position:"fixed", inset:0, zIndex:70, background:"rgba(0,0,0,0.55)",
             display:"flex", alignItems:"flex-end", justifyContent:"center"}}
             onClick={()=> setOpen(false)}>
          <div className="card" style={{width:"100%", maxWidth:520, margin:0,
               borderTopLeftRadius:18, borderTopRightRadius:18, maxHeight:"85vh", overflowY:"auto"}}
               onClick={(e)=> e.stopPropagation()}>
            <div style={{fontWeight:600, marginBottom:4}}>Invite connections</div>
            <div className="small muted" style={{marginBottom:10}}>
              They'll see this order in their app and can join as themselves.
            </div>
            {conns === null ? (
              <div className="empty" style={{padding:"20px 0"}}><span className="spin" /></div>
            ) : conns.length === 0 ? (
              <div className="small faint" style={{padding:"4px 0 12px"}}>
                No connections yet. Add some in Settings &rarr; Connections.
              </div>
            ) : conns.slice().sort((a,b)=> (favSet.has(b.user_id)?1:0) - (favSet.has(a.user_id)?1:0)).map(c => {
              const l = connLabel(c);
              const on = !!pick[c.user_id];
              const isFav = favSet.has(c.user_id);
              return (
                <div key={c.user_id} className="pick-row" style={{display:"flex", alignItems:"center", gap:10}}
                  onClick={()=> setPick(p => Object.assign({}, p, { [c.user_id]: !p[c.user_id] }))}>
                  <span className="go-check" style={{flex:"none"}}>{on ? "✓" : ""}</span>
                  <span style={{flex:1, minWidth:0}}>
                    {isFav ? <span style={{color:"var(--accent)"}}>★ </span> : null}
                    {l.primary}{l.secondary ? <span className="tiny faint"> {l.secondary}</span> : null}</span>
                </div>
              );
            })}
            <div className="row" style={{gap:9, marginTop:14}}>
              <button className="btn ghost" onClick={()=> setOpen(false)}>Close</button>
              <button className="btn primary" disabled={busy || !Object.keys(pick).some(k=>pick[k])} onClick={send}>
                {busy ? <span className="spin" /> : "Invite"}
              </button>
            </div>
            {msg ? <div className="tiny" style={{marginTop:8, color:"var(--ok)"}}>{msg}</div> : null}
          </div>
        </div>
      )}
    </>
  );
}

// Host overlay: start (or resume) a session, share the link, and watch the
// order build live (polling). The active code is remembered per menu so the
// host can reopen the same session.
function GroupOrderHost({cfg, menu, restaurantName, onClose, resumeCode, allMenus, autoStart}){
  const menuKey = (menu && menu.menu_id) || null;
  const [data, setData]         = useState(null);
  const [code, setCode]         = useState(()=> {
    if (resumeCode) return resumeCode;            // opened from the active-orders list (resume by code)
    try { return menuKey ? (localStorage.getItem("dininglog_group:" + menuKey) || "") : ""; }
    catch(e){ return ""; }
  });
  // Persistence key resolves to the order's OWN menu once fetched (so a
  // resume-from-list close clears the right per-menu key), else the menu we
  // opened from. Null -> skip localStorage; the live view runs off `code`.
  const persistId = (data && data.menu_snapshot && data.menu_snapshot.menu_id) || menuKey || null;
  const lsKey = persistId ? ("dininglog_group:" + persistId) : null;
  const [starting, setStarting] = useState(false);
  const [err, setErr]           = useState("");
  const [copied, setCopied]     = useState(false);
  const [confirmClose, setConfirmClose] = useState(false);   // gate the finalizing "Close order"
  const [placedBusy, setPlacedBusy] = useState(false);       // "Mark as placed" in flight
  const [menuEditOpen, setMenuEditOpen] = useState(false);   // "Edit menus" sheet (change which menus the order uses)
  const [menuPick, setMenuPick]   = useState({});
  const [menuBusy, setMenuBusy]   = useState(false);
  function openMenuEdit(){
    const id = (data && data.menu_snapshot && data.menu_snapshot.menu_id) || "";
    const cur = id.indexOf("multi:") === 0 ? id.slice(6).split("+").filter(Boolean) : (id ? [id] : []);
    const init = {};
    (allMenus || []).forEach(m => { init[m.menu_id] = cur.indexOf(m.menu_id) >= 0; });
    setMenuPick(init);
    setMenuEditOpen(true);
  }
  async function saveMenuEdit(){
    const chosen = (allMenus || []).filter(m => menuPick[m.menu_id]);
    if (!chosen.length || !code) return;
    const snap = combineGroupMenus(chosen);
    setMenuBusy(true);
    try {
      await groupUpdateMenu(cfg, code, snap, snap.label);
      const d = await groupFetch(cfg, code);
      if (d) setData(d);
      setMenuEditOpen(false);
      logMsg("GROUP","menus updated for code=" + code);
    } catch(e){ logMsg("GROUP","menu update failed: " + e.message); }
    finally { setMenuBusy(false); }
  }
  const [confirmRemove, setConfirmRemove] = useState(null);  // guest_token pending remove-confirm
  const [editTarget, setEditTarget] = useState(null);        // the pick being host-edited, or null
  const [editItems, setEditItems]   = useState([]);          // working copy of that pick's items
  const [editBusy, setEditBusy]     = useState(false);
  const link = code ? (location.origin + location.pathname + "?g=" + code) : "";
  const [rosterInput, setRosterInput] = useState("");
  const [rosterBusy, setRosterBusy]   = useState(false);
  // Whole-roster replace on every add/remove: optimistic local update, server
  // truth from the response. A failure logs and leaves the prior roster intact.
  async function saveRoster(names){
    if (!code) return;
    setRosterBusy(true);
    try {
      const r = await groupSetRoster(cfg, code, names);
      const next = (r && Array.isArray(r.roster)) ? r.roster : names;
      setData(d => d ? { ...d, roster: next } : d);
      logMsg("GROUP","roster saved count=" + next.length);
    } catch(e){
      logMsg("GROUP","roster save failed: " + e.message);
    } finally {
      setRosterBusy(false);
    }
  }
  function addRosterName(){
    const nm = rosterInput.trim();
    if (!nm) return;
    const cur = (data && Array.isArray(data.roster)) ? data.roster : [];
    if (cur.some(x => groupNorm(x) === groupNorm(nm))) { setRosterInput(""); return; }
    setRosterInput("");
    saveRoster(cur.concat([nm]));
  }
  function removeRosterName(name){
    const cur = (data && Array.isArray(data.roster)) ? data.roster : [];
    saveRoster(cur.filter(x => groupNorm(x) !== groupNorm(name)));
  }
  // Host removes one person's submitted order (the Carson case). Optimistic
  // local prune; the 5s poll reconciles if the server disagrees. guest_token
  // comes from the host-only fields in GET /api/group/{code}.
  async function removePick(token){
    if (!code || !token) return;
    setData(d => d ? { ...d, picks: (d.picks || []).filter(p => p.guest_token !== token) } : d);
    setConfirmRemove(null);
    try { await groupRemovePick(cfg, code, token); logMsg("GROUP","removed pick token=" + token.slice(0,8)); }
    catch(e){ logMsg("GROUP","remove pick failed: " + e.message); }
  }
  function openEdit(g){
    if (!g || !g.guest_token) return;
    setEditItems((g.picks || []).map(p => ({ item: p.item, qty: p.qty || 1, note: p.note || "" })));
    setEditTarget(g);
  }
  async function saveEdit(){
    if (!editTarget || !code) return;
    const token = editTarget.guest_token;
    const list = editItems.map(it => ({ item: it.item, qty: it.qty || 1, note: (it.note || "").trim() }));
    if (!list.length) return;
    setEditBusy(true);
    try {
      await groupHostPick(cfg, code, editTarget.guest_name || "", token, list);
      setData(d => d ? { ...d, picks: (d.picks || []).map(p => p.guest_token === token ? { ...p, picks: list } : p) } : d);
      setEditTarget(null);
      logMsg("GROUP","host edited pick token=" + token.slice(0,8));
    } catch(e){ logMsg("GROUP","host edit failed: " + e.message); }
    finally { setEditBusy(false); }
  }
  // Per-card host controls: Edit + Remove (Remove has a row-level confirm).
  const cardCtls = (g) => {
    const token = g && g.guest_token;
    if (!token) return null;
    return (confirmRemove === token ? (
      <span style={{display:"inline-flex",gap:6,flex:"none"}}>
        <button className="btn ghost sm" onClick={()=> setConfirmRemove(null)}>Cancel</button>
        <button className="btn danger sm" onClick={()=> removePick(token)}>Remove</button>
      </span>
    ) : (
      <span style={{display:"inline-flex",gap:6,flex:"none"}}>
        <button className="btn ghost sm" style={{flex:"none"}} onClick={()=> openEdit(g)}>Edit</button>
        <button className="btn ghost sm" style={{flex:"none"}} onClick={()=> setConfirmRemove(token)}>Remove</button>
      </span>
    ));
  };

  useEffect(()=>{
    if (!code) return;
    let alive = true;
    const tick = async ()=>{
      try {
        const d = await groupFetch(cfg, code);
        if (!alive) return;
        if (d === null){                       // session gone -> reset to start
          if (lsKey) try { localStorage.removeItem(lsKey); } catch(e){}
          setData(null); setCode("");
          return;
        }
        setData(d);
      } catch(e){ if (alive) logMsg("GROUP","poll failed: " + e.message); }
    };
    tick();
    const id = setInterval(tick, 5000);
    return ()=> { alive = false; clearInterval(id); };
  }, [code]);

  // Came straight from the menu picker -> skip the intro and create the order
  // immediately (unless a code already exists for this menu combo, i.e. resume).
  const autoStarted = useRef(false);
  useEffect(()=>{
    if (autoStart && !code && !autoStarted.current){
      autoStarted.current = true;
      start();
    }
    // eslint-disable-next-line
  }, []);
  async function start(){
    setErr(""); setStarting(true);
    try {
      const r = await groupCreate(cfg, menu, restaurantName);
      if (lsKey) try { localStorage.setItem(lsKey, r.code); } catch(e){}
      setCode(r.code);
      logMsg("GROUP","started code=" + r.code);
    } catch(e){
      logMsg("ERROR","group create failed: " + e.message);
      setErr("Could not start the group order. Try again.");
    } finally { setStarting(false); }
  }
  async function shareLink(){
    try {
      if (navigator.share) await navigator.share({ title:"Group order", text:"I'm at " + (restaurantName || "the restaurant") + " - what do you want? Add your order here: " + link });
      else { await navigator.clipboard.writeText(link); setCopied(true); setTimeout(()=> setCopied(false), 1500); }
    } catch(e){}
  }
  async function copyLink(){
    try { await navigator.clipboard.writeText(link); setCopied(true); setTimeout(()=> setCopied(false), 1500); } catch(e){}
  }
  async function closeOrder(){
    if (code){
      try { await groupClose(cfg, code); logMsg("GROUP","closed code=" + code); }
      catch(e){ logMsg("GROUP","close failed: " + e.message); }
      if (lsKey) try { localStorage.removeItem(lsKey); } catch(e){}
    }
    onClose();
  }
  async function togglePlaced(){
    if (!code) return;
    const next = !(data && data.placed);
    setPlacedBusy(true);
    try {
      await groupSetPlaced(cfg, code, next);
      const d = await groupFetch(cfg, code); if (d) setData(d);
      logMsg("GROUP","placed=" + next + " code=" + code);
    } catch(e){ logMsg("GROUP","set placed failed: " + e.message); }
    finally { setPlacedBusy(false); }
  }

  const agg    = data ? aggregatePicks(data.picks) : [];
  const guests = data ? (data.picks || []) : [];
  const closed = data && data.status === "closed";
  const roster    = (data && Array.isArray(data.roster)) ? data.roster : [];
  const hasRoster = roster.length > 0;
  // Reconcile expected names against who actually submitted. Match by normalized
  // name; submitters not on the roster fall into "extras" so nothing is lost.
  const subByName = {};
  guests.forEach(g => { const k = groupNorm(g.guest_name); if (k && !(k in subByName)) subByName[k] = g; });
  const rosterSet = new Set(roster.map(groupNorm));
  const expected  = roster.map(name => ({ name, sub: subByName[groupNorm(name)] || null }));
  const waiting   = expected.filter(r => !r.sub).map(r => r.name);
  const extras    = guests.filter(g => !rosterSet.has(groupNorm(g.guest_name)));

  return (
    <div className="go-overlay">
      <div className="go-bar">
        <button className="btn ghost sm" onClick={onClose}>{code ? "Leave open" : "Cancel"}</button>
        <div className="go-bar-title">Group order</div>
        {code ? <button className="btn ghost sm" onClick={()=> setConfirmClose(true)}>Close order</button>
              : <span style={{width:54}} />}
      </div>
      <div className="go-body">
        {!code ? (
          autoStart ? (
            <div className="card" style={{textAlign:"center", padding:"30px 14px"}}>
              {err ? (
                <>
                  <div className="small" style={{marginBottom:12, color:"var(--danger)"}}>{err}</div>
                  <button className="btn primary" onClick={start} disabled={starting}>
                    {starting ? <span className="spin" /> : "Start group order"}
                  </button>
                </>
              ) : (
                <>
                  <div className="spin" style={{margin:"0 auto 12px"}} />
                  <div className="small muted">Starting your group order&hellip;</div>
                </>
              )}
            </div>
          ) : (
            <div className="card">
              <div style={{fontWeight:600, marginBottom:6}}>Start a group order</div>
              <div className="small muted" style={{lineHeight:1.7, marginBottom:14}}>
                Share a link to {restaurantName || "this menu"}. Everyone you send it to opens it,
                picks what they want - with quantities and notes - and you watch the order come
                together here. No app needed on their end.
              </div>
              <button className="btn primary" onClick={start} disabled={starting}>
                {starting ? <span className="spin" /> : "Start group order"}
              </button>
              {err ? <div className="small" style={{marginTop:10, color:"var(--danger)"}}>{err}</div> : null}
            </div>
          )
        ) : (
          <>
            {editTarget && (
              <div style={{position:"fixed", inset:0, zIndex:70, background:"rgba(0,0,0,0.55)",
                   display:"flex", alignItems:"flex-end", justifyContent:"center"}}
                   onClick={()=> setEditTarget(null)}>
                <div className="card" style={{width:"100%", maxWidth:520, margin:0,
                     borderTopLeftRadius:18, borderTopRightRadius:18, maxHeight:"85vh", overflowY:"auto"}}
                     onClick={(e)=> e.stopPropagation()}>
                  <div style={{fontWeight:600, marginBottom:10}}>
                    Edit {editTarget.guest_name || "guest"}'s order
                  </div>
                  {editItems.length === 0 ? (
                    <div className="small muted" style={{marginBottom:10}}>
                      No items left - remove this person instead, or cancel.
                    </div>
                  ) : editItems.map((it, idx)=>(
                    <div key={idx} className="go-guest" style={{display:"flex", alignItems:"center", gap:8}}>
                      <div style={{flex:1, minWidth:0}}>
                        <div className="go-guest-name">{it.item}</div>
                        <input className="input" style={{marginTop:6}} placeholder="Note (optional)"
                          value={it.note}
                          onChange={e=> setEditItems(arr => arr.map((x,j)=> j===idx ? {...x, note:e.target.value} : x))} />
                      </div>
                      <div style={{display:"inline-flex", alignItems:"center", gap:6, flex:"none"}}>
                        <button className="btn ghost sm" onClick={()=> setEditItems(arr => arr.map((x,j)=> j===idx ? {...x, qty:Math.max(1,(x.qty||1)-1)} : x))}>-</button>
                        <span style={{minWidth:18, textAlign:"center"}}>{it.qty||1}</span>
                        <button className="btn ghost sm" onClick={()=> setEditItems(arr => arr.map((x,j)=> j===idx ? {...x, qty:Math.min(99,(x.qty||1)+1)} : x))}>+</button>
                        <button className="btn ghost sm" onClick={()=> setEditItems(arr => arr.filter((x,j)=> j!==idx))}>&times;</button>
                      </div>
                    </div>
                  ))}
                  <div className="row" style={{gap:9, marginTop:14}}>
                    <button className="btn ghost" onClick={()=> setEditTarget(null)}>Cancel</button>
                    <button className="btn primary" disabled={editItems.length===0 || editBusy} onClick={saveEdit}>
                      {editBusy ? <span className="spin" /> : "Save changes"}
                    </button>
                  </div>
                </div>
              </div>
            )}
            {confirmClose && (
              <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)", marginBottom:12}}>
                <div className="small" style={{marginBottom:11}}>
                  Close this order? Guests won't be able to add or change items, and it leaves
                  your Active group orders. To keep collecting, leave it open instead.
                </div>
                <div className="row" style={{gap:9}}>
                  <button className="btn ghost" onClick={()=> setConfirmClose(false)}>Keep collecting</button>
                  <button className="btn danger" onClick={closeOrder}>Close order</button>
                </div>
              </div>
            )}
            {!closed && (
              <div className="small muted" style={{marginBottom:10, textAlign:"center"}}>
                This order stays open until you close it. Tap <b>Leave open</b> to step away and
                pick it back up later from <b>Active group orders</b>.
              </div>
            )}
            <div className="card">
              <div className="small muted" style={{marginBottom:8}}>Share this link with the table:</div>
              <div className="go-link">{link}</div>
              <div className="row" style={{gap:8, marginTop:10}}>
                <button className="btn sm" onClick={shareLink}>Share link</button>
                <button className="btn ghost sm" onClick={copyLink}>{copied ? "Copied" : "Copy"}</button>
              </div>
              {closed ? <div className="tiny faint" style={{marginTop:10}}>This order is closed - guests can no longer add to it.</div> : null}
            </div>

            {code ? (
              <div className="card">
                <div className="between">
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600}}>{(data && data.placed) ? "Order placed ✓" : "Placed the order?"}</div>
                    <div className="tiny faint" style={{marginTop:3}}>
                      {(data && data.placed)
                        ? "Everyone sees a confirmation. The order stays open for late changes."
                        : "Let everyone know you've sent it to the restaurant."}
                    </div>
                  </div>
                  <button className={"btn sm " + ((data && data.placed) ? "ghost" : "primary")}
                    disabled={placedBusy} onClick={togglePlaced} style={{flex:"none"}}>
                    {placedBusy ? <span className="spin" /> : ((data && data.placed) ? "Undo" : "Mark as placed")}
                  </button>
                </div>
              </div>
            ) : null}

            {!closed && code ? <GroupInvitePicker cfg={cfg} code={code} /> : null}

            {!closed && (allMenus || []).length > 1 && (
              <button className="btn ghost sm" style={{marginBottom:2}} onClick={openMenuEdit}>
                <Icon name="camera" size={14} color="var(--accent)" />Edit menus
              </button>
            )}
            {menuEditOpen && (
              <div style={{position:"fixed", inset:0, zIndex:70, background:"rgba(0,0,0,0.55)",
                   display:"flex", alignItems:"flex-end", justifyContent:"center"}}
                   onClick={()=> setMenuEditOpen(false)}>
                <div className="card" style={{width:"100%", maxWidth:520, margin:0,
                     borderTopLeftRadius:18, borderTopRightRadius:18, maxHeight:"85vh", overflowY:"auto"}}
                     onClick={(e)=> e.stopPropagation()}>
                  <div style={{fontWeight:600, marginBottom:4}}>Which menus?</div>
                  <div className="small muted" style={{marginBottom:10}}>Guests can order from every menu you check.</div>
                  {(allMenus || []).map((m,i)=>{
                    const on = !!menuPick[m.menu_id];
                    return (
                      <div key={m.menu_id || i} className="pick-row"
                        style={{display:"flex", alignItems:"center", gap:10}}
                        onClick={()=> setMenuPick(p => Object.assign({}, p, { [m.menu_id]: !p[m.menu_id] }))}>
                        <span className="go-check" style={{flex:"none"}}>{on ? "✓" : ""}</span>
                        <span style={{flex:1, minWidth:0}}>{m.label || m.name || "Menu"}</span>
                      </div>
                    );
                  })}
                  <div className="row" style={{gap:9, marginTop:14}}>
                    <button className="btn ghost" onClick={()=> setMenuEditOpen(false)}>Cancel</button>
                    <button className="btn primary" disabled={menuBusy || !(allMenus||[]).some(m => menuPick[m.menu_id])}
                      onClick={saveMenuEdit}>
                      {menuBusy ? <span className="spin" /> : "Save menus"}
                    </button>
                  </div>
                </div>
              </div>
            )}

            <div className="card go-roster">
              <div className="go-roster-head">Who's in on the order?</div>
              {roster.length ? (
                <div className="go-chips">
                  {roster.map((name,i)=>(
                    <span key={i} className="go-chip">
                      {name}
                      <button className="go-chip-x" onClick={()=> removeRosterName(name)} disabled={rosterBusy}>&times;</button>
                    </span>
                  ))}
                </div>
              ) : null}
              {!closed ? (
                <div className="row" style={{gap:8, marginTop: roster.length ? 10 : 0}}>
                  <input className="input" placeholder="Add who you're expecting (optional)"
                    value={rosterInput}
                    onChange={e=> setRosterInput(e.target.value)}
                    onKeyDown={e=> { if (e.key === "Enter"){ e.preventDefault(); addRosterName(); } }} />
                  <button className="btn ghost sm" onClick={addRosterName} disabled={rosterBusy || !rosterInput.trim()}>Add</button>
                </div>
              ) : null}
              {roster.length ? (
                <div className="tiny faint" style={{marginTop:8}}>
                  Names match what each person types when they order.
                </div>
              ) : null}
            </div>

            <div className="go-sec">Who's ordered ({guests.length})</div>
            {hasRoster ? (
              <div className="card">
                {waiting.length ? (
                  <div className="go-waiting">Still waiting on: {waiting.join(", ")}</div>
                ) : (
                  <div className="tiny faint" style={{padding:"2px 10px 8px"}}>Everyone on your list has ordered.</div>
                )}
                {expected.map((r,i)=>(
                  <div key={"e"+i} className="go-guest">
                    <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="go-guest-name">
                          {r.name}
                          {r.sub ? <span className="go-in">ordered</span> : <span className="go-wait">waiting</span>}
                        </div>
                        {r.sub ? <div className="tiny muted">{picksLine(r.sub.picks)}</div> : null}
                      </div>
                      {r.sub ? cardCtls(r.sub) : null}
                    </div>
                  </div>
                ))}
                {extras.length ? (
                  <>
                    <div className="tiny faint" style={{padding:"10px 10px 2px"}}>Also ordered</div>
                    {extras.map((g,i)=>(
                      <div key={"x"+i} className="go-guest">
                        <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div className="go-guest-name">{g.guest_name || "Guest"}</div>
                            <div className="tiny muted">{picksLine(g.picks)}</div>
                          </div>
                          {cardCtls(g)}
                        </div>
                      </div>
                    ))}
                  </>
                ) : null}
              </div>
            ) : guests.length === 0 ? (
              <div className="card small muted" style={{textAlign:"center"}}>
                Nobody's ordered yet. Share the link above and watch them come in.
              </div>
            ) : (
              <div className="card">
                {guests.map((g,i)=>(
                  <div key={i} className="go-guest">
                    <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="go-guest-name">{g.guest_name || "Guest"}</div>
                        <div className="tiny muted">{picksLine(g.picks)}</div>
                      </div>
                      {cardCtls(g)}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className="go-sec">Order so far</div>
            {agg.length === 0 ? (
              <div className="card small muted" style={{textAlign:"center"}}>
                No picks yet. As people add theirs, they show up here.
              </div>
            ) : (
              <div className="card">
                {agg.map((a,i)=>(
                  <div key={i} className="go-item">
                    <div className="go-item-head">
                      <span className="go-qty">{a.qty}&times;</span>
                      <span className="go-name">{a.item}</span>
                    </div>
                    {a.notes.length > 0 ? (
                      <div className="go-notes">
                        {a.notes.map((n,j)=> <div key={j} className="tiny faint">{n.note}{n.name ? " (" + n.name + ")" : ""}</div>)}
                      </div>
                    ) : null}
                  </div>
                ))}
              </div>
            )}


            {data ? <SplitCheck cfg={cfg} menuSnapshot={data.menu_snapshot} picks={data.picks} /> : null}

            <div className="tiny faint" style={{textAlign:"center", margin:"14px 0 30px"}}>
              Updates live. Closes on its own after a day, or tap Close order.
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// Guest screen (no account). Opened by a ?g=<code> link: fetch the menu from
// the backend, pick with quantity steppers + notes, submit. Re-submitting
// updates the same order (matched by the device's guest token).
function GroupOrderGuest({code, cfg, profile}){
  const home = location.origin + location.pathname;
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [notFound, setNotFound] = useState(false);
  const [picks, setPicks]     = useState({});     // "si:ii" -> { item, qty, note }
  const [name, setName]       = useState(()=> {
    const dn = profile && (profile.display_name || "").trim();
    if (dn) return dn.split(/\s+/)[0];            // signed-in invitee: prefill first name
    try { return localStorage.getItem("dininglog_guest_name") || ""; } catch(e){ return ""; }
  });
  const [sending, setSending] = useState(false);
  const [sent, setSent]       = useState(false);
  const [placed, setPlaced]   = useState(false);   // ever submitted (sticky); sent = unchanged-since-submit
  const [err, setErr]         = useState("");
  const [showOrder, setShowOrder] = useState(false);
  const [openSec, setOpenSec]     = useState({});  // si -> open; undefined = use default
  const [helpOpen, setHelpOpen]     = useState(false);   // "Help me decide" card
  const [helpInput, setHelpInput]   = useState("");
  const [helpAnswer, setHelpAnswer] = useState("");
  const [helpBusy, setHelpBusy]     = useState(false);
  const [helpErr, setHelpErr]       = useState("");
  const [freeText, setFreeText]     = useState("");      // free-form (menu-less) order
  const token = guestToken();

  useEffect(()=>{
    let alive = true;
    (async ()=>{
      try {
        const d = await groupFetch(cfg || null, code);
        if (!alive) return;
        if (!d){ setNotFound(true); setLoading(false); return; }
        setData(d); setLoading(false);
      } catch(e){ if (alive){ setErr("Could not load this group order."); setLoading(false); } }
    })();
    return ()=> { alive = false; };
  }, [code]);

  const menu     = (data && data.menu_snapshot) || null;
  // Long / combined menus start with sections collapsed so guests can scan; a
  // short single menu stays open. Per-section taps override this default.
  const totalItems = menu ? (menu.sections || []).reduce((a,s)=> a + ((s.items || []).length), 0) : 0;
  const isMultiMenu = !!(menu && String(menu.menu_id || "").indexOf("multi:") === 0);
  const collapseDefault = !!(menu && (isMultiMenu || totalItems > 12));
  const closed   = data && data.status === "closed";
  const selected = Object.keys(picks).map(k => picks[k]).filter(Boolean);
  const restName = (data && data.restaurant_name) || (menu && menu.label) || "the menu";
  // Free-form (quick) order: no scanned menu, so guests type their order in their
  // own words. menu_snapshot is {free_form:true} (no usable sections).
  const hasMenu  = !!(menu && Array.isArray(menu.sections) && menu.sections.length);
  const freeForm = !!data && !hasMenu;
  const hasOrder = freeForm ? !!freeText.trim() : !!selected.length;

  function toggle(si, ii, item){
    const key = si + ":" + ii;
    setPicks(p => {
      const n = Object.assign({}, p);
      if (n[key]) delete n[key]; else n[key] = { item:item, qty:1, note:"" };
      return n;
    });
    setSent(false);
  }
  function bump(key, delta){
    setPicks(p => {
      if (!p[key]) return p;
      const q = Math.max(1, Math.min(99, (p[key].qty || 1) + delta));
      return Object.assign({}, p, { [key]: Object.assign({}, p[key], { qty:q }) });
    });
    setSent(false);
  }
  function setNote(key, val){
    setPicks(p => p[key] ? Object.assign({}, p, { [key]: Object.assign({}, p[key], { note:val }) }) : p);
    setSent(false);
  }
  async function submit(){
    const nm = name.trim();
    if (!nm){ setErr("Please add your name."); return; }
    let list;
    if (freeForm){
      const t = freeText.trim();
      if (!t){ setErr("Type your order first."); return; }
      list = [{ item:t, qty:1, note:"" }];
    } else {
      if (!selected.length){ setErr("Pick at least one item first."); return; }
      list = selected.map(s => ({ item:s.item, qty:s.qty || 1, note:(s.note || "").trim() }));
    }
    setErr(""); setSending(true);
    try {
      const r = await groupFetch(cfg || null, code);   // re-check it is still open before sending
      if (!r || r.status === "closed"){ setErr("This group order is closed."); setSending(false); return; }
      await groupSubmit(cfg || null, code, nm, token, list);
      try { localStorage.setItem("dininglog_guest_name", nm); } catch(e){}
      setData(await groupFetch(cfg || null, code));     // refresh the running order
      setSent(true); setPlaced(true);
      logMsg("GROUP","guest submitted " + list.length + " item(s)");
    } catch(e){
      setErr(e.message || "Could not send your order.");
    } finally { setSending(false); }
  }
  async function runHelp(preset){
    const p = (preset || helpInput || "").trim();
    if (!p){ setHelpErr("Tell me what you're in the mood for."); return; }
    setHelpErr(""); setHelpBusy(true); setHelpAnswer("");
    try {
      const data = await groupHelp(code, p, token);
      setHelpAnswer((data && data.answer) || "");
    } catch(e){ setHelpErr(e.message || "Couldn't get a suggestion."); }
    finally { setHelpBusy(false); }
  }

  if (loading) return <div className="pub-wrap"><div className="muted" style={{textAlign:"center", padding:"60px 0"}}><span className="spin" /> Loading...</div></div>;
  if (notFound) return (
    <div className="pub-wrap">
      <div className="pub-title">This group order was not found</div>
      <div className="muted" style={{textAlign:"center", marginBottom:20}}>The link may be wrong or the order may have ended.</div>
      <div style={{textAlign:"center"}}><a className="btn primary" href={home}>Open MenuCaptain</a></div>
    </div>
  );

  const running = data ? aggregatePicks(data.picks) : [];

  return (
    <div className="pub-wrap">
      <div className="pub-kicker">{data && data.host_name ? data.host_name + "'s group order" : "Group order"}</div>
      <div className="pub-title">{restName}</div>
      <div className="muted" style={{textAlign:"center", marginBottom:18}}>
        {closed ? "This order is closed."
          : freeForm
            ? "Type your order and send it back. You can change it any time until the host closes it."
            : "Pick what you'd like and send it back. You can change your order any time until the host closes it."}
      </div>

      {data && data.placed ? (
        <div style={{margin:"0 0 16px", padding:"10px 14px", borderRadius:12, textAlign:"center",
             background:"rgba(127,170,107,0.14)", color:"#a6c98f", border:"1px solid rgba(127,170,107,0.4)",
             fontWeight:600}}>
          &#10003; {data.host_name ? data.host_name + " placed the order" : "The order's been placed"} - it's on the way!
        </div>
      ) : null}

      {!closed && freeForm ? (
        <div className="card" style={{marginBottom:12}}>
          <div className="lbl" style={{marginBottom:6}}>Your order</div>
          <textarea className="input" rows={4}
            placeholder="Type whatever you'd like - e.g. Chicken burrito, no beans, extra salsa, and a horchata."
            value={freeText} onChange={e=>{ setFreeText(e.target.value); setSent(false); }} />
          <div className="tiny faint" style={{marginTop:6}}>
            No menu for this one - just write your order in your own words.
          </div>
        </div>
      ) : null}

      {!closed && (menu && Array.isArray(menu.sections)) ? (
        <>
          <div className="card ask" style={{marginBottom:12}}>
            <div className="ask-head" style={{cursor:"pointer", display:"flex", alignItems:"center", gap:8}}
              onClick={()=> setHelpOpen(o=>!o)}>
              <Icon name="sparkle" size={15} color="#e0764a" />
              <span style={{flex:1}}>Help me decide</span>
              <Icon name={helpOpen ? "chevd" : "chev"} size={14} />
            </div>
            {helpOpen && (
              <>
                <textarea className="input ask-input" rows={2}
                  placeholder="What are you in the mood for? e.g. something light, no pork, best value"
                  value={helpInput} onChange={e=> setHelpInput(e.target.value)} />
                <div className="chips ask-egs">
                  {["Something light","Best value","For sharing","Most popular"].map((eg,i)=>(
                    <span key={i} className="chip pick" onClick={()=> runHelp(eg)}>{eg}</span>
                  ))}
                </div>
                <button className="btn primary sm" disabled={helpBusy || !helpInput.trim()} onClick={()=> runHelp()}>
                  {helpBusy ? <span className="spin" /> : "Ask"}
                </button>
                {helpErr && <div className="ask-err">{helpErr}</div>}
                {helpAnswer && (
                  <div className="ask-answer">
                    {helpAnswer.split("\n").filter(Boolean).map((line,i)=>(
                      <p key={i} style={{margin:i?"8px 0 0":0}}>{line}</p>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
          {menu.sections.map((s, si)=>{
            const secOpen = (si in openSec) ? openSec[si] : !collapseDefault;
            const secSel  = Object.keys(picks).filter(k => picks[k] && k.indexOf(si + ":") === 0).length;
            return (
            <div key={si} className="go-gsec">
              <div className="go-gsec-head" style={{display:"flex", alignItems:"center", gap:8, cursor:"pointer"}}
                onClick={()=> setOpenSec(o => Object.assign({}, o, { [si]: !((si in o) ? o[si] : !collapseDefault) }))}>
                <span style={{flex:1, minWidth:0}}>{s.name || "Menu"}</span>
                {secSel ? <span className="tiny" style={{color:"var(--accent)", flex:"none"}}>{secSel} added</span> : null}
                <Icon name={secOpen ? "chevd" : "chev"} size={15} />
              </div>
              {secOpen ? (s.items || []).map((it, ii)=>{
                const key = si + ":" + ii;
                const on  = !!picks[key];
                return (
                  <div key={ii} className={"go-gitem" + (on ? " on" : "")}>
                    <div className="go-gitem-row" onClick={()=> toggle(si, ii, it.name)}>
                      <div className="go-check">{on ? "\u2713" : ""}</div>
                      <div style={{flex:1, minWidth:0}}>
                        <div className="go-gitem-name">{it.name}</div>
                        {it.description ? <div className="go-gitem-desc">{it.description}</div> : null}
                        {it.price ? <div className="tiny faint" style={{marginTop:3}}>{it.price}</div> : null}
                        {Array.isArray(it.tags) && it.tags.length ? (
                          <div className="tiny faint" style={{marginTop:3}}>{it.tags.join("  \u00b7  ")}</div>
                        ) : null}
                      </div>
                    </div>
                    {on ? (
                      <div className="go-gitem-ctl">
                        <div className="go-stepper">
                          <button className="go-step" onClick={()=> bump(key, -1)}>&minus;</button>
                          <span className="go-stepn">{picks[key].qty}</span>
                          <button className="go-step" onClick={()=> bump(key, +1)}>+</button>
                        </div>
                        <input className="input go-note" placeholder="Add a note (no onions...)"
                          value={picks[key].note} onChange={e=> setNote(key, e.target.value)} />
                      </div>
                    ) : null}
                  </div>
                );
              }) : null}
            </div>
            );
          })}

          {/* name + Send live in the sticky bottom bar so they're reachable without scrolling */}
        </>
      ) : null}

      {data && (data.picks || []).length > 0 ? (
        <div style={{marginTop:22}}>
          <a href="#" className="tiny" style={{color:"var(--accent)"}}
             onClick={(e)=>{ e.preventDefault(); setShowOrder(o=>!o); }}>
            {showOrder ? "Hide everyone's order" : "See everyone's order"}
          </a>
          {showOrder ? (
            <div className="card" style={{marginTop:8}}>
              {running.map((a,i)=>(
                <div key={i} className="go-item">
                  <div className="go-item-head">
                    <span className="go-qty">{a.qty}&times;</span>
                    <span className="go-name">{a.item}</span>
                  </div>
                  {a.notes && a.notes.length > 0 ? (
                    <div className="go-notes">
                      {a.notes.map((n,j)=> <div key={j} className="tiny faint">{n.note}{n.name ? " (" + n.name + ")" : ""}</div>)}
                    </div>
                  ) : null}
                </div>
              ))}
            </div>
          ) : null}
        </div>
      ) : null}

      <div className="tiny faint" style={{textAlign:"center", margin:"22px 0 30px"}}>
        Your name and picks are shared with whoever started this order. Nothing else.
      </div>

      {/* spacer so the last items clear the fixed submit bar */}
      {!closed && (hasMenu || freeForm) ? <div style={{height:150}} /> : null}
      {!closed && (hasMenu || freeForm) ? (
        <div style={{position:"fixed", left:0, right:0, bottom:0, zIndex:50,
             background:"var(--surface)", borderTop:"1px solid var(--line)",
             padding:"10px 16px calc(12px + env(safe-area-inset-bottom))",
             boxShadow:"0 -6px 20px rgba(0,0,0,0.22)"}}>
          <div style={{maxWidth:600, margin:"0 auto"}}>
            {placed && sent ? (
              <div style={{textAlign:"center"}}>
                <div style={{color:"var(--ok)", fontWeight:600, marginBottom:2}}>
                  &#10003; Order placed{name.trim() ? " - thanks, " + name.trim() : ""}!
                </div>
                <div className="tiny faint">It's in. Tap any item to change it, then send the update.</div>
              </div>
            ) : (
              <>
                <div className="tiny" style={{textAlign:"center", marginBottom:6,
                     color:(!name.trim() && hasOrder) ? "var(--accent)" : "var(--text-faint)"}}>
                  {(!name.trim() && hasOrder)
                    ? "Add your name so the host knows whose order this is"
                    : "Use your real name so the host knows whose order this is"}
                </div>
                <input className="input" placeholder="Your name" value={name}
                  onChange={e=> { setName(e.target.value); setSent(false); }}
                  style={{marginBottom:8, borderColor:(!name.trim() && hasOrder) ? "var(--accent)" : undefined}} />
                <button className="btn primary" onClick={submit}
                  disabled={sending || !hasOrder || !name.trim()}>
                  {sending ? <span className="spin" />
                    : (placed ? "Update my order" : "Send my order")
                      + (!freeForm && selected.length ? " (" + selected.length + ")" : "")}
                </button>
                {placed ? <div className="tiny faint" style={{textAlign:"center", marginTop:6}}>You have unsent changes.</div> : null}
              </>
            )}
            {err ? <div className="small" style={{marginTop:8, color:"var(--danger)", textAlign:"center"}}>{err}</div> : null}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function PublishedMenu({data}){
  const home = location.origin + location.pathname;
  // picks: "si:ii" -> dish name (object so order-of-tap is stable enough)
  const [picks, setPicks] = useState({});
  const [notes, setNotes] = useState({});  // "si:ii" -> special-instructions note
  const [open,  setOpen]  = useState(()=>{
    const o = {}; ((data && data.s) || []).forEach((s,i)=> { o[i] = true; }); return o;
  });
  const [sent, setSent] = useState(false);
  // "Save to my places" (logged-in viewers only). Imports the shared place +
  // menu into the user's own restaurants/menus, asking before overwriting.
  const myCfg = loadConfig();
  const canSave = configComplete(myCfg);
  const [saveState, setSaveState] = useState("");   // "" | saving | saved | err
  const [saveMsg, setSaveMsg]     = useState("");
  const [dupAsk, setDupAsk]       = useState(null);  // {restaurants, menus, match} awaiting choice

  if (!data || !Array.isArray(data.s)){
    return (
      <div className="pub-wrap">
        <div className="pub-title">This link looks broken</div>
        <div className="muted" style={{textAlign:"center",marginBottom:20}}>The menu could not be read.</div>
        <div style={{textAlign:"center"}}><a className="btn primary" href={home}>Open MenuCaptain</a></div>
      </div>
    );
  }

  const pickNames = Object.keys(picks).map(k => picks[k]).filter(Boolean);

  function toggle(si, ii, name){
    const key = si + ":" + ii;
    setPicks(p => {
      const n = Object.assign({}, p);
      if (n[key]) delete n[key]; else n[key] = name;
      return n;
    });
    // Drop any note when a dish is un-picked so it doesn't linger or get sent.
    setNotes(nt => {
      if (!nt[key]) return nt;
      const n = Object.assign({}, nt); delete n[key]; return n;
    });
    setSent(false);
  }

  function setNote(key, val){
    setNotes(n => Object.assign({}, n, { [key]: val }));
    setSent(false);
  }

  async function sendPicks(){
    if (!pickNames.length) return;
    const rest = data.r || "the menu";
    // One pick per line; a dish with a note reads "Dish (no onions)".
    const lines = Object.keys(picks).map(k => {
      const note = (notes[k] || "").trim();
      return "- " + (note ? (picks[k] + " (" + note + ")") : picks[k]);
    });
    const text = "My picks from " + rest + ":\n" + lines.join("\n");
    // Text only, no url: the recipient's share-sheet link would resolve to the
    // root ?menu= app shell (generic preview card), which adds noise. The text
    // already names the restaurant and the dishes, so it stands on its own.
    try {
      if (navigator.share){
        await navigator.share({ title:"My picks", text });
        setSent(true);
      } else {
        await navigator.clipboard.writeText(text);
        setSent(true);
      }
    } catch(e){ /* user cancelled - leave the tray as-is */ }
  }

  // Shared payload (short keys) -> the app's internal menu section shape.
  function sharedToSections(){
    return (data.s || []).map(s => ({
      name: s.n || "",
      items: (s.i || []).map(it => ({
        name: it.n || "", description: it.d || "", price: it.p || "",
        tags: Array.isArray(it.t) ? it.t : [],
      })),
    }));
  }
  function buildSavedMenu(rid){
    return { menu_id: uid("menu"), label: data.l || "Menu", restaurant_id: rid,
      captured_date: todayISO(), last_updated: todayISO(), source: "shared",
      sections: sharedToSections(), raw_text: "" };
  }
  async function startSave(){
    if (!canSave) return;
    setSaveState("saving"); setSaveMsg("");
    try {
      const rGot = await ghGetFile(myCfg, "data/restaurants.json");
      const restaurants = Array.isArray(rGot.data) ? rGot.data : [];
      const mGot = await ghGetFile(myCfg, "data/menus.json");
      const menus = (mGot.data && typeof mGot.data === "object" && !Array.isArray(mGot.data)) ? mGot.data : {};
      const match = restaurants.find(r => r && norm(r.name) === norm(data.r || ""));
      if (match){ setDupAsk({ restaurants, menus, match }); setSaveState(""); return; }  // ask before overwriting
      await doSave("new", { restaurants, menus });
    } catch(e){ setSaveState("err"); setSaveMsg((e && e.message) || "Could not save."); }
  }
  async function doSave(mode, ctx){
    setSaveState("saving");
    try {
      const restaurants = (ctx.restaurants || []).slice();
      const menus = Object.assign({}, ctx.menus || {});
      let writeRestaurants = false;
      if (mode === "new"){
        const rid = uid("rest");
        restaurants.push({ id:rid, name:data.r || "Restaurant", cuisine:data.cu || "",
          location:data.c || "", address:"", phone:"", website:"", notes:"",
          favorite:false, added_date:todayISO() });
        menus[rid] = [ buildSavedMenu(rid) ];
        writeRestaurants = true;
      } else {
        const rid = ctx.match.id;
        const m = buildSavedMenu(rid);
        menus[rid] = (mode === "replace") ? [m]
          : (Array.isArray(menus[rid]) ? menus[rid].concat([m]) : [m]);   // "add"
      }
      if (writeRestaurants) await ghPutFile(myCfg, "data/restaurants.json", restaurants, null);
      await ghPutFile(myCfg, "data/menus.json", menus, null);
      setDupAsk(null); setSaveState("saved");
      setSaveMsg(mode === "replace" ? ("Replaced the menu on " + (data.r || "your place") + ".")
               : mode === "add"     ? ("Added the menu to " + (data.r || "your place") + ".")
               : "Saved to your places.");
      logMsg("SHARE", "saved shared place mode=" + mode);
    } catch(e){ setDupAsk(null); setSaveState("err"); setSaveMsg((e && e.message) || "Could not save."); }
  }

  return (
    <div className="pub-wrap">
      <div className="pub-kicker">A menu on MenuCaptain</div>
      <div className="pub-title">{data.r || "Menu"}</div>
      {(data.cu || data.c || data.l) && (
        <div className="pub-sub">{[data.cu, data.c, data.l].filter(Boolean).join("  \u00b7  ")}</div>
      )}
      <div className="pub-hint">Tap the dishes you'd like, then send your picks back.</div>

      {canSave ? (
        <div style={{textAlign:"center", marginBottom:14}}>
          {saveState === "saved" ? (
            <div className="tiny" style={{color:"var(--ok)", fontWeight:600}}>&#10003; {saveMsg || "Saved to your places."}</div>
          ) : (
            <>
              <button className="btn ghost sm" disabled={saveState === "saving"} onClick={startSave}>
                {saveState === "saving"
                  ? <span className="spin" />
                  : <span className="row" style={{gap:5, justifyContent:"center"}}><Icon name="plus" size={14} />Save to my places</span>}
              </button>
              {saveState === "err" ? <div className="tiny" style={{color:"var(--danger)", marginTop:6}}>{saveMsg}</div> : null}
            </>
          )}
        </div>
      ) : null}

      {dupAsk ? (
        <div style={{position:"fixed", inset:0, zIndex:80, background:"rgba(0,0,0,0.6)",
             display:"flex", alignItems:"center", justifyContent:"center", padding:20}}
             onClick={()=> setDupAsk(null)}>
          <div className="card" style={{maxWidth:380, width:"100%", margin:0}} onClick={(e)=> e.stopPropagation()}>
            <div style={{fontWeight:600, marginBottom:6}}>You already have {dupAsk.match.name}</div>
            <div className="small muted" style={{marginBottom:14}}>
              Add this shared menu to it, or replace its current menu(s)?
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:8}}>
              <button className="btn primary" disabled={saveState === "saving"} onClick={()=> doSave("add", dupAsk)}>Add this menu to it</button>
              <button className="btn ghost" disabled={saveState === "saving"} onClick={()=> doSave("replace", dupAsk)}>Replace its menu(s)</button>
              <button className="btn ghost" onClick={()=> setDupAsk(null)}>Cancel</button>
            </div>
          </div>
        </div>
      ) : null}

      <div className="pub-menu">
        {data.s.map((s,si)=>(
          <div key={si} className="pub-msec">
            {s.n ? (
              <div className="pub-msec-head"
                onClick={()=> setOpen(o=> Object.assign({}, o, { [si]: !o[si] }))}>
                <span className="nm">{s.n}</span>
                <span className="ct">{(s.i || []).length}</span>
              </div>
            ) : null}
            {(open[si] !== false) && (s.i || []).map((it,ii)=>{
              const key = si + ":" + ii;
              const on  = !!picks[key];
              return (
                <React.Fragment key={ii}>
                <div className={"pub-mitem" + (on ? " on" : "")}
                  onClick={()=> toggle(si, ii, it.n)}>
                  <div className="pub-mitem-tick">{on ? "\u2713" : "+"}</div>
                  <div style={{flex:1, minWidth:0}}>
                    <div className="pub-mitem-head">
                      <span className="inm">{it.n}</span>
                      {it.p ? <span className="ipr">{it.p}</span> : null}
                    </div>
                    {it.d ? <div className="idesc">{it.d}</div> : null}
                    {it.t && it.t.length > 0 && (
                      <div className="chips" style={{marginTop:6}}>
                        {it.t.map((t,k)=> <span key={k} className="chip tag">{t}</span>)}
                      </div>
                    )}
                  </div>
                </div>
                {on && (
                  <input className="pub-note" type="text"
                    value={notes[key] || ""}
                    placeholder="Add a note - no onions, dressing on the side..."
                    onClick={(e)=> e.stopPropagation()}
                    onChange={(e)=> setNote(key, e.target.value)} />
                )}
                </React.Fragment>
              );
            })}
          </div>
        ))}
      </div>

      {/* bridge into signup - the same CTA the promo and lists use */}
      <div className="pub-cta">
        <div className="pub-cta-title">Keep your own food memory</div>
        <div className="pub-cta-sub">MenuCaptain remembers the places you go and the dishes you loved. Free to start, private to you.</div>
        <a className="btn primary" href={home} style={{textDecoration:"none"}}>Create your free account</a>
      </div>

      <div className="pub-foot">
        <div className="tiny faint">Made with MenuCaptain</div>
      </div>

      {/* leave room so the fixed tray never covers the footer */}
      {pickNames.length > 0 && <div style={{height:78}} />}

      {pickNames.length > 0 && (
        <div className="pick-tray">
          <div className="pick-tray-info">
            <div className="pick-tray-ct">{pickNames.length} pick{pickNames.length === 1 ? "" : "s"}</div>
            <div className="pick-tray-names">{pickNames.join(", ")}</div>
          </div>
          <button className="btn primary sm" style={{flex:"none"}} onClick={sendPicks}>
            {sent ? "Sent \u2713" : "Send my picks"}
          </button>
        </div>
      )}
    </div>
  );
}

// My Lists: a UI layer over the saved published-list records (data/lists.json).
// No new storage. Favorites pin to the top; within that, the chosen sort applies.
function MyListsOverlay({ lists, onClose, onToggleFav, onDelete, onRefresh, onHome }){
  const [sortBy,   setSortBy]   = useState("recent");
  const [busyId,   setBusyId]   = useState(null);   // refresh in flight
  const [doneId,   setDoneId]   = useState(null);   // just-refreshed flash
  const [copiedId, setCopiedId] = useState(null);
  const [confirmId,setConfirmId]= useState(null);   // delete confirm

  const ts = (s)=> (s ? (Date.parse(s) || 0) : 0);
  const cmps = {
    recent: (a,b)=> ts(b.updated_at) - ts(a.updated_at),
    newest: (a,b)=> ts(b.created_at) - ts(a.created_at),
    alpha:  (a,b)=> (a.title || "").toLowerCase().localeCompare((b.title || "").toLowerCase()),
    count:  (a,b)=> ((b.count || 0) - (a.count || 0)) || (ts(b.updated_at) - ts(a.updated_at)),
  };
  const cmp = cmps[sortBy] || cmps.recent;
  const sorted = (lists || []).slice().sort((a,b)=>{
    const fa = a.fav ? 1 : 0, fb = b.fav ? 1 : 0;
    if (fa !== fb) return fb - fa;   // favorites pinned on top
    return cmp(a,b);
  });

  const fmt = (s)=> { try { return new Date(s).toLocaleDateString(); } catch(e){ return ""; } };
  const preview = (rec)=> {
    const ns = (rec.names || []).slice(0, 3).join(", ");
    return ns + ((rec.count || 0) > 3 ? "..." : "");
  };

  async function doShare(rec){
    try {
      if (navigator.share){ await navigator.share({ title: rec.title || "My list", text:"A few places I love:", url: rec.url }); }
      else { await navigator.clipboard.writeText(rec.url); setCopiedId(rec.id); }
    } catch(e){ /* cancelled */ }
  }
  async function doCopy(rec){
    try { await navigator.clipboard.writeText(rec.url); setCopiedId(rec.id); setTimeout(()=> setCopiedId(null), 1500); } catch(e){}
  }
  async function doRefresh(rec){
    setBusyId(rec.id); setDoneId(null);
    const url = await onRefresh(rec);
    setBusyId(null);
    if (url){ setDoneId(rec.id); setTimeout(()=> setDoneId(null), 2200); }
  }

  const SORTS = [["recent","Recent"],["newest","Newest"],["alpha","A-Z"],["count","Most places"]];

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>My Lists</h2>
        <HomeBtn onHome={onHome} />
      </div>
      <div className="ovbody">
        {(!lists || !lists.length) ? (
          <div style={{textAlign:"center", padding:"48px 16px"}}>
            <div className="muted" style={{marginBottom:6}}>You haven't published any lists yet.</div>
            <div className="tiny faint">Publish one from the Places tab and it will show up here.</div>
          </div>
        ) : (
          <div>
            <div className="sortbar">
              <span className="sortbar-lbl">Sort</span>
              {SORTS.map(([k,lbl])=>(
                <span key={k} className={"chip pick" + (sortBy === k ? " on" : "")}
                  onClick={()=> setSortBy(k)}>{lbl}</span>
              ))}
            </div>
            {sorted.map(rec => (
              <SwipeToDelete key={rec.id} onDelete={()=>{ onDelete(rec); setConfirmId(null); }}>
              <div className="card" style={{marginBottom:10}}>
                <div className="between" style={{alignItems:"flex-start"}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div className="mylist-title">{rec.title || "Untitled list"}</div>
                    <div className="mylist-meta">{(rec.count || 0)} place{(rec.count || 0) === 1 ? "" : "s"}{preview(rec) ? " \u00b7 " + preview(rec) : ""}</div>
                    <div className="mylist-date">Updated {fmt(rec.updated_at)}</div>
                  </div>
                  <button className="mylist-star" onClick={()=> onToggleFav(rec)} aria-label="Favorite">
                    <Icon name="star" size={20} color={rec.fav ? "var(--accent)" : "var(--text-faint)"} />
                  </button>
                </div>
                <div className="mylist-acts">
                  <button className="btn ghost sm" onClick={()=> doShare(rec)}>Share</button>
                  <button className="btn ghost sm" onClick={()=> doCopy(rec)}>{copiedId === rec.id ? "Copied" : "Copy link"}</button>
                  <button className="btn ghost sm" disabled={busyId === rec.id} onClick={()=> doRefresh(rec)}>
                    {busyId === rec.id ? "Refreshing..." : (doneId === rec.id ? "Updated" : "Refresh")}
                  </button>
                  {confirmId === rec.id ? (
                    <button className="btn ghost sm mylist-del" onClick={()=>{ onDelete(rec); setConfirmId(null); }}>Tap to remove</button>
                  ) : (
                    <button className="btn ghost sm" onClick={()=> setConfirmId(rec.id)}>Delete</button>
                  )}
                </div>
                {confirmId === rec.id && (
                  <div className="tiny faint" style={{marginTop:8}}>Removes it from your saved lists. The public page stays up, so links you already sent keep working.</div>
                )}
              </div>
              </SwipeToDelete>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function PublishBuilder({restaurants, visits, menus, cfg, onPublished, onClose, onHome}){
  const [title,setTitle] = useState("");
  const [sel,setSel] = useState({});
  const [q,setQ] = useState("");
  const [link,setLink] = useState("");
  const [copied,setCopied] = useState(false);
  const [makeBusy,setMakeBusy] = useState(false);
  const [shortBusy,setShortBusy] = useState(false);
  const [shortMsg,setShortMsg] = useState("");

  const avgById = React.useMemo(()=>{
    const byRest = {};
    (visits || []).forEach(v => { if (v && v.restaurant_id){ (byRest[v.restaurant_id] = byRest[v.restaurant_id] || []).push(v); } });
    const out = {};
    (restaurants || []).forEach(r => { if (r && r.id) out[r.id] = placeRating(r, byRest[r.id] || []); });   // place rating
    return out;
  },[visits, restaurants]);

  const sorted = React.useMemo(()=>{
    const list = [...(restaurants || [])];
    list.sort((a,b)=>{
      const fb = (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0);
      if (fb) return fb;
      const ra = avgById[a.id] || 0, rb = avgById[b.id] || 0;
      if (rb !== ra) return rb - ra;
      return (a.name || "").localeCompare(b.name || "");
    });
    return list;
  },[restaurants, avgById]);

  const ql = q.trim().toLowerCase();
  const shown = ql
    ? sorted.filter(r => (r.name || "").toLowerCase().includes(ql)
        || (r.location || "").toLowerCase().includes(ql)
        || (r.cuisine || "").toLowerCase().includes(ql))
    : sorted;

  const selCount = Object.keys(sel).filter(k => sel[k]).length;
  const toggle = (id)=>{ setSel(s => { const n = Object.assign({}, s); if (n[id]) delete n[id]; else n[id] = true; return n; }); setLink(""); setCopied(false); setShortMsg(""); };
  const onTitle = (e)=>{ setTitle(e.target.value); setLink(""); setCopied(false); setShortMsg(""); };

  const make = async ()=>{
    if (makeBusy) return;
    setMakeBusy(true); setCopied(false); setShortMsg("");
    try {
      const selected = (restaurants || []).filter(r => sel[r.id]);
      // Build WITH menus; if the encoded link gets too big, fall back to
      // places-only so the shared URL stays usable.
      let payload = buildListPayload(title.trim(), selected, visits, menus);
      let enc = encodeListPayload(payload);
      let menusDropped = false;
      if (enc.length > 20000){
        payload = buildListPayload(title.trim(), selected, visits, null);
        enc = encodeListPayload(payload);
        menusDropped = true;
      }
      // ?list= (query) survives shorteners; the viewer also still reads #list=
      const longUrl = location.origin + location.pathname + "?list=" + enc;
      const short = await publishListPage(cfg, payload, enc);
      const dropNote = menusDropped ? "This list was large, so menus weren't included - it shares the places only. " : "";
      if (short){
        setLink(short);
        setShortMsg(dropNote + "Short link ready. The first time a list is published, its page can take a minute to go live.");
      } else {
        setLink(longUrl);
        setShortMsg(dropNote);
      }
      // Save this list to the user's saved lists (deliberate publishes only;
      // the one-tap city share does NOT save). place_ids come from the live
      // selection, since the encoded blob is name-based and carries no ids.
      const finalUrl = short || longUrl;
      if (onPublished){
        onPublished({
          id: "list_" + Math.random().toString(36).slice(2, 10),
          title: title.trim() || "Untitled list",
          place_ids: selected.map(r => r.id),
          encoded: enc,
          url: finalUrl,
          count: selected.length,
          names: selected.slice(0, 8).map(r => r.name),
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        });
      }
    } finally {
      setMakeBusy(false);
    }
  };
  const copy = async ()=>{ try { await navigator.clipboard.writeText(link); setCopied(true); } catch(e){ logMsg("WARN","Clipboard copy failed: " + e.message); } };
  const share = async ()=>{
    try { if (navigator.share){ await navigator.share({ title: title.trim() || "My list", text:"A few places I love:", url:link }); } else { copy(); } }
    catch(e){ /* user cancelled or unsupported */ }
  };
  // Optional shortener (shared helper). Any total failure keeps the long link.
  const shorten = async ()=>{
    if (!link || shortBusy) return;
    setShortBusy(true); setShortMsg("");
    const shortUrl = await shortenUrl(link);
    if (shortUrl){
      setLink(shortUrl); setCopied(false);
      setShortMsg("Shortened. Open it once to confirm it works.");
    } else {
      setShortMsg("Could not shorten right now - using the full link (it works fine).");
    }
    setShortBusy(false);
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Publish a list</h2>
        <HomeBtn onHome={onHome} />
      </div>
      <div className="ovbody">
        <input className="input" placeholder="List title (e.g. My Top Portland Spots)"
          value={title} onChange={onTitle} style={{marginBottom:12}} />

        <div className="pub-make">
          <div className="small muted">{selCount} selected</div>
          <button className="btn primary sm" disabled={!selCount || makeBusy} onClick={make}>
            {makeBusy ? "Creating..." : (link ? "Refresh link after changes" : "Create link")}
          </button>
        </div>

        {link && (
          <div className="card" style={{marginTop:12}}>
            <div className="linkbox">{link}</div>
            <div className="row" style={{gap:8,marginTop:10}}>
              <button className="btn sm" onClick={copy}>{copied ? "Copied" : "Copy"}</button>
              <button className="btn primary sm" onClick={share}>
                <Icon name="share" size={15} color="#1b1714" /> Share
              </button>
              {link.includes("?list=") && (
                <button className="btn ghost sm" onClick={shorten} disabled={shortBusy}>
                  {shortBusy ? "Shortening..." : "Shorten"}
                </button>
              )}
            </div>
            {shortMsg && <div className="tiny faint" style={{marginTop:8}}>{shortMsg}</div>}
            {link.length > 6000 && (
              <div className="tiny faint" style={{marginTop:8}}>This link is long; some apps may shorten it. Fewer places will help.</div>
            )}
            <div className="tiny faint" style={{marginTop:6}}>
              Anyone with this link can view the list. It holds only what is shown here - no tokens or keys.
            </div>
          </div>
        )}

        <input className="input" placeholder="Search your places" value={q}
          onChange={e=> setQ(e.target.value)} style={{margin:"16px 0 10px"}} />

        {shown.length === 0 ? (
          <div className="empty" style={{padding:"30px 10px"}}>
            <div>{restaurants && restaurants.length ? "No places match." : "Add some restaurants first."}</div>
          </div>
        ) : shown.map(r => (
          <div key={r.id} className={"pub-row" + (sel[r.id] ? " on" : "")} onClick={()=> toggle(r.id)}>
            <span className="pub-check">{sel[r.id] ? <Icon name="check" size={14} color="#1b1714" /> : null}</span>
            <span className="pub-row-tx">
              <span className="pub-row-n">{r.name}{r.favorite ? "  \u2605" : ""}</span>
              <span className="pub-row-s">
                {[r.location, r.cuisine].filter(Boolean).join("  \u00b7  ")}
                {avgById[r.id] ? "   " + avgById[r.id] + "\u2605 avg" : ""}
              </span>
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FoodPassport({visits, restaurantById, cfg, onOpenVisit, onClose, onHome}){
  const items = buildPassportItems(visits, restaurantById);
  // group newest-first into month buckets, order preserved
  const groups = [];
  let cur = null;
  items.forEach(it => {
    const ym = String(it.date).slice(0,7);
    if (!cur || cur.ym !== ym){
      const yy = ym.slice(0,4), mm = parseInt(ym.slice(5,7), 10) - 1;
      cur = { ym:ym, label: yifMonthName(mm) + " " + yy, items:[] };
      groups.push(cur);
    }
    cur.items.push(it);
  });

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Food passport</h2>
        <HomeBtn onHome={onHome} />
      </div>
      <div className="ovbody">
        {items.length === 0 ? (
          <div className="empty" style={{padding:"44px 20px"}}>
            <div className="big">No photos yet</div>
            <div>Add a photo to a visit or a dish and it will show up here.</div>
          </div>
        ) : groups.map((g,gi)=>(
          <div key={g.ym}>
            <div className="passport-month" style={gi === 0 ? {marginTop:4} : null}>{g.label}</div>
            <div className="passport-grid">
              {g.items.map((it,ii)=>(
                <div key={ii} className="passport-tile" onClick={()=> onOpenVisit(it.visitId)}>
                  <PhotoImg cfg={cfg} path={it.path} className="pp-photo" />
                  <div className="pp-cap">
                    <div className="pp-cap-r">{it.restName}</div>
                    <div className="pp-cap-d">
                      {it.dish ? it.dish + "  \u00b7  " : ""}{fmtDate(it.date)}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function YearInFood({visits, restaurants, onClose, onHome}){
  // years that have visits, newest first
  const years = Array.from(new Set((visits || [])
    .map(v => parseInt(String(v.date || "").slice(0,4), 10))
    .filter(y => isFinite(y) && y > 1990))).sort((a,b)=> b - a);
  // default to the most-logged year (richest recap), else "all"
  const countByYear = {};
  (visits || []).forEach(v => {
    const y = parseInt(String(v.date || "").slice(0,4), 10);
    if (isFinite(y)) countByYear[y] = (countByYear[y] || 0) + 1;
  });
  let defaultPeriod = "all";
  if (years.length){
    defaultPeriod = years[0]; let best = -1;
    years.forEach(y => { if (countByYear[y] > best){ best = countByYear[y]; defaultPeriod = y; } });
  }
  const [period, setPeriod] = useState(defaultPeriod);
  const [shareBusy, setShareBusy] = useState(false);
  const s = computeYearStats(visits, restaurants, period);
  const periodLabel = period === "all" ? "All time" : String(period);

  const share = async ()=>{
    if (shareBusy || s.empty) return;
    setShareBusy(true);
    try {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
      const blob = await buildYearCardBlob(s, periodLabel);
      const file = new File([blob], "menucaptain-year-" + (period === "all" ? "alltime" : period) + ".png", { type:"image/png" });
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        try { await navigator.share({ files:[file], title:"My Year in Food" }); }
        catch(e){ if (e && e.name !== "AbortError") logMsg("YIF","Share sheet failed: " + e.message); }
      } else {
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = u; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=> URL.revokeObjectURL(u), 2000);
        logMsg("YIF","File-share unsupported - downloaded the recap instead");
      }
    } catch(e){
      logMsg("ERROR","Year card failed: " + e.message);
      alert("Could not build the recap image: " + e.message);
    } finally {
      setShareBusy(false);
    }
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Year in Food</h2>
        <button className="x" onClick={share} disabled={shareBusy || s.empty} aria-label="Share recap">
          {shareBusy ? <span className="spin" /> : <Icon name="share" size={20} color="#b3a591" />}
        </button>
      </div>
      <div className="ovbody">
        {years.length > 0 && (
          <div className="chips" style={{marginBottom:16}}>
            {years.map(y => (
              <span key={y} className={"chip pick" + (period === y ? " on" : "")}
                onClick={()=> setPeriod(y)}>{y}</span>
            ))}
            <span className={"chip pick" + (period === "all" ? " on" : "")}
              onClick={()=> setPeriod("all")}>All time</span>
          </div>
        )}

        {s.empty ? (
          <div className="empty" style={{padding:"44px 20px"}}>
            <div className="big">Nothing logged {period === "all" ? "yet" : "in " + period}</div>
            <div>Log a few visits and your recap will fill in.</div>
          </div>
        ) : (
          <>
            <div className="yif-hero">
              <div className="yif-hero-kicker">Your Year in Food</div>
              <div className="yif-hero-year">{periodLabel}</div>
              <div className="yif-hero-sub">
                {s.visits} visit{s.visits === 1 ? "" : "s"} &nbsp;&middot;&nbsp; {s.places} place{s.places === 1 ? "" : "s"}
              </div>
            </div>

            {period !== "all" && s.newSpots > 0 && (
              <div className="yif-stat">
                <div className="yif-big">{s.newSpots}</div>
                <div className="yif-lbl" style={{marginTop:4}}>new spot{s.newSpots === 1 ? "" : "s"} discovered</div>
