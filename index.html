  /* ---- badges: toast the moment one is newly earned -------------------- */
  // Earned status is derived from data; we persist only a per-device list of
  // ids already seen (dininglog_badges_seen). The FIRST evaluation each session
  // silently establishes a baseline (acknowledges everything already earned -
  // including the very first run, and any stale-cache catch-up), so we never
  // toast for old milestones. Only badges earned LATER in the session toast.
  const badgeBaseline = useRef(false);
  useEffect(()=>{
    if (!ready || !auxLoaded) return;
    let seen;
    try { seen = JSON.parse(localStorage.getItem("dininglog_badges_seen") || "[]"); }
    catch(e){ seen = []; }
    if (!Array.isArray(seen)) seen = [];
    const earned = earnedBadgeIds({ restaurants, visits, menus, lists, meta });
    if (!badgeBaseline.current){
      const merged = seen.slice();
      earned.forEach(id => { if (merged.indexOf(id) === -1) merged.push(id); });
      try { localStorage.setItem("dininglog_badges_seen", JSON.stringify(merged)); } catch(e){}
      badgeBaseline.current = true;
      logMsg("BADGES","Baseline set (" + earned.length + " earned, no toast)");
      return;
    }
    const fresh = earned.filter(id => seen.indexOf(id) === -1);
    if (fresh.length){
      const names = fresh.map(id => {
        const b = BADGES.find(x => x.id === id);
        return b ? (b.nameHeart ? "Shared the Love" : b.name) : id;
      });
      flash("Badge earned - " + names.join(", "));
      logMsg("BADGES","Newly earned: " + fresh.join(", "));
      const next = seen.concat(fresh);
      try { localStorage.setItem("dininglog_badges_seen", JSON.stringify(next)); } catch(e){}
    }
  }, [ready, auxLoaded, restaurants, visits, menus, lists, meta]);

  /* ---- saved lists + meta (direct persistence, not the sync engine) ---- */
  async function saveLists(next){
    setLists(next);
    try { await ghPutFile(config, "data/lists.json", next, null); logMsg("LISTS","Saved " + next.length + " lists"); }
    catch(e){ logMsg("ERROR","lists save failed: " + e.message); flash("Could not save the list"); }
  }
  async function saveMeta(next){
    setMeta(next);
    try { await ghPutFile(config, "data/meta.json", next, null); logMsg("META","Saved meta"); }
    catch(e){ logMsg("ERROR","meta save failed: " + e.message); }
  }
  // Saved standalone check splits. Same direct-persistence pattern as lists:
  // the client owns the whole array and PUTs it on every change (the backend
  // "splits" collection). upsertSplit replaces by id; deleteSplit drops one.
  async function saveSplits(next){
    setSplits(next);
    try { await ghPutFile(config, "data/splits.json", next, null); logMsg("SPLITS","Saved " + next.length + " splits"); }
    catch(e){ logMsg("ERROR","splits save failed: " + e.message); flash("Could not save the split"); }
  }
  function upsertSplit(entity){
    if (!entity || !entity.id) return;
    const rest = (splits || []).filter(s => s.id !== entity.id);
    saveSplits([entity].concat(rest));
  }
  function deleteSplit(id){
    saveSplits((splits || []).filter(s => s.id !== id));
  }
  // Called by PublishBuilder after a deliberate publish succeeds. Dedup by url
  // so re-publishing the same list updates it instead of adding a duplicate.
  function handleListPublished(rec){
    if (!rec || !rec.url) return;
    const idx = (lists || []).findIndex(l => l.url === rec.url);
    let next;
    if (idx >= 0){
      next = lists.slice();
      next[idx] = Object.assign({}, next[idx], rec,
        { created_at: next[idx].created_at, updated_at: new Date().toISOString() });
    } else {
      next = (lists || []).concat([rec]);
    }
    saveLists(next);
    logMsg("LISTS", (idx >= 0 ? "Updated" : "Added") + " published list: " + (rec.title || "(untitled)"));
  }
  // My Lists actions. Refresh rebuilds a saved list from the user's CURRENT
  // places (via stored place_ids) and re-publishes; the slug is content-hashed,
  // so the link can change if the places changed. Replace by id (not url),
  // since url may move on refresh.
  async function refreshSavedList(rec){
    const selected = (restaurants || []).filter(r => (rec.place_ids || []).indexOf(r.id) !== -1);
    if (!selected.length){ flash("Those places aren't in your list anymore"); return null; }
    try {
      const payload  = buildListPayload(rec.title, selected, visits);
      const enc      = encodeListPayload(payload);
      const longUrl  = location.origin + location.pathname + "?list=" + enc;
      const short    = await publishListPage(config, payload, enc);
      const finalUrl = short || longUrl;
      const next = (lists || []).map(l => l.id === rec.id ? Object.assign({}, l, {
        place_ids: selected.map(r => r.id),
        encoded: enc, url: finalUrl, count: selected.length,
        names: selected.slice(0, 8).map(r => r.name),
        updated_at: new Date().toISOString(),
      }) : l);
      await saveLists(next);
      logMsg("LISTS", "Refreshed list: " + (rec.title || "(untitled)"));
      return finalUrl;
    } catch(e){
      logMsg("ERROR", "list refresh failed: " + e.message);
      flash("Could not refresh the list");
      return null;
    }
  }
  function toggleListFav(rec){
    const next = (lists || []).map(l => l.id === rec.id ? Object.assign({}, l, { fav: !l.fav }) : l);
    saveLists(next);
  }
  function deleteSavedList(rec){
    const next = (lists || []).filter(l => l.id !== rec.id);
    saveLists(next);
  }
  // Called by the Share the Love card. Counts taps (a confirmed send cannot be
  // detected from the share sheet); increments meta.app_shares.
  async function shareApp(){
    const shareUrl = "https://menucaptain.com/welcome.html";
    const txt = "I'm using MenuCaptain to remember every great meal. Thought you'd like it.";
    try {
      if (navigator.share){ await navigator.share({ title:"MenuCaptain", text:txt, url:shareUrl }); }
      else { await navigator.clipboard.writeText(shareUrl); flash("Link copied - share it with someone"); }
    } catch(e){ /* user cancelled the share sheet - still counts as intent */ }
    const nextMeta = Object.assign({}, meta, { app_shares: ((meta || {}).app_shares || 0) + 1 });
    saveMeta(nextMeta);
    logMsg("SHARE","app_shares -> " + nextMeta.app_shares);
  }

  /* ---- cache writer ---------------------------------------- */
  function persist(next){
    // next may contain any of restaurants/menus/visits/locations/shas/dirty
    const payload = {
      restaurants: next.restaurants !== undefined ? next.restaurants : restaurants,
      menus:       next.menus       !== undefined ? next.menus       : menus,
      visits:      next.visits      !== undefined ? next.visits      : visits,
      locations:   next.locations   !== undefined ? next.locations   : locations,
      shas:        next.shas        !== undefined ? next.shas        : shas,
      dirty:       next.dirty       !== undefined ? next.dirty       : dirty,
      lastSync:    Date.now(),
    };
    saveCache(payload);
  }

  /* ---- sync from GitHub ------------------------------------ */
  async function syncFromGitHub(cfg, cache){
    cfg = cfg || config;
    if (!configComplete(cfg)) return;
    setSync({ status:"busy", msg:"Syncing your data..." });
    logMsg("SYNC","Starting sync");

    const localDirty = (cache && cache.dirty) || dirty;
    let nextR = (cache && cache.restaurants) || restaurants;
    let nextM = (cache && cache.menus)       || menus;
    let nextV = (cache && cache.visits)      || visits;
    let nextL = (cache && cache.locations)   || locations;
    let nextShas = Object.assign({}, (cache && cache.shas) || shas);
    let missing = { restaurants:false, menus:false, visits:false, locations:false };

    try {
      for (const key of ["restaurants","menus","visits","locations"]){
        if (localDirty[key]){
          // local has unpushed edits - keep local, do not overwrite from remote
          logMsg("SYNC",key + " has pending local edits - keeping local copy");
          continue;
        }
        const got = await ghGetFile(cfg, FILES[key]);
        if (!got.found){ missing[key] = true; continue; }
        if (key === "restaurants") nextR = got.data;
        if (key === "menus")       nextM = got.data;
        if (key === "visits")      nextV = got.data;
        if (key === "locations")   nextL = got.data;
        nextShas[FILES[key]] = got.sha;
      }

      // brand-new repo: core files missing -> seed Carlita's + Portland
      // (locations may or may not exist - treat the three core files as the signal)
      if (missing.restaurants && missing.menus && missing.visits){
        logMsg("SYNC","Empty repo detected - seeding Carlita's starter data");
        const seed = carlitasSeed();
        nextR = [seed.restaurant];
        nextM = { [seed.menu.restaurant_id]: [seed.menu] };  // v1.3: array of menus
        nextV = [];
        nextL = seed.locations;
        nextShas[FILES.restaurants] = await ghPutFile(cfg, FILES.restaurants, nextR, null);
        nextShas[FILES.menus]       = await ghPutFile(cfg, FILES.menus, nextM, null);
        nextShas[FILES.visits]      = await ghPutFile(cfg, FILES.visits, nextV, null);
        nextShas[FILES.locations]   = await ghPutFile(cfg, FILES.locations, nextL, null);
        missing.locations = false;
        flash("Set up your repo with Carlita's to start");
      } else {
        // create any individually-missing files as empty / sensible defaults
        if (missing.restaurants){ nextR = []; nextShas[FILES.restaurants] = await ghPutFile(cfg, FILES.restaurants, [], null); }
        if (missing.menus){       nextM = {}; nextShas[FILES.menus]       = await ghPutFile(cfg, FILES.menus, {}, null); }
        if (missing.visits){      nextV = []; nextShas[FILES.visits]      = await ghPutFile(cfg, FILES.visits, [], null); }
        if (missing.locations){
          // existing data repo from an older app version - back-fill locations.
          // collect any location values already present on restaurants
          let derived = Array.from(new Set(
            (nextR || []).map(r => (r.location || "").trim()).filter(Boolean)
          ));
          // one-time migration: if the original Carlita's seed exists with no
          // location, restore its Portland tag and push restaurants too
          const seedIdx = (nextR || []).findIndex(r =>
            r.id === "rest_carlitas" && !(r.location && r.location.trim()));
          if (seedIdx >= 0){
            const migratedR = nextR.map((r, i) =>
              i === seedIdx ? Object.assign({}, r, { location:"Portland" }) : r);
            try {
              nextShas[FILES.restaurants] = await ghPutFile(
                cfg, FILES.restaurants, migratedR, nextShas[FILES.restaurants]);
            } catch(err){
              if (err.conflict){
                const fresh = await ghGetFile(cfg, FILES.restaurants);
                nextShas[FILES.restaurants] = await ghPutFile(
                  cfg, FILES.restaurants, migratedR, fresh.sha);
              } else throw err;
            }
            nextR = migratedR;
            if (!derived.includes("Portland")) derived.push("Portland");
            logMsg("SYNC","Migrated Carlita's to location=Portland");
          }
          derived.sort((a,b)=> a.localeCompare(b));
          nextL = derived;
          nextShas[FILES.locations] = await ghPutFile(cfg, FILES.locations, nextL, null);
          logMsg("SYNC","Back-filled locations file with " + nextL.length + " value(s)");
        }
      }

      // v1.3 shape migration: convert legacy single-menu objects to arrays.
      // Runs every sync but only writes back if something actually changed.
      {
        const mig = migrateMenusShape(nextM);
        if (mig.changed){
          nextM = mig.menus;
          try {
            nextShas[FILES.menus] = await ghPutFile(
              cfg, FILES.menus, nextM, nextShas[FILES.menus]);
          } catch(err){
            if (err.conflict){
              const fresh = await ghGetFile(cfg, FILES.menus);
              nextShas[FILES.menus] = await ghPutFile(
                cfg, FILES.menus, nextM, fresh.sha);
            } else throw err;
          }
          logMsg("SYNC","Migrated menus to v1.3 multi-menu shape");
        }
      }

      // push any files that had pending local edits
      for (const key of ["restaurants","menus","visits","locations"]){
        if (localDirty[key]){
          const obj = key==="restaurants" ? nextR : key==="menus" ? nextM
                    : key==="visits"      ? nextV : nextL;
          try {
            nextShas[FILES[key]] = await ghPutFile(cfg, FILES[key], obj, nextShas[FILES[key]]);
          } catch(err){
            if (err.conflict){
              const fresh = await ghGetFile(cfg, FILES[key]);
              nextShas[FILES[key]] = await ghPutFile(cfg, FILES[key], obj, fresh.sha);
            } else throw err;
          }
        }
      }

      setRestaurants(nextR); setMenus(nextM); setVisits(nextV); setLocations(nextL);
      setShas(nextShas);
      const cleared = {};
      setDirty(cleared);
      persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, shas:nextShas, dirty:cleared });
      setSync({ status:"ok", msg:"" });
      logMsg("SYNC","Sync complete");
    } catch(err){
      logMsg("ERROR","Sync failed: " + err.message);
      setSync({ status:"err", msg:err.message });
    }
  }

  /* ---- commit a change and push to GitHub ------------------ */
  /* ---- photo uploads ---------------------------------------
     Uploads a batch of photo blobs to their paths in the data repo,
     then folds the new SHAs into the shas state map and persists
     them to localStorage. Photo files live alongside the JSON files
     in the same private repo, so they share the same auth path. */
  async function uploadPhotoBatch(uploads){
    // uploads: array of { path, blob }
    // returns: same array shape (rejects on first failure)
    if (!uploads || !uploads.length) return [];
    if (!configComplete(config)) throw new Error("Not configured");
    const nextShas = Object.assign({}, shas);
    for (const u of uploads){
      const newSha = await ghPutBinaryFile(config, u.path, u.blob, nextShas[u.path]);
      nextShas[u.path] = newSha;
      // bust any stale cache entry and seed the new bytes so the UI
      // can render the upload immediately without a round-trip
      invalidatePhoto(u.path);
      seedPhoto(u.path, u.blob);
    }
    setShas(nextShas);
    persist({ shas:nextShas });
    return uploads;
  }

  // Quick "Add photo" straight from a visit card / detail - no full editor.
  // Resizes, uploads, appends the new paths to the visit's photos, commits.
  async function addPhotosToVisit(visit, fileList){
    if (!visit) return;
    const files = Array.from(fileList || [])
      .filter(f => f && f.type && f.type.indexOf("image/") === 0);
    if (!files.length) return;
    const cur = Array.isArray(visit.photos) ? visit.photos.filter(Boolean) : [];
    const room = Math.max(0, MAX_VISIT_PHOTOS - cur.length);
    if (!room){ flash("That visit already has " + MAX_VISIT_PHOTOS + " photos"); return; }
    const take = files.slice(0, room);
    flash(take.length > 1 ? ("Adding " + take.length + " photos…") : "Adding photo…");
    try {
      const uploads = [];
      for (const f of take){
        const blob = await resizeImageToBlob(f, 1200, 0.86);
        const photoId = "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
        uploads.push({ path: visitPhotoPath(visit.id, photoId), blob: blob });
      }
      await uploadPhotoBatch(uploads);
      const nextPhotos = cur.concat(uploads.map(u => u.path));
      const next = visits.map(v => v.id === visit.id
        ? Object.assign({}, v, { photos: nextPhotos }) : v);
      commit({ visits: next }, ["visits"]);
      flash(take.length > 1 ? (take.length + " photos added") : "Photo added");
    } catch(err){
      logMsg("ERROR","Add photos to visit failed: " + err.message);
      flash("Photo upload failed - " + err.message);
    }
  }

  // Save edits to an EXISTING restaurant (reused by the edit-place flow nested in
  // the visit editor). Mirrors the editRestaurant overlay's save. Returns false
  // if a photo upload fails so the caller can keep the form open.
  async function saveRestaurantEdit(rec, extras){
    const newLocationsToAdd = (extras && extras.newLocationsToAdd) || [];
    const photoBlob = extras && extras.photoBlob;
    const photoPath = extras && extras.photoPath;
    if (photoBlob && photoPath){
      try { await uploadPhotoBatch([{ path: photoPath, blob: photoBlob }]); }
      catch(err){ flash("Photo upload failed - " + err.message); return false; }
    }
    let nextLocations = locations, recOut = rec;
    if (newLocationsToAdd.length){
      const lcMap = new Map();
      locations.forEach(l => lcMap.set(l.toLowerCase(), l));
      const trueNew = [];
      newLocationsToAdd.forEach(loc => {
        const trimmed = (loc || "").trim(); if (!trimmed) return;
        const existingCasing = lcMap.get(trimmed.toLowerCase());
        if (existingCasing){ if (recOut.location === trimmed) recOut = Object.assign({}, recOut, { location: existingCasing }); }
        else { trueNew.push(trimmed); lcMap.set(trimmed.toLowerCase(), trimmed); }
      });
      if (trueNew.length) nextLocations = locations.concat(trueNew).sort((a,b)=> a.localeCompare(b));
    }
    const next = restaurants.map(r => r.id === recOut.id ? recOut : r);
    const updates = { restaurants: next }; const files = ["restaurants"];
    if (nextLocations !== locations){ updates.locations = nextLocations; files.push("locations"); }
    commit(updates, files);
    flash("Restaurant updated");
    return true;
  }

  async function commit(updates, filesToPush){
    // updates: {restaurants?, menus?, visits?, locations?}; filesToPush: [logical names]
    const nextR = updates.restaurants !== undefined ? updates.restaurants : restaurants;
    const nextM = updates.menus       !== undefined ? updates.menus       : menus;
    const nextV = updates.visits      !== undefined ? updates.visits      : visits;
    const nextL = updates.locations   !== undefined ? updates.locations   : locations;
    if (updates.restaurants !== undefined) setRestaurants(nextR);
    if (updates.menus       !== undefined) setMenus(nextM);
    if (updates.visits      !== undefined) setVisits(nextV);
    if (updates.locations   !== undefined) setLocations(nextL);

    // mark dirty and cache immediately (optimistic, survives offline)
    const nextDirty = Object.assign({}, dirty);
    filesToPush.forEach(k => { nextDirty[k] = true; });
    setDirty(nextDirty);
    persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, dirty:nextDirty });

    if (!configComplete(config)){ setSync({status:"err",msg:"Not configured"}); return; }
    setSync({ status:"busy", msg:"Saving..." });
    const nextShas = Object.assign({}, shas);
    const stillDirty = Object.assign({}, nextDirty);
    try {
      for (const key of filesToPush){
        const obj = key==="restaurants" ? nextR : key==="menus" ? nextM
                  : key==="visits"      ? nextV : nextL;
        try {
          nextShas[FILES[key]] = await ghPutFile(config, FILES[key], obj, nextShas[FILES[key]]);
        } catch(err){
          if (err.conflict){
            logMsg("SYNC","Resolving conflict on " + key + " by refetching sha");
            const fresh = await ghGetFile(config, FILES[key]);
            nextShas[FILES[key]] = await ghPutFile(config, FILES[key], obj, fresh.sha);
          } else throw err;
        }
        delete stillDirty[key];
      }
      setShas(nextShas);
      setDirty(stillDirty);
      persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, shas:nextShas, dirty:stillDirty });
      setSync({ status:"ok", msg:"" });
      logMsg("SAVE","Committed: " + filesToPush.join(", "));
    } catch(err){
      logMsg("ERROR","Commit failed (kept locally): " + err.message);
      setSync({ status:"err", msg:"Not synced - " + err.message });
    }
  }

            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== menuId) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) =>
                    iidx !== ii ? it : Object.assign({}, it, { nutrition:nutrition })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            commit({ menus: Object.assign({}, menus, { [rid]:nextList }) }, ["menus"]);
          }}
          onSetMenuOrder={(orderedIds)=>{
            // Persist a full drag-reordered order for the non-"Main" menus.
            // "Main" menus stay pinned at the front of the saved array.
            const rid = overlay.id;
            const list = (menus[rid] || []).slice();
            const isMain = m => ((m.label||"").trim().toLowerCase() === "main");
            const pinned = list.filter(isMain);
            const byId = {}; list.forEach(m => { byId[m.menu_id] = m; });
            const others = orderedIds.map(id => byId[id]).filter(m => m && !isMain(m));
            const seen = new Set(orderedIds);   // safety: keep any non-Main not in the list
            list.forEach(m => { if (!isMain(m) && !seen.has(m.menu_id)) others.push(m); });
            commit({ menus: Object.assign({}, menus, { [rid]: pinned.concat(others) }) }, ["menus"]);
          }}
          onDeleteMenuById={(menuId)=>{
            const rid = overlay.id;
            const prevList = menus[rid] || [];
            const restMenus = prevList.filter(m => m.menu_id !== menuId);
            commit({ menus: Object.assign({}, menus, { [rid]: restMenus }) }, ["menus"]);
            flashUndo("Menu removed", ()=>{
              commit({ menus: Object.assign({}, menus, { [rid]: prevList }) }, ["menus"]);
              flash("Menu restored");
            });
          }}
          onAddPhotos={addPhotosToVisit}
          onUpgrade={()=>{ setOverlay(null); setTab("settings"); }}
          onHome={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "menuDetail" && (
        <MenuDetail
          restaurant={restaurantById(overlay.restaurantId)}
          menu={(menus[overlay.restaurantId] || []).find(m => m.menu_id === overlay.menuId)}
          visits={visitsFor(overlay.restaurantId)}
          cfg={config}
          onClose={()=> setOverlay({ type:"restaurant", id:overlay.restaurantId })}
          onReScan={()=> setOverlay({
            type:"scanMenu",
            restaurantId:overlay.restaurantId,
            menuId:overlay.menuId,
          })}
          onDeleteMenu={()=>{
            const restMenus = (menus[overlay.restaurantId] || [])
              .filter(m => m.menu_id !== overlay.menuId);
            const nextM = Object.assign({}, menus,
              { [overlay.restaurantId]:restMenus });
            commit({ menus:nextM }, ["menus"]);
            setOverlay({ type:"restaurant", id:overlay.restaurantId });
            flash("Menu removed");
          }}
          onRenameMenu={(newLabel)=>{
            const lbl = (newLabel || "").trim().slice(0,40);
            if (!lbl) return;
            const restMenus = (menus[overlay.restaurantId] || []).map(m =>
              m.menu_id === overlay.menuId ? Object.assign({}, m, { label:lbl, last_updated:todayISO() }) : m);
            commit({ menus: Object.assign({}, menus, { [overlay.restaurantId]:restMenus }) }, ["menus"]);
            flash("Menu renamed");
          }}
          onSaveItemNutrition={(si, ii, nutrition)=>{
            // cache the per-item estimate onto the menu item in the repo so it
            // computes only once. Identify the item by section + item index.
            const rid = overlay.restaurantId, mid = overlay.menuId;
            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== mid) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) =>
                    iidx !== ii ? it : Object.assign({}, it, { nutrition:nutrition })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            const nextM = Object.assign({}, menus, { [rid]:nextList });
            commit({ menus:nextM }, ["menus"]);
          }}
          onSaveItemTags={(si, ii, tags)=>{
            // Manual dietary tags on a menu item, by section + item index.
            const rid = overlay.restaurantId, mid = overlay.menuId;
            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== mid) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) =>
                    iidx !== ii ? it : Object.assign({}, it, { tags:tags })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            commit({ menus: Object.assign({}, menus, { [rid]:nextList }) }, ["menus"]);
          }}
          onHome={()=> setOverlay(null)} />
      )}

      {overlay && (overlay.type === "addRestaurant" || overlay.type === "editRestaurant") && (
        <RestaurantForm
          existing={overlay.type==="editRestaurant" ? restaurantById(overlay.id) : null}
          prefill={overlay.type==="addRestaurant" ? (overlay.prefill || null) : null}
          enrich={overlay.type==="editRestaurant" ? (overlay.enrich || null) : null}
          locations={locations}
          cfg={config}
          onClose={()=> setOverlay(null)}
          onSave={async (rec, extras)=>{
            const newLocationsToAdd = (extras && extras.newLocationsToAdd) || [];
            const photoBlob = extras && extras.photoBlob;
            const photoPath = extras && extras.photoPath;

            // Step 1: upload the photo first (if any) so we don't write a
            // photo path into the JSON that doesn't actually exist in repo.
            if (photoBlob && photoPath){
              try {
                await uploadPhotoBatch([{ path: photoPath, blob: photoBlob }]);
                logMsg("SAVE","Uploaded restaurant photo to " + photoPath);
              } catch(err){
                logMsg("ERROR","Restaurant photo upload failed: " + err.message);
                flash("Photo upload failed - " + err.message);
                return;  // abort save; user can retry
              }
            }

            // resolve new location additions case-insensitively against the
            // master locations list. If the user typed "boston" but we already
            // have "Boston" saved, use the existing casing on the restaurant
            // and skip adding a duplicate.
            let nextLocations = locations;
            let recOut = rec;
            const additions = newLocationsToAdd;
            if (additions.length){
              const lcMap = new Map();
              locations.forEach(l => lcMap.set(l.toLowerCase(), l));
              const trueNew = [];
              additions.forEach(loc => {
                const trimmed = (loc || "").trim();
                if (!trimmed) return;
                const existingCasing = lcMap.get(trimmed.toLowerCase());
                if (existingCasing){
                  // match found - reuse existing casing on the restaurant record
                  if (recOut.location === trimmed){
                    recOut = Object.assign({}, recOut, { location: existingCasing });
                  }
                } else {
                  trueNew.push(trimmed);
                  lcMap.set(trimmed.toLowerCase(), trimmed);
                }
              });
              if (trueNew.length){
                nextLocations = locations.concat(trueNew)
                  .sort((a,b)=> a.localeCompare(b));
                logMsg("SAVE","Added " + trueNew.length +
                              " new location(s) from restaurant form: " +
                              trueNew.join(", "));
              }
            }

            let next;
            if (overlay.type === "editRestaurant"){
              next = restaurants.map(r => r.id===recOut.id ? recOut : r);
              flash("Restaurant updated");
            } else {
              next = [recOut].concat(restaurants);
              flash("Restaurant added");
            }

            // commit restaurants always; commit locations only if changed
            const updates = { restaurants:next };
            const files   = ["restaurants"];
            if (nextLocations !== locations){
              updates.locations = nextLocations;
              files.push("locations");
            }
            commit(updates, files);
            // Pull-on-add: a fresh, Google-linked place may already have menus in
            // the community library - offer to pull them right after adding.
            if (overlay.type !== "editRestaurant" && recOut.google_place_id){
              (async ()=>{
                try {
                  const list = await communityListMenus(config, recOut.google_place_id);
                  if (list && list.length){
                    flashAction(
                      list.length + " community menu" + (list.length>1?"s":"") + " for " + (recOut.name || "this place"),
                      "Pull them in",
                      async ()=>{
                        const n = await pullAllCommunityMenus(recOut.id, recOut.google_place_id);
                        flash(n ? ("Pulled " + n + " menu" + (n>1?"s":"") + " in") : "Couldn't pull right now.");
                      });
                  }
                } catch(e){ /* silent if the library is unreachable */ }
              })();
            }
            // Editing returns to the restaurant; a fresh add normally returns to
            // wherever the user was. A discovery add (carries google_place_id) is
            // worth landing on so the user sees the place they just saved.
            setOverlay(
              (overlay.type==="editRestaurant" || recOut.google_place_id)
                ? { type:"restaurant", id:recOut.id } : null);
          }} />
      )}

      {overlay && (overlay.type === "logVisit" || overlay.type === "editVisit") && (
        <VisitForm
          restaurants={restaurants}
          menus={menus}
          visits={visits}
          locations={locations}
          onSaveRestaurant={saveRestaurantEdit}
          onCreateRestaurant={(rec)=>{
            const next = [rec].concat(restaurants);
            commit({ restaurants: next }, ["restaurants"]);
            flash("Added " + (rec.name || "place"));
          }}
          presetRestaurantId={overlay.restaurantId}
          existing={overlay.type==="editVisit" ? overlay.visit : null}
          seedFromSplit={overlay.seedFromSplit || null}
          cfg={config}
          onClose={()=> setOverlay(overlay.returnTo || null)}
          onSave={async (rec, extras)=>{
            const pendingUploads = (extras && extras.pendingUploads) || [];

            // Step 1: upload any new photo blobs first so the JSON we commit
            // doesn't reference paths that don't exist in the repo yet.
            if (pendingUploads.length){
              try {
                await uploadPhotoBatch(pendingUploads);
                logMsg("SAVE","Uploaded " + pendingUploads.length + " visit photo(s)");
              } catch(err){
                logMsg("ERROR","Visit photo upload failed: " + err.message);
                flash("Photo upload failed - " + err.message);
                return;  // abort save; user can retry
              }
            }

            let next;
            if (overlay.type === "editVisit"){
              next = visits.map(v => v.id===rec.id ? rec : v);
              flash("Visit updated");
            } else {
              next = [rec].concat(visits);
              flash("Visit logged");
            }
            // Rating now lives on the PLACE (latest-wins): stamp my_rating from
            // this save. Also graduate the place off "Want to try" - it has a
            // visit now, so it's a place you've been.
            const rid = rec && rec.restaurant_id;
            const target = restaurants.find(r => r.id === rid);
            const needRating = rec && typeof rec.rating === "number";
            const needGraduate = !!(target && target.wishlist);
            if (rid && (needRating || needGraduate)){
              const nr = restaurants.map(r => {
                if (r.id !== rid) return r;
                const patch = {};
                if (needRating) patch.my_rating = rec.rating;
                if (needGraduate) patch.wishlist = false;
                return Object.assign({}, r, patch);
              });
              commit({ visits:next, restaurants:nr }, ["visits","restaurants"]);
            } else {
              commit({ visits:next }, ["visits"]);
            }
            // Flow actually-paid prices back onto matching menu items (additive;
            // fills gaps the menu scan missed, records what was paid).
            const menusWithPaid = backfillPaidPrices(rec.restaurant_id, rec.dishes, menus, todayISO());
            if (menusWithPaid) commit({ menus:menusWithPaid }, ["menus"]);
            setOverlay(overlay.returnTo || null);
          }}
          onDelete={overlay.type==="editVisit" ? ()=>{
            const next = visits.filter(v => v.id !== overlay.visit.id);
            commit({ visits:next }, ["visits"]);
            setOverlay(overlay.returnTo || null); flash("Visit removed");
          } : null}
          onPropagateDishNutrition={async (match, est, photoPath, blob)=>{
            // upload the dish thumbnail, then write numbers + thumbnail onto the
            // matched menu item so it shows on the menu page on the return trip.
            let finalPhoto = photoPath;
            if (blob && photoPath){
              try { await uploadPhotoBatch([{ path:photoPath, blob:blob }]); }
              catch(err){
                logMsg("ERROR","Menu thumbnail upload failed: " + err.message);
                finalPhoto = null;   // still save the numbers
              }
            }
            const rid = match.restId, mid = match.menuId;
            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== mid) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== match.si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) => iidx !== match.ii ? it
                    : Object.assign({}, it, { nutrition:est, photo:finalPhoto || it.photo || null })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            commit({ menus: Object.assign({}, menus, { [rid]:nextList }) }, ["menus"]);
          }} />
      )}

      {overlay && overlay.type === "splitCheck" && (
        <SplitCheckFlow
          config={config}
          flash={flash}
          restaurants={restaurants}
          visits={visits}
          initialLines={overlay.fromVisit
            ? (overlay.fromVisit.dishes || []).filter(d => parsePrice(d.price))
                .map(d => ({ name: d.name, price: parsePrice(d.price), qty: d.qty || 1 }))
            : null}
          initialTotal={overlay.fromVisit && overlay.fromVisit.receipt ? overlay.fromVisit.receipt.total : null}
          presetRestId={overlay.fromVisit ? overlay.fromVisit.restaurant_id : ""}
          presetVisitId={overlay.fromVisit ? overlay.fromVisit.id : "new"}
          initialDate={overlay.fromVisit ? overlay.fromVisit.date : null}
          initialReceiptPhoto={overlay.fromVisit && overlay.fromVisit.receipt ? overlay.fromVisit.receipt.photo : null}
          initialFinalReceipt={overlay.fromVisit && overlay.fromVisit.receipt ? overlay.fromVisit.receipt.final_photo : null}
          onSaveToVisit={(rec, isNew)=>{
            const next = isNew ? [rec].concat(visits) : visits.map(v=> v.id===rec.id ? rec : v);
            commit({ visits:next }, ["visits"]);
            flash(isNew ? "Saved as a new visit" : "Split saved to your visit");
          }}
          initialSplit={overlay.editSplit || (overlay.fromVisit && overlay.fromVisit.split) || null}
          onSaveSplit={(entity)=>{ upsertSplit(entity); flash(overlay.editSplit ? "Split updated" : "Split saved"); }}
          onLogVisit={(seed)=> setOverlay({ type:"logVisit", seedFromSplit: seed, returnTo: overlay.returnTo || null })}
          onUpgrade={()=>{ setOverlay(null); setTab("settings"); }}
          onHome={()=> setOverlay(null)}
          onClose={()=> setOverlay(overlay.returnTo || null)} />
      )}
      {overlay && overlay.type === "scanMenu" && (
        <ScanMenuFlow
          config={config}
          restaurants={restaurants}
          menus={menus}
          presetRestaurantId={overlay.restaurantId}
          presetMenuId={overlay.menuId}
          onClose={()=> setOverlay(null)}
          onSave={(restId, menusToSave, newRestaurant, isReplace)=>{
            let nextR = restaurants;
            if (newRestaurant) nextR = [newRestaurant].concat(restaurants);
            const existingForRest = menus[restId] || [];
            let newRestMenus;
            if (isReplace){
              // re-scan: menusToSave has exactly one menu, replace by menu_id
              const replacement = menusToSave[0];
              newRestMenus = existingForRest.map(m =>
                m.menu_id === replacement.menu_id ? replacement : m);
            } else {
              // append all - works for single (1 menu) or split (N menus)
              newRestMenus = existingForRest.concat(menusToSave);
            }
            const nextM = Object.assign({}, menus, { [restId]:newRestMenus });
            commit({ restaurants:nextR, menus:nextM },
                   newRestaurant ? ["restaurants","menus"] : ["menus"]);
            // re-scan returns to the menu detail (where the user came from);
            // a fresh scan returns to the restaurant page so they can see the
            // new menu in the list
            setOverlay(isReplace
              ? { type:"menuDetail", restaurantId:restId,
                  menuId:menusToSave[0].menu_id }
              : { type:"restaurant", id:restId });
            const savedPlace = newRestaurant || restaurantById(restId);
            const baseMsg = isReplace ? "Menu replaced"
              : (menusToSave.length > 1 ? menusToSave.length + " menus saved" : "Menu saved");
            // If the place is linked to Google, offer to contribute the scan to the
            // community right here (opt-in, one tap) so seeding is part of the flow.
            if (savedPlace && savedPlace.google_place_id){
              flashAction(baseMsg, "Share to community", async ()=>{
                const n = await shareMenusToCommunity(savedPlace, menusToSave);
                flash(n ? ("Contributed " + n + " menu" + (n>1?"s":"") + ". Thanks!") : "Couldn't share right now.");
              });
            } else {
              flash(baseMsg);
            }
          }} />
      )}

      {overlay && overlay.type === "settings" && (
        <SetupScreen
          asOverlay
          initial={config}
          onClose={()=> setOverlay(null)}
          onSave={(cfg)=>{
            saveConfig(cfg); setConfig(cfg); setOverlay(null);
            flash("Settings saved"); syncFromGitHub(cfg, loadCache());
          }} />
      )}

      {overlay && overlay.type === "help" && (
        <HelpView onClose={()=> setOverlay(null)} onHome={()=> setOverlay(null)} />
      )}
      {overlay && overlay.type === "installHelp" && (
        <div className="overlay">
          <div className="ovhead">
            <button className="x" onClick={()=> setOverlay(null)}><Icon name="back" size={20} /></button>
            <h2>Add to Home Screen</h2><span style={{width:34}} />
          </div>
          <div className="ovbody">
            <InstallHint force={true} />
          </div>
        </div>
      )}

      {overlay && overlay.type === "yearInFood" && (
        <YearInFood visits={visits} restaurants={restaurants}
          onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "passport" && (
        <FoodPassport visits={visits} restaurantById={restaurantById} cfg={config}
          onOpenVisit={(id)=>{ const v = visits.find(x => x.id === id); if (v) setOverlay({ type:"editVisit", visit:v }); }}
          onClose={()=> setOverlay(null)} onHome={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "people" && (
        <PeopleView visits={visits} restaurants={restaurants}
          onOpenVisit={(v)=> setOverlay({ type:"editVisit", visit:v, returnTo:{ type:"people" } })}
          onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "publish" && (
        <PublishBuilder restaurants={restaurants} visits={visits} menus={menus} cfg={config}
          onPublished={handleListPublished}
          onClose={()=> setOverlay(null)} onHome={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "myLists" && (
        <MyListsOverlay
          lists={lists}
          onClose={()=> setOverlay(null)}
          onToggleFav={toggleListFav}
          onDelete={deleteSavedList}
          onRefresh={refreshSavedList}
          onHome={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "map" && (
        <MapView
          restaurants={restaurants}
          cityFilter={placesFilter}
          cfg={config}
          onOpen={(r)=> setOverlay({ type:"restaurant", id:r.id })}
          onClose={()=> setOverlay(null)}
          onSaveCoords={(ups)=>{
            // ups: {id: {lat,lng,geo_addr,geo_ok,geo_failed}} - merge + one commit
            if (!ups || !Object.keys(ups).length) return;
            const next = restaurants.map(r => ups[r.id] ? Object.assign({}, r, ups[r.id]) : r);
            logMsg("MAP","Persisting coords for " + Object.keys(ups).length + " place(s)");
            commit({ restaurants: next }, ["restaurants"]);
          }}
          onHome={()=> setOverlay(null)} />
      )}

      {toast && <div className="toast">{toast}</div>}
      {undo && (
        <div className="toast" style={{display:"flex", alignItems:"center", gap:16}}>
          <span>{undo.msg}</span>
          <button onClick={()=>{ const a = undo.action; if (undoTimer.current) clearTimeout(undoTimer.current); setUndo(null); if (a) a(); }}
            style={{background:"none", border:"none", color:"var(--accent)", fontWeight:700, cursor:"pointer", padding:0, fontSize:"inherit"}}>
            {undo.label || "Undo"}
          </button>
        </div>
      )}
    </div>
  );
}

  const [open, setOpen] = useState(false);
  return (
    <span className="infodot-wrap">
      <button className={"infodot" + (label ? " labeled" : "")}
        onClick={(e)=>{ e.stopPropagation(); setOpen(o=>!o); }}

        <Icon name="info" size={14} color="#80715f" />

        <>
          <span className="infodot-scrim"

function SearchBar({value, onChange, placeholder}){

    <div className="searchbar">
      <Icon name="search" size={16} color="#80715f" />

}

/* Dining companions: who you've eaten with, ranked by how often, derived from
   the people tagged on visits. Tap a person to see your visits together. Pure
   read-only analytics over visit.companions - no new data model. */
function PeopleView({ visits, restaurants, onClose, onOpenVisit }){
  const [sel, setSel] = useState(null);   // selected person key | null
  const byId = {}; (restaurants || []).forEach(r => { byId[r.id] = r; });
  const restName = (v)=> { const r = byId[v.restaurant_id]; return r ? r.name : (v.restaurant_name || "Unknown"); };

  const map = new Map();   // lower name -> { key, name, count, last, username, user_id, visits[] }
  (visits || []).forEach(v => (v.companions || []).forEach(p => {
    const nm = ((p && p.name) || "").trim(); if (!nm) return;
    const k = nm.toLowerCase();
    const cur = map.get(k) || { key:k, name:nm, count:0, last:"", username:undefined, user_id:undefined, visits:[] };
    cur.count += 1;
    if ((v.date || "") > cur.last) cur.last = v.date || "";
    if (p.username && !cur.username) cur.username = p.username;
    if (p.user_id && !cur.user_id) cur.user_id = p.user_id;
    cur.visits.push(v);
    map.set(k, cur);
  }));
  const people = Array.from(map.values()).sort((a,b)=>
    b.count - a.count || (b.last || "").localeCompare(a.last || "") || a.name.localeCompare(b.name));
  const selPerson = sel ? map.get(sel) : null;

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={selPerson ? ()=> setSel(null) : onClose}>
          <Icon name="back" size={20} />
        </button>
        <h2>{selPerson ? selPerson.name : "Dining companions"}</h2>
        <span style={{width:40}} />
      </div>
      <div className="ovbody">
        {!people.length ? (
          <div className="empty" style={{padding:"30px 20px"}}>
            <div className="big">No companions yet</div>
            <div>Tag who you're with when you log a visit, and they'll show up here over time.</div>
          </div>
        ) : selPerson ? (
          <div>
            <div className="small muted" style={{margin:"2px 2px 12px"}}>
              {selPerson.count} visit{selPerson.count === 1 ? "" : "s"} together
              {selPerson.username ? "  ·  @" + selPerson.username : ""}
            </div>
            {selPerson.visits.slice().sort((a,b)=> (b.date || "").localeCompare(a.date || "")).map(v => (
              <div key={v.id} className="card tap" onClick={()=> onOpenVisit && onOpenVisit(v)}>
                <div className="place-name">{restName(v)}</div>

                {v.dishes && v.dishes.length > 0 && (
                  <div className="chips" style={{marginTop:8}}>

                      <span key={i} className={"chip dish" + dishChipClass(d.verdict)}>{d.name}</span>
                    ))}
                  </div>
                )}
                {(v.companions || []).length > 1 ? (
                  <div className="tiny faint" style={{marginTop:8}}>
                    With {v.companions.map(p=> p.name).filter(n => (n||"").toLowerCase() !== selPerson.key).join(", ")}
                  </div>
                ) : null}
              </div>
            ))}
          </div>
        ) : (
          <div>
            <div className="tiny faint" style={{margin:"2px 2px 12px"}}>
              {people.length} {people.length === 1 ? "person" : "people"} you've dined with. Tap to see your visits together.
            </div>
            {people.map(p => (
              <div key={p.key} className="card tap" onClick={()=> setSel(p.key)}
                style={{display:"flex", alignItems:"center", gap:10}}>
                <div style={{flex:1, minWidth:0}}>
                  <div className="place-name">
                    {p.name}{p.username ? <span className="tiny faint" style={{marginLeft:6}}>@{p.username}</span> : null}
                  </div>
                  <div className="meta-line" style={{marginTop:4}}>
                    {p.count} visit{p.count === 1 ? "" : "s"}
                    {p.last ? "  ·  last " + fmtDate(p.last) : ""}
                  </div>
                </div>
                <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
                  <Icon name="back" size={15} color="var(--text-faint)" />
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// Collapsible "Check split" block shown on a visit that has a saved split.
// Renders nothing when there is no split, so it is safe to drop on every card.
// The "Check split summary" dropdown. When expanded it also HOSTS the related
// actions - "See itemized split" and the receipts - so a card with a split stays
// to a single clean line until you open it. cfg/receipt/onSeeItemized are
// optional (cards without a split render those pieces standalone instead).
function VisitSplit({split, cfg, receipt, onSeeItemized, merchant, date}){
  const [open, setOpen] = useState(false);
  if (!split || !Array.isArray(split.people) || !split.people.length) return null;
  const money = n => "$" + (Number(n) || 0).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
  const hasReceipt = receipt && (receipt.photo || receipt.final_photo);
  // Request one person's share on Venmo, straight from the summary. Same hybrid
  // saved-handle flow as the live split.
  function requestVenmoFor(name, amount){
    let handle = getVenmoHandle(name);
    if (!handle){
      const entered = window.prompt("Venmo @username for " + name + "?\n(Leave blank to pick them inside Venmo.)", "");
      if (entered === null) return;
      handle = (entered || "").trim().replace(/^@/, "");
      if (handle) saveVenmoHandle(name, handle);
    }
    const note = "Your share" + (merchant ? " at " + merchant : "") + (date ? ", " + fmtDate(date) : "");
    const url = venmoChargeUrl(handle, amount, note);
    try { window.open(url, "_blank"); } catch(e){ window.location.href = url; }
  }
  return (
    <div className="vsplit">
      <button className="vsplit-head" onClick={(e)=>{ e.stopPropagation(); setOpen(o => !o); }}>
        <span>Check split summary{split.grand ? " - " + money(split.grand) : ""}</span>
        <Icon name={open ? "chevd" : "chev"} size={15} />
      </button>
      {open ? (
        <div className="vsplit-body">
          {split.people.map((p,i)=>(
            <div key={i} className="spl-res">
              <div className="spl-nm">{p.name}</div>
              <div className="row" style={{gap:8, flex:"none", alignItems:"center"}}>
                <div className="spl-amt">{money(p.amount)}</div>
                <button className="btn ghost sm" aria-label={"Request " + p.name + "'s share on Venmo"}
                  style={{padding:"3px 9px", margin:0, minWidth:0, fontSize:"12px", color:"#3D95CE", borderColor:"#3D95CE"}}
                  onClick={(e)=>{ e.stopPropagation(); requestVenmoFor(p.name, p.amount); }}>Venmo</button>
              </div>
            </div>
          ))}
          {(onSeeItemized || hasReceipt) && (
            <div className="row" style={{gap:14, flexWrap:"wrap", alignItems:"center",
                 marginTop:10, paddingTop:10, borderTop:"1px solid var(--line-soft)"}}>
              {onSeeItemized ? (
                <a href="#" className="tiny" style={{color:"var(--accent)", fontWeight:600}}
                   onClick={(e)=>{ e.preventDefault(); e.stopPropagation(); onSeeItemized(); }}>View / edit split</a>
              ) : null}
              {hasReceipt ? <ReceiptReveal cfg={cfg} receipt={receipt} inline={true} /> : null}
            </div>
          )}
        </div>
      ) : null}
    </div>
  );
}

function HistoryView({visits, restaurantById, cfg, syncing, onOpen, onOpenYearInFood, onOpenPassport, onSplitVisit, onOpenRestaurant, onScanMenu, onLogVisit, onAddPlace, onToggleLoved}){
  const [query, setQuery] = useState("");
  const [sortBy, setSortBy] = useState("newest");
  const [lovedOnly, setLovedOnly] = useState(false);   // show only visits with an "Again" dish
  const [lightbox, setLightbox] = useState(null);      // {paths, index} | null
  if (!visits.length){
    // WHY: visits starts empty before the first data load completes. Show a
    // neutral loading state so users don't see "No visits yet" on sign-in.
    if (syncing) return (
      <div className="empty">
        <span className="spin" />
      </div>
    );
    return (
      <div className="empty" style={{paddingTop:34}}>
        <div className="big">Welcome to MenuCaptain</div>
        <div style={{maxWidth:300, margin:"0 auto 18px"}}>
          Your private record of meals worth remembering. Pick a way to start:
        </div>
        <div style={{display:"flex", flexDirection:"column", gap:10, maxWidth:280, margin:"0 auto"}}>
          {onLogVisit && <button className="btn primary" onClick={onLogVisit}>Log a meal</button>}
          {onScanMenu && <button className="btn ghost" onClick={onScanMenu}>Scan a menu</button>}
          {onAddPlace && <button className="btn ghost" onClick={onAddPlace}>Add a place</button>}
        </div>
        <div className="tiny faint" style={{marginTop:16, maxWidth:300, marginLeft:"auto", marginRight:"auto"}}>
          You can also tap <strong>Places</strong> to browse restaurants and menus.
        </div>
      </div>
    );
  }
  // History sort: Newest (default), Oldest, Highest rated, or Restaurant A-Z.
  // Every comparator falls back to newest-first so ties have a stable order.
  const byNewest = (a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    (b.logged_at || 0) - (a.logged_at || 0);
  const ratingOf = (v)=>{
    const r = restaurantById(v.restaurant_id);
    if (r && typeof r.my_rating === "number") return r.my_rating;   // place rating wins
    return (typeof v.rating === "number" ? v.rating : -1);          // legacy fallback
  };
  const histName = (v)=> {
    const rr = restaurantById(v.restaurant_id);
    return (rr ? rr.name : (v.restaurant_name || "")).toLowerCase();
  };
  const cmp =
    sortBy === "oldest"     ? (a,b)=> -byNewest(a,b) :
    sortBy === "rating"     ? (a,b)=> (ratingOf(b) - ratingOf(a)) || byNewest(a,b) :
    sortBy === "restaurant" ? (a,b)=> histName(a).localeCompare(histName(b)) || byNewest(a,b) :
                              byNewest;
  const sorted = visits.slice().sort(cmp);
  const q = query.trim().toLowerCase();
  let filtered = q ? sorted.filter(v => {
    const rr = restaurantById(v.restaurant_id);
    const hay = ((rr ? rr.name : (v.restaurant_name || "")) + " " +
      (v.dishes || []).map(d => d.name || "").join(" ") + " " +
      (v.notes || "")).toLowerCase();
    return hay.includes(q);
  }) : sorted;
  if (lovedOnly) filtered = filtered.filter(v => v.loved || (v.dishes || []).some(d => d && d.verdict === "loved"));
  return (
    <div>
      <SearchBar value={query} onChange={setQuery}
        placeholder="Search visits, dishes, notes" />
      <div className="sortbar">
        <span className="sortbar-lbl">Sort</span>
        <span className={"chip pick" + (sortBy === "newest" ? " on" : "")} onClick={()=> setSortBy("newest")}>Newest</span>
        <span className={"chip pick" + (sortBy === "oldest" ? " on" : "")} onClick={()=> setSortBy("oldest")}>Oldest</span>
        <span className={"chip pick" + (sortBy === "rating" ? " on" : "")} onClick={()=> setSortBy("rating")}>Highest rated</span>
        <span className={"chip pick" + (sortBy === "restaurant" ? " on" : "")} onClick={()=> setSortBy("restaurant")}>A&ndash;Z</span>
      </div>
      <div className="sortbar">
        <span className="sortbar-lbl">Show</span>
        <span className={"chip pick" + (!lovedOnly ? " on" : "")} onClick={()=> setLovedOnly(false)}>All visits</span>
        <span className={"chip pick" + (lovedOnly ? " on" : "")} onClick={()=> setLovedOnly(true)}
          title="Visits you marked loved, or where you loved a dish">{"♥ Visits I loved"}</span>
      </div>
      <div className="hist-legend">
        <InfoDot title="Calorie labels" label="Calorie labels">
          <span className="idl"><strong>~320 cal</strong> &mdash; an estimate (the ~ means estimated).</span>
          <span className="idl"><strong>850 cal, per menu</strong> &mdash; a real number printed on the menu.</span>
          <span className="idl"><strong>EST</strong> &mdash; estimated. <strong>9P / 22C / 22F</strong> &mdash; grams of protein, carbs, and fat.</span>
          <span className="idl">These numbers are here for memory and curiosity &mdash; never a budget.</span>
        </InfoDot>
      </div>
      {!q && onOpenYearInFood && (
        <div className="yif-entry tap" onClick={onOpenYearInFood}>
          <span className="yif-entry-ic"><Icon name="sparkle" size={16} color="var(--accent)" /></span>
          <span className="yif-entry-tx">
            <span className="yif-entry-t">Your Year in Food</span>
            <span className="yif-entry-s">A look back at your places and dishes</span>
          </span>
          <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
            <Icon name="back" size={15} color="var(--text-faint)" />
          </span>
        </div>
      )}
      {!q && onOpenPassport && (
        <div className="yif-entry tap" onClick={onOpenPassport}>
          <span className="yif-entry-ic"><Icon name="image" size={16} color="var(--accent)" /></span>
          <span className="yif-entry-tx">
            <span className="yif-entry-t">Food passport</span>
            <span className="yif-entry-s">A photo timeline of your visits</span>
          </span>
          <span style={{display:"inline-flex",transform:"rotate(180deg)",flex:"none"}}>
            <Icon name="back" size={15} color="var(--text-faint)" />
          </span>
        </div>
      )}
      {filtered.length === 0 ? (
        <div className="empty" style={{padding:"30px 20px"}}>
          <div className="big">No matches</div>
          <div>Nothing logged matches that search.</div>
        </div>
      ) : filtered.map(v => {
        const r = restaurantById(v.restaurant_id);
        const photos = Array.isArray(v.photos) ? v.photos.filter(Boolean) : [];
        return (
          <div key={v.id} className="card tap" onClick={()=> onOpen(v)}>
            {photos.length > 0 && (
              <div className="visit-photos" style={{marginTop:0,marginBottom:11}}>
                {photos.map((p,i)=> (
                  <div key={i} className="visit-photo tap"
                    onClick={(e)=>{ e.stopPropagation(); setLightbox({ paths:photos, index:i }); }}>
                    <PhotoImg cfg={cfg} path={p} />
                  </div>
                ))}
              </div>
            )}
            <div className="between">
              {r && onOpenRestaurant ? (
                <div className="place-name" style={{cursor:"pointer", color:"var(--accent)"}}
                  onClick={(e)=>{ e.stopPropagation(); onOpenRestaurant(r.id); }}>{r.name}</div>
              ) : (
                <div className="place-name">{r ? r.name : (v.restaurant_name || "Unknown")}</div>
              )}
              {onToggleLoved ? (
                <button className={"fav" + (v.loved ? " on" : "")}
                  title={v.loved ? "Loved - tap to remove" : "Mark this visit loved"}
                  style={{flex:"none", background:"none", border:"none", cursor:"pointer", padding:4}}
                  onClick={(e)=>{ e.stopPropagation(); onToggleLoved(v); }}>
                  <Icon name="heart" size={18} color={v.loved ? "#d9604e" : "#80715f"} />
                </button>
              ) : (v.loved ? (
                <span className="fav on" title="Loved" style={{flex:"none"}}>
                  <Icon name="heart" size={18} color="#d9604e" />
                </span>
              ) : null)}
            </div>
            <div className="meta-line" style={{marginTop:4}}>
              {fmtDate(v.date)} &nbsp;&middot;&nbsp; {relDays(v.date)}
            </div>
            {v.dishes && v.dishes.length > 0 && (
              <div className="chips">
                {v.dishes.map((d,i)=> (
                  <span key={i} className={"chip dish" +
                    dishChipClass(d.verdict)}>
                    {d.name}{dishShareLabel(d)}{d.nutrition && d.nutrition.kcal ? " \u00b7 ~" + dishKcalNum(d) : ""}
                  </span>
                ))}
              </div>
            )}
            <DishTotal dishes={v.dishes} />
            <NutriLine n={v.nutrition} />
            {v.notes && <div className="small muted" style={{marginTop:9}}>{v.notes}</div>}
            {(v.companions || []).length ? (
              <div className="small muted" style={{marginTop:8}}>With {v.companions.map(p=> p.name).join(", ")}</div>
            ) : null}
            {v.split ? (
              <VisitSplit split={v.split} cfg={cfg} receipt={v.receipt}
                merchant={v.restaurant_name} date={v.date}
                onSeeItemized={onSplitVisit ? ()=> onSplitVisit(v) : null} />
            ) : (
              <React.Fragment>
                <ReceiptReveal cfg={cfg} receipt={v.receipt} />
                {onSplitVisit && ((v.receipt && v.receipt.total) || (v.dishes||[]).some(d=>parsePrice(d.price))) ? (
                  <button className="btn ghost sm" style={{marginTop:9}} onClick={(e)=>{ e.stopPropagation(); onSplitVisit(v); }}>Split the check</button>
                ) : null}
              </React.Fragment>
            )}
          </div>
        );
      })}
      {lightbox && (
        <PhotoLightbox cfg={cfg} paths={lightbox.paths} index={lightbox.index}
          onClose={()=> setLightbox(null)} />
      )}
    </div>
  );
}
