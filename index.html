        )}
        <div style={{height:24}} />
      </div>
      {splitOpen && (
        <div style={{position:"fixed", inset:0, zIndex:60}}>
          <SplitCheckFlow
            config={cfg}
            flash={(m)=> logMsg("SPLIT", m || "")}
            restaurants={restaurants}
            visits={[]}
            initialLines={(scannedItems && scannedItems.length)
              ? scannedItems.map(it => ({ name: it.useName, price: it.price, qty: it.qty || 1 }))
              : null}
            initialTotal={receiptTotal != null ? receiptTotal : null}
            presetRestId={restId}
            presetVisitId={"new"}
            initialReceiptPhoto={receiptSlot && receiptSlot.kind === "existing" ? receiptSlot.path : null}
            onApplyDraft={(splitObj)=>{ setSplitDraft(splitObj); setSplitOpen(false); }}
            onClose={()=> setSplitOpen(false)} />
        </div>
      )}
    </div>
  );
}

/* ============================================================
   SCAN MENU FLOW
   step 1: pick photos  ->  step 2: digitizing  ->  step 3: review/save

   Three entry modes:
   - presetRestaurantId + presetMenuId : re-scan an existing menu (replace by id)
   - presetRestaurantId only           : add a new menu to that restaurant
   - neither                           : new restaurant OR pick existing, new menu
   ============================================================ */
// Menu-label pills shown on the scan-review screen. "Other..." is rendered
// separately at the end and focuses the text input rather than filling a value.
const LABEL_SUGGESTIONS = [
  "Main",
  // food side - time-progressed, then post-meal, then promotional
  "Food","Breakfast","Brunch","Lunch","Dinner","Late Night","Dessert","Happy Hour",
  // drinks side - catchall, then categories
  "Drinks","Cocktails","Beer","Wine","Whiskey","Spirits",
];

function ScanMenuFlow({config, restaurants, menus, presetRestaurantId, presetMenuId,
                       onClose, onSave}){
  // find the existing menu we're re-scanning (if any), to lock its label
  const presetMenu = (presetRestaurantId && presetMenuId)
    ? (menus[presetRestaurantId] || []).find(m => m.menu_id === presetMenuId)
    : null;

  const [step,setStep]         = useState("pick");      // pick | working | review | error
  const [previews,setPreviews] = useState([]);          // data URLs for thumbnails
  const [dataUrls,setDataUrls] = useState([]);          // resized data URLs for API
  const [errMsg,setErrMsg]     = useState("");
  const [result,setResult]     = useState(null);        // parsed menu
  const [restId,setRestId]     = useState(presetRestaurantId || "");
  const [newName,setNewName]   = useState("");
  const [label,setLabel]       = useState(presetMenu ? (presetMenu.label || "") : "");
  // Top-level save mode for multi-section new scans:
  //   "one"    -> save all sections as subsections of one menu named `label`
  //   "custom" -> per-section: each section has its own destination label;
  //               sections with the same label merge into one menu.
  // Re-scans and single-section scans always use `label` (no mode toggle).
  const [saveMode,setSaveMode]         = useState("one");
  // string[] aligned to result.sections, used only in "custom" mode
  const [sectionExtracts,setSectionExtracts] = useState([]);
  const fileRef     = useRef(null);
  const labelRef    = useRef(null);
  // refs for each section's input in custom mode (for the per-section Other... pill)
  const sectionInputRefs = useRef({});

  // when OCR completes, initialize per-section labels to the OCR-detected names
  // and reset save mode to the simple "one menu" default
  useEffect(()=>{
    if (!result) return;
    // Title-case the OCR-detected section names so they match the pill
    // labels (which are Title Case). Without this, "COCKTAILS" pre-filled
    // from OCR wouldn't merge with a section where the user tapped the
    // "Cocktails" pill, even though they mean the same destination.
    setSectionExtracts((result.sections || []).map(s => toTitleCase(s.name || "")));
    setSaveMode("one");
  },[result]);

  // tracks "processing M of N" status during onFiles so the UI can show
  // visible feedback while photos are being resized after iOS hands them over
  const [processing, setProcessing] = useState(null);  // {done, total} | null

  async function onFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    logMsg("SCAN","Selected " + files.length + " photo(s)");
    setProcessing({done:0, total:files.length});
    try {
      // Resize each file serially. After every file, push its thumbnail into
      // state - users see thumbnails populate one by one instead of all at the
      // end. This is the most visible part of the iOS post-conversion delay.
      for (let i=0; i<files.length; i++){
        const blob = await resizeImageToBlob(files[i], 1200, 0.82);
        const url  = await blobToDataUrl(blob);
        setDataUrls(d => d.concat([url]));
        setPreviews(p => p.concat([url]));
        setProcessing({done:i+1, total:files.length});
      }
      // small delay so the user sees the "done" state briefly before it clears
      setTimeout(()=> setProcessing(null), 350);
      // reset the input so the same file can be picked again if needed
      if (fileRef.current) fileRef.current.value = "";
    } catch(err){
      setProcessing(null);
      logMsg("ERROR","Photo processing failed: " + err.message);
      setErrMsg("Could not process a photo: " + err.message);
      setStep("error");
    }
  }

  async function runOcr(){
    if (!dataUrls.length) return;
    setStep("working");
    try {
      const parsed = await digitizeMenu(config, dataUrls);
      parsed.captured_date = todayISO();
      parsed.last_updated  = todayISO();
      parsed.source        = "photo_ocr";
      setResult(parsed);
      // Pre-fill the destination if the menu showed a restaurant name.
      // If we already have a restaurant whose name matches (case-insensitive,
      // trimmed), default the "Save menu to" picker to THAT existing place so a
      // second menu scan does not silently create a duplicate restaurant. Only
      // an exact normalized match counts - no fuzzy guessing (predictable beats
      // surprising). No match -> pre-fill the new-restaurant name field as before.
      if (!presetRestaurantId && parsed.restaurant_name){
        const norm = s => (s || "").trim().toLowerCase();
        const hit = restaurants.find(r => norm(r.name) === norm(parsed.restaurant_name));
        if (hit){
          setRestId(hit.id);
          logMsg("SCAN","Scanned name matches existing restaurant '" + hit.name +
                        "' (id " + hit.id + ") - defaulting there to avoid a duplicate");
        } else {
          setNewName(parsed.restaurant_name);
          logMsg("SCAN","No existing restaurant matches '" + parsed.restaurant_name +
                        "' - defaulting to a new restaurant");
        }
      }
      const itemCount = parsed.sections.reduce((n,s)=> n + s.items.length, 0);
      logMsg("SCAN","Digitized " + parsed.sections.length + " sections, " +
                    itemCount + " items");
      setStep("review");
    } catch(err){
      logMsg("ERROR","Digitize failed: " + err.message);
      setErrMsg(err.message);
      setStep("error");
    }
  }

  // focus the freeform label input (used by the "Other..." pill)
  function focusOtherLabel(){
    setLabel("");
    setTimeout(()=> { if (labelRef.current) labelRef.current.focus(); }, 0);
  }

  function save(){
    let targetRestId  = restId;
    let newRestaurant = null;
    if (!targetRestId){
      // creating a new restaurant from the scan
      const nm = (newName || result.restaurant_name || "New restaurant").trim();
      targetRestId = uid("rest");
      newRestaurant = {
        id:targetRestId, name:nm, cuisine:"", location:"",
        address:"", phone:"", website:"", notes:"",
        favorite:false, added_date:todayISO(),
      };
      logMsg("SCAN","Creating new restaurant '" + nm + "' for scanned menu");
    }

    const isReplace = !!presetMenu;
    const sections  = result.sections || [];

    // ---- build the menus to save ----
    let menusToSave;
    if (isReplace){
      // re-scan: always single menu, replace existing by menu_id
      menusToSave = [{
        menu_id:       presetMenu.menu_id,
        label:         (label || "").trim() || presetMenu.label,
        restaurant_id: targetRestId,
        captured_date: presetMenu.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      sections,
        raw_text:      result.raw_text || "",
      }];
    } else if (sections.length >= 2 && saveMode === "custom"){
      // customize mode: group sections by destination label.
      // Same-label sections merge into one menu with multiple subsections.
      // Grouping is case-insensitive ("Cocktails" and "COCKTAILS" merge),
      // and the first-seen casing wins for the displayed menu label.
      const groups = new Map();           // lowercased label -> { label, sections[] }
      sections.forEach((s, i) => {
        const dest = (sectionExtracts[i] || "").trim();
        if (!dest) return;                // safety: blocked by canSave
        const key = dest.toLowerCase();
        if (!groups.has(key)){
          groups.set(key, { label: dest, sections: [] });
        }
        groups.get(key).sections.push(s);
      });
      menusToSave = Array.from(groups.values()).map(g => ({
        menu_id:       uid("menu"),
        label:         g.label,
        restaurant_id: targetRestId,
        captured_date: result.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      g.sections,
        raw_text:      "",
      }));
    } else {
      // "one menu" mode (or single-section): one menu containing all sections
      menusToSave = [{
        menu_id:       uid("menu"),
        label:         (label || "").trim() || "Menu",
        restaurant_id: targetRestId,
        captured_date: result.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      sections,
        raw_text:      result.raw_text || "",
      }];
    }

    logMsg("SCAN", (isReplace ? "Replacing menu (re-scan)" :
                   menusToSave.length > 1 ? "Adding " + menusToSave.length + " menus" :
                                            "Adding 1 menu") +
                  " to restaurant " + targetRestId);
    onSave(targetRestId, menusToSave, newRestaurant, isReplace);
  }

  // ---- review-step helpers ----
  const sectionCount = result ? (result.sections || []).length : 0;
  // top-level toggle is only shown for multi-section new scans
  const showModeToggle = !presetMenu && sectionCount >= 2;
  const inCustomMode   = showModeToggle && saveMode === "custom";

  // in custom mode every section needs a non-empty destination
  const allCustomLabeled = !inCustomMode || sectionExtracts.every(v =>
    (v || "").trim().length > 0);

  // build a live preview of the destination menus
  function previewDestinations(){
    if (!result) return [];
    if (presetMenu){
      return [{ label: (label || "").trim() || presetMenu.label || "Menu",
                sectionCount: sectionCount }];
    }
    if (!inCustomMode){
      // one-menu mode (or single-section): preview is just the one menu
      return [{ label: (label || "").trim() || "Menu",
                sectionCount: sectionCount }];
    }
    // case-insensitive grouping (same logic as save()): the lowercased
    // label is the merge key; the first-seen casing wins for display
    const groups = new Map();    // lowercased label -> { label, sectionCount }
    (result.sections || []).forEach((s, i) => {
      const dest = (sectionExtracts[i] || "").trim();
      if (!dest) return;
      const key = dest.toLowerCase();
      if (!groups.has(key)){
        groups.set(key, { label: dest, sectionCount: 0 });
      }
      groups.get(key).sectionCount++;
    });
    return Array.from(groups.values());
  }
  const previewMenus = previewDestinations();

  const canSave = !!result &&

/* ============================================================
   IN-APP HELP  (renders HELP_DOC; source of truth: dining-captain-help.md)
   ============================================================ */
function renderHelpInline(text, kp){
  const nodes=[]; const re=/\*\*([^*]+)\*\*|\*([^*]+)\*/g;
  let last=0, m, k=0;
  while((m=re.exec(text))){
    if(m.index>last) nodes.push(text.slice(last,m.index));
    if(m[1]!=null) nodes.push(<strong key={kp+"b"+(k++)}>{m[1]}</strong>);
    else nodes.push(<em key={kp+"i"+(k++)}>{m[2]}</em>);
    last=re.lastIndex;
  }
  if(last<text.length) nodes.push(text.slice(last));
  return nodes;
}
function renderHelpMarkdown(doc){
  const lines=(doc||"").split("\n");
  const out=[]; let key=0; let para=[]; let bullets=null;
  const flushPara=()=>{ if(para.length){ out.push(<p key={"p"+(key++)} className="help-p">{renderHelpInline(para.join(" "),"p"+key)}</p>); para=[]; } };
  const flushBullets=()=>{ if(bullets){ const b=bullets; out.push(<ul key={"u"+(key++)} className="help-ul">{b.map((t,bi)=><li key={bi}>{renderHelpInline(t,"u"+key+"_"+bi)}</li>)}</ul>); bullets=null; } };
  for(const raw of lines){
    const line=raw.replace(/\s+$/,"");
    if(/^-{3,}$/.test(line.trim())){ flushPara(); flushBullets(); out.push(<hr key={"h"+(key++)} className="help-hr" />); continue; }
    if(/^#\s+/.test(line)){ flushPara(); flushBullets(); out.push(<h1 key={"t"+(key++)} className="help-h1">{line.replace(/^#\s+/,"")}</h1>); continue; }
    if(/^##\s+/.test(line)){ flushPara(); flushBullets(); out.push(<h2 key={"s"+(key++)} className="help-h2">{line.replace(/^##\s+/,"")}</h2>); continue; }
    if(/^###\s+/.test(line)){ flushPara(); flushBullets(); out.push(<h3 key={"x"+(key++)} className="help-h3">{line.replace(/^###\s+/,"")}</h3>); continue; }
    if(/^-\s+/.test(line)){ flushPara(); (bullets=bullets||[]).push(line.replace(/^-\s+/,"")); continue; }
    if(/^\s+\S/.test(raw) && bullets && bullets.length){ bullets[bullets.length-1]+=" "+line.trim(); continue; }
    if(line.trim()===""){ flushPara(); flushBullets(); continue; }
    flushBullets(); para.push(line.trim());
  }
  flushPara(); flushBullets();
  return out;
}

/* No-account viewer for a shared MENU (?menu=...). The recipient browses the
   restaurant's menu, taps dishes to add them to a "your picks" tray, then taps
   "Send my picks" to fire their OWN share sheet with the list pre-filled - they
   text it straight back. Purely client-side: no account, no backend write. A
   prominent "Create your free account" card bridges them into MenuCaptain. */
// ============================================================
// GROUP ORDER (shared menu v2) - live, multi-guest order session
// ============================================================
// Host starts a session from a menu; guests open the ?g=<code> link
// (no account), pick with quantities + notes, and submit. The host
// watches the aggregated order build live. All via the backend.

// ---- API ----
async function groupCreate(cfg, menu, restaurantName){
  // Snapshot ONE menu (sections/items only - never private estimates).
  const snapshot = {
    menu_id: (menu && menu.menu_id) || null,
    label: (menu && menu.label) || "Menu",
    sections: ((menu && menu.sections) || []).map(s => ({
      name: s.name || "",
      items: (s.items || []).map(it => ({
        name: it.name || "",
        price: it.price || "",
        description: it.description || "",
        tags: Array.isArray(it.tags) ? it.tags : [],
      })),
    })),
  };
  const res = await fetch(apiBase(cfg) + "/api/group/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({
      restaurant_name: restaurantName || "",
      title: (menu && menu.label) || "",
      menu_snapshot: snapshot,
    }),
  });
  if (!res.ok) throw new Error("create failed: " + res.status);
  return res.json();                                  // { code, expires_at }
}
async function groupFetch(cfg, code){
  // Host calls pass cfg (sends auth -> server returns the roster); guests pass
  // null (no auth -> roster omitted). Guarded: authHeaders() requires a cfg.
  const headers = {};
  if (cfg) { try { Object.assign(headers, await authHeaders(cfg)); } catch(e){} }
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code), { method:"GET", headers });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error("fetch failed: " + res.status);
  return res.json();
}
async function groupSubmit(cfg, code, name, token, picks){
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code) + "/submit", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ guest_name:name, guest_token:token, picks:picks }),
  });
  if (!res.ok){
    let msg = "Could not send your order.";
    try { const j = await res.json(); if (j && j.detail) msg = j.detail; } catch(e){}
    throw new Error(msg);
  }
  return res.json();
}
async function groupClose(cfg, code){
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code) + "/close", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
  });
  if (!res.ok) throw new Error("close failed: " + res.status);
  return res.json();
}
async function groupMine(cfg){
  // The host's own open orders (account-backed, so the list follows the user
  // across devices). Authed GET. Any failure is treated as "none" by callers,
  // so a not-yet-deployed backend simply hides the card rather than erroring.
  const res = await fetch(apiBase(cfg) + "/api/group/mine", {
    method:"GET",
    headers:{ ...(await authHeaders(cfg)) },
  });
  if (!res.ok) throw new Error("mine failed: " + res.status);
  const j = await res.json();
  return (j && Array.isArray(j.orders)) ? j.orders : [];
}

// "3 ordered" / "no orders yet" for an active-order row.
function groupCountLabel(n){
  n = n || 0;
  return n <= 0 ? "no orders yet" : (n + " ordered");
}
// "expires in 22h" / "expires in 45m" / "ending soon" from an ISO timestamp.
function expiresInLabel(iso){
  if (!iso) return "";
  const ms = new Date(iso).getTime() - Date.now();
  if (isNaN(ms) || ms <= 0) return "ending soon";
  const mins = Math.round(ms / 60000);
  if (mins < 60) return "expires in " + mins + "m";
  return "expires in " + Math.round(mins / 60) + "h";
}
async function groupSetRoster(cfg, code, names){
  // Host-only whole-roster replace. Authed POST; returns the cleaned roster.
  const res = await fetch(apiBase(cfg) + "/api/group/" + encodeURIComponent(code) + "/roster", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({ names: names || [] }),
  });
  if (!res.ok) throw new Error("roster save failed: " + res.status);
  return res.json();
}
// Normalize a name for matching roster <-> submitters (case/space-insensitive).
function groupNorm(s){ return (s || "").trim().toLowerCase(); }
// One-line summary of picks: "2x Toast, 1x Pollo (no onions)".
function picksLine(picks){
  return (picks || []).map(p => (p.qty > 1 ? p.qty + "x " : "") + p.item + (p.note ? " (" + p.note + ")" : "")).join(", ");
}
// Split engine for a group order's check.
//   menuSnapshot: { sections:[{ items:[{name, price}] }] }
//   picks:        [{ guest_name, picks:[{item, qty}] }]
//   receipt:      { items:[{name, qty, price, menu_match}], total } | null
//   mode:         "itemized" | "even"
// Returns { rows:[{name, amount}], shared, total, basis, note }. Per-person rows
// always sum to `total` (shared items + tax/tip are baked into each person's
// number), so the split reconciles to the real check.
function computeSplit(menuSnapshot, picks, receipt, mode){
  const guests = (picks || []).filter(g => g && g.guest_name != null);
  const names  = guests.map(g => g.guest_name || "Guest");
  const N = guests.length;
  if (N === 0) return { rows:[], shared:0, total:0, basis:"none", note:"" };

  // ---- Receipt-based split: authoritative, matches the real check ----
  if (receipt && Array.isArray(receipt.items)){
    // each guest's picked quantity by normalized menu-item name
    const pickedQty = guests.map(g => {
      const m = {};
      (g.picks || []).forEach(p => {
        const k = groupNorm(p.item);
        if (k) m[k] = (m[k] || 0) + (Number(p.qty) || 1);
      });
      return m;
    });
    const itemsAmt = new Array(N).fill(0);   // each guest's matched line dollars
    let shared = 0;                          // unmatched line dollars (split evenly)
    let lineSubtotal = 0;
    (receipt.items || []).forEach(line => {
      const lineTotal = Number(line.price);
      if (!isFinite(lineTotal) || lineTotal <= 0) return;   // unreadable line price
      lineSubtotal += lineTotal;
      const key = groupNorm(line.menu_match || "");
      if (key){
        let sumQty = 0;
        const shares = pickedQty.map(m => { const q = m[key] || 0; sumQty += q; return q; });
        if (sumQty > 0){
          for (let i = 0; i < N; i++){ if (shares[i] > 0) itemsAmt[i] += lineTotal * (shares[i] / sumQty); }
          return;
        }
      }
      shared += lineTotal;                   // no menu_match, or nobody picked it
    });
    const total = (receipt.total != null && isFinite(Number(receipt.total)))
      ? Number(receipt.total) : lineSubtotal;
    const extra = total - lineSubtotal;      // tax + tip + fees (may be 0 or negative)
    const sharedEach = shared / N;
    const pre = itemsAmt.map(a => a + sharedEach);     // pre-tax/tip portion per guest
    const preSum = pre.reduce((s, x) => s + x, 0);
    const rows = names.map((nm, i) => {
      let amt;
      if (mode === "even"){
        amt = total / N;
      } else {
        const extraShare = preSum > 0 ? extra * (pre[i] / preSum) : extra / N;
        amt = pre[i] + extraShare;
      }
      return { name: nm, amount: amt };
    });
    return {
      rows: rows, shared: shared, total: total, basis: "receipt",
      note: (receipt.total != null
        ? "From the receipt, including tax and tip."
        : "From the receipt's line items (total not read, before tax).")
    };
  }

  // ---- Menu-price estimate: used before a receipt is scanned ----
  const priceByName = {};
  ((menuSnapshot && menuSnapshot.sections) || []).forEach(s =>
    (s.items || []).forEach(it => {
      const k = groupNorm(it.name);
      const v = parsePrice(it.price);
      if (k && v != null) priceByName[k] = v;
    }));
  let anyPrice = false;
  const subtotals = guests.map(g => {
    let sum = 0;
    (g.picks || []).forEach(p => {
      const v = priceByName[groupNorm(p.item)];
      if (v != null){ sum += v * (Number(p.qty) || 1); anyPrice = true; }
    });
    return sum;
  });
  const total = subtotals.reduce((s, x) => s + x, 0);
  if (!anyPrice){
    return {
      rows: names.map(nm => ({ name: nm, amount: 0 })),
      shared: 0, total: 0, basis: "noprice",
      note: "This menu doesn't have prices, so amounts aren't available yet. Scan the receipt to split the real check."
    };
  }
  return {
    rows: names.map((nm, i) => ({ name: nm, amount: mode === "even" ? (total / N) : subtotals[i] })),
    shared: 0, total: total, basis: "estimate",
    note: "Estimate from menu prices, before tax. Scan the receipt to match the real check."
  };
}

// A stable per-device guest id, so a guest can edit their own order.
function guestToken(){
  try {
    let t = localStorage.getItem("dininglog_guest_token");
    if (!t){ t = "g_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
             localStorage.setItem("dininglog_guest_token", t); }
    return t;
  } catch(e){ return "g_" + Date.now().toString(36); }
}

// Combine everyone's picks into a single bring-home tally.
function aggregatePicks(picks){
  const byItem = new Map();          // item -> { qty, notes:[{name,note}] }
  (picks || []).forEach(g => {
    (g.picks || []).forEach(p => {
      if (!p || !p.item) return;
      const cur = byItem.get(p.item) || { qty:0, notes:[] };
      cur.qty += (p.qty || 1);
      if (p.note) cur.notes.push({ name:g.guest_name, note:p.note });
      byItem.set(p.item, cur);
    });
  });
  return Array.from(byItem.entries()).map(([item,v]) => ({ item, qty:v.qty, notes:v.notes }));
}

// Split the check on a group order. Reuses the receipt scanner: scanning gives
// the real total + line items matched to the menu, which we assign to whoever
// ordered each item, distributing tax/tip proportionally so the per-person
// amounts add up to the actual check. Before a receipt is scanned it shows a
// menu-price estimate. Host-only (rendered inside the host screen).
function SplitCheck({cfg, menuSnapshot, picks}){
  const [open, setOpen]       = useState(false);
  const [receipt, setReceipt] = useState(null);     // { items, total } | null
  const [mode, setMode]       = useState("itemized");
  const [busy, setBusy]       = useState(false);
  const [err, setErr]         = useState("");
  const fileRef = useRef(null);

  const guests = (picks || []).filter(g => g && g.guest_name != null);
  const menuNames = [];
  ((menuSnapshot && menuSnapshot.sections) || []).forEach(s =>
    (s.items || []).forEach(it => { if (it.name) menuNames.push(it.name); }));

  async function onPick(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true); setErr("");
    try {
      const blob = await resizeImageToBlob(file, 1200, 0.82);
      const dataUrl = await blobToDataUrl(blob);
      const parsed = await parseReceiptPhotos(cfg, [dataUrl], menuNames);
      setReceipt({ items: parsed.items || [], total: parsed.total != null ? parsed.total : null });
      logMsg("SPLIT","receipt parsed items=" + (parsed.items || []).length + " total=" + parsed.total);
    } catch(e2){
      logMsg("SPLIT","receipt scan failed: " + e2.message);
      setErr(e2.message);
    }
    setBusy(false);
  }

  if (!open){
    return (
      <div className="go-split-row" onClick={()=> setOpen(true)}>
        <span className="go-split-title">Split the check</span>
        <Icon name="back" size={15} />
      </div>
    );
  }

  const split = computeSplit(menuSnapshot, picks, receipt, mode);

  return (
    <div className="card go-split">
      <div className="between" style={{marginBottom:10}}>
        <span className="go-split-title">Split the check</span>
        <a href="#" className="tiny" style={{color:"var(--accent)"}}
           onClick={(e)=>{ e.preventDefault(); setOpen(false); }}>Hide</a>
      </div>

      {guests.length === 0 ? (
        <div className="tiny faint">No orders yet to split.</div>
      ) : (
        <>
          <div className="row" style={{gap:8, marginBottom:12}}>
            <button className={"chip" + (mode === "itemized" ? " on" : "")}
              onClick={()=> setMode("itemized")}>By what each ordered</button>
            <button className={"chip" + (mode === "even" ? " on" : "")}
              onClick={()=> setMode("even")}>Even</button>
          </div>

          {split.rows.map((r, i)=>(
            <div key={i} className="go-split-line">
              <span className="go-split-name">{r.name}</span>
              <span className="go-split-amt">{fmtPrice(r.amount)}</span>
            </div>
          ))}
          <div className="go-split-line go-split-total">
            <span className="go-split-name">Total</span>
            <span className="go-split-amt">{fmtPrice(split.total)}</span>
          </div>

          {split.note ? <div className="tiny faint" style={{marginTop:8}}>{split.note}</div> : null}
          {split.shared > 0 ? (
            <div className="tiny faint" style={{marginTop:4}}>
              Includes {fmtPrice(split.shared)} of items we couldn't match to a person, split evenly.
            </div>
          ) : null}
          {err ? <div className="tiny" style={{color:"#d98a6a", marginTop:8}}>{err}</div> : null}

          <input ref={fileRef} type="file" accept="image/*" capture="environment"
            style={{display:"none"}} onChange={onPick} />
          <button className="btn ghost sm" style={{marginTop:12}} disabled={busy}
            onClick={()=> fileRef.current && fileRef.current.click()}>
            {busy ? <span className="spin" /> : (receipt ? "Re-scan the receipt" : "Scan the receipt")}
          </button>
        </>
      )}
    </div>
  );
}

// host's open orders, so it follows the user across devices. Renders only when

function ActiveGroupOrders({cfg}){

      logMsg("GROUP","mine load failed (hiding card): " + e.message);
      setOrders([]);
    }

  useEffect(()=> {
    load();
    // Refresh when the user returns to the app (iOS PWA resume), so counts and
    // the live/closed state stay current without manual action.
    const onVis = ()=> { if (document.visibilityState === "visible") load(); };
    document.addEventListener("visibilitychange", onVis);
    return ()=> document.removeEventListener("visibilitychange", onVis);
  }, []);

  if (!orders.length && !resume) return null;     // nothing live -> show nothing

  return (
    <>

        <div className="card ago-card">

// Host overlay: start (or resume) a session, share the link, and watch the
// order build live (polling). The active code is remembered per menu so the
// host can reopen the same session.
function GroupOrderHost({cfg, menu, restaurantName, onClose, resumeCode}){
  const menuKey = (menu && menu.menu_id) || null;
  const [data, setData]         = useState(null);
  const [code, setCode]         = useState(()=> {
    if (resumeCode) return resumeCode;            // opened from the active-orders list (resume by code)
    try { return menuKey ? (localStorage.getItem("dininglog_group:" + menuKey) || "") : ""; }
    catch(e){ return ""; }
  });
  // Persistence key resolves to the order's OWN menu once fetched (so a
  // resume-from-list close clears the right per-menu key), else the menu we
  // opened from. Null -> skip localStorage; the live view runs off `code`.
  const persistId = (data && data.menu_snapshot && data.menu_snapshot.menu_id) || menuKey || null;
  const lsKey = persistId ? ("dininglog_group:" + persistId) : null;
  const [starting, setStarting] = useState(false);
  const [err, setErr]           = useState("");
  const [copied, setCopied]     = useState(false);
  const link = code ? (location.origin + location.pathname + "?g=" + code) : "";
  const [rosterInput, setRosterInput] = useState("");
  const [rosterBusy, setRosterBusy]   = useState(false);
  // Whole-roster replace on every add/remove: optimistic local update, server
  // truth from the response. A failure logs and leaves the prior roster intact.
  async function saveRoster(names){
    if (!code) return;
    setRosterBusy(true);
    try {
      const r = await groupSetRoster(cfg, code, names);
      const next = (r && Array.isArray(r.roster)) ? r.roster : names;
      setData(d => d ? { ...d, roster: next } : d);
      logMsg("GROUP","roster saved count=" + next.length);
    } catch(e){
      logMsg("GROUP","roster save failed: " + e.message);
    } finally {
      setRosterBusy(false);
    }
  }
  function addRosterName(){
    const nm = rosterInput.trim();
    if (!nm) return;
    const cur = (data && Array.isArray(data.roster)) ? data.roster : [];
    if (cur.some(x => groupNorm(x) === groupNorm(nm))) { setRosterInput(""); return; }
    setRosterInput("");
    saveRoster(cur.concat([nm]));
  }
  function removeRosterName(name){
    const cur = (data && Array.isArray(data.roster)) ? data.roster : [];
    saveRoster(cur.filter(x => groupNorm(x) !== groupNorm(name)));
  }

  useEffect(()=>{
    if (!code) return;
    let alive = true;
    const tick = async ()=>{
      try {
        const d = await groupFetch(cfg, code);
        if (!alive) return;
        if (d === null){                       // session gone -> reset to start
          if (lsKey) try { localStorage.removeItem(lsKey); } catch(e){}
          setData(null); setCode("");
          return;
        }
        setData(d);
      } catch(e){ if (alive) logMsg("GROUP","poll failed: " + e.message); }
    };
    tick();
    const id = setInterval(tick, 5000);
    return ()=> { alive = false; clearInterval(id); };
  }, [code]);

  async function start(){
    setErr(""); setStarting(true);
    try {
      const r = await groupCreate(cfg, menu, restaurantName);
      if (lsKey) try { localStorage.setItem(lsKey, r.code); } catch(e){}
      setCode(r.code);
      logMsg("GROUP","started code=" + r.code);
    } catch(e){
      logMsg("ERROR","group create failed: " + e.message);
      setErr("Could not start the group order. Try again.");
    } finally { setStarting(false); }
  }
  async function shareLink(){
    try {
      if (navigator.share) await navigator.share({ title:"Group order", text:"I'm at " + (restaurantName || "the restaurant") + " - what do you want? Add your order here: " + link });
      else { await navigator.clipboard.writeText(link); setCopied(true); setTimeout(()=> setCopied(false), 1500); }
    } catch(e){}
  }
  async function copyLink(){
    try { await navigator.clipboard.writeText(link); setCopied(true); setTimeout(()=> setCopied(false), 1500); } catch(e){}
  }
  async function closeOrder(){
    if (code){
      try { await groupClose(cfg, code); logMsg("GROUP","closed code=" + code); }
      catch(e){ logMsg("GROUP","close failed: " + e.message); }
      if (lsKey) try { localStorage.removeItem(lsKey); } catch(e){}
    }
    onClose();
  }

  const agg    = data ? aggregatePicks(data.picks) : [];
  const guests = data ? (data.picks || []) : [];
  const closed = data && data.status === "closed";
  const roster    = (data && Array.isArray(data.roster)) ? data.roster : [];
  const hasRoster = roster.length > 0;
  // Reconcile expected names against who actually submitted. Match by normalized
  // name; submitters not on the roster fall into "extras" so nothing is lost.
  const subByName = {};
  guests.forEach(g => { const k = groupNorm(g.guest_name); if (k && !(k in subByName)) subByName[k] = g; });
  const rosterSet = new Set(roster.map(groupNorm));
  const expected  = roster.map(name => ({ name, sub: subByName[groupNorm(name)] || null }));
  const waiting   = expected.filter(r => !r.sub).map(r => r.name);
  const extras    = guests.filter(g => !rosterSet.has(groupNorm(g.guest_name)));

  return (
    <div className="go-overlay">
      <div className="go-bar">
        <button className="btn ghost sm" onClick={onClose}>Done</button>
        <div className="go-bar-title">Group order</div>
        {code ? <button className="btn ghost sm" onClick={closeOrder}>Close order</button>
              : <span style={{width:54}} />}
      </div>
      <div className="go-body">
        {!code ? (
          <div className="card">
            <div style={{fontWeight:600, marginBottom:6}}>Start a group order</div>
            <div className="small muted" style={{lineHeight:1.7, marginBottom:14}}>
              Share a link to {restaurantName || "this menu"}. Everyone you send it to opens it,
              picks what they want - with quantities and notes - and you watch the order come
              together here. No app needed on their end.
            </div>
            <button className="btn primary" onClick={start} disabled={starting}>
              {starting ? <span className="spin" /> : "Start group order"}
            </button>
            {err ? <div className="small" style={{marginTop:10, color:"var(--danger)"}}>{err}</div> : null}
          </div>
        ) : (
          <>
            <div className="card">
              <div className="small muted" style={{marginBottom:8}}>Share this link with the table:</div>
              <div className="go-link">{link}</div>
              <div className="row" style={{gap:8, marginTop:10}}>
                <button className="btn sm" onClick={shareLink}>Share link</button>
                <button className="btn ghost sm" onClick={copyLink}>{copied ? "Copied" : "Copy"}</button>
              </div>
              {closed ? <div className="tiny faint" style={{marginTop:10}}>This order is closed - guests can no longer add to it.</div> : null}
            </div>

            <div className="card go-roster">
              <div className="go-roster-head">Who's in on the order?</div>
              {roster.length ? (
                <div className="go-chips">
                  {roster.map((name,i)=>(
                    <span key={i} className="go-chip">
                      {name}
                      <button className="go-chip-x" onClick={()=> removeRosterName(name)} disabled={rosterBusy}>&times;</button>
                    </span>
                  ))}
                </div>
              ) : null}
              {!closed ? (
                <div className="row" style={{gap:8, marginTop: roster.length ? 10 : 0}}>
                  <input className="input" placeholder="Add who you're expecting (optional)"
                    value={rosterInput}
                    onChange={e=> setRosterInput(e.target.value)}
                    onKeyDown={e=> { if (e.key === "Enter"){ e.preventDefault(); addRosterName(); } }} />
                  <button className="btn ghost sm" onClick={addRosterName} disabled={rosterBusy || !rosterInput.trim()}>Add</button>
                </div>
              ) : null}
              {roster.length ? (
                <div className="tiny faint" style={{marginTop:8}}>
                  Names match what each person types when they order.
                </div>
              ) : null}
            </div>

            <div className="go-sec">Who's ordered ({guests.length})</div>
            {hasRoster ? (
              <div className="card">
                {waiting.length ? (
                  <div className="go-waiting">Still waiting on: {waiting.join(", ")}</div>
                ) : (
                  <div className="tiny faint" style={{padding:"2px 10px 8px"}}>Everyone on your list has ordered.</div>
                )}
                {expected.map((r,i)=>(
                  <div key={"e"+i} className="go-guest">
                    <div className="go-guest-name">
                      {r.name}
                      {r.sub ? <span className="go-in">ordered</span> : <span className="go-wait">waiting</span>}
                    </div>
                    {r.sub ? <div className="tiny muted">{picksLine(r.sub.picks)}</div> : null}
                  </div>
                ))}
                {extras.length ? (
                  <>
                    <div className="tiny faint" style={{padding:"10px 10px 2px"}}>Also ordered</div>
                    {extras.map((g,i)=>(
                      <div key={"x"+i} className="go-guest">
                        <div className="go-guest-name">{g.guest_name || "Guest"}</div>
                        <div className="tiny muted">{picksLine(g.picks)}</div>
                      </div>
                    ))}
                  </>
                ) : null}
              </div>
            ) : guests.length === 0 ? (
              <div className="card small muted" style={{textAlign:"center"}}>
                Nobody's ordered yet. Share the link above and watch them come in.
              </div>
            ) : (
              <div className="card">
                {guests.map((g,i)=>(
                  <div key={i} className="go-guest">
                    <div className="go-guest-name">{g.guest_name || "Guest"}</div>
                    <div className="tiny muted">{picksLine(g.picks)}</div>
                  </div>
                ))}
              </div>
            )}

            <div className="go-sec">Order so far</div>
            {agg.length === 0 ? (
              <div className="card small muted" style={{textAlign:"center"}}>
                No picks yet. As people add theirs, they show up here.
              </div>
            ) : (
              <div className="card">
                {agg.map((a,i)=>(
                  <div key={i} className="go-item">
                    <div className="go-item-head">
                      <span className="go-qty">{a.qty}&times;</span>
                      <span className="go-name">{a.item}</span>
                    </div>
                    {a.notes.length > 0 ? (
                      <div className="go-notes">
                        {a.notes.map((n,j)=> <div key={j} className="tiny faint">{n.note}{n.name ? " (" + n.name + ")" : ""}</div>)}
                      </div>
                    ) : null}
                  </div>
                ))}
              </div>
            )}


            {data ? <SplitCheck cfg={cfg} menuSnapshot={data.menu_snapshot} picks={data.picks} /> : null}

            <div className="tiny faint" style={{textAlign:"center", margin:"14px 0 30px"}}>
              Updates live. Closes on its own after a day, or tap Close order.
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// Guest screen (no account). Opened by a ?g=<code> link: fetch the menu from
// the backend, pick with quantity steppers + notes, submit. Re-submitting
// updates the same order (matched by the device's guest token).
function GroupOrderGuest({code}){
  const home = location.origin + location.pathname;
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [notFound, setNotFound] = useState(false);
  const [picks, setPicks]     = useState({});     // "si:ii" -> { item, qty, note }
  const [name, setName]       = useState(()=> { try { return localStorage.getItem("dininglog_guest_name") || ""; } catch(e){ return ""; } });
  const [sending, setSending] = useState(false);
  const [sent, setSent]       = useState(false);
  const [err, setErr]         = useState("");
  const [showOrder, setShowOrder] = useState(false);
  const token = guestToken();

  useEffect(()=>{
    let alive = true;
    (async ()=>{
      try {
        const d = await groupFetch(null, code);
        if (!alive) return;
        if (!d){ setNotFound(true); setLoading(false); return; }
        setData(d); setLoading(false);
      } catch(e){ if (alive){ setErr("Could not load this group order."); setLoading(false); } }
    })();
    return ()=> { alive = false; };
  }, [code]);

  const menu     = (data && data.menu_snapshot) || null;
  const closed   = data && data.status === "closed";
  const selected = Object.keys(picks).map(k => picks[k]).filter(Boolean);
  const restName = (data && data.restaurant_name) || (menu && menu.label) || "the menu";

  function toggle(si, ii, item){
    const key = si + ":" + ii;
    setPicks(p => {
      const n = Object.assign({}, p);
      if (n[key]) delete n[key]; else n[key] = { item:item, qty:1, note:"" };
      return n;
    });
    setSent(false);
  }
  function bump(key, delta){
    setPicks(p => {
      if (!p[key]) return p;
      const q = Math.max(1, Math.min(99, (p[key].qty || 1) + delta));
      return Object.assign({}, p, { [key]: Object.assign({}, p[key], { qty:q }) });
    });
    setSent(false);
  }
  function setNote(key, val){
    setPicks(p => p[key] ? Object.assign({}, p, { [key]: Object.assign({}, p[key], { note:val }) }) : p);
    setSent(false);
  }
  async function submit(){
    const nm = name.trim();
    if (!nm){ setErr("Please add your name."); return; }
    if (!selected.length){ setErr("Pick at least one item first."); return; }
    setErr(""); setSending(true);
    try {
      const list = selected.map(s => ({ item:s.item, qty:s.qty || 1, note:(s.note || "").trim() }));
      const r = await groupFetch(null, code);   // re-check it is still open before sending
      if (!r || r.status === "closed"){ setErr("This group order is closed."); setSending(false); return; }
      await groupSubmit(null, code, nm, token, list);
      try { localStorage.setItem("dininglog_guest_name", nm); } catch(e){}
      setData(await groupFetch(null, code));     // refresh the running order
      setSent(true);
      logMsg("GROUP","guest submitted " + list.length + " item(s)");
    } catch(e){
      setErr(e.message || "Could not send your order.");
    } finally { setSending(false); }
  }

  if (loading) return <div className="pub-wrap"><div className="muted" style={{textAlign:"center", padding:"60px 0"}}><span className="spin" /> Loading...</div></div>;
  if (notFound) return (
    <div className="pub-wrap">
      <div className="pub-title">This group order was not found</div>
      <div className="muted" style={{textAlign:"center", marginBottom:20}}>The link may be wrong or the order may have ended.</div>
      <div style={{textAlign:"center"}}><a className="btn primary" href={home}>Open MenuCaptain</a></div>
    </div>
  );

  const running = data ? aggregatePicks(data.picks) : [];

  return (
    <div className="pub-wrap">
      <div className="pub-kicker">Group order</div>
      <div className="pub-title">{restName}</div>
      <div className="muted" style={{textAlign:"center", marginBottom:18}}>
        {closed ? "This order is closed." : "Pick what you'd like and send your order back."}
      </div>

      {!closed && (menu && Array.isArray(menu.sections)) ? (
        <>
          {menu.sections.map((s, si)=>(
            <div key={si} className="go-gsec">
              {s.name ? <div className="go-gsec-head">{s.name}</div> : null}
              {(s.items || []).map((it, ii)=>{
                const key = si + ":" + ii;
                const on  = !!picks[key];
                return (
                  <div key={ii} className={"go-gitem" + (on ? " on" : "")}>
                    <div className="go-gitem-row" onClick={()=> toggle(si, ii, it.name)}>
                      <div className="go-check">{on ? "\u2713" : ""}</div>
                      <div style={{flex:1, minWidth:0}}>
                        <div className="go-gitem-name">{it.name}</div>
                        {it.description ? <div className="go-gitem-desc">{it.description}</div> : null}
                        {it.price ? <div className="tiny faint" style={{marginTop:3}}>{it.price}</div> : null}
                        {Array.isArray(it.tags) && it.tags.length ? (
                          <div className="tiny faint" style={{marginTop:3}}>{it.tags.join("  \u00b7  ")}</div>
                        ) : null}
                      </div>
                    </div>
                    {on ? (
                      <div className="go-gitem-ctl">
                        <div className="go-stepper">
                          <button className="go-step" onClick={()=> bump(key, -1)}>&minus;</button>
                          <span className="go-stepn">{picks[key].qty}</span>
                          <button className="go-step" onClick={()=> bump(key, +1)}>+</button>
                        </div>
                        <input className="input go-note" placeholder="Add a note (no onions...)"
                          value={picks[key].note} onChange={e=> setNote(key, e.target.value)} />
                      </div>
                    ) : null}
                  </div>
                );
              })}
            </div>
          ))}

          <div className="go-submit">
            <input className="input" placeholder="Your name" value={name}
              onChange={e=> { setName(e.target.value); setSent(false); }} style={{marginBottom:10}} />
            <button className="btn primary" onClick={submit} disabled={sending || !selected.length || !name.trim()}>
              {sending ? <span className="spin" /> : (sent ? "Update my order" : "Send my order")}
            </button>
            {sent ? <div className="small" style={{marginTop:10, color:"var(--ok)", textAlign:"center"}}>Sent! You can change it and send again.</div> : null}
            {err ? <div className="small" style={{marginTop:10, color:"var(--danger)", textAlign:"center"}}>{err}</div> : null}
          </div>
        </>
      ) : null}

      {data && (data.picks || []).length > 0 ? (
        <div style={{marginTop:22}}>
          <a href="#" className="tiny" style={{color:"var(--accent)"}}
             onClick={(e)=>{ e.preventDefault(); setShowOrder(o=>!o); }}>
            {showOrder ? "Hide everyone's order" : "See everyone's order"}
          </a>
          {showOrder ? (
            <div className="card" style={{marginTop:8}}>
              {running.map((a,i)=>(
                <div key={i} className="go-item">
                  <div className="go-item-head">
                    <span className="go-qty">{a.qty}&times;</span>
                    <span className="go-name">{a.item}</span>
                  </div>
                  {a.notes && a.notes.length > 0 ? (
                    <div className="go-notes">
                      {a.notes.map((n,j)=> <div key={j} className="tiny faint">{n.note}{n.name ? " (" + n.name + ")" : ""}</div>)}
                    </div>
                  ) : null}
                </div>
              ))}
            </div>
          ) : null}
        </div>
      ) : null}

      <div className="tiny faint" style={{textAlign:"center", margin:"22px 0 30px"}}>
        Your name and picks are shared with whoever started this order. Nothing else.
      </div>
    </div>
  );
}

function PublishedMenu({data}){
  const home = location.origin + location.pathname;
  // picks: "si:ii" -> dish name (object so order-of-tap is stable enough)
  const [picks, setPicks] = useState({});
  const [notes, setNotes] = useState({});  // "si:ii" -> special-instructions note
  const [open,  setOpen]  = useState(()=>{
    const o = {}; ((data && data.s) || []).forEach((s,i)=> { o[i] = true; }); return o;
  });
  const [sent, setSent] = useState(false);

  if (!data || !Array.isArray(data.s)){
    return (
      <div className="pub-wrap">
        <div className="pub-title">This link looks broken</div>
        <div className="muted" style={{textAlign:"center",marginBottom:20}}>The menu could not be read.</div>
        <div style={{textAlign:"center"}}><a className="btn primary" href={home}>Open MenuCaptain</a></div>
      </div>
    );
  }

  const pickNames = Object.keys(picks).map(k => picks[k]).filter(Boolean);

  function toggle(si, ii, name){
    const key = si + ":" + ii;
    setPicks(p => {
      const n = Object.assign({}, p);
      if (n[key]) delete n[key]; else n[key] = name;
      return n;
    });
    // Drop any note when a dish is un-picked so it doesn't linger or get sent.
    setNotes(nt => {
      if (!nt[key]) return nt;
      const n = Object.assign({}, nt); delete n[key]; return n;
    });
    setSent(false);
  }

  function setNote(key, val){
    setNotes(n => Object.assign({}, n, { [key]: val }));
    setSent(false);
  }

  async function sendPicks(){
    if (!pickNames.length) return;
    const rest = data.r || "the menu";
    // One pick per line; a dish with a note reads "Dish (no onions)".
    const lines = Object.keys(picks).map(k => {
      const note = (notes[k] || "").trim();
      return "- " + (note ? (picks[k] + " (" + note + ")") : picks[k]);
    });
    const text = "My picks from " + rest + ":\n" + lines.join("\n");
    // Text only, no url: the recipient's share-sheet link would resolve to the
    // root ?menu= app shell (generic preview card), which adds noise. The text
    // already names the restaurant and the dishes, so it stands on its own.
    try {
      if (navigator.share){
        await navigator.share({ title:"My picks", text });
        setSent(true);
      } else {
        await navigator.clipboard.writeText(text);
        setSent(true);
      }
    } catch(e){ /* user cancelled - leave the tray as-is */ }
  }

  return (
    <div className="pub-wrap">
      <div className="pub-kicker">A menu on MenuCaptain</div>
      <div className="pub-title">{data.r || "Menu"}</div>
      {(data.c || data.l) && (
        <div className="pub-sub">{[data.c, data.l].filter(Boolean).join("  \u00b7  ")}</div>
      )}
      <div className="pub-hint">Tap the dishes you'd like, then send your picks back.</div>

      <div className="pub-menu">
        {data.s.map((s,si)=>(
          <div key={si} className="pub-msec">
            {s.n ? (
              <div className="pub-msec-head"
                onClick={()=> setOpen(o=> Object.assign({}, o, { [si]: !o[si] }))}>
                <span className="nm">{s.n}</span>
                <span className="ct">{(s.i || []).length}</span>
              </div>
            ) : null}
            {(open[si] !== false) && (s.i || []).map((it,ii)=>{
              const key = si + ":" + ii;
              const on  = !!picks[key];
              return (
                <React.Fragment key={ii}>
                <div className={"pub-mitem" + (on ? " on" : "")}
                  onClick={()=> toggle(si, ii, it.n)}>
                  <div className="pub-mitem-tick">{on ? "\u2713" : "+"}</div>
                  <div style={{flex:1, minWidth:0}}>
                    <div className="pub-mitem-head">
                      <span className="inm">{it.n}</span>
                      {it.p ? <span className="ipr">{it.p}</span> : null}
                    </div>
                    {it.d ? <div className="idesc">{it.d}</div> : null}
                    {it.t && it.t.length > 0 && (
                      <div className="chips" style={{marginTop:6}}>
                        {it.t.map((t,k)=> <span key={k} className="chip tag">{t}</span>)}
                      </div>
                    )}
                  </div>
                </div>
                {on && (
                  <input className="pub-note" type="text"
                    value={notes[key] || ""}
                    placeholder="Add a note - no onions, dressing on the side..."
                    onClick={(e)=> e.stopPropagation()}
                    onChange={(e)=> setNote(key, e.target.value)} />
                )}
                </React.Fragment>
              );
            })}
          </div>
        ))}
      </div>

      {/* bridge into signup - the same CTA the promo and lists use */}
      <div className="pub-cta">
        <div className="pub-cta-title">Keep your own food memory</div>
        <div className="pub-cta-sub">MenuCaptain remembers the places you go and the dishes you loved. Free to start, private to you.</div>
        <a className="btn primary" href={home} style={{textDecoration:"none"}}>Create your free account</a>
      </div>

      <div className="pub-foot">
        <div className="tiny faint">Made with MenuCaptain</div>
      </div>

      {/* leave room so the fixed tray never covers the footer */}
      {pickNames.length > 0 && <div style={{height:78}} />}

      {pickNames.length > 0 && (
        <div className="pick-tray">
          <div className="pick-tray-info">
            <div className="pick-tray-ct">{pickNames.length} pick{pickNames.length === 1 ? "" : "s"}</div>
            <div className="pick-tray-names">{pickNames.join(", ")}</div>
          </div>
          <button className="btn primary sm" style={{flex:"none"}} onClick={sendPicks}>
            {sent ? "Sent \u2713" : "Send my picks"}
          </button>
        </div>
      )}
    </div>
  );
}

// My Lists: a UI layer over the saved published-list records (data/lists.json).
// No new storage. Favorites pin to the top; within that, the chosen sort applies.
function MyListsOverlay({ lists, onClose, onToggleFav, onDelete, onRefresh }){
  const [sortBy,   setSortBy]   = useState("recent");
  const [busyId,   setBusyId]   = useState(null);   // refresh in flight
  const [doneId,   setDoneId]   = useState(null);   // just-refreshed flash
  const [copiedId, setCopiedId] = useState(null);
  const [confirmId,setConfirmId]= useState(null);   // delete confirm

  const ts = (s)=> (s ? (Date.parse(s) || 0) : 0);
  const cmps = {
    recent: (a,b)=> ts(b.updated_at) - ts(a.updated_at),
    newest: (a,b)=> ts(b.created_at) - ts(a.created_at),
    alpha:  (a,b)=> (a.title || "").toLowerCase().localeCompare((b.title || "").toLowerCase()),
    count:  (a,b)=> ((b.count || 0) - (a.count || 0)) || (ts(b.updated_at) - ts(a.updated_at)),
  };
  const cmp = cmps[sortBy] || cmps.recent;
  const sorted = (lists || []).slice().sort((a,b)=>{
    const fa = a.fav ? 1 : 0, fb = b.fav ? 1 : 0;
    if (fa !== fb) return fb - fa;   // favorites pinned on top
    return cmp(a,b);
  });

  const fmt = (s)=> { try { return new Date(s).toLocaleDateString(); } catch(e){ return ""; } };
  const preview = (rec)=> {
    const ns = (rec.names || []).slice(0, 3).join(", ");
    return ns + ((rec.count || 0) > 3 ? "..." : "");
  };

  async function doShare(rec){
    try {
      if (navigator.share){ await navigator.share({ title: rec.title || "My list", text:"A few places I love:", url: rec.url }); }
      else { await navigator.clipboard.writeText(rec.url); setCopiedId(rec.id); }
    } catch(e){ /* cancelled */ }
  }
  async function doCopy(rec){
    try { await navigator.clipboard.writeText(rec.url); setCopiedId(rec.id); setTimeout(()=> setCopiedId(null), 1500); } catch(e){}
  }
  async function doRefresh(rec){
    setBusyId(rec.id); setDoneId(null);
    const url = await onRefresh(rec);
    setBusyId(null);
    if (url){ setDoneId(rec.id); setTimeout(()=> setDoneId(null), 2200); }
  }

  const SORTS = [["recent","Recent"],["newest","Newest"],["alpha","A-Z"],["count","Most places"]];

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>My Lists</h2>
        <span style={{width:40}} />
      </div>
      <div className="ovbody">
        {(!lists || !lists.length) ? (
          <div style={{textAlign:"center", padding:"48px 16px"}}>
            <div className="muted" style={{marginBottom:6}}>You haven't published any lists yet.</div>
            <div className="tiny faint">Publish one from the Places tab and it will show up here.</div>
          </div>
        ) : (
          <div>
            <div className="sortbar">
              <span className="sortbar-lbl">Sort</span>
              {SORTS.map(([k,lbl])=>(
                <span key={k} className={"chip pick" + (sortBy === k ? " on" : "")}
                  onClick={()=> setSortBy(k)}>{lbl}</span>
              ))}
            </div>
            {sorted.map(rec => (
              <div key={rec.id} className="card" style={{marginBottom:10}}>
                <div className="between" style={{alignItems:"flex-start"}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div className="mylist-title">{rec.title || "Untitled list"}</div>
                    <div className="mylist-meta">{(rec.count || 0)} place{(rec.count || 0) === 1 ? "" : "s"}{preview(rec) ? " \u00b7 " + preview(rec) : ""}</div>
                    <div className="mylist-date">Updated {fmt(rec.updated_at)}</div>
                  </div>
                  <button className="mylist-star" onClick={()=> onToggleFav(rec)} aria-label="Favorite">
                    <Icon name="star" size={20} color={rec.fav ? "var(--accent)" : "var(--text-faint)"} />
                  </button>
                </div>
                <div className="mylist-acts">
                  <button className="btn ghost sm" onClick={()=> doShare(rec)}>Share</button>
                  <button className="btn ghost sm" onClick={()=> doCopy(rec)}>{copiedId === rec.id ? "Copied" : "Copy link"}</button>
                  <button className="btn ghost sm" disabled={busyId === rec.id} onClick={()=> doRefresh(rec)}>
                    {busyId === rec.id ? "Refreshing..." : (doneId === rec.id ? "Updated" : "Refresh")}
                  </button>
                  {confirmId === rec.id ? (
                    <button className="btn ghost sm mylist-del" onClick={()=>{ onDelete(rec); setConfirmId(null); }}>Tap to remove</button>
                  ) : (
                    <button className="btn ghost sm" onClick={()=> setConfirmId(rec.id)}>Delete</button>
                  )}
                </div>
                {confirmId === rec.id && (
                  <div className="tiny faint" style={{marginTop:8}}>Removes it from your saved lists. The public page stays up, so links you already sent keep working.</div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function PublishBuilder({restaurants, visits, cfg, onPublished, onClose}){
  const [title,setTitle] = useState("");
  const [sel,setSel] = useState({});
  const [q,setQ] = useState("");
  const [link,setLink] = useState("");
  const [copied,setCopied] = useState(false);
  const [makeBusy,setMakeBusy] = useState(false);
  const [shortBusy,setShortBusy] = useState(false);
  const [shortMsg,setShortMsg] = useState("");

  const avgById = React.useMemo(()=>{
    const by = {};
    (visits || []).forEach(v => {
      if (v && v.restaurant_id && typeof v.rating === "number" && v.rating > 0){
        (by[v.restaurant_id] = by[v.restaurant_id] || []).push(v.rating);
      }
    });
    const out = {};
    Object.keys(by).forEach(id => { const a = by[id]; out[id] = Math.round((a.reduce((x,y)=> x+y, 0) / a.length) * 10) / 10; });
    return out;
  },[visits]);

  const sorted = React.useMemo(()=>{
    const list = [...(restaurants || [])];
    list.sort((a,b)=>{
      const fb = (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0);
      if (fb) return fb;
      const ra = avgById[a.id] || 0, rb = avgById[b.id] || 0;
      if (rb !== ra) return rb - ra;
      return (a.name || "").localeCompare(b.name || "");
    });
    return list;
  },[restaurants, avgById]);

  const ql = q.trim().toLowerCase();
  const shown = ql
    ? sorted.filter(r => (r.name || "").toLowerCase().includes(ql)
        || (r.location || "").toLowerCase().includes(ql)
        || (r.cuisine || "").toLowerCase().includes(ql))
    : sorted;

  const selCount = Object.keys(sel).filter(k => sel[k]).length;
  const toggle = (id)=>{ setSel(s => { const n = Object.assign({}, s); if (n[id]) delete n[id]; else n[id] = true; return n; }); setLink(""); setCopied(false); setShortMsg(""); };
  const onTitle = (e)=>{ setTitle(e.target.value); setLink(""); setCopied(false); setShortMsg(""); };

  const make = async ()=>{
    if (makeBusy) return;
    setMakeBusy(true); setCopied(false); setShortMsg("");
    try {
      const selected = (restaurants || []).filter(r => sel[r.id]);
      const payload = buildListPayload(title.trim(), selected, visits);
      const enc = encodeListPayload(payload);
      // ?list= (query) survives shorteners; the viewer also still reads #list=
      const longUrl = location.origin + location.pathname + "?list=" + enc;
      const short = await publishListPage(cfg, payload, enc);
      if (short){
        setLink(short);
        setShortMsg("Short link ready. The first time a list is published, its page can take a minute to go live.");
      } else {
        setLink(longUrl);
        setShortMsg("");
      }
      // Save this list to the user's saved lists (deliberate publishes only;
      // the one-tap city share does NOT save). place_ids come from the live
      // selection, since the encoded blob is name-based and carries no ids.
      const finalUrl = short || longUrl;
      if (onPublished){
        onPublished({
          id: "list_" + Math.random().toString(36).slice(2, 10),
          title: title.trim() || "Untitled list",
          place_ids: selected.map(r => r.id),
          encoded: enc,
          url: finalUrl,
          count: selected.length,
          names: selected.slice(0, 8).map(r => r.name),
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        });
      }
    } finally {
      setMakeBusy(false);
    }
  };
  const copy = async ()=>{ try { await navigator.clipboard.writeText(link); setCopied(true); } catch(e){ logMsg("WARN","Clipboard copy failed: " + e.message); } };
  const share = async ()=>{
    try { if (navigator.share){ await navigator.share({ title: title.trim() || "My list", text:"A few places I love:", url:link }); } else { copy(); } }
    catch(e){ /* user cancelled or unsupported */ }
  };
  // Optional shortener (shared helper). Any total failure keeps the long link.
  const shorten = async ()=>{
    if (!link || shortBusy) return;
    setShortBusy(true); setShortMsg("");
    const shortUrl = await shortenUrl(link);
    if (shortUrl){
      setLink(shortUrl); setCopied(false);
      setShortMsg("Shortened. Open it once to confirm it works.");
    } else {
      setShortMsg("Could not shorten right now - using the full link (it works fine).");
    }
    setShortBusy(false);
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Publish a list</h2>
        <span style={{width:40}} />
      </div>
      <div className="ovbody">
        <input className="input" placeholder="List title (e.g. My Top Portland Spots)"
          value={title} onChange={onTitle} style={{marginBottom:12}} />

        <div className="pub-make">
          <div className="small muted">{selCount} selected</div>
          <button className="btn primary sm" disabled={!selCount || makeBusy} onClick={make}>
            {makeBusy ? "Creating..." : (link ? "Refresh link after changes" : "Create link")}
          </button>
        </div>

        {link && (
          <div className="card" style={{marginTop:12}}>
            <div className="linkbox">{link}</div>
            <div className="row" style={{gap:8,marginTop:10}}>
              <button className="btn sm" onClick={copy}>{copied ? "Copied" : "Copy"}</button>
              <button className="btn primary sm" onClick={share}>
                <Icon name="share" size={15} color="#1b1714" /> Share
              </button>
              {link.includes("?list=") && (
                <button className="btn ghost sm" onClick={shorten} disabled={shortBusy}>
                  {shortBusy ? "Shortening..." : "Shorten"}
                </button>
              )}
            </div>
            {shortMsg && <div className="tiny faint" style={{marginTop:8}}>{shortMsg}</div>}
            {link.length > 6000 && (
              <div className="tiny faint" style={{marginTop:8}}>This link is long; some apps may shorten it. Fewer places will help.</div>
            )}
            <div className="tiny faint" style={{marginTop:6}}>
              Anyone with this link can view the list. It holds only what is shown here - no tokens or keys.
            </div>
          </div>
        )}

        <input className="input" placeholder="Search your places" value={q}
          onChange={e=> setQ(e.target.value)} style={{margin:"16px 0 10px"}} />

        {shown.length === 0 ? (
          <div className="empty" style={{padding:"30px 10px"}}>
            <div>{restaurants && restaurants.length ? "No places match." : "Add some restaurants first."}</div>
          </div>
        ) : shown.map(r => (
          <div key={r.id} className={"pub-row" + (sel[r.id] ? " on" : "")} onClick={()=> toggle(r.id)}>
            <span className="pub-check">{sel[r.id] ? <Icon name="check" size={14} color="#1b1714" /> : null}</span>
            <span className="pub-row-tx">
              <span className="pub-row-n">{r.name}{r.favorite ? "  \u2605" : ""}</span>
              <span className="pub-row-s">
                {[r.location, r.cuisine].filter(Boolean).join("  \u00b7  ")}
                {avgById[r.id] ? "   " + avgById[r.id] + "\u2605 avg" : ""}
              </span>
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FoodPassport({visits, restaurantById, cfg, onOpenVisit, onClose}){
  const items = buildPassportItems(visits, restaurantById);
  // group newest-first into month buckets, order preserved
  const groups = [];
  let cur = null;
  items.forEach(it => {
    const ym = String(it.date).slice(0,7);
    if (!cur || cur.ym !== ym){
      const yy = ym.slice(0,4), mm = parseInt(ym.slice(5,7), 10) - 1;
      cur = { ym:ym, label: yifMonthName(mm) + " " + yy, items:[] };
      groups.push(cur);
    }
    cur.items.push(it);
  });

  return (

function YearInFood({visits, restaurants, onClose}){
  // years that have visits, newest first
  const years = Array.from(new Set((visits || [])
    .map(v => parseInt(String(v.date || "").slice(0,4), 10))
    .filter(y => isFinite(y) && y > 1990))).sort((a,b)=> b - a);
  // default to the most-logged year (richest recap), else "all"
  const countByYear = {};
  (visits || []).forEach(v => {
    const y = parseInt(String(v.date || "").slice(0,4), 10);
    if (isFinite(y)) countByYear[y] = (countByYear[y] || 0) + 1;
  });
  let defaultPeriod = "all";
  if (years.length){
    defaultPeriod = years[0]; let best = -1;
    years.forEach(y => { if (countByYear[y] > best){ best = countByYear[y]; defaultPeriod = y; } });
  }
  const [period, setPeriod] = useState(defaultPeriod);
  const [shareBusy, setShareBusy] = useState(false);
  const s = computeYearStats(visits, restaurants, period);
  const periodLabel = period === "all" ? "All time" : String(period);

  const share = async ()=>{
    if (shareBusy || s.empty) return;
    setShareBusy(true);
    try {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
      const blob = await buildYearCardBlob(s, periodLabel);
      const file = new File([blob], "menucaptain-year-" + (period === "all" ? "alltime" : period) + ".png", { type:"image/png" });
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        try { await navigator.share({ files:[file], title:"My Year in Food" }); }
        catch(e){ if (e && e.name !== "AbortError") logMsg("YIF","Share sheet failed: " + e.message); }
      } else {
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = u; a.download = file.name;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=> URL.revokeObjectURL(u), 2000);
        logMsg("YIF","File-share unsupported - downloaded the recap instead");
      }
    } catch(e){
      logMsg("ERROR","Year card failed: " + e.message);
      alert("Could not build the recap image: " + e.message);
    } finally {
      setShareBusy(false);
    }
  };

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Year in Food</h2>
        <button className="x" onClick={share} disabled={shareBusy || s.empty} aria-label="Share recap">
          {shareBusy ? <span className="spin" /> : <Icon name="share" size={20} color="#b3a591" />}
        </button>
      </div>
      <div className="ovbody">
        {years.length > 0 && (
          <div className="chips" style={{marginBottom:16}}>
            {years.map(y => (
              <span key={y} className={"chip pick" + (period === y ? " on" : "")}
                onClick={()=> setPeriod(y)}>{y}</span>
            ))}
            <span className={"chip pick" + (period === "all" ? " on" : "")}
              onClick={()=> setPeriod("all")}>All time</span>
          </div>
        )}

        {s.empty ? (
          <div className="empty" style={{padding:"44px 20px"}}>
            <div className="big">Nothing logged {period === "all" ? "yet" : "in " + period}</div>
            <div>Log a few visits and your recap will fill in.</div>
          </div>
        ) : (
          <>
            <div className="yif-hero">
              <div className="yif-hero-kicker">Your Year in Food</div>
              <div className="yif-hero-year">{periodLabel}</div>
              <div className="yif-hero-sub">
                {s.visits} visit{s.visits === 1 ? "" : "s"} &nbsp;&middot;&nbsp; {s.places} place{s.places === 1 ? "" : "s"}
              </div>
            </div>

            {period !== "all" && s.newSpots > 0 && (
              <div className="yif-stat">
                <div className="yif-big">{s.newSpots}</div>
                <div className="yif-lbl" style={{marginTop:4}}>new spot{s.newSpots === 1 ? "" : "s"} discovered</div>
              </div>
            )}

            {s.cities.length > 0 && (
              <div className="yif-stat">
                <div className="yif-big">{s.cities.length}</div>
                <div className="yif-lbl" style={{marginTop:4}}>{s.cities.length === 1 ? "city" : "cities"} you ate in</div>
                <div className="yif-sub">{s.cities.join("  \u00b7  ")}</div>
              </div>
            )}

            {s.topSpot && (
              <div className="yif-stat">
                <div className="yif-lbl">Your #1 spot</div>
                <div className="yif-name">{s.topSpot.name}</div>
                <div className="yif-sub">{s.topSpot.count} visit{s.topSpot.count === 1 ? "" : "s"}</div>
              </div>
            )}

            {s.topCuisine && (
              <div className="yif-stat">
                <div className="yif-lbl">Top cuisine</div>
                <div className="yif-name">{s.topCuisine.name}</div>
              </div>
            )}

            {s.topLoved && (
              <div className="yif-stat">
                <div className="yif-lbl">Most loved dish</div>
                <div className="yif-name">{s.topLoved.name}</div>
                {s.lovedList.length > 1 && (
                  <div className="chips" style={{marginTop:11}}>
                    {s.lovedList.slice(0,6).map((d,i)=>(
                      <span key={i} className="chip dish again">
                        {d.name}{d.count > 1 ? "  \u00d7" + d.count : ""}
                      </span>
                    ))}
                  </div>
                )}

            )}

            {s.topVisit && (
              <div className="yif-stat">
                <div className="yif-lbl">Highest-rated visit</div>
                <div className="yif-name">{s.topVisit.name}</div>

                  <Stars value={s.topVisit.rating} showNum /> {fmtDate(s.topVisit.date)}
                </div>
              </div>
            )}

            {s.busiest && (
              <div className="yif-stat">
                <div className="yif-lbl">Busiest month</div>
                <div className="yif-name">{s.busiest.label}</div>
                <div className="yif-sub">{s.busiest.count} visit{s.busiest.count === 1 ? "" : "s"}</div>
              </div>
            )}

            <SpendReveal
              visits={period === "all" ? visits : (visits || []).filter(v => parseInt(String(v.date || "").slice(0,4), 10) === period)}
              scope="year" />

            <div className="tiny faint" style={{textAlign:"center",margin:"6px 0 24px"}}>
              A look back for memory and joy &mdash; built from what you logged.
            </div>
          </>
        )}
      </div>
    </div>
  );
}
