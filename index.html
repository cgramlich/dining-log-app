/* ---- small utilities ----------------------------------------- */
function uid(prefix){
  return prefix + "_" + Date.now().toString(36) + "_" +
         Math.random().toString(36).slice(2,7);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }

function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

// ---- Geocoding (OpenStreetMap Nominatim) -------------------------------
// One request per call. Plain GET with NO custom headers so it stays a CORS
// "simple request" (no preflight); the browser sends Referer automatically,
// which satisfies Nominatim's "identify your app" policy. Public Nominatim
// allows max 1 request/second and forbids client-side autocomplete, so we
// only ever call this on an explicit tap or in a throttled backfill loop.
// Provider-neutral output: a commercial geocoder swap (Track B) returns the
// same {lat,lng} shape.
function norm(s){ return (s || "").trim().toLowerCase(); }

function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return { "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c];
  });
}

// Build a tidy one-line address from Nominatim's structured "address" object.
function composeAddress(a){
  if (!a) return "";
  var parts = [];
  var line1 = [a.house_number, a.road].filter(Boolean).join(" ");
  if (line1) parts.push(line1);
  var city = a.city || a.town || a.village || a.hamlet || a.suburb || a.county || "";
  if (city) parts.push(city);
  var region = [a.state, a.postcode].filter(Boolean).join(" ");
  if (region) parts.push(region);
  return parts.join(", ");
}

// OSM stores cuisine as lowercase, ";"-separated, underscored
// (e.g. "coffee_shop;cafe"). Make it human: "Coffee Shop, Cafe".
function prettifyCuisine(s){
  return String(s || "").split(";").map(function(x){
    return x.trim().replace(/_/g, " ").replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  }).filter(Boolean).join(", ");
}

// Make sure a website has a scheme so it works as a tappable link.
function normalizeWebsite(u){
  u = (u || "").trim();
  if (!u) return "";
  if (!/^https?:\/\//i.test(u)) u = "https://" + u;
  return u;
}

// Pull the optional contact fields out of a Nominatim "extratags" object.
// Anything missing comes back as "" - OSM coverage of these is partial.
function extractDetails(et){
  et = et || {};
  var phone   = et.phone   || et["contact:phone"]   || et["contact:mobile"] || "";
  var website = et.website || et["contact:website"] || et.url || et["contact:url"] || "";
  var cuisine = et.cuisine ? prettifyCuisine(et.cuisine) : "";
  var hours   = et.opening_hours || "";
  return {
    phone:   String(phone   || "").trim(),
    website: normalizeWebsite(website),
    cuisine: cuisine,
    hours:   String(hours   || "").trim()
  };
}

// Returns {lat,lng,display,addr} or null. detail=true also returns a composed
// concise address string (used by the "Find address" button).
async function geocodeAddress(query, detail){
  var q = (query || "").trim();
  if (!q) return null;
  var url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1"
    + (detail ? "&addressdetails=1&extratags=1&namedetails=1" : "")
    + "&q=" + encodeURIComponent(q);
  logMsg("GEO", "Lookup -> " + q);
  var res;
  try {
    res = await fetch(url);              // no headers on purpose (CORS-simple)
  } catch(e){
    logMsg("GEO", "Network error for '" + q + "': " + e.message);
    throw e;                             // let caller treat as transient
  }
  if (!res.ok) throw new Error("Geocoder returned " + res.status);
  var arr = await res.json();
  if (!Array.isArray(arr) || arr.length === 0){
    logMsg("GEO", "No match for '" + q + "'");
    return null;
  }
  var h = arr[0];
  var lat = parseFloat(h.lat), lng = parseFloat(h.lon);
  if (!isFinite(lat) || !isFinite(lng)) return null;
  return {
    lat: lat, lng: lng,
    display: h.display_name || "",
    addr: detail ? composeAddress(h.address) : "",
    details: detail ? extractDetails(h.extratags) : null
  };
}

// Does this restaurant need a (re)geocode when the map opens?
//  - no address at all          -> no (nothing to locate)
//  - has coords for THIS address -> no (cached, never re-geocode)
//  - already failed THIS address -> no (don't hammer the service)
//  - otherwise (new/changed address) -> yes (self-healing)
function geoNeedsUpdate(r){
  if (!r || !r.address || !r.address.trim()) return false;
  var sameAddr = norm(r.geo_addr) === norm(r.address);
  if (r.lat != null && r.lng != null && sameAddr) return false;
  if (r.geo_failed && sameAddr) return false;
  return true;
}

// Convert any string ("COCKTAILS", "irish favorites", "Late Night MENU")
// to consistent Title Case. Used to normalize OCR-detected section names
// so they match the pill labels (Title Case) and merge correctly with them.
function toTitleCase(str){
  if (!str) return "";
  return String(str).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function fmtDate(iso){
  // iso is YYYY-MM-DD ; render as a friendly label
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}
function relDays(iso){
  if (!iso) return "";
  const then = new Date(iso + "T12:00:00").getTime();
  const days = Math.round((Date.now() - then) / 86400000);
  if (days <= 0)  return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7)   return days + " days ago";
  if (days < 31)  return Math.round(days/7) + " wk ago";
  if (days < 365) return Math.round(days/30) + " mo ago";
  return Math.round(days/365) + " yr ago";
}

function yifMonthName(m){
  return ["January","February","March","April","May","June","July",
          "August","September","October","November","December"][m] || "";
}

// Pure: derive the "Year in Food" recap stats for a period (a year number, or
// "all"). No DOM, no calorie totals (deliberate - the recap is about places,
// dishes and memories, not a budget). Returns {empty:true} when nothing fits.
function computeYearStats(visits, restaurants, period){
  const restMap = {};
  (restaurants || []).forEach(r => { if (r && r.id) restMap[r.id] = r; });
  const yearOf = (d)=> { const y = parseInt(String(d || "").slice(0,4), 10); return isFinite(y) ? y : 0; };

  // earliest visit year per restaurant across ALL visits (for "new this year")
  const firstYear = {};
  (visits || []).forEach(v => {
    const y = yearOf(v.date); if (!y || !v.restaurant_id) return;
    if (!firstYear[v.restaurant_id] || y < firstYear[v.restaurant_id]) firstYear[v.restaurant_id] = y;
  });

  const inPeriod = (v)=> period === "all" ? true : yearOf(v.date) === period;
  const filtered = (visits || []).filter(v => v && v.date && inPeriod(v));
  if (!filtered.length) return { empty:true, period:period };

  const nameOf = (id, fallback)=> (restMap[id] && restMap[id].name) || fallback || "a place";

  const byRest = {};
  filtered.forEach(v => { if (v.restaurant_id) byRest[v.restaurant_id] = (byRest[v.restaurant_id] || 0) + 1; });
  const placeIds = Object.keys(byRest);

  let topSpot = null;
  placeIds.forEach(id => {
    if (!topSpot || byRest[id] > topSpot.count) topSpot = { name:nameOf(id), count:byRest[id] };
  });

  const byCuisine = {};
  filtered.forEach(v => {
    const r = restMap[v.restaurant_id];
    const cz = (r && r.cuisine) ? r.cuisine.trim() : "";
    if (cz) byCuisine[cz] = (byCuisine[cz] || 0) + 1;
  });
  let topCuisine = null;
  Object.keys(byCuisine).forEach(c => {
    if (!topCuisine || byCuisine[c] > topCuisine.count) topCuisine = { name:c, count:byCuisine[c] };
  });

  const citySet = {};
  placeIds.forEach(id => {
    const r = restMap[id]; const c = (r && r.location) ? r.location.trim() : "";
    if (c) citySet[c] = true;
  });
  const cities = Object.keys(citySet).sort((a,b)=> a.localeCompare(b));

  let newSpots = 0;
  if (period !== "all") placeIds.forEach(id => { if (firstYear[id] === period) newSpots++; });

  const lovedCount = {}, lovedDisplay = {};
  filtered.forEach(v => (v.dishes || []).forEach(d => {
    if (d && d.name && d.verdict === "again"){
      const k = d.name.trim().toLowerCase();
      lovedCount[k] = (lovedCount[k] || 0) + 1;
      if (!lovedDisplay[k]) lovedDisplay[k] = d.name.trim();
    }
  }));
  const lovedList = Object.keys(lovedCount)
    .map(k => ({ name:lovedDisplay[k], count:lovedCount[k] }))
    .sort((a,b)=> b.count - a.count || a.name.localeCompare(b.name));

  let topVisit = null;
  filtered.forEach(v => {
    const rt = typeof v.rating === "number" ? v.rating : 0;
    if (rt > 0 && (!topVisit || rt > topVisit.rating ||
        (rt === topVisit.rating && (v.date || "") > topVisit.date))){
      topVisit = { rating:rt, date:v.date, name:nameOf(v.restaurant_id, v.restaurant_name) };
    }
  });

  const byMonth = {};
  filtered.forEach(v => { const ym = String(v.date).slice(0,7); if (ym.length === 7) byMonth[ym] = (byMonth[ym] || 0) + 1; });
  let busiest = null;
  Object.keys(byMonth).forEach(ym => { if (!busiest || byMonth[ym] > busiest.count) busiest = { ym:ym, count:byMonth[ym] }; });
  let busiestLabel = "";
  if (busiest){
    const mi = parseInt(busiest.ym.slice(5,7), 10) - 1;
    busiestLabel = yifMonthName(mi) + (period === "all" ? " " + busiest.ym.slice(0,4) : "");
  }

  return {
    empty:false, period:period,
    visits: filtered.length,
    places: placeIds.length,
    newSpots: newSpots,
    cities: cities,
    topSpot: topSpot,
    topCuisine: topCuisine,
    lovedList: lovedList,
    topLoved: lovedList[0] || null,
    topVisit: topVisit,
    busiest: busiest ? { label:busiestLabel, count:busiest.count } : null,
  };
}

// Pure: flatten every photo across visits (both visit-level photos and
// per-dish photos) into a newest-first list for the Food passport gallery.
function buildPassportItems(visits, restaurantById){
  const items = [];
  (visits || []).forEach(v => {
    if (!v || !v.date) return;
    const r = restaurantById ? restaurantById(v.restaurant_id) : null;
    const restName = (r && r.name) || v.restaurant_name || "A visit";
    const base = { date:v.date, logged_at:v.logged_at || 0, restName:restName, visitId:v.id };
    (Array.isArray(v.photos) ? v.photos : []).filter(Boolean).forEach(p => {
      items.push(Object.assign({}, base, { path:p, dish:null }));
    });
    (Array.isArray(v.dishes) ? v.dishes : []).forEach(d => {
      if (d && d.photo) items.push(Object.assign({}, base, { path:d.photo, dish:d.name || null }));
    });
  });
  items.sort((a,b)=> (b.date || "").localeCompare(a.date || "") || (b.logged_at - a.logged_at));
  return items;
}

// UTF-8 safe base64url so restaurant names with accents/emoji survive.
function b64urlEncode(str){
  const b = btoa(unescape(encodeURIComponent(str)));
  return b.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function b64urlDecode(s){
  s = String(s || "").replace(/-/g,"+").replace(/_/g,"/");
  while (s.length % 4) s += "=";
  return decodeURIComponent(escape(atob(s)));
}
function encodeListPayload(obj){
  const json = JSON.stringify(obj);
  try { if (window.LZString) return LZString.compressToEncodedURIComponent(json); } catch(e){}
  return b64urlEncode(json);  // fallback if the compressor is unavailable
}
function decodeListPayload(s){
  // new links are lz-string compressed; older links were plain base64url
  try {
    if (window.LZString){
      const j = LZString.decompressFromEncodedURIComponent(s);
      if (j){ const o = JSON.parse(j); if (o && Array.isArray(o.p)) return o; }
    }
  } catch(e){}
  try { const o = JSON.parse(b64urlDecode(s)); return (o && Array.isArray(o.p)) ? o : null; }
  catch(e){ return null; }
}

// Decode a shared-MENU blob. Same transport as lists (lz-string, b64url
// fallback) but validates the menu marker {k:"m", s:[...sections...]} so a
// list link never renders as a menu and vice-versa.
function decodeMenuPayload(s){
  try {
    if (window.LZString){
      const j = LZString.decompressFromEncodedURIComponent(s);
      if (j){ const o = JSON.parse(j); if (o && o.k === "m" && Array.isArray(o.s)) return o; }
    }
  } catch(e){}
  try { const o = JSON.parse(b64urlDecode(s)); return (o && o.k === "m" && Array.isArray(o.s)) ? o : null; }
  catch(e){ return null; }
}

// Shorten a long URL via CORS-friendly, keyless providers, tried in order.
// TinyURL is first: it is a plain GET (no POST body, no CORS preflight), which
// is the least likely to be blocked from an installed PWA - CleanURI/spoo.me
// were failing there with "Load failed". Each attempt has its own timeout so a
// hanging provider cannot eat the iOS share-sheet activation window. Returns
// the short URL on success, or null on any failure so callers fall back to the
// long link (which always works).
async function shortenUrl(longUrl){
  const TIMEOUT_MS = 5000;
  // fetch with an abort-based timeout; always clears its timer
  async function fetchT(url, opts){
    const ctrl = new AbortController();
    const timer = setTimeout(()=> ctrl.abort(), TIMEOUT_MS);
    try { return await fetch(url, Object.assign({}, opts, { signal: ctrl.signal })); }
    finally { clearTimeout(timer); }
  }
  const enc = encodeURIComponent(longUrl);
  const providers = [
    // GET, plain-text response (the short URL itself)
    { name:"tinyurl", run: async ()=>{
        const res = await fetchT("https://tinyurl.com/api-create.php?url=" + enc, { method:"GET" });
        const txt = (await res.text()).trim();
        return /^https?:\/\//.test(txt) ? txt : null;
      } },
    // POST form, JSON response { result_url }
    { name:"cleanuri", run: async ()=>{
        const res = await fetchT("https://cleanuri.com/api/v1/shorten",
          { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded" }, body:"url=" + enc });
        let d = null; try { d = await res.json(); } catch(e){ d = null; }
        return (d && d.result_url && /^https?:\/\//.test(d.result_url)) ? d.result_url : null;
      } },
    // POST form, JSON response { short_url }
    { name:"spoo.me", run: async ()=>{
        const res = await fetchT("https://spoo.me/",
          { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded", "Accept":"application/json" }, body:"url=" + enc });
        let d = null; try { d = await res.json(); } catch(e){ d = null; }
        const u = d && (d.short_url || d.shortUrl);
        return (u && /^https?:\/\//.test(u)) ? u : null;
      } },
  ];
  for (let i = 0; i < providers.length; i++){
    const p = providers[i];
    try {
      const u = await p.run();
      if (u){ logMsg("PUBLISH","Shortened via " + p.name); return u; }
      logMsg("PUBLISH", p.name + " gave no link");
    } catch(e){
      logMsg("PUBLISH", p.name + " failed: " + (e && e.name === "AbortError" ? "timeout" : (e && e.message) || "error"));
    }
  }
  return null;
}

/* ---- publish-a-list short pages (via the backend) ----
   A shared list gets a tiny static HTML page at menucaptain.com/l/<slug>.html
   with per-list Open Graph tags, so texted links show a real preview card.
   Track B: the page is built and committed by OUR backend with a server-side
   token - it works for every signed-in user, with no GitHub anything on the
   client. The slug is deterministic on the backend (same list -> same page).
   Any failure returns null and callers fall back to the long ?list= link,
   which always works. */

async function publishListPage(cfg, payload, encoded){
  try {
    const places = (payload && payload.p) || [];
    const names = places.map(p => p && p.n).filter(Boolean).slice(0, 8);
    const headers = await authHeaders(cfg);
    headers["Content-Type"] = "application/json";
    logMsg("PUBLISH","Publishing list page via backend");
    const res = await fetch(apiBase(cfg) + "/api/publish-list", {
      method:"POST", headers,
      body: JSON.stringify({
        title: (payload && payload.t) || "My list",
        names: names,
        count: places.length,
        encoded: encoded,
      }),
    });
    const data = await res.json().catch(()=> ({}));
    if (!res.ok || !data.url){
      logMsg("PUBLISH","Backend publish failed (" + res.status + ") - using long link");
      return null;
    }
    logMsg("PUBLISH", (data.created ? "List page created: " : "List page reused: ") + data.url);
    return data.url;
  } catch(e){
    logMsg("PUBLISH","Publish error: " + e.message + " - using long link");
    return null;
  }
}

/* ---- publish-a-MENU short pages (via the backend) ----
   Mirror of publishListPage. A shared menu gets a tiny static page at
   menucaptain.com/m/<slug>.html that redirects into the app with the menu
   blob in the URL (?menu=...), so a texted link shows a real preview card.
   Returns the short URL, or null so callers fall back to the long ?menu=
   link (which always works). Calories are intentionally NOT in the payload -
   a shared menu is just the restaurant's menu, never private estimates. */
async function publishMenuPage(cfg, payload, encoded){
  try {
    const sections = (payload && payload.s) || [];
    let itemCount = 0;
    sections.forEach(sec => { itemCount += ((sec && sec.i) || []).length; });
    const headers = await authHeaders(cfg);
    headers["Content-Type"] = "application/json";
    logMsg("PUBLISH","Publishing menu page via backend (" + itemCount + " items)");
    const res = await fetch(apiBase(cfg) + "/api/publish-menu", {
      method:"POST", headers,
      body: JSON.stringify({
        restaurant: (payload && payload.r) || "Menu",
        item_count: itemCount,
        encoded: encoded,
      }),
    });
    const data = await res.json().catch(()=> ({}));
    if (!res.ok || !data.url){
      logMsg("PUBLISH","Backend menu publish failed (" + res.status + ") - using long link");
      return null;
    }
    logMsg("PUBLISH", (data.created ? "Menu page created: " : "Menu page reused: ") + data.url);
    return data.url;
  } catch(e){
    logMsg("PUBLISH","Menu publish error: " + e.message + " - using long link");
    return null;
  }
}

/* One-tap: build the menu payload, publish a short page (fall back to the long
   ?menu= link), then hand it to the native share sheet. Reused by MenuDetail
   and by the inline single-menu Share on the restaurant page. setBusy/setErr
   are optional React setters so the caller can show a spinner / a small note.
   Any failure still ends with SOME shareable link - the long link never fails. */
async function publishAndShareMenu(cfg, restaurant, menu, setBusy, setErr){
  if (!menu){ return; }
  if (setBusy) setBusy(true);
  if (setErr) setErr(null);
  try {
    const payload = buildMenuPayload(restaurant, menu);
    const enc     = encodeListPayload(payload);   // same transport as lists
    const longUrl = location.origin + location.pathname + "?menu=" + enc;
    let url = longUrl;
    try {
      const short = await publishMenuPage(cfg, payload, enc);
      if (short) url = short;
    } catch(e){
      logMsg("PUBLISH","publish-menu threw, using long link: " + (e && e.message));
    }
    const title = (restaurant && restaurant.name ? restaurant.name : "Menu") + " menu";
    if (navigator.share){
      try {
        await navigator.share({ title, text:"Take a look at this menu - tap the dishes you'd like:", url });
        logMsg("PUBLISH","Menu shared via native sheet");
      } catch(e){ /* user cancelled - not an error */ }
    } else {
      try { await navigator.clipboard.writeText(url); if (setErr) setErr("Link copied to clipboard."); }
      catch(e){ if (setErr) setErr("Here is the link: " + url); }
    }
  } catch(e){
    logMsg("PUBLISH","Menu share failed: " + (e && e.message));
    if (setErr) setErr("Could not create the share link. Try again.");
  } finally {
    if (setBusy) setBusy(false);
  }
}

// Pure: build the lean, shareable payload from selected restaurants. Short keys
// keep the URL small. Only clearly-shareable fields - never tokens/keys, and no
// phone/notes. The street address (key "a") IS included so the shared view can
// offer a maps link; treat a published link as public (it always was).
function buildListPayload(title, selected, visits){
  const byRest = {};
  (visits || []).forEach(v => { if (v && v.restaurant_id){ (byRest[v.restaurant_id] = byRest[v.restaurant_id] || []).push(v); } });
  const places = (selected || []).map(r => {
    const vs = byRest[r.id] || [];
    const rated = vs.map(v => typeof v.rating === "number" ? v.rating : 0).filter(x => x > 0);
    const avg = rated.length ? Math.round((rated.reduce((a,b)=> a+b, 0) / rated.length) * 10) / 10 : 0;
    const loved = [], seen = {};
    vs.forEach(v => (v.dishes || []).forEach(d => {
      if (d && d.name && d.verdict === "again"){
        const k = d.name.trim().toLowerCase();
        if (!seen[k]){ seen[k] = 1; loved.push(d.name.trim()); }
      }
    }));
    const o = { n:r.name };
    if (r.location) o.c = r.location;
    if (r.cuisine) o.cu = r.cuisine;
    if (avg) o.r = avg;
    if (loved.length) o.d = loved.slice(0,3);
    if (r.favorite) o.f = 1;
    if (r.address) o.a = r.address;
    return o;
  });
  return { v:1, t: title || "My list", p: places };
}

/* Pure: build the lean, shareable MENU payload from a restaurant + one menu.
   Short keys keep the URL small. Marker k:"m" lets the viewer/route tell a
   menu blob from a list blob. NOTE: nutrition and photos are deliberately
   omitted - a shared menu is the restaurant's menu only, never the owner's
   private per-dish calorie estimates. Shape:
     { k:"m", v:1, r:<restaurant>, c:<city?>, l:<menu label?>,
       s:[ { n:<section>, i:[ { n:<dish>, d:<desc?>, p:<price?>, t:[tags?] } ] } ] } */
function buildMenuPayload(restaurant, menu){
  const sections = ((menu && menu.sections) || []).map(s => ({
    n: (s && s.name) || "",
    i: ((s && s.items) || []).map(it => {
      const o = { n: (it && it.name) || "" };
      if (it && it.description) o.d = it.description;
      if (it && it.price)       o.p = it.price;
      if (it && it.tags && it.tags.length) o.t = it.tags.slice(0, 6);
      return o;
    }),
  }));
  const o = { k:"m", v:1, r: (restaurant && restaurant.name) || "Menu", s: sections };
  if (restaurant && restaurant.location) o.c = restaurant.location;
  if (menu && menu.label) o.l = menu.label;
  return o;
}

/* Loose JSON parse - tolerates markdown fences around model output. */
function parseJsonLoose(text){
  let t = (text || "").trim();
  t = t.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
  const first = t.indexOf("{");
  const last  = t.lastIndexOf("}");
  if (first === -1 || last === -1) throw new Error("No JSON object found in response");
  return JSON.parse(t.slice(first, last + 1));
}

/* Read a File into a data URL. */
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error("Could not read file"));
    r.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error("Could not decode image"));
    img.src = src;
  });
}

function slugify(s){
  return String(s || "card").toLowerCase()
    .replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"").slice(0,40) || "card";
}

/* Render a shareable restaurant card to a PNG Blob on an offscreen canvas.
   Self-contained image (no link, no repo access) so it can be texted to
   anyone. photoImg is an already-decoded HTMLImageElement, or null.
   Single draw pass on a tall scratch canvas, then crop to the used height -
   so the layout never mismatches a separate height estimate. */
async function buildRestaurantCardBlob({ name, sub, ratingAvg, address, loved, photoImg }){
  const W = 1080, PAD = 72, MAXH = 2400;
  const BG = "#1b1714", LINE = "rgba(255,255,255,0.10)";
  const CREAM = "#efe6da", DIM = "#b3a591", FAINT = "#857667",
        ACCENT = "#e0764a", AMBER = "#e8b44a";
  const heroH = photoImg ? 700 : 280;
  const innerW = W - PAD * 2;

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = MAXH;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, MAXH);
  ctx.textBaseline = "alphabetic";

  function wrap(text, font, maxW){
    ctx.font = font;
    const words = String(text || "").split(/\s+/).filter(Boolean);
    const lines = []; let line = "";
    words.forEach(w => {
      const t = line ? line + " " + w : w;
      if (ctx.measureText(t).width > maxW && line){ lines.push(line); line = w; }
      else line = t;
    });
    if (line) lines.push(line);
    return lines;
  }
  let cy = 0;
  function drawLines(text, font, color, lh){
    const lines = wrap(text, font, innerW);
    ctx.font = font; ctx.fillStyle = color;
    lines.forEach(l => { cy += lh; ctx.fillText(l, PAD, cy); });
  }

  // hero: cover-cropped photo, or a solid accent band
  if (photoImg){
    const ar = photoImg.width / photoImg.height, tar = W / heroH;
    let sw, sh, sx, sy;
    if (ar > tar){ sh = photoImg.height; sw = sh * tar; sx = (photoImg.width - sw) / 2; sy = 0; }
    else        { sw = photoImg.width;  sh = sw / tar; sx = 0; sy = (photoImg.height - sh) / 2; }
    ctx.drawImage(photoImg, sx, sy, sw, sh, 0, 0, W, heroH);
    const g = ctx.createLinearGradient(0, heroH - 180, 0, heroH);
    g.addColorStop(0, "rgba(27,23,20,0)"); g.addColorStop(1, BG);
    ctx.fillStyle = g; ctx.fillRect(0, heroH - 180, W, 180);
  } else {
    ctx.fillStyle = ACCENT; ctx.fillRect(0, 0, W, heroH);
  }

  cy = heroH + 40;
  drawLines(name, "600 68px Fraunces, Georgia, serif", CREAM, 76);
  if (sub){ cy += 8; drawLines(sub, "500 34px Outfit, system-ui, sans-serif", DIM, 42); }

  if (ratingAvg){
    cy += 52;
    const full = Math.floor(ratingAvg);
    const half = (ratingAvg - full) >= 0.5;
    ctx.font = "44px system-ui, -apple-system, Arial, sans-serif";
    const glyph = "\u2605";
    const sw = ctx.measureText(glyph).width + 8;
    for (let i = 0; i < 5; i++){
      const x = PAD + i * sw;
      if (i < full){
        // full lit star
        ctx.fillStyle = AMBER;
        ctx.fillText(glyph, x, cy);
      } else if (i === full && half){
        // dim base, then lit left half clipped via a save/clip rect
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fillText(glyph, x, cy);
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, cy - 44, ctx.measureText(glyph).width / 2, 56);
        ctx.clip();
        ctx.fillStyle = AMBER;
        ctx.fillText(glyph, x, cy);
        ctx.restore();
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fillText(glyph, x, cy);
      }
    }
    // numeric average beside the stars, labelled so it reads as an average
    const numStr = (Number.isInteger(ratingAvg) ? String(ratingAvg) : ratingAvg.toFixed(1)) + " avg";
    ctx.fillStyle = DIM;
    ctx.font = "500 30px Outfit, system-ui, sans-serif";
    ctx.fillText(numStr, PAD + 5 * sw + 6, cy - 4);
  }

  if (address){ cy += 18; drawLines(address, "400 30px Outfit, system-ui, sans-serif", FAINT, 38); }

  const dishes = (loved || []).slice(0, 4);
  if (dishes.length){
    cy += 44;
    ctx.strokeStyle = LINE; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(PAD, cy); ctx.lineTo(W - PAD, cy); ctx.stroke();
    cy += 50;
    ctx.fillStyle = ACCENT; ctx.font = "600 26px Outfit, system-ui, sans-serif";
    ctx.fillText("LOVED HERE", PAD, cy);
    ctx.font = "500 34px Outfit, system-ui, sans-serif";
    dishes.forEach(d => {
      cy += 52;
      ctx.fillStyle = ACCENT; ctx.fillText("\u2022", PAD, cy);
      ctx.fillStyle = CREAM;
      ctx.fillText(d.name + (d.count > 1 ? "  \u00d7" + d.count : ""), PAD + 34, cy);
    });
  }

  cy += 72;
  ctx.fillStyle = FAINT; ctx.font = "500 26px Outfit, system-ui, sans-serif";
  ctx.fillText("Shared from MenuCaptain", PAD, cy);
  // WHY: the card travels to people who have never heard of the app -
  // give them the one string that gets them there.
  cy += 44;
  ctx.fillStyle = ACCENT; ctx.font = "600 26px Outfit, system-ui, sans-serif";
  ctx.fillText("menucaptain.com", PAD, cy);

  const finalH = Math.min(MAXH, cy + 48);
  const out = document.createElement("canvas");
  out.width = W; out.height = finalH;
  out.getContext("2d").drawImage(cv, 0, 0, W, finalH, 0, 0, W, finalH);

  return await new Promise((resolve, reject) => {
    out.toBlob(b => b ? resolve(b) : reject(new Error("Card render failed")), "image/png");
  });
}

// Draw a Year-in-Food recap as a shareable portrait image (text only, no photo).
async function buildYearCardBlob(s, periodLabel){
  const W = 1080, PAD = 84, MAXH = 2600;
  const BG = "#1b1714", LINE = "rgba(255,255,255,0.10)";
  const CREAM = "#efe6da", DIM = "#b3a591", FAINT = "#857667", ACCENT = "#e0764a";
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = MAXH;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, MAXH);
  ctx.textBaseline = "alphabetic";

  let cy = 0;
  const center = (text, font, color, advance)=>{
    ctx.textAlign = "center"; ctx.font = font; ctx.fillStyle = color;
    cy += advance; ctx.fillText(text, W / 2, cy);
  };
  const statRow = (label, value)=>{
    ctx.textAlign = "left";
    cy += 66;
    ctx.font = "600 26px Outfit, system-ui, sans-serif"; ctx.fillStyle = FAINT;
    ctx.fillText(String(label).toUpperCase(), PAD, cy);
    cy += 52;
    ctx.font = "500 46px Fraunces, Georgia, serif"; ctx.fillStyle = CREAM;
    let v = String(value); const maxW = W - PAD * 2;
    if (ctx.measureText(v).width > maxW){
      while (v.length > 4 && ctx.measureText(v + "\u2026").width > maxW) v = v.slice(0, -1);
      v = v.replace(/\s+\S*$/, "") + "\u2026";
    }
    ctx.fillText(v, PAD, cy);
  };

  cy = 130;
  center("YOUR YEAR IN FOOD", "600 30px Outfit, system-ui, sans-serif", ACCENT, 0);
  center(String(periodLabel), "600 112px Fraunces, Georgia, serif", CREAM, 132);
  center(
    s.visits + (s.visits === 1 ? " visit" : " visits") + "   \u00b7   " + s.places + (s.places === 1 ? " place" : " places"),
    "500 38px Outfit, system-ui, sans-serif", DIM, 72
  );

  cy += 64;
  ctx.strokeStyle = LINE; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(PAD, cy); ctx.lineTo(W - PAD, cy); ctx.stroke();

  if (s.topSpot)   statRow("Your #1 spot", s.topSpot.name + "  (" + s.topSpot.count + (s.topSpot.count === 1 ? " visit" : " visits") + ")");
  if (s.topCuisine) statRow("Top cuisine", s.topCuisine.name);
  if (s.topLoved)  statRow("Most loved dish", s.topLoved.name);
  if (s.busiest)   statRow("Busiest month", s.busiest.label);
  if (s.cities && s.cities.length) statRow(s.cities.length === 1 ? "City" : "Cities",
    s.cities.length <= 3 ? s.cities.join(", ") : s.cities.length + " cities");
  if (s.period !== "all" && s.newSpots > 0) statRow("New spots discovered", String(s.newSpots));

  cy += 112;
  center("Made with MenuCaptain", "500 28px Outfit, system-ui, sans-serif", FAINT, 0);
  center("menucaptain.com", "600 28px Outfit, system-ui, sans-serif", ACCENT, 44);

  const finalH = Math.min(MAXH, cy + 84);
  const out = document.createElement("canvas");
  out.width = W; out.height = finalH;
  const octx = out.getContext("2d");
  octx.fillStyle = BG; octx.fillRect(0, 0, W, finalH);
  octx.drawImage(cv, 0, 0, W, finalH, 0, 0, W, finalH);
  return await new Promise((resolve, reject) => {
    out.toBlob(b => b ? resolve(b) : reject(new Error("Year card render failed")), "image/png");
  });
}

/* ============================================================
   IMAGE RESIZE PIPELINE (faster, iOS-friendly)
   ============================================================
   Decode via createImageBitmap when available - skips FileReader
   entirely and uses native image decoders, which on iOS is
   meaningfully faster and uses less memory than FileReader +
   <img> + canvas.

   Returns a Blob (not a data URL) so callers don't pay the base64
   inflation cost twice. dataUrlFromBlob() converts when a data URL
   is actually needed (e.g. for the Anthropic vision API). */
async function decodeImage(file){
  if (typeof createImageBitmap === "function"){
    try {
      // EXIF orientation honored automatically on modern Safari
      return await createImageBitmap(file, { imageOrientation:"from-image" });
    } catch(e){
      // some Safari versions choke on the options bag - retry without it
      try { return await createImageBitmap(file); }
      catch(e2){ /* fall through to FileReader path */ }
    }
  }
  // legacy fallback - slower but works everywhere
  const url = await fileToDataUrl(file);
  return await loadImage(url);
}

async function resizeImageToBlob(file, maxEdge, quality){
  maxEdge = maxEdge || 1200;
  quality = quality || 0.82;
  const src = await decodeImage(file);
  const sw = src.width  || src.naturalWidth  || 0;
  const sh = src.height || src.naturalHeight || 0;
  if (!sw || !sh) throw new Error("Decoded image has zero size");
  let w = sw, h = sh;
  if (Math.max(w,h) > maxEdge){
    const scale = maxEdge / Math.max(w,h);
    w = Math.round(w*scale); h = Math.round(h*scale);
  }
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(src,0,0,w,h);
  // free the ImageBitmap so the GC reclaims memory promptly on iOS
  if (src.close) try { src.close(); } catch(e){}
  const blob = await new Promise((resolve,reject)=>{
    canvas.toBlob(b => b ? resolve(b) : reject(new Error("Canvas encode failed")),
                  "image/jpeg", quality);
  });
  logMsg("IMAGE","Resized photo to " + w + "x" + h +
                  " (" + Math.round(blob.size/1024) + " KB)");
  return blob;
}

/* Convert a Blob into a data URL. Used when we need a data URL
   (e.g. Anthropic vision API needs base64 strings). */
function blobToDataUrl(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error("Could not read blob"));
    r.readAsDataURL(blob);
  });
}
/* Convert a Blob into raw base64 (no data URL prefix). Used to
   stage photo payloads for the backend upload (POST /api/photos). */
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => {
      // result is "data:<mime>;base64,<b64>" - strip the prefix
      const s = r.result || "";
      const comma = s.indexOf(",");
      resolve(comma >= 0 ? s.slice(comma+1) : s);
    };
    r.onerror = () => reject(new Error("Could not read blob"));
    r.readAsDataURL(blob);
  });
}
/* Convert base64 (no prefix) into a Blob of the given mime type. */
function base64ToBlob(b64, mime){
  const clean = (b64 || "").replace(/\s/g,"");
  const bin   = atob(clean);
  const arr   = new Uint8Array(bin.length);
  for (let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime || "application/octet-stream" });
}

/* Resize a photo down to a sane edge length before sending to the
   vision API. Keeps OCR legible while controlling token cost.
   Returns a data URL (the vision API needs base64 strings). */
async function resizeForOcr(file, maxEdge){
  // Slightly smaller default (1200) than the legacy 1568 - still legible
  // for OCR, much faster to encode, and noticeably easier on iOS memory.
  const blob = await resizeImageToBlob(file, maxEdge || 1200, 0.82);
  return await blobToDataUrl(blob);
}

/* Photo transfer (Track B). Photos are stored in object storage
   behind the backend. Reads ask the backend for a short-lived
   signed URL and fetch the bytes from it; writes POST base64 to
   /api/photos. Function names keep their historical gh* prefix so
   call sites did not have to change in the Track A -> B cutover. */

/* Fetch a photo's bytes via a backend-signed URL.
   Returns a Blob. Throws on 404/!ok. */
async function ghGetRawFile(cfg, path){
  // Track B: ask the backend for a short-lived signed URL, then fetch the bytes.
  const signUrl = apiBase(cfg) + "/api/photos?path=" + encodeURIComponent(path);
  logMsg("API","GET photo url " + path);
  let res;
  try {
    res = await fetch(signUrl, { headers: await authHeaders(cfg) });
  } catch(err){
    logMsg("ERROR","Backend photo sign network failure: " + err.message);
    throw new Error("Network error reaching the server");
  }
  if (res.status === 404){ throw new Error("Photo not found: " + path); }
  if (res.status === 401){ throw new Error("Server rejected the request (401)."); }
  if (!res.ok){
    logMsg("ERROR","Backend photo sign " + path + " -> " + res.status);
    throw new Error("Photo lookup failed (" + res.status + ")");
  }
  const signed = await res.json();
  const imgRes = await fetch(signed.url);
  if (!imgRes.ok){ throw new Error("Photo fetch failed (" + imgRes.status + ")"); }
  return await imgRes.blob();
}

async function ghPutBinaryFile(cfg, path, blob, sha){
  // Track B: upload a photo to the backend (Supabase Storage). sha unused.
  const b64 = await blobToBase64(blob);
  const url = apiBase(cfg) + "/api/photos";
  logMsg("API","PUT photo " + path + " (" + Math.round(blob.size/1024) + " KB)");
  let res;
  try {
    res = await fetch(url, {
      method:"POST",
      headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
      body:JSON.stringify({ path:path, image_base64:b64 }),
    });
  } catch(err){
    logMsg("ERROR","Backend photo upload network failure: " + err.message);
    throw new Error("Network error reaching the server");
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Backend photo upload " + path + " -> " + res.status + " " + txt.slice(0,140));
    throw new Error("Photo upload failed (" + res.status + ")");
  }
  logMsg("API","Saved photo " + path);
  return null; // no sha in Track B
}

/* ============================================================
   PHOTO CACHE  (two tiers)
   ============================================================
   Tier 1 - in-memory Map (PHOTO_CACHE): path -> Promise<blobUrl>.
            Survives only the current session; dedupes concurrent
            requests for the same path.
   Tier 2 - IndexedDB (idb*): path -> Blob, persisted to disk.
            Survives app restarts and works OFFLINE for photos
            already viewed once. This is the big win for "slow
            loading" - after the first view, a photo loads instantly
            from local disk instead of round-tripping to the server.

   Lookup order on display: memory -> IndexedDB -> backend (signed
   URL fetch). On a network fetch we write the blob into IndexedDB
   for next time.
   Object URLs are never revoked (bounded by unique paths viewed),
   keeping a few MB of URLs alive for the session. */

const IDB_NAME  = "dininglog";
const IDB_STORE = "photos";
let _idbPromise = null;
function idbOpen(){
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve) => {
    if (!("indexedDB" in window)){ resolve(null); return; }
    let req;
    try { req = indexedDB.open(IDB_NAME, 1); }
    catch(e){ logMsg("ERROR","IndexedDB open threw: " + e.message); resolve(null); return; }
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE, { keyPath:"path" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => { logMsg("ERROR","IndexedDB open failed"); resolve(null); };
  });
  return _idbPromise;
}
async function idbGetBlob(path){
  const db = await idbOpen();
  if (!db) return null;
  return new Promise((resolve) => {
    try {
      const tx  = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(path);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror   = () => resolve(null);
    } catch(e){ resolve(null); }
  });
}
async function idbPutBlob(path, blob){
  const db = await idbOpen();
  if (!db) return;
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put({ path:path, blob:blob, cachedAt:Date.now() });
      tx.oncomplete = () => resolve();
      tx.onerror    = () => resolve();
    } catch(e){ resolve(); }
  });
}

const PHOTO_CACHE = new Map();   // path -> Promise<blobUrl>
function getPhotoBlobUrl(cfg, path){
  if (!path) return Promise.resolve(null);
  if (PHOTO_CACHE.has(path)) return PHOTO_CACHE.get(path);
  const p = (async () => {
    // Tier 2: persistent disk cache (instant, offline-friendly)
    try {
      const cached = await idbGetBlob(path);
      if (cached){
        logMsg("IMAGE","Photo from local cache: " + path);
        return URL.createObjectURL(cached);
      }
    } catch(e){ /* fall through to network */ }
    // Tier 3: fetch bytes from the backend (signed URL)
    if (!cfg || !cfg.userId) throw new Error("Not signed in");
    const blob = await ghGetRawFile(cfg, path);
    // persist for next time (fire and forget - don't block render)
    idbPutBlob(path, blob).catch(()=>{});
    return URL.createObjectURL(blob);
  })().catch(err => {
    // drop from memory cache so a later view retries
    PHOTO_CACHE.delete(path);
    throw err;
  });
  PHOTO_CACHE.set(path, p);
  return p;
}
/* Drop a path from the in-memory cache (e.g. after re-uploading a
   restaurant photo so the next render uses the new object URL). The
   IndexedDB copy is overwritten by seedPhoto's put, so no delete needed. */
function invalidatePhoto(path){
  if (path && PHOTO_CACHE.has(path)) PHOTO_CACHE.delete(path);
}
/* Pre-seed both cache tiers with a freshly resized blob - lets the UI
   show a just-uploaded photo instantly, and persists it so it stays
   instant on later sessions without ever fetching from GitHub. */
function seedPhoto(path, blob){
  if (!path || !blob) return;
  const url = URL.createObjectURL(blob);
  PHOTO_CACHE.set(path, Promise.resolve(url));
  idbPutBlob(path, blob).catch(()=>{});
}

/* ============================================================
   MENUS MIGRATION
   ============================================================
   Older versions stored one menu per restaurant as an object:
     menus[rid] = { sections, ... }
   v1.3+ supports multiple menus per restaurant as an array:
     menus[rid] = [ { menu_id, label, sections, ... }, ... ]
   This walks the menus map, wraps any single-menu objects in arrays,
   and assigns menu_id/label defaults so the data is uniform.
   Returns { menus: migratedMap, changed: bool }.
   ============================================================ */
function migrateMenusShape(menusObj){
  const next = {};
  let changed = false;
  for (const rid in (menusObj || {})){
    const m = menusObj[rid];
    if (Array.isArray(m)){
      // already new format - just ensure each menu has menu_id + label
      next[rid] = m.map(item => {
        if (!item || typeof item !== "object") return item;
        if (item.menu_id && item.label) return item;
        changed = true;
        return Object.assign({}, item, {
          menu_id: item.menu_id || uid("menu"),
          label:   item.label   || "Main",
        });
      });
    } else if (m && typeof m === "object"){
      // legacy single-menu object - wrap in an array
      changed = true;
      next[rid] = [Object.assign({}, m, {
        menu_id: m.menu_id || uid("menu"),
        label:   m.label   || "Main",
      })];
    } else {
      next[rid] = [];
    }
  }
  return { menus: next, changed: changed };
}

/* ============================================================
   GITHUB DATA LAYER
   ============================================================ */
async function ghGetFile(cfg, path){
  // Track B: read a whole collection from the backend (was GitHub).
  // path like "data/restaurants.json" -> collection name "restaurants".
  const name = path.replace(/^data\//, "").replace(/\.json$/, "");
  const url = apiBase(cfg) + "/api/collection/" + name;
  logMsg("API", "GET " + name);
  let res;
  try {
    res = await fetch(url, { headers: await authHeaders(cfg) });
  } catch(err){
    logMsg("ERROR","Backend GET network failure: " + err.message);
    throw new Error("Network error reaching the server");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your User ID in Settings."); }
  if (!res.ok){
    const body = await res.text().catch(()=> "");
    logMsg("ERROR","Backend GET " + name + " -> " + res.status + " " + body.slice(0,120));
    throw new Error("Backend GET failed (" + res.status + ")");
  }
  let data;
  try { data = await res.json(); }
  catch(e){
    logMsg("ERROR","Could not parse JSON for " + name + ": " + e.message);
    throw new Error("Server returned invalid JSON for " + name);
  }
  logMsg("API","Loaded " + name);
  // Collections always exist on the backend (empty if no rows yet).
  return { found:true, data:data, sha:null };
}

async function ghPutFile(cfg, path, dataObj, sha){
  // Track B: replace a whole collection on the backend (was GitHub).
  // sha is unused now (kept in the signature so callers do not change).
  const name = path.replace(/^data\//, "").replace(/\.json$/, "");
  const url = apiBase(cfg) + "/api/collection/" + name;
  logMsg("API", "PUT " + name);
  let res;
  try {
    res = await fetch(url, {
      method:"PUT",
      headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
      body:JSON.stringify(dataObj),
    });
  } catch(err){
    logMsg("ERROR","Backend PUT network failure: " + err.message);
    throw new Error("Network error reaching the server");
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Backend PUT " + name + " -> " + res.status + " " + txt.slice(0,140));
    throw new Error("Backend PUT failed (" + res.status + ")");
  }
  logMsg("API","Saved " + name);
  return null; // no sha in Track B
}

/* ============================================================
   ANTHROPIC VISION - menu digitization
   ============================================================ */
async function digitizeMenu(cfg, dataUrls){
  // dataUrls: array of "data:image/jpeg;base64,..." strings.
  const prompt =
    "You are a menu digitization assistant. Extract the COMPLETE menu from the "+
    "attached photo(s) into structured JSON. The photos may be multiple pages or "+
    "sections of the SAME restaurant menu - merge them into one menu.\n\n"+
    "Return ONLY valid JSON. No markdown, no commentary. Keep the response "+
    "compact so it is not truncated. Schema:\n"+
    '{"restaurant_name": string or null, "sections":[{"name":string,'+
    '"items":[{"name":string,"description":string,"price":string,'+
    '"tags":[string],"notes":string,"calories":number or null}]}]}\n\n'+
    "Rules:\n"+
    "- price: a string exactly as printed (e.g. \"$12.95\", \"6.25 ea / 2 for 11.50\", "+
    "\"MP\"); empty string if none.\n"+
    "- description: the ingredient or description line; empty string if none.\n"+
    "- tags: include any of \"gluten-free\",\"vegetarian\",\"vegan\",\"spicy\",\"raw\" "+
    "that the menu indicates (a 'gf' mark means gluten-free); empty array if none.\n"+
    "- notes: anything extra about an item; usually empty.\n"+
    "- calories: ONLY if the menu explicitly prints a calorie number for THIS "+
    "item (e.g. \"850 cal\", \"850 Cal\", \"850 kcal\"); otherwise null. Never "+
    "guess or estimate a calorie count yourself.\n"+
    "- Use the section headings printed on the menu.\n"+
    "- An ITEM is something the customer orders (a dish, a board, a drink). "+
    "Do NOT promote individual ingredients or components into their own items. "+
    "If a charcuterie board lists \"goat cheese, prosciutto, olives\" as its "+
    "components, those go in the parent item's description - they are NOT "+
    "separate items. The same ingredient may legitimately appear inside the "+
    "descriptions of multiple dishes; that is fine and expected.\n"+
    "- Only digitize actual food and drink menus. Ignore unrelated pages such "+
    "as advertisements, brochures, or directories of other businesses.\n"+
    "- If text is unclear, give your best reading.";

  const content = dataUrls.map(u => ({
    type:"image",
    source:{ type:"base64", media_type:"image/jpeg", data:u.split(",")[1] },
  }));
  content.push({ type:"text", text:prompt });

  logMsg("VISION","Sending " + dataUrls.length + " image(s) to " + VISION_MODEL);
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        ...(await authHeaders(cfg)),
      },
      body:JSON.stringify({
        task:"ocr_menu",          // server routes the model per task
        model:VISION_MODEL,       // advisory fallback for older backends
        max_tokens:32000,
        messages:[{ role:"user", content:content }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Anthropic network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your sign-in."); }
  if (res.status === 429){ throw new Error("The AI service is busy (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Anthropic -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  // If the model ran out of output budget the JSON will be incomplete -
  // catch that here so the user gets a clear message, not a parse error.
  if (json.stop_reason === "max_tokens"){
    logMsg("ERROR","Vision response stopped at max_tokens - menu too large for one pass");
    throw new Error("This menu was too large to digitize in one pass. " +
                    "Try splitting it into separate labeled menus - for example, " +
                    "scan the food pages as one menu, cocktails as another, the " +
                    "whiskey list as a third. Use 'Add another menu' on the " +
                    "restaurant's page.");
  }
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  logMsg("VISION","Received response (" + text.length + " chars, stop=" +
         (json.stop_reason || "?") + ")");
  let parsed;
  try {
    parsed = parseJsonLoose(text);
  } catch(err){
    logMsg("ERROR","Could not parse vision JSON: " + err.message);
    throw new Error("The digitized menu came back incomplete or malformed. " +
                    "Try again, or scan fewer pages at once.");
  }
  if (!Array.isArray(parsed.sections)) throw new Error("Model response had no sections array");
  // normalize so downstream rendering is safe
  parsed.sections = parsed.sections.map(s => ({
    name:String(s.name || "Menu"),
    items:(s.items || []).map(it => {
      const item = {
        name:String(it.name || "").trim(),
        description:String(it.description || "").trim(),
        price:String(it.price || "").trim(),
        tags:Array.isArray(it.tags) ? it.tags.map(String) : [],
        notes:String(it.notes || "").trim(),
      };
      // stated calories printed on the menu -> treat as ACTUAL (menu_stated)
      const kc = Number(it.calories);
      if (isFinite(kc) && kc > 0){
        item.nutrition = {
          kcal:Math.round(kc), protein_g:0, carbs_g:0, fat_g:0,
          ingredients:[], foods:[], source:"menu_stated",
          confidence:"high", estimated_at:todayISO(), note:"",
        };
      }
      return item;
    }).filter(it => it.name),
  })).filter(s => s.items.length);
  parsed.raw_text = String(parsed.raw_text || "");
  return parsed;
}

/* ============================================================
   RECEIPT SCAN - read an itemized check into tickable line items
   ============================================================ */

// Small money formatter for dish prices: "$14" for whole dollars,
// "$14.50" otherwise. Returns "" for missing/invalid values.
function fmtPrice(p){
  const n = Number(p);
  if (!isFinite(n) || n <= 0) return "";
  return "$" + n.toFixed(2);
}

// ---- Price-data foundation -------------------------------------------------
// Prices live as display strings (menu scan) and numbers (receipts). parsePrice
// turns either into a dollar number for math, or null when there is no usable
// number. We derive numbers on read - stored strings are never rewritten.
function parsePrice(raw){
  if (raw === null || raw === undefined) return null;
  if (typeof raw === "number") return (isFinite(raw) && raw > 0) ? raw : null;
  let s = String(raw).trim();
  if (!s) return null;
  // Placeholders that are not a number.
  if (/^(mp|m\/p|market(\s*price)?|seasonal|ask|priceless|free|n\/a)$/i.test(s)) return null;
  // A price range ("14-18", "14 to 18") is ambiguous - skip rather than guess.
  if (/\d\s*(?:-|to|\u2013|\u2014)\s*\d/i.test(s)) return null;
  const m = s.replace(/,/g, "").match(/\d+(?:\.\d+)?/);   // first numeric token
  if (!m) return null;
  const n = Number(m[0]);
  return (isFinite(n) && n > 0) ? n : null;
}

// One visit's spend. Prefer the scanned check's grand total (real, incl. tax
// and tip); otherwise sum the dish line prices (approximate, pre-tax).
function visitSpendValue(v){
  if (v && v.receipt && v.receipt.total){
    const t = parsePrice(v.receipt.total);
    if (t != null) return { amount:t, exact:true };
  }
  let sum = 0, any = false;
  (v && Array.isArray(v.dishes) ? v.dishes : []).forEach(d => {
    const p = parsePrice(d && d.price);
    if (p != null){ sum += p; any = true; }
  });
  return any ? { amount:sum, exact:false } : { amount:0, exact:false };
}

// Total spend across a set of visits. approx=true when any contributing visit
// was summed from dish prices rather than a scanned check total.
function sumSpend(visits){
  let amount = 0, count = 0, allExact = true;
  (visits || []).forEach(v => {
    const sv = visitSpendValue(v);
    if (sv.amount > 0){ amount += sv.amount; count++; if (!sv.exact) allExact = false; }
  });
  return { amount, count, approx: !allExact };
}

// Subtle, opt-in spend reveal. Hidden behind a tap so the page stays calm -
// money is for memory here, never a budget. Renders nothing without price data.
function SpendReveal({visits, scope}){
  const [open, setOpen] = useState(false);
  const sp = sumSpend(visits);
  if (sp.amount <= 0) return null;
  const tilde = sp.approx ? "~" : "";
  const avg = sp.count > 0 ? sp.amount / sp.count : 0;
  const detail = scope === "restaurant"
    ? (tilde + fmtPrice(sp.amount) + " across " + sp.count + " visit" + (sp.count === 1 ? "" : "s")
       + (sp.count > 1 ? "  \u00b7  avg " + tilde + fmtPrice(avg) : ""))
    : (tilde + fmtPrice(sp.amount) + " across " + sp.count + " visit" + (sp.count === 1 ? "" : "s"));
  const foot = sp.approx
    ? "~ estimated from dish prices - a number for memory, not a budget."
    : "From your scanned checks - a number for memory, not a budget.";
  const inner = (
    <div>
      <a href="#" className="tiny" style={{color:"var(--accent)"}}
         onClick={(e)=>{ e.preventDefault(); setOpen(o=>!o); }}>
        {open ? "Hide spending" : "Spending"}
      </a>
      {open ? (
        <div className="tiny muted" style={{marginTop:5}}>
          {detail}
          <div className="tiny faint" style={{marginTop:3}}>{foot}</div>
        </div>
      ) : null}
    </div>
  );
  if (scope === "year") return <div style={{textAlign:"center", margin:"4px 0 18px"}}>{inner}</div>;
  return <div className="card">{inner}</div>;
}

// Backfill: write what was actually paid (from a saved visit's dishes) onto the
// matching menu items by exact name - the same name-match the app already uses
// to attach estimates. Additive only: a new `paid` record, never overwriting
// the menu's scanned list price. Returns an updated menus object or null.
function backfillPaidPrices(restId, dishes, menus, dateStr){
  if (!restId || !Array.isArray(dishes) || !dishes.length) return null;
  const list = menus[restId];
  if (!list || !list.length) return null;
  const paidByName = new Map();          // lowercased name -> paid amount
  dishes.forEach(d => {
    if (!d || !d.name) return;
    const amt = parsePrice(d.price);
    if (amt == null) return;
    const k = d.name.trim().toLowerCase();
    if (!paidByName.has(k)) paidByName.set(k, amt);
  });
  if (!paidByName.size) return null;
  let changed = 0;
  const nextList = list.map(m => {
    const sections = (m.sections || []).map(s => Object.assign({}, s, {
      items: (s.items || []).map(it => {
        if (!it || !it.name) return it;
        const amt = paidByName.get(it.name.trim().toLowerCase());
        if (amt == null) return it;
        if (it.paid && it.paid.amount === amt && it.paid.date === dateStr) return it; // idempotent
        changed++;
        return Object.assign({}, it, { paid:{ amount:amt, date:dateStr, source:"receipt" } });
      }),
    }));
    return Object.assign({}, m, { sections:sections });
  });
  if (!changed) return null;
  logMsg("PRICE","Backfilled paid price onto " + changed + " menu item(s) for " + restId);
  return Object.assign({}, menus, { [restId]:nextList });
}

// Parse 1-2 photos of a restaurant check. menuItemNames (the restaurant's
// digitized menu, may be empty) lets the model match receipt shorthand like
// "CHKN PARM" to the real menu item so downstream features line up.
async function parseReceiptPhotos(cfg, dataUrls, menuItemNames){
  let prompt =
    "You are reading a restaurant receipt (an itemized check) from the "+
    "attached photo(s). Respond with ONLY valid JSON, no other text:\n"+
    "{\n"+
    '  "items": [ { "name": string, "qty": integer, "price": number|null, "menu_match": string|null } ],\n'+
    '  "total": number|null\n'+
    "}\n\n"+
    "Rules:\n"+
    "- items: food and drink line items ONLY. Skip tax, tip, subtotal, total, "+
    "discounts, service charges, table/server/payment lines.\n"+
    "- name: the item as printed, lightly cleaned up. Expand an abbreviation "+
    "only when it is obvious.\n"+
    "- qty: how many of the item were ordered (default 1). Read quantity in any "+
    "of these shapes: (a) a leading number, optionally with a serving word like "+
    "GL (glass), BTL (bottle), EA: '2 MARGARITA 18.00' -> qty 2; "+
    "'3 GL PRISONER 66.00' -> qty 3 (three glasses); '2 BTL TITOS 90.00' -> qty 2. "+
    "(b) a trailing multiplier: 'COFFEE x2' or 'COFFEE *2' -> qty 2. When you pull "+
    "a leading number/serving-word out as qty, drop that serving word from name "+
    "(so name is 'Prisoner', not '3 GL Prisoner'). Keep a size that is part of the "+
    "item itself, like '2oz Kahlua' (a 2-ounce pour), in the name; a separate "+
    "trailing 'x2' on that line is still the qty.\n"+
    "- price: the line's printed price as a number, the TOTAL for the whole line "+
    "(all units together), or null if unreadable. When qty > 1 the per-unit price "+
    "is price / qty.\n"+
    "- total: the final total printed on the check, or null.\n";
  if (menuItemNames && menuItemNames.length){
    prompt +=
      "- menu_match: this restaurant's menu items are listed below. If a "+
      "receipt line clearly refers to one of them, set menu_match to that "+
      "EXACT name (copy it verbatim). Otherwise null. Do not guess.\n"+
      "MENU ITEMS:\n" + menuItemNames.map(n => "- " + n).join("\n") + "\n";
  } else {
    prompt += "- menu_match: always null.\n";
  }

  const content = dataUrls.map(u => ({
    type:"image",
    source:{ type:"base64", media_type:"image/jpeg", data:u.split(",")[1] },
  }));
  content.push({ type:"text", text:prompt });

  logMsg("RECEIPT","Sending " + dataUrls.length + " receipt photo(s), menu names=" +
         (menuItemNames ? menuItemNames.length : 0));
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        ...(await authHeaders(cfg)),
      },
      body:JSON.stringify({
        task:"ocr_receipt",
        model:VISION_MODEL,   // advisory; server routes by task
        max_tokens:2000,
        messages:[{ role:"user", content:content }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Receipt network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Receipt scan -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    throw new Error(_detail || ("Receipt scan failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  let parsed;
  try {
    parsed = parseJsonLoose(text);
  } catch(err){
    logMsg("ERROR","Could not parse receipt JSON: " + err.message);
    throw new Error("Couldn\u2019t read that receipt. Try a sharper, straight-on photo.");
  }
  const items = (Array.isArray(parsed.items) ? parsed.items : []).map(it => ({
    name: String(it.name || "").trim(),
    qty: Math.max(1, parseInt(it.qty, 10) || 1),
    price: (it.price === null || it.price === undefined || isNaN(Number(it.price)))
      ? null : Number(it.price),
    menu_match: it.menu_match ? String(it.menu_match).trim() : null,
  })).filter(it => it.name);
  const total = (parsed.total === null || parsed.total === undefined || isNaN(Number(parsed.total)))
    ? null : Number(parsed.total);
  logMsg("RECEIPT","Parsed " + items.length + " line item(s), total=" + total);
  if (!items.length) throw new Error("No line items found on that receipt. Try a clearer photo.");
  return { items: items, total: total };
}

/* ============================================================
   "HELP ME ORDER" - text Q&A against a digitized menu
   ============================================================ */

// Compact, readable serialization of a menu for the prompt. Text (not raw
// JSON) keeps the token count down and is easy for the model to read.
// Render one menu item's cached nutrition as a compact hint for the
// model (phase-2 calorie-aware ordering). Returns "" when the item has
// no kcal on record, so items without data simply pass through unchanged.
// "stated" (printed on the menu) is exact; everything else is an estimate
// and is labelled "approx" so the model never treats a guess as fact.
function nutritionHint(it){
  const n = it && it.nutrition;
  if (!n || !n.kcal) return "";
  const exact = n.source === "menu_stated";
  const word  = exact ? "" : "approx ";
  let h = " [" + word + n.kcal + " cal";
  const macros = [];
  if (n.protein_g) macros.push(n.protein_g + "g protein");
  if (n.carbs_g)   macros.push(n.carbs_g + "g carbs");
  if (n.fat_g)     macros.push(n.fat_g + "g fat");
  if (macros.length) h += "; " + macros.join(", ");
  h += "]";
  return h;
}

function menuToText(menu){
  const lines = [];
  (menu.sections || []).forEach(s => {
    lines.push("## " + (s.name || "Menu"));
    (s.items || []).forEach(it => {
      let line = "- " + it.name;
      if (it.price)       line += " (" + it.price + ")";
      else if (it.paid && it.paid.amount) line += " ($" + Number(it.paid.amount).toFixed(2) + ")";
      if (it.description) line += ": " + it.description;
      if (it.tags && it.tags.length) line += " [tags: " + it.tags.join(", ") + "]";
      line += nutritionHint(it);   // phase-2: calorie/macro hint when known
      lines.push(line);
    });
  });
  return lines.join("\n");
}

// Recency-aware loved / disliked dish lists for ONE restaurant's visits.
// Mirrors the picks-card logic: a dish's MOST RECENT verdict wins. Returns
// empty lists when there is no history, so the caller degrades to menu-only.
function dishHistory(visits){
  const byDate = (visits || []).slice().sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    ((b.logged_at || 0) - (a.logged_at || 0)));
  // key -> rolling stats. byDate is newest-first, so the FIRST verdict/date we
  // see for a dish is the most recent one.
  const memo = new Map();
  byDate.forEach(v => (v.dishes || []).forEach(d => {
    if (!d || !d.name) return;
    const k = d.name.trim().toLowerCase();
    let e = memo.get(k);
    if (!e){ e = { name:d.name, latest:null, count:0, lastDate:"",
                   priceSum:0, priceN:0, rateSum:0, rateN:0 }; memo.set(k, e); }
    e.count += 1;
    if (!e.latest && d.verdict) e.latest = d.verdict;     // newest verdict wins
    if (!e.lastDate && v.date)  e.lastDate = v.date;       // newest date wins
    const p = parsePrice(d.price);                         // typed or from a check
    if (p){ e.priceSum += p; e.priceN += 1; }
    if (typeof v.rating === "number" && v.rating > 0){ e.rateSum += v.rating; e.rateN += 1; }
  }));
  const detail = [];
  memo.forEach(e => detail.push({
    name: e.name,
    verdict: e.latest,                                     // "again" | "skip" | null
    count: e.count,
    lastDate: e.lastDate,
    paid: e.priceN ? (e.priceSum / e.priceN) : null,       // avg paid, dollars
    rating: e.rateN ? (e.rateSum / e.rateN) : null,        // avg visit rating
  }));
  const loved    = detail.filter(x => x.verdict === "again").map(x => x.name);
  const disliked = detail.filter(x => x.verdict === "skip").map(x => x.name);
  return { loved, disliked, detail };
}

// Ask Claude to recommend from THIS menu. `question` may be a question, a
// command ("give me something healthy"), or a mood ("craving something rich").
async function askMenu(cfg, restaurant, menu, visits, question){
  const rName    = (restaurant && restaurant.name) ? restaurant.name : "this restaurant";
  const menuText = menuToText(menu);
  const hist     = dishHistory(visits);
  // Rank what they have actually ordered here: loved first, then by how often.
  // Keep only dishes with a real signal (a verdict, ordered more than once, or
  // a known price) so the hint stays compact and factual.
  const histRanked = (hist.detail || [])
    .filter(d => d.verdict || d.count > 1 || d.paid)
    .sort((a,b)=>{
      const va = a.verdict === "again" ? 2 : (a.verdict === "skip" ? 0 : 1);
      const vb = b.verdict === "again" ? 2 : (b.verdict === "skip" ? 0 : 1);
      return vb - va || b.count - a.count;
    })
    .slice(0, 12);
  const hasHist  = histRanked.length > 0;

  let prompt =
    "You are a warm, knowledgeable dining companion helping someone decide what "+
    "to order at " + rName + ". They will tell you what they want - it might be "+
    "a question (\"what's light here?\"), a request (\"give me something healthy\"), "+
    "or just a mood (\"I'm craving something rich\"). Recommend specific dishes "+
    "from THE MENU BELOW that fit.\n\n"+
    "Rules:\n"+
    "- Only recommend items that actually appear on the menu. Never invent dishes "+
    "or guess at things that are not listed.\n"+
    "- Suggest 2-3 options, each with a short reason. If nothing on the menu fits, "+
    "say so honestly and point to the closest thing.\n"+
    "- Be concise and conversational - a few sentences, not an essay. No headings, "+
    "no markdown.\n"+
    "- Some menu items show a calorie/macro hint in square brackets (e.g. "+
    "\"[approx 300 cal; 24g protein]\"). 'approx' is an estimate; a plain number "+
    "is taken straight from the menu. When the diner's request relates to how "+
    "light, heavy, filling, protein-rich, or calorie-conscious they want to eat, "+
    "use those numbers to inform your picks and mention them naturally (e.g. "+
    "\"the ceviche is around 300 cal\"). Items without a number simply have none "+
    "on record - never guess or invent calories. Keep it informative and "+
    "easygoing: this is for curiosity, never a diet, a budget, or a judgment. "+
    "Do not scold, warn, or imply any food is 'bad'.\n";

  prompt +=
    "- A menu item may show its price in parentheses (e.g. \"($14)\"). When the "+
    "diner asks about value, price, what is cheap, what is worth it, splurging, "+
    "or 'best value', weigh the price - alongside the calories when those are "+
    "present - and suggest strong-value picks, mentioning the price naturally "+
    "(e.g. \"the ceviche is a good deal at $12\"). Items without a price simply "+
    "have none on record; do not guess one. Keep it easygoing - a friendly "+
    "suggestion, never a budget or a judgment.\n";

  if (hasHist){
    prompt +=
      "- Personal history at this restaurant - what they have actually ordered "+
      "here (use as a LIGHT hint, only if relevant to what they asked; always "+
      "answer their request first):\n";
    histRanked.forEach(d => {
      const bits = [];
      if (d.verdict === "again") bits.push("LOVED it");
      else if (d.verdict === "skip") bits.push("did not like it");
      if (d.count > 1) bits.push("ordered " + d.count + " times");
      if (d.paid) bits.push("usually pays about $" + d.paid.toFixed(2));
      const tail = bits.length ? " - " + bits.join(", ") : " - ordered before";
      prompt += "    " + d.name + tail +
        (d.lastDate ? " (last on " + d.lastDate + ")" : "") + "\n";
    });
    prompt +=
      "  Do not recommend a disliked dish unless they explicitly ask for it. If a "+
      "loved or frequently-ordered dish genuinely fits their request, you may note "+
      "they have enjoyed it before. For value or 'best deal' questions, the real "+
      "prices they have paid above are stronger evidence than the menu's price.\n";
  }

  prompt +=
    "\nMENU:\n" + menuText +
    "\n\nTHE DINER SAYS: \"" + question + "\"";

  logMsg("ASK","Asking " + ASK_MODEL + " (menu " + menuText.length +
         " chars, history=" + (hasHist ? "yes" : "none") +
         ", calorie-aware=" + (/\bcal\]/.test(menuText) || /cal;/.test(menuText) ? "yes" : "none") + ")");
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        ...(await authHeaders(cfg)),
      },
      body:JSON.stringify({
        task:"help_me_order",
        model:ASK_MODEL,
        max_tokens:700,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Ask network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your sign-in."); }
  if (res.status === 429){ throw new Error("The AI service is busy (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Ask -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  logMsg("ASK","Received answer (" + text.length + " chars)");
  if (!text) throw new Error("The model returned an empty answer. Try rephrasing.");
  return text;
}

/* ============================================================
   MEAL PHOTO -> NUTRITION ESTIMATE
   ============================================================
   One vision call per photo. The result is stored on the visit so
   the same photo is never re-estimated (no recurring cost). The
   estimate is explicitly an ESTIMATE - shown labelled, editable,
   and never used to nag or score the user. */

function clampNum(v, min, max){
  let n = Number(v);
  if (!isFinite(n) || n < 0) n = 0;
  if (typeof min === "number" && n < min) n = min;
  if (typeof max === "number" && n > max) n = max;
  return Math.round(n);
}

// Normalize whatever the model returns into our stable nutrition shape.
// source / estimated_at are stamped by the caller, not the model.
function normalizeNutrition(raw){
  const conf = String(raw.confidence || "").toLowerCase();
  return {
    kcal:      clampNum(raw.kcal, 0, 20000),
    protein_g: clampNum(raw.protein_g, 0, 2000),
    carbs_g:   clampNum(raw.carbs_g, 0, 2000),
    fat_g:     clampNum(raw.fat_g, 0, 2000),
    ingredients: Array.isArray(raw.ingredients)
      ? raw.ingredients.map(s => String(s).trim()).filter(Boolean).slice(0,30) : [],
    foods: Array.isArray(raw.foods)
      ? raw.foods.map(s => String(s).trim()).filter(Boolean).slice(0,12) : [],
    confidence: (conf === "high" || conf === "medium" || conf === "low") ? conf : "medium",
    note: String(raw.note || "").trim().slice(0, 400),
  };
}

// Estimate nutrition from a photo File. Returns a normalized nutrition

      },

        model:VISION_MODEL,
        max_tokens:1500,
        messages:[{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:"image/jpeg",
            data:dataUrl.split(",")[1] } },
          { type:"text", text:prompt },
        ]}],
      }),
    });
  } catch(err){
    logMsg("ERROR","Nutrition network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your sign-in."); }
  if (res.status === 429){ throw new Error("The AI service is busy (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Nutrition -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }

  const out = normalizeNutrition(parsed);
  logMsg("NUTRI","Estimate: " + out.kcal + " kcal, conf=" + out.confidence);
