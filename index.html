/* ============================================================
   RESTAURANT FORM (add / edit)
   ============================================================ */
function RestaurantForm({existing, locations, cfg, onClose, onSave}){
  const [name,setName]         = useState(existing ? existing.name : "");
  const [cuisine,setCuisine]   = useState(existing ? existing.cuisine : "");
  const [location,setLocation] = useState(existing ? (existing.location || "") : "");
  const [address,setAddress]   = useState(existing ? existing.address : "");
  const [phone,setPhone]       = useState(existing ? existing.phone : "");
  const [website,setWebsite]   = useState(existing ? existing.website : "");
  const [notes,setNotes]       = useState(existing ? existing.notes : "");
  const [fav,setFav]           = useState(existing ? !!existing.favorite : false);

  // Photo state - one photo per restaurant, acts as the visual identity.
  //   existingPhotoPath -> already saved in repo (if any)
  //   pendingBlob       -> a freshly picked photo waiting to upload on Save
  //   pendingPreviewUrl -> blob URL just for preview while editing
  //   removeExisting    -> user explicitly cleared the saved photo
  const [existingPhotoPath] = useState(existing ? (existing.photo || null) : null);
  const [pendingBlob, setPendingBlob]           = useState(null);
  const [pendingPreviewUrl, setPendingPreviewUrl] = useState(null);
  const [removeExisting, setRemoveExisting]     = useState(false);
  const [photoBusy, setPhotoBusy]               = useState(false);
  const photoFileRef = useRef(null);

  // clean up the pending preview blob URL when it changes or unmounts
  useEffect(()=> {
    return ()=> { if (pendingPreviewUrl) URL.revokeObjectURL(pendingPreviewUrl); };
  },[pendingPreviewUrl]);

  async function onPhotoFiles(e){
    const file = (e.target.files || [])[0];
    if (!file) return;
    setPhotoBusy(true);
    try {
      // Resize to a max 1200px - same target as menu OCR but kept as a real
      // image we'll display, not just send to an API. Quality 0.86 looks great
      // on the iPhone screen and keeps files well under 400 KB.
      const blob = await resizeImageToBlob(file, 1200, 0.86);
      const url  = URL.createObjectURL(blob);
      // free the previous preview if any
      if (pendingPreviewUrl) URL.revokeObjectURL(pendingPreviewUrl);
      setPendingBlob(blob);
      setPendingPreviewUrl(url);
      setRemoveExisting(false);   // picking a new one overrides any prior remove
    } catch(err){
      logMsg("ERROR","Restaurant photo resize failed: " + err.message);
      alert("Could not load that photo: " + err.message);
    } finally {
      setPhotoBusy(false);
      if (photoFileRef.current) photoFileRef.current.value = "";
    }
  }
  function clearPendingPhoto(){
    if (pendingPreviewUrl) URL.revokeObjectURL(pendingPreviewUrl);
    setPendingBlob(null);
    setPendingPreviewUrl(null);
  }
  function clearAllPhotos(){
    clearPendingPhoto();
    if (existingPhotoPath) setRemoveExisting(true);
  }
  // which preview to show in the editor
  const showingPendingPreview = !!pendingPreviewUrl;
  const showingExistingPhoto  = !showingPendingPreview && !!existingPhotoPath && !removeExisting;
  const hasAnyPhoto           = showingPendingPreview || showingExistingPhoto;

  // inline "add new location" state. When true, the dropdown reads
  // "+ Add new location..." and an inline input below it lets the user
  // type a one-off location. On save the new value becomes the restaurant's
  // location AND (if not already present case-insensitively) is added to
  // the master locations list via the second arg of onSave().
  const [addingNew,setAddingNew] = useState(false);
  const [newLoc,setNewLoc]       = useState("");
  const newLocRef = useRef(null);

  // if the restaurant carries a location that has been removed from the
  // master list, still offer it in the dropdown so we don't silently drop it
  const opts = Array.from(new Set(
    (locations || []).concat(location && location.trim() ? [location] : [])
  )).sort((a,b)=> a.localeCompare(b));

  // handle dropdown change: the special sentinel "__ADD_NEW__" toggles
  // into "type a new location" mode; everything else picks an existing one
  function pickLocation(v){
    if (v === "__ADD_NEW__"){
      setAddingNew(true);
      setNewLoc("");
      // focus the new-location input so the user can type immediately
      setTimeout(()=> { if (newLocRef.current) newLocRef.current.focus(); }, 0);
    } else {
      setAddingNew(false);
      setNewLoc("");
      setLocation(v);
    }
  }

  function submit(){
    if (!name.trim()) return;
    // resolve the final location string based on which input is active
    const finalLoc = addingNew ? newLoc.trim() : location.trim();
    // if user typed a new location, pass it up so the parent can add to master
    const newLocationsToAdd = (addingNew && newLoc.trim())
      ? [newLoc.trim()] : [];
    const rid = existing ? existing.id : uid("rest");
    // Compute the photo path that should be on the saved record:
    //   - new photo pending -> path will be the restaurant photo path
    //     (parent uploads the blob to that path before committing JSON)
    //   - removing existing -> null
    //   - no change -> keep the existing path
    let finalPhotoPath;
    if (pendingBlob){
      finalPhotoPath = restaurantPhotoPath(rid);
    } else if (removeExisting){
      finalPhotoPath = null;
    } else {
      finalPhotoPath = existingPhotoPath || null;
    }
    const rec = {
      id: rid,
      name:name.trim(), cuisine:cuisine.trim(),
      location: finalLoc,
      address:address.trim(), phone:phone.trim(), website:website.trim(),
      notes:notes.trim(), favorite:fav,
      photo: finalPhotoPath,
      added_date: existing ? existing.added_date : todayISO(),
    };
    onSave(rec, {
      newLocationsToAdd: newLocationsToAdd,
      photoBlob: pendingBlob,
      photoPath: pendingBlob ? finalPhotoPath : null,
    });
  }
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}>Cancel</button>
        <h2>{existing ? "Edit restaurant" : "Add restaurant"}</h2>
        <button className="x" onClick={submit}
          style={{color:name.trim()?"var(--accent)":"var(--text-faint)"}}>Save</button>
      </div>
      <div className="ovbody">

        {/* Photo editor - one icon photo per restaurant */}
        <div className="photo-editor">
          {showingPendingPreview && (
            <img className="photo-img" src={pendingPreviewUrl} alt=""
              style={{width:72,height:72,borderRadius:10,objectFit:"cover"}} />
          )}
          {showingExistingPhoto && cfg && (
            <PhotoImg cfg={cfg} path={existingPhotoPath}
              style={{width:72,height:72,borderRadius:10,objectFit:"cover"}} />
          )}
          {!hasAnyPhoto && (
            <div className="photo-shell"
              style={{width:72,height:72,borderRadius:10}}>
              <Icon name="image" size={24} color="#5a5045" />
            </div>
          )}
          <div style={{flex:1,minWidth:0}}>
            <input ref={photoFileRef} type="file" accept="image/*"
              style={{display:"none"}} onChange={onPhotoFiles} />
            <button className="btn ghost sm"
              onClick={()=> photoFileRef.current.click()}
              disabled={photoBusy}
              style={{padding:"7px 11px",fontSize:13,margin:0}}>
              <Icon name="camera" size={15} />
              {hasAnyPhoto ? "Change" : "Add photo"}
            </button>
            {hasAnyPhoto && (
              <button className="btn ghost sm" onClick={clearAllPhotos}
                disabled={photoBusy}
                style={{padding:"7px 11px",fontSize:13,marginLeft:6,marginTop:6}}>
                Remove
              </button>
            )}
            {photoBusy && (
              <div className="tiny faint" style={{marginTop:6}}>Preparing photo&hellip;</div>
            )}
            {!photoBusy && pendingBlob && (
              <div className="tiny faint" style={{marginTop:6}}>
                Photo uploads when you tap Save.
              </div>
            )}
          </div>
        </div>

        <label className="fld"><span className="lbl">Name</span>
          <input className="input" value={name} onChange={e=>setName(e.target.value)}
            placeholder="Restaurant name" /></label>
        <label className="fld"><span className="lbl">Cuisine</span>
          <input className="input" value={cuisine} onChange={e=>setCuisine(e.target.value)}
            placeholder="e.g. Mexican / Tacos" /></label>
        <label className="fld"><span className="lbl">Location</span>
          <select className="input"
            value={addingNew ? "__ADD_NEW__" : location}
            onChange={e=> pickLocation(e.target.value)}>
            <option value="">(none)</option>
            {opts.map(o => <option key={o} value={o}>{o}</option>)}
            <option value="__ADD_NEW__">+ Add new location...</option>
          </select>
          {addingNew && (
            <input ref={newLocRef} className="input"
              value={newLoc}
              onChange={e=> setNewLoc(e.target.value)}
              placeholder="City name (e.g. Boston, New York)"
              style={{marginTop:8}} />
          )}
          {addingNew && (
            <div className="tiny faint" style={{marginTop:6}}>
              This city will be saved to your locations list.
            </div>
          )}
          {!addingNew && opts.length === 0 && (
            <div className="tiny faint" style={{marginTop:6}}>
              No saved cities yet &mdash; pick <strong>+ Add new location...</strong>
              {" "}to add one.
            </div>
          )}
        </label>
        <label className="fld"><span className="lbl">Address</span>
          <input className="input" value={address} onChange={e=>setAddress(e.target.value)}
            placeholder="Neighborhood or full address" /></label>
        <label className="fld"><span className="lbl">Phone</span>
          <input className="input" type="tel" value={phone} onChange={e=>setPhone(e.target.value)}
            placeholder="Phone number" /></label>
        <label className="fld"><span className="lbl">Website</span>
          <input className="input" value={website} onChange={e=>setWebsite(e.target.value)}
            placeholder="example.com" /></label>
        <label className="fld"><span className="lbl">Notes</span>
          <textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Hours, reservation policy, anything worth remembering" /></label>
        <div className="card between" onClick={()=> setFav(f=>!f)} style={{cursor:"pointer"}}>
          <span>Mark as favorite</span>
          <span className={"fav" + (fav?" on":"")}>
            <Icon name="star" size={22} color={fav?"#e0764a":"#80715f"} />
          </span>
        </div>
        <div style={{height:20}} />
      </div>
    </div>
  );
}

/* ============================================================
   VISIT FORM (log / edit)
   ============================================================ */
function VisitForm({restaurants, menus, presetRestaurantId, existing, cfg, onClose, onSave, onDelete, onPropagateDishNutrition}){
  const [restId,setRestId] = useState(
    existing ? existing.restaurant_id : (presetRestaurantId || (restaurants[0] && restaurants[0].id) || ""));
  const [date,setDate]     = useState(existing ? existing.date : todayISO());
  const [rating,setRating] = useState(existing ? existing.rating : 0);
  const [notes,setNotes]   = useState(existing ? existing.notes : "");
  const [dishes,setDishes] = useState(existing ? existing.dishes.slice() : []);
  const [dishInput,setDishInput] = useState("");
  const [confirmDel,setConfirmDel] = useState(false);

  // ---- photo state -----------------------------------------------------
  // photoSlots: ordered array (max length 3) of either:
  //   { kind:"existing", path:"<repo path>" }                 (already saved)
  //   { kind:"pending",  blob:<Blob>, previewUrl:"blob:..." } (new, awaiting upload)
  // On Save, "pending" slots are uploaded first, then the visit record's
  // .photos array is built from the final paths in slot order.
  const MAX_PHOTOS = 3;
  const [photoSlots, setPhotoSlots] = useState(()=> {
    if (existing && Array.isArray(existing.photos)){
      return existing.photos.filter(Boolean).slice(0,MAX_PHOTOS).map(p => ({
        kind:"existing", path:p,
      }));
    }
    return [];
  });
  const [photoBusy, setPhotoBusy] = useState(false);
  const photoFileRef = useRef(null);

  // ---- meal-photo nutrition estimate -----------------------------------
  // visit.nutrition is a single estimate for the meal (visit-level). It is
  // computed once from a photo and stored on the visit, so it never re-runs.
  const [nutrition, setNutrition] = useState(
    existing && existing.nutrition ? existing.nutrition : null);
  const [nutBusy, setNutBusy]   = useState(false);
  const [nutErr,  setNutErr]    = useState(null);
  const [nutEdit, setNutEdit]   = useState(false);
  const [nutIngStr, setNutIngStr] = useState("");   // comma-separated editor buffer
  const nutFileRef = useRef(null);

  async function onPickNutritionPhoto(e){
    const file = e.target.files && e.target.files[0];
    if (nutFileRef.current) nutFileRef.current.value = "";   // allow re-picking same file
    if (!file) return;
    if (!cfg || !cfg.anthropicKey){ setNutErr("Add your Anthropic key in Settings first."); return; }
    setNutBusy(true); setNutErr(null);
    try {
      const est = await estimateNutrition(cfg, file);
      est.source = "photo_estimate";
      est.estimated_at = todayISO();
      setNutrition(est);
      setNutEdit(false);
    } catch(err){
      setNutErr(err.message || "Could not estimate. Try again.");
    } finally {
      setNutBusy(false);
    }
  }
  function setNutNum(field, value){
    setNutrition(n => Object.assign({}, n,
      { [field]: clampNum(value, 0, 20000), source:"manual" }));
  }
  function startNutEdit(){
    setNutIngStr(((nutrition && nutrition.ingredients) || []).join(", "));
    setNutEdit(true);
  }
  function commitNutEdit(){
    const ings = nutIngStr.split(",").map(s=> s.trim()).filter(Boolean).slice(0,30);
    setNutrition(n => Object.assign({}, n,
      { ingredients:ings, source:"manual", estimated_at:todayISO() }));
    setNutEdit(false);
  }
  function removeNutrition(){ setNutrition(null); setNutEdit(false); setNutErr(null); }

  // ---- per-dish photo estimate (captured at log time, propagates to menu) ----
  const [dishNutBusy, setDishNutBusy] = useState({});   // dishName -> bool
  const [dishNutErr,  setDishNutErr]  = useState({});    // dishName -> message
  const [conflict, setConflict]       = useState(null);  // {dishName, incoming, photoBlob, existing, match}
  const dishPhotoRef = useRef(null);
  const pendingDishRef = useRef(null);                   // which dish a picked file is for

  // find a menu item (in THIS restaurant's menus) whose name matches a dish
  function findMenuItem(dishName){
    const list = menus[restId] || [];
    const target = (dishName || "").trim().toLowerCase();
    if (!target) return null;
    for (const m of list){
      const secs = m.sections || [];
      for (let si=0; si<secs.length; si++){
        const items = secs[si].items || [];
        for (let ii=0; ii<items.length; ii++){
          if (((items[ii].name || "").trim().toLowerCase()) === target){
            return { restId:restId, menuId:m.menu_id, si:si, ii:ii, item:items[ii] };
          }
        }
      }
    }
    return null;
  }

  function startDishPhoto(dishName){
    pendingDishRef.current = dishName;
    if (dishPhotoRef.current){ dishPhotoRef.current.value = ""; dishPhotoRef.current.click(); }
  }

  // apply an estimate to a dish, and (if it maps to a menu item) propagate the
  // numbers + photo thumbnail up to that menu item so it shows on the menu page
  function applyDishEstimate(dishName, est, blob, match){
    let photoPath = null;
    if (match && blob){
      photoPath = menuItemPhotoPath(match.menuId,
        "d" + Date.now().toString(36) + Math.random().toString(36).slice(2,6));
      if (onPropagateDishNutrition) onPropagateDishNutrition(match, est, photoPath, blob);
    }
    setDishes(d => d.map(x => x.name === dishName
      ? Object.assign({}, x, { nutrition:est, photo:photoPath }) : x));
  }

  async function onDishPhotoPicked(e){
    const file = e.target.files && e.target.files[0];
    const dishName = pendingDishRef.current;
    if (dishPhotoRef.current) dishPhotoRef.current.value = "";
    if (!file || !dishName) return;
    if (!cfg || !cfg.anthropicKey){
      setDishNutErr(x => Object.assign({}, x, { [dishName]:"Add your Anthropic key in Settings." }));
      return;
    }
    setDishNutErr(x => Object.assign({}, x, { [dishName]:null }));
    setDishNutBusy(x => Object.assign({}, x, { [dishName]:true }));
    try {
      const est = await estimateNutrition(cfg, file);
      est.source = "photo_estimate";
      est.estimated_at = todayISO();
      const blob = await resizeImageToBlob(file, 1200, 0.82);   // thumbnail bytes
      const match = findMenuItem(dishName);
      if (match && match.item.nutrition && match.item.nutrition.kcal){
        // existing estimate on the menu item -> ask which to keep
        setConflict({ dishName:dishName, incoming:est, photoBlob:blob,
          existing:match.item.nutrition, match:match });
      } else {
        applyDishEstimate(dishName, est, blob, match);
      }
    } catch(err){
      setDishNutErr(x => Object.assign({}, x, { [dishName]:err.message || "Could not estimate." }));
    } finally {
      setDishNutBusy(x => Object.assign({}, x, { [dishName]:false }));
    }
  }

  function resolveConflictUsePhoto(){
    if (!conflict) return;
    applyDishEstimate(conflict.dishName, conflict.incoming, conflict.photoBlob, conflict.match);
    setConflict(null);
  }
  function resolveConflictKeepCurrent(){
    if (!conflict) return;
    // keep the menu item's current numbers; just copy them onto the visit dish
    const keep = conflict.existing;
    const photo = (conflict.match && conflict.match.item.photo) || null;
    setDishes(d => d.map(x => x.name === conflict.dishName
      ? Object.assign({}, x, { nutrition:keep, photo:photo }) : x));
    setConflict(null);
  }

  // revoke any pending blob URLs when the form unmounts (memory hygiene)
  useEffect(()=> {
    return ()=> {
      photoSlots.forEach(s => {
        if (s.kind === "pending" && s.previewUrl) URL.revokeObjectURL(s.previewUrl);
      });
    };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  async function onVisitPhotoFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    // cap how many we can accept right now based on remaining slots
    const room  = Math.max(0, MAX_PHOTOS - photoSlots.length);
    const take  = files.slice(0, room);
    if (!take.length){
      if (photoFileRef.current) photoFileRef.current.value = "";
      return;
    }
    setPhotoBusy(true);
    try {
      const newSlots = [];
      for (const f of take){
        const blob = await resizeImageToBlob(f, 1200, 0.86);
        const url  = URL.createObjectURL(blob);
        newSlots.push({ kind:"pending", blob:blob, previewUrl:url });
        // push each one into state as it finishes so the UI shows progress
        setPhotoSlots(prev => prev.concat([{ kind:"pending", blob:blob, previewUrl:url }]));
      }
      logMsg("VISIT","Prepared " + newSlots.length + " visit photo(s) for upload");
    } catch(err){
      logMsg("ERROR","Visit photo resize failed: " + err.message);
      alert("Could not load that photo: " + err.message);
    } finally {
      setPhotoBusy(false);
      if (photoFileRef.current) photoFileRef.current.value = "";
    }
  }
  function removePhotoSlot(idx){
    setPhotoSlots(prev => {
      const removed = prev[idx];
      if (removed && removed.kind === "pending" && removed.previewUrl){
        URL.revokeObjectURL(removed.previewUrl);
      }
      return prev.filter((_,i)=> i !== idx);
    });
  }

  // multi-menu picker: build [{label, sections:[{name,items}]}] groups.
  // Dedup item names within each menu (so an ingredient that appears in
  // two sections of the same menu only renders once - first occurrence wins).
  // Cross-menu duplicates are kept so e.g. a dessert and a main with the
  // same name can both be tapped independently.
  const menusForRest = menus[restId] || [];
  const menuGroups = menusForRest.map(m => {
    const seen = new Set();
    const sectionGroups = [];
    (m.sections || []).forEach(s => {
      const items = [];
      (s.items || []).forEach(it => {
        const key = (it.name || "").trim().toLowerCase();
        if (!key || seen.has(key)) return;
        seen.add(key);
        items.push(it.name);
      });
      if (items.length > 0){
        sectionGroups.push({ name:s.name || "", items:items });
      }
    });
    const total = sectionGroups.reduce((n,s)=> n + s.items.length, 0);
    return { label:m.label || "Menu", sections:sectionGroups, total:total };
  }).filter(g => g.total > 0);
  const dishNames = dishes.map(d => d.name);

  function addDish(name){
    const n = (name || "").trim();
    if (!n) return;
    if (dishNames.indexOf(n) !== -1) return;       // avoid duplicates
    // verdict: per-dish memory for "should I order this again?"
    //   null (unset) | "again" (loved it) | "skip" (not again)
    setDishes(d => d.concat([{ name:n, note:"", verdict:null }]));
    setDishInput("");
  }
  function removeDish(name){ setDishes(d => d.filter(x => x.name !== name)); }
  // toggle a dish's verdict; tapping the active verdict again clears it
  function setVerdict(name, v){
    setDishes(d => d.map(x => x.name === name
      ? Object.assign({}, x, { verdict: x.verdict === v ? null : v })
      : x));
  }

  function submit(){
    if (!restId) return;
    const r = restaurants.find(x => x.id === restId);
    const vid = existing ? existing.id : uid("visit");

    // Compute final paths and pending uploads. Pending blobs each get a
    // fresh short photo_id so deletes don't shift any other photo's path
    // (every photo file is at a unique stable path for its lifetime).
    const finalPaths = [];
    const pendingUploads = [];
    photoSlots.forEach(s => {
      if (s.kind === "existing"){
        finalPaths.push(s.path);
      } else if (s.kind === "pending"){
        const photoId = "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
        const path = visitPhotoPath(vid, photoId);
        finalPaths.push(path);
        pendingUploads.push({ path:path, blob:s.blob });
      }
    });

    const rec = {
      id: vid,
      restaurant_id: restId,
      restaurant_name: r ? r.name : "",          // snapshot, survives restaurant deletion
      date: date || todayISO(),
      rating: rating,
      dishes: dishes,
      notes: notes.trim(),
      photos: finalPaths,
      nutrition: nutrition || null,              // meal-photo estimate (or null)
      logged_at: existing ? existing.logged_at : Date.now(),
    };
    onSave(rec, { pendingUploads: pendingUploads });
  }

  if (!restaurants.length){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}>Close</button>
          <h2>Log a visit</h2><span style={{width:40}} />
        </div>
        <div className="ovbody">
          <div className="empty">
            <div className="big">Add a restaurant first</div>
            <div>You need at least one saved place before logging a visit.</div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="overlay">
      {conflict && (
        <div className="modal-bg" onClick={()=> setConflict(null)}>
          <div className="modal" onClick={e=> e.stopPropagation()}>
            <div className="modal-title">"{conflict.dishName}" already has an estimate</div>
            <div className="modal-body">
              On the menu it's currently <strong>
              {(conflict.existing.source==="photo_estimate"||conflict.existing.source==="menu_estimate") ? "~" : ""}
              {conflict.existing.kcal} cal</strong>
              {conflict.existing.source==="menu_stated" ? " (per menu)"
                : conflict.existing.source==="manual" ? " (entered by you)"
                : conflict.existing.source==="photo_estimate" ? " (from a photo)"
                : " (estimated)"}. Your new photo estimate is <strong>~{conflict.incoming.kcal} cal</strong>.
            </div>
            <div className="modal-actions">
              <button className="btn ghost" onClick={resolveConflictKeepCurrent}>Keep current</button>
              <button className="btn primary" onClick={resolveConflictUsePhoto}>Use photo estimate</button>
            </div>
          </div>
        </div>
      )}
      <div className="ovhead">
        <button className="x" onClick={onClose}>Cancel</button>
        <h2>{existing ? "Edit visit" : "Log a visit"}</h2>
        <button className="x" onClick={submit}
          style={{color:restId?"var(--accent)":"var(--text-faint)"}}>Save</button>
      </div>
      <div className="ovbody">
        <label className="fld"><span className="lbl">Restaurant</span>
          <select className="input" value={restId} onChange={e=>setRestId(e.target.value)}>
            {restaurants.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
        </label>

        <label className="fld"><span className="lbl">Date</span>
          <input className="input" type="date" value={date}
            onChange={e=>setDate(e.target.value)} />
        </label>

        <div className="fld">
          <span className="lbl">Rating</span>
          <div className="row" style={{gap:6}}>
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={()=> setRating(n===rating ? 0 : n)}>
                <Icon name="star" size={32} color={n<=rating ? "#e7b24c" : "#3a3128"} />
              </button>
            ))}
          </div>
        </div>

        {/* Photos - up to 3 per visit. Placed high in the form (right after
            rating) so it isn't buried under the long dish picker. */}
        <div className="fld">
          <span className="lbl">
            Photos <span className="faint" style={{fontWeight:400}}>
              ({photoSlots.length} / {MAX_PHOTOS})
            </span>
          </span>
          <input ref={photoFileRef} type="file" accept="image/*" multiple
            style={{display:"none"}} onChange={onVisitPhotoFiles} />
          <div className="visit-photos">
            {photoSlots.map((s, i) => (
              <div key={i} className="visit-photo">
                {s.kind === "pending" && s.previewUrl && (
                  <img className="photo-img" src={s.previewUrl} alt="" />
                )}
                {s.kind === "existing" && cfg && (
                  <PhotoImg cfg={cfg} path={s.path} />
                )}
                <div className="photo-remove" onClick={()=> removePhotoSlot(i)}>
                  <Icon name="close" size={14} color="#e8dac6" />
                </div>
              </div>
            ))}
            {photoSlots.length < MAX_PHOTOS && (
              <div className="photo-slot"
                onClick={()=> { if (!photoBusy) photoFileRef.current.click(); }}>
                <div>
                  <div className="ic"><Icon name="plus" size={20} color="#80715f" /></div>
                  <div>{photoSlots.length ? "Add" : "Add photos"}</div>
                </div>
              </div>
            )}
          </div>
          {photoBusy && (
            <div className="tiny faint" style={{marginTop:6}}>Preparing photo&hellip;</div>
          )}
          {!photoBusy && photoSlots.some(s => s.kind === "pending") && (
            <div className="tiny faint" style={{marginTop:6}}>
              {photoSlots.filter(s => s.kind === "pending").length} new photo(s) will
              upload when you tap Save.
            </div>
          )}
        </div>

        {/* Meal nutrition - estimate from a photo. Informative & celebratory,
            never restrictive: no targets, no budgets, no warnings. */}
        <div className="fld">
          <span className="lbl">
            Nutrition <span className="faint" style={{fontWeight:400}}>(estimate from a photo)</span>
          </span>
          <input ref={nutFileRef} type="file" accept="image/*"
            style={{display:"none"}} onChange={onPickNutritionPhoto} />

          {!nutrition && (
            <div>
              <button className="btn ghost" disabled={nutBusy}
                onClick={()=> { if (!nutBusy && nutFileRef.current) nutFileRef.current.click(); }}>
                {nutBusy ? <span className="spin" /> : <Icon name="sparkle" size={16} />}
                {nutBusy ? "Estimating..." : "Estimate from a photo"}
              </button>
              <div className="tiny faint" style={{marginTop:6}}>
                Snap your plate and Claude estimates calories and macros - just for
                memory and curiosity.
              </div>
            </div>
          )}

          {nutErr && <div className="ask-err" style={{marginTop:8}}>{nutErr}</div>}

          {nutrition && (
            <div className="card nutri">
              <div className="row between" style={{alignItems:"baseline"}}>
                <div className="nutri-kcal">
                  {(nutrition.source==="photo_estimate"||nutrition.source==="menu_estimate") ? "~" : ""}
                  {nutrition.kcal}<span className="nutri-kcal-u"> cal</span>
                </div>
                <div className="row" style={{gap:6,flex:"none"}}>
                  <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                    title="Re-estimate from a new photo"
                    onClick={()=> { if (!nutBusy && nutFileRef.current) nutFileRef.current.click(); }}>
                    {nutBusy ? <span className="spin" /> : <Icon name="camera" size={15} />}
                  </button>
                  <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                    title={nutEdit ? "Done" : "Edit numbers"}
                    onClick={()=> nutEdit ? commitNutEdit() : startNutEdit()}>
                    <Icon name={nutEdit ? "check" : "edit"} size={15} />
                  </button>
                  <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                    title="Remove" onClick={removeNutrition}>
                    <Icon name="trash" size={15} color="#80715f" />
                  </button>
                </div>
              </div>

              {!nutEdit && (
                <div className="nutri-macros">
                  <span><b>{nutrition.protein_g}g</b> protein</span>
                  <span><b>{nutrition.carbs_g}g</b> carbs</span>
                  <span><b>{nutrition.fat_g}g</b> fat</span>
                </div>
              )}

              {nutEdit && (
                <div className="nutri-edit">
                  <label>cal<input className="input" type="number" inputMode="numeric"
                    value={nutrition.kcal} onChange={e=> setNutNum("kcal", e.target.value)} /></label>
                  <label>protein (g)<input className="input" type="number" inputMode="numeric"
                    value={nutrition.protein_g} onChange={e=> setNutNum("protein_g", e.target.value)} /></label>
                  <label>carbs (g)<input className="input" type="number" inputMode="numeric"
                    value={nutrition.carbs_g} onChange={e=> setNutNum("carbs_g", e.target.value)} /></label>
                  <label>fat (g)<input className="input" type="number" inputMode="numeric"
                    value={nutrition.fat_g} onChange={e=> setNutNum("fat_g", e.target.value)} /></label>
                  <label className="wide">ingredients
                    <input className="input" value={nutIngStr}
                      onChange={e=> setNutIngStr(e.target.value)}
                      placeholder="comma, separated, list" /></label>
                </div>
              )}

              {!nutEdit && nutrition.ingredients && nutrition.ingredients.length > 0 && (
                <div className="chips" style={{marginTop:10}}>
                  {nutrition.ingredients.map((ing,i)=> <span key={i} className="chip">{ing}</span>)}
                </div>
              )}

              <div className="nutri-foot">
                {nutrition.source === "manual" ? "Edited by you" : "Estimated from photo"}
                {nutrition.source !== "manual" && nutrition.confidence
                  ? " - " + nutrition.confidence + " confidence" : ""}
              </div>
              {nutrition.note && !nutEdit && (
                <div className="tiny faint" style={{marginTop:4}}>{nutrition.note}</div>
              )}
            </div>
          )}
        </div>

        <div className="fld">
          <span className="lbl">What you had</span>
          <div className="row" style={{gap:8}}>
            <input className="input" value={dishInput}
              onChange={e=>setDishInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addDish(dishInput); } }}
              placeholder="Type a dish, then Add" />
            <button className="btn ghost sm" onClick={()=> addDish(dishInput)}
              style={{flex:"none"}}>Add</button>
          </div>
          {dishes.length > 0 && (
            <div style={{marginTop:6}}>
              <input ref={dishPhotoRef} type="file" accept="image/*"
                style={{display:"none"}} onChange={onDishPhotoPicked} />
              {dishes.map((d,i)=>(
                <div key={i} className="dish-item">
                  <div className="dish-row">
                    <span className="dish-row-name">{d.name}</span>
                    <div className="dish-verdict">
                      <button
                        className={"verdict-btn again" + (d.verdict==="again" ? " on" : "")}
                        onClick={()=> setVerdict(d.name, "again")}>Again</button>
                      <button
                        className={"verdict-btn skip" + (d.verdict==="skip" ? " on" : "")}
                        onClick={()=> setVerdict(d.name, "skip")}>Skip</button>
                    </div>
                    <button className="dish-row-x" onClick={()=> removeDish(d.name)}>
                      <Icon name="close" size={14} color="#80715f" />
                    </button>
                  </div>
                  <div className="dish-sub">
                    <button className="dish-cam" disabled={dishNutBusy[d.name]}
                      onClick={()=> startDishPhoto(d.name)}>
                      {dishNutBusy[d.name]
                        ? <span className="spin" />
                        : <Icon name="camera" size={13} color="#e0764a" />}
                      {dishNutBusy[d.name]
                        ? "Estimating..."
                        : (d.nutrition && d.nutrition.kcal
                            ? "~" + d.nutrition.kcal + " cal  -  retake"
                            : "Estimate from a photo")}
                    </button>
                    {dishNutErr[d.name] && <span className="dish-cam-err">{dishNutErr[d.name]}</span>}
                  </div>
                </div>
              ))}
              <div className="tiny faint" style={{marginTop:2,padding:"0 2px"}}>
                Tap <strong>Again</strong> or <strong>Skip</strong> to remember what
                to order next time. The camera estimates that dish from a photo.
              </div>
            </div>
          )}
          {menuGroups.length > 0 && (
            <div style={{marginTop:12}}>
              {menuGroups.map((g, gi) => (
                <div key={gi} style={{marginBottom: gi === menuGroups.length - 1 ? 0 : 14}}>
                  <div className="tiny faint" style={{marginBottom:6}}>
                    Tap from {g.label}:
                  </div>
                  {g.sections.map((s, si) => (
                    <div key={si}>
                      {/* show section header only when there are 2+ sections in
                          this menu - otherwise the menu label alone is context */}
                      {g.sections.length > 1 && (
                        <div className="section-subhead">{s.name || "Other"}</div>
                      )}
                      <div className="chips">
                        {s.items.map((n,i)=>(
                          <span key={i}
                            className={"chip pick" +
                              (dishNames.indexOf(n)!==-1 ? " on" : "")}
                            onClick={()=> dishNames.indexOf(n)!==-1
                              ? removeDish(n) : addDish(n)}>
                            {n}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>

        <label className="fld"><span className="lbl">Notes</span>
          <textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="How was it? Who were you with? Worth returning?" />
        </label>

        {onDelete && (
          !confirmDel ? (
            <button className="btn danger" onClick={()=> setConfirmDel(true)}>
              <Icon name="trash" size={17} />Delete this visit
            </button>
          ) : (
            <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)"}}>
              <div className="small" style={{marginBottom:11}}>Delete this visit permanently?</div>
              <div className="row" style={{gap:9}}>
                <button className="btn ghost" onClick={()=> setConfirmDel(false)}>Cancel</button>
                <button className="btn danger" onClick={onDelete}>Delete</button>
              </div>
            </div>
          )
        )}
        <div style={{height:24}} />
      </div>
    </div>
  );
}

/* ============================================================
   SCAN MENU FLOW
   step 1: pick photos  ->  step 2: digitizing  ->  step 3: review/save

   Three entry modes:
   - presetRestaurantId + presetMenuId : re-scan an existing menu (replace by id)
   - presetRestaurantId only           : add a new menu to that restaurant
   - neither                           : new restaurant OR pick existing, new menu
   ============================================================ */
// Menu-label pills shown on the scan-review screen. "Other..." is rendered
// separately at the end and focuses the text input rather than filling a value.
const LABEL_SUGGESTIONS = [
  "Main",
  // food side - time-progressed, then post-meal, then promotional
  "Food","Breakfast","Brunch","Lunch","Dinner","Late Night","Dessert","Happy Hour",
  // drinks side - catchall, then categories
  "Drinks","Cocktails","Beer","Wine","Whiskey","Spirits",
];

function ScanMenuFlow({config, restaurants, menus, presetRestaurantId, presetMenuId,
                       onClose, onSave}){
  // find the existing menu we're re-scanning (if any), to lock its label
  const presetMenu = (presetRestaurantId && presetMenuId)
    ? (menus[presetRestaurantId] || []).find(m => m.menu_id === presetMenuId)
    : null;

  const [step,setStep]         = useState("pick");      // pick | working | review | error
  const [previews,setPreviews] = useState([]);          // data URLs for thumbnails
  const [dataUrls,setDataUrls] = useState([]);          // resized data URLs for API
  const [errMsg,setErrMsg]     = useState("");
  const [result,setResult]     = useState(null);        // parsed menu
  const [restId,setRestId]     = useState(presetRestaurantId || "");
  const [newName,setNewName]   = useState("");
  const [label,setLabel]       = useState(presetMenu ? (presetMenu.label || "") : "");
  // Top-level save mode for multi-section new scans:
  //   "one"    -> save all sections as subsections of one menu named `label`
  //   "custom" -> per-section: each section has its own destination label;
  //               sections with the same label merge into one menu.
  // Re-scans and single-section scans always use `label` (no mode toggle).
  const [saveMode,setSaveMode]         = useState("one");
  // string[] aligned to result.sections, used only in "custom" mode
  const [sectionExtracts,setSectionExtracts] = useState([]);
  const fileRef     = useRef(null);
  const labelRef    = useRef(null);
  // refs for each section's input in custom mode (for the per-section Other... pill)
  const sectionInputRefs = useRef({});

  // when OCR completes, initialize per-section labels to the OCR-detected names
  // and reset save mode to the simple "one menu" default
  useEffect(()=>{
    if (!result) return;
    // Title-case the OCR-detected section names so they match the pill
    // labels (which are Title Case). Without this, "COCKTAILS" pre-filled
    // from OCR wouldn't merge with a section where the user tapped the
    // "Cocktails" pill, even though they mean the same destination.
    setSectionExtracts((result.sections || []).map(s => toTitleCase(s.name || "")));
    setSaveMode("one");
  },[result]);

  // tracks "processing M of N" status during onFiles so the UI can show
  // visible feedback while photos are being resized after iOS hands them over
  const [processing, setProcessing] = useState(null);  // {done, total} | null

  async function onFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    logMsg("SCAN","Selected " + files.length + " photo(s)");
    setProcessing({done:0, total:files.length});
    try {
      // Resize each file serially. After every file, push its thumbnail into
      // state - users see thumbnails populate one by one instead of all at the
      // end. This is the most visible part of the iOS post-conversion delay.
      for (let i=0; i<files.length; i++){
        const blob = await resizeImageToBlob(files[i], 1200, 0.82);
        const url  = await blobToDataUrl(blob);
        setDataUrls(d => d.concat([url]));
        setPreviews(p => p.concat([url]));
        setProcessing({done:i+1, total:files.length});
      }
      // small delay so the user sees the "done" state briefly before it clears
      setTimeout(()=> setProcessing(null), 350);
      // reset the input so the same file can be picked again if needed
      if (fileRef.current) fileRef.current.value = "";
    } catch(err){
      setProcessing(null);
      logMsg("ERROR","Photo processing failed: " + err.message);
      setErrMsg("Could not process a photo: " + err.message);
      setStep("error");
    }
  }

  async function runOcr(){
    if (!dataUrls.length) return;
    setStep("working");
    try {
      const parsed = await digitizeMenu(config, dataUrls);
      parsed.captured_date = todayISO();
      parsed.last_updated  = todayISO();
      parsed.source        = "photo_ocr";
      setResult(parsed);
      // pre-fill restaurant name field if the menu showed one
      if (!presetRestaurantId && parsed.restaurant_name){
        setNewName(parsed.restaurant_name);
      }
      const itemCount = parsed.sections.reduce((n,s)=> n + s.items.length, 0);
      logMsg("SCAN","Digitized " + parsed.sections.length + " sections, " +
                    itemCount + " items");
      setStep("review");
    } catch(err){
      logMsg("ERROR","Digitize failed: " + err.message);
      setErrMsg(err.message);
      setStep("error");
    }
  }

  // focus the freeform label input (used by the "Other..." pill)
  function focusOtherLabel(){
    setLabel("");
    setTimeout(()=> { if (labelRef.current) labelRef.current.focus(); }, 0);
  }

  function save(){
    let targetRestId  = restId;
    let newRestaurant = null;
    if (!targetRestId){
      // creating a new restaurant from the scan
      const nm = (newName || result.restaurant_name || "New restaurant").trim();
      targetRestId = uid("rest");
      newRestaurant = {
        id:targetRestId, name:nm, cuisine:"", location:"",
        address:"", phone:"", website:"", notes:"",
        favorite:false, added_date:todayISO(),
      };
      logMsg("SCAN","Creating new restaurant '" + nm + "' for scanned menu");
    }

    const isReplace = !!presetMenu;
    const sections  = result.sections || [];

    // ---- build the menus to save ----
    let menusToSave;
    if (isReplace){
      // re-scan: always single menu, replace existing by menu_id
      menusToSave = [{
        menu_id:       presetMenu.menu_id,
        label:         (label || "").trim() || presetMenu.label,
        restaurant_id: targetRestId,
        captured_date: presetMenu.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      sections,
        raw_text:      result.raw_text || "",
      }];
    } else if (sections.length >= 2 && saveMode === "custom"){
      // customize mode: group sections by destination label.
      // Same-label sections merge into one menu with multiple subsections.
      // Grouping is case-insensitive ("Cocktails" and "COCKTAILS" merge),
      // and the first-seen casing wins for the displayed menu label.
      const groups = new Map();           // lowercased label -> { label, sections[] }
      sections.forEach((s, i) => {
        const dest = (sectionExtracts[i] || "").trim();
        if (!dest) return;                // safety: blocked by canSave
        const key = dest.toLowerCase();
        if (!groups.has(key)){
          groups.set(key, { label: dest, sections: [] });
        }
        groups.get(key).sections.push(s);
      });
      menusToSave = Array.from(groups.values()).map(g => ({
        menu_id:       uid("menu"),
        label:         g.label,
        restaurant_id: targetRestId,
        captured_date: result.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      g.sections,
        raw_text:      "",
      }));
    } else {
      // "one menu" mode (or single-section): one menu containing all sections
      menusToSave = [{
        menu_id:       uid("menu"),
        label:         (label || "").trim() || "Menu",
        restaurant_id: targetRestId,
        captured_date: result.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      sections,
        raw_text:      result.raw_text || "",
      }];
    }

    logMsg("SCAN", (isReplace ? "Replacing menu (re-scan)" :
                   menusToSave.length > 1 ? "Adding " + menusToSave.length + " menus" :
                                            "Adding 1 menu") +
                  " to restaurant " + targetRestId);
    onSave(targetRestId, menusToSave, newRestaurant, isReplace);
  }

  // ---- review-step helpers ----
  const sectionCount = result ? (result.sections || []).length : 0;
  // top-level toggle is only shown for multi-section new scans
  const showModeToggle = !presetMenu && sectionCount >= 2;
  const inCustomMode   = showModeToggle && saveMode === "custom";

  // in custom mode every section needs a non-empty destination
  const allCustomLabeled = !inCustomMode || sectionExtracts.every(v =>
    (v || "").trim().length > 0);

  // build a live preview of the destination menus
  function previewDestinations(){
    if (!result) return [];
    if (presetMenu){
      return [{ label: (label || "").trim() || presetMenu.label || "Menu",
                sectionCount: sectionCount }];
    }
    if (!inCustomMode){
      // one-menu mode (or single-section): preview is just the one menu
      return [{ label: (label || "").trim() || "Menu",
                sectionCount: sectionCount }];
    }
    // case-insensitive grouping (same logic as save()): the lowercased
    // label is the merge key; the first-seen casing wins for display
    const groups = new Map();    // lowercased label -> { label, sectionCount }
    (result.sections || []).forEach((s, i) => {
      const dest = (sectionExtracts[i] || "").trim();
      if (!dest) return;
      const key = dest.toLowerCase();
      if (!groups.has(key)){
        groups.set(key, { label: dest, sectionCount: 0 });
      }
      groups.get(key).sectionCount++;
    });
    return Array.from(groups.values());
  }
  const previewMenus = previewDestinations();

  const canSave = !!result &&
    (restId || newName.trim() || (result && result.restaurant_name)) &&
    (inCustomMode
      ? allCustomLabeled && previewMenus.length > 0
      : !!(label || "").trim() || !!presetMenu);

  // "Other..." pill state for the single label input (one-menu / re-scan / 1-section)
  const trimmedLabel = label.trim();
  const otherActive = !!trimmedLabel &&
    LABEL_SUGGESTIONS.indexOf(trimmedLabel) === -1;

  // per-section helpers (custom mode)
  function setExtractAt(idx, v){
    setSectionExtracts(prev => {
      const next = prev.slice();
      next[idx] = v;
      return next;
    });
  }
  function focusSectionOther(idx){
    setExtractAt(idx, "");
    setTimeout(()=> {
      const el = sectionInputRefs.current[idx];
      if (el) el.focus();
    }, 0);
  }
  function isSectionOtherActive(v){
    const t = (v || "").trim();
    return !!t && LABEL_SUGGESTIONS.indexOf(t) === -1;
  }

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}>Cancel</button>
        <h2>{presetMenu ? "Re-scan " + (presetMenu.label || "menu") : "Scan a menu"}</h2>
        {step === "review"
          ? <button className="x" onClick={save}
              style={{color: canSave ? "var(--accent)" : "var(--text-faint)"}}>Save</button>
          : <span style={{width:40}} />}
      </div>
      <div className="ovbody">

        {step === "pick" && (
          <div>
            <div className="card small muted">
              {presetMenu
                ? "Photograph the menu - the new scan will replace the current " +
                  presetMenu.label + " menu for this restaurant."
                : "Take clear, straight-on photos of the menu. Multiple pages of " +
                  "the same menu are fine - add them all and they merge."}
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple
              style={{display:"none"}} onChange={onFiles} />
            <button className="btn ghost" onClick={()=> fileRef.current.click()}
              disabled={!!processing}>
              <Icon name="camera" size={18} />
              {previews.length ? "Add more photos" : "Choose / take photos"}
            </button>
            <div className="tiny faint" style={{marginTop:6,padding:"0 2px"}}>
              On iPhone, picking many photos at once can pause for several
              seconds while iOS converts them &mdash; this is normal. If it
              hangs, cancel and pick 1&ndash;2 at a time.
            </div>
            {processing && (
              <div className="photo-progress">
                Processing photo {processing.done} of {processing.total}&hellip;
              </div>
            )}
            {previews.length > 0 && (
              <div className="photo-grid">
                {previews.map((u,i)=> (
                  <div key={i} style={{position:"relative",display:"inline-block"}}>
                    <img className="pth" src={u} alt="" />
                    <div className="photo-remove"
                      onClick={()=>{
                        setPreviews(p => p.filter((_,j)=> j !== i));
                        setDataUrls(d => d.filter((_,j)=> j !== i));
                      }}>
                      <Icon name="close" size={14} color="#e8dac6" />
                    </div>
                  </div>
                ))}
              </div>
            )}
            {previews.length > 0 && (
              <button className="btn primary" style={{marginTop:16}} onClick={runOcr}
                disabled={!!processing}>
                Digitize {previews.length} photo(s)
              </button>
            )}
          </div>
        )}

        {step === "working" && (
          <div className="empty" style={{paddingTop:"22vh"}}>
            <div className="spin" style={{margin:"0 auto 16px"}} />
            <div className="big">Reading the menu</div>
            <div>Claude is digitizing your photos. This usually takes 10-30 seconds.</div>
          </div>
        )}

        {step === "error" && (
          <div>
            <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)"}}>
              <div style={{fontWeight:600,marginBottom:6}}>Something went wrong</div>
              <div className="small muted">{errMsg}</div>
            </div>
            <button className="btn ghost" onClick={()=> setStep("pick")}>Back to photos</button>
          </div>
        )}

        {step === "review" && result && (
          <div>
            <div className="card small muted">
              Review the digitized menu, choose which restaurant it belongs to,
              then name it.
            </div>

            <label className="fld"><span className="lbl">Save menu to</span>
              <select className="input" value={restId}
                onChange={e=> setRestId(e.target.value)}
                disabled={!!presetRestaurantId}>
                <option value="">+ New restaurant from this menu</option>
                {restaurants.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </label>
            {!restId && (
              <label className="fld"><span className="lbl">New restaurant name</span>
                <input className="input" value={newName}
                  onChange={e=> setNewName(e.target.value)}
                  placeholder="Restaurant name" />
              </label>
            )}

            {/* ===== top-level toggle, only for multi-section new scans ===== */}
            {showModeToggle && (
              <div className="card" style={{padding:"12px 14px",marginTop:4}}>
                <div className="small" style={{fontWeight:600,marginBottom:8}}>
                  How to save
                </div>
                <label className="row" style={{gap:10,marginBottom:8,alignItems:"flex-start"}}>
                  <input type="radio" checked={saveMode === "one"}
                    onChange={()=> setSaveMode("one")}
                    style={{marginTop:3}} />
                  <span className="small">
                    <strong>One menu</strong> &mdash; save all {sectionCount} detected
                    sections as subsections of a single menu.
                  </span>
                </label>
                <label className="row" style={{gap:10,alignItems:"flex-start"}}>
                  <input type="radio" checked={saveMode === "custom"}
                    onChange={()=> setSaveMode("custom")}
                    style={{marginTop:3}} />
                  <span className="small">
                    <strong>Customize each section</strong> &mdash; assign each section
                    its own destination. Sections sharing the same name merge into
                    one menu with multiple subsections.
                  </span>
                </label>
              </div>
            )}

            {/* ===== ONE-MENU PATH: single label input ===== */}
            {/* (covers: re-scan, 1-section new scan, and 2+ sections in "one" mode) */}
            {(!showModeToggle || saveMode === "one") && (
              <label className="fld">
                <span className="lbl">
                  Menu name {presetMenu &&
                    <span className="faint">(re-scanning {presetMenu.label})</span>}
                </span>
                <input ref={labelRef} className="input" value={label}
                  onChange={e=> setLabel(e.target.value)}
                  placeholder={presetMenu
                    ? presetMenu.label
                    : "e.g. Food, Cocktails, Whiskey..."}
                  disabled={!!presetMenu} />
                {!presetMenu && (
                  <div className="chips" style={{marginTop:8}}>
                    {LABEL_SUGGESTIONS.map(s => (
                      <span key={s}
                        className={"chip pick" + (label === s ? " on" : "")}
                        onClick={()=> setLabel(s)}>{s}</span>
                    ))}
                    <span
                      className={"chip pick" + (otherActive ? " on" : "")}
                      onClick={focusOtherLabel}>
                      Other...
                    </span>
                  </div>
                )}
              </label>
            )}

            {/* ===== CUSTOMIZE PATH: per-section labels (no fold button) ===== */}
            {inCustomMode && (
              <div>
                {/* live preview at TOP so merges are visible as you make them */}
                {previewMenus.length > 0 && (
                  <div className="card" style={{
                    padding:"10px 14px",marginTop:4,
                    border:"1px solid rgba(224,118,74,0.35)"
                  }}>
                    <div className="tiny faint" style={{
                      textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6
                    }}>
                      Saving {previewMenus.length} menu{previewMenus.length === 1 ? "" : "s"}
                    </div>
                    {previewMenus.map((p, i) => (
                      <div key={i} className="small" style={{padding:"3px 0"}}>
                        &middot; <strong>{p.label}</strong>
                        <span className="faint">
                          {" "}({p.sectionCount} section{p.sectionCount === 1 ? "" : "s"})
                        </span>
                      </div>
                    ))}
                  </div>
                )}

                <div className="divider-label" style={{marginTop:16}}>
                  Sections detected ({sectionCount})
                </div>
                <div className="small muted" style={{marginBottom:10,padding:"0 2px"}}>
                  Give each section a destination name. Sections sharing the same
                  name (e.g. tap <strong>Cocktails</strong> on two sections) merge
                  into one menu with multiple subsections.
                </div>

                {(result.sections || []).map((s,i) => {
                  const ext = sectionExtracts[i] || "";
                  const itemCount = (s.items || []).length;
                  return (
                    <div key={i} className="card" style={{
                      padding:"12px 14px",marginBottom:8,
                      borderColor:"rgba(224,118,74,0.25)"
                    }}>
                      <div style={{marginBottom:8}}>
                        <div className="small" style={{fontWeight:600}}>
                          {s.name || "Section"}
                        </div>
                        <div className="tiny faint" style={{marginTop:2}}>
                          {itemCount} item{itemCount === 1 ? "" : "s"}
                        </div>
                      </div>
                      <input
                        ref={el => { sectionInputRefs.current[i] = el; }}
                        className="input"
                        value={ext}
                        onChange={e=> setExtractAt(i, e.target.value)}
                        placeholder={s.name || "Menu name"} />
                      <div className="chips" style={{marginTop:8}}>
                        {LABEL_SUGGESTIONS.map(p => (
                          <span key={p}
                            className={"chip pick" + (ext === p ? " on" : "")}
                            onClick={()=> setExtractAt(i, p)}>{p}</span>
                        ))}
                        <span
                          className={"chip pick" +
                            (isSectionOtherActive(ext) ? " on" : "")}
                          onClick={()=> focusSectionOther(i)}>
                          Other...
                        </span>
                      </div>
                    </div>
                  );
                })}

                {!allCustomLabeled && (
                  <div className="tiny faint" style={{marginTop:6,padding:"0 2px"}}>
                    Every section needs a destination name before you can save.
                  </div>
                )}
              </div>
            )}

            <div className="divider-label">
              Preview &middot; {sectionCount} section(s)
            </div>
            <div className="card" style={{padding:"6px 14px 10px"}}>
              <MenuView menu={result} />
            </div>
            <button className="btn primary" onClick={save} disabled={!canSave}
              style={{marginTop:8}}>
              <Icon name="check" size={18} color="#1b1714" />
              {presetMenu
                ? "Replace " + presetMenu.label + " menu"
                : previewMenus.length > 1
                  ? "Save " + previewMenus.length + " menus"
                  : "Save this menu"}
            </button>
            <div style={{height:20}} />
          </div>
        )}

      </div>
    </div>
  );
}

/* ============================================================
   SETTINGS VIEW
   ============================================================ */
function SettingsView({config, onEdit, counts, lastSync, onResync,
                       locations, restaurants,
                       onAddLocation, onRenameLocation, onDeleteLocation,
                       onCheckUpdate, updMsg, updateVersion, onApplyUpdate}){
  const [showLog,setShowLog] = useState(false);
  const [, force] = useState(0);
  const [newLoc,setNewLoc] = useState("");
  const [editing,setEditing] = useState(null);    // {name, draft}
  const usageCount = (name)=> (restaurants || []).filter(r => r.location === name).length;

  return (
    <div>
      <div className="card">
        <div className="between">
          <div>
            <div style={{fontWeight:600}}>Connection</div>
            <div className="tiny faint" style={{marginTop:3}}>
              GitHub repo & API key
            </div>
          </div>
          <button className="btn ghost sm" onClick={onEdit}>Edit</button>
        </div>
        <div className="small muted" style={{marginTop:12,lineHeight:1.8}}>
          GitHub user: <b style={{color:"var(--text)"}}>{config.githubUser}</b><br/>
          Repository: <b style={{color:"var(--text)"}}>{config.githubRepo}</b><br/>
          GitHub token: <b style={{color:"var(--text)"}}>
            {config.githubToken ? "set" : "missing"}</b><br/>
          Anthropic key: <b style={{color:"var(--text)"}}>
            {config.anthropicKey ? "set" : "missing"}</b>
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600,marginBottom:4}}>Locations</div>
        <div className="tiny faint" style={{marginBottom:12}}>
          Cities you visit. Used to tag and filter restaurants.
        </div>
        {(locations || []).length === 0 ? (
          <div className="small faint" style={{padding:"2px 2px 12px"}}>
            No locations yet - add your first city below.
          </div>
        ) : (
          <div style={{marginBottom:10}}>
            {locations.map(loc => {
              const isEditing = editing && editing.name === loc;
              const used = usageCount(loc);
              return (
                <div key={loc} style={{
                  display:"flex", alignItems:"center", gap:8,
                  padding:"8px 0", borderBottom:"1px solid var(--line-soft)"
                }}>
                  {isEditing ? (
                    <input className="input" value={editing.draft}
                      onChange={e=> setEditing({name:loc, draft:e.target.value})}
                      style={{flex:1}} autoFocus />
                  ) : (
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:500}}>{loc}</div>
                      <div className="tiny faint" style={{marginTop:2}}>
                        {used} restaurant(s)
                      </div>
                    </div>
                  )}
                  {isEditing ? (
                    <React.Fragment>
                      <button className="btn ghost sm" onClick={()=> setEditing(null)}
                        style={{flex:"none"}}>Cancel</button>
                      <button className="btn primary sm" style={{flex:"none"}}
                        onClick={()=>{ onRenameLocation(loc, editing.draft); setEditing(null); }}>
                        Save
                      </button>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <button className="btn ghost sm" style={{flex:"none"}}
                        onClick={()=> setEditing({name:loc, draft:loc})}>
                        <Icon name="edit" size={15} />
                      </button>
                      <button className="btn ghost sm" style={{flex:"none",
                        opacity: used > 0 ? 0.4 : 1}}
                        onClick={()=> onDeleteLocation(loc)}
                        title={used > 0 ? "In use - move restaurants first" : "Delete"}>
                        <Icon name="trash" size={15} color={used>0 ? "#80715f" : "#d9604e"} />
                      </button>
                    </React.Fragment>
                  )}
                </div>
              );
            })}
          </div>
        )}
        <div className="row" style={{gap:8,marginTop:6}}>
          <input className="input" value={newLoc}
            onChange={e=> setNewLoc(e.target.value)}
            onKeyDown={e=>{
              if (e.key === "Enter"){
                e.preventDefault();
                if (newLoc.trim()){ onAddLocation(newLoc); setNewLoc(""); }
              }
            }}
            placeholder="Add a city (e.g. Dallas)" />
          <button className="btn ghost sm" style={{flex:"none"}}
            onClick={()=>{ if (newLoc.trim()){ onAddLocation(newLoc); setNewLoc(""); } }}>
            Add
          </button>
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:600,marginBottom:8}}>Your data</div>
        <div className="small muted" style={{lineHeight:1.9}}>
          Restaurants: {counts.r}<br/>
          Saved menus: {counts.m}<br/>
          Logged visits: {counts.v}<br/>
          Locations: {(locations || []).length}<br/>
          Last sync: {lastSync ? new Date(lastSync).toLocaleString() : "not yet"}
        </div>
        <button className="btn ghost sm" onClick={onResync} style={{marginTop:12}}>
          Sync now
        </button>
      </div>

      <div className="card">
        <div className="between" onClick={()=> setShowLog(s=>!s)} style={{cursor:"pointer"}}>
          <div style={{fontWeight:600}}>Diagnostics</div>
          <Icon name={showLog ? "chevd" : "chev"} size={17} color="#80715f" />
        </div>
        {showLog && (
          <div style={{marginTop:11}}>
            <div className="row" style={{justifyContent:"flex-end",marginBottom:8}}>
              <button className="btn ghost sm" onClick={()=> force(x=>x+1)}>Refresh</button>
            </div>
            <div className="logbox">
              {LOG_BUFFER.length
                ? LOG_BUFFER.slice(-80).join("\n")
                : "No log entries yet."}
            </div>
          </div>
        )}
      </div>

      <div className="updrow">
        {updateVersion ? (
          <button className="btn primary sm" onClick={onApplyUpdate}>
            <Icon name="check" size={15} color="#1b1714" />
            Update to v{updateVersion}
          </button>
        ) : (
          <button className="btn ghost sm" onClick={onCheckUpdate}>
            Check for updates
          </button>
        )}
        {updMsg && <span className="tiny faint">{updMsg}</span>}
      </div>

      <div className="tiny faint" style={{textAlign:"center",padding:"8px 0 4px"}}>
        Dining Log v{APP_VERSION}
      </div>
    </div>
  );
}

/* ============================================================
   SETUP SCREEN  (first run + Settings > Edit)
   ============================================================ */
function SetupScreen({initial, onSave, onClose, asOverlay}){
  const [ghUser,setGhUser]   = useState(initial ? initial.githubUser : "");
  const [ghRepo,setGhRepo]   = useState(initial ? initial.githubRepo : "");
  const [ghTok,setGhTok]     = useState(initial ? initial.githubToken : "");
  const [anKey,setAnKey]     = useState(initial ? initial.anthropicKey : "");
  const [busy,setBusy]       = useState(false);
  const [err,setErr]         = useState("");

  async function verifyAndSave(){
    setErr("");
    if (!ghUser.trim() || !ghRepo.trim() || !ghTok.trim() || !anKey.trim()){
      setErr("All four fields are required."); return;
    }
    setBusy(true);
    const cfg = {
      githubUser:ghUser.trim(), githubRepo:ghRepo.trim(),
      githubToken:ghTok.trim(), anthropicKey:anKey.trim(),
    };
    // quick check: can we reach the repo with this token?
    try {
      logMsg("SETUP","Verifying GitHub repo access");
      const res = await fetch(GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo,{
        headers:{ "Authorization":"Bearer " + cfg.githubToken,
                  "Accept":"application/vnd.github+json" },
      });
      if (res.status === 404){
        setErr("Repo not found. Check the username and repository name.");
        setBusy(false); return;
      }
      if (res.status === 401){
        setErr("GitHub token rejected. Check the token value and its permissions.");
        setBusy(false); return;
      }
      if (!res.ok){
        setErr("GitHub check failed (" + res.status + ")."); setBusy(false); return;
      }
      logMsg("SETUP","GitHub repo verified");
    } catch(e){
      logMsg("ERROR","Setup verification network error: " + e.message);
      setErr("Network error reaching GitHub. Check your connection.");
      setBusy(false); return;
    }
    setBusy(false);
    onSave(cfg);
  }

  const body = (
    <div className="ovbody">
      {!asOverlay && (
        <div style={{marginBottom:18}}>
          <h2 style={{fontSize:26}}>Welcome</h2>
          <div className="small muted" style={{marginTop:6}}>
            Dining Log keeps your restaurants, menus and visits in your own
            GitHub repo so they sync across devices. Enter your details once.
          </div>
        </div>
      )}
      <label className="fld"><span className="lbl">GitHub username</span>
        <input className="input" value={ghUser} onChange={e=>setGhUser(e.target.value)}
          autoCapitalize="none" placeholder="your-github-username" /></label>
      <label className="fld"><span className="lbl">Repository name</span>
        <input className="input" value={ghRepo} onChange={e=>setGhRepo(e.target.value)}
          autoCapitalize="none" placeholder="dining-log" /></label>
      <label className="fld"><span className="lbl">GitHub token (fine-grained)</span>
        <input className="input" type="password" value={ghTok}
          onChange={e=>setGhTok(e.target.value)} autoCapitalize="none"
          placeholder="github_pat_..." /></label>
      <label className="fld"><span className="lbl">Anthropic API key</span>
        <input className="input" type="password" value={anKey}
          onChange={e=>setAnKey(e.target.value)} autoCapitalize="none"
          placeholder="sk-ant-..." /></label>

      <div className="card tiny muted" style={{lineHeight:1.7}}>
        These values are stored only in this browser (localStorage on this
        device). They are sent directly to GitHub and Anthropic and nowhere else.
      </div>
      {err && (
        <div className="syncbar err" style={{margin:"0 0 14px"}}>
          <span className="dot" style={{background:"var(--danger)"}} />{err}
        </div>
      )}
      <button className="btn primary" disabled={busy} onClick={verifyAndSave}>
        {busy ? <span className="spin" /> : <Icon name="check" size={18} color="#1b1714" />}
        {busy ? "Verifying..." : "Verify & save"}
      </button>
      <div style={{height:24}} />
    </div>
  );

  if (asOverlay){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}>Cancel</button>
          <h2>Settings</h2><span style={{width:40}} />
        </div>
        {body}
      </div>
    );
  }
  return (
    <div id="app-shell">
      <div className="topbar"><h1>Dining Log</h1>
        <div className="sub">First-time setup</div></div>
      {body}
    </div>
  );
}

/* ---- mount --------------------------------------------------- */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
logMsg("INIT","React mounted");
  </script>
</body>
