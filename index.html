function ProCard({config}){
  const [bill,setBill] = useState(null);   // /api/billing/status payload
  const [busy,setBusy] = useState("");     // which button is working
  const [err,setErr]   = useState("");
  const [showCode,setShowCode] = useState(false);  // friends & family code UI
  const [codeText,setCodeText] = useState("");
  const [codeBusy,setCodeBusy] = useState(false);
  const [codeMsg,setCodeMsg]   = useState("");

  async function redeemCode(){
    const code = codeText.trim();
    if (!code || codeBusy) return;
    setCodeBusy(true); setCodeMsg("");
    logMsg("COMP","Redeeming friends & family code");
    try {
      const headers = await authHeaders(config);
      headers["Content-Type"] = "application/json";
      const res = await fetch(apiBase(config) + "/api/account/redeem-code", {
        method:"POST", headers, body: JSON.stringify({ code }),
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok){
        const msg = (data && data.detail) || ("Could not redeem (" + res.status + ")");
        logMsg("COMP","Redeem refused: " + msg);
        setCodeMsg(msg); setCodeBusy(false); return;
      }
      logMsg("COMP","Code redeemed - Pro until " + (data.until || "?"));
      setCodeBusy(false); setShowCode(false); setCodeText("");
      // Refetch so the card flips to Pro immediately.
      fetchBillingStatus(config)
        .then(d=> setBill(d))
        .catch(e=> logMsg("BILLING","Status refetch failed: " + e.message));
    } catch(err2){
      logMsg("ERROR","Redeem network failure: " + err2.message);
      setCodeMsg("Network error - try again.");
      setCodeBusy(false);
    }
  }

  useEffect(()=>{
    let alive = true;
    const load = ()=>{
      fetchBillingStatus(config)
        .then(d=>{ if (alive) setBill(d); })
        .catch(e=>{ logMsg("BILLING","Status fetch failed: " + e.message); });
    };
    load();
    // WHY: returning from the Stripe sheet (portal/checkout) does not
    // remount this card. Refetch when the app becomes visible again so
    // changes made in the portal show up without an app restart - and
    // clear any busy state as a second safety net for the stuck spinner.
    const onVis = ()=>{
      if (document.visibilityState === "visible"){ setBusy(""); load(); }
    };
    document.addEventListener("visibilitychange", onVis);
    return ()=>{
      alive = false;
      document.removeEventListener("visibilitychange", onVis);
    };
    // eslint-disable-next-line
  },[]);

  async function go(kind){
    setErr(""); setBusy(kind);
    try {
      if (kind === "portal") await openBillingPortal(config);
      else await startCheckout(config, kind);
      // WHY reset: on an installed iOS app, Stripe opens as a sheet ON TOP
      // of this page - the app keeps running underneath. Without this,
      // closing the sheet with the X returns to a forever-spinning,
      // disabled button. In a normal browser tab the page has already
      // navigated away, so the timeout is harmless there.
      setTimeout(()=> setBusy(""), 1500);
    } catch(e){
      setErr(e.message);
      setBusy("");
    }
  }

  const fmtDate = (iso)=>{
    if (!iso) return "";
    try { return new Date(iso).toLocaleDateString(); } catch(e){ return ""; }
  };

  let body;
  if (!bill){
    body = <div className="tiny muted">Checking your plan...</div>;
  } else if (bill.owner){
    body = <div className="tiny muted">Pro - owner account.</div>;
  } else if (bill.tier === "pro" && bill.status === "comped"){
    // Friends & family comp: no Stripe customer exists, so no portal
    // button - and the copy reads as a courtesy, not a billing state.
    body = (
      <div className="tiny muted">
        Pro - friends &amp; family
        {bill.current_period_end ? " - until " + fmtDate(bill.current_period_end) : ""}
      </div>
    );
  } else if (bill.tier === "pro"){
    body = (
      <div>
        <div className="tiny muted" style={{marginBottom:10}}>
          Pro{bill.plan ? " - " + (bill.plan === "yearly" ? "$19.99/year" : "$2.99/month") : ""}
          {bill.current_period_end ? (bill.cancel_at_period_end ? " - ends " : " - renews ") + fmtDate(bill.current_period_end) : ""}
        </div>
        <button className="btn" disabled={!!busy} onClick={()=>go("portal")}>
          {busy === "portal" ? <span className="spin" /> : null}
          Manage subscription
        </button>
      </div>
    );
  } else {
    const used = bill.calls_used || 0, cap = bill.calls_cap || 75;
    body = (
      <div>
        <div className="tiny muted" style={{marginBottom:10}}>
          Free plan - {used} of {cap} AI uses this month.
        </div>
        <div style={{marginBottom:12}}>
          {[
            "Unlimited menu scans, calorie estimates & ordering help",
            "Near me - discover places around you",
            "Expense reports - turn a check into a clean PDF",
          ].map((f,i)=>(
            <div key={i} className="small" style={{display:"flex", gap:8, alignItems:"flex-start", marginBottom:5}}>
              <span style={{color:"var(--accent)", fontWeight:700, lineHeight:1.4}}>✓</span>
              <span style={{color:"var(--text-dim)", lineHeight:1.4}}>{f}</span>
            </div>
          ))}
        </div>
        <button className="btn primary" style={{marginBottom:8}}
          disabled={!!busy} onClick={()=>go("yearly")}>
          {busy === "yearly" ? <span className="spin" /> : null}
          Go Pro - $19.99/year
        </button>
        <button className="btn" disabled={!!busy} onClick={()=>go("monthly")}>
          {busy === "monthly" ? <span className="spin" /> : null}
          $2.99/month
        </button>
        {!showCode ? (
          <div className="tiny" style={{marginTop:10, textAlign:"center"}}>
            <a href="#" onClick={(e)=>{ e.preventDefault(); setShowCode(true); }}>
              Have a code?
            </a>
          </div>
        ) : (
          <div style={{marginTop:12}}>
            <label className="fld"><span className="lbl">Friends &amp; family code</span>
              <input className="input" value={codeText}
                onChange={e=>{ setCodeText(e.target.value); setCodeMsg(""); }}
                autoCapitalize="characters" autoComplete="off"
                placeholder="YOUR-CODE" /></label>
            {codeMsg && (
              <div className="small" style={{color:"#e7a99e", marginBottom:8}}>{codeMsg}</div>
            )}
            <button className="btn" style={{width:"100%"}}
              disabled={codeBusy || !codeText.trim()} onClick={redeemCode}>
              {codeBusy ? <span className="spin" /> : null}
              Redeem code
            </button>
          </div>
        )}
      </div>
    );
  }

  const forced = getForcedTier();
  function simulate(v){
    setForcedTier(v);
    fetchBillingStatus(config).then(setBill).catch(()=>{});
  }

  return (
    <div className="card">
      <div style={{fontWeight:600, marginBottom:6}}>MenuCaptain Pro</div>
      {body}
      {bill && bill.owner && (
        <div style={{marginTop:12, paddingTop:12, borderTop:"1px solid var(--line-soft)"}}>
          <div className="tiny muted" style={{marginBottom:6}}>Owner testing</div>
          <button className={"btn sm " + (forced === "free" ? "primary" : "ghost")} style={{width:"100%"}}
            onClick={()=> simulate(forced === "free" ? "" : "free")}>
            {forced === "free" ? "Testing as Free — tap to return to Pro" : "Test as Free (non-Pro)"}
          </button>
          {forced === "free" && (
            <div className="tiny" style={{marginTop:6, color:"var(--accent)"}}>
              Gates across the app are showing the non-Pro experience.
            </div>
          )}
        </div>
      )}
      {err && (
        <div className="syncbar err" style={{margin:"10px 0 0"}}>
          <span className="dot" style={{background:"var(--danger)"}} />{err}
        </div>
      )}
    </div>
  );
}

// ---- Dining-history export (CSV + printable) -------------------------------
// All client-side; no backend. Captures every visit and every dish, plus the
// whole-plate (visit-level) estimate, so nothing logged is left out.

// Friendly label for a nutrition estimate's source, for the CSV column.
const EXPORT_SOURCE_LABEL = {
  menu_stated:    "menu (printed)",
  photo_estimate: "photo",
  menu_estimate:  "description",
  manual:         "entered",
  seed:           "starter",
};
function exportSourceLabel(n){
  if (!n || !n.source) return "";
  return EXPORT_SOURCE_LABEL[n.source] || n.source;
}
function exportVerdictLabel(v){ return v === "loved" ? "Loved" : v === "again" ? "Again" : v === "skip" ? "Skip" : ""; }
function exportPriceCell(p){
  if (p === null || p === undefined || p === "") return "";
  return String(p).trim();
}
function exportDateStamp(){
  try { return new Date().toISOString().slice(0,10); } catch(e){ return "export"; }
}

// Quote one CSV field: wrap in quotes and double any internal quotes. Always
// quoting keeps commas, newlines, and leading symbols safe in every tool.
function csvCell(v){
  const s = (v === null || v === undefined) ? "" : String(v);
  return '"' + s.replace(/"/g, '""') + '"';
}

// Build the dish-level CSV. One row per dish; a visit with a whole-plate
// estimate gets an extra "(whole plate)" row; a visit with nothing itemized
// still gets one row so it never vanishes. Newest first. BOM + CRLF for Excel.
function buildHistoryCsv(visits, restById){
  const COLS = ["Date","Restaurant","City","Cuisine","Place rating",
                "Dish","Verdict","Price","Calories","Protein (g)",
                "Carbs (g)","Fat (g)","Estimate source","Notes"];
  const rows = (visits || []).filter(v => v && v.date).slice().sort((a,b)=>{
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;   // newest date first
    return (b.logged_at || 0) - (a.logged_at || 0);           // newest logged first
  });
  const out = [COLS.map(csvCell).join(",")];
  let dishRows = 0, plateRows = 0, bareRows = 0;
  rows.forEach(v => {
    const r = restById ? restById(v.restaurant_id) : null;
    const restName = (r && r.name) || v.restaurant_name || "";
    const city     = (r && r.city) || "";
    const cuisine  = (r && r.cuisine) || "";
    const myr      = (r && typeof r.my_rating === "number") ? r.my_rating
                     : ((typeof v.rating === "number") ? v.rating : 0);   // place rating, legacy fallback
    const rating   = myr > 0 ? myr : "";
    const notes    = v.notes || "";
    const lead = [v.date, restName, city, cuisine, rating];   // shared visit prefix

    const dishes = Array.isArray(v.dishes)
      ? v.dishes.filter(d => d && (d.name || d.nutrition)) : [];
    dishes.forEach(d => {
      const n = d.nutrition || null;
      out.push(lead.concat([
        (d.name || "") + (dishSharePct(d) != null ? " (" + Math.round(dishSharePct(d)) + "%)" : ""),
        exportVerdictLabel(d.verdict), exportPriceCell(d.price),
        (dishKcalNum(d) || ""), (dishMacNum(d,"protein_g") || ""),
        (dishMacNum(d,"carbs_g") || ""), (dishMacNum(d,"fat_g") || ""),
        exportSourceLabel(n), notes,
      ]).map(csvCell).join(","));
      dishRows++;
    });

    const vn = v.nutrition || null;          // whole-plate (visit-level) estimate
    if (vn && vn.kcal){
      out.push(lead.concat([
        "(whole plate)", "", "",
        vn.kcal || "", vn.protein_g || "", vn.carbs_g || "", vn.fat_g || "",
        exportSourceLabel(vn), notes,
      ]).map(csvCell).join(","));
      plateRows++;
    }

    if (dishes.length === 0 && !(vn && vn.kcal)){   // bare visit still appears once
      out.push(lead.concat(["","","","","","","","",notes]).map(csvCell).join(","));
      bareRows++;
    }
  });
  logMsg("EXPORT","CSV built: " + rows.length + " visits -> " + dishRows +
    " dish rows, " + plateRows + " plate rows, " + bareRows + " bare rows");
  return "\ufeff" + out.join("\r\n") + "\r\n";
}

// Hand a generated file to the OS: share sheet first (the reliable path on an
// installed iOS PWA -> Save to Files / Mail), then a direct download fallback
// for desktop browsers. Returns true on success or user-cancel.
async function shareOrDownloadFile(filename, text, mime){
  let blob, file;
  try {
    blob = new Blob([text], { type: mime });
    file = new File([blob], filename, { type: mime });
  } catch(e){
    logMsg("ERROR","Export blob build failed: " + e.message);
    return false;
  }
  if (navigator.canShare && navigator.share && navigator.canShare({ files:[file] })){
    try {
      await navigator.share({ files:[file], title: filename });
      logMsg("EXPORT","Shared via share sheet: " + filename);
      return true;
    } catch(err){
      if (err && err.name === "AbortError"){ logMsg("EXPORT","Share cancelled"); return true; }
      logMsg("EXPORT","Share failed (" + (err && err.name) + ") - trying download");
      // fall through to anchor download
    }
  }
  try {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
    logMsg("EXPORT","Downloaded via anchor: " + filename);
    return true;
  } catch(e){
    logMsg("ERROR","Export download fallback failed: " + e.message);
    return false;
  }
}

// Full-screen printable history: visit-grouped, newest first, calm styling.
// The on-screen view is usable on its own; "Print / Save PDF" calls the OS
// print dialog (Save as PDF on phone and desktop). Print CSS hides everything
// but .printable-sheet.
function PrintableHistory({visits, restById, onClose}){
  const rows = (visits || []).filter(v => v && v.date).slice().sort((a,b)=>{
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
    return (b.logged_at || 0) - (a.logged_at || 0);
  });
  function starText(n){
    if (typeof n !== "number" || n <= 0) return "";
    const full = Math.floor(n), half = (n - full) >= 0.5;
    return "\u2605".repeat(full) + (half ? "\u00bd" : "");
  }
  return (
    <div className="print-overlay">
      <div className="print-bar no-print">
        <button className="btn ghost sm" onClick={onClose}>Close</button>
        <div className="print-title-sm">Printable history</div>
        <button className="btn sm" onClick={()=> { logMsg("EXPORT","Print dialog opened"); window.print(); }}>
          Print / Save PDF
        </button>
      </div>
      <div className="print-sheet printable-sheet">
        <div className="print-head">
          <div className="print-h1">MenuCaptain</div>
          <div className="print-h2">Dining history</div>
          <div className="print-h3">{rows.length} {rows.length === 1 ? "visit" : "visits"} - exported {exportDateStamp()}</div>
        </div>
        {rows.length === 0 && <div className="print-empty">No visits logged yet.</div>}
        {rows.map((v,vi) => {
          const r = restById ? restById(v.restaurant_id) : null;
          const name = (r && r.name) || v.restaurant_name || "A visit";
          const city = (r && r.city) || "";
          const dishes = Array.isArray(v.dishes) ? v.dishes.filter(d => d && d.name) : [];
          const vn = v.nutrition || null;
          const macros = vn ? ((vn.protein_g || 0) + (vn.carbs_g || 0) + (vn.fat_g || 0)) : 0;
          return (
            <div className="print-visit" key={v.id || (v.date + "-" + vi)}>
              <div className="print-v-head">
                <span className="print-v-name">{name}</span>
                {city ? <span className="print-v-city">{city}</span> : null}
              </div>
              <div className="print-v-meta">
                {v.date}{(typeof v.rating === "number" && v.rating > 0) ? "  -  " + starText(v.rating) : ""}
              </div>
              {dishes.length > 0 ? (
                <ul className="print-dishes">
                  {dishes.map((d,i)=>{
                    const n = d.nutrition || null;
                    const bits = [];
                    if (d.verdict === "loved") bits.push("Loved");
                    else if (d.verdict === "again") bits.push("Again");
                    else if (d.verdict === "skip") bits.push("Skip");
                    if (d.price) bits.push(String(d.price).trim());
                    if (n && n.kcal) bits.push((dishKcalApprox(d) ? "~" : "") + dishKcalNum(d) + " cal");
                    return (
                      <li className="print-dish" key={i}>
                        <span className="print-d-name">{d.name}{dishSharePct(d) != null ? " (" + Math.round(dishSharePct(d)) + "%)" : ""}</span>
                        {bits.length > 0 ? <span className="print-d-bits">{bits.join(" - ")}</span> : null}
                      </li>
                    );
                  })}
                </ul>
              ) : null}
              {vn && vn.kcal ? (
                <div className="print-plate">
                  Whole plate: {(vn.source === "menu_stated" ? "" : "~") + vn.kcal} cal

/* ============================================================
   PROFILE (usernames) - Phase A of the connections epic.
   ============================================================ */
async function getMyProfile(cfg){
  const res = await fetch(apiBase(cfg) + "/api/profile/me", { headers: await authHeaders(cfg) });
  if (!res.ok) throw new Error("Could not load your profile.");
  return res.json();   // { username, display_name }
}
async function checkUsername(cfg, username){
  const res = await fetch(apiBase(cfg) + "/api/profile/check?username=" + encodeURIComponent(username),
    { headers: await authHeaders(cfg) });
  if (!res.ok) throw new Error("check failed");
  return res.json();   // { username, available, reason }
}
async function updateMyProfile(cfg, username, displayName){
  const res = await fetch(apiBase(cfg) + "/api/profile/me", {
    method:"PUT",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({ username, display_name: displayName || "" }),
  });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok) throw new Error((data && data.detail) || "Could not save your profile.");
  return data;
}

// Friendly identity: a display name's first word ("Chris Gramlich" -> "Chris"),
// else the @handle, else "". Used wherever we greet or label the user.
function profileName(profile){
  if (!profile) return "";
  const dn = (profile.display_name || "").trim();
  if (dn) return dn.split(/\s+/)[0];
  if (profile.username) return "@" + profile.username;
  return "";
}

function ProfileCard({config, onProfileChange}){
  const [loaded, setLoaded]     = useState(false);
  const [current, setCurrent]   = useState(null);    // server copy {username, display_name}
  const [handle, setHandle]     = useState("");
  const [dname, setDname]       = useState("");
  const [check, setCheck]       = useState(null);    // {available, reason} for the typed handle
  const [checking, setChecking] = useState(false);
  const [busy, setBusy]         = useState(false);
  const [msg, setMsg]           = useState("");
  const [err, setErr]           = useState("");
  const [editing, setEditing]   = useState(false);  // false = read-only display + pencil
  const checkTimer = useRef(null);

  useEffect(()=>{
    let alive = true;
    (async ()=>{
      try {
        const p = await getMyProfile(config);
        if (!alive) return;
        setCurrent(p); setHandle(p.username || ""); setDname(p.display_name || "");
        if (!p.username) setEditing(true);   // no handle yet -> open the form to claim one
      } catch(e){ if (alive) setErr(e.message); }
      finally { if (alive) setLoaded(true); }
    })();
    return ()=>{ alive = false; };
    // eslint-disable-next-line
  },[]);

  // live availability check (debounced); skipped when the handle is unchanged.
  useEffect(()=>{
    setMsg("");
    const h = handle.trim().toLowerCase();
    if (checkTimer.current) clearTimeout(checkTimer.current);
    if (!h || (current && h === (current.username || ""))){ setCheck(null); setChecking(false); return; }
    setChecking(true);
    checkTimer.current = setTimeout(async ()=>{
      try { const r = await checkUsername(config, h); setCheck(r); }
      catch(e){ setCheck(null); }
      finally { setChecking(false); }
    }, 450);
    return ()=>{ if (checkTimer.current) clearTimeout(checkTimer.current); };
    // eslint-disable-next-line
  },[handle]);

  async function save(){
    setErr(""); setMsg(""); setBusy(true);
    try {
      const r = await updateMyProfile(config, handle.trim().toLowerCase(), dname.trim());
      setCurrent(r); setHandle(r.username || ""); setDname(r.display_name || ""); setCheck(null);
      setMsg("Saved"); setEditing(false);   // back to read-only display
      onProfileChange && onProfileChange(r);
      logMsg("PROFILE","saved username=" + r.username);
    } catch(e){ setErr(e.message); }
    finally { setBusy(false); }
  }

  const h = handle.trim().toLowerCase();
  const isCurrentHandle = !!(current && h === (current.username || "") && h);
  const unchanged = !!(current && h === (current.username || "") && dname.trim() === (current.display_name || ""));
  const blocked = !h || checking || (check && !check.available) || unchanged;

  let status = null;
  if (isCurrentHandle)                 status = { ok:true,  text:"This is your current handle" };
  else if (checking)                   status = { ok:null,  text:"Checking..." };
  else if (check && check.available)   status = { ok:true,  text:"@" + h + " is available" };
  else if (check && check.reason === "taken")   status = { ok:false, text:"@" + h + " is already taken" };
  else if (check && check.reason === "invalid") status = { ok:false, text:"3-20 chars, start with a letter; lowercase letters, numbers, or _" };

  const hasHandle = !!(current && current.username);
  function startEdit(){
    setHandle((current && current.username) || "");
    setDname((current && current.display_name) || "");
    setCheck(null); setMsg(""); setErr(""); setEditing(true);
  }
  function cancelEdit(){
    setHandle((current && current.username) || "");
    setDname((current && current.display_name) || "");
    setCheck(null); setMsg(""); setErr(""); setEditing(false);
  }
  return (
    <>
      <div className="set-group">Your profile</div>
      <div className="card">
        {hasHandle && !editing ? (
          // Read-only display: prevents accidental edits; tap the pencil to change.
          <div className="between">
            <div style={{minWidth:0}}>
              <div style={{fontWeight:600}}>@{current.username}</div>
              {current.display_name ? <div className="tiny faint" style={{marginTop:2}}>{current.display_name}</div> : null}
              <div className="tiny faint" style={{marginTop:4}}>How friends find and connect with you.</div>
            </div>
            <button className="btn ghost sm" onClick={startEdit} title="Edit username" style={{flex:"none"}}>
              <Icon name="edit" size={16} />
            </button>
          </div>
        ) : (
          <>
            <div className="tiny faint" style={{marginBottom:12}}>
              {hasHandle ? "Edit your username or display name." : "Claim a username so friends can find and connect with you."}
            </div>
            <label className="fld"><span className="lbl">Username</span>
              <div style={{display:"flex", alignItems:"center", gap:6}}>
                <span className="muted" style={{fontSize:18, color:"var(--text-faint)"}}>@</span>
                <input className="input" value={handle} placeholder="yourhandle"
                  autoCapitalize="none" autoCorrect="off" spellCheck={false} maxLength={20}
                  onChange={e=> setHandle(e.target.value.replace(/[^a-zA-Z0-9_]/g,"").toLowerCase())} />
              </div>
            </label>
            {status ? (
              <div className="tiny" style={{marginTop:-6, marginBottom:6,
                   color: status.ok===true ? "var(--ok)" : status.ok===false ? "var(--danger)" : "var(--text-faint)"}}>
                {status.text}
              </div>
            ) : null}
            <label className="fld"><span className="lbl">Display name (optional)</span>
              <input className="input" value={dname} placeholder="e.g. Chris G" maxLength={60}
                onChange={e=> setDname(e.target.value)} />
            </label>
            <div className="row" style={{gap:8}}>
              <button className="btn primary" onClick={save} disabled={busy || !loaded || blocked}>
                {busy ? <span className="spin" /> : (hasHandle ? "Save" : "Claim username")}
              </button>
              {hasHandle ? <button className="btn ghost" onClick={cancelEdit} disabled={busy}>Cancel</button> : null}
            </div>
          </>
        )}
        {msg ? <div className="tiny" style={{marginTop:8, color:"var(--ok)"}}>{msg}</div> : null}
        {err ? <div className="small" style={{marginTop:8, color:"var(--danger)"}}>{err}</div> : null}
      </div>
    </>
  );
}

// Derive a sensible starting handle from the email local-part: lowercased,
// stripped to valid chars, forced to start with a letter, capped at 20.
function suggestHandle(email){
  let h = ((email || "").split("@")[0] || "").toLowerCase().replace(/[^a-z0-9_]/g, "");
  if (!h) h = "user";
  if (!/^[a-z]/.test(h)) h = "u" + h;
  return h.slice(0, 20);
}

// A connection's display: full display name as the primary line, @handle as the

// Swipe-to-delete wrapper (touch + mouse via pointer events). Swipe a row LEFT;
// past the threshold on release it slides off and calls onDelete. Vertical drags
// fall through to normal scrolling; a real swipe suppresses the row's tap. This
// is an ACCELERATOR - the row's own delete button still works for everyone.
// Slide to REVEAL a Delete button, then tap it to confirm (no auto-delete on
// swipe). Slide left -> the row snaps open showing a red trash button; tap the
// trash to delete, or tap the row / slide back to close.
function SwipeToDelete({ onDelete, children }){
  const OPEN = 92;                                   // revealed button width
  const [dx, setDx]           = useState(0);
  const [settling, setSettling] = useState(true);    // true -> animate; false -> follow finger
  const dxRef   = useRef(0);
  const openRef = useRef(false);                      // is the row currently snapped open?
  const st      = useRef(null);
  const dragged = useRef(false);
  const setX = (v) => { dxRef.current = v; setDx(v); };
  function down(e){
    st.current = { x0:e.clientX, y0:e.clientY, base: openRef.current ? -OPEN : 0, decided:false, dragging:false };
  }
  function move(e){
    const s = st.current; if (!s) return;
    const ddx = e.clientX - s.x0, ddy = e.clientY - s.y0;
    if (!s.decided){
      if (Math.abs(ddx) < 8 && Math.abs(ddy) < 8) return;
      s.decided  = true;
      s.dragging = Math.abs(ddx) > Math.abs(ddy) + 4;   // horizontal intent = swipe
      if (s.dragging){ setSettling(false); try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_e){} }
    }
    if (!s.dragging) return;
    e.preventDefault();
    dragged.current = true;
    setX(Math.max(-OPEN, Math.min(0, s.base + ddx)));   // follow finger, clamped to [-OPEN, 0]
  }
  function up(){
    const s = st.current; st.current = null;
    setSettling(true);
    if (!s || !s.dragging) return;
    const opened = dxRef.current <= -OPEN / 2;           // snap open past halfway, else closed
    openRef.current = opened;
    setX(opened ? -OPEN : 0);
  }
  function close(){ openRef.current = false; setSettling(true); setX(0); }
  function confirm(e){ e.stopPropagation(); openRef.current = false; setX(0); if (onDelete) onDelete(); }
  return (
    <div style={{position:"relative", overflow:"hidden", borderRadius:12}}>
      {dx < -1 && (
        <button type="button" onClick={confirm} aria-label="Delete"
          style={{position:"absolute", top:0, right:0, bottom:0, width:OPEN,
                  background:"var(--danger)", color:"#fff", border:"none", margin:0,
                  display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer"}}>
          <Icon name="trash" size={20} color="#fff" />
        </button>
      )}
      <div style={{transform:"translateX(" + dx + "px)",
                   transition: settling ? "transform .18s ease" : "none",
                   touchAction:"pan-y", position:"relative"}}
        onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
        onClickCapture={(e)=>{
          if (dragged.current){ e.stopPropagation(); e.preventDefault(); dragged.current = false; return; }
          if (openRef.current){ e.stopPropagation(); e.preventDefault(); close(); }   // tap row while open -> close
        }}>
        {children}
      </div>
    </div>
  );
}

function ConnectionsScreen({config, profile, onClose, onHome}){
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr]         = useState("");
  const [handle, setHandle]   = useState("");
  const [adding, setAdding]   = useState(false);
  const [addMsg, setAddMsg]   = useState("");
  const [addErr, setAddErr]   = useState("");
  const [busyId, setBusyId]   = useState(null);
  const [favs, setFavs]       = useState(loadConnFavs);
  function toggleFav(uid){
    setFavs(prev => {
      const next = new Set(prev);
      if (next.has(uid)) next.delete(uid); else next.add(uid);
      saveConnFavs(next);
      return next;
    });
  }

  async function load(){
    try { setData(await getConnections(config)); setErr(""); }
    catch(e){ setErr(e.message); }
    finally { setLoading(false); }
  }
  useEffect(()=>{ load(); /* eslint-disable-next-line */ },[]);

  async function add(){
    const h = handle.trim().toLowerCase().replace(/^@/, "");
    if (!h) return;
    setAdding(true); setAddErr(""); setAddMsg("");
    try {
      const r = await requestConnection(config, h);
      setAddMsg(r.status === "accepted" ? "Connected!" : "Request sent");
      setHandle("");
      await load();
    } catch(e){ setAddErr(e.message); }
    finally { setAdding(false); }
  }
  async function act(fn, id){
    setBusyId(id);
    try { await fn(config, id); await load(); }
    catch(e){ setErr(e.message); }
    finally { setBusyId(null); }
  }

  const noHandle    = !(profile && profile.username);
  const incoming    = (data && data.incoming) || [];
  const connections = (data && data.connections) || [];
  const outgoing    = (data && data.outgoing) || [];
  // Favorites float to the top (stable sort keeps the rest in server order).
  const sortedConns = connections.slice().sort((a,b)=>
    (favs.has(b.user_id) ? 1 : 0) - (favs.has(a.user_id) ? 1 : 0));

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Connections</h2><HomeBtn onHome={onHome} />
      </div>
      <div className="ovbody">
        {noHandle ? (
          <div className="card" style={{marginBottom:14}}>
            <div className="small">Claim a username first (Settings &rarr; Your profile) so people can find and connect with you.</div>
          </div>
        ) : null}

        <div className="set-group" style={{marginTop:0}}>Add by username</div>
        <div className="card">
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <span style={{color:"var(--text-faint)", fontSize:18}}>@</span>
            <input className="input" value={handle} placeholder="username" style={{flex:1}}
              autoCapitalize="none" autoCorrect="off" spellCheck={false}
              onChange={e=> setHandle(e.target.value.replace(/[^a-zA-Z0-9_@]/g,"").toLowerCase())} />
            <button className="btn primary sm" onClick={add} disabled={adding || !handle.trim()}>
              {adding ? <span className="spin" /> : "Add"}
            </button>
          </div>
          {addMsg ? <div className="tiny" style={{marginTop:8, color:"var(--ok)"}}>{addMsg}</div> : null}
          {addErr ? <div className="tiny" style={{marginTop:8, color:"var(--danger)"}}>{addErr}</div> : null}
        </div>

        {loading ? (
          <div className="empty" style={{padding:"30px 0"}}><span className="spin" /></div>
        ) : (
          <>
            {incoming.length ? (
              <>
                <div className="set-group">Requests ({incoming.length})</div>
                <div className="card">
                  {incoming.map(c => (
                    <ConnRow key={c.id} c={c} busy={busyId===c.id}
                      primaryBtn="Accept" onPrimary={()=> act(acceptConnection, c.id)}
                      secondaryBtn="Decline" onSecondary={()=> act(removeConnection, c.id)} />
                  ))}
                </div>
              </>
            ) : null}

            <div className="set-group">Your connections{connections.length ? " (" + connections.length + ")" : ""}</div>
            <div className="card">
              {connections.length === 0 ? (
                <div className="small faint">No connections yet. Add someone by their username above.</div>
              ) : sortedConns.map(c => (
                <ConnRow key={c.id} c={c} busy={busyId===c.id}
                  fav={favs.has(c.user_id)} onToggleFav={()=> toggleFav(c.user_id)}
                  secondaryBtn="Remove" onSecondary={()=> act(removeConnection, c.id)} />
              ))}
            </div>

            {outgoing.length ? (
              <>
                <div className="set-group">Pending</div>
                <div className="card">
                  {outgoing.map(c => (
                    <ConnRow key={c.id} c={c} busy={busyId===c.id}
                      sub={"Requested" + (c.username ? " · @" + c.username : "")}
                      secondaryBtn="Cancel" onSecondary={()=> act(removeConnection, c.id)} />
                  ))}
                </div>
              </>
            ) : null}

            {err ? <div className="small" style={{marginTop:10, color:"var(--danger)"}}>{err}</div> : null}
          </>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   SHARES (Phase 3): send a place to connections -> their inbox.
   ============================================================ */
async function sendShare(cfg, toIds, kind, title, payload){
  const res = await fetch(apiBase(cfg) + "/api/shares", {
    method:"POST", headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body: JSON.stringify({ to_user_ids: toIds, kind: kind, title: title, payload: payload }),
  });
  const d = await res.json().catch(()=> ({}));
  if (!res.ok) throw new Error((d && d.detail) || "Could not send.");
  return d;   // { sent }
}
async function getShares(cfg){
  const res = await fetch(apiBase(cfg) + "/api/shares", { headers: await authHeaders(cfg) });
  if (!res.ok) throw new Error("Could not load your inbox.");
  return res.json();   // { shares: [{id, kind, title, payload, from, created_at}] }
}
async function dismissShare(cfg, id){
  const res = await fetch(apiBase(cfg) + "/api/shares/" + id, { method:"DELETE", headers: await authHeaders(cfg) });
  if (!res.ok) throw new Error("Could not remove.");
  return res.json();
}

// Button + picker to send a place (with its menu) to accepted connections.
function ShareToConnectionButton({cfg, restaurant, menuList}){
  const [open, setOpen]   = useState(false);
  const [conns, setConns] = useState(null);
  const [pick, setPick]   = useState({});
  const [busy, setBusy]   = useState(false);
  const [msg, setMsg]     = useState("");
  const favSet = loadConnFavs();   // favorite connections float to the top
  const hasMenu = (menuList || []).some(m => m && (m.sections || []).length);
  if (!hasMenu) return null;   // need a menu to share the place
  async function openPicker(){
    setOpen(true); setMsg("");
    if (conns === null){ try { const d = await getConnections(cfg); setConns(d.connections || []); } catch(e){ setConns([]); } }
  }
  async function send(){
    const ids = Object.keys(pick).filter(k => pick[k]);
    if (!ids.length) return;
    const usable = (menuList || []).filter(m => m && (m.sections || []).length);
    const combined = usable.length === 1 ? usable[0] : combineGroupMenus(usable);
    const payload = buildMenuPayload(restaurant, combined);
    setBusy(true); setMsg("");
    try {
      const r = await sendShare(cfg, ids, "place", restaurant.name, payload);
      setMsg("Sent to " + (r.sent || 0));
      setPick({});
      setTimeout(()=> setOpen(false), 800);
    } catch(e){ setMsg(e.message); }
    finally { setBusy(false); }
  }
  return (
    <>
      <button className="btn ghost sm" disabled={busy}
        onClick={openPicker}
        style={{flex:"none",padding:"6px 12px",margin:0,marginRight:8}}
        title="Send this place to a connection">
        <span className="row" style={{gap:5}}><Icon name="nodes" size={14} />Send</span>
      </button>
      {open && (
        <div style={{position:"fixed", inset:0, zIndex:80, background:"rgba(0,0,0,0.55)",
             display:"flex", alignItems:"flex-end", justifyContent:"center"}}
             onClick={()=> setOpen(false)}>
          <div className="card" style={{width:"100%", maxWidth:520, margin:0,
               borderTopLeftRadius:18, borderTopRightRadius:18, maxHeight:"85vh", overflowY:"auto"}}
               onClick={(e)=> e.stopPropagation()}>
            <div style={{fontWeight:600, marginBottom:4}}>Send {restaurant.name} to&hellip;</div>
            <div className="small muted" style={{marginBottom:10}}>
              They'll get the place + its menu in their "Shared with you" inbox.
            </div>
            {conns === null ? (
              <div className="empty" style={{padding:"20px 0"}}><span className="spin" /></div>
            ) : conns.length === 0 ? (
              <div className="small faint" style={{padding:"4px 0 12px"}}>
                No connections yet. Add some in Settings &rarr; Connections.
              </div>
            ) : conns.slice().sort((a,b)=> (favSet.has(b.user_id)?1:0) - (favSet.has(a.user_id)?1:0)).map(c => {
              const l = connLabel(c); const on = !!pick[c.user_id];
              const isFav = favSet.has(c.user_id);
              return (
                <div key={c.user_id} className="pick-row" style={{display:"flex", alignItems:"center", gap:10}}
                  onClick={()=> setPick(p => Object.assign({}, p, { [c.user_id]: !p[c.user_id] }))}>
                  <span className="go-check" style={{flex:"none"}}>{on ? "✓" : ""}</span>
                  <span style={{flex:1, minWidth:0}}>
                    {isFav ? <span style={{color:"var(--accent)"}}>★ </span> : null}
                    {l.primary}{l.secondary ? <span className="tiny faint"> {l.secondary}</span> : null}</span>
                </div>
              );
            })}
            <div className="row" style={{gap:9, marginTop:14}}>
              <button className="btn ghost" onClick={()=> setOpen(false)}>Close</button>
              <button className="btn primary" disabled={busy || !Object.keys(pick).some(k=>pick[k])} onClick={send}>
                {busy ? <span className="spin" /> : "Send"}
              </button>
            </div>
            {msg ? <div className="tiny" style={{marginTop:8, color:"var(--ok)"}}>{msg}</div> : null}
          </div>
        </div>
      )}
    </>
  );
}

// "Shared with you" inbox overlay: received places/lists; tap to view (reuses
// the public viewers, which include "Save to my places"), or dismiss.
function ShareInbox({config, onClose, onHome}){
  const [shares, setShares] = useState(null);
  const [open, setOpen]     = useState(null);   // the share being viewed
  const [busyId, setBusyId] = useState(null);
  async function load(){ try { const d = await getShares(config); setShares((d && d.shares) || []); } catch(e){ setShares([]); } }
  useEffect(()=>{ load(); /* eslint-disable-next-line */ },[]);
  async function remove(id){ setBusyId(id); try { await dismissShare(config, id); await load(); } catch(e){} finally { setBusyId(null); } }

  if (open){
    return (
      <div style={{position:"fixed", inset:0, zIndex:70, background:"var(--bg)", overflowY:"auto"}}>
        <div style={{maxWidth:600, margin:"0 auto"}}>
          <button className="btn ghost sm" style={{margin:"12px 16px 0"}} onClick={()=> setOpen(null)}>
            <Icon name="back" size={14} /> Back
          </button>
          {open.kind === "list" ? <PublishedList data={open.payload} /> : <PublishedMenu data={open.payload} />}
        </div>
      </div>
    );
  }
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>Shared with you</h2><HomeBtn onHome={onHome} />
      </div>
      <div className="ovbody">
        {shares === null ? (
          <div className="empty" style={{padding:"30px 0"}}><span className="spin" /></div>
        ) : shares.length === 0 ? (
          <div className="small faint" style={{padding:"4px 2px"}}>
            Nothing shared with you yet. When a connection sends you a place or list, it shows up here.
          </div>
        ) : shares.map(s => {
          const name = s.title || (s.kind === "list" ? "A list" : "A place");
          return (
            <SwipeToDelete key={s.id} onDelete={()=> remove(s.id)}>
              <div className="card" style={{display:"flex", alignItems:"center", gap:10}}>
                <div style={{flex:1, minWidth:0, cursor:"pointer"}} onClick={()=> setOpen(s)}>
                  <div style={{fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{name}</div>
                  <div className="tiny faint">from {s.from} &middot; {s.kind === "list" ? "list" : "place + menu"}</div>
                </div>
                <button className="btn primary sm" style={{flex:"none"}} onClick={()=> setOpen(s)}>View</button>
                <button className="btn ghost sm" style={{flex:"none"}} disabled={busyId===s.id} onClick={()=> remove(s.id)}>Dismiss</button>
              </div>
            </SwipeToDelete>
          );
        })}
      </div>
    </div>
  );
}

function SettingsView({config, profile, onProfileChange, onOpenConnections, pendingReqs, onEdit, counts, lastSync, onResync,

  const [showLog,setShowLog] = useState(false);
  const [theme,setTheme]     = useState(currentTheme());
  const [defTab,setDefTab]   = useState(getDefaultTab);   // which tab the app opens to
  const [showPrint,setShowPrint] = useState(false);   // printable-history overlay
  const [expMsg,setExpMsg]       = useState("");      // export error message, if any

  // Build and hand off the dish-level CSV. restById resolves restaurant detail
  // (name/city/cuisine) from the visit's restaurant_id.
  async function doExportCsv(){
    setExpMsg("");
    const restById = (id)=> (restaurants || []).find(r => r && r.id === id) || null;
    const csv = buildHistoryCsv(visits, restById);
    const ok = await shareOrDownloadFile(
      "menucaptain-history-" + exportDateStamp() + ".csv", csv, "text/csv");
    if (!ok) setExpMsg("Could not export the file. Try again.");
  }
  const [showDel,setShowDel] = useState(false);   // delete-account card expanded
  const [delText,setDelText] = useState("");      // user must type DELETE
  const [delBusy,setDelBusy] = useState(false);
  const [delErr,setDelErr]   = useState("");
  const [, force] = useState(0);

  async function doDeleteAccount(){
    // The backend re-checks everything (own-account only, owner refusal,
    // confirm text) - this client gate just prevents accidental taps.
    if (delText.trim().toUpperCase() !== "DELETE" || delBusy) return;
    setDelBusy(true); setDelErr("");
    logMsg("DELETE","Account deletion requested by user");
    try {
      const headers = await authHeaders(config);
      headers["Content-Type"] = "application/json";
      const res = await fetch(apiBase(config) + "/api/account/delete", {
        method:"POST", headers, body: JSON.stringify({ confirm:"DELETE" }),
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok){
        const msg = (data && data.detail) || ("Delete failed (" + res.status + ")");
        logMsg("ERROR","Account delete refused: " + msg);
        setDelErr(msg); setDelBusy(false); return;
      }
      logMsg("DELETE","Account deleted on the server - wiping this device");
      try { indexedDB.deleteDatabase(IDB_NAME); } catch(e){}
      try { localStorage.setItem("dininglog_deleted", "1"); } catch(e){}
      signOutHard();   // clears config + cache and reloads to sign-in
    } catch(err){
      logMsg("ERROR","Account delete network failure: " + err.message);
      setDelErr("Network error - nothing was deleted. Try again.");
      setDelBusy(false);
    }

  const [newLoc,setNewLoc] = useState("");
  const [editing,setEditing] = useState(null);    // {name, draft}

      <div className="set-group">Startup</div>
      <div className="card">
        <div className="tiny faint" style={{margin:"0 2px 8px"}}>Which tab the app opens to.</div>
        {DEFAULT_TABS.map(t => {
          const on = defTab === t.key;
          return (
            <div key={t.key} className="theme-row"
              onClick={()=>{ setDefaultTab(t.key); setDefTab(t.key); }}>
              <span className="navicon" style={{width:26, display:"inline-flex", justifyContent:"center"}}>

      <div className="set-group">More</div>

      <div className="updrow" style={{marginBottom:10}}>
        <button className="btn ghost sm" onClick={onOpenYearInFood}>
          <Icon name="sparkle" size={15} color="var(--accent)" />
          Your Year in Food
        </button>
      </div>

      <div className="updrow" style={{marginBottom:10}}>
        <button className="btn ghost sm" onClick={onOpenPassport}>
          <Icon name="image" size={15} color="var(--accent)" />
          Food passport
        </button>
      </div>

      <div className="updrow" style={{marginBottom:10}}>
        <button className="btn ghost sm" onClick={onOpenHelp}>
          <Icon name="info" size={15} color="var(--text-dim)" />
          User guide
        </button>
        {onShowInstall ? (
          <button className="btn ghost sm" onClick={onShowInstall}>
            <Icon name="home" size={15} color="var(--text-dim)" />
            Add to Home Screen
          </button>
        ) : null}
      </div>

      <div className="set-group">About</div>

      <div className="updrow">
        {updateVersion ? (
          <button className="btn primary sm" onClick={onApplyUpdate}>
            <Icon name="check" size={15} color="#1b1714" />
            Update to v{updateVersion}
          </button>
        ) : (
          <button className="btn ghost sm" onClick={onCheckUpdate}>
            Check for updates
          </button>
        )}
        {updMsg && <span className="tiny faint">{updMsg}</span>}
      </div>

      {isOwner(config) && (
        <div className="card" style={{marginTop:12}}>
          <div className="between" onClick={()=> setShowLog(s=>!s)} style={{cursor:"pointer"}}>
            <div style={{fontWeight:600}}>Diagnostics</div>
            <Icon name={showLog ? "chevd" : "chev"} size={17} color="#80715f" />
          </div>
          {showLog && (
            <div style={{marginTop:11}}>
              <div className="row" style={{justifyContent:"flex-end",marginBottom:8}}>
                <button className="btn ghost sm" onClick={()=> force(x=>x+1)}>Refresh</button>
              </div>
              <div className="tiny faint" style={{marginBottom:8,wordBreak:"break-all"}}>
                Backend: {apiBase(config)}
              </div>
              <div className="logbox">
                {LOG_BUFFER.length
                  ? LOG_BUFFER.slice(-80).join("\n")
                  : "No log entries yet."}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="card" style={{marginTop:12}}>
        <div className="between" onClick={()=> setShowDel(s=>!s)} style={{cursor:"pointer"}}>
          <div style={{fontWeight:600,color:"#e7a99e"}}>Delete account</div>
          <Icon name={showDel ? "chevd" : "chev"} size={17} color="#80715f" />
        </div>
        {showDel && (
          <div style={{marginTop:11}}>
            <div className="small muted" style={{lineHeight:1.7,marginBottom:10}}>
              This permanently deletes your account: every visit, place, menu,
              and photo, on every device. Any subscription is canceled
              immediately. This cannot be undone.
            </div>
            <label className="fld"><span className="lbl">Type DELETE to confirm</span>
              <input className="input" value={delText}
                onChange={e=>{ setDelText(e.target.value); setDelErr(""); }}
                autoCapitalize="characters" autoComplete="off"
                placeholder="DELETE" /></label>
            {delErr && <div className="small" style={{color:"#e7a99e",marginBottom:8}}>{delErr}</div>}
            <button className="btn danger" style={{width:"100%"}}
              disabled={delBusy || delText.trim().toUpperCase() !== "DELETE"}
              onClick={doDeleteAccount}>
              {delBusy ? "Deleting..." : "Permanently delete my account"}
            </button>
          </div>
        )}
      </div>

      <div className="tiny faint" style={{textAlign:"center",padding:"8px 0 4px"}}>
        MenuCaptain v{APP_VERSION}
      </div>
    </div>
  );
}

// Password input with show/hide toggle.
// WHY a component: three password fields across two screens; avoid repeating
// the toggle logic and the inline-SVG eye icon in each place.
function PwInput({value, onChange, placeholder, id}){
  const [show, setShow] = React.useState(false);
  return (
    <div style={{position:"relative"}}>
      <input id={id} className="input" type={show ? "text" : "password"}
        value={value} onChange={onChange}
        autoCapitalize="none" autoComplete="current-password"
        placeholder={placeholder}
        style={{paddingRight:42}} />
      <button type="button"
        onClick={()=>setShow(s=>!s)}
        aria-label={show ? "Hide password" : "Show password"}
        style={{
          position:"absolute", right:0, top:0, bottom:0,
          width:40, background:"none", border:"none", cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center",
          color:"var(--muted)", padding:0,
        }}>
        {show ? (
          // eye-off
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        ) : (
          // eye
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        )}
      </button>
    </div>
  );
}

function ResetPasswordScreen({accessToken, refreshToken, expiresIn}){
  // Reached from the password-reset email: Supabase redirects here with a
  // short-lived recovery session in the URL hash. We set the new password
  // with that session, then sign the user straight in using the same tokens.
  const [pw1,setPw1]   = useState("");
  const [pw2,setPw2]   = useState("");
  const [busy,setBusy] = useState(false);
  const [err,setErr]   = useState("");

  async function applyNewPassword(){
    setErr("");
    if (pw1.length < 6){ setErr("Password must be at least 6 characters."); return; }
    if (pw1 !== pw2){ setErr("Passwords do not match."); return; }
    setBusy(true);
    try {
      logMsg("AUTH","Applying new password from recovery link");
      const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
        method:"PUT",
        headers:{
          "Content-Type":"application/json",
          "apikey":SUPABASE_PUBLISHABLE_KEY,
          "Authorization":"Bearer " + accessToken,
        },
        body:JSON.stringify({ password: pw1 }),
      });
      const data = await res.json().catch(()=> ({}));
      if (res.status === 401){
        setErr("This reset link has expired. Request a new one from the sign-in screen.");
        setBusy(false); return;
      }
      if (!res.ok || !data.id){
        const msg = data.msg || data.error_description || data.message || "";
        setErr(msg || ("Could not update the password (" + res.status + ")."));
        setBusy(false); return;
      }
      // Password updated. Sign in with the recovery session tokens.
      const cfg = {
        apiBase: API_BASE_DEFAULT,
        userId: data.id,
        email: data.email || "",
        accessToken: accessToken,
        refreshToken: refreshToken || "",
        expiresAt: Math.floor(Date.now()/1000) + (parseInt(expiresIn,10) || 3600),
      };
      saveConfig(cfg);
      logMsg("AUTH","Password updated - signed in as " + cfg.email);
      // Strip the recovery hash and reload into the app.
      location.replace(location.pathname);
    } catch(e){
      logMsg("ERROR","Password update network error: " + e.message);
      setErr("Network error updating the password. Check your connection.");
      setBusy(false);
    }
  }

  return (
    <div id="app-shell">
      <div className="topbar"><h1>MenuCaptain</h1>
        <div className="sub">Reset password</div></div>
      <div className="ovbody">
        <div style={{marginBottom:18}}>
          <h2 style={{fontSize:26}}>Choose a new password</h2>
          <div className="small muted" style={{marginTop:6}}>
            You followed a password reset link. Pick a new password for your
            account and you will be signed in.
          </div>
        </div>
        <label className="fld"><span className="lbl">New password</span>
          <PwInput value={pw1} onChange={e=>setPw1(e.target.value)}
            placeholder="at least 6 characters" /></label>
        <label className="fld"><span className="lbl">Confirm new password</span>
          <PwInput value={pw2} onChange={e=>setPw2(e.target.value)}
            placeholder="same password again" /></label>
        {err && (
          <div className="syncbar err" style={{margin:"0 0 14px"}}>
            <span className="dot" style={{background:"var(--danger)"}} />{err}
          </div>
        )}
        <button className="btn primary" disabled={busy} onClick={applyNewPassword}>
          {busy ? <span className="spin" /> : <Icon name="check" size={18} color="#1b1714" />}
          {busy ? "Saving..." : "Set new password"}
        </button>
      </div>
    </div>
  );
}

function SetupScreen({initial, onSave, onClose, asOverlay}){
  // One-time note after an account deletion: the flag is set just before
  // the post-delete reload and consumed (removed) on first render here.
  const [deletedNote] = React.useState(()=>{
    try {
      if (localStorage.getItem("dininglog_deleted") === "1"){
        localStorage.removeItem("dininglog_deleted");
        return true;
      }
    } catch(e){}
    return false;
  });
  const [mode,setMode]       = useState("signin");   // signin | signup | forgot
  const [email,setEmail]     = useState(initial ? (initial.email || "") : "");
  const [password,setPassword] = useState("");
  const [busy,setBusy]       = useState(false);
  const [err,setErr]         = useState("");
  const [info,setInfo]       = useState("");
  // Email that signed up but has not confirmed yet (this device/session).
  // WHY: lets sign-in failures explain "confirm first" instead of the
  // misleading "invalid password", and lets the Sign in button dim.
  const [pendingConfirmEmail,setPendingConfirmEmail] = useState("");

  async function signIn(){
    setErr("");
    if (!email.trim() || !password){
      setErr("Email and password are required."); return;
    }
    setBusy(true);
    // Backend address is built in (or carried over from a saved config) -
    // customers never see or set it. Settings still displays it for support.
    const base = (((initial && initial.apiBase) || API_BASE_DEFAULT)).replace(/\/+$/, "");
    try {
      logMsg("AUTH","Signing in " + email.trim());
      const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
        body:JSON.stringify({ email:email.trim(), password:password }),
      });
      const data = await res.json().catch(()=> ({}));
      if (res.status === 400 || res.status === 401){
        // WHY: Supabase reports an unconfirmed email as plain invalid
        // credentials. If THIS device just signed this email up, the real
        // reason is almost certainly the missing confirmation tap.
        if (pendingConfirmEmail &&
            email.trim().toLowerCase() === pendingConfirmEmail.toLowerCase()){
          setErr("Your email may not be confirmed yet - tap the link we sent to " +
                 email.trim() + " first. Already confirmed? Then double-check " +
                 "your password.");
        } else {
          setErr("Invalid email or password.");
        }
        setBusy(false); return;
      }
      if (!res.ok || !data.access_token || !data.user){
        setErr("Sign-in failed (" + res.status + ")."); setBusy(false); return;
      }
      const cfg = {
        apiBase: base,
        userId: data.user.id,
        email: data.user.email || email.trim(),
        accessToken: data.access_token,
        refreshToken: data.refresh_token || "",
        expiresAt: data.expires_at || (Math.floor(Date.now()/1000) + (data.expires_in || 3600)),
      };
      logMsg("AUTH","Signed in as " + cfg.email + " (" + cfg.userId + ")");
      setBusy(false);
      onSave(cfg);
    } catch(e){
      logMsg("ERROR","Sign-in network error: " + e.message);
      setErr("Network error during sign-in. Check your connection.");
      setBusy(false);
    }
  }

  async function signUp(){
    setErr(""); setInfo("");
    if (!email.trim() || !password){
      setErr("Email and password are required."); return;
    }
    if (password.length < 6){
      setErr("Password must be at least 6 characters."); return;
    }
    setBusy(true);
    const base = (((initial && initial.apiBase) || API_BASE_DEFAULT)).replace(/\/+$/, "");
    try {
      logMsg("AUTH","Creating account for " + email.trim());
      const res = await fetch(SUPABASE_URL + "/auth/v1/signup", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
        body:JSON.stringify({ email:email.trim(), password:password }),
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok){
        const msg = data.msg || data.error_description || data.message || "";
        // WHY: Supabase throttles confirmation emails and returns raw
        // plumbing copy ("you can only request this after N seconds").
        // Translate it - the email almost certainly already went out.
        if (/only request this after/i.test(msg)){
          setErr("We just sent your confirmation email - check your inbox " +
                 "(and spam). You can request another one in a minute.");
          setPendingConfirmEmail(email.trim());
        } else {
          setErr(msg || ("Could not create the account (" + res.status + ")."));
        }
        setBusy(false); return;
      }
      if (data.session && data.session.access_token && data.user){
        // Email confirmation is off - we got a session, sign straight in.
        const cfg = {
          apiBase: base,
          userId: data.user.id,
          email: data.user.email || email.trim(),
          accessToken: data.session.access_token,
          refreshToken: data.session.refresh_token || "",
          expiresAt: data.session.expires_at || (Math.floor(Date.now()/1000) + (data.session.expires_in || 3600)),
        };
        logMsg("AUTH","Account created and signed in: " + cfg.email);
        setBusy(false);
        onSave(cfg);
        return;
      }
      // Email confirmation is on - no session until the link is tapped.
      logMsg("AUTH","Account created - confirmation email sent");
      setBusy(false);
      setMode("signin");
      setPendingConfirmEmail(email.trim());
      setInfo("Almost there - we sent a confirmation link to " + email.trim() +
              ". Tap it, then sign in here.");
    } catch(e){
      logMsg("ERROR","Sign-up network error: " + e.message);
      setErr("Network error creating the account. Check your connection.");
      setBusy(false);
    }
  }

  async function sendReset(){
    setErr(""); setInfo("");
    if (!email.trim()){
      setErr("Enter your account email first."); return;
    }
    setBusy(true);
    try {
      logMsg("AUTH","Requesting password reset for " + email.trim());
      await fetch(SUPABASE_URL + "/auth/v1/recover", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
        body:JSON.stringify({ email:email.trim() }),
      });
      // Always the same message - never reveal whether an account exists.
      setBusy(false);
      setMode("signin");
      setInfo("If an account exists for " + email.trim() +
              ", a password reset link is on its way. Check your email.");
    } catch(e){
      logMsg("ERROR","Reset request network error: " + e.message);
      setErr("Network error sending the reset link. Check your connection.");
      setBusy(false);
    }
  }

  const titles = {
    signin:["Welcome","MenuCaptain keeps your restaurants, menus and visits in your private account so they sync across devices. Sign in to get started."],
    signup:["Create your account","One account, all your devices. Your log stays private to you."],
    forgot:["Reset your password","Enter your account email and we will send you a reset link."],
  };
  const primary = {
    signin:{ label:"Sign in",            busyLabel:"Signing in...",      fn:signIn },
    signup:{ label:"Create account",     busyLabel:"Creating...",        fn:signUp },
    forgot:{ label:"Send reset link",    busyLabel:"Sending...",         fn:sendReset },
  }[mode];
  const switchTo = (m)=>{ setMode(m); setErr(""); setInfo(""); };

  const body = (
    <div className="ovbody">
      {!asOverlay && deletedNote && (
        <div className="card small muted" style={{marginBottom:14,lineHeight:1.7}}>
          Your account was deleted. Thanks for trying MenuCaptain - you are
          welcome back any time.
        </div>
      )}
      {!asOverlay && (
        <div style={{marginBottom:18}}>
          <h2 style={{fontSize:26}}>{titles[mode][0]}</h2>
          <div className="small muted" style={{marginTop:6}}>{titles[mode][1]}</div>
        </div>
      )}
      <label className="fld"><span className="lbl">Email</span>
        <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)}
          autoCapitalize="none" autoComplete="email" placeholder="you@example.com" /></label>
      {mode !== "forgot" && (
        <label className="fld"><span className="lbl">Password</span>
          <PwInput value={password} onChange={e=>setPassword(e.target.value)}
            placeholder={mode === "signup" ? "at least 6 characters" : "your password"} />
        </label>
      )}

      {mode === "signin" && (
        <div className="card tiny muted" style={{lineHeight:1.7}}>
          Your sign-in is stored only in this browser (localStorage on this
          device) and used to reach your MenuCaptain account.
        </div>
      )}
      {info && (
        <div className="syncbar" style={{margin:"0 0 14px"}}>
          <span className="dot" style={{background:"var(--accent)"}} />{info}
        </div>
      )}
      {err && (
        <div className="syncbar err" style={{margin:"0 0 14px"}}>
          <span className="dot" style={{background:"var(--danger)"}} />{err}
        </div>
      )}
      <button className="btn primary" disabled={busy} onClick={primary.fn}
        style={(mode === "signin" && pendingConfirmEmail &&
                email.trim().toLowerCase() === pendingConfirmEmail.toLowerCase())
               ? {opacity:0.55} : undefined}>
        {busy ? <span className="spin" /> : <Icon name="check" size={18} color="#1b1714" />}
        {busy ? primary.busyLabel : primary.label}
      </button>

      <div className="small muted" style={{marginTop:16, textAlign:"center", lineHeight:2.2}}>
        {mode === "signin" && (<span>
          <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("forgot");}}>Forgot password?</a>
          <br/>
          New here? <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("signup");}}>Create an account</a>
        </span>)}
        {mode === "signup" && (<span>
          Have an account? <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("signin");}}>Sign in</a>
        </span>)}
        {mode === "forgot" && (<span>
          <a href="#" onClick={(e)=>{e.preventDefault(); switchTo("signin");}}>Back to sign in</a>
        </span>)}
      </div>
      <div style={{marginTop:18}}><InstallHint /></div>
      <div style={{height:24}} />
    </div>
  );

  if (asOverlay){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}>Cancel</button>
          <h2>Settings</h2><span style={{width:40}} />
        </div>
        {body}
      </div>
    );
  }
  return (
    <div id="app-shell">
      <div className="topbar"><h1>MenuCaptain</h1>
        <div className="sub">First-time setup</div></div>
      {body}
    </div>
  );
}

(function bootDiningCaptain(){
  let published = null;
  try {
    // new links use ?list= (survives URL shorteners); old links used #list=
    let raw = null;
    // Returning from Stripe Checkout: strip the param, remember the verdict
    // so App can toast a welcome after it mounts.
    const co = (location.search || "").match(/[?&]checkout=(success|cancel)/);
    if (co){
      window.__CHECKOUT_RESULT = co[1];
      logMsg("BILLING","Returned from checkout: " + co[1]);
      history.replaceState(null, "", location.pathname);
    }
    const qm = (location.search || "").match(/[?&]list=([^&]+)/);
    if (qm) raw = qm[1];
    else { const h = location.hash || ""; if (h.indexOf("#list=") === 0) raw = h.slice(6); }
    if (raw) published = decodeListPayload(raw);
  } catch(e){ published = null; }
  // Shared-menu links (?menu=...) render the no-account PublishedMenu viewer.
  let publishedMenu = null;
  try {
    const mm = (location.search || "").match(/[?&]menu=([^&]+)/);
    if (mm) publishedMenu = decodeMenuPayload(mm[1]);
  } catch(e){ publishedMenu = null; }
  // Shared-visit links (?visit=...) render the no-account PublishedVisit viewer.
  let publishedVisit = null;
  try {
    const vm = (location.search || "").match(/[?&]visit=([^&]+)/);
    if (vm) publishedVisit = decodeVisitPayload(vm[1]);
  } catch(e){ publishedVisit = null; }
  // Group-order links (?g=<code>) render the no-account guest screen.
  let groupCode = null;
  try {
    const gm = (location.search || "").match(/[?&]g=([A-Za-z0-9]+)/);
    if (gm) groupCode = gm[1];
  } catch(e){ groupCode = null; }
  // Password-reset links land here with a recovery session in the hash.
  let recovery = null;
  try {
    const hp = new URLSearchParams((location.hash || "").replace(/^#/, ""));
    if (hp.get("type") === "recovery" && hp.get("access_token")){
      recovery = {
        accessToken: hp.get("access_token"),
        refreshToken: hp.get("refresh_token") || "",
        expiresIn: hp.get("expires_in") || "3600",
      };
    } else if (hp.get("error_description")){
      // Expired/invalid auth link - drop the hash and fall through to the app.
      logMsg("AUTH","Auth link error: " + hp.get("error_description"));
      history.replaceState(null, "", location.pathname + location.search);
    }
  } catch(e){ recovery = null; }
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(recovery ? <ResetPasswordScreen accessToken={recovery.accessToken}
                            refreshToken={recovery.refreshToken}
                            expiresIn={recovery.expiresIn} />
            : published ? <PublishedList data={published} />
            : publishedMenu ? <PublishedMenu data={publishedMenu} />
            : publishedVisit ? <PublishedVisit data={publishedVisit} />
            : groupCode ? <GroupOrderGuest code={groupCode} />
            : <App />);
})();
logMsg("INIT","React mounted");
  </script>
