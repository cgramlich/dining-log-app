// Map a thrown places error (carries .status/.detail) to UI intent + copy.
function mapPlacesError(err){
  const s = err && err.status;
  const d = (err && err.detail) || "";
  if (s === 401) return { kind:"auth",     msg:"Your session expired - sign in again." };
  if (s === 402){
    // Two distinct 402s, told apart by the backend's detail string.
    if (/limit/i.test(d)) return { kind:"limit", msg:d || "You have reached this month's discovery limit." };
    return { kind:"upsell" };
  }
  if (s === 503) return { kind:"down",     msg:"Discovery is taking a short break. Try again in a bit." };
  if (s === 502) return { kind:"upstream", msg:"Couldn't search just now. Try again." };
  return { kind:"generic", msg:(err && err.message) || "Something went wrong." };
}

// The compact Leaflet map for the current result set. Mirrors MapView's init
// (same tiles, same circleMarker+popup pattern) but adds a distinct "you are
// here" marker and skips the geocode backfill - results already carry coords.
function NearbyMap({ user, results, onOpen, searchCenter, onSearchArea }){
  const divRef = useRef(null), mapRef = useRef(null), layerRef = useRef(null);
  const leafletReady = typeof L !== "undefined";
  const [moved, setMoved] = useState(false);
  // Latest searched center, read inside the once-registered moveend handler.
  const scRef = useRef(searchCenter);
  useEffect(function(){ scRef.current = searchCenter; setMoved(false); }, [searchCenter]);

  useEffect(function(){
    if (!leafletReady || !divRef.current || !user) return;
    const map = L.map(divRef.current, { zoomControl:true, attributionControl:true });
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19, attribution:"&copy; OpenStreetMap contributors"
    }).addTo(map);
    map.setView([user.lat, user.lng], 14);
    layerRef.current = L.layerGroup().addTo(map);
    mapRef.current = map;
    // Surface "Search this area" once the view has been panned/zoomed meaningfully
    // away from where the last search ran.
    map.on("moveend", function(){
      const sc = scRef.current;
      if (!sc) return;
      try {
        const c = map.getCenter();
        const visR = map.distance(c, map.getBounds().getNorthEast());
        const d = map.distance(c, L.latLng(sc.lat, sc.lng));
        setMoved(d > Math.max(400, visR * 0.2));
      } catch(e){}
    });
    logMsg("MAP", "Near me map initialised");
    setTimeout(function(){ try { map.invalidateSize(); } catch(e){} }, 60);
    return function(){ try { map.remove(); } catch(e){} mapRef.current = null; };
  }, [leafletReady]);  // eslint-disable-line

  useEffect(function(){
    const map = mapRef.current, layer = layerRef.current;
    if (!map || !layer) return;
    layer.clearLayers();
    const pts = [];
    if (user){
      const um = L.circleMarker([user.lat, user.lng], {
        radius:7, weight:3, color:"#4a90e0", fillColor:"#4a90e0", fillOpacity:0.55
      });
      um.bindPopup("<div class='mappop'><div class='mappop-name'>You are here</div></div>");
      um.addTo(layer);
      pts.push([user.lat, user.lng]);
    }
    results.forEach(function(p){
      if (p.lat == null || p.lng == null) return;
      const m = L.circleMarker([p.lat, p.lng], {
        radius:8, weight:2, color:"#e0764a", fillColor:"#e0764a", fillOpacity:0.85
      });
      const el = document.createElement("div");
      el.className = "mappop";
      el.innerHTML =
        "<div class='mappop-name'>" + escapeHtml(p.name || "") + "</div>" +
        (p.primary_type ? "<div class='mappop-sub'>" + escapeHtml(humanizeType(p.primary_type)) + "</div>" : "") +
        "<button class='mappop-open'>Details</button>";
      const btn = el.querySelector(".mappop-open");
      if (btn) btn.addEventListener("click", function(){ onOpen(p.place_id); });
      m.bindPopup(el);
      m.addTo(layer);
      pts.push([p.lat, p.lng]);
    });
    if (pts.length){ try { map.fitBounds(pts, { padding:[40,40], maxZoom:16 }); } catch(e){} }
  }, [results, user]);

  function searchHere(){
    const map = mapRef.current;
    if (!map || !onSearchArea) return;
    try {
      const c = map.getCenter();
      const radius = Math.min(16000, Math.max(800, Math.round(map.distance(c, map.getBounds().getNorthEast()))));
      setMoved(false);
      onSearchArea(c.lat, c.lng, radius);
    } catch(e){}
  }

  if (!leafletReady){
    return (
      <div className="empty" style={{padding:"40px 22px"}}>
        <div className="big">Map unavailable</div>
        <div>The map library could not load. Check your connection and reopen.</div>
      </div>
    );
  }
  return (
    <div style={{position:"relative", flex:1, minHeight:280, display:"flex"}}>
      <div ref={divRef} className="map-canvas" style={{flex:1, minHeight:280}} />
      {moved && onSearchArea ? (
        <button className="btn primary sm" onClick={searchHere}
          style={{position:"absolute", top:10, left:"50%", transform:"translateX(-50%)",
                  zIndex:1000, width:"auto", padding:"7px 16px", boxShadow:"0 2px 10px rgba(0,0,0,0.35)"}}>
          Search this area
        </button>
      ) : null}
    </div>
  );
}

function loadNearMePrefs(){ try { return JSON.parse(localStorage.getItem("dininglog_nearme_prefs") || "{}") || {}; } catch(e){ return {}; } }
function saveNearMePrefs(p){ try { localStorage.setItem("dininglog_nearme_prefs", JSON.stringify(p)); } catch(e){} }
function NearMeView({ cfg, restaurants, onOpenRestaurant, onAddPlace, onUpgrade, onClose }){
  // Tier gate. null = loading; "pro" shows search; anything else shows upsell.
  // We fetch it once so a free user never wastes a search round-trip; any stray
  // 402 mid-flow also flips us to the upsell.
  const [tier, setTier] = useState(null);

  // Location.
  const [userLoc, setUserLoc]   = useState(null);
  const [geoState, setGeoState] = useState("idle");   // idle|locating|ok|denied|unavailable

  // Filters.
  const [radiusM, setRadiusM] = useState(()=> { const p = loadNearMePrefs(); return typeof p.radiusM === "number" ? p.radiusM : 1600; });
  const [typeKey, setTypeKey] = useState(()=> loadNearMePrefs().typeKey || "all");
  const [cuisineKey, setCuisineKey] = useState(()=> loadNearMePrefs().cuisineKey || "");  // "" = no cuisine filter
  const [cuisMore, setCuisMore] = useState(false);   // reveal the long-tail cuisines
  const [openNow, setOpenNow] = useState(()=> !!loadNearMePrefs().openNow);
  // Remember the last-used filters across sessions.
  useEffect(()=>{ saveNearMePrefs({ radiusM, typeKey, cuisineKey, openNow }); }, [radiusM, typeKey, cuisineKey, openNow]);

  // Results + status.
  const [results, setResults]       = useState([]);
  const [searchCenter, setSearchCenter] = useState(null);  // where the last search ran (drives "Search this area")
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState(null);
  const [fetchedAt, setFetchedAt]   = useState(null);
  const [lastSearch, setLastSearch] = useState(null);
  const [view, setView]             = useState("list");   // list (default) | map
  const [minStars, setMinStars]     = useState(0);        // 0 = any rating, 4 = 4 stars and up
  const [nearSort, setNearSort]     = useState("dist");   // "dist" (closest) | "rated" (top rated) | "pop" (popular)
  const [priceSel, setPriceSel]     = useState({});       // {1:true,...} selected price levels; empty = any
  const [hideSaved, setHideSaved]   = useState(false);    // hide places already in my list
  const [searchQ, setSearchQ]       = useState("");       // "search a restaurant near me" box
  const [searchMode, setSearchMode] = useState(false);    // current results came from a text search
  // Client-side refine of the fetched results (no new Google call): min-rating,
  // price level, hide-already-saved, and sort. Base list is distance-sorted.
  const shown = (function(){
    let arr = results;
    if (minStars > 0) arr = arr.filter(p => (typeof p.rating === "number") && p.rating >= minStars);
    const pricePicked = Object.keys(priceSel).filter(k => priceSel[k]);
    if (pricePicked.length){
      arr = arr.filter(p => { const n = priceLevelNum(p.price_level); return n != null && priceSel[n]; });
    }
    if (hideSaved) arr = arr.filter(p => !hardMatch(p.place_id));
    if (nearSort === "rated") arr = arr.slice().sort((a,b)=> ((b.rating||0)-(a.rating||0)) || ((b.rating_count||0)-(a.rating_count||0)));
    else if (nearSort === "pop") arr = arr.slice().sort((a,b)=> ((a._idx==null?1e9:a._idx) - (b._idx==null?1e9:b._idx)));
    else if (nearSort === "az")  arr = arr.slice().sort((a,b)=> (a.name||"").localeCompare(b.name||""));
    return arr;
  })();

  // Details sheet (nested layer over the list).
  const [detail, setDetail]             = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [detailErr, setDetailErr]       = useState(null);

  // Resolve tier on open. On failure, fall through to the search UI and let the
  // backend's hard gate (402) protect spend - better than blocking a real Pro.
  useEffect(function(){
    let alive = true;
    fetchBillingStatus(cfg)
      .then(d => { if (alive) setTier((d && d.tier) || "unknown"); })
      .catch(()=> { if (alive) setTier("unknown"); });
    return function(){ alive = false; };
  }, []);  // eslint-disable-line

  // Once we know the user can search, ask for location straight away.
  useEffect(function(){
    if (tier === "pro" || tier === "unknown"){ if (geoState === "idle") requestLocation(); }
  }, [tier]);  // eslint-disable-line

  function requestLocation(){
    if (!navigator.geolocation){ setGeoState("unavailable"); return; }
    setGeoState("locating");
    navigator.geolocation.getCurrentPosition(
      function(pos){
        const la = pos.coords.latitude, ln = pos.coords.longitude;
        logMsg("PLACES", "geolocation ok lat=" + la.toFixed(4) + " lng=" + ln.toFixed(4));
        setUserLoc({ lat:la, lng:ln });
        setGeoState("ok");
      },
      function(err){
        logMsg("PLACES", "geolocation error code=" + err.code + " " + err.message);
        setGeoState(err.code === 1 ? "denied" : "unavailable");
      },
      { enableHighAccuracy:false, timeout:10000, maximumAge:60000 }
    );
  }

  // opts (optional): { lat, lng, radius_m } to search a specific map area
  // ("Search this area"); without it, searches at the user's location + the
  // selected radius chip. Distances are always shown from the user's real spot.
  async function runSearch(opts){
    const center = (opts && opts.lat != null) ? { lat:opts.lat, lng:opts.lng } : userLoc;
    if (!center){ requestLocation(); return; }
    const radius = (opts && opts.radius_m) ? opts.radius_m : radiusM;
    setLoading(true); setError(null);
    const tdef = NEARME_TYPES.find(t => t.key === typeKey) || NEARME_TYPES[0];
    const cdef = cuisineKey ? ALL_NEARME_CUISINES.find(c => c.key === cuisineKey) : null;
    const body = {
      lat:center.lat, lng:center.lng,
      radius_m:radius, open_now:openNow,
      included_types: cdef ? [cdef.type] : tdef.types, max_results:20,
      rank:"DISTANCE",   // nearest 20, so a close-but-modest place isn't crowded out
    };
    try {
      const data = await placesNearby(cfg, body);
      const raw = (data.places || []).filter(p => p.business_status !== "CLOSED_PERMANENTLY");
      const distFrom = userLoc || center;
      // _idx preserves Google's order (popularity) for the "Popular" sort.
      const withDist = raw.map((p, i) => Object.assign({}, p, {
        _idx: i,
        _dist: distanceMiles(distFrom.lat, distFrom.lng, p.lat, p.lng),
      })).sort((a,b)=> (a._dist==null?1e9:a._dist) - (b._dist==null?1e9:b._dist));
      setResults(withDist);
      setSearchMode(false);
      setSearchCenter(center);
      setFetchedAt(Date.now());
      setLastSearch({ radiusM, typeKey, cuisineKey, openNow });
      logMsg("PLACES", "nearby returned " + withDist.length + " (cached=" + (data.cached?"y":"n") + ")");
    } catch(err){
      const e = mapPlacesError(err);
      setError(e);
      if (e.kind === "upsell") setTier("free");   // surface the upsell panel
    } finally {
      setLoading(false);
    }
  }

  // Search a SPECIFIC restaurant near me by name (Google text search, biased to
  // my location). Results flow through the same card list + refine pipeline.
  async function runTextSearch(){
    const qy = searchQ.trim();
    if (!qy) return;
    if (!userLoc){ requestLocation(); return; }
    setLoading(true); setError(null);
    try {
      const data = await placesSearchText(cfg, { query: qy, lat: userLoc.lat, lng: userLoc.lng, max_results: 20 });
      const raw = (data.places || []).filter(p => p.business_status !== "CLOSED_PERMANENTLY");
      const withDist = raw.map((p, i) => Object.assign({}, p, {
        _idx: i,
        _dist: distanceMiles(userLoc.lat, userLoc.lng, p.lat, p.lng),
      })).sort((a,b)=> (a._dist==null?1e9:a._dist) - (b._dist==null?1e9:b._dist));
      setResults(withDist);
      setSearchMode(true);
      setSearchCenter(userLoc);
      setFetchedAt(Date.now());
      setView("list");
      logMsg("PLACES", "text search '" + qy + "' returned " + withDist.length);
    } catch(err){
      const e = mapPlacesError(err);
      setError(e);
      if (e.kind === "upsell") setTier("free");
    } finally {
      setLoading(false);
    }
  }
  function clearTextSearch(){ setSearchQ(""); setSearchMode(false); setResults([]); setFetchedAt(null); }

  async function openDetails(placeId){
    setDetail({ place_id:placeId });   // open sheet immediately in loading state
    setDetailLoading(true); setDetailErr(null);
    try {
      const data = await placesDetails(cfg, placeId);
      setDetail(data.place);
    } catch(err){
      const e = mapPlacesError(err);
      if (e.kind === "upsell"){ setDetail(null); setError(e); setTier("free"); }
      else setDetailErr(e);
    } finally {
      setDetailLoading(false);
    }
  }

  // ---- dedup against the user's saved places ----
  function normName(s){ return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim(); }
  function hardMatch(placeId){
    if (!placeId) return null;
    return restaurants.find(r => r.google_place_id && r.google_place_id === placeId) || null;
  }
  function softMatch(p){
    if (!p) return null;
    const pn = normName(p.name);
    if (!pn) return null;
    return restaurants.find(r => {
      if (r.google_place_id && r.google_place_id === p.place_id) return false;  // that's a hard match
      const rn = normName(r.name);
      if (!rn) return false;
      const nameClose = rn === pn || rn.indexOf(pn) >= 0 || pn.indexOf(rn) >= 0;
      if (!nameClose) return false;
      if (r.lat == null || r.lng == null || p.lat == null || p.lng == null) return false;
      const d = distanceMiles(r.lat, r.lng, p.lat, p.lng);
      return d != null && d < 0.15;   // ~240m and a close name = very likely the same spot
    }) || null;
  }

  function addFromPlace(p){
    const hard = hardMatch(p.place_id);
    if (hard){ onOpenRestaurant(hard.id); return; }
    const soft = softMatch(p);
    if (soft){
      const addAnyway = window.confirm(
        "You may already have \"" + soft.name + "\" saved.\n\n" +
        "OK = add this as a new place anyway.\n" +
        "Cancel = open the one you already have.");
      if (!addAnyway){ onOpenRestaurant(soft.id); return; }
    }
    const prefill = {
      name: p.name || "",
      cuisine: cuisineFromType(p.primary_type, p.types),
      location: p.city || "",
      address: p.address || "",
      phone: p.phone || "",
      website: p.website || "",
      notes: (p.hours && p.hours.length) ? ("Hours: " + p.hours.join("; ")) : "",
      lat: p.lat, lng: p.lng,
      google_place_id: p.place_id,
    };
    logMsg("PLACES", "Add to my places from discovery: " + (p.name || "") + " place_id=" + p.place_id);
    onAddPlace(prefill);
  }

  const dirty = !lastSearch
    || lastSearch.radiusM !== radiusM
    || lastSearch.typeKey !== typeKey
    || lastSearch.cuisineKey !== cuisineKey
    || lastSearch.openNow !== openNow;
  const hasQuery = !!searchQ.trim();
  // ONE primary action: if you've typed a name, the big button searches for that
  // name (so it can never silently ignore what you typed); otherwise it runs the
  // nearby/filter browse.
  const primaryLabel = loading ? "Searching..."
    : hasQuery ? ("Search “" + searchQ.trim().slice(0,18) + "”")
    : (!results.length ? "Search nearby" : (dirty ? "Update results" : "Refresh"));
  const onPrimary = ()=> hasQuery ? runTextSearch() : runSearch();

  // ---- small inline style helpers (avoid touching the CSS block) ----
  const chip = (on)=> ({
    padding:"7px 12px", borderRadius:999, fontSize:13, fontWeight:600,
    border:"1px solid " + (on ? "var(--accent)" : "var(--line)"),
    background: on ? "var(--accent)" : "transparent",
    color: on ? "#1b1714" : "var(--text-dim)", cursor:"pointer", whiteSpace:"nowrap",
  });

  // ---------- render: gate first ----------
  function Header(){
    return (
      <div className="ovhead">
        <button className="x" onClick={onClose}>Back</button>
        <h2>Near me</h2>
        <span style={{width:54}} />
      </div>
    );
  }

  if (tier === null){
    return (
      <div className="overlay">
        <Header />
        <div className="ovbody"><div className="empty"><span className="spin" /></div></div>
      </div>
    );
  }

  if (tier !== "pro" && tier !== "unknown"){
    // Free (or comped-but-not-pro should not occur): the upsell panel. No Google
    // call has been made, so this costs nothing.
    return (
      <div className="overlay">
        <Header />
        <div className="ovbody">
          <div className="card" style={{textAlign:"center", padding:"26px 20px"}}>
            <div style={{display:"flex", justifyContent:"center", marginBottom:10}}>
              <Icon name="locate" size={34} color="var(--accent)" />
            </div>
            <div className="big" style={{marginBottom:6}}>Near me is a Pro feature</div>
            <div style={{color:"var(--text-dim)", lineHeight:1.5, marginBottom:18}}>
              Discover restaurants, cafes, and bars around you - then add the good
              ones to your places with one tap, address and all.
            </div>
            <button className="btn primary" style={{width:"100%"}} onClick={onUpgrade}>
              See Pro
            </button>
            <button className="btn ghost" style={{width:"100%", marginTop:8}} onClick={onClose}>
              Maybe later
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---------- render: search UI (Pro / unknown) ----------
  const tdef = NEARME_TYPES.find(t => t.key === typeKey) || NEARME_TYPES[0];

  return (
    <div className="overlay">
      <Header />
      <div className="ovbody" style={{display:"flex", flexDirection:"column", padding:0}}>

        {/* Location states */}
        {geoState !== "ok" && (
          <div className="card" style={{margin:14}}>
            {geoState === "locating" && (
              <div className="row" style={{gap:10}}><span className="spin" /> Finding your location...</div>
            )}
            {geoState === "idle" && (
              <div>
                <div style={{marginBottom:10}}>Find places around you right now.</div>
                <button className="btn primary" onClick={requestLocation}>Use my location</button>
              </div>
            )}
            {geoState === "denied" && (
              <div>
                <div className="big" style={{marginBottom:6}}>Location is off</div>
                <div style={{color:"var(--text-dim)", marginBottom:12, lineHeight:1.5}}>
                  Near me needs your location. Turn it on for this site in your
                  browser settings, then try again.
                </div>
                <button className="btn ghost" onClick={requestLocation}>Try again</button>
              </div>
            )}
            {geoState === "unavailable" && (
              <div>
                <div className="big" style={{marginBottom:6}}>Couldn't get your location</div>
                <div style={{color:"var(--text-dim)", marginBottom:12}}>It may be a momentary glitch.</div>
                <button className="btn ghost" onClick={requestLocation}>Try again</button>
              </div>
            )}
          </div>
        )}

        {/* Filters + search (only once we have a location) */}

              </div>

            <div className="row" style={{gap:10, justifyContent:"space-between", alignItems:"center"}}>
              <button style={chip(openNow)} onClick={()=> setOpenNow(v => !v)}>

              </button>
              <button className="btn primary" style={{flex:1, opacity: loading ? 0.7 : 1}}
                disabled={loading} onClick={onPrimary}>
                {primaryLabel}
              </button>
            </div>
            <div className="row" style={{gap:8, marginTop:8, overflowX:"auto"}}>
              <span className="faint" style={{fontSize:12, alignSelf:"center", flex:"none"}}>Sort</span>
              <button style={chip(nearSort === "dist")}  onClick={()=> setNearSort("dist")}>Closest</button>

            </div>
            <div className="row" style={{gap:8, marginTop:8, overflowX:"auto"}}>
              <span className="faint" style={{fontSize:12, alignSelf:"center", flex:"none"}}>Price</span>
              {[1,2,3,4].map(n => (
                <button key={n} style={chip(!!priceSel[n])}
                  onClick={()=> setPriceSel(s => Object.assign({}, s, { [n]: !s[n] }))}>{"$".repeat(n)}</button>
              ))}

                {hideSaved ? "Hiding saved" : "Hide saved"}
              </button>
            </div>
          </div>

        {/* Results header: count + freshness + view toggle */}
        {geoState === "ok" && (fetchedAt || loading) && (
          <div className="row" style={{justifyContent:"space-between", alignItems:"center", padding:"8px 14px"}}>
            <span className="faint" style={{fontSize:12}}>
              {loading ? "Searching..."
                : (shown.length
                    ? (searchMode ? "Name matches" : (shown.length + " place" + (shown.length===1?"":"s"))) + " - as of " + hhmm(fetchedAt)
                    : "")}
            </span>
            <div className="row" style={{gap:6}}>
              <button style={chip(view === "list")} onClick={()=> setView("list")}>List</button>
              <button style={chip(view === "map")}  onClick={()=> setView("map")}>Map</button>
            </div>
          </div>
        )}

        {/* Truncation hint: Google's nearby search returns at most 20, ranked by
            prominence. In a busy area a specific place can fall outside that 20
            no matter how you sort - point the user to the fixes. */}
        {geoState === "ok" && !loading && !searchMode && results.length >= 20 && (
          <div className="tiny faint" style={{padding:"0 14px 8px", lineHeight:1.45}}>
            Showing the 20 nearest matches (Google's cap). Something farther out may be
            missing — narrow the radius or type its name in Search above.
          </div>
        )}

        {/* Error */}
        {error && error.kind !== "upsell" && (
          <div className="card" style={{margin:14}}>
            <div style={{color:"var(--text-dim)"}}>{error.msg}</div>
            {(error.kind === "down" || error.kind === "upstream" || error.kind === "generic") && (
              <button className="btn ghost" style={{marginTop:10}} onClick={runSearch}>Try again</button>
            )}
          </div>
        )}

        {/* Body: list or map */}
        <div style={{flex:1, minHeight:0, display:"flex", flexDirection:"column", overflowY: view==="list" ? "auto" : "hidden"}}>
          {loading && (
            <div className="empty"><span className="spin" /></div>
          )}

          {!loading && view === "list" && fetchedAt && !shown.length && !error && (
            <div className="empty" style={{padding:"30px 22px"}}>
              <div className="big">{results.length ? "No matches" : "Nothing found here"}</div>
              <div>{results.length ? "Try turning off 4-star+ or switching to Closest." : "Try a wider radius or a different type."}</div>
            </div>
          )}

          {!loading && view === "list" && shown.map(p => {
            const hard = hardMatch(p.place_id);
            const soft = !hard && softMatch(p);
            const dollars = priceLevelToDollars(p.price_level);
            const sub = [humanizeType(p.primary_type), dollars].filter(Boolean).join(" - ");
            return (
              <div key={p.place_id} className="card tap" style={{margin:"8px 14px"}}
                onClick={()=> hard ? onOpenRestaurant(hard.id) : openDetails(p.place_id)}>
                <div className="row" style={{justifyContent:"space-between", alignItems:"center", gap:12}}>
                  {/* flex:1 + minWidth:0 lets the text take the row and wrap normally
                      instead of being crushed to one word per line by the button. */}
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontWeight:700, marginBottom:2}}>{p.name}</div>
                    {sub && <div className="faint" style={{fontSize:13}}>{sub}</div>}
                    <div className="row" style={{gap:10, marginTop:4, fontSize:12.5, flexWrap:"wrap"}}>
                      {p.rating != null && (
                        <span className="row" style={{gap:3}}>
                          <Icon name="star" size={12} color="var(--accent)" />
                          {p.rating}{p.rating_count != null ? " (" + p.rating_count + ")" : ""}
                        </span>
                      )}
                      {p._dist != null && <span className="faint">{fmtMiles(p._dist)}</span>}
                      {p.open_now === true  && <span style={{color:"var(--accent)"}}>Open</span>}
                      {p.open_now === false && <span className="faint">Closed</span>}
                    </div>
                    {soft && <div className="faint" style={{fontSize:11.5, marginTop:4}}>Maybe already in your places</div>}
                  </div>
                  {/* .btn sm carries width:auto, so it sizes to its label instead of
                      inheriting the global .btn{width:100%}. Saved places show a tag. */}
                  {hard
                    ? <span style={{flex:"0 0 auto", fontSize:12, fontWeight:600, color:"var(--accent)", maxWidth:90, textAlign:"right"}}>In your places</span>
                    : <button className="btn ghost sm" style={{flex:"0 0 auto"}}
                        onClick={(e)=>{ e.stopPropagation(); openDetails(p.place_id); }}>View</button>}
                </div>
              </div>
            );
          })}

          {!loading && view === "map" && (
            (results.length || userLoc)
              ? <NearbyMap user={userLoc} results={shown} onOpen={openDetails}
                  searchCenter={searchCenter}
                  onSearchArea={(lat,lng,radius)=> runSearch({ lat:lat, lng:lng, radius_m:radius })} />
              : <div className="empty" style={{padding:"30px 22px"}}><div>Search to see places on the map.</div></div>
          )}
        </div>
      </div>

      {/* Details sheet - nested layer above the list (own scroll, higher z) */}
      {detail && (
        <div className="overlay" style={{zIndex:60}}>
          <div className="ovhead">
            <button className="x" onClick={()=>{ setDetail(null); setDetailErr(null); }}>Back</button>
            <h2>Details</h2>
            <span style={{width:54}} />
          </div>
          <div className="ovbody">
            {detailLoading && <div className="empty"><span className="spin" /></div>}
            {!detailLoading && detailErr && (
              <div className="card"><div style={{color:"var(--text-dim)"}}>{detailErr.msg}</div></div>
            )}
            {!detailLoading && !detailErr && detail && detail.name && (() => {
              const hard = hardMatch(detail.place_id);
              const dollars = priceLevelToDollars(detail.price_level);
              const sub = [humanizeType(detail.primary_type), dollars].filter(Boolean).join(" - ");
              return (
                <div>
                  <div className="card">
                    <div style={{fontWeight:700, fontSize:17, marginBottom:3}}>{detail.name}</div>
                    {sub && <div className="faint" style={{marginBottom:6}}>{sub}</div>}
                    <div className="row" style={{gap:12, marginBottom:8, fontSize:13}}>
                      {detail.rating != null && (
                        <span className="row" style={{gap:3}}>
                          <Icon name="star" size={13} color="var(--accent)" />
                          {detail.rating}{detail.rating_count != null ? " (" + detail.rating_count + ")" : ""}
                        </span>
                      )}
                      {detail.open_now === true  && <span style={{color:"var(--accent)"}}>Open now</span>}
                      {detail.open_now === false && <span className="faint">Closed now</span>}
                    </div>
                    {detail.address && <div style={{color:"var(--text-dim)", marginBottom:8}}>{detail.address}</div>}
                    <div className="row" style={{gap:14, flexWrap:"wrap"}}>
                      {detail.phone && <a href={"tel:" + detail.phone} className="row" style={{gap:5, color:"var(--accent)"}}>
                        <Icon name="phone" size={14} color="var(--accent)" />Call</a>}
                      {detail.website && <a href={detail.website} target="_blank" rel="noopener noreferrer" className="row" style={{gap:5, color:"var(--accent)"}}>
                        <Icon name="link" size={14} color="var(--accent)" />Website</a>}
                      {detail.google_maps_uri && <a href={detail.google_maps_uri} target="_blank" rel="noopener noreferrer" className="row" style={{gap:5, color:"var(--accent)"}}>
                        <Icon name="pin" size={14} color="var(--accent)" />Maps</a>}
                    </div>
                  </div>

                  {detail.hours && detail.hours.length > 0 && (
                    <div className="card">
                      <div style={{fontWeight:600, marginBottom:6}}>Hours</div>
                      {detail.hours.map((h,i)=> <div key={i} className="faint" style={{fontSize:13, lineHeight:1.6}}>{h}</div>)}
                    </div>
                  )}

                  {detail.summary && (
                    <div className="card"><div style={{color:"var(--text-dim)", lineHeight:1.5}}>{detail.summary}</div></div>
                  )}

                  <button className="btn primary" style={{width:"100%", marginTop:6}}
                    onClick={()=>{ addFromPlace(detail); }}>
                    {hard ? "Open in MenuCaptain" : "Add to my places"}
                  </button>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   SPIN PICKER - "Can't decide?" wheel to randomly pick a place.
   Opened from the + menu. You curate a set of places (favorites
   pre-ticked), then spin an SVG wheel that lands on a uniformly
   random winner. Pure presentation - nothing is written to data.
   ============================================================ */
function SpinPicker({restaurants, cfg, onOpenRestaurant, onAddPlace, onUpgrade, onClose}){
  const places = (restaurants || []).filter(r => r && r.name);
  // Source mode: spin among MY saved places, or DISCOVER nearby via Google.
  const [srcMode, setSrcMode] = useState("saved");   // "saved" | "discover"
  const [dCuisine, setDCuisine] = useState("");       // "" = any food
  const [dRadius, setDRadius]   = useState(4800);     // default 3 mi
  const [dMinStars, setDMinStars] = useState(0);
  const [dIncludeSaved, setDIncludeSaved] = useState(false);   // mix in my matching saved places
  const [dCuisMore, setDCuisMore] = useState(false);           // reveal long-tail cuisines
  const [dBusy, setDBusy]   = useState(false);
  const [dErr, setDErr]     = useState("");
  const [dUpsell, setDUpsell] = useState(false);
  const dLocRef = useRef(null);   // cached geolocation for the session
  const spchip = (on)=> ({
    padding:"7px 12px", borderRadius:999, fontSize:13, fontWeight:600,
    border:"1px solid " + (on ? "var(--accent)" : "var(--line)"),
    background: on ? "var(--accent)" : "transparent",
    color: on ? "#1b1714" : "var(--text-dim)", cursor:"pointer", whiteSpace:"nowrap", flex:"none",
  });
  // favorites pre-ticked (signed-off default); the user adjusts freely
  const [picked, setPicked] = useState(()=>{
    const s = {}; let c = 0;
    places.forEach(r => { if (r.favorite && c < 8) { s[r.id] = true; c++; } });
    return s;
  });
  const [q, setQ]                 = useState("");
  const [stage, setStage]         = useState("pick");   // "pick" | "wheel"
  const [wheelList, setWheelList] = useState([]);        // frozen set for the wheel
  const [rotation, setRotation]   = useState(0);
  const [spinMode, setSpinMode]   = useState("idle");   // "idle" | "spinning" | "armed" | "stopping"
  const spinning = spinMode === "spinning";
  const busy     = spinMode !== "idle";                 // free-spinning, arming, or coasting to rest
  const [winner, setWinner]       = useState(null);
  const spinTimer = useRef(null);
  const angleRef  = useRef(0);     // live angle while the wheel free-spins (drives transform via ref, no re-render)
  const rafRef    = useRef(null);  // requestAnimationFrame handle for the free-spin / coast
  const rotorRef  = useRef(null);  // the spinning rotor element
  const pendingWinnerRef = useRef(0); // chosen slot, revealed once the coast-to-rest finishes
  const [slots, setSlots]             = useState([]);     // frozen 8-slot fill
  const [winnerSlot, setWinnerSlot]   = useState(null);   // index 0-7 lit on landing
  const [landedAgain, setLandedAgain] = useState(false);
  const reduce = (typeof window !== "undefined" && window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches);

  // clear any pending reveal timer / animation frame if the overlay unmounts mid-spin
  useEffect(()=> ()=> {
    if (spinTimer.current) clearTimeout(spinTimer.current);
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
  }, []);

  const ql = q.trim().toLowerCase();
  const shown = ql
    ? places.filter(r => ((r.name||"") + " " + (r.location||"") + " " + (r.cuisine||""))
        .toLowerCase().indexOf(ql) !== -1)
    : places;
  const pickedList = places.filter(r => picked[r.id]);
  const count = pickedList.length;

  function toggle(id){
    setPicked(p => { const m = Object.assign({}, p);
      if (m[id]) { delete m[id]; }
      else { if (Object.keys(m).length >= 8) return p;   // helm has 8 gaps - cap at 8
             m[id] = true; }
      return m; });
  }
  function selectAllShown(){
    setPicked(p => { const m = Object.assign({}, p);
      for (let i = 0; i < shown.length; i++){
        if (Object.keys(m).length >= 8) break;           // cap at 8
        m[shown[i].id] = true;
      }
      return m; });
  }
  function clearAll(){ setPicked({}); }

  function startWheel(list){
    setWheelList(list);
    setSlots(buildSlots(list));              // freeze the 8-slot fill so it is stable
    setWinner(null); setWinnerSlot(null); setLandedAgain(false);
    angleRef.current = 0; setRotation(0); setSpinMode("idle");
    setStage("wheel");
  }
  function goWheel(){
    if (count < 2) return;
    startWheel(pickedList.slice(0, 8));      // helm has 8 gaps; cap defensively
  }

  function getLocation(){
    if (dLocRef.current) return Promise.resolve(dLocRef.current);
    return new Promise((res, rej)=>{
      if (!navigator.geolocation){ rej(new Error("no geo")); return; }
      navigator.geolocation.getCurrentPosition(
        p => { const l = { lat:p.coords.latitude, lng:p.coords.longitude }; dLocRef.current = l; res(l); },
        err => rej(err),
        { enableHighAccuracy:false, timeout:10000, maximumAge:60000 });
    });
  }
  // Build the wheel from a live Google discovery: "any <cuisine> place within
  // <radius> over <rating>". Pulls the nearest matches, shuffles for variety,
  // takes up to 8. Needs at least 2 to spin. Pro-gated (same as Near me).
  async function buildDiscoverWheel(){
    setDErr(""); setDUpsell(false); setDBusy(true);
    try {
      const loc = await getLocation().catch(()=> null);
      if (!loc){ setDErr("Couldn't get your location - enable it and try again."); setDBusy(false); return; }
      const cdef = dCuisine ? ALL_NEARME_CUISINES.find(c => c.key === dCuisine) : null;
      const data = await placesNearby(cfg, {
        lat:loc.lat, lng:loc.lng, radius_m:dRadius, open_now:false,
        included_types: cdef ? [cdef.type] : ["restaurant","cafe","bar","bakery","meal_takeaway"],
        max_results:20, rank:"DISTANCE",
      });
      let arr = (data.places || []).filter(p => p.business_status !== "CLOSED_PERMANENTLY");
      if (dMinStars > 0) arr = arr.filter(p => typeof p.rating === "number" && p.rating >= dMinStars);
      const discovered = arr.map(p => Object.assign({}, p, { _dist: distanceMiles(loc.lat, loc.lng, p.lat, p.lng) }));

      // Optionally mix in MY saved places that match the same cuisine + radius.
      // (Saved places are my own picks, so they ignore the Google rating filter;
      // ones without coords still count - I can't distance-check them.)
      let savedMatches = [];
      if (dIncludeSaved){
        const wantCuisine = dCuisine ? ((ALL_NEARME_CUISINES.find(c => c.key === dCuisine) || {}).label || "") : "";
        const radiusMi = dRadius / 1609.34;
        savedMatches = places.filter(r => {
          if (wantCuisine){
            if (normalizeCuisine(r.cuisine).toLowerCase() !== wantCuisine.toLowerCase()) return false;
          }
          if (r.lat != null && r.lng != null){
            const d = distanceMiles(loc.lat, loc.lng, r.lat, r.lng);
            if (d != null && d > radiusMi) return false;
          }
          return true;
        }).map(r => Object.assign({}, r, {
          _dist: (r.lat != null && r.lng != null) ? distanceMiles(loc.lat, loc.lng, r.lat, r.lng) : null,
        }));
        // drop any discovered place I already have saved (match on Google id)
        const savedPids = new Set(savedMatches.map(r => r.google_place_id).filter(Boolean));
        for (let i = discovered.length - 1; i >= 0; i--){ if (savedPids.has(discovered[i].place_id)) discovered.splice(i, 1); }
      }

      const pool = savedMatches.concat(discovered);
      if (pool.length < 2){
        setDErr("Only " + pool.length + " match. Widen the radius, lower the rating, change cuisine"
          + (dIncludeSaved ? "" : ", or include your saved places") + ".");
        setDBusy(false); return;
      }
      // shuffle (Fisher-Yates) for variety, then take up to 8
      const sh = pool.slice();
      for (let i = sh.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); const t = sh[i]; sh[i] = sh[j]; sh[j] = t; }
      startWheel(sh.slice(0, 8));
    } catch(err){
      const e = mapPlacesError(err);
      if (e.kind === "upsell"){ setDErr("Discovery is a Pro feature."); setDUpsell(true); }
      else if (e.kind === "limit"){ setDErr(e.msg || "You've hit this month's discovery limit."); }
      else setDErr(e.msg || "Search failed - try again.");
    } finally {
      setDBusy(false);
    }
  }

  // Align so slot w's GAP lands under the top pointer (never on a spoke), `turns`
  // full revolutions ahead of `from`. Rotation only accumulates forward.
  function alignTarget(from, w, turns){
    const want = ((360 - GAPS[w]) % 360 + 360) % 360;  // bring gap w to the top
    const cur  = ((from % 360) + 360) % 360;
    const delta = ((want - cur) % 360 + 360) % 360;
    return from + 360 * turns + delta;
  }
  function revealWinner(){
    const w = pendingWinnerRef.current;
    setSpinMode("idle");
    setWinnerSlot(w);
    const landed = slots[w];            // place object, or null = "Spin again"
    if (landed) setWinner(landed);
    else setLandedAgain(true);
  }

  // START: free-spin at a steady rate until the user taps Stop (so it feels like
  // YOU steer the helm). The angle is driven straight onto the DOM node via a ref
  // so the 60fps loop never re-renders the SVG. Reduced-motion users skip the
  // free-spin and get a quick, fair snap instead.
  function startSpin(){
    if (busy) return;
    setWinner(null); setWinnerSlot(null); setLandedAgain(false);
    if (reduce){
      const w = Math.floor(Math.random() * 8);
      pendingWinnerRef.current = w;
      const target = alignTarget(rotation, w, 3);
      angleRef.current = target;
      setRotation(target); setSpinMode("stopping");
      if (spinTimer.current) clearTimeout(spinTimer.current);
      spinTimer.current = setTimeout(revealWinner, 650);
      return;
    }
    setSpinMode("spinning");
    const V = 0.66;                     // deg per ms (~1.8 revolutions / sec)
    let last = null;
    const loop = (ts)=>{
      if (last == null) last = ts;
      angleRef.current += V * (ts - last);
      last = ts;
      if (rotorRef.current) rotorRef.current.style.transform = "rotate(" + angleRef.current + "deg)";
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
  }

  // STOP: cut the free-spin and coast to rest on a uniformly-random slot (always a
  // gap), so reaction timing never biases the pick - the tap controls WHEN, not
  // WHERE. Two commits avoid a visual jump: first pin the rendered angle to the
  // live angle (transition off), then on the next frame transition to the target
  // so the browser animates a natural ~1 turn coast.
  function stopSpin(){
    if (spinMode !== "spinning") return;
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const cur = angleRef.current;
    setRotation(cur); setSpinMode("armed");          // commit 1: transform = live angle, transition none
    rafRef.current = requestAnimationFrame(()=> {
      rafRef.current = requestAnimationFrame(()=>{
        const w = Math.floor(Math.random() * 8);
        pendingWinnerRef.current = w;
        const target = alignTarget(cur, w, 1);       // one easy coasting turn into the gap
        angleRef.current = target;
        setRotation(target); setSpinMode("stopping"); // commit 2: transition on -> animates to target
        if (spinTimer.current) clearTimeout(spinTimer.current);
        spinTimer.current = setTimeout(revealWinner, 1950);
      });
    });
  }

  // ---- photoreal helm: 8 fixed slots (the gaps between the 8 spokes) ----
  const GAPS = [22.5, 67.5, 112.5, 157.5, 202.5, 247.5, 292.5, 337.5];
  const CXY = 410, R_HUB = 66, R_RIM = 210, R_NAME = 146, KW = 0.55, BAND = 124;
  function ptW(r, deg){ const t = deg * Math.PI / 180; return [CXY + r * Math.sin(t), CXY - r * Math.cos(t)]; }
  function sectorPath(a0, a1, r0, r1){
    const o0 = ptW(r1, a0), o1 = ptW(r1, a1), i1 = ptW(r0, a1), i0 = ptW(r0, a0);
    return "M " + o0[0].toFixed(1) + " " + o0[1].toFixed(1) +
      " A " + r1 + " " + r1 + " 0 0 1 " + o1[0].toFixed(1) + " " + o1[1].toFixed(1) +
      " L " + i1[0].toFixed(1) + " " + i1[1].toFixed(1) +
      " A " + r0 + " " + r0 + " 0 0 0 " + i0[0].toFixed(1) + " " + i0[1].toFixed(1) + " Z";
  }
  function trunc(s){ return s.length <= 11 ? s : s.slice(0, 10) + "\u2026"; }
  function fit(s){ return Math.max(22, Math.min(34, BAND / (Math.max(s.length, 1) * KW))); }
  // fill 8 slots from the chosen places: each repeats to fill; the remainder
  // become evenly-spaced "Spin again" slots (null) that re-roll on landing.
  function buildSlots(list){
    const P = Math.min(list.length, 8), out = new Array(8).fill(null);
    if (P === 0) return out;
    // Each place repeats as evenly as 8/P allows (so odds stay equal), and any
    // leftover slots become evenly-spaced "Spin again" (null). 2 -> each x4;
    // 3 -> each x2 + 2 spin-again; 5 -> 5 + 3; 8 -> all eight distinct. The
    // discover/pick callers cap the list at 8, so a big filter pool already
    // arrives as 8 DISTINCT places before it gets here.
    const reps = Math.floor(8 / P), filled = reps * P, nAgain = 8 - filled;
    const again = {};
    for (let i = 0; i < nAgain; i++){ again[Math.round(i * 8 / nAgain) % 8] = true; }
    let k = 0;
    for (let s = 0; s < 8; s++){
      if (again[s]) out[s] = null;          // Spin again
      else { out[s] = list[k % P]; k++; }   // even repeats -> equal odds
    }
    return out;
  }

  const dirHref = winner
    ? "https://maps.google.com/?q=" + encodeURIComponent(
        (winner.name ? winner.name + ", " : "") + (winner.address || winner.location || ""))
    : "#";

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={stage === "wheel" ? (()=> setStage("pick")) : onClose}>
          <Icon name="back" size={20} />
        </button>
        <h2>Can't decide?</h2>
        <button className="x" onClick={onClose} aria-label="Close">
          <Icon name="close" size={20} color="#b3a591" />
        </button>
      </div>
      <div className={"ovbody" + (stage === "wheel" ? " pw-body" : "")}>
        {stage === "pick" ? (
          <div>
            <div className="row" style={{gap:8, marginBottom:12}}>
              <button className={"btn sm " + (srcMode === "saved" ? "primary" : "ghost")} style={{flex:1}}
                onClick={()=> setSrcMode("saved")}>My places</button>
              <button className={"btn sm " + (srcMode === "discover" ? "primary" : "ghost")} style={{flex:1}}
                onClick={()=> setSrcMode("discover")}>Discover nearby</button>
            </div>
            {srcMode === "saved" ? (
            <React.Fragment>
            <div className="tiny faint" style={{margin:"2px 2px 10px"}}>
              Pick up to 8 places for the wheel, then spin. Your favorites are
              ticked to start - add or remove any you like.
            </div>
            <label className="fld" style={{marginBottom:10}}>
              <input className="input" value={q} onChange={e=> setQ(e.target.value)}
                placeholder="Search your places" />
            </label>
            <div className="row" style={{gap:8, alignItems:"center", marginBottom:6}}>
              <button className="btn ghost sm" onClick={selectAllShown}>Select all</button>
              <button className="btn ghost sm" onClick={clearAll}>Clear</button>
              <span className="spin-count">{count}/8 on the wheel</span>
            </div>
            {places.length === 0 ? (
              <div className="small muted" style={{padding:"16px 2px"}}>
                No places yet - add a restaurant first, then come back to spin.
              </div>
            ) : (
              <div style={{maxHeight:"52vh", overflowY:"auto"}}>
                {shown.map(r => (
                  <div key={r.id} className="spin-pick-row" onClick={()=> toggle(r.id)}>
                    <div className={"rcpt-check" + (picked[r.id] ? " on" : "")}>
                      {picked[r.id] ? "\u2713" : ""}
                    </div>
                    <div style={{flex:1, minWidth:0}}>
                      <div className="small" style={{fontWeight:600}}>
                        {r.name}
                        {r.favorite ? <span style={{color:"var(--accent)"}}>{" \u2605"}</span> : null}
                      </div>
                      {(r.cuisine || r.location) ? (
                        <div className="tiny faint">
                          {[r.cuisine, r.location].filter(Boolean).join(" \u00b7 ")}
                        </div>
                      ) : null}
                    </div>
                  </div>
                ))}
                {shown.length === 0 ? (
                  <div className="small muted" style={{padding:"12px 2px"}}>
                    No places match that search.
                  </div>
                ) : null}
              </div>
            )}
            <button className="btn primary" style={{marginTop:14, width:"100%"}}
              disabled={count < 2} onClick={goWheel}>
              {count < 2 ? "Pick at least two" : "Spin (" + count + ")"}
            </button>
            </React.Fragment>
            ) : (
            <React.Fragment>
            <div className="tiny faint" style={{margin:"2px 2px 12px"}}>
              Build the wheel from places around you - pick a cuisine, distance,
              and minimum rating, and we'll drop up to 8 matches on the wheel.
            </div>
            <div className="row" style={{gap:8, overflowX:"auto", paddingBottom:8}}>
              <span className="faint" style={{fontSize:12, alignSelf:"center", flex:"none"}}>Cuisine</span>
              <button style={spchip(dCuisine === "")} onClick={()=> setDCuisine("")}>Any</button>
              {NEARME_CUISINES.map(c => (
                <button key={c.key} style={spchip(dCuisine === c.key)}
                  onClick={()=> setDCuisine(v => v === c.key ? "" : c.key)}>{c.label}</button>
              ))}
              <button style={spchip(dCuisMore || NEARME_CUISINES_MORE.some(c => c.key === dCuisine))}
                onClick={()=> setDCuisMore(v => !v)}>{dCuisMore ? "Less" : "More…"}</button>
            </div>
            {(dCuisMore || NEARME_CUISINES_MORE.some(c => c.key === dCuisine)) && (
              <div className="row" style={{gap:8, flexWrap:"wrap", paddingBottom:8}}>
                {NEARME_CUISINES_MORE.map(c => (
                  <button key={c.key} style={spchip(dCuisine === c.key)}
                    onClick={()=> setDCuisine(v => v === c.key ? "" : c.key)}>{c.label}</button>
                ))}
              </div>
            )}
            <div className="row" style={{gap:8, overflowX:"auto", paddingBottom:8}}>
              <span className="faint" style={{fontSize:12, alignSelf:"center", flex:"none"}}>Within</span>
              {NEARME_RADII.map(r => (
                <button key={r.m} style={spchip(dRadius === r.m)} onClick={()=> setDRadius(r.m)}>{r.label}</button>
              ))}
            </div>
            <div className="row" style={{gap:8, overflowX:"auto", paddingBottom:8}}>
              <span className="faint" style={{fontSize:12, alignSelf:"center", flex:"none"}}>Rating</span>
              <button style={spchip(dMinStars === 0)}   onClick={()=> setDMinStars(0)}>Any</button>
              <button style={spchip(dMinStars === 4)}   onClick={()=> setDMinStars(4)}>4&#9733;+</button>
              <button style={spchip(dMinStars === 4.5)} onClick={()=> setDMinStars(4.5)}>4.5&#9733;+</button>
            </div>
            <div className="row" style={{gap:8, overflowX:"auto", paddingBottom:8}}>
              <span className="faint" style={{fontSize:12, alignSelf:"center", flex:"none"}}>Mix in</span>
              <button style={spchip(dIncludeSaved)} onClick={()=> setDIncludeSaved(v => !v)}>
                {dIncludeSaved ? "My saved places: on" : "My saved places"}
              </button>
            </div>
            {dErr ? (
              <div className="small" style={{color:"#e7a99e", margin:"8px 2px 0"}}>
                {dErr}
                {dUpsell ? (
                  <button className="btn primary sm" style={{marginTop:8, width:"100%"}}
                    onClick={()=> onUpgrade ? onUpgrade() : null}>See Pro</button>
                ) : null}
              </div>
            ) : null}
            <button className="btn primary" style={{marginTop:14, width:"100%", opacity: dBusy ? 0.7 : 1}}
              disabled={dBusy} onClick={buildDiscoverWheel}>
              {dBusy ? "Finding places…" : "Build my wheel"}
            </button>
            <div className="tiny faint" style={{margin:"8px 2px 0", textAlign:"center"}}>
              Uses your location. Discovery is a Pro feature.
            </div>
            </React.Fragment>
            )}
          </div>
        ) : (
          <div style={{textAlign:"center", width:"100%", maxWidth:460, marginLeft:"auto", marginRight:"auto"}}>
            <div className="pw-cap">Let the wheel steer you to your next meal.</div>
            <div className="pw-stage">
              <div className="pw-shadow" />
              <div className="pw-rotor" ref={rotorRef} style={{transform:"rotate(" + rotation + "deg)", transition: spinMode === "stopping" ? (reduce ? "transform 0.6s ease-out" : "transform 1.9s cubic-bezier(0.17, 0.72, 0.24, 1)") : "none"}}>
                <img src="/spin-wheel.png" alt="" draggable={false} />
                <svg viewBox="0 0 820 820">
                  {slots.map((s, i) => (
                    <path key={"sc" + i} d={sectorPath(GAPS[i] - 21.5, GAPS[i] + 21.5, R_HUB, R_RIM)}
                      fill="#0c0805" fillOpacity="0.6" />
                  ))}
                  {slots.map((s, i) => {
                    const lab = trunc(s ? (s.name || "") : "Spin again");
                    const deg = GAPS[i];
                    const rot = deg <= 180 ? deg - 90 : deg + 90;
                    const x = deg <= 180 ? CXY + R_NAME : CXY - R_NAME;
                    const dim = (winnerSlot !== null && winnerSlot !== i);
                    const op = dim ? 0.12 : (s ? 1 : 0.6);
                    return (
                      <text key={"nm" + i} x={x.toFixed(1)} y={CXY}
                        transform={"rotate(" + rot.toFixed(1) + " " + CXY + " " + CXY + ")"}
                        textAnchor="middle" dominantBaseline="central"
                        fontFamily="'Fraunces',Georgia,serif" fontSize={fit(lab).toFixed(1)}
                        fontWeight="700" fontStyle={s ? "normal" : "italic"}
                        fill="#ffffff" fillOpacity={op} stroke="#16100a" strokeWidth="4"
                        style={{paintOrder:"stroke", pointerEvents:"none"}}>{lab}</text>
                    );
                  })}
                </svg>
              </div>
              <div className="pw-pointer" />
            </div>

            {winner ? (
              <div className="spin-result">
                <div className="tiny faint">Tonight it's</div>
                <div className="winner">{winner.name}</div>
                {(winner.place_id && !winner.id) ? (
                  <div className="tiny faint" style={{marginBottom:6}}>
                    {[winner.rating != null ? ("★ " + winner.rating) : "", winner._dist != null ? fmtMiles(winner._dist) : ""].filter(Boolean).join(" · ")}
                  </div>
                ) : null}
                <div className="row" style={{gap:8, justifyContent:"center", flexWrap:"wrap"}}>
                  {(winner.place_id && !winner.id) ? (
                    <button className="btn primary sm" onClick={()=>{
                      if (!onAddPlace) return;
                      onAddPlace({
                        name: winner.name || "",
                        cuisine: cuisineFromType(winner.primary_type, winner.types),
                        location: winner.city || "",
                        address: winner.address || "",
                        google_place_id: winner.place_id,
                        lat: winner.lat, lng: winner.lng,
                      });
                    }}>Add to my places</button>
                  ) : (
                    <button className="btn primary sm" onClick={()=> onOpenRestaurant(winner.id)}>Open this place</button>
                  )}
                  <a className="btn ghost sm" href={dirHref} target="_blank" rel="noopener noreferrer">Directions</a>
                  <button className="btn ghost sm" onClick={startSpin}>Spin again</button>
                </div>
              </div>
            ) : (
              <div>
                {landedAgain ? (
                  <div className="tiny faint" style={{margin:"0 0 6px", color:"#e9d9bb"}}>
                    Landed on "Spin again" - give it another go.
                  </div>
                ) : null}
                {spinMode === "spinning" ? (
                  <div className="tiny faint" style={{margin:"0 0 6px", color:"#e9d9bb"}}>
                    Tap Stop whenever you're ready.
                  </div>
                ) : null}
                <button className="btn primary spin-btn"
                  disabled={spinMode === "armed" || spinMode === "stopping"}
                  onClick={spinMode === "spinning" ? stopSpin : startSpin}>
                  {spinMode === "spinning" ? "Stop"
                    : (spinMode === "armed" || spinMode === "stopping") ? "Stopping\u2026"
                    : "Spin"}
                </button>
              </div>
            )}
            <div style={{marginTop:12}}>
              <button className="btn ghost sm" onClick={()=> setStage("pick")}>Back to picks</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   RESTAURANT FORM (add / edit)
   ============================================================ */
function RestaurantForm({existing, prefill, enrich, locations, cfg, onClose, onSave}){
  // Field seeds come from `existing` (Edit) OR `prefill` (a fresh Add seeded from
  // Google discovery). Identity-shaped things (id, photo, added_date, the "Edit"
  // title) stay keyed on `existing` ONLY, so a prefill is still a brand-new place.
  // `enrich` (Update from Google on an existing place) overlays ONLY factual
  // contact/location fields on top of the existing record; name/cuisine/notes
  // stay the user's.
  const seed = enrich ? Object.assign({}, existing || {}, enrich) : (existing || prefill || null);
  const [name,setName]         = useState(seed ? (seed.name || "") : "");
  const [cuisine,setCuisine]   = useState(seed ? (seed.cuisine || "") : "");
  const [location,setLocation] = useState(seed ? (seed.location || "") : "");
  const [address,setAddress]   = useState(seed ? (seed.address || "") : "");
  const [phone,setPhone]       = useState(seed ? (seed.phone || "") : "");
  const [website,setWebsite]   = useState(seed ? (seed.website || "") : "");
  const [notes,setNotes]       = useState(seed ? (seed.notes || "") : "");
  const [fav,setFav]           = useState(existing ? !!existing.favorite : false);
  const [wishlist,setWishlist] = useState(existing ? !!existing.wishlist : false);   // "want to try" (haven't been)

  // The google_place_id rides inside the restaurant JSONB (migration-free). It is
  // stamped by a discovery prefill on a new place, and preserved across edits.
  const googlePlaceId = existing
    ? (existing.google_place_id || null)
    : (prefill ? (prefill.google_place_id || null) : null);

  // Coordinates for the map. Initialised from the saved record so editing a
  // restaurant preserves its pin. "Find address" sets these directly; the map's
  // backfill also fills them in later. A discovery prefill arrives WITH coords
  // (lat/lng from Google), so the map never has to geocode it. If the address
  // changes, geo_addr won't match and the map re-geocodes (self-healing).
  const [geo,setGeo] = useState(
    (seed && seed.lat != null && seed.lng != null)
      ? { lat:seed.lat, lng:seed.lng, geo_addr: seed.geo_addr || seed.address || "" }
      : null
  );
  const [findBusy,setFindBusy] = useState(false);
  const [findMsg,setFindMsg]   = useState("");

  // Photo state - one photo per restaurant, acts as the visual identity.
  //   existingPhotoPath -> already saved in repo (if any)
  //   pendingBlob       -> a freshly picked photo waiting to upload on Save
  //   pendingPreviewUrl -> blob URL just for preview while editing
  //   removeExisting    -> user explicitly cleared the saved photo
  const [existingPhotoPath] = useState(existing ? (existing.photo || null) : null);
  const [pendingBlob, setPendingBlob]           = useState(null);
  const [pendingPreviewUrl, setPendingPreviewUrl] = useState(null);
  const [removeExisting, setRemoveExisting]     = useState(false);
  const [photoBusy, setPhotoBusy]               = useState(false);
  const photoFileRef = useRef(null);

  // clean up the pending preview blob URL when it changes or unmounts
  useEffect(()=> {
    return ()=> { if (pendingPreviewUrl) URL.revokeObjectURL(pendingPreviewUrl); };
  },[pendingPreviewUrl]);

  async function onPhotoFiles(e){
    const file = (e.target.files || [])[0];
    if (!file) return;
    setPhotoBusy(true);
    try {
      // Resize to a max 1200px - same target as menu OCR but kept as a real
      // image we'll display, not just send to an API. Quality 0.86 looks great
      // on the iPhone screen and keeps files well under 400 KB.
      const blob = await resizeImageToBlob(file, 1200, 0.86);
      const url  = URL.createObjectURL(blob);
      // free the previous preview if any
      if (pendingPreviewUrl) URL.revokeObjectURL(pendingPreviewUrl);
      setPendingBlob(blob);
      setPendingPreviewUrl(url);
      setRemoveExisting(false);   // picking a new one overrides any prior remove
    } catch(err){
      logMsg("ERROR","Restaurant photo resize failed: " + err.message);
      alert("Could not load that photo: " + err.message);
    } finally {
      setPhotoBusy(false);
      if (photoFileRef.current) photoFileRef.current.value = "";
    }
  }
  function clearPendingPhoto(){
    if (pendingPreviewUrl) URL.revokeObjectURL(pendingPreviewUrl);
    setPendingBlob(null);
    setPendingPreviewUrl(null);
  }
  function clearAllPhotos(){
    clearPendingPhoto();
    if (existingPhotoPath) setRemoveExisting(true);
  }
  // which preview to show in the editor
  const showingPendingPreview = !!pendingPreviewUrl;
  const showingExistingPhoto  = !showingPendingPreview && !!existingPhotoPath && !removeExisting;
  const hasAnyPhoto           = showingPendingPreview || showingExistingPhoto;

  // inline "add new location" state. When true, the dropdown reads
  // "+ Add new location..." and an inline input below it lets the user
  // type a one-off location. On save the new value becomes the restaurant's
  // location AND (if not already present case-insensitively) is added to
  // the master locations list via the second arg of onSave().
  const [addingNew,setAddingNew] = useState(false);
  const [newLoc,setNewLoc]       = useState("");
  const newLocRef = useRef(null);

  // if the restaurant carries a location that has been removed from the
  // master list, still offer it in the dropdown so we don't silently drop it
  const opts = Array.from(new Set(
    (locations || []).concat(location && location.trim() ? [location] : [])
  )).sort((a,b)=> a.localeCompare(b));

  // handle dropdown change: the special sentinel "__ADD_NEW__" toggles
  // into "type a new location" mode; everything else picks an existing one
  function pickLocation(v){
    if (v === "__ADD_NEW__"){
      setAddingNew(true);
      setNewLoc("");
      // focus the new-location input so the user can type immediately
      setTimeout(()=> { if (newLocRef.current) newLocRef.current.focus(); }, 0);
    } else {
      setAddingNew(false);
      setNewLoc("");
      setLocation(v);
    }
  }

  // One Nominatim lookup on tap (NOT autocomplete - that's against policy).
  // Searches "name, city", fills the address, and stashes coords to save.
  async function findAddress(){
    const nm = name.trim();
    if (!nm){ setFindMsg("Enter the name first."); return; }
    const city = addingNew ? newLoc.trim() : location.trim();
    const q = [nm, city].filter(Boolean).join(", ");
    setFindBusy(true); setFindMsg("");
    try {
      const hit = await geocodeAddress(q, true);
      if (!hit){
        setFindMsg("No match - type the address yourself.");
      } else {
        const filled = [];
        const addr = hit.addr || hit.display || "";
        if (addr){ setAddress(addr); filled.push("address"); }
        setGeo({ lat:hit.lat, lng:hit.lng, geo_addr: addr || q });
        // Fill the extra fields ONLY when blank - never overwrite what you typed.
        const d = hit.details || {};
        if (d.cuisine && !cuisine.trim()){ setCuisine(d.cuisine); filled.push("cuisine"); }
        if (d.phone   && !phone.trim())  { setPhone(d.phone);     filled.push("phone"); }
        if (d.website && !website.trim()){ setWebsite(d.website); filled.push("website"); }
        if (d.hours   && !notes.trim())  { setNotes("Hours: " + d.hours); filled.push("hours"); }
        setFindMsg(filled.length > 1
          ? "Found it - added " + filled.join(", ") + ". Double-check it."
          : "Found it - double-check it looks right.");
        logMsg("GEO","Find address filled: " + (filled.join(", ") || "none"));
      }
    } catch(e){
      setFindMsg("Lookup failed - try again, or just type it.");
    } finally {
      setFindBusy(false);
    }
  }

  function submit(){
    if (!name.trim()) return;
    // resolve the final location string based on which input is active
    const finalLoc = addingNew ? newLoc.trim() : location.trim();
    // if user typed a new location, pass it up so the parent can add to master
    const newLocationsToAdd = (addingNew && newLoc.trim())
      ? [newLoc.trim()] : [];
    const rid = existing ? existing.id : uid("rest");
    // Compute the photo path that should be on the saved record:
    //   - new photo pending -> path will be the restaurant photo path
    //     (parent uploads the blob to that path before committing JSON)
    //   - removing existing -> null
    //   - no change -> keep the existing path
    let finalPhotoPath;
    if (pendingBlob){
      finalPhotoPath = restaurantPhotoPath(rid);
    } else if (removeExisting){
      finalPhotoPath = null;
    } else {
      finalPhotoPath = existingPhotoPath || null;
    }
    const rec = Object.assign({}, existing || {}, {   // preserve unknown fields (e.g. g_* Google meta)
      id: rid,
      name:name.trim(), cuisine:cuisine.trim(),
      location: finalLoc,
      address:address.trim(), phone:phone.trim(), website:website.trim(),
      notes:notes.trim(), favorite:fav, wishlist:wishlist,
      photo: finalPhotoPath,
      added_date: existing ? existing.added_date : todayISO(),
      // map coordinates (geo is pre-seeded from existing, so edits keep the pin)
      lat:        geo ? geo.lat : null,
      lng:        geo ? geo.lng : null,
      geo_addr:   geo ? geo.geo_addr : (existing ? (existing.geo_addr || null) : null),
      geo_ok:     geo ? true : (existing ? !!existing.geo_ok : false),
      geo_failed: (existing && !geo) ? !!existing.geo_failed : false,
      // Discovery linkage (dedup / future re-enrich). Null for hand-added places.
      google_place_id: googlePlaceId,
      // Google place photo (from Update from Google): carried from `seed` so the
      // enriched name/attribution actually persist and the hero can render it.
      google_photo_name: (seed && seed.google_photo_name) || null,
      google_photo_attr: (seed && seed.google_photo_attr) || "",
    });
    onSave(rec, {
      newLocationsToAdd: newLocationsToAdd,
      photoBlob: pendingBlob,
      photoPath: pendingBlob ? finalPhotoPath : null,
    });
  }
  return (
    <div className="overlay">

        <button className="x" onClick={onClose}>Cancel</button>

          {!hasAnyPhoto && !(seed && seed.google_photo_name) && (

          <div style={{flex:1,minWidth:0}}>
            <input ref={photoFileRef} type="file" accept="image/*"

            <button className="btn ghost sm"

            {hasAnyPhoto && (

            {!photoBusy && pendingBlob && (

            {!photoBusy && !hasAnyPhoto && seed && seed.google_photo_name && (
