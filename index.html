// Tag the people you were with. value/onChange is an array of
// { name, username?, user_id?, handle? }. roster feeds autocomplete (your
// connections first, then names you've tagged before). A name that matches a
// connection links to that account (shown with an @); otherwise it's just a tag.
function PeopleTag({ value, onChange, roster }){
  const [q, setQ] = useState("");
  const [open, setOpen] = useState(false);
  const list = value || [];
  const added = new Set(list.map(p => (p.name || "").trim().toLowerCase()));
  const ql = q.trim().toLowerCase();
  const sugg = (roster || [])
    .filter(p => p.name && !added.has(p.name.toLowerCase()))
    .filter(p => !ql || p.name.toLowerCase().indexOf(ql) !== -1 || (p.username || "").toLowerCase().indexOf(ql) !== -1)
    .slice(0, 6);
  function add(p){
    const nm = (p.name || "").trim(); if (!nm) return;
    if (added.has(nm.toLowerCase())){ setQ(""); setOpen(false); return; }
    onChange(list.concat([{ name:nm, username:p.username || undefined, user_id:p.user_id || undefined, handle:p.handle || undefined }]));
    setQ(""); setOpen(false);
  }
  function addFree(){
    const nm = q.trim(); if (!nm) return;
    const hit = (roster || []).find(p => p.name && p.name.toLowerCase() === nm.toLowerCase());
    add(hit || { name: nm });
  }
  return (
    <div>
      {list.length ? (
        <div className="go-chips" style={{marginBottom:8}}>
          {list.map((p,i)=>(
            <span key={i} className="go-chip">{p.name}
              {p.user_id || p.username ? <span style={{color:"var(--accent)", marginLeft:3}} title="Linked to a MenuCaptain account">@</span> : null}
              <button className="go-chip-x" onClick={()=> onChange(list.filter((_,j)=> j!==i))}>&times;</button>
            </span>
          ))}
        </div>
      ) : null}
      <div className="spl-row" style={{position:"relative"}}>
        <input className="input" value={q} placeholder="Add a name"
          onChange={e=>{ setQ(e.target.value); setOpen(true); }}
          onFocus={()=> setOpen(true)}
          onKeyDown={e=>{ if (e.key === "Enter"){ e.preventDefault(); addFree(); } }} />
        <button className="btn" style={{width:"auto", padding:"0 16px"}} onClick={addFree}>Add</button>
        {open && sugg.length ? (
          <div className="card" style={{position:"absolute", top:"100%", left:0, right:0, zIndex:6,
               marginTop:4, maxHeight:200, overflowY:"auto", padding:"4px 0"}}>
            {sugg.map((p,i)=>(
              <div key={i} className="pick-row" style={{padding:"9px 14px", display:"flex", alignItems:"center", gap:8}}
                onClick={()=> add(p)}>
                <span style={{flex:1, minWidth:0}}>{p.name}</span>
                {p.username ? <span className="tiny faint" style={{flex:"none"}}>@{p.username}</span>
                  : (p.handle ? <span className="tiny faint" style={{flex:"none"}}>Venmo</span> : null)}
              </div>
            ))}
          </div>
        ) : null}
      </div>
    </div>
  );
}

/* ============================================================
   VISIT FORM (log / edit)
   ============================================================ */
function VisitForm({restaurants, menus, visits, locations, onSaveRestaurant, onCreateRestaurant, presetRestaurantId, existing, cfg, onClose, onSave, onDelete, onPropagateDishNutrition, seedFromSplit}){
  const [editPlaceOpen, setEditPlaceOpen] = useState(false);   // nested edit-place editor
  const [companions, setCompanions] = useState(()=> {
    if (existing && Array.isArray(existing.companions)) return existing.companions;
    // New visit logged from a check split: pre-fill who was at the table.
    if (!existing && seedFromSplit && Array.isArray(seedFromSplit.people)){
      return seedFromSplit.people.map(n => ({ name: String(n).trim() })).filter(p => p.name);
    }
    return [];
  });
  const [loved, setLoved] = useState(()=> !!(existing && existing.loved));   // visit-level "loved"
  const [shareBusy, setShareBusy] = useState(false);   // sharing this visit
  const [shareErr, setShareErr]   = useState(null);
  const [conns, setConns] = useState([]);   // accepted connections (for tag autocomplete)
  useEffect(()=>{
    let alive = true;
    getConnections(cfg).then(d => { if (alive) setConns((d && d.connections) || []); }).catch(()=>{});
    return ()=> { alive = false; };
  // eslint-disable-next-line
  }, []);
  // Roster for "Who was with you?" autocomplete: connections first (link to an
  // account), then names tagged on past visits, with any saved Venmo handle attached.
  const peopleRoster = (function(){
    const venmo = loadVenmoHandles();
    const byKey = new Map();   // lower name -> entry
    const put = (name, extra)=>{
      const nm = (name || "").trim(); if (!nm) return;
      const k = nm.toLowerCase();
      const cur = byKey.get(k) || { name: nm };
      byKey.set(k, Object.assign(cur, extra || {}, { name: cur.name || nm,
        handle: cur.handle || extra && extra.handle || venmo[k] || undefined }));
    };
    (conns || []).forEach(c => put(c.display_name || c.username, { username: c.username || undefined, user_id: c.user_id || c.id || undefined }));
    (visits || []).forEach(v => (v.companions || []).forEach(p => put(p.name, { username: p.username, user_id: p.user_id })));
    return Array.from(byKey.values()).sort((a,b)=> (a.name||"").localeCompare(b.name||""));
  })();
  // seedFromSplit (new visits only): {items, total, splitDraft, receiptDataUrl} handed
  // over when you tap "Log as a visit" from a standalone split - so that one receipt
  // scan + split carries straight into logging the meal (no re-scan, no re-entry).
  const _seed = (!existing && seedFromSplit) ? seedFromSplit : null;
  const [restId,setRestId] = useState(
    existing ? existing.restaurant_id : (presetRestaurantId || ""));
  // Searchable, sorted restaurant picker (replaces a plain <select>).
  const [restQuery,setRestQuery] = useState("");
  const [restOpen,setRestOpen]   = useState(false);
  const chosenRest   = restaurants.find(r => r.id === restId) || null;
  const sortedRests  = restaurants.slice().sort((a,b)=>
    (Number(!!b.favorite) - Number(!!a.favorite)) || (a.name || "").localeCompare(b.name || ""));
  const rq = restQuery.trim().toLowerCase();
  const filteredRests = rq
    ? sortedRests.filter(r => ((r.name||"") + " " + (r.cuisine||"") + " " + (r.location||"")).toLowerCase().includes(rq))
    : sortedRests;
  // ---- inline Google finder: add a place that isn't saved yet, without leaving
  // the visit. Reuses the Places relay (search-text + nearby). Pro-gated server-side. ----
  const [gBusy,setGBusy]       = useState(false);
  const [gErr,setGErr]         = useState("");
  const [gResults,setGResults] = useState([]);
  function getGeoOnce(){
    return new Promise((resolve)=>{
      if (!navigator.geolocation){ resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        p => resolve({ lat:p.coords.latitude, lng:p.coords.longitude }),
        ()=> resolve(null),
        { enableHighAccuracy:false, timeout:8000, maximumAge:300000 });
    });
  }
  function gMapErr(err){
    if (err && err.status === 402) return "Finding places on Google is a Pro feature.";
    return (err && (err.detail || err.message)) || "Couldn't reach Google. Try again.";
  }
  async function runGoogleSearch(){
    const q = restQuery.trim();
    if (!q){ setGErr("Type a name first, then Search Google."); return; }
    setGBusy(true); setGErr("");
    try {
      let loc = null; try { loc = await getGeoOnce(); } catch(_e){}
      const body = { query:q, max_results:12 };
      if (loc){ body.lat = loc.lat; body.lng = loc.lng; }
      const data = await placesSearchText(cfg, body);
      const list = ((data && data.places) || []).filter(p => p.business_status !== "CLOSED_PERMANENTLY");
      setGResults(list);
      if (!list.length) setGErr("No matches. Add the city or street and try again.");
    } catch(err){ setGResults([]); setGErr(gMapErr(err)); }
    finally { setGBusy(false); }
  }
  async function runNearMe(){
    setGBusy(true); setGErr("");
    try {
      const loc = await getGeoOnce();
      if (!loc){ setGErr("Location unavailable. Allow location, or use Search Google."); setGBusy(false); return; }
      const data = await placesNearby(cfg, {
        lat:loc.lat, lng:loc.lng, radius_m:1500, open_now:false,
        included_types:["restaurant","cafe","bar","bakery","meal_takeaway"],
        max_results:15, rank:"DISTANCE",
      });
      const list = ((data && data.places) || []).filter(p => p.business_status !== "CLOSED_PERMANENTLY");
      setGResults(list);
      if (!list.length) setGErr("Nothing found nearby.");
    } catch(err){ setGResults([]); setGErr(gMapErr(err)); }
    finally { setGBusy(false); }
  }
  function pickGoogle(c){
    if (!onCreateRestaurant){ setGErr("Can't add a place here."); return; }
    const newRest = {
      id: uid("rest"),
      name: (c.name || restQuery.trim() || "New place"),
      cuisine: "", location: c.city || "",
      address: c.address || "", phone: c.phone || "", website: c.website || "", notes: "",
      favorite: false, added_date: todayISO(),
      google_place_id: c.place_id || undefined,
      lat: (c.lat != null ? c.lat : undefined),
      lng: (c.lng != null ? c.lng : undefined),
    };
    onCreateRestaurant(newRest);
    setRestId(newRest.id);
    setRestOpen(false); setRestQuery(""); setGResults([]); setGErr("");
  }
  const [date,setDate]     = useState(existing ? existing.date : todayISO());
  const [rating,setRating] = useState(()=> placeRating(
    (restaurants||[]).find(x=>x.id===restId),
    (visits||[]).filter(v=>v && v.restaurant_id===restId)));
  // The rating belongs to the PLACE now; reseed when the chosen place changes.
  useEffect(()=>{ setRating(placeRating(
    (restaurants||[]).find(x=>x.id===restId),
    (visits||[]).filter(v=>v && v.restaurant_id===restId))); }, [restId]);
  const ratingRef = useRef(null);
  // Half-star rating by tap position: map where the tap landed across the
  // 5-star row to the nearest 0.5 step. This is far more reliable on iOS
  // Safari than overlaying invisible half-width buttons (which did not fire).
  // Tapping the value you already have clears the rating back to none.
  function onRateTap(e){
    const el = ratingRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    // clientX is present on both mouse clicks and tap-generated click events
    const cx = (e.clientX != null) ? e.clientX
             : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : rect.left);
    const x  = Math.max(0, Math.min(rect.width, cx - rect.left));
    let val  = Math.ceil((x / rect.width) * 5 * 2) / 2;   // nearest half, rounding up
    val = Math.max(0.5, Math.min(5, val));
    setRating(val === rating ? 0 : val);
  }
  const [notes,setNotes]   = useState(existing ? existing.notes : "");
  const [dishes,setDishes] = useState(existing ? existing.dishes.slice() : []);
  const [dishInput,setDishInput] = useState("");
  const [confirmDel,setConfirmDel] = useState(false);
  // Split-the-check draft: built by the splitter launched from this form (as a
  // layer), held here, and saved onto the visit when the form is saved. Seeded
  // from an existing visit's split so editing never silently drops it.
  const [splitDraft,setSplitDraft] = useState(
    existing && existing.split ? existing.split : ((_seed && _seed.splitDraft) || null));
  const [splitOpen,setSplitOpen]   = useState(false);

  // ---- receipt scan state ---------------------------------------------
  // receiptSlot: null | {kind:"existing", path} | {kind:"pending", blob, previewUrl}
  // The receipt is a record, not a memory photo: it is stored separately
  // from photoSlots and revealed on demand, never shown in the photo strip.
  const [receiptSlot,setReceiptSlot] = useState(
    existing && existing.receipt && existing.receipt.photo
      ? { kind:"existing", path: existing.receipt.photo } : null);
  const [receiptTotal,setReceiptTotal] = useState(
    existing && existing.receipt && existing.receipt.total ? existing.receipt.total
      : ((_seed && _seed.total != null) ? _seed.total : null));
  const [receiptBusy,setReceiptBusy] = useState(false);
  const [receiptErr,setReceiptErr] = useState("");
  const [receiptShow,setReceiptShow] = useState(false);     // inline preview toggle
  const [receiptReview,setReceiptReview] = useState(null);  // null | [{...item, count}]  count = how many of the line you ate
  const [scannedItems,setScannedItems] = useState(
    (_seed && _seed.items && _seed.items.length) ? mapScannedItems(_seed.items) : null);   // persistent parsed items, so the picker re-opens without a re-scan
  const receiptRef = useRef(null);
  // Final/payment receipt (the card slip) - a separate labeled slot from the
  // itemized check; this is the one the expense item attaches.
  const [finalReceiptSlot,setFinalReceiptSlot] = useState(
    existing && existing.receipt && existing.receipt.final_photo
      ? { kind:"existing", path: existing.receipt.final_photo } : null);
  const [finalReceiptBusy,setFinalReceiptBusy] = useState(false);
  const [finalReceiptShow,setFinalReceiptShow] = useState(false);
  const [showFinalManual,setShowFinalManual] = useState(false);  // reveal final-receipt slot when itemized already has the total
  const finalReceiptRef = useRef(null);
  async function onFinalReceiptPicked(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setFinalReceiptBusy(true);
    try {
      const blob = await resizeImageToBlob(file, 1400, 0.85);
      setFinalReceiptSlot({ kind:"pending", blob:blob, previewUrl:URL.createObjectURL(blob) });
    } catch(err){ logMsg("ERROR","Final receipt add failed: " + err.message); }
    setFinalReceiptBusy(false);
  }

  // Map raw parsed receipt items into the "check picker" shape used to log what
  // you ate (menu_match wins for the logged name).
  function mapScannedItems(items){
    return (items || []).map((it, i) => Object.assign({}, it, {
      rid:"r"+i, count:0, useName: it.menu_match || it.name,
    }));
  }

  // The split scanned a receipt: reuse that SAME scan to log what you ate, so
  // one scan serves both. Only fills in what isn't already set.
  async function applyScannedFromSplit(parsed, shots){
    if (!parsed || !(parsed.items || []).length) return;
    setScannedItems(mapScannedItems(parsed.items));
    if (parsed.total != null) setReceiptTotal(parsed.total);
    try {
      if (!receiptSlot && shots && shots[0]){          // also keep the receipt photo on the visit
        const blob = await (await fetch(shots[0])).blob();
        setReceiptSlot({ kind:"pending", blob:blob, previewUrl:URL.createObjectURL(blob) });
      }
    } catch(e){ /* photo is best-effort; the items still flow through */ }
    logMsg("RECEIPT","Split scan shared back to visit: " + parsed.items.length + " item(s)");
  }

  // A standalone split handed over its receipt photo: attach it to this new visit
  // (dataUrl -> pending blob), once, on mount.
  useEffect(()=>{
    if (!_seed || !_seed.receiptDataUrl) return;
    let alive = true;
    (async ()=>{
      try {
        const blob = await (await fetch(_seed.receiptDataUrl)).blob();
        if (alive) setReceiptSlot(s => s || { kind:"pending", blob:blob, previewUrl:URL.createObjectURL(blob) });
      } catch(e){ /* photo best-effort */ }
    })();
    return ()=>{ alive = false; };
  }, []);

  async function onReceiptPicked(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setReceiptBusy(true); setReceiptErr("");
    try {
      const blob = await resizeImageToBlob(file, 1200, 0.82);
      const dataUrl = await blobToDataUrl(blob);
      // The restaurant's digitized menu names ground the matching, so
      // "CHKN PARM" lands on the real menu item and estimates line up.
      const parsed = await parseReceiptPhotos(cfg, [dataUrl], menuNames);
      // keep the photo (pending upload) regardless of what the user ticks
      const prev = URL.createObjectURL(blob);
      setReceiptSlot({ kind:"pending", blob:blob, previewUrl:prev });
      if (parsed.total != null) setReceiptTotal(parsed.total);
      const mappedItems = mapScannedItems(parsed.items);
      setScannedItems(mappedItems);   // persist so the picker re-opens without a re-scan
      setReceiptReview(mappedItems);
      logMsg("RECEIPT","Review open with " + parsed.items.length + " item(s)");
    } catch(err){
      logMsg("ERROR","Receipt scan failed: " + err.message);
      setReceiptErr(err.message);
    }
    setReceiptBusy(false);
  }

  function confirmReceiptDishes(){
    // Two-way editor: each picker row reconciles against the visit's dishes.
    // We only ever touch dishes tagged fromCheck - typed and menu-tapped
    // dishes are left completely alone.
    const rows = receiptReview || [];
    setDishes(prev => {
      const next = prev.slice();
      rows.forEach(it => {
        const name = (it.useName || "").trim();
        if (!name) return;
        const lineQty = Math.max(1, parseInt(it.qty, 10) || 1);
        const count   = Math.max(0, Math.min(lineQty, parseInt(it.count, 10) || 0));
        const perUnit = it.price != null ? (Number(it.price) / lineQty) : null;
        // shared-portion: single-unit lines only. sharePct = percent of the
        // item that was yours; your price is that fraction of the line total.
        const shared  = (lineQty === 1 && count > 0 && typeof it.sharePct === "number"
                          && it.sharePct > 0 && it.sharePct < 100);
        const price   = shared
          ? Math.round(Number(it.price) * (it.sharePct / 100) * 100) / 100
          : (perUnit != null ? Math.round(perUnit * count * 100) / 100 : null);
        const idx     = next.findIndex(d => d.fromCheck && (d.name||"").trim() === name);
        if (count > 0){
          if (idx >= 0){
            // update the existing check dish in place, keeping verdict/note/estimate
            const upd = Object.assign({}, next[idx]);
            if (price != null) upd.price = price; else delete upd.price;
            // share and qty are mutually exclusive in v1
            if (shared) upd.share = { pct: it.sharePct }; else delete upd.share;
            if (!shared && count > 1) upd.qty = count; else delete upd.qty;
            next[idx] = upd;
          } else {
            // don't duplicate a dish the user already added some other way
            if (next.some(d => !d.fromCheck && (d.name||"").trim() === name)) return;
            const dish = { name:name, note:"", verdict:null, fromCheck:true };
            if (price != null) dish.price = price;
            if (shared) dish.share = { pct: it.sharePct };
            else if (count > 1) dish.qty = count;
            next.push(dish);
          }
        } else if (idx >= 0){
          next.splice(idx, 1);   // deselected -> remove this check dish
        }
      });
      return next;
    });
    logMsg("RECEIPT","Applied check picks (" + rows.filter(r => (r.count||0) > 0).length + " selected)");
    setReceiptReview(null);
  }

  // Re-open the "Which were yours?" picker from the already-scanned check, so
  // more items can be added later without paying for another scan. Already-added
  // dishes appear greyed in the picker and are skipped on add.
  function openCheckPicker(){
    if (!scannedItems || !scannedItems.length) return;
    // reflect what's already on the visit (dishes tagged fromCheck) so the
    // picker opens as a live editor with your current picks pre-selected
    const byName = {};
    dishes.forEach(d => { if (d.fromCheck) byName[(d.name||"").trim()] = d; });
    setReceiptReview(scannedItems.map(it => {
      const ex = byName[(it.useName||"").trim()];
      const c  = ex ? Math.max(1, parseInt(ex.qty, 10) || 1) : 0;
      // restore the saved "my share" percent so the two-way editor round-trips
      const sp = (ex && ex.share && typeof ex.share.pct === "number") ? ex.share.pct : null;
      return Object.assign({}, it, { count:c, sharePct:sp });
    }));
    logMsg("RECEIPT","Re-opened check picker (editor) with " + scannedItems.length + " item(s)");
  }

  function removeReceipt(){
    if (receiptSlot && receiptSlot.kind === "pending" && receiptSlot.previewUrl){
      try { URL.revokeObjectURL(receiptSlot.previewUrl); } catch(e){}
    }
    setReceiptSlot(null); setReceiptTotal(null); setReceiptShow(false);
    setScannedItems(null); setReceiptReview(null);
  }

  // ---- photo state -----------------------------------------------------
  // photoSlots: ordered array (max length 3) of either:
  //   { kind:"existing", path:"<repo path>" }                 (already saved)
  //   { kind:"pending",  blob:<Blob>, previewUrl:"blob:..." } (new, awaiting upload)
  // On Save, "pending" slots are uploaded first, then the visit record's
  // .photos array is built from the final paths in slot order.
  const MAX_PHOTOS = MAX_VISIT_PHOTOS;
  const [photoSlots, setPhotoSlots] = useState(()=> {
    if (existing && Array.isArray(existing.photos)){
      return existing.photos.filter(Boolean).slice(0,MAX_PHOTOS).map(p => ({
        kind:"existing", path:p,
      }));
    }
    return [];
  });
  const [photoBusy, setPhotoBusy] = useState(false);
  const [photoLightbox, setPhotoLightbox] = useState(null);  // {paths, index} | null
  const photoFileRef = useRef(null);
  const photoCamRef  = useRef(null);   // camera-capture input (separate from library picker)

  // ---- meal-photo nutrition estimate -----------------------------------
  // visit.nutrition is a single estimate for the meal (visit-level). It is
  // computed once from a photo and stored on the visit, so it never re-runs.
  const [nutrition, setNutrition] = useState(
    existing && existing.nutrition ? existing.nutrition : null);
  const [nutBusy, setNutBusy]   = useState(false);
  const [nutErr,  setNutErr]    = useState(null);
  const [nutEdit, setNutEdit]   = useState(false);
  const [nutIngStr, setNutIngStr] = useState("");   // comma-separated editor buffer
  const nutFileRef = useRef(null);

  async function onPickNutritionPhoto(e){
    const file = e.target.files && e.target.files[0];
    if (nutFileRef.current) nutFileRef.current.value = "";   // allow re-picking same file
    if (!file) return;
    if (!configComplete(cfg)){ setNutErr("Set up your account in Settings first."); return; }
    setNutBusy(true); setNutErr(null);
    try {
      const est = await estimateNutrition(cfg, file);
      est.source = "photo_estimate";
      est.estimated_at = todayISO();
      setNutrition(est);
      setNutEdit(false);
    } catch(err){
      setNutErr(err.message || "Could not estimate. Try again.");
    } finally {
      setNutBusy(false);
    }
  }
  function setNutNum(field, value){
    setNutrition(n => Object.assign({}, n,
      { [field]: clampNum(value, 0, 20000), source:"manual" }));
  }
  function startNutEdit(){
    setNutIngStr(((nutrition && nutrition.ingredients) || []).join(", "));
    setNutEdit(true);
  }
  function commitNutEdit(){
    const ings = nutIngStr.split(",").map(s=> s.trim()).filter(Boolean).slice(0,30);
    setNutrition(n => Object.assign({}, n,
      { ingredients:ings, source:"manual", estimated_at:todayISO() }));
    setNutEdit(false);
  }
  function removeNutrition(){ setNutrition(null); setNutEdit(false); setNutErr(null); }

  // ---- per-dish photo estimate (captured at log time, propagates to menu) ----
  const [dishNutBusy, setDishNutBusy] = useState({});   // dishName -> bool
  const [dishNutErr,  setDishNutErr]  = useState({});    // dishName -> message
  const [conflict, setConflict]       = useState(null);  // {dishName, incoming, photoBlob, existing, match}
  const dishPhotoRef = useRef(null);
  const pendingDishRef = useRef(null);                   // which dish a picked file is for

  // find a menu item (in THIS restaurant's menus) whose name matches a dish
  function findMenuItem(dishName){
    const list = menus[restId] || [];
    const target = (dishName || "").trim().toLowerCase();
    if (!target) return null;
    for (const m of list){
      const secs = m.sections || [];
      for (let si=0; si<secs.length; si++){
        const items = secs[si].items || [];
        for (let ii=0; ii<items.length; ii++){
          if (((items[ii].name || "").trim().toLowerCase()) === target){
            return { restId:restId, menuId:m.menu_id, si:si, ii:ii, item:items[ii] };
          }
        }
      }
    }
    return null;
  }

  function startDishPhoto(dishName){
    pendingDishRef.current = dishName;
    if (dishPhotoRef.current){ dishPhotoRef.current.value = ""; dishPhotoRef.current.click(); }
  }

  // apply an estimate to a dish, and (if it maps to a menu item) propagate the
  // numbers + photo thumbnail up to that menu item so it shows on the menu page
  function applyDishEstimate(dishName, est, blob, match){
    let photoPath = null;
    if (match && blob){
      photoPath = menuItemPhotoPath(match.menuId,
        "d" + Date.now().toString(36) + Math.random().toString(36).slice(2,6));
      if (onPropagateDishNutrition) onPropagateDishNutrition(match, est, photoPath, blob);
    }
    setDishes(d => d.map(x => x.name === dishName
      ? Object.assign({}, x, { nutrition:est, photo:photoPath }) : x));
  }

  // Estimate a dish WITHOUT a photo (you ate there but didn't snap it).
  // Grounded by the matching menu item's description when the dish came from
  // the menu; otherwise estimated from the name alone (lower confidence).
  async function estimateDishNoPhoto(dishName){
    if (!configComplete(cfg)){
      setDishNutErr(x => Object.assign({}, x, { [dishName]:"Set up your account in Settings." }));
      return;
    }
    const restObj = (restaurants || []).find(r => r.id === restId);
    const restName = restObj ? restObj.name : "";
    setDishNutErr(x => Object.assign({}, x, { [dishName]:null }));
    setDishNutBusy(x => Object.assign({}, x, { [dishName]:true }));
    try {
      const match = findMenuItem(dishName);
      const item = match ? match.item : { name: dishName };
      const est = await estimateItemNutrition(cfg, restName, item);
      est.source = "menu_estimate";        // description/name-based, no photo
      est.estimated_at = todayISO();
      applyDishEstimate(dishName, est, null, null);   // dish only - no photo, no propagate
    } catch(err){
      setDishNutErr(x => Object.assign({}, x, { [dishName]:err.message || "Could not estimate." }));
    } finally {
      setDishNutBusy(x => Object.assign({}, x, { [dishName]:false }));
    }
  }

  // Clear a dish's estimate so the user can re-estimate (photo or no-photo).
  function clearDishEstimate(dishName){
    setDishNutErr(x => Object.assign({}, x, { [dishName]:null }));
    setDishes(d => d.map(x => x.name === dishName
      ? Object.assign({}, x, { nutrition:null, photo:null }) : x));
  }

  async function onDishPhotoPicked(e){
    const file = e.target.files && e.target.files[0];
    const dishName = pendingDishRef.current;
    if (dishPhotoRef.current) dishPhotoRef.current.value = "";
    if (!file || !dishName) return;
    if (!configComplete(cfg)){
      setDishNutErr(x => Object.assign({}, x, { [dishName]:"Set up your account in Settings." }));
      return;
    }
    setDishNutErr(x => Object.assign({}, x, { [dishName]:null }));
    setDishNutBusy(x => Object.assign({}, x, { [dishName]:true }));
    try {
      const est = await estimateNutrition(cfg, file);
      est.source = "photo_estimate";
      est.estimated_at = todayISO();
      const blob = await resizeImageToBlob(file, 1200, 0.82);   // thumbnail bytes
      const match = findMenuItem(dishName);
      if (match && match.item.nutrition && match.item.nutrition.kcal){
        // existing estimate on the menu item -> ask which to keep
        setConflict({ dishName:dishName, incoming:est, photoBlob:blob,
          existing:match.item.nutrition, match:match });
      } else {
        applyDishEstimate(dishName, est, blob, match);
      }
    } catch(err){
      setDishNutErr(x => Object.assign({}, x, { [dishName]:err.message || "Could not estimate." }));
    } finally {
      setDishNutBusy(x => Object.assign({}, x, { [dishName]:false }));
    }
  }

  function resolveConflictUsePhoto(){
    if (!conflict) return;
    applyDishEstimate(conflict.dishName, conflict.incoming, conflict.photoBlob, conflict.match);
    setConflict(null);
  }
  function resolveConflictKeepCurrent(){
    if (!conflict) return;
    // keep the menu item's current numbers; just copy them onto the visit dish
    const keep = conflict.existing;
    const photo = (conflict.match && conflict.match.item.photo) || null;
    setDishes(d => d.map(x => x.name === conflict.dishName
      ? Object.assign({}, x, { nutrition:keep, photo:photo }) : x));
    setConflict(null);
  }

  // revoke any pending blob URLs when the form unmounts (memory hygiene)
  useEffect(()=> {
    return ()=> {
      photoSlots.forEach(s => {
        if (s.kind === "pending" && s.previewUrl) URL.revokeObjectURL(s.previewUrl);
      });
    };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  async function onVisitPhotoFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    // cap how many we can accept right now based on remaining slots
    const room  = Math.max(0, MAX_PHOTOS - photoSlots.length);
    const take  = files.slice(0, room);
    if (!take.length){
      if (e.target) e.target.value = "";
      return;
    }
    setPhotoBusy(true);
    try {
      const newSlots = [];
      for (const f of take){
        const blob = await resizeImageToBlob(f, 1200, 0.86);
        const url  = URL.createObjectURL(blob);
        newSlots.push({ kind:"pending", blob:blob, previewUrl:url });
        // push each one into state as it finishes so the UI shows progress
        setPhotoSlots(prev => prev.concat([{ kind:"pending", blob:blob, previewUrl:url }]));
      }
      logMsg("VISIT","Prepared " + newSlots.length + " visit photo(s) for upload");
    } catch(err){
      logMsg("ERROR","Visit photo resize failed: " + err.message);
      alert("Could not load that photo: " + err.message);
    } finally {
      setPhotoBusy(false);
      if (e.target) e.target.value = "";
    }
  }
  function removePhotoSlot(idx){
    setPhotoSlots(prev => {
      const removed = prev[idx];
      if (removed && removed.kind === "pending" && removed.previewUrl){
        URL.revokeObjectURL(removed.previewUrl);
      }
      return prev.filter((_,i)=> i !== idx);
    });
  }

  // multi-menu picker: build [{label, sections:[{name,items}]}] groups.
  // Dedup item names within each menu (so an ingredient that appears in
  // two sections of the same menu only renders once - first occurrence wins).
  // Cross-menu duplicates are kept so e.g. a dessert and a main with the
  // same name can both be tapped independently.
  const menusForRest = menus[restId] || [];
  const menuGroups = menusForRest.map(m => {
    const seen = new Set();
    const sectionGroups = [];
    (m.sections || []).forEach(s => {
      const items = [];
      (s.items || []).forEach(it => {
        const key = (it.name || "").trim().toLowerCase();
        if (!key || seen.has(key)) return;
        seen.add(key);
        items.push(it.name);
      });
      if (items.length > 0){
        sectionGroups.push({ name:s.name || "", items:items });
      }
    });
    const total = sectionGroups.reduce((n,s)=> n + s.items.length, 0);
    return { label:m.label || "Menu", sections:sectionGroups, total:total };
  }).filter(g => g.total > 0);
  const dishNames = dishes.map(d => d.name);

  // Restaurant menu item names - grounds receipt OCR's "menu_match" so receipt
  // shorthand maps to real dishes. Shared by BOTH the "What you had" scan and the
  // split's own scan. NB: menuGroups' section items are already name STRINGS.
  const menuNames = [];
  (menuGroups || []).forEach(g => (g.sections || []).forEach(s =>
    (s.items || []).forEach(nm => { if (nm) menuNames.push(nm); })));

  // Autocomplete pool for "What you had": this place's menu items + any dish
  // you've logged before (so it works even without a digitized menu). Deduped,
  // menu items first. When nothing matches, typing + Add just creates the item.
  const dishPool = (function(){
    const seen = new Map();   // lower -> display
    menuNames.forEach(n => { const k = n.toLowerCase(); if (!seen.has(k)) seen.set(k, n); });
    (visits || []).forEach(v => (v.dishes || []).forEach(d => {
      if (d && d.name){ const k = d.name.toLowerCase(); if (!seen.has(k)) seen.set(k, d.name); } }));
    return Array.from(seen.values());
  })();

  function addDish(name){
    const n = (name || "").trim();
    if (!n) return;
    if (dishNames.indexOf(n) !== -1) return;       // avoid duplicates
    // verdict: per-dish memory for "should I order this again?"
    //   null (unset) | "again" (loved it) | "skip" (not again)
    setDishes(d => d.concat([{ name:n, note:"", verdict:null }]));
    setDishInput("");
  }
  function removeDish(name){ setDishes(d => d.filter(x => x.name !== name)); }

  // Rename a dish in place (e.g. the check printed "SPECIAL" and you want
  // the real dish name). Keeps price, verdict, estimate, and photo intact.
  const [editDish,setEditDish] = useState(null);   // null | {orig, draft, err}
  function saveDishRename(){
    if (!editDish) return;
    const next = (editDish.draft || "").trim();
    if (!next){ setEditDish(ed => Object.assign({}, ed, {err:"Name can\u2019t be empty."})); return; }
    if (next !== editDish.orig && dishNames.indexOf(next) !== -1){
      setEditDish(ed => Object.assign({}, ed, {err:"You already have a dish with that name."}));
      return;
    }
    setDishes(d => d.map(x => x.name === editDish.orig
      ? Object.assign({}, x, { name: next }) : x));
    logMsg("VISIT","Renamed dish '" + editDish.orig + "' -> '" + next + "'");
    setEditDish(null);
  }
  // toggle a dish's verdict; tapping the active verdict again clears it
  function setVerdict(name, v){
    setDishes(d => d.map(x => x.name === name
      ? Object.assign({}, x, { verdict: x.verdict === v ? null : v })
      : x));
  }

  function submit(){
    if (!restId) return;
    const r = restaurants.find(x => x.id === restId);
    const vid = existing ? existing.id : uid("visit");

    // Compute final paths and pending uploads. Pending blobs each get a
    // fresh short photo_id so deletes don't shift any other photo's path
    // (every photo file is at a unique stable path for its lifetime).
    const finalPaths = [];
    const pendingUploads = [];
    photoSlots.forEach(s => {
      if (s.kind === "existing"){
        finalPaths.push(s.path);
      } else if (s.kind === "pending"){
        const photoId = "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
        const path = visitPhotoPath(vid, photoId);
        finalPaths.push(path);
        pendingUploads.push({ path:path, blob:s.blob });
      }
    });

    // Receipt: pending blob gets its own stable path under photos/receipts/
    // (kept OUT of the photos array so it never appears in the photo strip
    // or the Food passport - it is revealed via the Show receipt link).
    let receipt = null;
    // Resolve a receipt slot to a stored path (queueing an upload if it's pending).
    // Two labeled receipts: photo = the itemized check, final_photo = the payment slip.
    const resolveReceiptSlot = (slot, suffix) => {
      if (!slot) return null;
      if (slot.kind === "existing") return slot.path;
      const rpid = "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
      const rpath = "photos/receipts/" + vid + "_" + suffix + "_" + rpid + ".jpg";
      pendingUploads.push({ path: rpath, blob: slot.blob });
      return rpath;
    };
    const itemizedPath = resolveReceiptSlot(receiptSlot, "chk");
    const finalPath    = resolveReceiptSlot(finalReceiptSlot, "fin");
    if (itemizedPath || finalPath || receiptTotal != null){
      receipt = { photo: itemizedPath, final_photo: finalPath,
                  total: receiptTotal != null ? receiptTotal : null };
    }

    const rec = {
      id: vid,
      restaurant_id: restId,
      restaurant_name: r ? r.name : "",          // snapshot, survives restaurant deletion
      date: date || todayISO(),
      rating: rating,
      dishes: dishes,
      notes: notes.trim(),
      photos: finalPaths,
      receipt: receipt,                          // {photo, total} or null
      nutrition: nutrition || null,              // meal-photo estimate (or null)
      logged_at: existing ? existing.logged_at : Date.now(),
      split: splitDraft || null,                 // who-pays-what split, saved with the visit
      companions: companions,                    // people you were with [{name, username?, user_id?, handle?}]
      loved: loved,                              // visit-level "loved" (feeds "Visits I loved")
    };
    onSave(rec, { pendingUploads: pendingUploads });
  }

  if (!restaurants.length){
    return (
      <div className="overlay">
        <div className="ovhead">
          <button className="x" onClick={onClose}>Close</button>
          <h2>Log a visit</h2><span style={{width:40}} />
        </div>
        <div className="ovbody">
          <div className="empty">
            <div className="big">Add a restaurant first</div>
            <div>You need at least one saved place before logging a visit.</div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="overlay">
      {conflict && (
        <div className="modal-bg" onClick={()=> setConflict(null)}>
          <div className="modal" onClick={e=> e.stopPropagation()}>
            <div className="modal-title">"{conflict.dishName}" already has an estimate</div>
            <div className="modal-body">
              On the menu it's currently <strong>
              {(conflict.existing.source==="photo_estimate"||conflict.existing.source==="menu_estimate") ? "~" : ""}
              {conflict.existing.kcal} cal</strong>
              {conflict.existing.source==="menu_stated" ? " (per menu)"
                : conflict.existing.source==="manual" ? " (entered by you)"
                : conflict.existing.source==="photo_estimate" ? " (from a photo)"
                : " (estimated)"}. Your new photo estimate is <strong>~{conflict.incoming.kcal} cal</strong>.
            </div>
            <div className="modal-actions">
              <button className="btn ghost" onClick={resolveConflictKeepCurrent}>Keep current</button>
              <button className="btn primary" onClick={resolveConflictUsePhoto}>Use photo estimate</button>
            </div>
          </div>
        </div>
      )}
      <div className="ovhead">
        <button className="x" onClick={onClose}>Cancel</button>
        <h2>{existing ? "Edit visit" : "Log a visit"}</h2>
        <button className="x" onClick={submit}
          style={{color:restId?"var(--accent)":"var(--text-faint)"}}>Save</button>
      </div>
      <div className="ovbody">
        <label className="fld"><span className="lbl">Restaurant</span></label>
        <div style={{position:"relative", marginBottom:14}}>
          {chosenRest && !restOpen ? (
            <div className="input" style={{display:"flex", alignItems:"center", gap:10, cursor:"pointer"}}
              onClick={()=>{ setRestOpen(true); setRestQuery(""); }}>
              <span style={{flex:1, minWidth:0}}>{chosenRest.name}</span>
              {onSaveRestaurant ? (
                <button aria-label="Edit place details" title="Edit place details"
                  style={{flex:"none", background:"none", border:"none", padding:2, cursor:"pointer", display:"flex"}}
                  onClick={(e)=>{ e.stopPropagation(); setEditPlaceOpen(true); }}>
                  <Icon name="edit" size={17} color="var(--accent)" />
                </button>
              ) : null}
              <span className="tiny" style={{color:"var(--accent)", flex:"none"}}>Change</span>
            </div>
          ) : (
            <>
              <input className="input" autoFocus={restOpen} placeholder="Search your places..."
                value={restQuery}
                onChange={e=>{ setRestQuery(e.target.value); setRestOpen(true); }}
                onFocus={()=> setRestOpen(true)} />
              {restOpen ? (
                <div className="card" style={{marginTop:6, maxHeight:240, overflowY:"auto", padding:"4px 0"}}>
                  {filteredRests.length === 0 ? (
                    <div className="small muted" style={{padding:"10px 14px"}}>No places match.</div>
                  ) : filteredRests.map(r => (
                    <div key={r.id} className="pick-row"
                      style={{padding:"11px 14px", display:"flex", alignItems:"center", gap:8}}
                      onClick={()=>{ setRestId(r.id); setRestOpen(false); setRestQuery(""); }}>
                      {r.favorite ? <span style={{color:"var(--accent)", flex:"none"}}>&#9733;</span> : null}
                      <span style={{flex:1, minWidth:0}}>{r.name}</span>
                      {(r.cuisine || r.location)
                        ? <span className="tiny faint" style={{flex:"none"}}>{[r.cuisine, r.location].filter(Boolean).join(" · ")}</span>
                        : null}
                    </div>
                  ))}
                </div>
              ) : null}

              {/* Not in your places? Find it on Google and add it inline, without
                  losing this visit draft. */}
              <div className="row" style={{gap:8, marginTop:8}}>
                <button className="btn ghost sm" style={{flex:1}} disabled={gBusy} onClick={runGoogleSearch}>
                  {gBusy ? <span className="spin" /> : <Icon name="locate" size={15} color="var(--accent)" />}
                  Search Google
                </button>

                      const perUnit = it.price != null ? (Number(it.price) / lineQty) : null;  // dollars per unit
                      const yourPrice = perUnit != null ? perUnit * count : null;
                      // clamp + write this line's count (how many of it you had)
                      const setCount = (n)=>{ const c = Math.max(0, Math.min(lineQty, n));
                        setReceiptReview(rr => rr.map(x => x.rid === it.rid ? Object.assign({}, x, {count:c}) : x)); };
                      // tapping the name / checkmark is a quick all-or-none toggle

                      // shared-portion: set/clear this line's "my share" percent.

                      const setSharePct = (p)=>{ setReceiptReview(rr => rr.map(x =>

                              </div>

            the whole-plate estimate is next to what you ordered. Informative &
            celebratory, never restrictive: no targets, no budgets, no warnings. */}
        <div className="fld">
          <span className="lbl">
            Nutrition <span className="faint" style={{fontWeight:400}}>(estimate from a photo)</span>
          </span>
          <input ref={nutFileRef} type="file" accept="image/*"
            style={{display:"none"}} onChange={onPickNutritionPhoto} />

          {!nutrition && (
            <div>
              <button className="btn ghost" disabled={nutBusy}
                onClick={()=> { if (!nutBusy && nutFileRef.current) nutFileRef.current.click(); }}>
                {nutBusy ? <span className="spin" /> : <Icon name="sparkle" size={16} />}
                {nutBusy ? "Estimating..." : "Estimate from a photo"}
              </button>
              <div className="tiny faint" style={{marginTop:6}}>
                Snap your plate and the app estimates calories and macros - just for
                memory and curiosity.
              </div>
            </div>
          )}

          {nutErr && <div className="ask-err" style={{marginTop:8}}>{nutErr}</div>}

          {nutrition && (
            <div className="card nutri">
              <div className="row between" style={{alignItems:"baseline"}}>
                <div className="nutri-kcal">
                  {(nutrition.source==="photo_estimate"||nutrition.source==="menu_estimate") ? "~" : ""}
                  {nutrition.kcal}<span className="nutri-kcal-u"> cal</span>
                </div>
                <div className="row" style={{gap:6,flex:"none"}}>
                  <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                    title="Re-estimate from a new photo"
                    onClick={()=> { if (!nutBusy && nutFileRef.current) nutFileRef.current.click(); }}>
                    {nutBusy ? <span className="spin" /> : <Icon name="camera" size={15} />}
                  </button>
                  <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                    title={nutEdit ? "Done" : "Edit numbers"}
                    onClick={()=> nutEdit ? commitNutEdit() : startNutEdit()}>
                    <Icon name={nutEdit ? "check" : "edit"} size={15} />
                  </button>
                  <button className="btn ghost sm" style={{flex:"none",padding:"6px 10px"}}
                    title="Remove" onClick={removeNutrition}>
                    <Icon name="trash" size={15} color="#80715f" />
                  </button>
                </div>
              </div>

              {!nutEdit && (
                <div className="nutri-macros">
                  <span><b>{nutrition.protein_g}g</b> protein</span>
                  <span><b>{nutrition.carbs_g}g</b> carbs</span>
                  <span><b>{nutrition.fat_g}g</b> fat</span>
                </div>
              )}

              {nutEdit && (
                <div className="nutri-edit">
                  <label>cal<input className="input" type="number" inputMode="numeric"
                    value={nutrition.kcal} onChange={e=> setNutNum("kcal", e.target.value)} /></label>
                  <label>protein (g)<input className="input" type="number" inputMode="numeric"
                    value={nutrition.protein_g} onChange={e=> setNutNum("protein_g", e.target.value)} /></label>
                  <label>carbs (g)<input className="input" type="number" inputMode="numeric"
                    value={nutrition.carbs_g} onChange={e=> setNutNum("carbs_g", e.target.value)} /></label>
                  <label>fat (g)<input className="input" type="number" inputMode="numeric"
                    value={nutrition.fat_g} onChange={e=> setNutNum("fat_g", e.target.value)} /></label>
                  <label className="wide">ingredients
                    <input className="input" value={nutIngStr}
                      onChange={e=> setNutIngStr(e.target.value)}
                      placeholder="comma, separated, list" /></label>
                </div>
              )}

              {!nutEdit && nutrition.ingredients && nutrition.ingredients.length > 0 && (
                <div className="chips" style={{marginTop:10}}>
                  {nutrition.ingredients.map((ing,i)=> <span key={i} className="chip">{ing}</span>)}
                </div>
              )}

              <div className="nutri-foot">
                {nutrition.source === "manual" ? "Edited by you" : "Estimated from photo"}
                {nutrition.source !== "manual" && nutrition.confidence
                  ? " - " + nutrition.confidence + " confidence" : ""}
              </div>
              {nutrition.note && !nutEdit && (
                <div className="tiny faint" style={{marginTop:4}}>{nutrition.note}</div>
              )}
            </div>
          )}
        </div>

        <label className="fld"><span className="lbl">Notes</span>
          <textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="How was it? Worth returning?" />
        </label>

        <button type="button" className={"btn" + (loved ? " primary" : " ghost")}
          style={{marginBottom:14}} onClick={()=> setLoved(l => !l)}>
          <span className="row" style={{gap:7, justifyContent:"center"}}>
            <Icon name="heart" size={17} color={loved ? "#1b1714" : "#d9604e"} />
            {loved ? "Loved this visit" : "Mark this visit loved"}
          </span>
        </button>

        {existing && (
          <div style={{margin:"4px 0 14px"}}>
            <button className="btn ghost" disabled={shareBusy} onClick={()=>{
              const shareVisitObj = Object.assign({}, existing, {
                date: date,
                companions: companions,
                photos: photoSlots.filter(s => s && s.kind === "existing").map(s => s.path),
              });
              shareVisit(cfg, shareVisitObj, chosenRest, (menus && menus[restId]) || [], setShareBusy, setShareErr);
            }}>
              {shareBusy ? <span className="spin" />
                : <span className="row" style={{gap:6, justifyContent:"center"}}><Icon name="share" size={16} />Share this visit</span>}
            </button>
            <div className="tiny faint" style={{marginTop:6}}>
              Shares the place, the photos, who you were with, and the menu - never your notes or what you ate.
            </div>
            {shareErr ? <div className="tiny" style={{color:"var(--accent)", marginTop:5}}>{shareErr}</div> : null}
          </div>
        )}

        {onDelete && (
          !confirmDel ? (
            <button className="btn danger" onClick={()=> setConfirmDel(true)}>
              <Icon name="trash" size={17} />Delete this visit
            </button>
          ) : (
            <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)"}}>
              <div className="small" style={{marginBottom:11}}>Delete this visit permanently?</div>
              <div className="row" style={{gap:9}}>
                <button className="btn ghost" onClick={()=> setConfirmDel(false)}>Cancel</button>
                <button className="btn danger" onClick={onDelete}>Delete</button>
              </div>
            </div>
          )
        )}
        <div style={{height:24}} />
      </div>
      {splitOpen && (
        <div style={{position:"fixed", inset:0, zIndex:60}}>
          <SplitCheckFlow
            config={cfg}
            flash={(m)=> logMsg("SPLIT", m || "")}
            restaurants={restaurants}
            visits={[]}
            initialLines={(scannedItems && scannedItems.length)
              ? scannedItems.map(it => ({ name: it.useName, price: it.price, qty: it.qty || 1 }))
              : null}
            initialTotal={receiptTotal != null ? receiptTotal : null}
            presetRestId={restId}
            presetVisitId={"new"}
            menuNames={menuNames}
            onScanned={applyScannedFromSplit}
            initialReceiptPhoto={receiptSlot && receiptSlot.kind === "existing" ? receiptSlot.path : null}
            initialFinalReceipt={finalReceiptSlot && finalReceiptSlot.kind === "existing" ? finalReceiptSlot.path : null}
            initialSplit={splitDraft || null}
            onApplyDraft={(splitObj)=>{ setSplitDraft(splitObj); setSplitOpen(false); }}
            onClose={()=> setSplitOpen(false)} />
        </div>
      )}
      {photoLightbox && (
        <PhotoLightbox cfg={cfg} paths={photoLightbox.paths} index={photoLightbox.index}
          onClose={()=> setPhotoLightbox(null)} />
      )}
      {editPlaceOpen && chosenRest && (
        // Nested higher-z layer so the visit draft is preserved underneath.
        <div style={{position:"fixed", inset:0, zIndex:60}}>
          <RestaurantForm
            existing={chosenRest}
            locations={locations || []}
            cfg={cfg}
            onClose={()=> setEditPlaceOpen(false)}
            onSave={async (rec, extras)=>{
              const ok = onSaveRestaurant ? await onSaveRestaurant(rec, extras) : true;
              if (ok !== false) setEditPlaceOpen(false);
            }} />
        </div>
      )}
    </div>
  );
}

/* ============================================================
   SCAN MENU FLOW
   step 1: pick photos  ->  step 2: digitizing  ->  step 3: review/save

   Three entry modes:
   - presetRestaurantId + presetMenuId : re-scan an existing menu (replace by id)
   - presetRestaurantId only           : add a new menu to that restaurant
   - neither                           : new restaurant OR pick existing, new menu
   ============================================================ */
// Menu-label pills shown on the scan-review screen. "Other..." is rendered
// separately at the end and focuses the text input rather than filling a value.
const LABEL_SUGGESTIONS = [
  "Main",
  // food side - time-progressed, then post-meal, then promotional
  "Food","Breakfast","Brunch","Lunch","Dinner","Late Night","Dessert","Happy Hour",
  // drinks side - catchall, then categories
  "Drinks","Cocktails","Beer","Wine","Whiskey","Spirits",
];

function ScanMenuFlow({config, restaurants, menus, presetRestaurantId, presetMenuId,
                       onClose, onSave}){
  // find the existing menu we're re-scanning (if any), to lock its label
  const presetMenu = (presetRestaurantId && presetMenuId)
    ? (menus[presetRestaurantId] || []).find(m => m.menu_id === presetMenuId)
    : null;

  const [step,setStep]         = useState("pick");      // pick | working | review | error
  const [previews,setPreviews] = useState([]);          // data URLs for thumbnails
  const [dataUrls,setDataUrls] = useState([]);          // resized data URLs for API
  const [errMsg,setErrMsg]     = useState("");
  const [result,setResult]     = useState(null);        // parsed menu
  const [urlInput,setUrlInput] = useState("");          // "pull from a link" field
  const [restId,setRestId]     = useState(presetRestaurantId || "");
  const [newName,setNewName]   = useState("");
  const [label,setLabel]       = useState(presetMenu ? (presetMenu.label || "") : "");
  // Top-level save mode for multi-section new scans:
  //   "one"    -> save all sections as subsections of one menu named `label`
  //   "custom" -> per-section: each section has its own destination label;
  //               sections with the same label merge into one menu.
  // Re-scans and single-section scans always use `label` (no mode toggle).
  const [saveMode,setSaveMode]         = useState("one");
  // string[] aligned to result.sections, used only in "custom" mode
  const [sectionExtracts,setSectionExtracts] = useState([]);
  const fileRef     = useRef(null);
  const labelRef    = useRef(null);
  // refs for each section's input in custom mode (for the per-section Other... pill)
  const sectionInputRefs = useRef({});

  // when OCR completes, initialize per-section labels to the OCR-detected names
  // and reset save mode to the simple "one menu" default
  useEffect(()=>{
    if (!result) return;
    // Title-case the OCR-detected section names so they match the pill
    // labels (which are Title Case). Without this, "COCKTAILS" pre-filled
    // from OCR wouldn't merge with a section where the user tapped the
    // "Cocktails" pill, even though they mean the same destination.
    setSectionExtracts((result.sections || []).map(s => toTitleCase(s.name || "")));
    setSaveMode("one");
  },[result]);

  // tracks "processing M of N" status during onFiles so the UI can show
  // visible feedback while photos are being resized after iOS hands them over
  const [processing, setProcessing] = useState(null);  // {done, total} | null

  async function onFiles(e){
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    logMsg("SCAN","Selected " + files.length + " photo(s)");
    setProcessing({done:0, total:files.length});
    try {
      // Resize each file serially. After every file, push its thumbnail into
      // state - users see thumbnails populate one by one instead of all at the
      // end. This is the most visible part of the iOS post-conversion delay.
      for (let i=0; i<files.length; i++){
        const blob = await resizeImageToBlob(files[i], 1200, 0.82);
        const url  = await blobToDataUrl(blob);
        setDataUrls(d => d.concat([url]));
        setPreviews(p => p.concat([url]));
        setProcessing({done:i+1, total:files.length});
      }
      // small delay so the user sees the "done" state briefly before it clears
      setTimeout(()=> setProcessing(null), 350);
      // reset the input so the same file can be picked again if needed
      if (fileRef.current) fileRef.current.value = "";
    } catch(err){
      setProcessing(null);
      logMsg("ERROR","Photo processing failed: " + err.message);
      setErrMsg("Could not process a photo: " + err.message);
      setStep("error");
    }
  }

  async function runOcr(){
    if (!dataUrls.length) return;
    setStep("working");
    try {
      const parsed = await digitizeMenu(config, dataUrls);
      parsed.captured_date = todayISO();
      parsed.last_updated  = todayISO();
      parsed.source        = "photo_ocr";
      setResult(parsed);
      // Pre-fill the destination if the menu showed a restaurant name.
      // If we already have a restaurant whose name matches (case-insensitive,
      // trimmed), default the "Save menu to" picker to THAT existing place so a
      // second menu scan does not silently create a duplicate restaurant. Only
      // an exact normalized match counts - no fuzzy guessing (predictable beats
      // surprising). No match -> pre-fill the new-restaurant name field as before.
      if (!presetRestaurantId && parsed.restaurant_name){
        const norm = s => (s || "").trim().toLowerCase();
        const hit = restaurants.find(r => norm(r.name) === norm(parsed.restaurant_name));
        if (hit){
          setRestId(hit.id);
          logMsg("SCAN","Scanned name matches existing restaurant '" + hit.name +
                        "' (id " + hit.id + ") - defaulting there to avoid a duplicate");
        } else {
          setNewName(parsed.restaurant_name);
          logMsg("SCAN","No existing restaurant matches '" + parsed.restaurant_name +
                        "' - defaulting to a new restaurant");
        }
      }
      const itemCount = parsed.sections.reduce((n,s)=> n + s.items.length, 0);
      logMsg("SCAN","Digitized " + parsed.sections.length + " sections, " +
                    itemCount + " items");
      setStep("review");
    } catch(err){
      logMsg("ERROR","Digitize failed: " + err.message);
      setErrMsg(err.message);
      setStep("error");
    }
  }

  // Shared destination prefill (same logic as runOcr): match the digitized name
  // to an existing place, else seed the new-restaurant field.
  function prefillDestination(parsed){
    if (!presetRestaurantId && parsed.restaurant_name){
      const norm = s => (s || "").trim().toLowerCase();
      const hit = restaurants.find(r => norm(r.name) === norm(parsed.restaurant_name));
      if (hit) setRestId(hit.id); else setNewName(parsed.restaurant_name);
    }
  }

  // Pull a menu from a web link: server fetches the page text, Claude extracts it,
  // then it drops into the SAME review/save flow as a scan.
  async function runUrl(){
    const u = (urlInput || "").trim();
    if (!u) return;
    setStep("working");
    try {
      const fetched = await fetchMenuText(config, u);
      const parsed  = await digitizeMenuFromText(config, fetched.text);
      if (!parsed.sections.length){
        throw new Error("No menu on that page - homepages and contact pages usually don't have one. Try the restaurant's menu/order page, or scan the menu (most reliable).");
      }
      parsed.captured_date = todayISO();
      parsed.last_updated  = todayISO();
      parsed.source        = "web";
      parsed.source_url     = fetched.final_url || u;
      if (!parsed.restaurant_name && fetched.title) parsed.restaurant_name = fetched.title;
      prefillDestination(parsed);
      setResult(parsed);
      const itemCount = parsed.sections.reduce((n,s)=> n + s.items.length, 0);
      logMsg("SCAN","Web menu extracted: " + parsed.sections.length + " sections, " + itemCount + " items");
      setStep("review");
    } catch(err){
      logMsg("ERROR","Web menu failed: " + err.message);
      setErrMsg(err.message);
      setStep("error");
    }
  }

  // focus the freeform label input (used by the "Other..." pill)
  function focusOtherLabel(){
    setLabel("");
    setTimeout(()=> { if (labelRef.current) labelRef.current.focus(); }, 0);
  }

  function save(){
    let targetRestId  = restId;
    let newRestaurant = null;
    if (!targetRestId){
      // creating a new restaurant from the scan
      const nm = (newName || result.restaurant_name || "New restaurant").trim();
      targetRestId = uid("rest");
      newRestaurant = {
        id:targetRestId, name:nm, cuisine:"", location:"",
        address:"", phone:"", website:"", notes:"",
        favorite:false, added_date:todayISO(),
      };
      logMsg("SCAN","Creating new restaurant '" + nm + "' for scanned menu");
    }

    const isReplace = !!presetMenu;
    const sections  = result.sections || [];

    // ---- build the menus to save ----
    let menusToSave;
    if (isReplace){
      // re-scan: always single menu, replace existing by menu_id
      menusToSave = [{
        menu_id:       presetMenu.menu_id,
        label:         (label || "").trim() || presetMenu.label,
        restaurant_id: targetRestId,
        captured_date: presetMenu.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      sections,
        raw_text:      result.raw_text || "",
      }];
    } else if (sections.length >= 2 && saveMode === "custom"){
      // customize mode: group sections by destination label.
      // Same-label sections merge into one menu with multiple subsections.
      // Grouping is case-insensitive ("Cocktails" and "COCKTAILS" merge),
      // and the first-seen casing wins for the displayed menu label.
      const groups = new Map();           // lowercased label -> { label, sections[] }
      sections.forEach((s, i) => {
        const dest = (sectionExtracts[i] || "").trim();
        if (!dest) return;                // safety: blocked by canSave
        const key = dest.toLowerCase();
        if (!groups.has(key)){
          groups.set(key, { label: dest, sections: [] });
        }
        groups.get(key).sections.push(s);
      });
      menusToSave = Array.from(groups.values()).map(g => ({
        menu_id:       uid("menu"),
        label:         g.label,
        restaurant_id: targetRestId,
        captured_date: result.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      g.sections,
        raw_text:      "",
      }));
    } else {
      // "one menu" mode (or single-section): one menu containing all sections
      menusToSave = [{
        menu_id:       uid("menu"),
        label:         (label || "").trim() || "Menu",
        restaurant_id: targetRestId,
        captured_date: result.captured_date,
        last_updated:  todayISO(),
        source:        "photo_ocr",
        sections:      sections,
        raw_text:      result.raw_text || "",
      }];
    }

    logMsg("SCAN", (isReplace ? "Replacing menu (re-scan)" :
                   menusToSave.length > 1 ? "Adding " + menusToSave.length + " menus" :
                                            "Adding 1 menu") +
                  " to restaurant " + targetRestId);
    onSave(targetRestId, menusToSave, newRestaurant, isReplace);
  }

  // ---- review-step helpers ----
  const sectionCount = result ? (result.sections || []).length : 0;
  // top-level toggle is only shown for multi-section new scans
  const showModeToggle = !presetMenu && sectionCount >= 2;
  const inCustomMode   = showModeToggle && saveMode === "custom";

  // in custom mode every section needs a non-empty destination
  const allCustomLabeled = !inCustomMode || sectionExtracts.every(v =>
    (v || "").trim().length > 0);

  // build a live preview of the destination menus
  function previewDestinations(){
    if (!result) return [];
    if (presetMenu){
      return [{ label: (label || "").trim() || presetMenu.label || "Menu",
                sectionCount: sectionCount }];
    }
    if (!inCustomMode){
      // one-menu mode (or single-section): preview is just the one menu
      return [{ label: (label || "").trim() || "Menu",
                sectionCount: sectionCount }];
    }
    // case-insensitive grouping (same logic as save()): the lowercased
    // label is the merge key; the first-seen casing wins for display
    const groups = new Map();    // lowercased label -> { label, sectionCount }
    (result.sections || []).forEach((s, i) => {
      const dest = (sectionExtracts[i] || "").trim();
      if (!dest) return;
      const key = dest.toLowerCase();
      if (!groups.has(key)){
        groups.set(key, { label: dest, sectionCount: 0 });
      }
      groups.get(key).sectionCount++;
    });
    return Array.from(groups.values());
  }
  const previewMenus = previewDestinations();

  const canSave = !!result &&
    (restId || newName.trim() || (result && result.restaurant_name)) &&
    (inCustomMode
      ? allCustomLabeled && previewMenus.length > 0
      : !!(label || "").trim() || !!presetMenu);

  // "Other..." pill state for the single label input (one-menu / re-scan / 1-section)
  const trimmedLabel = label.trim();
  const otherActive = !!trimmedLabel &&
    LABEL_SUGGESTIONS.indexOf(trimmedLabel) === -1;

  // per-section helpers (custom mode)
  function setExtractAt(idx, v){
    setSectionExtracts(prev => {
      const next = prev.slice();
      next[idx] = v;
      return next;
    });
  }
  function focusSectionOther(idx){
    setExtractAt(idx, "");
    setTimeout(()=> {
      const el = sectionInputRefs.current[idx];
      if (el) el.focus();
    }, 0);
  }
  function isSectionOtherActive(v){
    const t = (v || "").trim();
    return !!t && LABEL_SUGGESTIONS.indexOf(t) === -1;
  }

  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}>Cancel</button>
        <h2>{presetMenu ? "Re-scan " + (presetMenu.label || "menu") : "Add a menu"}</h2>
        {step === "review"
          ? <button className="x" onClick={save}
              style={{color: canSave ? "var(--accent)" : "var(--text-faint)"}}>Save</button>
          : <span style={{width:40}} />}
      </div>
      <div className="ovbody">

        {step === "pick" && (
          <div>
            <div className="card small muted">
              {presetMenu
                ? "Photograph the menu - the new scan will replace the current " +
                  presetMenu.label + " menu for this restaurant."
                : "Take clear, straight-on photos of the menu. Multiple pages of " +
                  "the same menu are fine - add them all and they merge."}
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple
              style={{display:"none"}} onChange={onFiles} />
            <button className="btn ghost" onClick={()=> fileRef.current.click()}
              disabled={!!processing}>
              <Icon name="camera" size={18} />
              {previews.length ? "Add more photos" : "Choose / take photos"}
            </button>
            <div className="tiny faint" style={{marginTop:6,padding:"0 2px"}}>
              On iPhone, picking many photos at once can pause for several
              seconds while iOS converts them &mdash; this is normal. If it
              hangs, cancel and pick 1&ndash;2 at a time.
            </div>
            {processing && (
              <div className="photo-progress">
                Processing photo {processing.done} of {processing.total}&hellip;
              </div>
            )}
            {previews.length > 0 && (
              <div className="photo-grid">
                {previews.map((u,i)=> (
                  <div key={i} style={{position:"relative",display:"inline-block"}}>
                    <img className="pth" src={u} alt="" />
                    <div className="photo-remove"
                      onClick={()=>{
                        setPreviews(p => p.filter((_,j)=> j !== i));
                        setDataUrls(d => d.filter((_,j)=> j !== i));
                      }}>
                      <Icon name="close" size={14} color="#e8dac6" />
                    </div>
                  </div>
                ))}
              </div>
            )}
            {previews.length > 0 && (
              <button className="btn primary" style={{marginTop:16}} onClick={runOcr}
                disabled={!!processing}>
                Digitize {previews.length} photo(s)
              </button>
            )}
            {!presetMenu && (
              <div style={{marginTop:18, borderTop:"1px solid var(--line-soft)", paddingTop:14}}>
                <div className="small muted" style={{marginBottom:8}}>Or pull the menu from a link</div>
                <input className="input" value={urlInput} onChange={e=> setUrlInput(e.target.value)}
                  placeholder="Paste a menu web address" inputMode="url"
                  autoCapitalize="off" autoCorrect="off" spellCheck={false}
                  onKeyDown={e=>{ if (e.key === "Enter" && urlInput.trim()){ e.preventDefault(); runUrl(); } }}
                  style={{marginBottom:8}} />
                <button className="btn ghost" style={{width:"100%"}} onClick={runUrl}
                  disabled={!urlInput.trim() || !!processing}>
                  Get menu from link
                </button>
                <div className="tiny faint" style={{marginTop:6}}>
                  Works best on a restaurant's own menu page. You'll review it before saving &mdash; from the web, not verified.
                </div>
              </div>
            )}
          </div>
        )}

        {step === "working" && (

            {/* ===== ONE-MENU PATH: single label input ===== */}
            {/* (covers: re-scan, 1-section new scan, and 2+ sections in "one" mode) */}
            {(!showModeToggle || saveMode === "one") && (
              <label className="fld">

            {/* ===== CUSTOMIZE PATH: per-section labels (no fold button) ===== */}
            {inCustomMode && (
              <div>
                {/* live preview at TOP so merges are visible as you make them */}

                    {previewMenus.map((p, i) => (
                      <div key={i} className="small" style={{padding:"3px 0"}}>
                        &middot; <strong>{p.label}</strong>

                          {" "}({p.sectionCount} section{p.sectionCount === 1 ? "" : "s"})

                <div className="divider-label" style={{marginTop:16}}>
                  Sections detected ({sectionCount})

                <div className="small muted" style={{marginBottom:10,padding:"0 2px"}}>
                  Give each section a destination name. Sections sharing the same
                  name (e.g. tap <strong>Cocktails</strong> on two sections) merge
                  into one menu with multiple subsections.
                </div>

                {(result.sections || []).map((s,i) => {
                  const ext = sectionExtracts[i] || "";
                  const itemCount = (s.items || []).length;
                  return (
                    <div key={i} className="card" style={{
                      padding:"12px 14px",marginBottom:8,
                      borderColor:"rgba(224,118,74,0.25)"
                    }}>
                      <div style={{marginBottom:8}}>
                        <div className="small" style={{fontWeight:600}}>
                          {s.name || "Section"}
                        </div>
                        <div className="tiny faint" style={{marginTop:2}}>
                          {itemCount} item{itemCount === 1 ? "" : "s"}
                        </div>
                      </div>
                      <input
                        ref={el => { sectionInputRefs.current[i] = el; }}
                        className="input"
                        value={ext}
                        onChange={e=> setExtractAt(i, e.target.value)}
                        placeholder={s.name || "Menu name"} />
                      <div className="chips" style={{marginTop:8}}>
                        {LABEL_SUGGESTIONS.map(p => (
                          <span key={p}
                            className={"chip pick" + (ext === p ? " on" : "")}
                            onClick={()=> setExtractAt(i, p)}>{p}</span>
                        ))}
                        <span
                          className={"chip pick" +
                            (isSectionOtherActive(ext) ? " on" : "")}
                          onClick={()=> focusSectionOther(i)}>
                          Other...
                        </span>
                      </div>
                    </div>
                  );
                })}

                {!allCustomLabeled && (
                  <div className="tiny faint" style={{marginTop:6,padding:"0 2px"}}>
                    Every section needs a destination name before you can save.
                  </div>
                )}
              </div>
            )}

            <div className="divider-label">
              Preview &middot; {sectionCount} section(s)
            </div>
            <div className="card" style={{padding:"6px 14px 10px"}}>
              <MenuView menu={result} />
            </div>
            <button className="btn primary" onClick={save} disabled={!canSave}
              style={{marginTop:8}}>
              <Icon name="check" size={18} color="#1b1714" />
              {presetMenu
                ? "Replace " + presetMenu.label + " menu"
                : previewMenus.length > 1
                  ? "Save " + previewMenus.length + " menus"
                  : "Save this menu"}
            </button>
            <div style={{height:20}} />
          </div>
        )}

      </div>
    </div>
  );
}

/* ============================================================
   IN-APP HELP  (renders HELP_DOC; source of truth: dining-captain-help.md)
   ============================================================ */
function renderHelpInline(text, kp){
  const nodes=[]; const re=/\*\*([^*]+)\*\*|\*([^*]+)\*/g;
  let last=0, m, k=0;
  while((m=re.exec(text))){
    if(m.index>last) nodes.push(text.slice(last,m.index));
    if(m[1]!=null) nodes.push(<strong key={kp+"b"+(k++)}>{m[1]}</strong>);
    else nodes.push(<em key={kp+"i"+(k++)}>{m[2]}</em>);
    last=re.lastIndex;
  }
  if(last<text.length) nodes.push(text.slice(last));
  return nodes;
}
function renderHelpMarkdown(doc){
  const lines=(doc||"").split("\n");
  const out=[]; let key=0; let para=[]; let bullets=null;
  const flushPara=()=>{ if(para.length){ out.push(<p key={"p"+(key++)} className="help-p">{renderHelpInline(para.join(" "),"p"+key)}</p>); para=[]; } };
  const flushBullets=()=>{ if(bullets){ const b=bullets; out.push(<ul key={"u"+(key++)} className="help-ul">{b.map((t,bi)=><li key={bi}>{renderHelpInline(t,"u"+key+"_"+bi)}</li>)}</ul>); bullets=null; } };
  for(const raw of lines){
    const line=raw.replace(/\s+$/,"");
    if(/^-{3,}$/.test(line.trim())){ flushPara(); flushBullets(); out.push(<hr key={"h"+(key++)} className="help-hr" />); continue; }
    if(/^#\s+/.test(line)){ flushPara(); flushBullets(); out.push(<h1 key={"t"+(key++)} className="help-h1">{line.replace(/^#\s+/,"")}</h1>); continue; }
    if(/^##\s+/.test(line)){ flushPara(); flushBullets(); out.push(<h2 key={"s"+(key++)} className="help-h2">{line.replace(/^##\s+/,"")}</h2>); continue; }
    if(/^###\s+/.test(line)){ flushPara(); flushBullets(); out.push(<h3 key={"x"+(key++)} className="help-h3">{line.replace(/^###\s+/,"")}</h3>); continue; }
    if(/^-\s+/.test(line)){ flushPara(); (bullets=bullets||[]).push(line.replace(/^-\s+/,"")); continue; }
    if(/^\s+\S/.test(raw) && bullets && bullets.length){ bullets[bullets.length-1]+=" "+line.trim(); continue; }
    if(line.trim()===""){ flushPara(); flushBullets(); continue; }
    flushBullets(); para.push(line.trim());
  }
  flushPara(); flushBullets();
  return out;
}
