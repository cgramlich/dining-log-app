<!DOCTYPE html>
<!--
  DINING LOG - single-file mobile web app
  Build: v1.0
  Stack: React 18 + Babel Standalone (CDN). No build step. Open the file or host it.
  Data : GitHub repo (3 JSON files under data/) is the source of truth.
         localStorage holds a cache for instant load and offline reading.
  OCR  : Anthropic API (Claude vision) digitizes photographed menus.
  Notes: All console/log output is plain ASCII (no emoji) by design.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dining Log" />
  <meta name="theme-color" content="#1b1714" />
  <title>Dining Log</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,9..144&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    :root{
      --bg:#1b1714; --bg-2:#221d18; --surface:#272019; --surface-2:#2f2720;
      --line:#3a3128; --line-soft:#332b23;
      --text:#f3ebdd; --text-dim:#b3a591; --text-faint:#80715f;
      --accent:#e0764a; --accent-dim:#b85f3a;
      --amber:#e7b24c; --sage:#9aa877; --danger:#d9604e; --ok:#7faa6b;
      --shadow:0 8px 28px rgba(0,0,0,0.45);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
    body{
      font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:16px; line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:none;
    }
    input,textarea,select,button{font-family:inherit; font-size:16px;}
    button{cursor:pointer; border:none; background:none; color:inherit;}
    h1,h2,h3{font-family:'Fraunces',Georgia,serif; font-weight:500; margin:0; line-height:1.15;}

    /* ---- shell ---- */
    #app-shell{
      max-width:540px; margin:0 auto; min-height:100vh;
      background:var(--bg); position:relative;
      padding-bottom:calc(78px + env(safe-area-inset-bottom));
    }
    .topbar{
      position:sticky; top:0; z-index:30;
      background:linear-gradient(180deg,var(--bg) 70%,rgba(27,23,20,0.0));
      padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
    }
    .topbar h1{font-size:30px; letter-spacing:-0.02em;}
    .topbar .sub{font-size:13px; color:var(--text-faint); margin-top:2px; letter-spacing:0.04em; text-transform:uppercase;}
    .content{padding:4px 20px 24px;}

    /* ---- sync banner ---- */
    .syncbar{
      margin:0 20px 14px; padding:9px 13px; border-radius:11px;
      font-size:13px; display:flex; align-items:center; gap:9px;
      border:1px solid var(--line);
    }
    .syncbar.busy{background:var(--bg-2); color:var(--text-dim);}
    .syncbar.err{background:rgba(217,96,78,0.12); color:#eab0a6; border-color:rgba(217,96,78,0.4);}
    .syncbar.warn{background:rgba(231,178,76,0.1); color:#e7cf9a; border-color:rgba(231,178,76,0.35);}
    .syncbar button{margin-left:auto; font-size:12px; color:var(--accent); font-weight:600;}
    .dot{width:7px; height:7px; border-radius:50%; flex:none;}
    .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;flex:none;}

    .card{

      border-radius:15px; padding:16px; margin-bottom:13px;
    }

    .card.tap:active{transform:scale(0.985);}

    .between{display:flex; align-items:center; justify-content:space-between; gap:10px;}

    .star.big{font-size:30px;}

    label.fld{display:block; margin-bottom:14px;}
    label.fld .lbl{

<body>

  <script type="text/babel" data-presets="react">
/* ============================================================
   DINING LOG - application code
   ============================================================ */
const { useState, useEffect, useRef, useCallback } = React;

/* ---- constants ------------------------------------------------ */
const APP_VERSION   = "1.4.3";
const VISION_MODEL  = "claude-sonnet-4-6";          // current Claude vision model
const GH_API        = "https://api.github.com";
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
const CFG_KEY       = "dininglog_config";
const DATA_KEY      = "dininglog_data";
const FILES = {                                     // logical name -> repo path
  restaurants: "data/restaurants.json",
  menus:       "data/menus.json",
  visits:      "data/visits.json",
  locations:   "data/locations.json",
};

/* ---- diagnostic log buffer -----------------------------------
   iPhone Safari has no easy console, so we keep an in-app log
   that is viewable under Settings > Diagnostics. ASCII only. */
const LOG_BUFFER = [];
function logMsg(tag, msg){
  const stamp = new Date().toTimeString().slice(0,8);
  const line  = "[" + stamp + "] [" + tag + "] " + msg;
  LOG_BUFFER.push(line);
  if (LOG_BUFFER.length > 240) LOG_BUFFER.shift();
  try { console.log(line); } catch(e){ /* ignore */ }
}

/* ---- small utilities ----------------------------------------- */
function uid(prefix){
  return prefix + "_" + Date.now().toString(36) + "_" +
         Math.random().toString(36).slice(2,7);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }

function fmtDate(iso){
  // iso is YYYY-MM-DD ; render as a friendly label
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}
function relDays(iso){
  if (!iso) return "";
  const then = new Date(iso + "T12:00:00").getTime();
  const days = Math.round((Date.now() - then) / 86400000);
  if (days <= 0)  return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7)   return days + " days ago";
  if (days < 31)  return Math.round(days/7) + " wk ago";
  if (days < 365) return Math.round(days/30) + " mo ago";
  return Math.round(days/365) + " yr ago";
}

/* UTF-8 safe base64 - GitHub Contents API stores file bodies in base64. */
function utf8ToB64(str){
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  bytes.forEach(b => { bin += String.fromCharCode(b); });
  return btoa(bin);
}
function b64ToUtf8(b64){
  const clean = (b64 || "").replace(/\s/g,"");          // GitHub adds line breaks
  const bin   = atob(clean);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

/* Loose JSON parse - tolerates markdown fences around model output. */
function parseJsonLoose(text){
  let t = (text || "").trim();
  t = t.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
  const first = t.indexOf("{");
  const last  = t.lastIndexOf("}");
  if (first === -1 || last === -1) throw new Error("No JSON object found in response");
  return JSON.parse(t.slice(first, last + 1));
}

/* Read a File into a data URL. */
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error("Could not read file"));
    r.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error("Could not decode image"));
    img.src = src;
  });
}
/* Resize a photo down to a sane edge length before sending to the
   vision API. Keeps OCR legible while controlling token cost. */
async function resizeForOcr(file, maxEdge){
  maxEdge = maxEdge || 1568;
  const dataUrl = await fileToDataUrl(file);
  const img = await loadImage(dataUrl);
  let w = img.naturalWidth, h = img.naturalHeight;
  if (Math.max(w,h) > maxEdge){
    const scale = maxEdge / Math.max(w,h);
    w = Math.round(w*scale); h = Math.round(h*scale);
  }
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img,0,0,w,h);
  const out = canvas.toDataURL("image/jpeg",0.82);
  logMsg("IMAGE","Resized photo to " + w + "x" + h + " (" +
         Math.round(out.length/1365) + " KB approx)");
  return out;                                          // data:image/jpeg;base64,...
}

/* ============================================================
   MENUS MIGRATION
   Older versions stored one menu per restaurant as an object:
     menus[rid] = { sections, ... }
   v1.3+ supports multiple menus per restaurant as an array:
     menus[rid] = [ { menu_id, label, sections, ... }, ... ]
   This walks the menus map, wraps any single-menu objects in arrays,
   and assigns menu_id/label defaults so the data is uniform.
   Returns { menus: migratedMap, changed: bool }.
   ============================================================ */
function migrateMenusShape(menusObj){
  const next = {};
  let changed = false;
  for (const rid in (menusObj || {})){
    const m = menusObj[rid];
    if (Array.isArray(m)){
      // already new format - just ensure each menu has menu_id + label
      next[rid] = m.map(item => {
        if (!item || typeof item !== "object") return item;
        if (item.menu_id && item.label) return item;
        changed = true;
        return Object.assign({}, item, {
          menu_id: item.menu_id || uid("menu"),
          label:   item.label   || "Main",
        });
      });
    } else if (m && typeof m === "object"){
      // legacy single-menu object - wrap in an array
      changed = true;
      next[rid] = [Object.assign({}, m, {
        menu_id: m.menu_id || uid("menu"),
        label:   m.label   || "Main",
      })];
    } else {
      next[rid] = [];
    }
  }
  return { menus: next, changed: changed };
}

/* ============================================================
   GITHUB DATA LAYER
   ============================================================ */
async function ghGetFile(cfg, path){
  // Returns { found:true, data, sha } or { found:false }.
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  logMsg("GITHUB","GET " + path);
  let res;
  try {
    res = await fetch(url, { headers:{
      "Authorization":"Bearer " + cfg.githubToken,
      "Accept":"application/vnd.github+json",
    }});
  } catch(err){
    logMsg("ERROR","GitHub GET network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 404){ logMsg("GITHUB",path + " not found (404)"); return { found:false }; }
  if (res.status === 401){ throw new Error("GitHub rejected the token (401). Check your token in Settings."); }
  if (!res.ok){
    const body = await res.text().catch(()=> "");
    logMsg("ERROR","GitHub GET " + path + " -> " + res.status + " " + body.slice(0,120));
    throw new Error("GitHub GET failed (" + res.status + ")");
  }
  const json = await res.json();
  const text = b64ToUtf8(json.content);
  let data;
  try { data = JSON.parse(text); }
  catch(e){
    logMsg("ERROR","Could not parse JSON from " + path + ": " + e.message);
    throw new Error("Stored file " + path + " is not valid JSON");
  }
  logMsg("GITHUB","Loaded " + path + " (sha " + json.sha.slice(0,7) + ")");
  return { found:true, data:data, sha:json.sha };
}

async function ghPutFile(cfg, path, dataObj, sha){
  // Creates or updates a file. sha must be supplied when updating.
  const url = GH_API + "/repos/" + cfg.githubUser + "/" + cfg.githubRepo +
              "/contents/" + path;
  const body = {
    message:"Update " + path + " via Dining Log",
    content:utf8ToB64(JSON.stringify(dataObj,null,2)),
  };
  if (sha) body.sha = sha;
  logMsg("GITHUB","PUT " + path + (sha ? " (update)" : " (create)"));
  let res;
  try {
    res = await fetch(url, {
      method:"PUT",
      headers:{
        "Authorization":"Bearer " + cfg.githubToken,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json",
      },
      body:JSON.stringify(body),
    });
  } catch(err){
    logMsg("ERROR","GitHub PUT network failure: " + err.message);
    throw new Error("Network error reaching GitHub");
  }
  if (res.status === 409){
    // sha is stale - signal caller to refetch and retry
    logMsg("GITHUB","PUT " + path + " conflict (409) - sha is stale");
    const err = new Error("conflict"); err.conflict = true; throw err;
  }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","GitHub PUT " + path + " -> " + res.status + " " + txt.slice(0,140));
    throw new Error("GitHub PUT failed (" + res.status + ")");
  }
  const json = await res.json();
  logMsg("GITHUB","Saved " + path + " (new sha " + json.content.sha.slice(0,7) + ")");
  return json.content.sha;
}

/* ============================================================
   ANTHROPIC VISION - menu digitization
   ============================================================ */
async function digitizeMenu(cfg, dataUrls){
  // dataUrls: array of "data:image/jpeg;base64,..." strings.
  const prompt =
    "You are a menu digitization assistant. Extract the COMPLETE menu from the "+
    "attached photo(s) into structured JSON. The photos may be multiple pages or "+
    "sections of the SAME restaurant menu - merge them into one menu.\n\n"+
    "Return ONLY valid JSON. No markdown, no commentary. Keep the response "+
    "compact so it is not truncated. Schema:\n"+
    '{"restaurant_name": string or null, "sections":[{"name":string,'+
    '"items":[{"name":string,"description":string,"price":string,'+
    '"tags":[string],"notes":string}]}]}\n\n'+
    "Rules:\n"+
    "- price: a string exactly as printed (e.g. \"$12.95\", \"6.25 ea / 2 for 11.50\", "+
    "\"MP\"); empty string if none.\n"+
    "- description: the ingredient or description line; empty string if none.\n"+
    "- tags: include any of \"gluten-free\",\"vegetarian\",\"vegan\",\"spicy\",\"raw\" "+
    "that the menu indicates (a 'gf' mark means gluten-free); empty array if none.\n"+
    "- notes: anything extra about an item; usually empty.\n"+
    "- Use the section headings printed on the menu.\n"+
    "- An ITEM is something the customer orders (a dish, a board, a drink). "+
    "Do NOT promote individual ingredients or components into their own items. "+
    "If a charcuterie board lists \"goat cheese, prosciutto, olives\" as its "+
    "components, those go in the parent item's description - they are NOT "+
    "separate items. The same ingredient may legitimately appear inside the "+
    "descriptions of multiple dishes; that is fine and expected.\n"+
    "- Only digitize actual food and drink menus. Ignore unrelated pages such "+
    "as advertisements, brochures, or directories of other businesses.\n"+
    "- If text is unclear, give your best reading.";

  const content = dataUrls.map(u => ({
    type:"image",
    source:{ type:"base64", media_type:"image/jpeg", data:u.split(",")[1] },
  }));
  content.push({ type:"text", text:prompt });

  logMsg("VISION","Sending " + dataUrls.length + " image(s) to " + VISION_MODEL);
  let res;
  try {
    res = await fetch(ANTHROPIC_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":cfg.anthropicKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:VISION_MODEL,
        max_tokens:32000,
        messages:[{ role:"user", content:content }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Anthropic network failure: " + err.message);
    throw new Error("Network error reaching the Anthropic API");
  }
  if (res.status === 401){ throw new Error("Anthropic rejected the API key (401). Check it in Settings."); }
  if (res.status === 429){ throw new Error("Anthropic rate limit hit (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Anthropic -> " + res.status + " " + txt.slice(0,180));
    throw new Error("Anthropic API error (" + res.status + ")");
  }
  const json = await res.json();
  // If the model ran out of output budget the JSON will be incomplete -
  // catch that here so the user gets a clear message, not a parse error.
  if (json.stop_reason === "max_tokens"){
    logMsg("ERROR","Vision response stopped at max_tokens - menu too large for one pass");
    throw new Error("This menu was too large to digitize in one pass. " +
                    "Try splitting it into separate labeled menus - for example, " +
                    "scan the food pages as one menu, cocktails as another, the " +
                    "whiskey list as a third. Use 'Add another menu' on the " +
                    "restaurant's page.");
  }
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  logMsg("VISION","Received response (" + text.length + " chars, stop=" +
         (json.stop_reason || "?") + ")");
  let parsed;
  try {
    parsed = parseJsonLoose(text);
  } catch(err){
    logMsg("ERROR","Could not parse vision JSON: " + err.message);
    throw new Error("The digitized menu came back incomplete or malformed. " +
                    "Try again, or scan fewer pages at once.");
  }
  if (!Array.isArray(parsed.sections)) throw new Error("Model response had no sections array");
  // normalize so downstream rendering is safe
  parsed.sections = parsed.sections.map(s => ({
    name:String(s.name || "Menu"),
    items:(s.items || []).map(it => ({
      name:String(it.name || "").trim(),
      description:String(it.description || "").trim(),
      price:String(it.price || "").trim(),
      tags:Array.isArray(it.tags) ? it.tags.map(String) : [],
      notes:String(it.notes || "").trim(),
    })).filter(it => it.name),
  })).filter(s => s.items.length);
  parsed.raw_text = String(parsed.raw_text || "");
  return parsed;
}

function loadConfig(){
  try {
    const raw = localStorage.getItem(CFG_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e){ logMsg("ERROR","loadConfig failed: " + e.message); return null; }
}
function saveConfig(cfg){
  try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); logMsg("CONFIG","Saved configuration"); }
  catch(e){ logMsg("ERROR","saveConfig failed: " + e.message); }
}
function configComplete(cfg){
  return !!(cfg && cfg.githubUser && cfg.githubRepo && cfg.githubToken && cfg.anthropicKey);
}
function loadCache(){
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e){ logMsg("ERROR","loadCache failed: " + e.message); return null; }
}
function saveCache(payload){
  try { localStorage.setItem(DATA_KEY, JSON.stringify(payload)); }
  catch(e){ logMsg("ERROR","saveCache failed: " + e.message); }
}

   ============================================================ */
function App(){
  const [config, setConfig]     = useState(() => loadConfig());
  const [ready, setReady]       = useState(false);
  const [needSetup, setNeedSetup] = useState(false);

  // data model
  const [restaurants, setRestaurants] = useState([]);
  const [menus, setMenus]             = useState({});
  const [visits, setVisits]           = useState([]);
  const [locations, setLocations]     = useState([]);      // array of city names
  const [shas, setShas]               = useState({});      // path -> sha
  const [dirty, setDirty]             = useState({});      // logical name -> bool (unpushed)

  // ui
  const [tab, setTab]         = useState("history");
  const [overlay, setOverlay] = useState(null);            // {type, ...}
  const [sheet, setSheet]     = useState(false);
  const [sync, setSync]       = useState({ status:"idle", msg:"" });
  const [toast, setToast]     = useState("");
  const [placesFilter, setPlacesFilter] = useState("All"); // active city filter chip

  const toastTimer = useRef(null);
  function flash(msg){
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=> setToast(""), 2600);
  }

  /* ---- startup --------------------------------------------- */
  useEffect(()=>{
    logMsg("INIT","Dining Log v" + APP_VERSION + " starting");
    const cfg = loadConfig();
    if (!configComplete(cfg)){
      logMsg("INIT","Configuration incomplete - showing setup");
      setNeedSetup(true);
      setReady(true);
      return;
    }
    logMsg("INIT","Config OK - user=" + cfg.githubUser + " repo=" + cfg.githubRepo +
                  " anthropicKey=" + (cfg.anthropicKey ? "present" : "MISSING"));
    // show cached data instantly, then sync
    const cache = loadCache();
    if (cache){
      setRestaurants(cache.restaurants || []);
      setMenus(cache.menus || {});
      setVisits(cache.visits || []);
      setLocations(cache.locations || []);
      setShas(cache.shas || {});
      setDirty(cache.dirty || {});
      logMsg("INIT","Loaded cache: " + (cache.restaurants||[]).length +
                    " restaurants, " + (cache.visits||[]).length + " visits, " +
                    (cache.locations||[]).length + " locations");
    }
    setReady(true);
    syncFromGitHub(cfg, cache);
    // eslint-disable-next-line
  },[]);

  /* ---- cache writer ---------------------------------------- */
  function persist(next){
    // next may contain any of restaurants/menus/visits/locations/shas/dirty
    const payload = {
      restaurants: next.restaurants !== undefined ? next.restaurants : restaurants,
      menus:       next.menus       !== undefined ? next.menus       : menus,
      visits:      next.visits      !== undefined ? next.visits      : visits,
      locations:   next.locations   !== undefined ? next.locations   : locations,
      shas:        next.shas        !== undefined ? next.shas        : shas,
      dirty:       next.dirty       !== undefined ? next.dirty       : dirty,
      lastSync:    Date.now(),
    };
    saveCache(payload);
  }

  /* ---- sync from GitHub ------------------------------------ */
  async function syncFromGitHub(cfg, cache){
    cfg = cfg || config;
    if (!configComplete(cfg)) return;
    setSync({ status:"busy", msg:"Syncing with GitHub..." });
    logMsg("SYNC","Starting sync");

    const localDirty = (cache && cache.dirty) || dirty;
    let nextR = (cache && cache.restaurants) || restaurants;
    let nextM = (cache && cache.menus)       || menus;
    let nextV = (cache && cache.visits)      || visits;
    let nextL = (cache && cache.locations)   || locations;
    let nextShas = Object.assign({}, (cache && cache.shas) || shas);
    let missing = { restaurants:false, menus:false, visits:false, locations:false };

    try {
      for (const key of ["restaurants","menus","visits","locations"]){
        if (localDirty[key]){
          // local has unpushed edits - keep local, do not overwrite from remote
          logMsg("SYNC",key + " has pending local edits - keeping local copy");
          continue;
        }
        const got = await ghGetFile(cfg, FILES[key]);
        if (!got.found){ missing[key] = true; continue; }
        if (key === "restaurants") nextR = got.data;
        if (key === "menus")       nextM = got.data;
        if (key === "visits")      nextV = got.data;
        if (key === "locations")   nextL = got.data;
        nextShas[FILES[key]] = got.sha;
      }

      // brand-new repo: core files missing -> seed Carlita's + Portland
      // (locations may or may not exist - treat the three core files as the signal)
      if (missing.restaurants && missing.menus && missing.visits){
        logMsg("SYNC","Empty repo detected - seeding Carlita's starter data");
        const seed = carlitasSeed();
        nextR = [seed.restaurant];
        nextM = { [seed.menu.restaurant_id]: [seed.menu] };  // v1.3: array of menus
        nextV = [];
        nextL = seed.locations;
        nextShas[FILES.restaurants] = await ghPutFile(cfg, FILES.restaurants, nextR, null);
        nextShas[FILES.menus]       = await ghPutFile(cfg, FILES.menus, nextM, null);
        nextShas[FILES.visits]      = await ghPutFile(cfg, FILES.visits, nextV, null);
        nextShas[FILES.locations]   = await ghPutFile(cfg, FILES.locations, nextL, null);
        missing.locations = false;
        flash("Set up your repo with Carlita's to start");
      } else {
        // create any individually-missing files as empty / sensible defaults
        if (missing.restaurants){ nextR = []; nextShas[FILES.restaurants] = await ghPutFile(cfg, FILES.restaurants, [], null); }
        if (missing.menus){       nextM = {}; nextShas[FILES.menus]       = await ghPutFile(cfg, FILES.menus, {}, null); }
        if (missing.visits){      nextV = []; nextShas[FILES.visits]      = await ghPutFile(cfg, FILES.visits, [], null); }
        if (missing.locations){
          // existing data repo from an older app version - back-fill locations.
          // collect any location values already present on restaurants
          let derived = Array.from(new Set(
            (nextR || []).map(r => (r.location || "").trim()).filter(Boolean)
          ));
          // one-time migration: if the original Carlita's seed exists with no
          // location, restore its Portland tag and push restaurants too
          const seedIdx = (nextR || []).findIndex(r =>
            r.id === "rest_carlitas" && !(r.location && r.location.trim()));
          if (seedIdx >= 0){
            const migratedR = nextR.map((r, i) =>
              i === seedIdx ? Object.assign({}, r, { location:"Portland" }) : r);
            try {
              nextShas[FILES.restaurants] = await ghPutFile(
                cfg, FILES.restaurants, migratedR, nextShas[FILES.restaurants]);
            } catch(err){
              if (err.conflict){
                const fresh = await ghGetFile(cfg, FILES.restaurants);
                nextShas[FILES.restaurants] = await ghPutFile(
                  cfg, FILES.restaurants, migratedR, fresh.sha);
              } else throw err;
            }
            nextR = migratedR;
            if (!derived.includes("Portland")) derived.push("Portland");
            logMsg("SYNC","Migrated Carlita's to location=Portland");
          }
          derived.sort((a,b)=> a.localeCompare(b));
          nextL = derived;
          nextShas[FILES.locations] = await ghPutFile(cfg, FILES.locations, nextL, null);
          logMsg("SYNC","Back-filled locations file with " + nextL.length + " value(s)");
        }
      }

      // v1.3 shape migration: convert legacy single-menu objects to arrays.
      // Runs every sync but only writes back if something actually changed.
      {
        const mig = migrateMenusShape(nextM);
        if (mig.changed){
          nextM = mig.menus;
          try {
            nextShas[FILES.menus] = await ghPutFile(
              cfg, FILES.menus, nextM, nextShas[FILES.menus]);
          } catch(err){
            if (err.conflict){
              const fresh = await ghGetFile(cfg, FILES.menus);
              nextShas[FILES.menus] = await ghPutFile(
                cfg, FILES.menus, nextM, fresh.sha);
            } else throw err;
          }
          logMsg("SYNC","Migrated menus to v1.3 multi-menu shape");
        }
      }

      // push any files that had pending local edits
      for (const key of ["restaurants","menus","visits","locations"]){
        if (localDirty[key]){
          const obj = key==="restaurants" ? nextR : key==="menus" ? nextM
                    : key==="visits"      ? nextV : nextL;
          try {
            nextShas[FILES[key]] = await ghPutFile(cfg, FILES[key], obj, nextShas[FILES[key]]);
          } catch(err){
            if (err.conflict){
              const fresh = await ghGetFile(cfg, FILES[key]);
              nextShas[FILES[key]] = await ghPutFile(cfg, FILES[key], obj, fresh.sha);
            } else throw err;
          }
        }
      }

      setRestaurants(nextR); setMenus(nextM); setVisits(nextV); setLocations(nextL);
      setShas(nextShas);
      const cleared = {};
      setDirty(cleared);
      persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, shas:nextShas, dirty:cleared });
      setSync({ status:"ok", msg:"" });
      logMsg("SYNC","Sync complete");
    } catch(err){
      logMsg("ERROR","Sync failed: " + err.message);
      setSync({ status:"err", msg:err.message });
    }
  }

  /* ---- commit a change and push to GitHub ------------------ */
  async function commit(updates, filesToPush){
    // updates: {restaurants?, menus?, visits?, locations?}; filesToPush: [logical names]
    const nextR = updates.restaurants !== undefined ? updates.restaurants : restaurants;
    const nextM = updates.menus       !== undefined ? updates.menus       : menus;
    const nextV = updates.visits      !== undefined ? updates.visits      : visits;
    const nextL = updates.locations   !== undefined ? updates.locations   : locations;
    if (updates.restaurants !== undefined) setRestaurants(nextR);
    if (updates.menus       !== undefined) setMenus(nextM);
    if (updates.visits      !== undefined) setVisits(nextV);
    if (updates.locations   !== undefined) setLocations(nextL);

    // mark dirty and cache immediately (optimistic, survives offline)
    const nextDirty = Object.assign({}, dirty);
    filesToPush.forEach(k => { nextDirty[k] = true; });
    setDirty(nextDirty);
    persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, dirty:nextDirty });

    if (!configComplete(config)){ setSync({status:"err",msg:"Not configured"}); return; }
    setSync({ status:"busy", msg:"Saving..." });
    const nextShas = Object.assign({}, shas);
    const stillDirty = Object.assign({}, nextDirty);
    try {
      for (const key of filesToPush){
        const obj = key==="restaurants" ? nextR : key==="menus" ? nextM
                  : key==="visits"      ? nextV : nextL;
        try {
          nextShas[FILES[key]] = await ghPutFile(config, FILES[key], obj, nextShas[FILES[key]]);
        } catch(err){
          if (err.conflict){
            logMsg("SYNC","Resolving conflict on " + key + " by refetching sha");
            const fresh = await ghGetFile(config, FILES[key]);
            nextShas[FILES[key]] = await ghPutFile(config, FILES[key], obj, fresh.sha);
          } else throw err;
        }
        delete stillDirty[key];
      }
      setShas(nextShas);
      setDirty(stillDirty);
      persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, shas:nextShas, dirty:stillDirty });
      setSync({ status:"ok", msg:"" });
      logMsg("SAVE","Committed: " + filesToPush.join(", "));
    } catch(err){
      logMsg("ERROR","Commit failed (kept locally): " + err.message);
      setSync({ status:"err", msg:"Not synced - " + err.message });
    }
  }

  function retrySync(){ syncFromGitHub(config, loadCache()); }

  /* ---- derived helpers ------------------------------------- */
  function restaurantById(id){ return restaurants.find(r => r.id === id) || null; }
  function visitsFor(id){ return visits.filter(v => v.restaurant_id === id); }

  /* ---- render gates ---------------------------------------- */
  if (!ready){
    return <div className="empty" style={{paddingTop:"40vh"}}>
      <div className="spin" style={{margin:"0 auto"}} /></div>;
  }
  if (needSetup){
    return <SetupScreen
      initial={config}
      onSave={(cfg)=>{
        saveConfig(cfg); setConfig(cfg); setNeedSetup(false); setReady(false);
        logMsg("CONFIG","Setup complete - reloading");
        setTimeout(()=> window.location.reload(), 200);
      }} />;
  }

  const pendingCount = Object.keys(dirty).filter(k => dirty[k]).length;

  return (
    <div id="app-shell">
      <TopBar tab={tab} />

      {/* sync status banner */}
      {sync.status === "busy" && (
        <div className="syncbar busy"><span className="spin" />{sync.msg || "Working..."}</div>
      )}
      {sync.status === "err" && (
        <div className="syncbar err">
          <span className="dot" style={{background:"var(--danger)"}} />
          <span>{sync.msg}</span>
          <button onClick={retrySync}>Retry</button>
        </div>
      )}
      {sync.status === "ok" && pendingCount > 0 && (
        <div className="syncbar warn">
          <span className="dot" style={{background:"var(--amber)"}} />
          <span>{pendingCount} change(s) not yet synced</span>
          <button onClick={retrySync}>Sync now</button>
        </div>
      )}

      <div className="content">
        {tab === "history" && (
          <HistoryView visits={visits} restaurantById={restaurantById}
            onOpen={(v)=> setOverlay({ type:"editVisit", visit:v })} />
        )}
        {tab === "restaurants" && (
          <RestaurantsView restaurants={restaurants} visits={visits}
            locations={locations}
            activeFilter={placesFilter}
            onFilterChange={setPlacesFilter}
            onOpen={(r)=> setOverlay({ type:"restaurant", id:r.id })} />
        )}
        {tab === "settings" && (
          <SettingsView config={config}
            onEdit={()=> setOverlay({ type:"settings" })}
            counts={{
              r: restaurants.length,
              m: Object.keys(menus).reduce((n,rid)=> n + (menus[rid] || []).length, 0),
              v: visits.length,
            }}
            lastSync={(loadCache()||{}).lastSync}
            onResync={retrySync}
            locations={locations}
            restaurants={restaurants}
            onAddLocation={(name)=>{
              const trimmed = (name || "").trim();
              if (!trimmed) return;
              const exists = locations.some(l => l.toLowerCase() === trimmed.toLowerCase());
              if (exists){ flash("That location already exists"); return; }
              const next = locations.concat([trimmed]).sort((a,b)=> a.localeCompare(b));
              commit({ locations:next }, ["locations"]);
              flash("Location added");
            }}
            onRenameLocation={(oldName, newName)=>{
              const trimmed = (newName || "").trim();
              if (!trimmed || trimmed === oldName) return;
              const clash = locations.some(l =>
                l !== oldName && l.toLowerCase() === trimmed.toLowerCase());
              if (clash){ flash("That location already exists"); return; }
              const nextL = locations.map(l => l === oldName ? trimmed : l)
                .sort((a,b)=> a.localeCompare(b));
              // cascade the rename onto every restaurant that pointed at the old name
              const affected = restaurants.filter(r => r.location === oldName);
              const nextR = affected.length
                ? restaurants.map(r => r.location === oldName
                    ? Object.assign({}, r, { location:trimmed }) : r)
                : restaurants;
              const files = affected.length ? ["locations","restaurants"] : ["locations"];
              commit({ locations:nextL, restaurants:nextR }, files);
              // if the filter was on the renamed value, follow it
              if (placesFilter === oldName) setPlacesFilter(trimmed);
              flash(affected.length
                ? "Renamed and updated " + affected.length + " restaurant(s)"
                : "Location renamed");
            }}
            onDeleteLocation={(name)=>{
              const inUse = restaurants.filter(r => r.location === name).length;
              if (inUse > 0){
                flash(inUse + " restaurant(s) use this - move them first");
                return;
              }
              const next = locations.filter(l => l !== name);
              commit({ locations:next }, ["locations"]);
              if (placesFilter === name) setPlacesFilter("All");
              flash("Location removed");
            }} />
        )}
      </div>

      {/* bottom navigation */}
      <nav className="nav">
        <button className={tab==="history" ? "on" : ""} onClick={()=> setTab("history")}>
          <span className="navicon"><Icon name="clock" size={23} /></span>History
        </button>
        <button className={tab==="restaurants" ? "on" : ""} onClick={()=> setTab("restaurants")}>
          <span className="navicon"><Icon name="plate" size={23} /></span>Places
        </button>
        <button onClick={()=> setSheet(true)}>
          <span className="add"><Icon name="plus" size={24} color="#1b1714" /></span>
        </button>
        <button className={tab==="settings" ? "on" : ""} onClick={()=> setTab("settings")}>
          <span className="navicon"><Icon name="gear" size={23} /></span>Settings
        </button>
      </nav>

      {/* add action sheet */}
      {sheet && (
        <ActionSheet
          onClose={()=> setSheet(false)}
          onPick={(what)=>{ setSheet(false); setOverlay({ type:what }); }} />
      )}

      {/* overlays */}
      {overlay && overlay.type === "restaurant" && (
        <RestaurantDetail
          restaurant={restaurantById(overlay.id)}
          menus={menus[overlay.id] || []}
          visits={visitsFor(overlay.id)}
          onClose={()=> setOverlay(null)}
          onLogVisit={()=> setOverlay({ type:"logVisit", restaurantId:overlay.id })}
          onEdit={()=> setOverlay({ type:"editRestaurant", id:overlay.id })}
          onAddMenu={()=> setOverlay({ type:"scanMenu", restaurantId:overlay.id })}
          onOpenMenu={(menuId)=> setOverlay({
            type:"menuDetail", restaurantId:overlay.id, menuId:menuId })}
          onToggleFav={()=>{
            const next = restaurants.map(r =>
              r.id===overlay.id ? Object.assign({},r,{favorite:!r.favorite}) : r);
            commit({ restaurants:next }, ["restaurants"]);
          }}
          onDelete={()=>{
            const nextR = restaurants.filter(r => r.id !== overlay.id);
            const nextM = Object.assign({}, menus); delete nextM[overlay.id];
            commit({ restaurants:nextR, menus:nextM }, ["restaurants","menus"]);
            setOverlay(null); flash("Restaurant removed");
          }} />
      )}

      {overlay && overlay.type === "menuDetail" && (
        <MenuDetail
          restaurant={restaurantById(overlay.restaurantId)}
          menu={(menus[overlay.restaurantId] || []).find(m => m.menu_id === overlay.menuId)}
          onClose={()=> setOverlay({ type:"restaurant", id:overlay.restaurantId })}
          onReScan={()=> setOverlay({
            type:"scanMenu",
            restaurantId:overlay.restaurantId,
            menuId:overlay.menuId,
          })}
          onDeleteMenu={()=>{
            const restMenus = (menus[overlay.restaurantId] || [])
              .filter(m => m.menu_id !== overlay.menuId);
            const nextM = Object.assign({}, menus,
              { [overlay.restaurantId]:restMenus });
            commit({ menus:nextM }, ["menus"]);
            setOverlay({ type:"restaurant", id:overlay.restaurantId });
            flash("Menu removed");
          }} />
      )}

      {overlay && (overlay.type === "addRestaurant" || overlay.type === "editRestaurant") && (
        <RestaurantForm
          existing={overlay.type==="editRestaurant" ? restaurantById(overlay.id) : null}
          locations={locations}
          onClose={()=> setOverlay(null)}
          onSave={(rec)=>{
            let next;
            if (overlay.type === "editRestaurant"){
              next = restaurants.map(r => r.id===rec.id ? rec : r);
              flash("Restaurant updated");
            } else {
              next = [rec].concat(restaurants);
              flash("Restaurant added");
            }
            commit({ restaurants:next }, ["restaurants"]);
            setOverlay(overlay.type==="editRestaurant"
              ? { type:"restaurant", id:rec.id } : null);
          }} /> 
      )}

      {overlay && (overlay.type === "logVisit" || overlay.type === "editVisit") && (
        <VisitForm
          restaurants={restaurants}
          menus={menus}
          presetRestaurantId={overlay.restaurantId}
          existing={overlay.type==="editVisit" ? overlay.visit : null}
          onClose={()=> setOverlay(null)}
          onSave={(rec)=>{
            let next;
            if (overlay.type === "editVisit"){
              next = visits.map(v => v.id===rec.id ? rec : v);
              flash("Visit updated");
            } else {
              next = [rec].concat(visits);
              flash("Visit logged");
            }
            commit({ visits:next }, ["visits"]);
            setOverlay(null);
          }}
          onDelete={overlay.type==="editVisit" ? ()=>{
            const next = visits.filter(v => v.id !== overlay.visit.id);
            commit({ visits:next }, ["visits"]);
            setOverlay(null); flash("Visit removed");
          } : null} />
      )}

      {overlay && overlay.type === "scanMenu" && (
        <ScanMenuFlow
          config={config}
          restaurants={restaurants}
          menus={menus}
          presetRestaurantId={overlay.restaurantId}
          presetMenuId={overlay.menuId}
          onClose={()=> setOverlay(null)}
          onSave={(restId, menusToSave, newRestaurant, isReplace)=>{
            let nextR = restaurants;
            if (newRestaurant) nextR = [newRestaurant].concat(restaurants);
            const existingForRest = menus[restId] || [];
            let newRestMenus;
            if (isReplace){
              // re-scan: menusToSave has exactly one menu, replace by menu_id
              const replacement = menusToSave[0];
              newRestMenus = existingForRest.map(m =>
                m.menu_id === replacement.menu_id ? replacement : m);
            } else {
              // append all - works for single (1 menu) or split (N menus)
              newRestMenus = existingForRest.concat(menusToSave);
            }
            const nextM = Object.assign({}, menus, { [restId]:newRestMenus });
            commit({ restaurants:nextR, menus:nextM },
                   newRestaurant ? ["restaurants","menus"] : ["menus"]);
            // re-scan returns to the menu detail (where the user came from);
            // a fresh scan returns to the restaurant page so they can see the
            // new menu in the list
            setOverlay(isReplace
              ? { type:"menuDetail", restaurantId:restId,
                  menuId:menusToSave[0].menu_id }
              : { type:"restaurant", id:restId });
            flash(isReplace
              ? "Menu replaced"
              : menusToSave.length > 1
                ? menusToSave.length + " menus saved"
                : "Menu saved");
          }} />
      )}

      {overlay && overlay.type === "settings" && (
        <SetupScreen
          asOverlay
          initial={config}
          onClose={()=> setOverlay(null)}
          onSave={(cfg)=>{
            saveConfig(cfg); setConfig(cfg); setOverlay(null);
            flash("Settings saved"); syncFromGitHub(cfg, loadCache());
          }} />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* ============================================================
   TOP BAR
   ============================================================ */
function TopBar({tab}){
  const titles = {
    history:["Dining Log","Where you have been"],
    restaurants:["Places","Your restaurants & menus"],
    settings:["Settings","Sync & configuration"],
  };
  const [t,s] = titles[tab] || titles.history;
  return (
    <div className="topbar">
      <h1>{t}</h1>
      <div className="sub">{s}</div>
    </div>
  );
}

/* ============================================================
   HISTORY VIEW
   ============================================================ */
function HistoryView({visits, restaurantById, onOpen}){
  if (!visits.length){
    return (
      <div className="empty">
        <div className="big">No visits yet</div>
        <div>Tap the + button to log your first meal.</div>
      </div>
    );
  }
  const sorted = visits.slice().sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") ||
    (b.logged_at || 0) - (a.logged_at || 0));
  return (
    <div>
      {sorted.map(v => {
        const r = restaurantById(v.restaurant_id);
        return (
          <div key={v.id} className="card tap" onClick={()=> onOpen(v)}>
            <div className="between">
              <div className="place-name">{r ? r.name : (v.restaurant_name || "Unknown")}</div>
              {v.rating ? <Stars value={v.rating} /> : null}
            </div>
            <div className="meta-line" style={{marginTop:4}}>
              {fmtDate(v.date)} &nbsp;&middot;&nbsp; {relDays(v.date)}
            </div>
            {v.dishes && v.dishes.length > 0 && (
              <div className="chips">
                {v.dishes.map((d,i)=> <span key={i} className="chip dish">{d.name}</span>)}
              </div>
            )}
            {v.notes && <div className="small muted" style={{marginTop:9}}>{v.notes}</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ============================================================
   RESTAURANTS VIEW
   ============================================================ */
function RestaurantsView({restaurants, visits, locations, activeFilter, onFilterChange, onOpen}){
  if (!restaurants.length){
    return (
      <div className="empty">
        <div className="big">No places yet</div>
        <div>Add a restaurant or scan a menu from the + button.</div>
      </div>
    );
  }
  const countVisits = (id)=> visits.filter(v => v.restaurant_id === id).length;

  // collect all city values actually in use (in case a restaurant has a
  // location that was deleted from the master list), plus the master list
  const inUse = Array.from(new Set(restaurants.map(r => (r.location || "").trim()).filter(Boolean)));
  const cityChips = Array.from(new Set([].concat(locations || []).concat(inUse)))
    .sort((a,b)=> a.localeCompare(b));

  const filter = activeFilter || "All";
  const visible = filter === "All"
    ? restaurants
    : filter === "(no location)"
      ? restaurants.filter(r => !r.location)
      : restaurants.filter(r => r.location === filter);

  const favs   = visible.filter(r => r.favorite);
  const others = visible.filter(r => !r.favorite);

  const Card = (r)=> (
    <div key={r.id} className="card tap" onClick={()=> onOpen(r)}>
      <div className="between">
        <div style={{minWidth:0}}>
          <div className="place-name">{r.name}</div>
          <div className="meta-line" style={{marginTop:4}}>
            {r.cuisine || "Restaurant"}
            {r.location ? "  \u00b7  " + r.location : ""}
            {countVisits(r.id) > 0 ? "  \u00b7  " + countVisits(r.id) + " visit(s)" : ""}
          </div>
        </div>
        <span className={"fav" + (r.favorite ? " on" : "")}>
          <Icon name="star" size={20} color={r.favorite ? "#e0764a" : "#80715f"} />
        </span>
      </div>
    </div>
  );

  // only show chips if there is something worth filtering by
  const showChips = cityChips.length > 0;
  const hasUnplaced = restaurants.some(r => !r.location);

  return (
    <div>
      {showChips && (
        <div className="chips" style={{margin:"2px 0 14px"}}>
          <span
            className={"chip pick" + (filter === "All" ? " on" : "")}
            onClick={()=> onFilterChange("All")}>All</span>
          {cityChips.map(c => (
            <span key={c}
              className={"chip pick" + (filter === c ? " on" : "")}
              onClick={()=> onFilterChange(c)}>{c}</span>
          ))}
          {hasUnplaced && (
            <span
              className={"chip pick" + (filter === "(no location)" ? " on" : "")}
              onClick={()=> onFilterChange("(no location)")}>No location</span>
          )}
        </div>
      )}

      {visible.length === 0 && (
        <div className="empty" style={{padding:"30px 20px"}}>
          <div className="big">Nothing in {filter}</div>
          <div>Add a restaurant in this location, or pick a different filter.</div>
        </div>
      )}

      {favs.length > 0 && <div className="divider-label">Favorites</div>}
      {favs.map(Card)}
      {others.length > 0 && <div className="divider-label">All places</div>}
      {others.map(Card)}
    </div>
  );
}

/* ============================================================
   RESTAURANT DETAIL
   ============================================================ */
function RestaurantDetail({restaurant, menus, visits, onClose, onLogVisit,
                           onEdit, onAddMenu, onOpenMenu,
                           onToggleFav, onDelete}){
  const [confirmDel, setConfirmDel] = useState(false);
  if (!restaurant){
    return (
      <div className="overlay">
        <div className="ovhead"><h2>Not found</h2>
          <button className="x" onClick={onClose}>Close</button></div>
      </div>
    );
  }
  const r = restaurant;
  const menuList = menus || [];
  return (
    <div className="overlay">
      <div className="ovhead">
        <button className="x" onClick={onClose}><Icon name="back" size={20} /></button>
        <h2>{r.name}</h2>
        <button className="x" onClick={onToggleFav}>
          <Icon name="star" size={22} color={r.favorite ? "#e0764a" : "#80715f"} />
        </button>
      </div>
      <div className="ovbody">
        <div className="meta-line">
          {r.cuisine || "Restaurant"}
          {r.location ? "  \u00b7  " + r.location : ""}
        </div>

        {(r.address || r.phone || r.website) && (
          <div className="card" style={{marginTop:12}}>
            {r.address && (
              <div className="row" style={{marginBottom:r.phone||r.website?10:0}}>
                <Icon name="pin" size={17} color="#b3a591" />
                <span className="small">{r.address}</span>
              </div>
            )}
            {r.phone && (
              <div className="row" style={{marginBottom:r.website?10:0}}>
                <Icon name="phone" size={17} color="#b3a591" />
                <a className="small" href={"tel:" + r.phone.replace(/[^0-9+]/g,"")}>{r.phone}</a>
              </div>
            )}
            {r.website && (
              <div className="row">
                <Icon name="link" size={17} color="#b3a591" />
                <a className="small" target="_blank" rel="noreferrer"
                   href={(r.website.indexOf("http")===0 ? r.website : "https://" + r.website)}>
                  {r.website}
                </a>
              </div>
            )}
          </div>
        )}

        {r.notes && <div className="card small muted">{r.notes}</div>}

        <button className="btn primary" onClick={onLogVisit} style={{marginTop:4}}>
          <Icon name="plus" size={18} color="#1b1714" />Log a visit here
        </button>

        {/* menus list - drill in to each */}
        <div className="row between" style={{margin:"22px 0 10px",alignItems:"center"}}>
          <div className="divider-label" style={{margin:0,flex:1}}>
            {menuList.length === 0
              ? "Menus"
              : "Menus (" + menuList.length + ")"}
          </div>
          <button className="btn ghost sm" onClick={onAddMenu}
            style={{flex:"none",padding:"6px 12px",margin:0}}>
            <Icon name="plus" size={15} />Add menu
          </button>
        </div>

        {menuList.length === 0 && (
          <div className="card" style={{textAlign:"center"}}>
            <div className="small muted" style={{marginBottom:11}}>
              No menus saved for this place yet. Tap <strong>Add menu</strong> above to
              scan one.
            </div>
          </div>
        )}

        {menuList.map(m => {
          const itemCount = (m.sections || []).reduce(
            (n,s) => n + ((s.items || []).length), 0);
          return (
            <div key={m.menu_id} className="menu-row"
              onClick={()=> onOpenMenu(m.menu_id)}>
              <div style={{flex:1, minWidth:0}}>
                <div className="menu-row-label">{m.label || "Menu"}</div>
                <div className="tiny faint" style={{marginTop:3}}>
                  {itemCount} item{itemCount === 1 ? "" : "s"}
                  {"  \u00b7  Captured " + fmtDate(m.captured_date)}
                  {m.source === "seed" ? " (starter)" : ""}
                </div>
              </div>
              <Icon name="chev" size={18} color="#80715f" />
            </div>
          );
        })}

        {/* visits at this place */}
        <div className="divider-label">Visits here ({visits.length})</div>
        {visits.length === 0 && (
          <div className="small faint" style={{padding:"2px 2px 8px"}}>
            No visits logged here yet.
          </div>
        )}
        {visits.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(v => (
          <div key={v.id} className="card">
            <div className="between">
              <div className="small muted">{fmtDate(v.date)}</div>
              {v.rating ? <Stars value={v.rating} /> : null}
            </div>
            {v.dishes && v.dishes.length > 0 && (
              <div className="chips">
                {v.dishes.map((d,i)=> <span key={i} className="chip dish">{d.name}</span>)}
              </div>
            )}
            {v.notes && <div className="small muted" style={{marginTop:8}}>{v.notes}</div>}
          </div>
        ))}

        {/* manage */}
        <div className="divider-label">Manage</div>
        <button className="btn ghost" onClick={onEdit} style={{marginBottom:10}}>
          <Icon name="edit" size={17} />Edit restaurant
        </button>
        {!confirmDel ? (
          <button className="btn danger" onClick={()=> setConfirmDel(true)}>
            <Icon name="trash" size={17} />Delete restaurant
          </button>
        ) : (
          <div className="card" style={{border:"1px solid rgba(217,96,78,0.4)"}}>
            <div className="small" style={{marginBottom:11}}>
              Delete {r.name} and its saved menu(s)? Logged visits are kept in History.
            </div>
            <div className="row" style={{gap:9}}>
              <button className="btn ghost" onClick={()=> setConfirmDel(false)}>Cancel</button>
              <button className="btn danger" onClick={onDelete}>Delete</button>
            </div>
          </div>
        )}
        <div style={{height:30}} />
      </div>
    </div>
  );
}

/* ============================================================
   MENU VIEW - collapsible sections + text filter
   ============================================================ */
function MenuView({menu}){
  const [open, setOpen]   = useState(()=> {
    const o = {}; (menu.sections||[]).forEach((s,i)=> { o[i] = i < 2; }); return o;
  });
  const [filter, setFilter] = useState("");
  const q = filter.trim().toLowerCase();

  const sections = (menu.sections || []).map((s,i)=>{
    if (!q) return { s, i, items:s.items };
    const items = s.items.filter(it =>
      (it.name + " " + it.description).toLowerCase().indexOf(q) !== -1);
    return { s, i, items };
  }).filter(x => !q || x.items.length);

  return (
    <div>
      <input className="input" placeholder="Search this menu..."
        value={filter} onChange={e=> setFilter(e.target.value)}
        style={{margin:"4px 0 6px"}} />
      {sections.length === 0 && (
        <div className="small faint" style={{padding:"12px 2px"}}>No items match.</div>
      )}
      {sections.map(({s,i,items})=>(
        <div key={i} className="msec">
          <div className="msec-head" onClick={()=> setOpen(o=> Object.assign({},o,{[i]:!o[i]}))}>
            <span className="nm">{s.name}</span>
            <span className="row" style={{gap:8}}>
              <span className="ct">{items.length}</span>
              <Icon name={(open[i]||q) ? "chevd" : "chev"} size={16} color="#80715f" />
            </span>
          </div>
          {(open[i] || q) && items.map((it,j)=>(
            <div key={j} className="mitem">
              <div className="ihead">
                <span className="inm">{it.name}</span>
                {it.price && <span className="ipr">{it.price}</span>}
              </div>
              {it.description && <div className="idesc">{it.description}</div>}
              {it.tags && it.tags.length > 0 && (
                <div className="chips" style={{marginTop:6}}>
                  {it.tags.map((t,k)=> <span key={k} className="chip tag">{t}</span>)}
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

  const [website,setWebsite]   = useState(existing ? existing.website : "");
  const [notes,setNotes]       = useState(existing ? existing.notes : "");

  // if the restaurant carries a location that has been removed from the
