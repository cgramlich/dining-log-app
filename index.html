}

// Estimate nutrition for a single MENU ITEM (text, grounded by its
// description). Cheaper than the photo path and cached per item by the
// caller. Returns normalized nutrition WITHOUT source/estimated_at.
async function estimateItemNutrition(cfg, restaurantName, item){
  const desc = item.description ? (" - " + item.description) : "";
  const tags = (item.tags && item.tags.length) ? (" (" + item.tags.join(", ") + ")") : "";
  const prompt =
    "Estimate the nutrition of a single restaurant menu item, for someone's "+
    "curiosity and memory - not dieting, so be realistic and non-judgmental.\n\n"+
    "Restaurant: " + (restaurantName || "a restaurant") + "\n"+
    "Item: " + item.name + desc + tags + "\n\n"+
    "Lean on the description to ground the estimate as much as you can. Return "+
    "ONLY a JSON object, no prose, no markdown, with exactly these keys:\n"+
    "{\n"+
    '  "kcal": estimated calories for one standard order (integer),\n'+
    '  "protein_g": grams of protein (integer),\n'+
    '  "carbs_g": grams of carbohydrate (integer),\n'+
    '  "fat_g": grams of fat (integer),\n'+
    '  "ingredients": [likely ingredients],\n'+
    '  "confidence": "low" | "medium" | "high",\n'+
    '  "note": one short sentence on the assumptions you made\n'+
    "}\n\n"+
    "If the description is sparse, estimate from the dish name and lower the "+
    "confidence. Base it on a typical single restaurant portion.";

  logMsg("NUTRI","Estimating item '" + item.name + "' via " + ASK_MODEL);
  let res;
  try {
    res = await fetch(apiBase(cfg) + "/api/ai/relay", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        ...(await authHeaders(cfg)),
      },
      body:JSON.stringify({
        task:"estimate_text",
        model:ASK_MODEL,
        max_tokens:700,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
  } catch(err){
    logMsg("ERROR","Item nutrition network failure: " + err.message);
    throw new Error("Network error reaching the AI service. Check your connection.");
  }
  if (res.status === 401){ throw new Error("Server rejected the request (401). Check your sign-in."); }
  if (res.status === 429){ throw new Error("Rate limit hit (429). Wait a moment and retry."); }
  if (!res.ok){
    const txt = await res.text().catch(()=> "");
    logMsg("ERROR","Item nutrition -> " + res.status + " " + txt.slice(0,180));
    let _detail = "";
    try { _detail = (JSON.parse(txt) || {}).detail || ""; } catch(e){ _detail = ""; }
    if (res.status === 402) throw new Error(_detail || "You\u2019ve reached this month\u2019s AI usage limit.");
    if (res.status === 503) throw new Error(_detail || "AI is temporarily unavailable. Please try again in a bit.");
    if (res.status === 429) throw new Error(_detail || "The AI service is busy. Wait a moment and try again.");
    throw new Error(_detail || ("AI request failed (" + res.status + ")"));
  }
  const json = await res.json();
  const text = (json.content || [])
    .filter(b => b.type === "text").map(b => b.text).join("\n");
  let parsed;
  try { parsed = parseJsonLoose(text); }
  catch(err){
    logMsg("ERROR","Could not parse item nutrition JSON: " + err.message);
    throw new Error("The estimate came back unreadable. Try again.");
  }
  const out = normalizeNutrition(parsed);
  logMsg("NUTRI","Item estimate: " + out.kcal + " kcal, conf=" + out.confidence);
  return out;
}

/* ============================================================
   PERSISTENCE - localStorage cache
   ============================================================ */
function loadConfig(){
  try {
    const raw = localStorage.getItem(CFG_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e){ logMsg("ERROR","loadConfig failed: " + e.message); return null; }
}
function saveConfig(cfg){
  try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); logMsg("CONFIG","Saved configuration"); }
  catch(e){ logMsg("ERROR","saveConfig failed: " + e.message); }
}
function configComplete(cfg){
  // Track B: a user is configured once they have a backend URL (defaulted)
  // and a user id. AI now runs through the backend, so no client key is needed.
  return !!(cfg && cfg.userId);
}
function loadCache(){
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e){ logMsg("ERROR","loadCache failed: " + e.message); return null; }
}
function saveCache(payload){
  try { localStorage.setItem(DATA_KEY, JSON.stringify(payload)); }
  catch(e){ logMsg("ERROR","saveCache failed: " + e.message); }
}

// Read-only star display. Supports half-star values (e.g. 4.5):
// full stars up to floor(value), one half-filled star if there is a
// 0.5 remainder, then empty stars. A half star is drawn by stacking a
// lit star clipped to its left 50% over a dim star. `showNum` appends
// the numeric value (e.g. "4.5") beside the stars for read-only contexts.
function Stars({value, size, showNum}){
  const v    = Number(value) || 0;
  const big  = size === "big";
  const px   = big ? 28 : 15;
  const full = Math.floor(v);
  const half = (v - full) >= 0.5;   // treat anything >= .5 as a half star
  return (
    <span className="stars">
      {[1,2,3,4,5].map(n => {
        const isFull = n <= full;
        const isHalf = !isFull && n === full + 1 && half;
        if (isHalf){
          return (
            <span key={n} className={"star half" + (big ? " big" : "")}
                  style={{position:"relative", display:"inline-block"}}>
              {/* dim base */}
              <Icon name="star" size={px} color="#3a3128" />
              {/* lit overlay, clipped to the left half */}
              <span style={{position:"absolute", left:0, top:0,
                            width:"50%", overflow:"hidden",
                            display:"inline-block", lineHeight:0}}>
                <Icon name="star" size={px} color="#e7b24c" />
              </span>
            </span>
          );
        }
        return (
          <span key={n} className={"star" + (isFull ? " lit" : "") + (big ? " big" : "")}>
            <Icon name="star" size={px} color={isFull ? "#e7b24c" : "#3a3128"} />
          </span>
        );
      })}
      {showNum && v > 0 && (
        <span className="stars-num">{Number.isInteger(v) ? v : v.toFixed(1)}</span>
      )}
    </span>
  );
}

/* NutriLine - compact one-line nutrition summary for visit cards.
   Neutral and non-judgmental: a number for memory, never a verdict. */
function NutriLine({n}){
  if (!n || !n.kcal) return null;
  const approx = (n.source === "photo_estimate" || n.source === "menu_estimate") ? "~" : "";
  const tag = n.source === "menu_stated" ? "per menu"
            : n.source === "manual"      ? "edited"
            : "est";
  const hasMacros = (n.protein_g || 0) + (n.carbs_g || 0) + (n.fat_g || 0) > 0;
  return (
    <div className="nutri-line">
      <span className="kc">{approx}{n.kcal} cal</span>
      {hasMacros && <span className="mc">{n.protein_g}P / {n.carbs_g}C / {n.fat_g}F</span>}
      <span className="tg">{tag}</span>
    </div>
  );
}

/* Shared-dish portion scaling. A dish split on the receipt picker carries
   share:{pct} = the percent of the item that was YOURS. The stored price is
   already your portion; the cached nutrition estimate is the FULL serving, so
   menu-based calorie numbers are scaled to your share at DISPLAY time. A photo
   of your own plate is already your portion (never scaled), and a hand-entered
   number is taken as typed. share and qty are mutually exclusive in v1. */
function dishSharePct(d){
  var p = d && d.share && d.share.pct;
  return (typeof p === "number" && p > 0 && p < 100) ? p : null;
}
function dishShareLabel(d){
  var p = dishSharePct(d);
  return p == null ? "" : (" \u00b7 " + Math.round(p) + "%");
}
// true when this nutrition source is a FULL serving (so a share scales it)
function shareScales(n){
  return !!(n && (n.source === "menu_estimate" || n.source === "menu_stated"));
}
function dishKcalNum(d){
  var n = d && d.nutrition;
  if (!n || !n.kcal) return null;
  var p = dishSharePct(d);
  return (p != null && shareScales(n)) ? Math.round(n.kcal * p / 100) : n.kcal;
}
function dishMacNum(d, key){
  var n = d && d.nutrition;
  if (!n || !n[key]) return 0;
  var p = dishSharePct(d);
  return (p != null && shareScales(n)) ? Math.round(n[key] * p / 100) : n[key];
}
// "~" marker: estimates are always approximate, and a shared per-menu number
// becomes an estimate of your share (so it stops being an exact figure).
function dishKcalApprox(d){
  var n = d && d.nutrition;
  if (!n) return true;
  if (n.source === "menu_stated") return dishSharePct(d) != null;
  return true;
}

/* DishTotal - sums the per-dish estimates on a visit into one calm line.
   Shown only when 2+ dishes are estimated (a single dish's total just
   repeats the chip). Informative, never a budget: no colors, no verdicts. */
function DishTotal({dishes, min}){
  const floor = min || 2;
  const est = (dishes || []).filter(d => d && d.nutrition && d.nutrition.kcal);
  if (est.length < floor) return null;
  // sum the share-scaled per-dish numbers so a "I had 50%" dish counts as half
  const kcal = est.reduce((s,d)=> s + (dishKcalNum(d) || 0), 0);
  const p = est.reduce((s,d)=> s + dishMacNum(d,"protein_g"), 0);
  const c = est.reduce((s,d)=> s + dishMacNum(d,"carbs_g"), 0);
  const f = est.reduce((s,d)=> s + dishMacNum(d,"fat_g"), 0);
  const hasMacros = (p + c + f) > 0;
  return (
    <div className="dish-total">
      <span className="dt-kc">~{kcal} cal total</span>
      {hasMacros && <span className="dt-mc">{p}P / {c}C / {f}F</span>}
      {est.length >= 2 && <span className="dt-note">across {est.length} dishes</span>}
    </div>
  );
}

/* PhotoImg - lazy-loads a photo by path from the data repo and renders
   it as an <img>. Shows a soft placeholder while loading, and a small
   icon if the fetch fails. Uses the module-level PHOTO_CACHE so the
   same path is only fetched once per session. */
function PhotoImg({cfg, path, alt, className, style, onClick}){
  const [url, setUrl] = useState(null);
  const [err, setErr] = useState(false);
  useEffect(()=>{
    if (!path || !cfg){ setUrl(null); setErr(false); return; }
    let mounted = true;
    setErr(false); setUrl(null);
    getPhotoBlobUrl(cfg, path).then(u => {
      if (mounted) setUrl(u);
    }).catch(e => {
      if (mounted){
        logMsg("ERROR","Photo load failed for " + path + ": " + e.message);
        setErr(true);
      }
    });
    return ()=> { mounted = false; };
  },[path, cfg && cfg.userId]);
  if (err){
    return (
      <div className={"photo-shell err " + (className || "")} style={style}
           onClick={onClick}>
        <Icon name="image" size={20} color="#5a5045" />
      </div>
    );
  }
  if (!url){
    return (
      <div className={"photo-shell loading " + (className || "")} style={style}
           onClick={onClick} />
    );
  }
  return <img src={url} alt={alt || ""}
              className={"photo-img " + (className || "")} style={style}
              onClick={onClick} />;
}

        </div>
      )}

  );
}

/* ============================================================
   IN-APP UPDATER
   ============================================================
   GitHub Pages and the iOS Home Screen app both cache index.html,
   so a fresh upload can linger. On launch we re-fetch our own file
   (cache-busted), read the deployed APP_VERSION, and if it is newer
   than what is running we offer a one-tap cache-busting reload.
   No service worker, nothing extra to deploy. */

// Compare dot-separated versions; true if `a` is strictly newer than `b`.
function isNewer(a, b){
  const pa = String(a || "").split(".").map(n => parseInt(n,10) || 0);
  const pb = String(b || "").split(".").map(n => parseInt(n,10) || 0);
  const len = Math.max(pa.length, pb.length);
  for (let i=0; i<len; i++){
    const x = pa[i] || 0, y = pb[i] || 0;
    if (x > y) return true;
    if (x < y) return false;
  }
  return false;
}

// Fetch our own page fresh (bypassing caches) and read the deployed
// version string. Returns the version, or null on any failure/offline.
async function fetchDeployedVersion(){
  const url = location.pathname + "?vcheck=" + Date.now();
  try {
    const res = await fetch(url, { cache:"no-store" });
    if (!res.ok) return null;
    const html = await res.text();
    const m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    return m ? m[1] : null;
  } catch(e){
    logMsg("UPDATE","Version check failed: " + e.message);
    return null;
  }
}

// Reload onto a cache-busting URL so the CDN and the app cache both
// fetch the new file instead of serving the stale one.
function applyUpdate(version){
  const base = location.origin + location.pathname;
  location.replace(base + "?v=" + encodeURIComponent(version || Date.now()));
}

// ---------------------------------------------------------------------------
// Badges. Earned status is DERIVED live from the user's own data (no stored
// badge state) - same philosophy as the Year in Food recap. Voice A copy. The
// heart in "Share the Love" renders as an SVG Icon, never an emoji character.
// ---------------------------------------------------------------------------
const BADGES = [
  { id:"first-scan",  name:"First Scan",  icon:"camera",
    earnedText:"You scanned your first menu.",
    lockedText:"Scan a menu to earn this." },
  { id:"ten-visits",  name:"Ten Visits",  icon:"book",
    earnedText:"Ten visits logged.",
    lockedText:"Log ten visits." },
  { id:"five-cities", name:"Five Cities", icon:"pin",
    earnedText:"You've eaten in five different cities.",
    lockedText:"Eat in five different cities." },
  { id:"first-list",  name:"First List",  icon:"share",
    earnedText:"You published your first list.",
    lockedText:"Publish a list to earn this." },
  // "Five Shares" badge: earned by tapping Share the Love >= 5 times.
  // Uses the share-nodes glyph (the heart belongs to the function, not the badge).
  // Name is a count+noun milestone (like Five Cities) so it reads as earned
  // status, not an instruction - it sits in the same screen as the real button.
  { id:"share-love",  name:"Five Shares",  icon:"nodes",
    earnedText:"You've shared the app five times.",
    lockedText:"Share the app five times to earn this." },
];

// Pure: which badge ids are currently earned, computed from existing data.
function earnedBadgeIds({restaurants, visits, menus, lists, meta}){
  const ids = [];
  // first-scan: any menu exists (menus is keyed by restaurant id -> array).
  const menuCount = Object.keys(menus || {}).reduce(
    (n, rid)=> n + ((menus[rid] || []).length), 0);
  if (menuCount >= 1) ids.push("first-scan");
  // ten-visits
  if ((visits || []).length >= 10) ids.push("ten-visits");
  // five-cities: distinct r.location among restaurants with >=1 visit - the
  // SAME rule the Year in Food recap uses for "cities you ate in".
  const restMap = {};
  (restaurants || []).forEach(r => { if (r && r.id) restMap[r.id] = r; });
  const cities = {};
  (visits || []).forEach(v => {
    const r = (v && v.restaurant_id) ? restMap[v.restaurant_id] : null;
    const c = (r && r.location) ? r.location.trim() : "";
    if (c) cities[c] = true;
  });
  if (Object.keys(cities).length >= 5) ids.push("five-cities");
  // first-list: any saved published list exists
  if ((lists || []).length >= 1) ids.push("first-list");
  // share-love: tapped "Share the app" >= 5 times
  if (((meta || {}).app_shares || 0) >= 5) ids.push("share-love");
  return ids;
}

function App(){
  const [config, setConfig]     = useState(() => loadConfig());
  const [ready, setReady]       = useState(false);
  const [needSetup, setNeedSetup] = useState(false);

  // data model
  const [restaurants, setRestaurants] = useState([]);
  const [menus, setMenus]             = useState({});
  const [visits, setVisits]           = useState([]);
  const [locations, setLocations]     = useState([]);      // array of city names
  const [lists, setLists]             = useState([]);      // saved published lists
  const [meta, setMeta]               = useState({});      // small per-user state (app_shares)
  const [splits, setSplits]           = useState([]);      // saved standalone check splits
  const [auxLoaded, setAuxLoaded]     = useState(false);   // lists+meta fetched (gates badge eval)
  const [shas, setShas]               = useState({});      // path -> sha
  const [dirty, setDirty]             = useState({});      // logical name -> bool (unpushed)

  // ui
  const [tab, setTab]         = useState("history");
  const [overlay, setOverlay] = useState(null);            // {type, ...}
  const [sheet, setSheet]     = useState(false);
  const [sync, setSync]       = useState({ status:"idle", msg:"" });
  const [toast, setToast]     = useState("");
  const [placesFilter, setPlacesFilter] = useState("All"); // active city filter chip
  const [update, setUpdate]   = useState(null);            // {version} when a newer build is live
  const [updMsg, setUpdMsg]   = useState("");              // transient text for manual check

  const toastTimer = useRef(null);
  function flash(msg){
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=> setToast(""), 2600);
  }

  /* ---- auto scroll-to-top ---------------------------------- */
  // WHY: pop-up screens were opening partway down, so the first controls
  // (e.g. "Who's at the table?" at the top of the check splitter) sat
  // off-screen and looked missing. `overlay` is a fresh object on every
  // open, so this fires each time one opens. useEffect runs after React
  // commits the DOM, and the rAF gives the slide-up animation a frame to
  // settle before we reset the scroll container(s) to the top.
  useEffect(()=>{
    if (!overlay) return;
    const id = requestAnimationFrame(()=>{
      // A standard overlay scrolls inside .ovbody; the group-order and
      // print overlays scroll themselves. Only the matching one(s) exist
      // in the DOM at any time, so resetting all matches is safe.
      document.querySelectorAll(".ovbody, .print-overlay, .go-overlay")
        .forEach((el)=>{ el.scrollTop = 0; });
    });
    return ()=> cancelAnimationFrame(id);
  }, [overlay]);

  // WHY: switching bottom-nav tabs (History/Places/etc.) kept the old
  // scroll position. The page/window is what scrolls for tab content,
  // so jump it back to the top on every tab change.
  useEffect(()=>{
    window.scrollTo(0, 0);
  }, [tab]);

  /* ---- update check ---------------------------------------- */
  // manual=true surfaces a result message (for the Settings button);
  // on launch we check quietly and only speak up if there's an update.
  async function checkForUpdate(manual){
    if (manual) setUpdMsg("Checking...");
    const v = await fetchDeployedVersion();
    if (v && isNewer(v, APP_VERSION)){
      setUpdate({ version:v });
      if (manual) setUpdMsg("");
      logMsg("UPDATE","Newer version live: " + v + " (running " + APP_VERSION + ")");
    } else {
      setUpdate(null);
      if (manual){
        setUpdMsg(v ? ("You're on the latest (" + APP_VERSION + ")")
                    : "Couldn't check - are you online?");
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setTimeout(()=> setUpdMsg(""), 3500);
      }
    }
  }
  // check once on launch (slight delay so it doesn't compete with first sync)
  useEffect(()=>{
    const t = setTimeout(()=> checkForUpdate(false), 1500);
    return ()=> clearTimeout(t);
    // eslint-disable-next-line
  },[]);

  /* ---- startup --------------------------------------------- */
  useEffect(()=>{
    logMsg("INIT","MenuCaptain v" + APP_VERSION + " starting");
    const cfg = loadConfig();
    if (!configComplete(cfg)){
      logMsg("INIT","Configuration incomplete - showing setup");
      setNeedSetup(true);
      setReady(true);
      return;
    }
    logMsg("INIT","Config OK - userId=" + cfg.userId + " apiBase=" + apiBase(cfg));
    // show cached data instantly, then sync
    const cache = loadCache();
    if (cache){
      setRestaurants(cache.restaurants || []);
      setMenus(cache.menus || {});
      setVisits(cache.visits || []);
      setLocations(cache.locations || []);
      setShas(cache.shas || {});
      setDirty(cache.dirty || {});
      logMsg("INIT","Loaded cache: " + (cache.restaurants||[]).length +
                    " restaurants, " + (cache.visits||[]).length + " visits, " +
                    (cache.locations||[]).length + " locations");
    }
    setReady(true);
    if (window.__CHECKOUT_RESULT === "success"){
      // Webhook flips the tier server-side within seconds of payment.
      flash("Welcome to MenuCaptain Pro!");
      window.__CHECKOUT_RESULT = null;
    }
    syncFromGitHub(cfg, cache);
    // Load lists + meta. These are kept OUT of the main sync/merge engine
    // (their own light state) and back the saved-list records, the First List
    // and Share the Love badges, and the share counter. auxLoaded gates badge
    // evaluation so we never seed/toast before this data has arrived.
    (async ()=>{
      try {
        const lr = await ghGetFile(cfg, "data/lists.json");
        setLists(Array.isArray(lr.data) ? lr.data : []);
      } catch(e){ logMsg("WARN","lists load failed: " + e.message); }
      try {
        const mr = await ghGetFile(cfg, "data/meta.json");
        setMeta((mr.data && typeof mr.data === "object" && !Array.isArray(mr.data)) ? mr.data : {});
      } catch(e){ logMsg("WARN","meta load failed: " + e.message); }
      try {
        const sr = await ghGetFile(cfg, "data/splits.json");
        setSplits(Array.isArray(sr.data) ? sr.data : []);
      } catch(e){ logMsg("WARN","splits load failed: " + e.message); }
      setAuxLoaded(true);
    })();
    // eslint-disable-next-line
  },[]);

  /* ---- badges: toast the moment one is newly earned -------------------- */
  // Earned status is derived from data; we persist only a per-device list of
  // ids already seen (dininglog_badges_seen). The FIRST evaluation each session
  // silently establishes a baseline (acknowledges everything already earned -
  // including the very first run, and any stale-cache catch-up), so we never
  // toast for old milestones. Only badges earned LATER in the session toast.
  const badgeBaseline = useRef(false);
  useEffect(()=>{
    if (!ready || !auxLoaded) return;
    let seen;
    try { seen = JSON.parse(localStorage.getItem("dininglog_badges_seen") || "[]"); }
    catch(e){ seen = []; }
    if (!Array.isArray(seen)) seen = [];
    const earned = earnedBadgeIds({ restaurants, visits, menus, lists, meta });
    if (!badgeBaseline.current){
      const merged = seen.slice();
      earned.forEach(id => { if (merged.indexOf(id) === -1) merged.push(id); });
      try { localStorage.setItem("dininglog_badges_seen", JSON.stringify(merged)); } catch(e){}
      badgeBaseline.current = true;
      logMsg("BADGES","Baseline set (" + earned.length + " earned, no toast)");
      return;
    }
    const fresh = earned.filter(id => seen.indexOf(id) === -1);
    if (fresh.length){
      const names = fresh.map(id => {
        const b = BADGES.find(x => x.id === id);
        return b ? (b.nameHeart ? "Shared the Love" : b.name) : id;
      });
      flash("Badge earned - " + names.join(", "));
      logMsg("BADGES","Newly earned: " + fresh.join(", "));
      const next = seen.concat(fresh);
      try { localStorage.setItem("dininglog_badges_seen", JSON.stringify(next)); } catch(e){}
    }
  }, [ready, auxLoaded, restaurants, visits, menus, lists, meta]);

  /* ---- saved lists + meta (direct persistence, not the sync engine) ---- */
  async function saveLists(next){
    setLists(next);
    try { await ghPutFile(config, "data/lists.json", next, null); logMsg("LISTS","Saved " + next.length + " lists"); }
    catch(e){ logMsg("ERROR","lists save failed: " + e.message); flash("Could not save the list"); }
  }
  async function saveMeta(next){
    setMeta(next);
    try { await ghPutFile(config, "data/meta.json", next, null); logMsg("META","Saved meta"); }
    catch(e){ logMsg("ERROR","meta save failed: " + e.message); }
  }
  // Saved standalone check splits. Same direct-persistence pattern as lists:
  // the client owns the whole array and PUTs it on every change (the backend
  // "splits" collection). upsertSplit replaces by id; deleteSplit drops one.
  async function saveSplits(next){
    setSplits(next);
    try { await ghPutFile(config, "data/splits.json", next, null); logMsg("SPLITS","Saved " + next.length + " splits"); }
    catch(e){ logMsg("ERROR","splits save failed: " + e.message); flash("Could not save the split"); }
  }
  function upsertSplit(entity){
    if (!entity || !entity.id) return;
    const rest = (splits || []).filter(s => s.id !== entity.id);
    saveSplits([entity].concat(rest));
  }
  function deleteSplit(id){
    saveSplits((splits || []).filter(s => s.id !== id));
  }
  // Called by PublishBuilder after a deliberate publish succeeds. Dedup by url
  // so re-publishing the same list updates it instead of adding a duplicate.
  function handleListPublished(rec){
    if (!rec || !rec.url) return;
    const idx = (lists || []).findIndex(l => l.url === rec.url);
    let next;
    if (idx >= 0){
      next = lists.slice();
      next[idx] = Object.assign({}, next[idx], rec,
        { created_at: next[idx].created_at, updated_at: new Date().toISOString() });
    } else {
      next = (lists || []).concat([rec]);
    }
    saveLists(next);
    logMsg("LISTS", (idx >= 0 ? "Updated" : "Added") + " published list: " + (rec.title || "(untitled)"));
  }
  // My Lists actions. Refresh rebuilds a saved list from the user's CURRENT
  // places (via stored place_ids) and re-publishes; the slug is content-hashed,
  // so the link can change if the places changed. Replace by id (not url),
  // since url may move on refresh.
  async function refreshSavedList(rec){
    const selected = (restaurants || []).filter(r => (rec.place_ids || []).indexOf(r.id) !== -1);
    if (!selected.length){ flash("Those places aren't in your list anymore"); return null; }
    try {
      const payload  = buildListPayload(rec.title, selected, visits);
      const enc      = encodeListPayload(payload);
      const longUrl  = location.origin + location.pathname + "?list=" + enc;
      const short    = await publishListPage(config, payload, enc);
      const finalUrl = short || longUrl;
      const next = (lists || []).map(l => l.id === rec.id ? Object.assign({}, l, {
        place_ids: selected.map(r => r.id),
        encoded: enc, url: finalUrl, count: selected.length,
        names: selected.slice(0, 8).map(r => r.name),
        updated_at: new Date().toISOString(),
      }) : l);
      await saveLists(next);
      logMsg("LISTS", "Refreshed list: " + (rec.title || "(untitled)"));
      return finalUrl;
    } catch(e){
      logMsg("ERROR", "list refresh failed: " + e.message);
      flash("Could not refresh the list");
      return null;
    }
  }
  function toggleListFav(rec){
    const next = (lists || []).map(l => l.id === rec.id ? Object.assign({}, l, { fav: !l.fav }) : l);
    saveLists(next);
  }
  function deleteSavedList(rec){
    const next = (lists || []).filter(l => l.id !== rec.id);
    saveLists(next);
  }
  // Called by the Share the Love card. Counts taps (a confirmed send cannot be
  // detected from the share sheet); increments meta.app_shares.
  async function shareApp(){
    const shareUrl = "https://menucaptain.com/welcome.html";
    const txt = "I'm using MenuCaptain to remember every great meal - thought you'd like it.";
    try {
      if (navigator.share){ await navigator.share({ title:"MenuCaptain", text:txt, url:shareUrl }); }
      else { await navigator.clipboard.writeText(shareUrl); flash("Link copied - share it with someone"); }
    } catch(e){ /* user cancelled the share sheet - still counts as intent */ }
    const nextMeta = Object.assign({}, meta, { app_shares: ((meta || {}).app_shares || 0) + 1 });
    saveMeta(nextMeta);
    logMsg("SHARE","app_shares -> " + nextMeta.app_shares);
  }

  /* ---- cache writer ---------------------------------------- */
  function persist(next){
    // next may contain any of restaurants/menus/visits/locations/shas/dirty
    const payload = {
      restaurants: next.restaurants !== undefined ? next.restaurants : restaurants,
      menus:       next.menus       !== undefined ? next.menus       : menus,
      visits:      next.visits      !== undefined ? next.visits      : visits,
      locations:   next.locations   !== undefined ? next.locations   : locations,
      shas:        next.shas        !== undefined ? next.shas        : shas,
      dirty:       next.dirty       !== undefined ? next.dirty       : dirty,
      lastSync:    Date.now(),
    };
    saveCache(payload);
  }

  /* ---- sync from GitHub ------------------------------------ */
  async function syncFromGitHub(cfg, cache){
    cfg = cfg || config;
    if (!configComplete(cfg)) return;
    setSync({ status:"busy", msg:"Syncing your data..." });
    logMsg("SYNC","Starting sync");

    const localDirty = (cache && cache.dirty) || dirty;
    let nextR = (cache && cache.restaurants) || restaurants;
    let nextM = (cache && cache.menus)       || menus;
    let nextV = (cache && cache.visits)      || visits;
    let nextL = (cache && cache.locations)   || locations;
    let nextShas = Object.assign({}, (cache && cache.shas) || shas);
    let missing = { restaurants:false, menus:false, visits:false, locations:false };

    try {
      for (const key of ["restaurants","menus","visits","locations"]){
        if (localDirty[key]){
          // local has unpushed edits - keep local, do not overwrite from remote
          logMsg("SYNC",key + " has pending local edits - keeping local copy");
          continue;
        }
        const got = await ghGetFile(cfg, FILES[key]);
        if (!got.found){ missing[key] = true; continue; }
        if (key === "restaurants") nextR = got.data;
        if (key === "menus")       nextM = got.data;
        if (key === "visits")      nextV = got.data;
        if (key === "locations")   nextL = got.data;
        nextShas[FILES[key]] = got.sha;
      }

      // brand-new repo: core files missing -> seed Carlita's + Portland
      // (locations may or may not exist - treat the three core files as the signal)
      if (missing.restaurants && missing.menus && missing.visits){
        logMsg("SYNC","Empty repo detected - seeding Carlita's starter data");
        const seed = carlitasSeed();
        nextR = [seed.restaurant];
        nextM = { [seed.menu.restaurant_id]: [seed.menu] };  // v1.3: array of menus
        nextV = [];
        nextL = seed.locations;
        nextShas[FILES.restaurants] = await ghPutFile(cfg, FILES.restaurants, nextR, null);
        nextShas[FILES.menus]       = await ghPutFile(cfg, FILES.menus, nextM, null);
        nextShas[FILES.visits]      = await ghPutFile(cfg, FILES.visits, nextV, null);
        nextShas[FILES.locations]   = await ghPutFile(cfg, FILES.locations, nextL, null);
        missing.locations = false;
        flash("Set up your repo with Carlita's to start");
      } else {
        // create any individually-missing files as empty / sensible defaults
        if (missing.restaurants){ nextR = []; nextShas[FILES.restaurants] = await ghPutFile(cfg, FILES.restaurants, [], null); }
        if (missing.menus){       nextM = {}; nextShas[FILES.menus]       = await ghPutFile(cfg, FILES.menus, {}, null); }
        if (missing.visits){      nextV = []; nextShas[FILES.visits]      = await ghPutFile(cfg, FILES.visits, [], null); }
        if (missing.locations){
          // existing data repo from an older app version - back-fill locations.
          // collect any location values already present on restaurants
          let derived = Array.from(new Set(
            (nextR || []).map(r => (r.location || "").trim()).filter(Boolean)
          ));
          // one-time migration: if the original Carlita's seed exists with no
          // location, restore its Portland tag and push restaurants too
          const seedIdx = (nextR || []).findIndex(r =>
            r.id === "rest_carlitas" && !(r.location && r.location.trim()));
          if (seedIdx >= 0){
            const migratedR = nextR.map((r, i) =>
              i === seedIdx ? Object.assign({}, r, { location:"Portland" }) : r);
            try {
              nextShas[FILES.restaurants] = await ghPutFile(
                cfg, FILES.restaurants, migratedR, nextShas[FILES.restaurants]);
            } catch(err){
              if (err.conflict){
                const fresh = await ghGetFile(cfg, FILES.restaurants);
                nextShas[FILES.restaurants] = await ghPutFile(
                  cfg, FILES.restaurants, migratedR, fresh.sha);
              } else throw err;
            }
            nextR = migratedR;
            if (!derived.includes("Portland")) derived.push("Portland");
            logMsg("SYNC","Migrated Carlita's to location=Portland");
          }
          derived.sort((a,b)=> a.localeCompare(b));
          nextL = derived;
          nextShas[FILES.locations] = await ghPutFile(cfg, FILES.locations, nextL, null);
          logMsg("SYNC","Back-filled locations file with " + nextL.length + " value(s)");
        }
      }

      // v1.3 shape migration: convert legacy single-menu objects to arrays.
      // Runs every sync but only writes back if something actually changed.
      {
        const mig = migrateMenusShape(nextM);
        if (mig.changed){
          nextM = mig.menus;
          try {
            nextShas[FILES.menus] = await ghPutFile(
              cfg, FILES.menus, nextM, nextShas[FILES.menus]);
          } catch(err){
            if (err.conflict){
              const fresh = await ghGetFile(cfg, FILES.menus);
              nextShas[FILES.menus] = await ghPutFile(
                cfg, FILES.menus, nextM, fresh.sha);
            } else throw err;
          }
          logMsg("SYNC","Migrated menus to v1.3 multi-menu shape");
        }
      }

      // push any files that had pending local edits
      for (const key of ["restaurants","menus","visits","locations"]){
        if (localDirty[key]){
          const obj = key==="restaurants" ? nextR : key==="menus" ? nextM
                    : key==="visits"      ? nextV : nextL;
          try {
            nextShas[FILES[key]] = await ghPutFile(cfg, FILES[key], obj, nextShas[FILES[key]]);
          } catch(err){
            if (err.conflict){
              const fresh = await ghGetFile(cfg, FILES[key]);
              nextShas[FILES[key]] = await ghPutFile(cfg, FILES[key], obj, fresh.sha);
            } else throw err;
          }
        }
      }

      setRestaurants(nextR); setMenus(nextM); setVisits(nextV); setLocations(nextL);
      setShas(nextShas);
      const cleared = {};
      setDirty(cleared);
      persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, shas:nextShas, dirty:cleared });
      setSync({ status:"ok", msg:"" });
      logMsg("SYNC","Sync complete");
    } catch(err){
      logMsg("ERROR","Sync failed: " + err.message);
      setSync({ status:"err", msg:err.message });
    }
  }

  /* ---- commit a change and push to GitHub ------------------ */
  /* ---- photo uploads ---------------------------------------
     Uploads a batch of photo blobs to their paths in the data repo,
     then folds the new SHAs into the shas state map and persists
     them to localStorage. Photo files live alongside the JSON files
     in the same private repo, so they share the same auth path. */
  async function uploadPhotoBatch(uploads){
    // uploads: array of { path, blob }
    // returns: same array shape (rejects on first failure)
    if (!uploads || !uploads.length) return [];
    if (!configComplete(config)) throw new Error("Not configured");
    const nextShas = Object.assign({}, shas);
    for (const u of uploads){
      const newSha = await ghPutBinaryFile(config, u.path, u.blob, nextShas[u.path]);
      nextShas[u.path] = newSha;
      // bust any stale cache entry and seed the new bytes so the UI
      // can render the upload immediately without a round-trip
      invalidatePhoto(u.path);
      seedPhoto(u.path, u.blob);
    }
    setShas(nextShas);
    persist({ shas:nextShas });
    return uploads;
  }

  async function commit(updates, filesToPush){
    // updates: {restaurants?, menus?, visits?, locations?}; filesToPush: [logical names]
    const nextR = updates.restaurants !== undefined ? updates.restaurants : restaurants;
    const nextM = updates.menus       !== undefined ? updates.menus       : menus;
    const nextV = updates.visits      !== undefined ? updates.visits      : visits;
    const nextL = updates.locations   !== undefined ? updates.locations   : locations;
    if (updates.restaurants !== undefined) setRestaurants(nextR);
    if (updates.menus       !== undefined) setMenus(nextM);
    if (updates.visits      !== undefined) setVisits(nextV);
    if (updates.locations   !== undefined) setLocations(nextL);

    // mark dirty and cache immediately (optimistic, survives offline)
    const nextDirty = Object.assign({}, dirty);
    filesToPush.forEach(k => { nextDirty[k] = true; });
    setDirty(nextDirty);
    persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, dirty:nextDirty });

    if (!configComplete(config)){ setSync({status:"err",msg:"Not configured"}); return; }
    setSync({ status:"busy", msg:"Saving..." });
    const nextShas = Object.assign({}, shas);
    const stillDirty = Object.assign({}, nextDirty);
    try {
      for (const key of filesToPush){
        const obj = key==="restaurants" ? nextR : key==="menus" ? nextM
                  : key==="visits"      ? nextV : nextL;
        try {
          nextShas[FILES[key]] = await ghPutFile(config, FILES[key], obj, nextShas[FILES[key]]);
        } catch(err){
          if (err.conflict){
            logMsg("SYNC","Resolving conflict on " + key + " by refetching sha");
            const fresh = await ghGetFile(config, FILES[key]);
            nextShas[FILES[key]] = await ghPutFile(config, FILES[key], obj, fresh.sha);
          } else throw err;
        }
        delete stillDirty[key];
      }
      setShas(nextShas);
      setDirty(stillDirty);
      persist({ restaurants:nextR, menus:nextM, visits:nextV, locations:nextL, shas:nextShas, dirty:stillDirty });
      setSync({ status:"ok", msg:"" });
      logMsg("SAVE","Committed: " + filesToPush.join(", "));
    } catch(err){
      logMsg("ERROR","Commit failed (kept locally): " + err.message);
      setSync({ status:"err", msg:"Not synced - " + err.message });
    }
  }

  function retrySync(){ syncFromGitHub(config, loadCache()); }

  /* ---- derived helpers ------------------------------------- */
  function restaurantById(id){ return restaurants.find(r => r.id === id) || null; }
  function visitsFor(id){ return visits.filter(v => v.restaurant_id === id); }

  /* ---- render gates ---------------------------------------- */
  if (!ready){
    return <div className="empty" style={{paddingTop:"40vh"}}>
      <div className="spin" style={{margin:"0 auto"}} /></div>;
  }
  if (needSetup){
    return <SetupScreen
      initial={config}
      onSave={(cfg)=>{
        saveConfig(cfg); setConfig(cfg); setNeedSetup(false); setReady(false);
        logMsg("CONFIG","Setup complete - reloading");
        setTimeout(()=> window.location.reload(), 200);
      }} />;
  }

  const pendingCount = Object.keys(dirty).filter(k => dirty[k]).length;

  return (
    <div id="app-shell">
      <TopBar tab={tab} />

      {/* update available - tap to cache-bust reload */}
      {update && (
        <div className="syncbar update" onClick={()=> applyUpdate(update.version)}
          style={{cursor:"pointer"}}>
          <span className="dot" style={{background:"var(--accent)"}} />
          <span>Update available (v{update.version})</span>
          <button onClick={(e)=>{ e.stopPropagation(); applyUpdate(update.version); }}>
            Refresh
          </button>
        </div>
      )}

      {/* sync status banner */}
      {sync.status === "busy" && (
        <div className="syncbar busy"><span className="spin" />{sync.msg || "Working..."}</div>
      )}
      {sync.status === "err" && (
        <div className="syncbar err">
          <span className="dot" style={{background:"var(--danger)"}} />
          <span>{sync.msg}</span>
          <button onClick={retrySync}>Retry</button>
        </div>
      )}
      {sync.status === "ok" && pendingCount > 0 && (
        <div className="syncbar warn">
          <span className="dot" style={{background:"var(--amber)"}} />
          <span>{pendingCount} change(s) not yet synced</span>
          <button onClick={retrySync}>Sync now</button>
        </div>
      )}

      <div className="content">
        {tab === "history" && (
          <HistoryView visits={visits} restaurantById={restaurantById}
            cfg={config} syncing={sync.status === "busy"}
            onSplitVisit={(v)=> setOverlay({ type:"splitCheck", fromVisit:v })}
            onOpen={(v)=> setOverlay({ type:"editVisit", visit:v })} />
        )}
        {tab === "restaurants" && (
          <RestaurantsView restaurants={restaurants} visits={visits}
            locations={locations}
            cfg={config}
            activeFilter={placesFilter}
            onFilterChange={setPlacesFilter}
            onOpenMap={()=> setOverlay({ type:"map" })}
            onPublishList={()=> setOverlay({ type:"publish" })}
            onOpenMyLists={()=> setOverlay({ type:"myLists" })}
            savedListCount={(lists || []).length}
            onOpen={(r)=> setOverlay({ type:"restaurant", id:r.id })} />
        )}
        {tab === "settings" && (
          <SettingsView config={config}
            onEdit={()=> setOverlay({ type:"settings" })}
            onOpenHelp={()=> setOverlay({ type:"help" })}
            onOpenYearInFood={()=> setOverlay({ type:"yearInFood" })}
            onOpenPassport={()=> setOverlay({ type:"passport" })}
            counts={{
              r: restaurants.length,
              m: Object.keys(menus).reduce((n,rid)=> n + (menus[rid] || []).length, 0),
              v: visits.length,
            }}
            lastSync={(loadCache()||{}).lastSync}
            onResync={retrySync}
            locations={locations}
            restaurants={restaurants}
            visits={visits}
            menus={menus}
            lists={lists}
            meta={meta}
            onShareApp={shareApp}
            onAddLocation={(name)=>{
              const trimmed = (name || "").trim();
              if (!trimmed) return;
              const exists = locations.some(l => l.toLowerCase() === trimmed.toLowerCase());
              if (exists){ flash("That location already exists"); return; }
              const next = locations.concat([trimmed]).sort((a,b)=> a.localeCompare(b));
              commit({ locations:next }, ["locations"]);
              flash("Location added");
            }}
            onRenameLocation={(oldName, newName)=>{
              const trimmed = (newName || "").trim();
              if (!trimmed || trimmed === oldName) return;
              const clash = locations.some(l =>
                l !== oldName && l.toLowerCase() === trimmed.toLowerCase());
              if (clash){ flash("That location already exists"); return; }
              const nextL = locations.map(l => l === oldName ? trimmed : l)
                .sort((a,b)=> a.localeCompare(b));
              // cascade the rename onto every restaurant that pointed at the old name
              const affected = restaurants.filter(r => r.location === oldName);
              const nextR = affected.length
                ? restaurants.map(r => r.location === oldName
                    ? Object.assign({}, r, { location:trimmed }) : r)
                : restaurants;
              const files = affected.length ? ["locations","restaurants"] : ["locations"];
              commit({ locations:nextL, restaurants:nextR }, files);
              // if the filter was on the renamed value, follow it
              if (placesFilter === oldName) setPlacesFilter(trimmed);
              flash(affected.length
                ? "Renamed and updated " + affected.length + " restaurant(s)"
                : "Location renamed");
            }}
            onDeleteLocation={(name)=>{
              const inUse = restaurants.filter(r => r.location === name).length;
              if (inUse > 0){
                flash(inUse + " restaurant(s) use this - move them first");
                return;
              }
              const next = locations.filter(l => l !== name);
              commit({ locations:next }, ["locations"]);
              if (placesFilter === name) setPlacesFilter("All");
              flash("Location removed");
            }}
            onCheckUpdate={()=> checkForUpdate(true)}
            updMsg={updMsg}
            updateVersion={update ? update.version : null}
            onApplyUpdate={()=> applyUpdate(update ? update.version : null)} />
        )}
        {tab === "discover" && (
          <DiscoverView
            restaurants={restaurants} visits={visits} menus={menus}
            lists={lists} meta={meta} splits={splits}
            onOpenYearInFood={()=> setOverlay({ type:"yearInFood" })}
            onOpenPassport={()=> setOverlay({ type:"passport" })}
            onScanMenu={()=> setOverlay({ type:"scanMenu" })}
            onLogVisit={()=> setOverlay({ type:"logVisit" })}
            onAddPlace={()=> setOverlay({ type:"addRestaurant" })}
            onPublishList={()=> setOverlay({ type:"publish" })}
            onShareApp={shareApp}
            onOpenSplit={(s)=> setOverlay({ type:"splitCheck", editSplit:s })}
            onNewSplit={()=> setOverlay({ type:"splitCheck" })}
            onDeleteSplit={deleteSplit} />
        )}
      </div>

      {/* bottom navigation */}
      <nav className="nav">
        <button className={tab==="history" ? "on" : ""} onClick={()=> setTab("history")}>
          <span className="navicon"><Icon name="clock" size={23} /></span>History
        </button>
        <button className={tab==="restaurants" ? "on" : ""} onClick={()=> setTab("restaurants")}>
          <span className="navicon"><Icon name="plate" size={23} /></span>Places
        </button>
        <button onClick={()=> setSheet(true)}>
          <span className="add"><Icon name="plus" size={24} color="#1b1714" /></span>
        </button>
        <button className={tab==="discover" ? "on" : ""} onClick={()=> setTab("discover")}>
          <span className="navicon"><Icon name="compass" size={23} /></span>You
        </button>
        <button className={tab==="settings" ? "on" : ""} onClick={()=> setTab("settings")}>
          <span className="navicon"><Icon name="gear" size={23} /></span>Settings
        </button>
      </nav>

      {/* add action sheet */}
      {sheet && (
        <ActionSheet
          onClose={()=> setSheet(false)}
          onPick={(what)=>{ setSheet(false); setOverlay({ type:what }); }} />
      )}

      {/* overlays */}
      {overlay && overlay.type === "spinPick" && (
        <SpinPicker
          restaurants={restaurants}
          onOpenRestaurant={(id)=> setOverlay({ type:"restaurant", id:id })}
          onClose={()=> setOverlay(null)} />
      )}
      {overlay && overlay.type === "nearMe" && (
        <NearMeView
          cfg={config}
          restaurants={restaurants}
          onOpenRestaurant={(id)=> setOverlay({ type:"restaurant", id:id })}
          onAddPlace={(prefill)=> setOverlay({ type:"addRestaurant", prefill:prefill })}
          onUpgrade={()=>{ setOverlay(null); setTab("settings"); }}
          onClose={()=> setOverlay(null)} />
      )}
      {overlay && overlay.type === "pullMenu" && (
        <RestaurantPicker
          restaurants={restaurants}
          onClose={()=> setOverlay(null)}
          onPick={(id)=> setOverlay({ type:"restaurant", id:id })} />
      )}

      {overlay && overlay.type === "groupStart" && (
        <RestaurantPicker
          restaurants={restaurants}
          title="Start a group order"
          onClose={()=> setOverlay(null)}
          onPick={(id)=> setOverlay({ type:"groupStartMenu", id:id })} />
      )}

      {overlay && overlay.type === "groupStartMenu" && (
        <GroupOrderStart
          cfg={config}
          restaurant={restaurantById(overlay.id)}
          menus={menus[overlay.id] || []}
          onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "restaurant" && (
        <RestaurantDetail
          restaurant={restaurantById(overlay.id)}
          menus={menus[overlay.id] || []}
          visits={visitsFor(overlay.id)}
          cfg={config}
          onClose={()=> setOverlay(null)}
          onLogVisit={()=> setOverlay({ type:"logVisit", restaurantId:overlay.id,
            returnTo:{ type:"restaurant", id:overlay.id } })}
          onEdit={()=> setOverlay({ type:"editRestaurant", id:overlay.id })}
          onAddMenu={()=> setOverlay({ type:"scanMenu", restaurantId:overlay.id })}
          onOpenMenu={(menuId)=> setOverlay({
            type:"menuDetail", restaurantId:overlay.id, menuId:menuId })}
          onOpenVisit={(v)=> setOverlay({ type:"editVisit", visit:v,
            returnTo:{ type:"restaurant", id:overlay.id } })}
          onSplitVisit={(v)=> setOverlay({ type:"splitCheck", fromVisit:v,
            returnTo:{ type:"restaurant", id:overlay.id } })}
          onToggleFav={()=>{
            const next = restaurants.map(r =>
              r.id===overlay.id ? Object.assign({},r,{favorite:!r.favorite}) : r);
            commit({ restaurants:next }, ["restaurants"]);
          }}
          onDelete={()=>{
            const nextR = restaurants.filter(r => r.id !== overlay.id);
            const nextM = Object.assign({}, menus); delete nextM[overlay.id];
            commit({ restaurants:nextR, menus:nextM }, ["restaurants","menus"]);
            setOverlay(null); flash("Restaurant removed");
          }}
          onSaveItemNutrition={(menuId, si, ii, nutrition)=>{
            // same write path as the menu overlay, but the inline menu passes its id
            const rid = overlay.id;
            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== menuId) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) =>
                    iidx !== ii ? it : Object.assign({}, it, { nutrition:nutrition })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            commit({ menus: Object.assign({}, menus, { [rid]:nextList }) }, ["menus"]);
          }} />
      )}

      {overlay && overlay.type === "menuDetail" && (
        <MenuDetail
          restaurant={restaurantById(overlay.restaurantId)}
          menu={(menus[overlay.restaurantId] || []).find(m => m.menu_id === overlay.menuId)}
          visits={visitsFor(overlay.restaurantId)}
          cfg={config}
          onClose={()=> setOverlay({ type:"restaurant", id:overlay.restaurantId })}
          onReScan={()=> setOverlay({
            type:"scanMenu",
            restaurantId:overlay.restaurantId,
            menuId:overlay.menuId,
          })}
          onDeleteMenu={()=>{
            const restMenus = (menus[overlay.restaurantId] || [])
              .filter(m => m.menu_id !== overlay.menuId);
            const nextM = Object.assign({}, menus,
              { [overlay.restaurantId]:restMenus });
            commit({ menus:nextM }, ["menus"]);
            setOverlay({ type:"restaurant", id:overlay.restaurantId });
            flash("Menu removed");
          }}
          onSaveItemNutrition={(si, ii, nutrition)=>{
            // cache the per-item estimate onto the menu item in the repo so it
            // computes only once. Identify the item by section + item index.
            const rid = overlay.restaurantId, mid = overlay.menuId;
            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== mid) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) =>
                    iidx !== ii ? it : Object.assign({}, it, { nutrition:nutrition })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            const nextM = Object.assign({}, menus, { [rid]:nextList });
            commit({ menus:nextM }, ["menus"]);
          }} />
      )}

      {overlay && (overlay.type === "addRestaurant" || overlay.type === "editRestaurant") && (
        <RestaurantForm
          existing={overlay.type==="editRestaurant" ? restaurantById(overlay.id) : null}
          prefill={overlay.type==="addRestaurant" ? (overlay.prefill || null) : null}
          locations={locations}
          cfg={config}
          onClose={()=> setOverlay(null)}
          onSave={async (rec, extras)=>{
            const newLocationsToAdd = (extras && extras.newLocationsToAdd) || [];
            const photoBlob = extras && extras.photoBlob;
            const photoPath = extras && extras.photoPath;

            // Step 1: upload the photo first (if any) so we don't write a
            // photo path into the JSON that doesn't actually exist in repo.
            if (photoBlob && photoPath){
              try {
                await uploadPhotoBatch([{ path: photoPath, blob: photoBlob }]);
                logMsg("SAVE","Uploaded restaurant photo to " + photoPath);
              } catch(err){
                logMsg("ERROR","Restaurant photo upload failed: " + err.message);
                flash("Photo upload failed - " + err.message);
                return;  // abort save; user can retry
              }
            }

            // resolve new location additions case-insensitively against the
            // master locations list. If the user typed "boston" but we already
            // have "Boston" saved, use the existing casing on the restaurant
            // and skip adding a duplicate.
            let nextLocations = locations;
            let recOut = rec;
            const additions = newLocationsToAdd;
            if (additions.length){
              const lcMap = new Map();
              locations.forEach(l => lcMap.set(l.toLowerCase(), l));
              const trueNew = [];
              additions.forEach(loc => {
                const trimmed = (loc || "").trim();
                if (!trimmed) return;
                const existingCasing = lcMap.get(trimmed.toLowerCase());
                if (existingCasing){
                  // match found - reuse existing casing on the restaurant record
                  if (recOut.location === trimmed){
                    recOut = Object.assign({}, recOut, { location: existingCasing });
                  }
                } else {
                  trueNew.push(trimmed);
                  lcMap.set(trimmed.toLowerCase(), trimmed);
                }
              });
              if (trueNew.length){
                nextLocations = locations.concat(trueNew)
                  .sort((a,b)=> a.localeCompare(b));
                logMsg("SAVE","Added " + trueNew.length +
                              " new location(s) from restaurant form: " +
                              trueNew.join(", "));
              }
            }

            let next;
            if (overlay.type === "editRestaurant"){
              next = restaurants.map(r => r.id===recOut.id ? recOut : r);
              flash("Restaurant updated");
            } else {
              next = [recOut].concat(restaurants);
              flash("Restaurant added");
            }

            // commit restaurants always; commit locations only if changed
            const updates = { restaurants:next };
            const files   = ["restaurants"];
            if (nextLocations !== locations){
              updates.locations = nextLocations;
              files.push("locations");
            }
            commit(updates, files);
            // Editing returns to the restaurant; a fresh add normally returns to
            // wherever the user was. A discovery add (carries google_place_id) is
            // worth landing on so the user sees the place they just saved.
            setOverlay(
              (overlay.type==="editRestaurant" || recOut.google_place_id)
                ? { type:"restaurant", id:recOut.id } : null);
          }} /> 
      )}

      {overlay && (overlay.type === "logVisit" || overlay.type === "editVisit") && (
        <VisitForm
          restaurants={restaurants}
          menus={menus}
          presetRestaurantId={overlay.restaurantId}
          existing={overlay.type==="editVisit" ? overlay.visit : null}
          cfg={config}
          onClose={()=> setOverlay(overlay.returnTo || null)}
          onSave={async (rec, extras)=>{
            const pendingUploads = (extras && extras.pendingUploads) || [];

            // Step 1: upload any new photo blobs first so the JSON we commit
            // doesn't reference paths that don't exist in the repo yet.
            if (pendingUploads.length){
              try {
                await uploadPhotoBatch(pendingUploads);
                logMsg("SAVE","Uploaded " + pendingUploads.length + " visit photo(s)");
              } catch(err){
                logMsg("ERROR","Visit photo upload failed: " + err.message);
                flash("Photo upload failed - " + err.message);
                return;  // abort save; user can retry
              }
            }

            let next;
            if (overlay.type === "editVisit"){
              next = visits.map(v => v.id===rec.id ? rec : v);
              flash("Visit updated");
            } else {
              next = [rec].concat(visits);
              flash("Visit logged");
            }
            commit({ visits:next }, ["visits"]);
            // Flow actually-paid prices back onto matching menu items (additive;
            // fills gaps the menu scan missed, records what was paid).
            const menusWithPaid = backfillPaidPrices(rec.restaurant_id, rec.dishes, menus, todayISO());
            if (menusWithPaid) commit({ menus:menusWithPaid }, ["menus"]);
            setOverlay(overlay.returnTo || null);
          }}
          onDelete={overlay.type==="editVisit" ? ()=>{
            const next = visits.filter(v => v.id !== overlay.visit.id);
            commit({ visits:next }, ["visits"]);
            setOverlay(overlay.returnTo || null); flash("Visit removed");
          } : null}
          onPropagateDishNutrition={async (match, est, photoPath, blob)=>{
            // upload the dish thumbnail, then write numbers + thumbnail onto the
            // matched menu item so it shows on the menu page on the return trip.
            let finalPhoto = photoPath;
            if (blob && photoPath){
              try { await uploadPhotoBatch([{ path:photoPath, blob:blob }]); }
              catch(err){
                logMsg("ERROR","Menu thumbnail upload failed: " + err.message);
                finalPhoto = null;   // still save the numbers
              }
            }
            const rid = match.restId, mid = match.menuId;
            const list = menus[rid] || [];
            const nextList = list.map(m => {
              if (m.menu_id !== mid) return m;
              const sections = (m.sections || []).map((s, sidx) =>
                sidx !== match.si ? s : Object.assign({}, s, {
                  items: s.items.map((it, iidx) => iidx !== match.ii ? it
                    : Object.assign({}, it, { nutrition:est, photo:finalPhoto || it.photo || null })),
                }));
              return Object.assign({}, m, { sections:sections, last_updated:todayISO() });
            });
            commit({ menus: Object.assign({}, menus, { [rid]:nextList }) }, ["menus"]);
          }} />
      )}

      {overlay && overlay.type === "splitCheck" && (
        <SplitCheckFlow
          config={config}
          flash={flash}
          restaurants={restaurants}
          visits={visits}
          initialLines={overlay.fromVisit
            ? (overlay.fromVisit.dishes || []).filter(d => parsePrice(d.price))
                .map(d => ({ name: d.name, price: parsePrice(d.price), qty: d.qty || 1 }))
            : null}
          initialTotal={overlay.fromVisit && overlay.fromVisit.receipt ? overlay.fromVisit.receipt.total : null}
          presetRestId={overlay.fromVisit ? overlay.fromVisit.restaurant_id : ""}
          presetVisitId={overlay.fromVisit ? overlay.fromVisit.id : "new"}
          initialReceiptPhoto={overlay.fromVisit && overlay.fromVisit.receipt ? overlay.fromVisit.receipt.photo : null}
          onSaveToVisit={(rec, isNew)=>{
            const next = isNew ? [rec].concat(visits) : visits.map(v=> v.id===rec.id ? rec : v);
            commit({ visits:next }, ["visits"]);
            flash(isNew ? "Saved as a new visit" : "Split saved to your visit");
          }}
          initialSplit={overlay.editSplit || null}
          onSaveSplit={(entity)=>{ upsertSplit(entity); flash(overlay.editSplit ? "Split updated" : "Split saved"); }}
          onClose={()=> setOverlay(overlay.returnTo || null)} />
      )}
      {overlay && overlay.type === "scanMenu" && (
        <ScanMenuFlow
          config={config}
          restaurants={restaurants}
          menus={menus}
          presetRestaurantId={overlay.restaurantId}
          presetMenuId={overlay.menuId}
          onClose={()=> setOverlay(null)}
          onSave={(restId, menusToSave, newRestaurant, isReplace)=>{
            let nextR = restaurants;
            if (newRestaurant) nextR = [newRestaurant].concat(restaurants);
            const existingForRest = menus[restId] || [];
            let newRestMenus;
            if (isReplace){
              // re-scan: menusToSave has exactly one menu, replace by menu_id
              const replacement = menusToSave[0];
              newRestMenus = existingForRest.map(m =>
                m.menu_id === replacement.menu_id ? replacement : m);
            } else {
              // append all - works for single (1 menu) or split (N menus)
              newRestMenus = existingForRest.concat(menusToSave);
            }
            const nextM = Object.assign({}, menus, { [restId]:newRestMenus });
            commit({ restaurants:nextR, menus:nextM },
                   newRestaurant ? ["restaurants","menus"] : ["menus"]);
            // re-scan returns to the menu detail (where the user came from);
            // a fresh scan returns to the restaurant page so they can see the
            // new menu in the list
            setOverlay(isReplace
              ? { type:"menuDetail", restaurantId:restId,
                  menuId:menusToSave[0].menu_id }
              : { type:"restaurant", id:restId });
            flash(isReplace
              ? "Menu replaced"
              : menusToSave.length > 1
                ? menusToSave.length + " menus saved"
                : "Menu saved");
          }} />
      )}

      {overlay && overlay.type === "settings" && (
        <SetupScreen
          asOverlay
          initial={config}
          onClose={()=> setOverlay(null)}
          onSave={(cfg)=>{
            saveConfig(cfg); setConfig(cfg); setOverlay(null);
            flash("Settings saved"); syncFromGitHub(cfg, loadCache());
          }} />
      )}

      {overlay && overlay.type === "help" && (
        <HelpView onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "yearInFood" && (
        <YearInFood visits={visits} restaurants={restaurants}
          onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "passport" && (
        <FoodPassport visits={visits} restaurantById={restaurantById} cfg={config}
          onOpenVisit={(id)=>{ const v = visits.find(x => x.id === id); if (v) setOverlay({ type:"editVisit", visit:v }); }}
          onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "publish" && (
        <PublishBuilder restaurants={restaurants} visits={visits} cfg={config}
          onPublished={handleListPublished}
          onClose={()=> setOverlay(null)} />
      )}

      {overlay && overlay.type === "myLists" && (
        <MyListsOverlay
          lists={lists}
          onClose={()=> setOverlay(null)}
          onToggleFav={toggleListFav}
          onDelete={deleteSavedList}
          onRefresh={refreshSavedList} />
      )}

      {overlay && overlay.type === "map" && (
        <MapView
          restaurants={restaurants}
          cityFilter={placesFilter}
          cfg={config}
          onOpen={(r)=> setOverlay({ type:"restaurant", id:r.id })}
          onClose={()=> setOverlay(null)}
          onSaveCoords={(ups)=>{
            // ups: {id: {lat,lng,geo_addr,geo_ok,geo_failed}} - merge + one commit
            if (!ups || !Object.keys(ups).length) return;
            const next = restaurants.map(r => ups[r.id] ? Object.assign({}, r, ups[r.id]) : r);
            logMsg("MAP","Persisting coords for " + Object.keys(ups).length + " place(s)");
            commit({ restaurants: next }, ["restaurants"]);
          }} />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

  const [open, setOpen] = useState(false);
  return (
    <span className="infodot-wrap">
      <button className={"infodot" + (label ? " labeled" : "")}
        onClick={(e)=>{ e.stopPropagation(); setOpen(o=>!o); }}
        aria-label={title || "More info"}>
        <Icon name="info" size={14} color="#80715f" />
        {label ? <span className="infodot-label">{label}</span> : null}
      </button>
      {open ? (
        <>
          <span className="infodot-scrim"

    <div className="searchbar">
      <Icon name="search" size={16} color="#80715f" />
